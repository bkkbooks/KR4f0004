body:
  text: 考陽關考陽關之名自漢唐已來咸所稱引而遺蹤湮廢道里莫徴比因西域並𨽻昄章爰有纂輯圖志之役猷詢所及或據肅州新志載烏魯木齊西境有地名陽巴爾噶遜以為陽關之舊者殊不知陽乃回語蓋謂新而巴爾噶遜則厄魯特語蓋謂城亦非謂關也况烏魯木齊地在天山之北揆其方位懸隔奚啻謬以千里計耶按漢書地理志敦煌郡龍勒縣有陽關玉門關後晉高居晦使于闐記西渡都鄉河至陽關考都鄉河即今黨河龍勒縣即今州衛今為敦煌縣地黨河在縣西境而陽關玉門關均在黨河之西陽關西而偏南故以陽名詳核形勢正應在今黨河西南與紅山口相近又漢書西域傳西域三十六國東則接漢扼以玉門陽關考漢時三十六國即今回部回部東境直安西府敦煌縣亦與漢書三十六部東扼陽關之文吻合至王維詩西出陽關云云送元二使安西作也考唐之安西號安西大都護府初治西州在伊州之西即今闢展也再徙高昌故地即今土魯畨之交河也三徙龜兹即今庫車也前後三遷總在哈密之西是安西實在陽關以外而陽關之屬在敦煌縣境尤為昭晳無疑矣夫古今邉陲故迹其考信之艱非貫串諸書即源流未偹然徙眩惑於志乘家之聚訟膠轕而不能確證之我疆我理如目營手畫者然又何以斥傳訛鑿空之誣而炳焉揭以正鵠哉書此宣付館臣俾綴於編且以示一隅之舉云天竺五印度考訛佛經此欲界內以須彌山為中須彌山四靣有四大部洲居南面者為閻浮提即華言南贍部洲者是以閻浮提內有三大國各所屬及弗相屬之小國弗與焉而閻浮提又以崑崙為中居崑崙之東及東南東北者即我中國為一大國居崑崙之南及西南者為天竺一大國即今西藏所稱厄訥特珂克也居崑崙之西北及北者為洪豁爾一大國而天竺一國分為東西南北中五印度即梵經所稱印達爾印逹爾者華言自在境界之謂也五印度皆厄訥特珂克之地唐史宋史訛印度為身毒或稱身篤而所載事迹及入朝中國大率不實亦不得要領何言之自古中華聲教所訖莫過本朝而本朝百餘年中從未有天竺遣使進貢之事雖於乾隆庚辰年間烏特噶里畢拉竒碩拉汗曽遣婆羅門進表奉貢亦其東印度近我西藏之一小國耳非中天竺也若夫北印度實近我回部之葉爾羌故葉爾羌之西過蔥嶺即拔達克山由拔達克山轉而南為克什米爾又轉而西為溫都斯坦又轉而南方為厄訥特珂克其方向如此其道里亦莫得而詳焉溫都斯坦雖回地也而回人相傳彼地有佛遺迹益知即北印度交界或者昔為天竺屬而後為回部屬皆不可知溫都斯坦今唐古忒及回語皆稱為䀶都斯坦蓋亦譯者訛䀶為溫而二語皆與印度音聲相近所謂天竺北印度近回部此亦一驗也要知䀶與溫與印與身及度與毒與篤與都皆非天竺本語而又何必較是非於一字一句之間哉宋史載天竺僧施護行程有至誐惹曩國之語誐惹曩音聲亦與厄訥特珂克相近而通考所謂度雪山過伽濕彌勒國者雪山即今蔥嶺而伽濕彌勒亦即克什米爾之誤耳若夫元史稱元太祖見角端於印度疑亦即今䀶都斯坦之北印度與回部交界者耳非中印度也東印度既近西藏故天竺之事西藏時聞之據西藏僧謂天竺雖佛現身説法之地然今天竺實不興佛法而興異教此亦與梵帙佛受記五百年後佛法漸微而漸流行東至震旦乃復興之語相符合夫以今中國之力若唐宋之假道蔥嶺克什米爾以達天竺中印度亦何難但既非德致更以計求雖徠逺域何關實政故不為也近得蒙古源流謂元太祖進兵至厄訥特珂克遇一角獸狀若跪叩者三元太祖曰是殆上天示豫自此往斡齊爾圖瑣林道逺難極遂振旅云云斡齊爾圖瑣林者蒙古語謂金剛牀也即佛現身説法之中印度益可為未至中印度之證而獸為人言更可信元史之謬為附會因考天竺五印度故並闢其蹖訛如右熱河考考水源而不親履其地晰其支泒脈絡分合之由雖博綜載籍稽諸故老之流傳不能參互而訂其蹖曩或以熱河為濡水之源余固心疑之而未暇深考夫濡水即灤河自多倫諾爾之北而來其源甚逺又折而東南數百里乃歷喀喇河屯又東南流數十里至鳯凰嶺熱河乃南注會之不應其源反出於此蓋濡自有源而熱河又别有源是不容紊今秋駐山莊遣喀喇沁郡王拉特納錫苐內大臣努三往尋熱河之源則察之於察汗陀羅海蒙古語察汗謂白陀羅海謂首蓋以山阜得名其地距熱河二百里而贏流經固都爾呼達巴漢麓蒙古語固都爾呼者伏行達巴漢者嶺也遂名固都爾呼河西南至於中關東茅溝河水自玳瑁溝出西南流注之又合而南流賽音郭勒河水蒙古謂好為賽音河為郭勒自霍爾霍克蒙古語謂熟食達巴漢之三道溝出南流折而西南與湯泉泉出山莊東北湯山合又西注之三源既滙又西南流沿山莊東北歷錘峰下山莊行宫內亦有溫泉流出滙之於是始有熱河之名南流折而東復折而南入于灤是則熱河乃會濡水而非濡源審矣酈道元水經注云濡水又東南流武列水入焉其水三川泒合西源曰西藏水西南流東藏水注之東藏水出東溪西南流與中藏水合又南右入西藏水故目其川曰三藏川又東南流徑列溪謂之武列水東南歷石梃下層巒之上孤石雲舉高可百餘仭其水合流入濡按道元所言石梃即今錘峯其曰三藏水即今固都爾呼茅溝賽音郭勒三源則熱河之為武列水無疑苐古今異稱今人但知熱河而不知武列耳然所云三川合流之序則不足據今考固都爾呼為西源茅溝為中源賽音郭勒為東源西源自北而來先合中源又南始與東源合道元所謂西藏水又豈能越中藏而先與東合哉此其敘述錯綜已足滋惑而以中藏為先合東藏則又其顯然大謬者也又如以濡水為經白檀北夫白檀乃今密雲實非濡水所經則誤以漢書地理志之洫水亦名鮑邱水即今潮河為濡又從而傅會之矣蓋徒尚耳食而未親履其地晰其支泒脈絡分合之由毋怪乎其舛也或以為熱河既會濡而東入于海則謂之濡源亦無不可何須置辨是大不然夫江淮河濟何一不入於海而皆謂之海可乎昔禹貢載導河自積石或以為亦若江之岷山淮之桐柏矣及今平定回部乃知河源自蔥嶺以東之和闐葉爾羌諸水瀦為蒲昌海即鹽澤蒙古語謂之羅布諾爾伏流地中復出為星宿海蒙古語謂之鄂敦諾爾即元史誤譯為火敦腦兒者其水在枯爾坤之東昔皇祖遣使窮河源得之于此入版御製文以記其時回部未圖故止及星宿海也至積石始名黃河則大禹所記亦苐就目所經見者而言道元又安能以所未經見者而一一詳訂其曲折也耶苟非命使親履其地烏知此之為是而彼之為非乎近敕儒臣輯熱河志故考其源俾知所從事若夫濡水之源則更俟他日詳考之右熱河考乃乾隆戊子秋駐山莊時所作內云黃河之源自星宿海蓋據康熙年間侍衛拉錫等所窮但至星宿海而止即指為河源是以皇祖御製幾暇格物編亦以鄂敦漢文星宿他臘漢云岡海為河源也逮壬寅嵗命侍衛阿必達往窮河源親履目覩復命詳奏豫始知星宿海尚非真源其西南上遊一河蒙古語名阿勒坦漢云金郭勒漢云河其水黃色回旋三百餘里入星宿海合流而下至貴德堡水色全黃始名黃河又阿勒坦郭勒之西有巨石髙數丈蒙古語名噶達素漢云北極齊老漢云石其崖壁黃赤色上為天池釃流百道作金色入阿勒坦郭勒則真黃河之上源也于是考詢始明確因著河源詩文並命館臣詳訂前史載記之訛輯為河源紀略一書刋行頒布以決疑而傳信然兹事體大理博彼桑欽酈道元輩拘墟耳食無足論已即元史有星宿海為河源之文亦失之疏而誤譯鄂敦為火敦則漢人不通蒙古語之故耳使非若今日之版圗式廓子之精通蒙古語及漢文更詢之親履目覩之人率欲正千古之訛傳得其確實不亦難哉因閲舊考河源未臻更志續得真源梗概如右乾隆甲寅孟秋御識濟源盤谷考證讀書所以眀理修身制事也陶淵眀好讀書而不求甚解余以為在淵眀則可在他人則不可彼其髙尚避世理有所不必眀身有所不屑修事有所不足制故可耳若豫之讀書凡涉疑必求解其疑而後已此或有合於韓昌黎解惑之説乎昌黎之送李願歸盤谷也其事本在濟源祇以盤山亦有盤谷而太行山實為天下之脊西南發崑崙東北走遼海盤山亦在太行之陽也故豫向居田盤每假借用之而昌黎詩中所云燕川方口又雅合田盤之境然無以證其實終屬疑似且不知濟源之果有盤谷否也因命豫撫阿思喀親至其地訪焉至則若谷若寺若李願之居若韓愈之文之刻於石者一一詳繪以進於是憬然悟曰盤谷實在濟源而不在田盤豫向之假借用之者誤也豈惟豫誤蔣溥等之輯盤山志二三其説而未歸一是者非不眀于學則有所面從亦誤也夫古人事迹亦何繫於今時而有如適所云者則豫不惟憬然悟而且惕然懼矣豫故曰陶淵眀之不求甚解在彼則可在他人則不可而在為人君者益不可因書其事命于濟源田盤磨崖兩泐之
