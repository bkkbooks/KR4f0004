front:
  text: 欽定四庫全書御製文二集巻四十二
  hash: sha256:e9eb9677943d68f1ea7beb3e109f0db5c7ec81bbb7861ac219681d5139bd8220
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_076-1a, image: WYG1301/WYG1301-0540a.png}
body:
  text: 贊五代人畫伏虎羅漢贊竹下婆娑坐而頂露嗟爾牛哀何不可度亦無慈力亦無威神芒鞋木杖隨物為羣馮婦攘臂劉昆渡河世傳竒事奈何奈何丁雲鵬掃象贊普賢大士佛功徳智行願恒沙度未來世六牙馴伏其名曰象設如有為功徳亦障督視掃之以物喻理然非了義半提而已陳居中畫無量夀佛贊混沌以前火刦以後一刹那間是無量夀蓮座御牛慢擬猶龍咄哉濫觴六祖五宗玉刻達摩贊地既載水水豈非地踏步以行殊非竒事西来西返前波後波如是如是作麽作麽宋人達摩像贊貝多樹下趺坐觀空九年面壁同乎不同一花五葉東土流傳擎拳豎拂紛矣談禪吴道子畫寳積賔伽羅佛像贊金甲裝校現賔伽羅以威神力降伏諸魔寳葢住空八部拱手既舞既歌亦空亦有瘦金所識道子作圖如水中月是乎否乎丁觀鵬十八羅漢贊第一阿迎阿機達尊者出王舍城詣耆闍崛何以隨行拄杖蠅拂履空如地詎曰神通不有而有不空而空第二阿資答尊者乗桴抱膝亂彼滄溟鬼伯四五使之負行髙矚雲霄不霑泥水漢渚浮槎視此小矣第三㧞納㧞西尊者示少者相拔納㧞西經巻在手不議不思設謂坐忘是野狐禪侍者擊磬響寂自然第四嘎禮嘎尊者學人膜拜尊者閉目示以無示青山緑竹聞詩三百一言蔽之此不言者可與言詩第五㧞雜哩逋荅荅喇尊者眉毛拖地以手挽之全身直指㑹者為誰曲録其腰凍梨其面不以聲求不以色見第六㧞哈達喇尊者數珠在手百八琉璃爾問我荅妙諦無遺流泉出峽去而為川三乗演盡法爾如然第七嘎納嘎巴薩尊者石橋之上屧步欲過過将何徃来又従那上猗修竹下俯流水刹那萬刦應復同此第八嘎納嘎􅀢喇錣雜尊者從佛聞道迦毘降生比肩進步如鏡中行檀那第一不住檀那是七佛偈真六波羅第九㧞嘎沽拉尊者手鍼自縫慣補破裳童子猴子捻線其旁三既非三一豈是一是非非是半得半失第十喇乎拉尊者行脚事畢宴坐以嬉欲爬其背養和手持癢既自知養和何有夢中佛事視此同否第十一租查巴納荅嘎尊者香積食畢童子洗鉢一粒不受大觧大脱手持一巻了義細探従何悟入盖是楞嚴第十二畢那楂拉㧞哈喇錣雜尊者倚松而立有鬼立前顧之若怖又若見憐憐即是慈怖豈非悲普門大士無為而為第十三巴那塔嘎尊者佛大弟子傳律之宗而不縛律禪教胥通右執如意意将奚如是塗毒鼓是摩尼珠第十四納阿噶塞納尊者妙法蓮華諸佛開塔以手擎之世界畢納是何神通尊者弭口㑹在汝邉有㑹則否第十五鍋巴嘎尊者义手當胸如滿月容披衣七條示以吾宗笠子弗戴直露頂相丈六丈六即真即妄第十六阿必達尊者三十二相八十種好云佛有此是謂顛倒波斯捧杯滿盛甘露是不二門無物不度第十七納納荅宻荅荅喇尊者盋盂之中飛迸銀水獰龍乗雲直入其裏龍大盂小如何可容偶作逰戲非謂神通第十八嘎􅀢巴達喇瑪尊者猛獸蹲前摇尾可愛恰是沙彌摩頂受戒何事國清豐干饒舌大空小空熾然分别丁觀鵬畫三世佛像贊我聞如是調御有言一彈指頃三世如然過去未来及與現在胥不可得是所以乃云何堂堂而俱現相具三世稱各印以掌於極樂界晏息優㳺著筆之先畫師悟由丁觀鵬畫觀世音像贊瑞蓮池中擁起綵雲種種相好現是普門慈具無緣悲含同體救種種難非彼非此娑羅樹上一花一果方便示人無可不可丁觀鵬畫地藏菩薩像贊七寳盆内滿如意珠大士宴坐十王敬趨地獄一空豈不善妙無奈衆生三塗六道稽首皈依甚深願海誓不成佛以衆生在丁觀鵬畫四天王贊東方提唎答喇阿持國天王須彌山王東面半腹王曰持國揵達婆主即乾闥婆孔雀王經作如是譯擁䕶如來除煩惱憂夀命百嵗得見百秋南方畢􅀢楂哈􅀢增長天王以浄石鉢施供如来正念增長速証菩提住於南方掌俱槃荼即鳩槃荼頞蜜怛羅慧劍手拏西方畢􅀢􅀢廣目天王正西天王亦名廣目是那伽主此云龍百千眷屬決江開瀆䕶守伏藏得清浄心人天供養北方􅀢沙喇斡那阿多聞天王是藥义主或名夜义曰毘沙門又曰鞞沙門譯經者互異右建寳幢左捧塔雲賢刦千佛均所受記以無為心而為䕶衛陳居中畫釋迦佛贊獅座之上青蓮開朶現天人師跏趺以坐曰相曰好自然而成無為無事放大光明雙手結印是演法輪滿字半字何果何因陳居中畫羅漢贊次右指出乾闥手扶禪杖塔或倚肩缾或擎掌或佩法輪或持拂子如意如誰數珠數此虎馴若貍以手撫之全身威猛滿志慈悲陳居中畫羅漢贊次左有肅其容有怡其面䏺肛者咍戍削者粲少者童顔老者龎眉鉢貯浄飯尺守毘尼明珠在握戲彼癡龍應真二九像示居中如松柏之茂贊崇宫夀安安娯夀母嵗嵗承歡大慶益茂叶重簾暖閣用奉冬温沐手撰述供目顧存畫代以書書宛成畫夀字逾萬延釐申介如松及柏其茂無央為殿九祝櫽括六章一字一年年與字永敬待九旬新圖筆秉白玉福禄夀如意贊和闐瑞珍耆闍寳器夀獻萱闈福禄並致洪範疇一中庸得次景福維祺遐齡永世三朋之作八旬初暨願百倍兹無不如意宋人畫達摩贊直指上乗不屑聲聞未契梁武彼何足云渡葦已畢藉草以坐廓然無聖亦復無我食罷洗鉢袖手而咍一花五葉濫矣紛哉仇英畫普賢像贊普賢大士願海甚深本功徳智具修習心三千大千諸佛所在無弗供養無弗懴悔禪枝垂蔭慧草生芽底須七寳祗據六牙凡屬有為不離一象坐而伏之人天遍仰和闐玉達摩渡江屏風贊佛大勝多六宗建立達摩破之謂涉修習六波羅蜜豈非習修以無建立認性隨流一葦中流弗南弗北曰有二宗毫釐差慝藉曰頓漸何異有為玉人鑿像不語得之吴道子畫文殊像贊威音已前㕘佛宗風示童子像於賢刼中堂堂獨立經巻手持三藏五乗可以盡之西域耆闍震旦五臺彈指現身不費徃來道子妙繪浄業習薰葉衣永住妙吉祥雲和闐玉鏤面壁達摩圖贊化被五印法度六宗爰來震旦闡佛真風廓然無聖梁王不識渡江而北少林面壁神光㕘承黙爾端坐立雪㫁臂乃名慧可初無言示曰安心竟壁契其㫖至今玉瑩宋人畫白衣大士贊綠草如雲白衣似水撫膝宴坐清浄無比清故非染浄故非紛弗離本念是為普門本念云何妙觀察智莫不悲度莫不慈濟衆生所仰現前豈殊設曰應感尚屬汙塗玉鏤達摩贊厜㕒趺坐面壁依然少林之石詎比和闐是語然乎曰然即否面者已非壁復何有同斯一花異斯五葉是即拈手是即笑頰崑崙蔥嶺地脉相連冺歸去來示現隨緣宋人畫文殊贊現童子相侍天人師與物無二具體而微一巻在手義括三乗滿字半字何所何能巍巍相好示蹟五臺草衣被髮同異漫猜作者何人不留名氏稽首慈雲如然法爾和闐玉鏤羅漢贊嵌巖獨坐浄瓶持手一彈指頃非空非有竹杖傍倚蕉葉上覆叶剖盡心無擘開節紐天鹿伏馴銜芝在口於何為獻於何為受崑崙之墟環貽王母應真示現不脛而走趙奕畫白衣大士贊白衣披身金仙灌頂大慈大悲性志平等浄瓶在手㵼為水雲合掌其上善財殷勤無示固非有示豈是曰聖曰凡孰彼孰此牙刻五百羅漢贊應真五百各具神通須彌可把芥子能容巧匠㑹意寫以銛鋒方廣三寸變化無窮鹿苑巍煥雁塔穹窿騎麟駕鶴來徃其中是何佛法是何鬼工象脅林園意樹菁葱伊婆羅那同乎不同劉松年羅漢贊倚菩提樹俯視伊尼如示妙偈知乎不知樹頭結果其果纍垂猨猴登樹摘果以嬉童子攓袂仰而承之有色有象無意無為細入毫髮匪夷所思金剛四句一幅全披合掌欲詢應真伊誰
