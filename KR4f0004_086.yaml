  text: 欽定四庫全書御製文三集卷六
  hash: sha256:4befb76c349c47e6b6b71bedb3887f51759eae656221dc71c9feb650cde82246
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_086-1a, image: WYG1301/WYG1301-0607a.png}
body:
  text: 詔紀元周甲建立皇太子以明年元日授寶為嘉慶元年詔朕寅紹丕基撫綏方夏踐阼之初即焚香默禱上天若蒙昊眷俾得在位六十年即當傳位嗣子不敢上同皇祖紀元六十一載之數其時亦未計及夀登八旬有六也自臨御以來仰荷昊蒼垂佑列聖貽庥寰海升平重熙纍洽御宇之年慶周甲子敬念維天維祖宗所以付託在豫者至重且巨于繼體授受之際曷敢不倍切兢兢朕前此不即立儲之由節經頒發諭旨反覆申明蓋以歷觀史册三代而下由漢迄明儲二一建其弊百端前鑒具在我朝太祖太宗世祖俱未預立儲位惟聖祖仁皇帝曽以嫡立理密親王為皇太子後竟為宵小誘惑兼患痼疾不克祗承其時大臣中曽有以國本應行建立陳請者仰蒙皇祖聖裁獨斷訓諭特頒不復册立逮傳位皇考十三年勵精圗治內外肅清雍正元年皇考即親書朕名貯于乾清宫正大光明匾額之上又另書密緘常以自隨朕纘紹洪業六十年間景運龎洪版圖式廓十全紀績五代同堂積慶駢蕃實為史册所罕覯此皆仰賴皇祖皇考貽謀燕翼用能啓佑後人綏兹多福朕欽承家法踐阼後亦何嘗不欲立嫡以皇次子為孝賢皇后所生曽書其名遵皇考之例貯于正大光明匾上不意其早年無祿不能承受曽同大臣等啓緘閲看贈為端慧皇太子此中外所共知者嗣于癸巳年冬至南郊大祀敬以所定嗣位皇子之名禱于上帝並默禱所定嗣位皇子倘不克負荷請降之罰俾臣得另簡元良以為宗祏延逺無疆之福又于盛京恭謁祖陵時敬告太祖太宗在天之鑒是朕雖不明立儲嗣而于宗祏大計實早為籌定特不效前代之務虛文而貽後患耳夫建儲一事三代以後建立嫡嗣舊制相沿具載史册若以此等歷代踵行名正言順之事為非則朕亦非讀書稽古之人矣設名分未定或致如前史夜半宫中出片紙之語其弊更不可言方今紀綱肅清宫府一體歷代權姦婦寺諸秕政絶無其事斷不致因儲位未早宣示致滋他慮我子孫果能效法祖宗及朕之敬天勤民勑幾親政即不明詔立儲實可萬年無弊然此言即朕自問亦不敢自以為是千萬世後必有以為非者且令其平心觀我祖宗及朕所行與國家之得實益政治之享太平與否可耳朕誕膺大寶今六十年矣回念踐阼時默禱上帝之語并追憶朕年五旬後曽于聖母皇太后前奏及歸政之事彼時蒙聖母諄諭以朕躬膺付託之重天下臣民所繫望即至六十年亦不當傳位自逸次晨朕即以聖母所諭默奏上帝若能常奉慈寧夀躋頤慶朕亦何敢復執前願乃自丁酉年以來所願既虛於是仍冀得符初志兹天恩申錫竟獲周甲紀元夀躋八旬開五精神康健不至倦勤天下臣民以及蒙古王公外藩屬國實皆不願朕即歸政但天聽惟聰朕志先定難以勉順羣情兹以十月朔日頒朔用是諏吉于九月初三吉日御門理事召皇子皇孫王公大臣等將癸巳年所定密緘嗣位皇子之名公同閲看立皇十五子嘉親王為皇太子用昭付託定制孟冬朔頒發時憲書其以明年丙辰為嗣皇帝嘉慶元年俟朕長至齋戒後皇太子即移居育慶宫以定儲位皇太子生母令懿皇貴妃著贈為孝儀皇后升祔奉先殿列于孝賢皇后之次其應行典禮該衙門查照定例具奏皇太子名上一字改書顒字其餘兄弟及近支宗室一輩以及內外章疏皆書本字之永不宜更改其皇子王公臣下之名清書缺寫一點以示音同字異而便臨文至朕仰承昊眷康強逢吉一日不至倦勤即一日不敢懈弛歸政後凡遇軍國大事及用人行政諸大端豈能置之不問仍當躬親指教嗣皇帝朝夕敬聆訓諭將來知所秉承不致錯失豈非國家之大慶至郊壇宗社諸祀朕年當望九于登降拜跪儀節恐精力稍有未充不足以將誠敬自應嗣皇帝親詣行禮部院衙門並各省具題章疏及引見文武官員尋常事件俱應嗣皇帝一同披閲效朕所為以副天下臣民之望所有册立皇太子典禮一切虛文俱不必舉行其明年歸政一切典禮儀文著軍機大臣會同各該衙門敬謹條議以聞將此通諭中外知之訓命歸政後諸皇子孫曽元輩仍在尚書房讀書及應用冠服訓我國家重熙纍洽列聖相承敬天愛民海內升平梯航向化朕春秋二十有五御極踐阼初即拈香叩祈天恩設能如聖祖仁皇帝之享祚綿長仰邀昊眷克繩祖武夀祚延洪享國六十年即當歸政不敢更冀有所過算今荷天恩篤佑八旬開五康強逢吉五代同堂撫御寰區幸周甲子明嵗丙辰即屆歸政之期大廷授受景運增隆實為史册罕覯惟念諸皇子皇孫以及曽元于子皇帝嗣位以後一切章服儀制例有一定等差不可僭越但朕為太上皇帝而皇子皇孫不能照諸皇子皇孫之例遂與宗室等倫于親親之誼似有未協著于明年歸政後所有諸皇子皇孫以及曽孫元孫仍在尚書房讀書應用冠服韁轡等項俱著仍照現在之例不必更改朕年登九秩即可得六世來孫亦當視元孫一例豈不更為千古未有之吉祥盛事我子子孫孫纘膺統緒倘亦能如朕之享國綿長舉行歸政典禮為太上皇者其皇子皇孫等亦如今日朕加恩曽元輩之服物禮秩照此永以為法光昭奕祀衍慶徵祥實我大清億萬斯年之福若無太上皇之稱則當照國家宗室舊例不可僭越有紊成憲用是特頒訓諭交尚書房敬謹存記俾我世世子孫知所稟承以示惇睦而昭法守申示皇太子及內外王公大臣等弗允請緩歸政訓皇太子及王貝勒貝子公暨內外文武大臣蒙古王公等各具摺籲請俯順羣情俟朕夀躋期頤再舉行歸政典禮朕逐加披閲見其情詞懇款實皆出于至誠敬念維天維祖宗所以付託在豫者至重且巨臨御以來仰荷眷佑海宇乂安康強逢吉勤求治理惟日孜孜朕亦何敢稍存自暇自逸之念惟是朕紹承大統踐阼之初即焚香默禱上天若蒙昊蒼垂佑得在位六十年即當傳位嗣子不敢上同皇祖紀元六十以次增載之數且實未計及歸政之年朕夀當八旬有六也逮五旬後甫經念及嵗月舒長倍深兢業初不敢以此自必兹幸天恩申錫竟獲周甲紀元夀躋八旬開五始願克償此皆仰荷上天篤祐烈祖貽庥躬舉授受上儀實為曠古所未有用是特降詔諭册立皇太子于丙辰年改元歸政今皇太子及宗室蒙古王公內外大臣以朕八旬衍帙以來精神純固仍請躬攬庶政皇太子及臣工等日侍禁廷渥承恩眷臚誠籲懇愛戴依戀朕未嘗不深鑒其誠悃即天下臣民外藩屬國飲和食德久沐涵濡實皆不願朕即歸政但朕齋心默禱之意精誠孚格久荷昊慈垂鑒歷數十年如一日今若因羣情依戀勉遂所請則朕初心焚香告天之語轉為不誠是實難以聽許毋庸再行瀆請況朕仰承天眷純固有常一日不致倦勤即一日不敢懈弛歸政後凡遇軍國大事及用人行政諸大端豈能置之不問仍當勑幾體健躬親指教嗣皇帝朝夕敬聆訓諭可以知所秉承不致錯失而大小臣工恪恭盡職亦可謹凜遵循逮朕夀臻頤慶之後優遊無為豈不更為亘古未有之盛事將來嗣皇帝紹膺大統若能如朕之敬天愛民勵精圖治景祚綿長上躋耆夀亦如朕之舉行歸政眀彰典禮大廷授受尤為我國家億萬年無疆之庥此則朕所至願也御製文三集卷六
