front:
  text: 欽定四庫全書御製文二集卷四十四
  hash: sha256:b535044c1b70c658f3000ed3b0403e5181a865757e21c5b0e718e6c6bd404fac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_078-1a, image: WYG1301/WYG1301-0553a.png}
body:
  text: 贊馬和之畫如來贊坐青蓮華結金剛手天上天下非空非有面如滿月直鼻橫目不事莊嚴相好具足三乘演教法被大千汗牛充棟即此默然侍郎文筆務去藻飾較詩經圖彼烏鰂墨宋人十八應真贊第一阿迎阿機達尊者見佛時少成佛時老畫阿迎阿機達像或老或少不同咨之章嘉國師乃知見佛時像為少成道時像為老事有弗同故殊厥貌叶阿迎機達如水乳投冠冕應真法界優遊第二阿資答尊者宴坐松陰念珠在手念則不無佛於何有僮子持鏡宛見其背斯有義哉明不如晦第三拔納拔西尊者堂堂之貌漠漠之意合掌當胸義具十諦知有不有知空不空如是演教明月清風第四嘎禮嘎尊者金剛鈴杵左右分持杵寓智慧鈴寓慈悲如鳥雙翼去一不可設曰進之莫要無我第五拔􅀢􅀢答喇尊者袒腹露胸具大人相語默兩忘何卷何放住僧噶拉法力無邉一以度萬如月在天第六􅀢達喇尊者方石為屏嗒然晏坐一履一跣無可不可怒目獅子拊如猧貍猛尚不用而况於慈第七嘎納嘎巴薩尊者手執熏爐持香欲炷試參箇間孰為能所能既不立所亦安託遍四天下香雲漠漠第八嘎納嘎􅀢喇錣雜尊者身披七條肩倚九節垂足坐石默然禪悅白梅青竹秋月春風離即兩忘同乎不同第九􅀢沽拉尊者平石如牀義手跏趺眉橫鼻豎非有非無猿呈其果受之亦可鏗乎沁齒何爾何我第十喇乎拉尊者擎其雙手作供養印廓然無聖供養奚進盤承桃子師其受諸破顔微笑如飲光乎第十一租查􅀢答嘎尊者傴僂比邱髮白骨青於四者相示此幻形將欲閲經手開經笥不識其間滿字半字第十二􅀢楂拉􅀢喇錣雜尊者駐東勝洲拔喇錣雜得上士稱登如來榻眷屬一千皆具聲聞兹惟見一是合是分第十三巴那塔嘎尊者三十三天現身度世隱几而坐手持如意天女擎盤其中滿花散耶著耶自取訛差第十四􅀢噶塞納尊者白石翠棕聊倚而坐孰實孰虛非彼非我手持淨瓶甘露活活白鹿仰之亦可解渴第十五鍋巴嘎尊者合十雙手為接引狀受一切物渡迷海浪弟子鼾睡入無何有聖乎凡乎離否即否第十六阿必達尊者葱嶺五山住以行道是何心慈而示怒貌叶智慧相塔兩手髙擎喻一芥子孰重孰輕第十七􅀢答密􅀢喇尊者舊傳十六後益以二是為降龍神通遊戲大雲容容見其之而納於鉢內無礙無遺第十八嘎􅀢巴􅀢瑪尊者尊者伏虎俯視若貓何不可度戀此皮毛宋人傳像弗留名字是謂得之六如義諦宋人應真渡水贊坐席亂流鼉戴雙履名則弗留像乃如是石渠舊藏馬逺之水與此相同寫或出彼萬法一如孰我孰爾笑謂應真多斯渡矣觀音像贊梵像西來其數無萬無萬即一非一非二佛妙察智是謂觀音大慈大悲普門普度此浮玉山獨峙揚子往來瞻依恆資護佑風恬浪靜福德無涯玉達摩渡江贊在南弗契因北渡江若履平地一葦為艭神通如是而我疑焉法門不二何有於遷和闐玉釋迦牟尼佛贊天上天下世出世間跏趺而坐化被大千相好金聲琢磨玉體金固金非玉斯玉是梵銅示現西藏頻來曰奉班禪球琳宜哉法本無為化乃萬億如是皈依不稱功德班禪額爾德呢所進古佛像贊班禪喇嘛親來震旦宣揚黃教並祝七旬以此功德呈來梵像厯代所奉攝受無量恰因南巡驛貢適臻爰造寶龕供養行齊永恬江瀾福國佑民梵銅緑衣救度佛母贊觀音大士萬億化身萬億即一非合非分示現救度稱曰佛母緑衣白衣而為上首是緑衣像貢自班禪來京祝嘏法喜無邉云此金身達賴喇嘛纍世所奉利益孔嘉製為檀座虔奉莊嚴香雲法雨琴鼓花拈以此功德心空回向普濟衆生吉祥無量寫娑羅樹夀班禪喇嘛並為讚言梵域娑羅震旦交讓生同大椿其夀無量昆舍浮佛七佛之三樹下得道心境示參毗含浮佛偈曰前境若無心亦無亦曰初祖修道樹下直指心傳即六波若聖僧西來宣揚黃教恰值夀辰慧日普照寫此靈根用延遐算七葉紛敷千齡曼衍泥日法㑹荼毗應身非一非二化被無垠昨寫娑羅樹為讚因用李雍娑羅樹記成語泥日法㑹荼毗應身二句書於圖矣既而陡憶荼毗字為佛家以衆香爇送滅度者之語弗宜用之於呪夀然思有荼毗然後有應身班禪喇嘛原自荼毗中來者而應身之來去原不關法身之常住也遂不易其語未數日而喇嘛真示圓寂則此二語又若誠有為之兆者然蓋余詩文內往往有於無意中而為䜟語者斯亦大竒因並識於後天然石大士相贊似玉非玉似石非石如隱如現普門示迹相好具足水月逰奕豈描豈畫匪雕匪刻謂有有形謂無無色是真是實弗離弗即法寶天然六通十力稽首慈雲妙觀察德丁雲鵬大士相贊身依白雲腳踏青蓮現自在相容容海天尋聲救苦香光所說謂當反心仍屬饒舌手持楊枝灑甘露水度盡衆生成佛如是朱侃文殊贊現童子相為萬法王雲中獨立如寶日光問維摩疾衆辭不能承佛㫖往妙演三乘乃至默然方契本㫖滴露研朱胡為乎此法螺贊洪海之螺梵天之器以鳴唄唱滿字半字釋迦拈花迦葉鼓琴十方三際異音同音置則寂然奏則亮爾以演大乘溥皈佛㫖趙雍無量夀佛贊阿翁畫馬勸之寫佛趙孟俯工畫馬其妻管道升嘗勸之寫佛雍蓋習聞家教云勸者未知如來轉物楞嚴經若能轉物則同如來身心圓明蓋如來能轉物衆生被物轉詳見正定大佛寺碑記有子克家繪兹相好趺坐青蓮堂堂了了紛落天花脫然不著四智三身我淨常樂華蓋珠旒慧日祥雲於無為法如是習薰趙孟俯釋迦牟尼佛贊獨坐堂堂是相非相無藉莊嚴風清日朗未來彌勒過去威音如鏡中現諸如來心三乘豈多四句豈少先天弗違後天不老松雪于北夥遇梵僧故其寫像傳神擅能孟俯自言曾見盧楞迦羅漢像得西域人情態余嘗友天竺僧于像自謂有得云見孟俯古羅漢跋自謂有得未識妙理豎窮橫亘奚關彼此繡線如來海㑹極樂世界圖贊華言極樂梵兜率陀一大圓鏡非此非他界道重重寶樹種種大則須彌小則針孔而彼大小皆如來心如是海㑹如是梵音白毫相光於佛頂放無央相間現佛無量相好堂堂慧日法雷海㑹衆生胥如其來池蓮花中合掌而坐謂見佛乎猶有者箇繡線為圖縷縷絲絲是說是默三藏槩之和闐玉釋迦牟尼佛讚盡恆河沙其數為言讚佛功德不能畢宣知是義諦弗讚可耳而弗能默交蘆倒起相三十二好八十種義手趺坐堂堂洞洞如是具足玉人弗知現前調御是孰所為金身而玉玉即金身百千萬化剎剎塵塵無分别心皈依法寶清淨供養永以為好和闐玉觀世音菩薩讚具佛大悲而以度世三千大千遍無窮際普世之音胥入妙觀孰為良玉孰為和闐如是現相泯色與聲彌陀灌頂楊栁淨瓶隨感示形化無定所檀龕結趺亦何不可曰是即非云何作讚海印發光如來指按鄭重無量夀佛贊一大圓相調御現中三身四智卍字當胸不色中色不空中空如如堂堂而非神通天花繽紛法雲滃濛跏趺義手萬有歸宗歙人著筆齊沐致恭幻中福緣詎曰心蓬五代馮翊大士像讚一大圓相中現法身神鬼欽仰滄海卿雲珠幢華幔寶座蓮茵胥示有為慈悲善因具草四臂慧劍法輪無所不持幻幻真真妙觀察智救度天人和南相好是即能仁元人毗盧遮那佛讚有元敬佛延請梵僧支那正傳法演三乘作繪相好手印心燈毗盧遮那現此仁能須彌前峙寶幔上騰慧日法雲珊樹珠旌平等性智不减不增普度衆生道岸是登和闐玉釋迦牟尼佛讚非有而有非空而空堂堂示相雙法俱融如是雙法而實不二維摩無言第一義諦淨梵王宅忉利天宫弗移跬步度世無窮無為真佛乃在旃檀視此良玉豈曰不然和闐玉十八羅漢讚第一阿迎阿機達尊者成道雪山應真領袖一千三百聲聞左右薰罏右持蠅拂左執示無所示如是合什第二阿資答尊者菩提知慧夙稱無勝聲聞百一前後恭敬義手趺坐入三摩提如老者相夀火劫齊第三拔納拔西尊者七葉寶扇持坐林下一千四百聲聞結夏右豎二指左以扇拂既云無物何曰有佛第四嘎禮嘎尊者南贍部洲示法度人手持金鈴聞乎不聞聲聞一千而更一百誰與聽法曰有頑石第五拔􅀢􅀢答喇尊者住僧伽洲法爾金剛相好具體默默堂堂聲聞千一而恆相隨設有咨議以拂拂之第六􅀢達喇尊者尊者所住鴉穆奈水廓然無聖亦復無已一千二百依侍聲聞示慈善相羣而不羣第七嘎納嘎巴薩尊者嘎納嘎巴住喀伽國聲聞五百同欽大德左擎梵帙右持以繩無縛無解是為上乘第八嘎納嘎􅀢喇錣雜尊者西牛賀洲住示錣雜唐云梵幢最勝僧臘聲聞七百前後圍繞於中跏趺漠如弗曉第九􅀢沽拉尊者北具盧洲上士所住聲聞九百而為法護撫摩善鼠口吐七寶如貧人珠仍向他討第十喇乎拉尊者喇乎尊者是為佛子一千一百聲聞肅侍七寶之冠雙手虔奉將以奉誰空空洞洞第十一租查􅀢答嘎尊者住鷲峯山默坐書經所書何部一字三乘一千六百聲聞聽法一亦不見是為普說第十二􅀢楂拉􅀢喇錣雜尊者於東勝洲而示解脫右持貝帙左捧金鉢聲聞千一為其弟子食法無空念經有死第十三巴那塔嘎尊者三十三天持經說法是有是無須彌芥納聲聞九百日居其側色見音求了不可得第十四納阿噶塞納尊者住廣脅山稱云龍部一千二百聲聞相晤淨瓶在掌左執錫杖曰有曰空兩邉齊放第十五鍋巴嘎尊者曰鍋巴嘎住必呼拉有說無說一開一闔一千四百聲聞相從撫經默坐眼盲耳聾第十六阿必達尊者常住雪山金身不壞聲間千一肅承法𣲖晏坐道場手擎窣堵即佛身乎覩以弗覩第十七􅀢答􅀢答喇尊者降龍尊者而弗見龍是為真降豈在形容玉人琢玉初不盡知和南法侶度世慈師第十八嘎􅀢巴喇瑪尊者納達喇傳梵傳十六震旦十八實異西域咨之章嘉十六羅漢見梵經納􅀢􅀢傳及漢經法住記其今之所稱十八羅漢者不見梵典向嘗咨之章嘉國師云西域本止十六益以􅀢答􅀢答喇降龍尊者嘎􅀢巴􅀢瑪伏虎尊者即為十八是刻玉尊者未刻龍虎之形以限於玉耳曰有伏虎傍無於莬實泯我汝和闐玉三世佛讚佛說法界曰有三世過去未來及現在是三一一三非是非非曰燃燈佛稱過去之其劫久近不可數紀大圓鏡中消一彈指火傳於燈度世無量玉以肖體稽首好相右過去燃燈佛善㑹菩薩應念降生淨梵王宫弗染世情雪山行道鹿苑說法曰丈六身曰廣長舌有說是非無說非是三乘六度如是而已色見聲求無能見我球琳寫之亦何不可右現在如來佛賢劫如過星宿當來問其時日久矣悠哉其佛何號曰惟彌勒以大慈力度衆生厄未來孰知曰出佛語殷因夏因百世如覩世出世間夫豈有二不二法門第一義諦右未來彌勒佛元人大士像讚卓立彈指指間出水水中生蓮蓮承足趾曰現神通入鬼窟裏大士默然如是如是
