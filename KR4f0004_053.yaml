  text: 欽定四庫全書御製文二集卷十九
  hash: sha256:de877d9f4edca94069d1973eb96cd5e12f2573702c8f5752e771b38abc7e620d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_053-1a, image: WYG1301/WYG1301-0399a.png}
body:
  text: 按語河源按語河源詩别載詩集按班固漢書張騫傳天子使窮河源其山多玉石采來天子按古圖書名河所出山曰昆侖云而固贊又謂騫使大夏之後窮河源惡覩所謂昆侖者乎故言九州山川尚書近之於是鄧展遂謂河源出於積石是皆拘墟未見顔色之言蓋千古以上中國以外紀載已舛言語不通而欲定其確實何異北轅適越考元史始有星宿海之名而以為河源元蒙古也鄂敦即星宿彼時訛譯為火敦則漢人不通蒙古語耳此為近之今則更溯以上遂得真源然昆侖之語亦不為無因蓋昆侖在今回部中回部諸水皆東注蒲昌海即鹽澤也鹽澤之水皆入地伏流至青海始出則星宿海諸水皆是也而大河之源獨黃色為靈異更在星宿海之上非昆侖之水伏地至此以出而挾星宿海諸水為河瀆而何濟水三伏三見此亦一證矣獨漢書所云采玉則因昆侖出玉未免牽就詢之阿彌達則稱河源皆土山無石無石安能有玉夫非精通蒙古語及漢書更問之親履其地之人率欲定此事體大而地逺理博之事不亦甚難乎於甚難而得決疑傳正亦一大快也河源簡明語豫既為河源詩並按語既讀宋史河渠志有文命輯河源紀略有諭兹以體大物博考今證古不無費辭雖彼此細勘事則明恐毫釐稍差義乃紊兹為簡明之語庶因提要而便覽蓋河源究以張騫所探蒲昌海鹽澤及漢武所定昆侖為是雖山海經水經注皆略具其説山海經劉歆稱伯益所著本無所據水經注則桑欽酈道元皆張騫後人實祖其説而廣之以致於煩文且昆侖在回部原出玉也獨未明揭伏流至青海於阿勒坦噶達素之天池而出耳厯唐宋以至元乃有鄂敦淖爾為河源之語鄂敦為蒙古語漢語即星宿海也彼時雖未考至天池而中國之河源實由此頗見梗概矣溯伏流以至蒲昌海鹽澤非河源而何星宿海亦鹽澤之伏流至青海而出為清水黃河挾之以流始為微淡後為純黃是二水本一源至中國出地為二色而終歸於一若夫曲折纎細則見近所為詩文及紀略之書獨敘其簡明崖略如此識語道命録識語昨命詞臣校勘永樂大典得李心傳道命録一册集當時論伊川程子之事以道屬之而以命惜之所見不衷於理曽題詩帙首並序而正其失兹內廷翰林覆校天祿琳琅舊藏有元板道命録十卷重以永樂大典本校之則前六卷相同者過半其刋本有而寫本無者計二十八條第七卷以下則寫本皆不録疑其為未全之書及細檢之又有寫本所録而刋本無者凡八條似大典别有所據考李心傳原序専以伊川為言而刋本則兼及朱子並附濂洛關閩事復考程榮秀序云李秀巖道命録五卷梓在江州燬於兵榮秀嘗得而讀之疑為初稿欲刪定而未成兹因原本略加釐次十卷如左云云今大典寫本止載伊川事與心傳序合或寫本乃鈔江州初梓之本而龜山書院所鐫十卷兼及朱子諸人乃榮秀增定之本耳因識原詩後以俟考其元板書前篇已有甲子題語兹不復録重書詩經全部識語今年偶覽向所為詩經圖嫌其字不臻於法因重書一通易之舊册以登石渠寶笈書成故每册欵識小璽一如前例不復改易惟是舊册以指示畫稿及間亦涉筆人物故自己未始事至乙丑方蕆工兹惟易書故自五月草日始事而六月草日遂書成其舊書亦不忍棄置仍命畫院補成弆之盛京或他時以為臨池工夫深淺之驗夫以六年之久所書畢之以兩閲月用筆運神雖愜於懷而究以欲速恐尚有不及古人處也乾隆辛丑六月草日御筆再識於避暑山莊之戒得堂宋徽宗畫唐十八學士圖議語世間艷傳唐十八學士登瀛洲之事擬之仙而望如雲為圖肖其形詠詩紀其迹蓋不知凡幾矣而莫若宋徽宗此卷為藝林之最所珍而豫亦以此卷為最可議夫十八學士之集為何時乎乃太宗之為秦王時也潛龍勿用守子職者所不當為也孝王兔園已有覬覦之心獻王三雍稍具博稽之雅若夫文學館之設則直以收人材資異圖之為房元齡告秦王欲留杜如晦大可見矣馴致元武門之變幸而太宗即位未至大亂使非太宗其人破國亡家者有之矣則斯事也夫何艷羡之有而宣和自題且有儒林華國之詞蔡京跋語直貢鄉舉里選跨唐越漢之頌其時金事將興君臣燕處為此豐亨豫大之説不亦謬乎是不翅不知登瀛虛文之為非而並登瀛虛文之不若矣向屢詠此事引而未發兹因幾暇觀圖爰為議語書卷前石渠寶笈書久成兹以繼鑑别鈐識之書後書蘇軾刑賞忠厚之至論後宋蘇軾刑賞忠厚之至論有云臯陶曰殺之三帝堯曰宥之三遂為千古名談而豫以為實不經之論也夫不經非謂其不出典故如梅聖俞之所詰也蓋帝堯聖君臯陶賢臣聖君賢臣必有一德同風之盛不應大相徑庭雖都俞吁咈並行不悖要惟斟酌乎理之至是相從而施之政事耳殺之宥之繫人命之至重而豈有不求一至是之理哉且殺之宥之亦非堯與臯陶所得而主惟其人之自取而已其宜殺耶堯與臯陶皆應曰殺之其宜宥耶堯與臯陶皆應曰宥之豈有臣則慢謂之應殺而君則佯謂之應宥是其人之果宜殺果宜宥君若臣原無定見即三代以下慎刑矜獄之君臣未必出此而謂堯與臯陶曽有是事則豫謂之不經豈苛論哉後世擬人以重辟而曰以待恩出自上者皆蘇軾此言有以啓之夫幸而上有恩焉其人已不勝臨淵之凛使不幸而如所擬則寃無辜而害生命是誰為之作俑乎功疑之説向亦具謂於功臣像贊之序夫與其疑而從輕從重曷若明目達聰虛心晰理求其不疑以定其輕重乎或曰蘇軾當神宗偏信王安石牟利致刑之説故為是想當然之言以矯其枉何怪之深耶夫斥新法可也斥新法而誣及堯與臯陶不可也且其流弊或致為君者以為殺與宥皆吾可以自主是益大不可也書程頤論經筵劄子後程頤論經筵劄子凡數上無不剴切詳明引經據史可謂上不負其君下不負所學矣獨其貼黃所云天下治亂繫宰相君德成就責經筵二語吾以為未盡善焉蓋君德成就責經筵是矣然期君德之成就非以繫天下之治亂乎君德成則天下治君德不成則天下亂此古今之通論也若如頤所言是視君德與天下之治亂為二事漠不相關者豈可乎而以繫之宰相夫用宰相者非人君其誰為之使為人君者但深居髙處自修其德惟以天下之治亂付之宰相已不過問幸而所用若韓范猶不免有上殿之相爭設不幸而所用若王吕天下豈有不亂者此不可也且使為宰相者居然以天下之治亂為己任而目無其君此尤大不可也書歐陽修瀧岡阡表後唐宋以來阡表不可屈指數而必以歐陽修此篇為巨擘朱子常心服之豈不以情致悱惻一唱三嘆達所不能達之隱言雖盡猶有不盡之意乎酷吏羅織但知求其死而不求其生泯良害理者固不必論至讀是文者率以修父哀矜庶獄以致有後報為美而未深思修所謂求之而得與求之不得而無恨之義為知一而未知其二也蓋歐陽修常闢唐太宗之縱囚是非徒尚寬者也夫不察理而徒求其生遇一切獄皆不聽其所生者多矣而民不知畏法將有白晝持刃殺人者則所謂生之者即殺之者也抱薪救火被害必衆辟以止辟之謂何惟設三章以不煩秉一公而詳酌其生乎其死乎皆彼有以自取而無所容心於間或者刑不濫而法不弛是蓋修之所以表其父而訓世以弼教之意乎設曰修父尚寬而得後報則是積冥福修隂德為佛家之言修母婦人之仁或出於此而修必不出於此也向評文醇略及於此引而未發兹因閲秋審册遂更闡其義而書之雖然不能修德化俗使民不犯法而惟於其已犯法中求其一線之可生斯亦末矣抑亦愧不可當矣御製文二集卷十九
