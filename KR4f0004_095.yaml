  text: 欽定四庫全書御製文三集卷十五
  hash: sha256:38d23c8d86c0fed142ec836b28e781f2d9a6d895160049b2fd735cb16eafb3f4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_095-1a, image: WYG1301/WYG1301-0665c.png}
body:
  text: 硯銘宋端石三祝硯銘端溪老石宋坑果側理為之平不頗渾含墨鏽池深妥有龍之而勢掀簸活眼惟三柱承朵刻作竹形枝葉娑名曰三祝喻則叵堯猶辭之何況我舊澄泥夔文壺硯銘唐乎宋乎難辨近久剝蝕弗全數百年有與墨為受與筆為授叶形肖壺瓶夔守其口仿佛勒銘其人曰富叶硯雖無言兮摛文則傳兮宋端石璧水硯銘黝璧一握中規圓也如月滿輪望逾弦也周以碧水印百川也受墨處凹而未穿也是誰汲古耕斯田也而我何為置綈几間也憶東坡言不覺囅然也宋澄泥倣唐石渠硯銘漢之名唐之式宋之倣三而一潤出堅文入質物聚好來不翼居其北增惕息倣唐澄泥螭虎石渠硯銘螭為子虎其變象大人合成硯綈几絲綸出朵殿敕幾省成慎宵旰古訓是式遑耽玩錢惟善玉堂硯銘池若眉受不欲多也受而畜百祿是荷也此語櫽括惟善硯銘意畜斯田其耕必穫也穫而食弗藉其他也宋硯銘六首規矩方圎之至乾坤易簡以宣萬物弗出乎此四時不息而遷聊示象耳實一理焉用注周易可默會兮韋編右宋端石方圎規矩硯銘泥久成石亦其理也剖而為函誰所始也窪中者蓋硯在砥也閲世無分是可喜也覆手井田復古㫖也行之實難愧在此也右宋澄泥石函井田硯銘宋端石今弗鮮矣雲根紫玉識其善矣吉璁所用彞尊姻覃矣詞見曝書附青雲展矣物聚所好西清蓄將滿矣泚筆著銘欣以為赧矣右宋端石雲根紫玉硯銘青緑如銅脆而堅矣陶乎琢乎泥而石已虎伏伏虎文經武緯叶池作太極渾然易理擬虎變之大人用豹變之君子右宋澄泥伏虎硯銘奪朱非紫勝藍殊青斐然緑色端溪石生製出宋代而無製者之名神龍變化圍以滄溟水物鱗族出沒􅔿潫各得其所寧吾於是知愛其類而繁滋其屬者乃龍之所以為靈右宋緑端石龍池硯銘硯田之語聞之熟矣菑畬經訓心沃身淑矣兹肖井形有志古復矣古其易復哉瞪乎蒿目矣右宋王應鳳紫端石井田硯銘舊青緑澄泥石渠硯銘銅與泥本非族也合而為一是誰所俶也泥已如石銅乃蔚青緑也想入佳城伴其用者孰也製肖石渠或子政青藜之燭也硯譜已成斯則後薪之續也其好去聲可弗慎哉不以為愜而以為恧也硯銘三首舊澄泥天祿石渠硯銘天祿石渠炎劉之名李唐趙宋製為硯形或石或泥色紫聲清澄泥嵗久堅如石誠或校書乎或製誥乎供儒林之美稱兹為綈几之用吾惟慎乎綸綍之情宋端石長宜子孫鑑硯銘銘之鑑宜子孫也刻之硯仍其言也思彼意欲永存也厯幾人筆墨間也斐君子不可諼也元乃賢五老蜚星硯銘聚奎之後化為五柱萃此墨池目光如炬咨爾拈毫不可輕舉津逮六經道耀千古宋瓷硯銘瓷之冶本澄泥也漢之瓦世傳銅雀臺未央宫瓦琢為硯最佳以其瓦俾陶人澄泥以絺絡濾過而後埏埴之故與他瓦異或庶幾也不見修內宣和何闕斯也嵗久如玉視玉堂澄泥猶或遜兹也物聚所好不能不於此而恧思也舊澄泥石渠硯銘泥為石石如銅三一合一三通是義奧理堪窮天地人寓其中用斯者慎敕躬米芾玉堂硯銘紫端舊石為質本良米芾錢良右陸輔之項元汴經四家藏其真璧乎其贋鼎乎奚必刻求其詳獨是顛翁不衫不履人也何歆羡乎玉堂趙宧光倣宋澄泥石函硯銘澄泥石函數上聲不屈指斯實倣為亦剝蝕矣銘十六字署宧光子别其寒山伴我棐几坐北摛詞鎔經鑄史贊莊豫德摹貫休補盧楞伽十八應真贊第一阿迎阿機達尊者十八應真楞伽所寫今祇存六佚其餘者盧楞伽畫十八應真僅存其六因命莊豫德摹寫其餘十二幀並命摹石渠所藏貫休盡本補成之貫休全本傳神如活摹以補之首阿迎阿機達第二阿資答尊者往阿斯仙見梵典是用渡海鬼負枯槎如張騫在昂首注睛似有所望童子酣睡却忘諸相第三拔納拔西尊者摹盧楞伽原本第二頁拔納拔西盧圗所有趺坐匡床合掌雙手學人膜拜若有所咨三藏浩如以何示之第四嘎禮嘎尊者是比邱者是居士乎聞世尊法如飲醍醐住僧伽洲而無所住情與無情磬聲普度第五拔雜哩逋答答喇尊者學佛出家帝子瞿沙扶笻獨坐默演法華現夀者相無相可尋眉長拖地度世婆心第六拔哈達喇尊者咨第一義伸指示之㑹則不無問會者誰㑹若為能指則為所是野狐鳴非獅吼語第七嘎納嘎巴薩尊者上人本住曰摩伽陀棄而弗居學佛禪那棄者何捨學者何求擎鉢進步如是優逰第八嘎納嘎拔哈喇錣雜尊者摹盧楞伽原本第一頁傴僂曲録扶杖坐床是蜀地竹是法王幢波斯獻寶長跪乎前曰舍曰受僉在汝邊第九拔嘎沽拉尊者無始以來具此衣縷既有其形破則須補奚奴㖺火石猴擎拳異類同行法爾如然第十喇乎拉尊者忍痛為易忍癢為難養和自爬不禁粲然侍者擔經重若弗勝謂且放下可識三乘第十一租查巴納答嘎尊者摹盧楞伽原本第六頁是婆羅門親受佛教於首楞嚴而悟其要七處徵心八還辨見同阿難聞不殊一貫第十二畢那楂拉拔哈喇錣雜尊者數去聲珠百八雙手數上聲之有誦無誦惟師自知有則為色無則為空空色色空䆒竟何窮第十三巴那塔嘎尊者曰禪教律佛之三宗初學進步持律為崇是巴那塔嘎那字隨巴合音則為班音詳見同文韻統傳律居首而不執律如意在手第十四納阿噶塞納尊者塔寓佛身擎之以手然則相好為無為有兩邊俱非中亦不立視此窣堵弗出弗入第十五鍋巴嘎尊者摹盧楞伽原本第五頁晏坐寶床漠然無為右持拂子左拖其絲侍者於前擎佛玉相是絲是拂非背非向第十六阿必達尊者磐石掌平結跏而坐軒如非如無可不可畨王長跪持鉢惟欽其從睨視若不槩心第十七嘎沙鴉巴達喇瑪尊者摹盧楞伽原本第四頁於菟弭耳伏卧於前卓錫眂之如褐貓然爾忘爾猛吾忘吾慈設曰神通義乖導師第十八納納答密答答喇尊者摹盧楞伽原本第三頁十六十八數本無定咨之章嘉乃得明證阿羅漢之號十六十八傳聞異辭向嘗詢之章嘉國師證以法住記及納納達答喇傳而以同文韻統合音字正其名定為十六應真增二則世所謂降龍伏虎者一為嘎􅀢巴達喇瑪伏虎尊者一為納納答􅀢喇降龍尊者以二尊者具大神通法力故亦得稱阿羅漢則為十八應真矣詳見題唐貫休十八羅漢贊跋語中楞伽貫休胥圖降龍橫杖俯睇內空外空西畨古畫十八應真贊第一阿迎阿機達尊者於耆闍窟聞法最先聞者何法不落言詮右持寶爐左執拂子鼻根香塵拂之而已第二阿資答尊者義手宴坐異類圍繞有見無見默然了了善名如來空中影現曰一曰二日面月面第三拔納拔西尊者豎二指相空色合分毗婆尸佛說揭如聞聞則不無佛於何有侍者接經夜義稽首第四嘎禮嘎尊者住僧伽洲而來鹿苑聞佛真諦得大安穩手持金鈴而弗作聲合掌傾耳學人共聽第五拔雜哩逋答答喇尊者曰色曰空可該萬法以拂拂之水乳浹洽俱那牟尼示相印證一月千江光光相映第六拔哈達喇尊者鴉穆奈水尊者所住雙手當前一橫一豎豎窮三際橫遍十方是無是有宴坐道場第七嘎納嘎巴薩尊者佛母現空護法立侍如如不知書經而已借問尊者所書何經一字不有而括三乘第八嘎納嘎拔哈喇錣雜尊者錣雜尊者建立法幢弗降外道外道自降用何神通曰無所用七百聲聞恆為侍從第九拔嘎沽拉尊者手擎善鼠吐珠若泉於護法中如財寶天一即非一二亦弗二有佛印之即彌勒世第十喇乎拉尊者本來佛子從佛聞道可道非道聞豈易曉示少年像持七寶冠一千一百聲聞繞環第十一租查巴納答嘎尊者金剛趺坐法爾堂堂光風霽月語默兩忘於鷲峰山聞楞嚴義辨見徵心似乎餘事第十二畢那楂拉拔哈喇錣雜尊者鉢以貯食經以示法法若可食是謂一合聲聞一千侍者何往乃有二鬼獻花供養第十三巴那塔嘎尊者學人求示示以三指曰禪教律一而已耳從漸入頓則律為先度世無量三十三天第十四納阿噶塞納尊者無著天親惟弟與兄授法龍部畢得其精一千二百聲聞普度住廣脅山而無來去第十五鍋巴嘎尊者大士所住曰必呼拉退藏於密密亦弗納龍女獻珠香象擎蓮拈絲弗顧法爾如然第十六阿必達尊者梵阿必達華阿彌陀於尊者頂佛灌而摩雙手擎塔法華所開曰見像否活物死灰第十七納納答密答答喇尊者應真變相原無定蹤嗒然忘我奚必降龍童子圍繞色聲香味一一是法共爾遊戲第十八嘎沙鴉巴達喇瑪尊者負經於背瓶拂在手云何震旦面壁年九牛哀跪伏撫如花貍何不可度稽首大慈按梵經納納達答喇傳及漢經法住記所載應真止有十六而無十八之號後咨之章嘉國師云西域本止十六益以降龍伏虎二尊者遂為十八即震旦所謂達摩彌勒是也向嘗考之同文韻統以阿哩噶哩字書應真法號定第十七嘎沙鴉巴達喇瑪為伏虎尊者即達摩第十八納納答密答答喇為降龍尊者即彌勒自丙子以來所作應真各贊或題幀軸或鐫玉石無不以是書之今製西畨古畫十八應真贊疑有訛舛因諦觀圖中結相供具並證以畨經漢經乃知以十七為降龍即彌勒十八為伏虎即達摩而阿哩噶哩字名號之切音漢字亦有不合為之詳晰訂正即依新定字書于幀端並將丙子以後所作各贊于黃綾文本及御製文初二集刋本一律改正焉至祕殿珠林所儲古人圖像原本與夫西湖所摹以及玉石所鐫刻臣工所繕録不下數百十本難以一一易書則命仍舊貫而無事改泐嗣今有作胥當依此書之並附識如右御製文三集卷十五
