body:
  text: 論君子小人論君子小人之名見於易而論於書其界不可不明而其跡則不可不慎也夫易不過曰君子之道小人之道又曰君子修之吉小人悖之凶未嘗曰孰為君子孰為小人也書曰知人則哲欲知君子也又曰何畏乎巧言令色孔壬欲知小人也然亦未嘗曰孰為君子孰為小人也言治道者莫若典謨其扵辨君子小人不過如此而已非疎也思之深而慮之逺也是故堯授舜舜授禹以至羲和叔仲稷契臯䕫各命以職未嘗謂之君子而若而人者亦未嘗曰我為君子也堯之弗用丹朱共工舜之去四凶未嘗謂之為小人若而人者固不肯自謂小人而羲和叔仲稷契臯䕫亦未甞謂若而人者皆小人也是以庶績咸熙地平天成此予所謂明其界而慎其跡也若後世為君者固不䏻辨其孰為君子孰為小人而為臣者乃於其間自分之曰孰為君子孰為小人或又曰我為君子彼為小人於是彼我之見横於中公私之舉紛乎外為小人者固不甘其為小人而為君子者亦未必其實君子門户朋黨糾若棼絲小人之害君子固不必言而君子且有操室中之戈者漢唐宋明之禍延及國家淪胥以亡此皆為上者之過而非為下者之過也吁可畏哉是盖其界太明而大不慎其跡之所致耳且也世亦以有位者為君子無位者為小人佔畢樂羣者為君子負販荷擔者為小人是果真君子而真小人哉亦曰其名而已矣自為上者不能明其界而為下者益顯其跡以致釀大禍而莫救為之奈何曰簡賢而用之擇不善者而去之上既不以君子小人顯其跡下亦不得以君子小人樹其黨其庶㡬乎抑誠難矣此予所謂其界不可不明而其跡不可不慎不可不慎者不顯其跡之謂也宗孝宗論宋孝宗之事髙宗可謂極其孝光宗之事孝宗可謂極其不孝天道好還在孝宗不宜有此豈天未埀鑒乎予謂此正所以天之垂鑒乎盖人君之孝與庶人不同必當思及祖宗不失其業兹南渡之宋祖宗之業已失其半不思復中原報國耻而區區於養志承歡之小節斯可謂之孝乎且孝宗奉髙宗遊西湖已獨不共逰乎是託於娱親而私以行樂是可謂之孝乎又恐髙宗往西湖為勞於宫内肖其勝斯不更勞民而費財乎光宗受制悍婦非人類其不孝固不必責而孝宗之所以得此豈無所以致之之由乎此即天道好還所以垂鑒也稗官小乗乃謂臨安士庶皆興於孝何其見之小哉盖此論非予不能言亦不敢言今嵗秋將攜諸皇子往盛京明年春南巡亦必至西湖命於兩處各立碑誌之以示天子之孝當以不失祖業為重而承歡養志固不在逰山玩景之小節也遲速論今春為南巡記亦既詳論宜速宜遲之機大抵於兵事宜速河務宜遲而要之敬天明理非漫論也盖屢省而有得於已之言也歸而有甘肅逆回田五之事彼時以為盜弄潢池不過藉邪教以惑人心如五斗米一炷香之類地方官自能平之頗不芥於懐既而思之不芥於懐或即違敬明之義得毋有所失乎已而剛塔有小勝之報李侍堯有坐守之乖以致賊徒翻山而遁餘黨蔓延猖獗肆擄民居攻縣城自今年四月南巡迴蹕日即有甘省逆回田五等復借新教名色糾衆滋擾提督剛塔帶兵徃捕田五鎗傷後自刎賊目田介洪呉二韓二等均已就殱乃剛塔武夫鬍無知李侍堯不早赴軍營調度督勦致餘黨李鬍子馬子等於馬家堡馬營街兩次翻山逃竄因復糾黨張文慶馬四娃揚填四馬文熹等四出攻犯隆徳縣靜寜州通渭縣伏羌縣城於該處之底店鹿鹿山石峯堡等處肆行搶掠賊勢遂致蔓延西安巡撫畢沅遂有徴兵防守之議盖恐秦隴動不可收拾朕閱所奏即硃批以為若汝所議雖十萬兵不敷用又將何以滅賊乎西安巡撫畢沅因見回匪猖獗恐秦隴煽動請於各處要隘分兵堵塞使其無路奔竄等語畢沅書生之見未嫻軍旅朕謂用兵在阨其要而折其鋒苟不殱厥渠魁東西抵禦何益因此批諭如汝所籌十萬兵亦不敷用又何以滅賊𢷬穴乎然知李侍堯剛塔畢沅及本省綠旗兵不能了此事即降㫖用福康安為陕甘總督同海蘭察領乾清門巴魯圗侍衛章京等二十八人馳驛先往並調阿拉山䝉古兵一二千四川降畨兵二千寜夏滿洲兵一千撒拉爾老教回兵一千及甘凉兵二千延綏兵一千共兵不滿一萬又命大學士阿桂領健銳火器營兵二千以為後勁福康安一臨底店即與海蘭察等率先至之寧夏阿拉山兵二千立挫賊鋒逼之入石峯堡福康安至隆徳軍營即與海蘭察率先至之寧夏阿拉山兵進勦底店奮勇殺賊數百名生擒三十餘名賊勢膳落後路肅清餘賊追逼入石峯堡於時諸路大兵雲集直搗石峯堡賊巢而阿桂所率之八旗勁旅亦至因四面設卡層宻環園濬掘壕溝斷絶水道不十日間賊匪殱戮净盡將先獲之馬文熹等一同解赴熱河廷鞫分别斬磔以申國法而快人心於是諸路兵陸續畢集而阿桂所領之京兵亦到周圍築栅困之㫁其水路不十日而净殱餘孽生獲渠魁此又南巡記所謂宜速而莫遲未致昧事機而無成也夫兵凶戰危且予老矣豈更樂於用兵而有窮黷之為然事機之來應之不速設果致賊氛蔓延全秦煽動而畢沅之所慮者豈不貽笑無窮而予肯辭以老坐視弗理乎予更思之勝國之兵即今之綠旗兵也而其訓練或尚不如今之綠旗其董事之臣似今之李侍堯剛塔畢沅者或亦少矣文臣掣肘於中武臣作偽於外其君付之不問弗如是則我皇清何以得有明之天下乎雖然是宜鑒宜懼而不可恃天之寵以自矜且即小可以喻大蕞爾逆回設非應之速而勦以淨其害有不可勝言者始之一念之忽予深自以為過繼之一念之敬仍䝉天祐而速蕆功則是遲速之論可以黙置而弗以明示子孫乎可弗以前明為戒而怠於敬天暗於明理而弗慎於用兵乎用兵固貴速而不敬不明未有弗致僨事者是予所以惓惓也節儉論嘗讀皇祖實録云明季官中嵗用七十萬漸次節省至康熙五十年祗用七萬至臣民僭用妄費非不禁約徒致法令滋繁究於無補大哉王言誠得治國平天下之要道矣因令内務府查近年一歳度支則稱乾隆二十年以七萬計三十年以三萬計四十年以二萬計予非以此自鳴也盖修已治人之道無過於節儉節儉則嗜欲不行無聲色貨利之失徳所以為善也然天子之節儉與庶人不同矣世道人心日流日下逢君之欲者多引君以道者寡為君者設自鳴其節儉則出納之吝者有之矣量入為出者言之矣弊衣羸馬者形之矣甚而至於興利虐民漢唐宋明之以此而失民心侵尋以至於亡國者皆由是也且昇平日久户口日滋物價騰踊勢所必然是以内務府近有加價和買之議即如請行此亦可以節儉而不與之乎嗟夫節儉豈易言哉至於返樸還淳豈非善政然天地所生之物止有此數昔以十人食之今以百千人食之順治初年各省民數一千六十三萬餘口近年増至二萬八干餘萬口是加至二十餘倍之多也米安得不貴米既貴諸物安得不貴遊手好閑僧道之流且藉此以餬口設盡敺之力田言之易而行之難安得許多田與之乎均田井田之事設行之今未得其利而先致其亂非至愚泥古者不為也為今計補偏救弊之不暇實無一勞永逸之法也即近代之崇禎著布袍其時羣頌為美徳何救於亡國乎若晉武之焚雉頭裘唐明皇之銷銀器胥為暫博美名其後更窮奢極欲而齊建武之欲毁酒鐺直令蕭頴胄譏其曲宴之奢益為可笑可鄙故吾之所為節儉者亦如吾君子小人論中所云不可不明不可不慎而又不可顯其迹而已耳聖人定之以中正仁義而主靜論朱註以是語全歸之聖人予則以為有未當焉盖士希賢賢希聖聖希天等而上之雖聖人亦無可止之功若謂中正仁義惟聖人能之則士不必希賢賢不必希聖矣故即繼之曰立人極焉人極即太極也盖自太極判而陰陽生陰陽生而五氣具人與物皆受此二五之精妙合而凝本一氣也惟其變化無窮而善惡分萬事出是以氣日紛而習日逺故周子曰聖人定之以中正仁義而主靜立人極主靜者何返太極也返太極者本一氣也中庸所謂致中和天地位萬物育豈外是哉且中正仁義人與物所共有鍼之指南中也草之指佞正也烏之返哺仁也馬之垂韁義也如是者盖不可僂指數物既有之人豈獨無但物祇得其偏人則備其全人備其全而不能無欲以全其全則與物亦奚以異所謂聖人定之以中正仁義而主靜亦曰就人之本有教其無欲以復之而蘄無欲則在於主靜克已復禮亦是道也擴而充之人與物胥歸於中正仁義則人極立而太極復本一氣也本一體也若曰惟聖者能之是自畫也又安可望合其徳與合其明乎納汚含垢論昔路温舒引左氏之言曰川澤納汚國君含垢此不過因上尚徳緩刑之疏言之於納汚含垢之義語焉而未詳即左氏亦不過申伯宗令晉君待時之意其於納汚含垢之本義亦未渉其籓籬弗啻引而未發也夫川澤非地乎山藪亦地也藏疾疾非汚乎國君含垢温舒作詬乃假借用之而垢與詬亦皆汚也胥應以納汚為重盖乾為父坤為母父天母地萬物皆然父兮生我母兮鞠我鞠者養也試思人之初生以至離襁褓其五濁穢溷皆遺母之身母不以為汙又安有納其汙之念乎大地之視萬物為赤子亦何異扵此哉必知此然後知與天地為一氣而混然中處之身同胞吾與之懐不落空虚之境當思有以盡其分量也夫如是則容正人受直言乃其餘事吾謂温舒未必見及此耳北郊齋居悚然有見於此遂命筆書之
