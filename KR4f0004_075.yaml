front:
  text: 欽定四庫全書御製文二集卷四十一
  hash: sha256:5c99c42466dab3380279c50d07c730e5e05f53e0b60a72d664f04f5a35f70050
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_075-1a, image: WYG1301/WYG1301-0533a.png}
body:
  text: 贊徐揚倣貫休羅漢贊第一阿達尊者星景雲慶海濶天空履杖御虛如騎茅龍尊者逰戲何不棄仗有阿資答笑而相向第二阿資答尊者伯既行空仲即渡海閃多負槎橫亂渤澥香象渡河腳踏實地視此桴浮曰同曰異第三拔納拔西尊者伽梨在身軍持在几本來不隔誰分彼此銅磬置前擊之有聲雨隨雲落水逐波生第四嘎禮嘎尊者閉目盤膝置履於前行腳事畢有似止觀觀空亦病說悟即迷居士胡跪請質所疑第五拔􅀢􅀢答喇尊者鮐背而坐手拖其睂接引婆心示此絲絲後五百年曰有翠巖重舉公案益覺不堪第六􅀢達喇尊者學人咨啓應真顧答試問芥子須彌奚納落落松撐磊磊石蹲作麼生㑹此皆戲論第七嘎納嘎巴薩尊者含珠川媚藴玉山輝堂堂殊相世間導師比肩屧步托鉢橋頭何不浮渡猶恐驚鷗第八嘎納嘎􅀢喇錣雜尊者右手拄杖左拊侍者珍重應真是何般若囊琴未鼓橋下水流山河大地亦作聲不第九􅀢沽拉尊者海濶魚躍天空鳥飛七尺之軀亦可著衣針線相隨褸裂縫補王孫相助何不可伍第十喇乎拉尊者戍削瘦骨其腰半駝嗑然隱背藉此養和忍痛實易忍癢則難水流石上風過花間第十一租查巴納答嘎尊者注目於經不見文字童子爇香聞之以鼻鼻直目橫如淨琉璃內外交徹夫何然疑第十二畢那楂拉拔哈喇錣雜尊者手搯念珠立倚古樹有鬼㱥殑來求濟度瘁肌砭髓是誰所為度在汝邉汝自不知第十三巴那塔嘎尊者睟面盎背趺坐以居內空外空表裏一如指揮如意天花自落非維摩室而亦不著第十四納阿噶塞納尊者坐崖垂足示彌勒相去來現在於何置想雁塔手擎將以供佛佛在塔中華藏轉訖第十五鍋巴嘎尊者笠子不戴奚奴手持稜稜露頂圓相圍之相即非相何有於圓如栗棘蓬如金剛圈第十六阿必達尊者顤顟其面慈悲其心現身說法波斯獻琛貫休寫相傳吳道子摹者徐揚月不在指和闐玉古佛相贊假借四大心本無生堂堂調御是孰所成既三十二復八十種月印空明風過水動威音那畔彌勒未來剎那不住曰有是哉兒童逰嬉瓦礫作像視此球琳非一非兩和闐玉文殊像贊前身妙光後身德雲隨緣利物師利童真觀佛如來無取不取發大莊嚴甚為希有闡義菴提示蹟清涼善財無著未識行藏和闐玉觀音像贊普門普度大慈大悲諸佛衆生同一皈依以大圓覺行六波羅返聞寂照應感隨他燃智慧燈成妙勝果如是玉像夫何不可玉蓮瓣觀音贊以恆河沙磨塵下㸃佛土難盡隨聲赴感善財稽首是何神通宴坐撫膝海濶天空琢玉為蓮瓣瓣現相彼叟橘中竊此影響與物同悲與佛同慈徹上徹下無止無為和闐玉伏虎羅漢贊空洞窿起坐其厜㕒於菟卧側如撫花貍試問應真具何威德山峙川流眉橫鼻直馮婦攘臂仲由攬尾彼何人哉亦復爾爾弭毛馴狎袒裼盤陀偶相伴耳非我非他摹貫休古佛像贊威音那畔周穆王時孰今孰古不即不離偶然示現丈六金身朗朗滿月藹藹光春衣水紋衣無言袖手試問三乘能外此否吳門髙弟曰惟貫休重摹真蹟法喜隨流文殊像贊把卷執劍袪魔度生是法王子無慮無營不生何度不魔何袪設曰精進視此如如觀音像贊水在瓶中風還栁上風水相遭如是現相兜羅帕手端坐佛陀不可思議合掌摩呵盧楞伽畫六尊者像贊嘎納嘎􅀢喇錣雜尊者發願度人繼佛出世相示傴僂風清月霽波斯長跪獻寶於前金剛四句却在汝邊拔納拔西尊者趺坐竹牀南無雙手語乎默乎學人稽首僧雛擊磬聲徹大千三藏轉畢法爾如然􅀢答密􅀢喇尊者瓶不滿尺倒則瀉水獰龍逾丈躍出其裏是何逰戲是何神通尊者按杖內空外空嘎􅀢巴達喇瑪尊者入山則猛入禪則伏嗟爾牛哀倍三即六或謂上座有大威神話成兩橛未識應真鍋巴嘎尊者有僧擎前寶像金蓮化身千億如拂絲然億亦非多一亦非少以拂拂之如如了了租查巴納答嘎尊者苾芻炷香篆成卍字與佛胸前無同無異慧緣淨業薰習法華問誰作此盧氏楞伽盧楞伽畫冊六頁相好各具初未祥其名目因詢之章嘉則首頁為十八應真中第八嘎納嘎􅀢喇錣雜尊者次為第三拔納拔西尊者三為第十七納納答􅀢答喇尊者四為第十八嘎􅀢巴達喇瑪尊者五為第十五鍋巴嘎尊者六為第十一租查巴納答嘎尊者復證以貫休十八應真畫軸不但降龍伏虎適肖神通即其餘結相供具亦髣佛印合蓋畫本十八兹僅存其三之一既已失去大半則裝裱時前後次第顛倒亦理所必有然楞伽至今千餘年尺素流傳雖蠧剝尚足寶貴矧此縑墨完好握算而計已得六度圓成耶夫阿羅漢果本無我相人相而一葉一佛各有因緣合之千億不為多分之一亦不為少更何必於全提半提間生分别想耶昔西湖烟霞洞有石刻羅漢六尊吳越王時因夢訪求為别刻十二以符靈跡神物所在合有天龍護持他日或為煙霞之合亦未可知也因標其名各系以贊而識其梗槩如此陳士俊畫觀音贊觀音觀世世音普觀一剎那頃三千大千大慈大悲不離本座度盡衆生而實無作金廷標畫羅漢贊大澤深山宴坐平石童子炷香各適其適如意在手非有非無意亦强名如何為乎李公麟畫大士像贊坐青蓮花披白水田頂後焰輪遍燭大千無處不慈無物不悲聞聲普度而實無為堂堂月相皎皎氷光具佛四德淨樂我常繡線釋迦牟尼佛贊堂堂趺坐寶蓮華心豎窮橫遍度與金針相三十二好八十種過去來今如如不動一絲一縷三千大千默然無語教乘演全曰空不空謂有何有大圓鏡前禮無量夀貫休極樂圖贊西方極樂兜率陀天琉璃界道梵網層懸寶樹七種仙禽十二匪啻莊嚴各具深義圓覺倒退菩薩聲聞無央數衆瞻兩足尊堂堂彌陀侍法王子左右以居觀音大勢叶池茁蓮花跽聽法人以清淨緣為安養因貫休作圖示往生者一步不移又何謂也李遹羅漢贊腳踏獰龍浩浩雲水手持淨瓶傾出龍子猛則不無慈亦可喜豈曰神通逰戲而已玉真武贊靖樂王宫徇齊剛勇修煉武當斡靜運動飛升白日作鎮北方元武七宿衛聖效祥玉寫神儀星瞳月表須彌非大芥子非小雨晹時若佑我蒸民朔望瞻祈不為已身丁觀鵬畫十六應真贊第一迎阿機達尊者生王舍城居士之子富貴浮雲捨如敝屣皈依導師具戒定慧能令衆生見如來義第二阿資答尊者所住何山曰阿斯仙惡鬼猛獸馴伏敬䖍盤膝無語默演大乘證阿羅漢得何相應第三拔納拔西尊者羽扇在手寂無所思真諦俗諦證以靡遺有鬼前來支跽其足授之梵策度為眷屬第四嘎禮嘎尊者住僧伽洲親近世尊一聞說法遂證應真說亦何竒證亦何速淡月碧水清風緑木第五拔雜哩逋答答喇尊者瞿沙帝子遁世出家豎拂靜坐天女獻花陡峽流水作雲飛騰前三後三頓悟無生第六拔哈達喇尊者迦毗羅國瞿曇種姓一彈指間六度萬行珍寶堆前學人目視曰可惜許爾尚有此第七嘎納嘎巴薩尊者摩伽陀國金牛恆隨棄之學道調御皈依棄亦無捨學亦無得金鎖垂垂縛脫離即第八嘎納嘎􅀢喇錣雜尊者降生伽毗性樂施捨金錢在手何不放下從幻修真度惡入善如來轉物衆生物轉第九拔嘎沽拉尊者一鼠持手兩猿跪足曰三即一猶為塗毒夀緣最高髮無霜毫何必彭籛曲録其腰第十喇乎拉尊者如來有子喇乎拉是隨佛出家願樂法喜於天人中說法第一了義不了半得半失第十一租查巴納答嘎尊者婆羅門子始則愚䝉七徴八辨五衍六通既悟楞嚴萬法靡遺有如曾參以魯得之第十二畢那楂拉拔哈喇錣雜尊者見食如石訖不能食豈不腹枵意度入聲則惑池出蓮花供養具足二鬼負花怒􅀈其目第十三巴那塔嘎尊者如水中月如空際風嚴淨毗尼是謂律宗所度眷屬其數九百皆證羅漢鹿苑上席第十四納阿噶塞納尊者五藴非真六根胥幻如彼蓮花不染而燦於清淨地種福德田圍繞伽梨作歡喜緣第十五鍋巴嘎尊者梵帙在左右持其縧不識上座為展為韜四教三乘於是乎備侍者傾心求演袐義第十六阿必達尊者手擎寶塔中有如來如法華經因緣所開帝釋獻巾欲以除垢淨亦不存垢復何有
