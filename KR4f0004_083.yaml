body:
  text: 論慎建儲二論豫踐阼默禱之事言之屢矣兹仰沐昊慈克符初願因十月朔例應頒時憲書特於九月初吉宣立皇太子用昭付託前此不立儲嗣之由亦節經降㫖申明至為詳盡夫建儲立嫡三代以下無不遵行朕讀書稽古豈於此名正言順之事輕議其非昔我聖祖仁皇帝曽以嫡立理密親王為皇太子並特選正人輔導如湯斌徐元夢皆係公正大臣非不盡心匡弼乃竟為宵小誘惑不能恪共子職終致廢斥後遂不復冊立夫以堯舜之聖而有丹朱商均之子可見氣稟不齊即聖君而兼嚴父日以敬天法祖勤政愛民面命耳提尚難期其遷善改過孟子所謂父子之間不責善蓋實有見於此何況一二輔翊之臣安能格其非心變化氣質乎是則繼體象賢惟賴天心眷佑篤生哲嗣及嗣子之能承受與否耳豫自即位後亦何嘗不欲立嫡嗣初以皇次子為孝賢皇后所生循照雍正初年皇考親書朕名緘貯乾清宫正大光明匾上之例亦將其名親書密緘匾上不意其早年無祿曽同大臣等唘緘閲看贈為端慧皇太子後以皇七子亦係孝賢皇后所生原擬書名緘貯因其年未長成遲而未果旋亦早世嗣於癸巳年南郊大祀敬以所定嗣位皇子之名禱于上帝並於盛京恭謁祖陵時敬告太祖太宗在天之鑒是朕雖不明立儲嗣而於宗祏大計實早為籌定特不效前代之預行冊立務虛名而無實益耳今荷天恩申錫周甲紀元夀躋八旬開五計丙辰歸政不過數月始將密緘嗣子之名召對皇子皇孫王公大臣等公同閲看宣布諭㫖明示中外來嵗大廷親授錫慶延釐實從來史冊所未有若未經頒㫖以前設臣工中或有建議立儲者其人必非真懷忠愛不過託為讜論陽附正人君子之列實則冀徼後福隂為夤緣干進之階非為名即為利而名利兩收終歸為利者多似此莠言亂政之人自當立豫重辟然國家儲副極非小事彼既託為正言而抵之罪究非美舉今朕躬行上儀親為付畀中外翕然臚歡交慶皇太子體度端凝仁孝夙著克肩負荷新正授受之間實為盡善盡美天下後世公論以朕為戀位乎不戀位乎設朕於此稍有不欲歸政之心又何妨不行此典且皇太子及內外大臣皆具摺籲請至期頤始行歸政情詞懇摯出於至誠朕亦何難俯俞所請乃朕于御極初年即以紀年六十傳位嗣子之意齊心默禱近年屢于諭㫖內諄諄述及是朕籲天歸政之語不肯繫戀天位之心上帝鑒之天下臣民亦無不共見之今賴昊蒼默佑諸吉備臻欣慶之餘實深欽感回念聖祖大漸授位皇考其時係內大臣隆科多宣傳顧命逮皇考傳位朕躬宣示密緘倉猝之際朕不敢自行唘封召同大學士鄂爾泰張廷玉當面展緘敬閲兹朕躬享大年懋膺多福明頒詔㫖親御殿廷付授神器以今視昔吉祥善事孰逾於此此實上天保佑申命有加無已之洪貺朕今夀望九秩精神康健視聽未衰若來嵗歸政遽思自暇自逸竟置天下重務于不問則非所以敬承天眷亦非御極初年定期歸政不肯戀位之初心矣夫天下至大神器至重儲副之寄運祚所關方今綱紀肅清外無攬權怙勢之臣內無婦寺偏寵之事朕親裁庶政巨細無遺宫中府中皆為一體雖不明詔立儲實無絲豪流弊若如前代權奸柄國女謁公行黨援門户秕政百端而書生迂見惟斷斷然爭持國本之論甚至君臣父子不免猜疑如前史所載唐宣宗時裴休請立太子帝云若立太子則朕遂為閒人宋太宗因太子廟見還宫都人擁道喜躍帝聞之不懌曰人心遽屬太子欲置我於何地又明神宗因挺擊一事召文武諸臣責以間離父子因執太子手謂諸臣曰此兒極孝朕極愛惜使朕有别意何不早更置等語此由唐宋諸君繫戀天位以神器為私靳而不豫而明神宗又因內寵固結覬覦非分以致盈廷聚訟骨肉生嫌前事具在可為殷鑒我朝家法相承乾綱獨斷惟期慎簡元良從不稍存私愛而朕紹承統緒首以付託得人為重無一豪繫戀天位之心無一息非凝承帝命之念用能默通呼吸感召庥嘉實朕御極以來六十年如一日也總之儲二一建其弊叢生不特僉壬依附易唘嫌隙而名分早著日久必致流於驕佚而不知我國家不明詔立儲燕翼貽謀慮至深逺即緘名密貯務當慎之又慎不可預為宣露如朕現在舉行歸政亦必俟為期至近始行頒旨宣示此實萬年無弊之法我世世子孫若能敬效祖宗及朕之用人行政于以欽承昊眷祇迓鴻庥亦如朕之躬躋上夀再立太子踵行歸政典禮禔福延洪用昭億萬祀無疆之慶此朕所深望于方來者也特將始末緣由再行申諭此㫖著於尚書房內閣軍機處各鈔録一通敬謹存記永為法守說卞和獻璞說或問卞和獻璞之事為有乎為無乎曰無何以見之曰以今和闐之玉見之和闐之玉有二一曰山玉取之山一曰水玉取之水取之山者其質大或至八九尺然間雜石性者有之取之水者其質小至大者不過尺餘光瑩弗雜石性蓋受水性潤故也故恆以水玉為良此厯年貢自和闐人所共知者若和氏所獻應為良玉必出自水者既無雜石性之理安用玉人相之以為非玉兩被刖繼之哭以血而始明其為良玉哉此之誤必在璞之說矣蓋玉未治為璞見玉篇或山玉之雜石性者而決非良玉之産水中者也亦決非璞包玉不見必待剖而後知其為玉也若玉皆有璞包之必待剖而後得則今和闐之玉多無萬誰為一一剖之乎此不待辨而知玉之不在璞中必待識者剖之而後得也且卞和之目亦與人同耳玉人攻玉久矣豈不能識玉而和識之即以為誑其罪亦不至一再刖足也夫以雜石性未治之璞去其石性理而為璧亦恆事耳奚至艷稱千古乎蓋韓非自嘆已之不遇時人之不識已設為此謬悠之說以自喻耳然非非不明敏達時務者觀其說難之文反覆論辨曲盡人情既達時務盡人情則應薄世髙蹈以全其真又何必為此謬悠之喻以惑後世乎余故曰無此事也風馬牛說齊桓伐楚楚子使與師言唯是風馬牛不相及孔頴達正義注以為風放也牝牡相誘謂之風嗟夫是何言耶直以淫俗語誣經傳且於齊楚之逺不相及何涉引尚書以為證其去益逺蓋乾為馬馬性剛坤為牛牛性柔馬性剛故其立與馳悉迎風牛性柔故其立與馳悉順風一迎風一順風是不相及也注疏家本不曽習見馬牛之性不得其辭遂引尚書馬牛風逸為之說而不知其逸正所謂迎風順風之不相及也偶閲左傳故申其說如是及博閲諸書見宋俞琰席上腐談頗于豫意有相合故並載之俞琰席上腐談曰牛順物乘順風而行則順馬健物遡逆風而行則健書費誓云馬牛其風春秋左氏傳云風馬牛不相及蓋馬牛奔逸則各自從風而行也圭瑁說圭之名見於夏書之禹錫瑁之名見於周書之王受權輿于此而虞書之輯五瑞並未明言其圭之名各别及其短長與瑁底之邪圎也注疏之家多耳食口傳愈晰愈不明曰近曰更逺豫近為石刻十三經序以為以注疏解經不如以經解經者以此也夫虞至周周至漢率數千百年其唐宋更無論矣後人據圗作圭自鄭康成邃于禮學始圗三禮厥後阮諶夏侯伏明張鎰梁正楊傑俱有三禮圗至宋初尚有存者聶崇義採諸家之說為三禮圗現入四庫全書今玉圭流傳于世者甚多宋製者皆在聶崇義之後即漢器亦不過因鄭圗而倣成之非必係三代時古物也已屬贋鼎而瑁則雖有圖三禮圗六經圗玉海中俱有瑁圗畫作回式近馬驌作繹史其瑞玉圖則依孔安國書傳邪刻之說作􅤾式說禮家已屬參差俱不過臆為之即僞據圗作瑁亦未見其器也並僞作其器者亦無也今據其可考者言之鄭康成云鄭康成周禮注名玉曰瑁者言德能覆蓋天下也蓋瑁古字作曰易繫辭冒天下之道書君奭丕冒海隅出日詩邶風下上是冒皆取覆冒之義雖不言其制而其理為近向所纂三禮義疏中正義條曽引其說名玉曰瑁者言德能覆天下此猶近理而賈公彥曰見則覆之以齊瑞信賈公彥周禮考工記玉人疏古者圭必有冒言不敢専達之義天子執冒以朝諸侯見則覆之又言冒所以冒諸侯圭以齊瑞信方四寸邪刻之云云前說出尚書大傳後說出孔安國書傳向定周官義疏存疑條下載此亦因其說持之者多故未之廢其實未足為據也馬端臨遂增之曰有不同者即辨其僞馬端臨文獻通考王禮門引舜典下注云諸侯來朝天子以刻處冒其圭首有不同者即辨其僞乃沿孔穎達尚書疏之文夫諸侯既受圭於天子焉能有僞更訛其傳以為有過者留之三年六年九年之說此不過竊孟子一不朝則貶其爵云云之語尚書大傳冒圭者天子所與諸侯為瑞也無過行者得復其圭以歸其國有過行者留其圭能改過者復其圭三年圭不復則少黜以爵六年圭不復少黜以地九年圭不復而地畢云云端臨檃括其說又引程大昌演繁露舜典謂輯五瑞即此執圭而朝者輯者斂而上乎天子也又謂班瑞于羣后即此復與其圭以歸者也第有過留之三年不見所出豫意所謂留之三年六年九年者不過剽孟子緒餘而端臨以為大傳此言極有理乃寡識之尤者夫不朝是其罪也留圭而不許來朝復以六年三年為别其間有何罪乎真成囈語矣又王搢大圭祭天其圭長三尺周禮典瑞王晉大圭執鎮圭繅藉五采五就以朝日宋陸佃曰王執鎮圭以祀天以朝日以饗先王王十朋周禮詳說明王應電周禮傳並於朝日之下注云言朝日則郊天可知按考工記大圭長三尺杼上終葵首天子服之鄭康成注王所搢大圭也惟既曰搢又曰執未知一時並用與否宋林希逸考工記解曰搢一而又執一非尊者所宜云云則古人亦計及搢圭之未便矣夫玉至三尺重物也古之帶最寬鬆不似今時帶之緊束搢重物於腰間必至落地反不成敬且天子祗雙手既搢大圭又執鎮圭以祭其于獻奠之際將何以行禮權付旁人持之更非所以式威儀也圭之說既明則瑁之形之制可想而知不過寓意覆冒天下而已然總以德為要德不能冒無其器實可有其器適足增愧瑁之形制既不可考以冒圭首辨詐僞其說更不可信至取義于以德覆冒天下則古聖人精義不在乎制器而在乎慎德若有其德即不執瑁亦可若無其德雖日執四寸之玉對之適足增慚而已更有因圭首有邪有圎之殊而圖其形者諸圗瑁下圎刻邪刻之不同總惑於以冒圭首之說公侯伯之圭有瑁以辨其僞而子男之璧即無庸辨其僞乎且三等之圭共此一瑁雖有詐僞烏從而辨而璧徑五寸輪廓正圜又安能以四寸之瑁冒之況舜典有輯瑞而無執瑁之文周禮春官典瑞亦不言瑁考工記玉人所載鎮圭以下十餘器與典瑞相合而獨惟言瑁之書後出亦殊不足信總之數千載之下必欲銖計刌度數千載以上之物愈致膠轕枘鑿而已遂有瑁底圎缺邪缺之異實為入海算沙將何適從不值一噱矣暇著是說以杜千古之躗口搢圭說圭瑁之說既明則搢圭之說應繼蓋搢者插也以大圭之重插於寬衣博帶之間必致落地前說已詳兹復閲考工記又有中必之說鄭康成以為約其中央乃傅㑹以繩繫之不令墮地之義耳即使約之腰間亦礙所謂周旋中禮之度也因命翰臣博稽唐宋以來之制則自唐至明五代禮儀志皆有搢大圭執鎮圭之文五代之制因列書于後以備考夫唐宋明漢人也襲其漢儀且不必論至於金則我滿洲何必襲其謬且尚偏安亦覺僭矣元實蒙古將以其一統中華而謬為襲漢之舉耶然豫總以為其事涉虛誣未必實有也何言之夫名以物徵物以實證唐宋金元逺矣明則本朝所繼統者郊祀重器不藏于內府則藏于太常猶憶乾隆初間曽命太常查舊庫物得蒼璧四黃琮一命貯之乾清宫至今存無所謂大圭鎮圭也遍查內庫亦無此二器然則明時皇帝所搢之執之者為何物耶以為流賊之亂被虜掠失之乎夫流賊賊也所重者金銀圭璧不值其虜掠且太常寺庫之舊璧琮具在而獨無大圭鎮圭亦其一證即果失之其器必在人間國朝百五十年太平天下其器早出世市當有人售之以為貢獻之物矣則知唐宋以來之禮志率出虛文無實事耳然豫之意更有所切要于是事者不可不明言也唐宋明無論矣金元乃襲漢之謬且未必實有其事則何為耶惟本朝獨無此事後世迂儒必有議本朝之荒略者試讀此文則知搢圭執圭之合禮與不合禮祀天之在敬德與不在大圭及鎮圭矣且大圭長至三尺出周禮冬官考工記玉人不易得也今臣和闐乃易得唐宋金元明何以得之若謂必搢大圭執鎮圭以申祀然後中禮獲宥則本朝無是禮而四朝繩繼九㝢乂安擴宇拓疆中外臣服蒙天貺為獨厚逺勝彼五代謂唐宋金元明斯亦薄海所共知也是知總在敬德而不在器名不正則言不順亦夫子之志也豫之子孫其尚思所以務實哉周禮考工記天子圭中必鄭康成讀必為縪謂以組約其中央按此祇言有組而不詳搢法唐開元禮祀昊天上帝皇帝至中壝門搢大圭執鎮圭升壇搢鎮圭禮畢出中壝門殿中監受鎮圭大圭按唐書輿服志亦不詳搢圭用縪之制宋政和五禮祀昊天上帝皇帝至中壝門外執大圭盥手搢大圭盥畢執大圭升壇搢大圭執鎮圭至神位奠鎮圭執犬圭俯伏興又搢大圭詣太祖神位執大圭宋史輿服志仿大圭中必之制製約圭繅藉搢之紳帶之間政和二年宦者談稹獻古元圭長尺二寸中一小好可容指為受組之地按此亦圭中有好穿組搢之紳帶之間大金集禮祀昊天上帝皇帝至中壝門執大圭盥手搢大圭盥訖執大圭至壇上搢大圭執鎮圭至座跪奠鎮圭訖執大圭進玉幣搢大圭奠訖執大圭還次釋大圭又進饌搢大圭者四按此不言搢法元史祭祀志祀昊天上帝皇帝至西壝門外執大圭就小次釋圭出次執大圭盥手搢大圭盥訖執大圭至壇上搢大圭執鎮圭至神位奠鎮圭奠訖執大圭還次釋大圭又進饌搢大圭者四按此亦不言搢法明史禮志郊祀皇帝搢圭者六一盥手二上香奠玉帛三奠俎四滌爵五上香奠爵六飲福受胙輿服志玉圭長一尺二寸剡其上刻山四以象四鎮之山以黃綺約其下以囊縚之按此無大圭鎮圭之分其搢圭用囊御製文三集卷三
