body:
  text: 考濟水考濟為四瀆之一禹貢導沇為濟以至會汶入海不過八語而窮源至委昭垂千古為不易之恆流向嘗賦四瀆詩雖加考證祗以漢志及水經注酈道元李濓輩各持己見究之其身並未厯其地尊耳食而相齟齬蓋因濟流伏見原無定是以展轉紛岐無足怪者即如禹貢所云入於河者非濟之清流入黃也蓋即伏於黃之底所謂入也溢為滎則又見而出為滎地志所謂即滎波之滎見豫州者三伏三見此其一證然其伏見原亦無定處而無定數也地志濟水出河東垣曲縣王屋山東南曰沇水既見而伏東出於今濟源縣東西二源合流至溫縣是為濟水厯虢公臺西南而入河復出河之南溢為滎即滎波之見豫州云云東出陶邱則今之曹州又至於菏則今之菏澤縣蔡沈所謂濟隂縣自有菏派也又東北會於汶汶自有源宋樂史所云清河即今之大清河唐李賢所謂濟水東貫滑曹鄆青以入於海者也樂史謂東平濟南淄川北海界中有水流入海謂之清河即今之大清河又唐李賢謂濟自鄭以東貫滑曹鄆濟齊青以入於海是即今濟水會汶為大清河入海之證人但知大清河而不知濟豈誠無濟哉是則濟之源委實不出禹貢數語以解之者愈多而考之者愈紊乃致人但知大清河而反不知濟遂若靈瀆有不可復求者然蓋嘗論之禹貢所言乃夲然之形勢今則時代變遷伏見靡定亦理之所必有而以禹貢八語證之總不出敷土奠川之夲來其紛然口舌之論偶藉以資多聞亦可即付之不求甚解亦可臣彭元瑞臣紀昀謹奏乾隆四十九年二月日由行在內閣夲報發下御製濟水考一篇奉諭旨此文係在途中就所見率成者其令彭元瑞紀盷閲看核對各説經家以及地輿家所言是否不甚徑庭詳考覆奏欽此臣等伏讀驚歎心悅誠服竊以自古説經家輿地家言濟水者其殊趣有三以濟為截河南溢者妄僂數三伏三見者泥不知大清河為濟水者昧紛糾轇轕歧中有歧我皇上原夲禹貢證以鑾輅所親見發為大文於諸家之説無不苞孕即無不折衷以至神至竒之識析至平至易之理氣盛辭逹地負海涵與天地經流相稱乃於行殿從容之際不俟安排不假傅會而成之萬斛泉原隨地可出皆由典學高深精神強固偶一發抒遂為自有文字來所未有臣等熟讀百遍服膺歡忭其儒先衆説有可與聖製相發明者僅摘抄加按容謹書卷呈覽伏候訓示謹奏御製即如禹貢所云入於河者非濟之清流入黃也蓋即伏於黃之底所謂入也孔安國書傳濟水入河並流十數里而南截河又並流數里溢為滎澤謹按此言河濟並流之始後儒多斥其説宋林之竒尚書解濟之流既與河合行十餘里混而為一矣而乃能自别以溢為滎至於陶邱北諸儒疑焉唐孔氏則以為河濁濟清南出還清故可知也蘇氏則以為以味别也此二説者未為確論夫濟清而河濁濟少而河多以清之少者會濁之多者不數步間皆已化而為濁矣既合流十數里安能自别其清者以溢為滎乎古之人蓋有知水味者矣如曰淄澠之合易牙知之惟知其合之味而已淄水之味如此澠水之味如此淄澠合則其味也又如此苟使淄澠既合而為一器使之遂此器之中别其半以為淄别其半以為澠則雖易牙亦有所不能以是知此二説其失一也故鄭漁仲曰山過山則分水過水則合天地之間豈有山過山水過水之理此説是也謹按孔頴逹正義蘇軾書傳皆主孔安國並流之説而謂辨其清濁别其味林之竒駁之最為得理宋傅寅滎澤辨濟既入河與河相亂而其溢為滎也禹安知其為濟哉孔穎逹謂以其色辨東坡謂以其味别而許敬宗則以為入河伏流而出鄭漁仲則以為簡編脫誤林少頴則以為禹分殺水勢而程泰之則又以為水會於河既多而盈而濟繼之故溢而注滎也紛紛之論將孰從而折衷乎余嘗思之程氏之見為勝河自積石以來所受水為不一而至於厯華隂而東行又有伊洛等水會之其盈可知矣然河自孟津以東其地稍平其勢稍緩而加以水之滿盈則其流寬徐與底柱而上不同矣沇水自北而來勢鋭而流捷衝河衡渡固當時所有之事也然其入河而出不能無河水之混而大概則濟耳謹按傅寅蓋主程大昌之説未知水勢胡渭云傳言濟與河並流始在北繼截河而南則似兩人同行街北一人忽截街而南别與人同行數里乃獨抵所欲詣處人之行路固有然者水則安能且河大而濟小濟既入河河挾以俱東濟性雖徑疾恐亦不能於大河之中曲折自如若此也見禹貢錐指渭之言雖非専闢寅而水勢之自然寅説不攻而自破且如寅説會河之水既多則河勢益強河益強則濟益弱而謂濟勢鋭流捷能衝河衡度有是理乎元王天與尚書纂傳按孔氏截河之説程氏河溢之説皆非是惟蔡氏説當就以經證之溢與出字皆特見之例惟其自中而滿故不如菏澤被孟豬之被而有溢之名惟其由伏而見故不如他水下流之至而有出之名一也又王屋之下既見而伏濟源之西平地復見在河北既爾何獨溢出於滎而不然二也又濟河兖州至爾雅猶有濟南曰兖州之稱至吕氏春秋猶有濟河間曰兖州之稱使其下流至兖者非沇濟自來之濟則纍代相傳豈其以無源之水名兖疆域三也謹按天與書出於蔡沈集傳後故兼闢程大昌而獨主蔡説元吳澄書纂言濟既入河其伏者潛伏其下絶河而南溢為滎澤再出於陶邱北溢者言如井泉自中而滿非有來處謹按澄説解溢字最確正與漢書地理志所云濟水自垣縣東南至武德入河軼出滎陽北地中相合蓋溢即軼自中而滿即軼出地中也胡渭亦云泰澤之水有上源與鹽澤相似但至此停而不流人識其為潛行地下耳滎澤則異於是其水似井泉自中而滿不可指一路為源故吳幼清云無來處也胡渭禹貢錐指詩大雅觱沸檻泉維其深矣傳云檻泉正出湧出也李巡注爾雅曰水泉從下上出曰涌泉春秋公羊傳昭公五年叔弓帥師敗莒師於濆泉濆泉者直泉也直泉者涌泉也此皆水之溢出地中而無上流來處者阿井趵突其類也又有一切證爾雅瀵大出尾下注云今河東汾隂縣有水口如車輪許濆沸涌出其深無限名之曰瀵馮翊郃陽縣復有瀵亦如之相去數里而夾河河中渚上又有一瀵之原皆潛相通在汾隂者人壅其流以為陂種稻呼其夲出處為瀵魁此是也尾猶底也愚按三瀵地下潛通隨竇涌出正與濟水相似謹按胡渭確主軼出地中之説其引證汾隂馮翊三瀵潛通涌出理更昭晳吻合元陳櫟書集傳纂疏虛谷方氏嘗親過枯黃河見濟水出河北溫泉者今經枯黃河以入汶而後趨海以此驗之則濟水性下固能伏地而出為滎程泰之謂溢為滎非濟溢辨之者以河濁滎清證其非當矣今大河徙而南流古大河遂為枯瀆濟之貫河其迹昭然泰之非不辨而明亦千古之一大快哉謹按自孔傳以後截流伏地其説糾紛者蓋以河水屢遷侵奪壅遏纍代不定益滋歧説方回陳櫟在元時河徙而來之後遂得確指其迹今河之與濟相距愈逺截然不混濟不必與河並流而軼更彰明較著矣御製溢為滎則又見而出為滎地志所謂即滎波之滎見豫州者三伏三見此其一證然其伏見原亦無定處而無定數也明鄭曉曰濟水發源於冀經流於豫分流於徐入海於青凡三伏而四見一見於王屋而遂伏再見而為濟再伏而入河三見而為滎三伏而穴地四見而出陶邱之北自此不復伏矣謹按此確指濟水伏見之數與其地者顧祖禹方輿紀要三伏三見之説出於近代自孔鄭諸家以迄於宋世諸儒未有主此説者蓋發源之處或有伏見之分入河而後未嘗伏而復出也謹按祖禹不主三伏三見之説然又以為發源或有則仍未能以為非也特不泥其定處與定數耳蔡沈書傳先儒皆以濟水性下徑疾故能入河穴地流注顯伏南豐曽氏齊州二堂記云泰山之北與齊之東南諸谷之水西北滙於黑水之濟又西北滙於柏崖之灣而至於渴馬之崖蓋水之來也衆其北折而西也悍疾尤甚及至於崖下則泊然而止而自崖以北至於厯城之西蓋五十里而有泉涌出高或至數尺其旁之人名之曰趵突之泉今齊人皆謂嘗有棄粳於黑水之灣者而見之於此蓋泉自渴馬之崖潛流地中而至此復出也其注而北則謂之濼水達於清河以入於海舟之通於濟者皆於是乎逹也齊多甘泉其顯名者十數而色味皆同以余驗之蓋皆濼水之旁出者也然則水之伏流地中固多有之奚獨於滎澤疑哉吳興沈氏亦言古説濟水伏流地中今厯下凡發地皆是流水世謂濟水經過其下東阿亦濟所經取其井水煮膠謂之阿膠用攪濁水則清人服之下膈疏疾蓋其水性趨下清而重故也濟水伏流絶河乃其物性之常事理之著者程氏非之顧弗深考耳謹按沈主伏見之説而不實指三伏三見其所指趵突泉阿井至今不易蓋故時濟水所經之道隨地皆泉即隨地皆濟益足為無定數無定處之證胡渭禹貢錐指濟水有三伏三見之説或謂出於近世之俗學殊不可信渭按伏見之説二孔無之然有所自來泰澤一伏東邱一見夲水經注武德入河再伏滎陽軼出再見本地理志滎東又伏為三伏出曹濮間為三見本唐書許敬宗傳此豈創自近世但以入河為伏義有未安耳沈括云厯下凡發地皆是流水世傳濟水經過其下東阿之井乃濟水所為曽鞏云泰山諸谷之水自渴馬崖潛流地中至厯城西復出為趵突旁溢十數泉蔡沈引以證濟之伏見重源顯發所在多有元和志云鄭州管城縣京水出縣南平城新鄭縣溱水出縣西北三十里平城二處並在河南密邇滎澤尤為明驗蓋濟瀆所經之地其下皆有伏流遇空竇即便涌出故一見於滎澤再見於陶邱不必以入河之濟為上源亦不必並泰澤東邱數之為三伏三見也謹按胡渭所指三伏三見復與鄭曉之説不同差有據然終歸於無定處無定數為通論御製宋樂史所云清河即今之大清河唐李賢所謂濟水東貫滑曹鄆青以入於海者也杜佑通典濟水之在河北者王莽時此水枯涸水但入河而已不復截河而南而水經敘濟乃一仍禹貢舊道此不詳之甚又濟南濟北濟陽濟隂凡郡國附濟為名者皆命名不審謹按自佑有此説後世遂謂濟之一瀆不可復考程大昌所以有杜佑説後世不當有濟辨之作也宋黃度尚書説杜佑通典力詆桑欽以為濟瀆已斷濟水與禹貢不同為謬何如曰非也濟水雖絶其瀆猶在雖中間皆經穿鑿變易或斷或續然水之附入於其瀆者猶可尋求緝之以存禹迹非無理佑言為過謹按黃度直闢杜佑之説以上追禹貢之舊洵為有識宋程大昌禹貢論按李賢注釋范史曰濟自鄭以東貫滑曹鄆濟齊青以入於海則唐語也樂史寰宇記曰入東平濟南淄川北海界中水流入海謂之清河則夲朝語也嘗考之古史兵師糧餉所經及詢之今日曽行其地者二子之言皆信然則滎澤雖流塞其源固未嘗竭佑何以概言無有也以理推之自滎至海地亘千里水行其間其成川脈豈以一濟溢而有豈以滎塞而無第其受河而流委濶長可以該他水而逹於海故得為四瀆之一滎雖塞矣數州之水循溢榮下流故道而行者自若也禹嘗名之以濟而後世肯不以濟目之乎樂史曰菏汾合流故因濟舊名非夲濟水其説蓋出于佑而佑不能以其所及槩其所不及也樂史雖能夲佑語以為言而亦不能究詳使後人有考也兖豫之境凡水自南濟北濟以行者皆循濟故不獨菏汶顧菏汶特其大而可數者爾今世所稱南北清河者皆古濟流派而菏汶則其要會也陶邱以東適與菏會而遂分派會泗水以注於淮者濟之注河而分者也東北兼汶與之同入於海者濟之正泒也此二者比濁河皆清故後世以南北清河目之今南北清河皆在而菏汶故流水嘗竭減又濟率並河之凡對濟而決或枝流入之則河水皆為濟水雖受河之口不専在滎要之派流常通古今則酈桑所書悉皆實録佑因後漢一時滎口塞絶併與下流役之以為無有雖其所考菏汶最為精要亦并沒而不言豈其得實哉夫桑氏之失既引他水以亂其源杜氏之失又矯桑氏而絶其流二書者地理家所仗以為指南也今而若此且并與禹貢無考矣謹按大昌主河濟並流之説未為得理然此所指濟之分派正派以實南北清河為濟之證則確不可易足以針杜佑之膏盲發樂史之墨守矣顧祖禹川瀆異同杜佑曰今自東平以東有水流經濟南淄川北海界中入海者謂之清河蓋汾水菏澤之合流非古時之濟水也夫濟為四瀆之一自昔推為九州大川而湮沒無徴莫甚何歟謹按祖禹確以大清河為濟故闢杜佑清河非古濟之謬説見下且如佑言汶水菏澤之合流則禹貢明云又東至於菏又東北會於汶矣非濟而何顧祖禹方輿記要今大清河自汶上縣北出至東平州西安山閘又西北與運河分流徑東阿縣西伏折而東北徑東阿縣北又東徑平隂縣北又東徑長清縣北齊河縣東又北徑厯城縣北而東北會於濼水又北徑臨邑縣東又東北徑濟陽縣南又北徑齊東縣北又東北徑武定縣南又東徑清成縣北及濵州之南又東北徑蒲臺縣北至高苑縣北又北徑利津縣東而東北入於海由安山閘而下皆謂之大清河近志元人始於寧陽縣北築缸城壩遏汶水入洸以通運河永樂中又於東平州東築戴村壩盡道汶水入會通河今之大清河乃自平隂縣南之桞溝諸泉由東平州北門外過西折而東北夏秋運河泛漲則張秋以南東岸有減水閘分流來合而東北出即濟水之故道説者謂大清河南古濟而今汶者也夫濟流雖與古異然今東平厯下諸泉皆入大清河則仍為濟水溢流不得全謂之汶水矣謹按祖禹所臚即今大清河全勢脈絡井然愈足證大清河之為濟而杜佑之説誠無足信矣于欽齊乘入濟之汶即今大清河于慎乃筆麈大清河第得汶之首尾實以東平諸泉由濟故瀆入海謹按二于皆山東人皆實指大清河為濟胡渭禹貢錐指以今輿地言之自東平會汶以下東阿平隂長清齊河厯城章邱長山新城高苑博興樂安諸縣界中皆禹貢濟水入海之所經也謹按此以今輿地印證禹貢濟水故道所謂夲然之形勢也御製文二集卷二十三
