body:
  text: 跋馬和之畫邶風七篇圖跋馬和之所繪邶風圖僅存式微旄丘泉水北門靜女新臺二子乘舟七篇並闕宋髙宗所書經文而卷後陸師道跋依圖考定一一可按曩編石渠寶笈時曽手書諸詩以儷之列為上等並題跋以識兹集內府所有和之毛詩圖參較絹素畫法吻合無問確可信為真蹟者凡十二此其一也圖舊為冊本今既合篋弆藏因改裝成卷以從其類夫鑒别馬畫真贋所重者畫而編詩亦當以四始篇什為次此卷自宜居首不必復拘舊書新補之先後並詳學詩堂記中至於原書所載難以悉為改正近年來凡有已入書之字畫續經題詠及辨訂者均記以石渠繼鑑璽而原書一仍其舊是卷準而行之并識梗概餘倣此宋髙宗書馬和之畫鄭風五篇圖跋鄭風凡二十一篇此卷雖止蘀兮風雨出其東門野有蔓草溱洧五篇而每篇具能曲傳詩人真意故是小吳生傑作此與齊風嘉魚鴻雁魯頌諸圖皆經散佚而僅存者然吉光片羽亦足珍貴矧其為連篇可玩者乎宋孝宗書馬和之畫齊風六篇圖跋此繪齊風雞鳴還著敝笱載驅猗嗟六篇而闕其五畫與內府所藏和之諸圖同字則不類宋髙宗所作或疑其贋余曰不然此卷縑素厚薄尺幅長短與和之他卷可信為真者俱適吻合而設色用筆亦非庸手所能倣佛其為和之畫固無可疑且作僞臨書於行欵必規模曲肖今卷中所寫諸詩視髙宗分行疏密迥異焉肯留此罅隙供人指摘乎按陸師道邶風圖跋云宋髙孝二廟始盡寫三百篇令和之圖寫其跡云云考畫譜馬和之傳引陳善杭州志云髙孝兩朝深重其畫毛詩三百篇俱畫一圖而不言書寫經文事夫髙宗書信而可徴則師道所云孝宗亦嘗寫經應自不妄且其墨蹟濃淡雖有不同而結體運筆猶存德夀家法故當為阜陵補成因改籖為宋孝宗書辨識如石其石渠寶笈原書之不復更易與印繼鑑璽之故已詳邶風圖卷兹不復贅宋髙宗書馬和之畫陳風圖跋陳風圖卷載於明茅維南陽名畫表云是韓宗伯存良家藏此卷後有董其昌跋所言相合卷舊登石渠寶笈書題籖作陳風十章今集和之真蹟各卷其篇什不全者則書某風某什若干篇全者不復書其篇數以示區别並印繼鑑璽以識之宋髙宗書馬和之畫豳風圖跋石渠寶笈舊藏豳風圖卷止有六篇而破斧篇别為一卷亦續入內府卷後董其昌跋惜其餘不知又歸何處並定為趙孟俯補圖今以兩卷比觀則人物神情無纎毫異而破斧篇髙宗書與畫相連並無割裂痕破斧既是馬畫則不得疑孟俯補圖矣蓋香光未覯全卷因臆度失實致為髙士竒所笑然士竒亦止見此一斑别据徐氏所藏小雅為證猶不免旁引借鑑未若今日相印於本來面目之快也因命裝潢聨為一卷仍附破斧篇原跋於後以識延津之合不更增佳話乎繼鑑印璽之例亦如邶風宋髙宗書馬和之畫小雅鹿鳴之什圖跋近得馬和之繪小雅鹿鳴之什圖經文為宋髙宗書展卷穆然具有古意因以內府所藏和之各卷冊較之與此合者凡九絹素筆法無爽銖黍並可信為真蹟此卷鹿鳴之什畫至魚麗而以南陔白華華黍三詩小序附録於後乃從毛萇原什分次南有嘉魚以下與今所行朱子集傳什名不同蓋紹興時祇有毛傳自宜據以為書不必以後出之朱傳參差致疑也且毛公當日第就所存各篇核實為什而笙詩則以類相從分什麗之其理自正朱子乃因鄉飲酒禮歌魚麗笙由庚歌南有嘉魚笙崇邱歌南山有臺笙由儀之文遂抑由庚於魚麗後雖不得謂其無所據依然繹儀禮經文其始工歌鹿鳴四牡皇皇者華笙入乃樂南陔白華華黍歌與笙皆以三詩為節乃間以後則一歌一笙相代而作孔疏謂不比篇而間取之其說最當所以合樂之詩采蘩而下即及采蘋若必如朱子相次而取則草蟲一篇何以不移于采蘋後乎且儀禮鄭氏注謂魚麗采其物多酒㫖所以優賢南有嘉魚采其能以禮下賢者與之燕樂南山有臺采其愛友賢者既欲其身夀考又欲其名德之長是此三篇義各有取因連類用之原不必與笙詩定相比次而白華既已亡辭復標什首又不若毛公之核實為長也辨訂和之詩經圖之役以兹卷為權輿故於此略記梗概餘說分識各卷中而釐正彚存之詳則總述於商頌卷後至由繪本而旁及詩什又考資餘事耳宋髙宗書馬和之畫小雅南有嘉魚之什六篇圖跋此卷為南有嘉魚之什今僅存嘉魚至菁菁者莪六篇而闕六月采芑車攻吉日四篇並闕髙宗標題南有嘉魚之什六字其分什亦從毛傳與鹿鳴卷同卷後有文徴明跋亦稱止見此六幅則全卷不知何時散佚然徴明謂其作家士氣兼備可稱精鑑且可據此以證相合各卷之為和之真蹟耳卷已登石渠寶笈書舊籖作宋髙宗書小雅六篇馬和之補圖今為釐正題籖其印璽存書之由詳邶風圖卷中宋髙宗書馬和之畫小雅鴻雁之什六篇圖跋右鴻雁之什圖庭燎下闕沔水鶴鳴祈父三篇我行其野下闕斯干一篇存者凡十之六又以白駒下之黃鳥誤列無羊後因閲和之他卷字畫通絹連次者多此卷乃各自為幅蓋中佚四詩原本已多割裂裒輯者不知深考率付裝贉因致凌舛耳舊入石渠寶笈書時未嘗審核及此今為移正另簽並依邶風卷例其分什之說亦與鹿鳴什同宋髙宗書馬和之畫小雅節南山之什圖跋此節南山什圖與鹿鳴什卷同為完善並依毛傳分什亦石渠寶笈書成後續得者考孫承澤庚子銷夏録云於朱子美寓見節彼南山十章於李梅公寓見鹿鳴十章今二卷俱先後歸內府承澤又嘗見關睢十章於山西張氏寓名蹟離合有時使關睢卷尚無恙他日或復完北海舊觀而冠學詩堂之笥未可知也宋髙宗書馬和之畫周頌清廟之什圖跋周頌凡三什此清廟之什獨存而字畫俱極完善與鹿鳴什圖足為雅頌之冠向入內府鑒藏時尚為冊本兹辨正馬和之真蹟命裝成卷使合弆較然畫一按是什皆形容祭饗之事今閲各圖惟天作寫髙山積厚之氣象烈文寫辟公助祭之威儀餘八篇若廟若郊若望重見迭出意易涉復而所繪乃變化不窮於凡廟中對越以昭䖍象舞雍容而志美以及牛羊右饗鐘鼓降福郊祀報本巡守戢櫜無不曲盡其致且能傳肅雍昭假陟降奔走之誠極觀象之能事在和之諸卷中此尤傑出思陵書復莊雅有度豈亦以清廟明堂禮明樂備非可輒以輕心掉之耶展卷靜對穆然想見成周郅隆恪恭基命若此不啻置身於其間猗與盛矣宋髙宗書馬和之畫魯頌三篇圖跋馬和之所繪魯頌圖與商頌舊為一卷曽入石渠寶笈且誤題為三頌圖今和之真蹟既已辨訂分明則贉池之訛亦不宜聽其沿襲爰命工分裝成卷易籖為魯頌三篇並如邶風例印繼鑑璽以識不改原書之故按魯頌篇目凡四是圖獨闕泮水篇而閟宫篇前斷痕宛在不知何時佚去卷有北平孫氏圖書考孫承澤庚子銷夏録云宋髙宗書毛詩馬和之補圖所收者凡八章一為魯頌駉一為有駜一為閟宫其下全列商頌篇名則是承澤收藏時泮水一篇已失承澤素精考鑑於詩圖之散闕未全何以置而不論且以魯與商聨綴為一疏略殊甚焉宋髙宗書馬和之畫商頌圖跋右商頌圖舊與魯頌合卷今分為二詳見魯頌卷商頌自杏壇編詩以來止傳五篇兹幸完備無闕殿此詩圖可謂難矣且卷中烈祖篇後長發篇前凡兩裂痕而字畫竟無散佚抑又異矣豈默有丁甲呵護以待今日之裒輯而成厥終乎審若是則由頌末而上溯風始安知不類聚神合散者日以還闕者日以續盡復馬和之真蹟之舊乎然後此之得與否尚不可知而今日之釐訂彚集至十二卷則已可寶貴既顔學詩堂記其始末合篋藏之而詳識於此統計詩圖篇什全者風則陳豳雅則鹿鳴節南二什頌則周頌清廟什及此商頌凡六卷得詩五十二篇其圖存而篇什未全者若邶風七鄭風五齊風六小雅嘉魚鴻雁之什各六魯頌三亦凡六卷又得詩三十三篇夫史遷所言古詩三千餘今自商及周三百篇存者僅十之一而和之所繪三百篇圖自宋以迄於今存者乃十之三視尼山詩教所得參倍其為愈快豈真足資多識之助而已哉明人臨馬和之畫召南八篇圖跋內府舊藏此召南八篇圖向以為馬和之真蹟曽入石渠寶笈上等因卷中闕宋髙宗所書經文曽為手書補之今訂正和之各卷其信而可據者凡十二以此相較絹素設色筆法俱不類乃知此為贋鼎第㸃染尚不失馬氏本色當是好手臨摹和之真蹟既合篋别藏學詩堂此卷改籖定為明人臨馬和之畫仍付養心殿存弆其原書則無庸更易並用石渠繼鑒璽以識之亦如真蹟已入書之邶風各卷例也明人臨馬和之畫鄘風四篇圖跋鄘風四篇圖舊亦入石渠寶笈上等詩為故大學士張英補書曽經故大學士梁清標家藏今鑒定馬和之真蹟則此卷絹色筆法迥别而大致尚相仿佛蓋亦髙手所摹乃知曩時入書定為真蹟者誤也非特考定入書之誤即梁清標張英皆號為精鑒者而一則珍重寶藏一則書跋謙讓亦誤也兹改籖定為明人臨本仍弆之養心殿不與學詩堂所藏之馬和之真蹟相混而存書印璽亦如召南卷例明人臨馬和之風雅八篇圖跋此風雅八篇舊亦題為馬和之畫今較和之真蹟各卷非惟紙絹不同且彼筆致飄逸規仿吳裝此則與龍眠白描相近流派亦難牽附因諦審所畫八篇為魏風之葛屨伐檀唐風之綢繆秦風之蒹葭小雅之鹿鳴鴻雁無羊小辨魏唐秦諸圖未入內府其果合與否無可比證若小雅四篇皆今裒輯所有此卷畫法略具十之一二其非思溫正本固無可疑即指為未成藁副及散落掇拾者亦非定論卷後周天球張鳳翼王稚登諸跋並艷稱之蓋由未見和之真蹟耳又考清河書畫舫載此圖賞其蕭疏小筆理趣無涯云是宋末莊蓼塘所藏得自吳原博尚書家且經石田鑒定並謂陳仲醇稱其品格髙妙與此卷筆意殊不類張丑精於賞鑒不應蹖異若此疑丑所藏别有善本此則好手所摹幀末雖有蓼塘印記篆法亦不精必係後人僞託蓼塘為宋莊肅字而此卷係宣德紙其非宋時之物益審矣因定為明人臨本其原書毋庸更定之故亦如召南諸卷印繼鑒璽以别之仍另藏御書房云李公麟山莊圖跋曩得伯時此卷就跋語審定謂是山莊圖真蹟欲續入石渠寶笈上等近復得一卷筆墨較此為勝後幅又多陳彭際至鵲源五景董其昌於圖後評跋謂真龍與畫龍不同且云龍眠自畫則用澄心堂紙辨其紙色亦非此卷可及益信香光之鑒賞不妄既幸真者在前合讓後來居上輒題什定為續入上等此卷亦好手臨摹抑置次等適如其分而以之貯避暑山莊弗溷入石渠中名實正相副識而弆之亦塞苑一段佳話雖然因此假而識彼真吾安知彼真之不類此假乎宋髙宗書馬和之畫周頌閔豫小子之什圖跋乾隆庚寅嵗曽集內府所藏宋髙宗及孝宗書詩經馬和之畫圖凡十二卷弆之學詩堂都為一笥各係以跋而周頌獨存清廟之什今閲十五年甲辰於南巡回蹕復得閔豫小子之什卷結搆布置曲盡經營其冠佩雍容簪裾肅穆可以想君臣咨訪之殷儼然天祖之式憑也其儀衛森嚴羽旄芬郁可以想成周郅隆之盛穆乎禮樂之繽紛也以至春藉秋報之典劭農講武之勤巖廊睟穆器物渾古事有其義物有其容非研精覃思神遊於太和洋溢之世者弗克臻此蓋信乎馬和之之傑搆也思陵書端凝遒媚亦與學詩堂前所弆諸卷神骨宛肖因念周頌三什當時應合一卷不知何時流落人間其入內府者幸而整齊收拾得免散佚兹復喜得是卷分而復合洵乎神物護持有不期然而然者書此以記嵗月且為藝林增一段嘉話云御製文二集卷二十
