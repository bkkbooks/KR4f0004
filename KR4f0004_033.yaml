body:
  text: 巻之一經筵御論因民之所利而利之屢省乃成無適也無莫也義之與比皇建其有極歛時五福用敷錫厥庻民不逆詐不億不信抑亦先覺者是賢乎日新之謂盛徳是以君子有絜矩之道也一日二日萬㡬所謂誠其意者毋自欺也欽㦲惟時亮天工由仁義行非行仁義也聖人養賢以及萬民修道之謂教輔相天地之宜民之所好好之民之所惡惡之慮善以動動惟厥時巻之二經筵御論仁者先難而後獲功崇惟志業廣惟勤日日新又日新有孚恵我徳百姓足君孰與不足君子所其無逸先之勞之請益曰無倦自上下下其道大光此之謂絜矩之道乾始能以羙利利天下不言所利知者樂仁者夀在知人在安民悠久所以成物也唯臣欽若唯民従乂臨雍御論為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信天行健君子以自强不息巻之三論湯武論齊桓公論論重瞳論漢光武廢郭后事金世宗論作福作威論明哲保身論知過論巻之四論君子小人論宋孝宗論遲速論莭儉論聖人定之以中正仁義而主静論納汚含垢論巻之五説烏斯蔵即衛藏説玉璞抵鵲説麋角解説鄂博説雜説小春説開泰説五明扇説師説巻之六説千里馬説蒐苖獮狩説三老五更説記里鼔車説古稀説解雲上于天解巻之七諭重刻淳化閣帖諭命通鑑輯覽附紀明唐桂二王事蹟諭命議予明季殉莭諸臣諡典諭命議諡前明靖難殉莭諸臣諭命國史舘編列明季貳臣傳諭命追復睿親王封爵及復開國有功諸王原號並予配享諭巻之八諭命國史舘以明季貳臣傳分甲乙二編諭命舘臣錄存楊維楨正統辨諭命皇子等編輯明臣奏議諭命舘臣重訂契丹國志諭命舘臣編輯河源紀略諭巻之九諭重刻五朝冊寳尊蔵太廟禮成諭命館臣入吳三桂擒桂王由榔諭命皇子及軍機大臣訂正通鑑綱目續編諭命廷臣更議歴代帝王廟祀典諭巻之十記萬夀山清漪園記安瀾園記永佑寺舎利塔記荆山橋記雪浪石記紀恩堂記萬泉荘記泉宗廟記巻之十一記學詩堂記抑齋記開新河記土爾扈特全部歸順記優䘏土爾扈特部衆記土爾扈特部紀畧巻之十二記古玉斧珮記淳化軒記閲永定河記避暑山荘紀恩堂記白塔山總記塔山南面記塔山西面記塔山北面記塔山東面記巻之十三記文淵閣記文源閣記文津閣記快雪堂記河復記戒得堂記巻之十四記玉甕記戒得堂後記文􅘦閣記重華閣記五經萃室記南廵記巻之十五記五福五代堂記三老記祭歴代帝王廟禮成恭記淮源記巻之十六序大清㑹典序御製文初集序通鑑輯覧序平定凖噶爾方畧序増訂清文鑑序平定兩金川戰圗詩序巻之十七序硯譜序滿珠䝉古漢字三合切音清文鑑序平定兩金川方畧序熱河志序改譯遼金元三史序後序避暑山荘後序巻之十八題辭題董其昌自書告身大禹治水圗題語題東林列傳題楊維楨鐡崖樂府題明神宗夲紀通鑑綱目續編内發明廣義題辭題張照書白居易琵琶行巻題張廷玉三老五更議巻之十九按語河源按語河源簡明語識語道命錄識語重書詩經全部識語宋徽宗畫唐十八學士圗議語書後書蘇軾刑賞忠厚之至論後書程頥論經筵劄子後書歐陽修瀧岡阡表後巻之二十䟦馬和之書邶風七篇圗䟦宋髙宗書馬和之畫鄭風五篇圗䟦宋髙宗書馬和之畫齊風六篇圗䟦宋髙宗書馬和之畫陳風圗䟦宋髙宗書馬和之畫豳風圗䟦宋髙宗書馬和之畫小雅鹿鳴之什圗䟦宋髙宗書馬和之畫小雅南有嘉魚之什六篇圗䟦宋髙宗書馬和之畫小雅鴻雁之什六篇圗䟦宋髙宗書馬和之畫小雅莭南山之什圗䟦宋髙宗書馬和之畫周頌清廟之什圗䟦宋髙宗書馬和之畫魯頌三篇圗䟦宋髙宗書馬和之畫商頌圗䟦明人臨馬和之畫召南八篇圗䟦明人臨馬和之畫鄘風四篇圗䟦明人臨馬和之畫風雅八篇圗䟦李公麟山莊圗䟦宋髙宗書馬和之畫周頌閔予小子之什圗䟦
