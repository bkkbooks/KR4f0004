body:
  text: 卷之一經筵御論因民之所利而利之屢省乃成無適也無莫也義之與比皇建其有極斂時五福用敷錫厥庶民不逆詐不億不信抑亦先覺者是賢乎日新之謂盛德是以君子有潔矩之道也一日二日萬幾所謂誠其意者毋自欺也欽哉惟時亮天工由仁義行非行仁義也聖人養賢以及萬民修道之謂教輔相天地之宜民之所好好之民之所惡惡之慮善以動動惟厥時卷之二經筵御論仁者先難而後獲功崇惟志業廣惟勤日日新又日新有孚惠我德百姓足君孰與不足君子所其無逸先之勞之請益曰無倦自上下下其道大光此之謂潔矩之道乾始能以美利利天下不言所利知者樂仁者夀在知人在安民悠久所以成物也唯臣欽若唯民從乂臨雍御論為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信天行健君子以自強不息卷之三論湯武論齊桓公論論重瞳論漢光武廢郭后事金世宗論作福作威論明哲保身論知過論卷之四論君子小人論宋孝宗論遲速論莭儉論聖人定之以中正仁義而主靜論納汚含垢論卷之五説烏斯藏即衛藏説玉璞抵鵲説麋角解説鄂博説雜説小春説開泰説五明扇説師説卷之六説千里馬説搜苖獮狩説三老五更説記里鼓車説古稀説解雲上于天解卷之七諭重刻淳化閣帖諭命通鑑輯覽附紀明唐桂二王事迹諭命議豫明季殉莭諸臣諡典諭命議諡前明靖難殉莭諸臣諭命國史館編列明季二臣傳諭命追復睿親王封爵及復開國有功諸王原號並豫配享諭卷之八諭命國史館以明季二臣傳分甲乙二編諭命館臣録存楊維楨正統辨諭命皇子等編輯明臣奏議諭命館臣重訂契丹國志諭命館臣編輯河源紀略諭卷之九諭重刻五朝册寶尊藏太廟禮成諭命館臣入吳三桂擒桂王由榔諭命皇子及軍機大臣訂正通鑑綱目續編諭命廷臣更議歷代帝王廟祀典諭卷之十記萬夀山清漪園記安瀾園記永佑寺舍利塔記荆山橋記雪浪石記紀恩堂記萬泉莊記泉宗廟記卷之十一記學詩堂記抑齋記開新河記土爾扈特全部歸順記優恤土爾扈特部衆記土爾扈特部紀略卷之十二記古玉斧珮記淳化軒記閲永定河記避暑山莊紀恩堂記白塔山總記塔山南面記塔山西面記塔山北面記塔山東面記卷之十三記文淵閣記文源閣記文津閣記快雪堂記河復記戒得堂記卷之十四記玉甕記戒得堂後記文􅘦閣記重華閣記五經萃室記南巡記卷之十五記五福五代堂記三老記祭歷代帝王廟禮成恭記淮源記卷之十六序大清會典序御製文初集序通鑑輯覽序平定凖噶爾方略序增訂清文鑑序平定兩金川戰圗詩序卷之十七序硯譜序滿珠蒙古漢字三合切音清文鑑序平定兩金川方略序熱河志序改譯遼金元三史序後序避暑山莊後序卷之十八題辭題董其昌自書告身大禹治水圗題語題東林列傳題楊維楨鐡崖樂府題明神宗夲紀通鑑綱目續編內發明廣義題辭題張照書白居易琵琶行卷題張廷玉三老五更議卷之十九按語河源按語河源簡明語識語道命録識語重書詩經全部識語宋徽宗畫唐十八學士圗議語書後書蘇軾刑賞忠厚之至論後書程頥論經筵劄子後書歐陽修瀧岡阡表後卷之二十跋馬和之書邶風七篇圗跋宋髙宗書馬和之畫鄭風五篇圗跋宋髙宗書馬和之畫齊風六篇圗跋宋髙宗書馬和之畫陳風圗跋宋髙宗書馬和之畫豳風圗跋宋髙宗書馬和之畫小雅鹿鳴之什圗跋宋髙宗書馬和之畫小雅南有嘉魚之什六篇圗跋宋髙宗書馬和之畫小雅鴻雁之什六篇圗跋宋髙宗書馬和之畫小雅莭南山之什圗跋宋髙宗書馬和之畫周頌清廟之什圗跋宋髙宗書馬和之畫魯頌三篇圗跋宋髙宗書馬和之畫商頌圗跋明人臨馬和之畫召南八篇圗跋明人臨馬和之畫鄘風四篇圗跋明人臨馬和之畫風雅八篇圗跋李公麟山莊圗跋宋髙宗書馬和之畫周頌閔豫小子之什圗跋
