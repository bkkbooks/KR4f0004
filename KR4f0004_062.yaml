  text: 欽定四庫全書御製文二集卷二十八
  hash: sha256:494b09468340cd3cb8f44ef94e7b134537c778a05d65497b5b03508b74e8be82
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_062-1a, image: WYG1301/WYG1301-0452c.png}
body:
  text: 碑文平定兩金川告成太學碑文太上立德其次立功又其次為立言而德與功皆賴言以傳言之無文行而不逺文之時義大矣哉然傳德之辭直而寡傳功之辭費而多直而寡者不因文而德自見二典三謨經世立教是也費而多者必因文而功乃明周誥殷盤佶屈聱牙是也吾嘗讀韓昌黎平淮西碑益悉此言之不爽何則彼其藩鎮乃家奴之類慫恿因循以致宛成敵國削而平之是宜引以為愧而不可炫以為功賴昌黎之文幾與江漢常武同稱耆定然有識者固知其辭費而多飾而未知憲宗之愧與弗愧耳今之平定金川之文不有類于斯乎解之者曰逆酋羈縻徼外非若淮蔡之居中土元濟之為世臣也吾則以為既已受職為土司則是我臣而其地近接成都逺連衛藏則是我土我土我臣而橫生逆志蠺食鄰封將欲大有所為弗𠞰而滅之則西川將不能安枕兹雖蕆事與平定淮蔡擒吳元濟何以異故宜引以為愧而不可炫以為功者以此金川之始見於己巳告功之文兹不復記記其復叛而復征則其陰謀負恩已自戊寅年始蓋戊辰之師實緣其跳梁不靖而師既臨境彼即窮蹙乞降遂以赦罪頒師甫十年而其酋郎卡即與革布什咱搆釁又四年遂與綽斯甲布及三雜谷為敵而逆子索諾木凶悖益甚自恃地廣人衆力强與各土司搆兵訖無寧嵗故各土司皆畏之如􅍑而以勢分力散又莫能如之何余以為業已受其降不宜復加兵且蟻鬬蠻觸不足以勞王師因命地方文武大吏隨宜彈壓令弗越內地界亦足以安民而示度耳不虞地方大吏欲息事而每示寬逆酋轉以為無足懼而日益逞其小金川逆酋僧格桑者始則與索諾木水火相仇繼乃狼狽為奸於是索諾木計殺革布什咱土司色楞敦多布取其印敕以歸而僧格桑亦侵占鄂克什地界且發兵圍其土司色達拉之官寨期于必取總督阿爾泰提督董天弼知事不可掩乃有發兵之請是役也或咎阿爾泰依韋誤事之過而余則以為阿爾泰之過皆余之過蓋金川因其地險衆悍久蓄異志是以有殺至維州橋之謡維州本漢徼外羌冉駹地蜀將姜維征羌駐此築壘後因名為姜維城唐武德初因其地置維州屢叛屢復廣德中陷吐蕃號為無憂城遂纍入冦擾大中時始復內附五代蜀州內徙改縣曰保寧宋景德初改曰威州元至元間以州治保寧縣并入明洪武初于州境析置保縣維本朝雍正五年省威州入保縣屬茂州今其地尚有州橋之稱而促浸畨人以殺至維州橋播為謡曲似係聞吐蕃舊事妄冀效尤耳則其不忘內地情率可知戊辰之役我師罙入屢勝即不宜赦其罪而受其降此一誤也甫十年而郎卡偝恩作亂以及逆子踵其蹟皆不即發兵問罪惟令地方大吏隨宜處置又屢誤也以至尾大不掉終於興師故豫不咎人之議為窮兵黷武而轉咎已之類于姑息養奸蓋中國之制外域張撻伐則彼畏而斂跡主和好則彼輕而生心漢唐宋明之覆轍率可鑒也若謂豫窮兵黷武則豫賴天恩平伊犂定回部拓疆二萬餘里豈其尚不知止足而欲滅蕞爾之金川以為揚赫濯紀勳烈之圖哉雖然平伊犂定回部其事大矣然費帑不及三千萬成功不過五年兹兩金川小寇地不逾五百里人不滿三萬衆而費帑至七千萬成功亦遲至五年則以跬步皆險畨奴效命死守故得延至今日而我將軍阿桂立志堅定决機明敏兩副將軍及參贊領隊諸臣同心合力各軍士敵愾奮勇凡經大小數百餘戰而後成功視平伊犂定回部費力轉不啻倍蓰設非天恩助順衆志成城則金川未易言滅而國威或致少損矣是不可以不記觀斯文者尚諒豫懷慙悔過之不暇知非稱功詡德而為言其庶幾乎繫之以辭用志始末云爾小金首禍曰僧格桑兵救鄂什向稱沃日今定為鄂克什急呼之則鄂什也竟抗顔行僧格桑于庚寅夏與鄂克什土司搆怨稱兵阿爾泰董天弼親往誡諭奏稱逆酋遵教退歸亦遂釋而不問未數月復圍鄂克什辛卯夏阿爾泰乃遣兵護鄂克什而逆酋亦遂與官兵交戰督臣提臣每事遷就知弗勝任將軍别授阿爾泰等名為進兵仍思遷就完事因諭溫福由滇赴川經理軍務且命桂林馳往視之辛卯冬因阿爾泰始終遲疑玩誤遂罷其職而以溫福代為大學士授定邊將軍由西路督兵進攻其四川總督則令桂林代之統兵攻𠞰南路攻破巴朗向訛為斑斕山今改直取達圍進抵資哩數月克之兩路夾擊遂得美諾鼠竄狼奔金川助惡溫福初至西路即策勵將士攻克巴朗拉乘勝直取達圍進攻資哩數月而克之繼命豐升額為副將軍同溫福進𠞰賊尋退還木闌壩我兵進抵路頂宗桂林在南路其始頗合機宜連破約咱卡了諸寨并復革布什咱侵地尋為宋元俊所誤致有墨壟溝之失桂林匿不上聞為阿爾泰所劾因即罷斥而令阿桂為副將軍赴南路代領其兵南路自達鳥至僧格宗皆峭壁懸崖碉卡林立阿桂董飭官軍勵勇摧堅罙入其阻乘勝進搗美諾賊巢壬辰十一月遂克之溫福亦攻克明郭宗至美諾與阿桂㑹復督兵攻取布朗郭宗逆酋由僻徑竄入金川擒其父澤旺解京乃傳檄撫定汗牛大板昭等寨落小金川悉平而金川逆酋索諾木復敢黨惡拒命因移兵並𠞰之既平䟎拉小金川畨語本名遂討促浸即金川畨語名雪多境險奏功以沈奏功以沈賊更遮郤緑營怯懦遇戰辟易攻𠞰促浸之兵溫福由功噶爾拉阿桂由當噶爾拉分兩路並進功噶之前為卡撒了口賊築碉斷徑不能進遂别由昔嶺繞攻而碉堅地險兼多雨雪攻之半年雖屢得賊卡終未扼其要害緑旗兵既懦葸溫福又不善調度以二萬餘人散布各卡防守遂以分而見單賊窺其罅隙于癸巳六月遣畨衆數百由間道潜出煽誘䟎拉降畨復叛董天弼庸懦失守為賊所戕賊益猖獗擾溫福後路直侵大營緑營兵衆先潰將領戰殁者多溫福率親兵與賊搏戰亦遇害趲拉之地復失逆酋等罪大惡極愈不可寬矣兵既無能將復失算豈如南路全師而返叶有阿桂在當噶軍律明而士心固賊不敢犯然木果木事之後當噶亦難獨駐遂整勵兵衆由南路全師而出重調徑旅吉林索倫健鋭火器其心忠純前已簡派八旗兵三千令赴川助𠞰為溫福等奏止使木果木軍營有滿洲兵在彼則緑營得所依恃亦不致倉皇潰竄是其事仍由溫福自誤幸阿桂一路軍氣甚整即授為定西將軍並選健鋭火器營兵三千吉林索倫黑龍江兵四千迅赴軍營重籌進𠞰仍分兩路堂堂正正不旬日間美諾重定癸巳冬將軍阿桂統兵由西路進攻其南路則令明亮為副將軍進𠞰兩路並進所向克捷旬日之間即收復小金川全部谷噶既入馬尼去聲並克豢養旗兵允得其力阿桂等於甲午正月搶占谷噶了口山梁明亮等亦於是時攻克馬尼兩路之兵皆因有八旗徑旅奮勇先登緑營觀感激勸皆效法恐後奏績甚速釃三路進一阻宜喜及彼絨布遇險而止副將軍豐升額同舒常於宜喜駐兵與阿桂明亮共成三路第宜喜之兵攻𠞰半載未能寸進而明亮則由馬尼攻得木溪卡卡角及抵庚額特亦阻險未能進遂駐絨布寨阿桂西路則屢建功羅博淜普逮遜克宗甲午三月阿桂攻克羅博瓦山梁六月攻克色淜普此諸寨並峯峻碉堅賊衆悉力死守官軍皆陟險鋭攻殱醜甚衆遂臨遜克爾宗喇穆山梁日則了口舉默格爾以擾其後我兵攻克色淜普後賊衆防守益力阿桂偵知喇穆喇穆迤西峯崖陡削賊備禦稍疏因分兵超越進攻盡據其碉並攻克日則了口亦六月中事其後兵進稍阻至十月初復繞遒攻得默格爾山梁其榮噶爾博日爾入當噶之賊皆截于後明亮宜喜亦據嶺梁而復難進徒然望洋宜喜為賊要隘守禦極嚴豐升額舒常攻之一年未下繼而命豐升額改赴西路舒常在彼更不能進甲午夏因明亮在絨布屢攻未進不宜頓兵於無用之地令其分兵七千移攻正地明亮遣偵卒往探不見賊蹤難以輕進亦赴西路協𠞰阿桂札止之㑹綽斯甲布土司懇明亮駐宜喜并願效前驅明亮乃出其不意分兵冒雨直進遂據宜喜山梁並攻得俄坡格勒古賊因掘濠斷路明亮等復為所阻矣逮昨乙未略康薩爾木思工噶賊碉並毁阿桂自攻得默格爾欲乘勝直進賊復於康薩爾山梁抗阻兩月餘乙未正月阿桂派兵分路潜進拔其鹿角連越重壕躍上碉頂遂毁其碉殱賊甚衆四月復攻得木思工噶克了口從此下壓勢益順矣明亮河西亦有所據日旁以前五十里路明亮因達爾圖之路為賊所斷商之阿桂謂當仍由宜喜一路進攻並派西路兵一千令福康安帶往攻克甲索碉卡海蘭察亦往㑹攻合力并擊先克撒撒谷其日旁右之沙壩山并達爾圖得楞及溝內之斯年木咱爾各賊皆紛紛棄碉遁周圍五十餘里寨落悉行焚燒夾河兩軍聲息可通並清後路遜克爾宗五月中明亮攻克額爾替碉卡可下至平坡六月間復攻克石真噶寨阿桂派兵沿河從赤爾寨攻打隔河之沙爾尼一帶兩岸夾擊聲息可通逮阿桂攻得噶爾丹喇嘛寺等處居髙得勢以遜克爾宗在我兵之後留之非計遂派兵三路分進豐升額督率攻𠞰或斫寨而入或梯墻而進遂得其碉殺賊無算後路益肅清矣菑則大海昆色拉枯層層破要步步披嶇阿桂以昆色爾喇嘛寺在拉枯喇嘛寺之上於此路尤為扼要其菑則大海亦當並𠞰分派將領統兵同往其昆色爾山梁最險官兵皆蟻附上攻占其碉寨復縱火焚燒拉枯喇嘛寺又攻得菑則大海官兵無不超越而登飛騰而入遂克勒圍紅旗飛遞而何四月大捷未至既克西里乃若建瓴科布曲索隆古不日而傾阿桂于八月十五夜攻克勒烏圍其附近碉卡木城六十餘處一夕無不摧破八日而紅旗遞至木蘭詳見聞捷凱歌及志事詩自奏捷後四閲月雖時有克獲未能罙入直至十一月初攻克西里軍聲愈壯而賊勢愈蹙尋即攻得科布曲索隆古山梁並克格隆古兜窩等要隘又掃清安布魯木一帶益據建瓴之勢矣雍中舍齊易如拉朽密圍噶喇依賊其奚走阿桂既由索隆古進攻朗阿古則朗噶克了口等處皆克之並據噶占山梁十二月十七日遂由瑪爾古當噶一帶寨落悉行掃蕩並克舍齊喇嘛寺次日復攻克雍中喇嘛寺即于十九日統兵直搗噶喇依四面圍攻水陸俱斷促浸畨衆自攻克勒烏圍以來大小男婦紛紛投出其大頭人布籠普阿納木達什阿庫魯等遂皆相率乞降並索諾木之母阿倉姑阿青及其姊妹亦皆投至軍營僉云索諾木莎羅奔兄弟并作惡之大頭人丹巴沃雜爾等皆在圍中此蓋逆酋賊黨等罪孽深重天奪其魄驅之一處以就擒也是時河西明亮亦入富德馬邦傳檄芥拾明亮既克阿爾古等寨克取獨古木開通乃當山梁並搗甲雜掃獨松河西一帶悉行𠞰洗過河㑹阿桂合攻賊巢富德亦將河南北之噶咱普庚額特曽達等各寨落全行掃清直據馬爾邦亦遣兵與阿桂㑹富德所得之地俱不煩兵力易如拾芥設非西路圍噶喇依則其兩路亦無進期明亮富德兩路向皆艱于攻取而富德久駐絨布尤未能寸進自阿桂既克索隆古乘勝席捲已圍噶喇依各處之賊皆膽破心散望風潰降非果由力戰而得若非西路官兵直搗賊巢則明亮富德兩路仍未有進取之期也諸軍既合火攻周遭雖據三穴訖其奚逃然猶死守四十餘日計窮力竭乞命而出官軍四面合圍賊猶負嵎力抗繼用大炮環轟摧其碉卡將士等乘勢克取旁近寨落層層進逼殱賊日多逆酋惶懼遣其兄岡達克彭楚克次第詣營並即拘繫于是攻圍益急據其近碉斷其水道索諾木窘迫無計遂于二月初四日早率其兄弟莎羅奔甲爾瓦沃雜爾斯丹巴并兩土婦及黨惡大頭人丹巴沃雜爾阿木魯綽窩斯甲尼瑪噶喇克巴並兩喇嘛挈大小頭目男婦二千餘人出寨逆酋跪捧印信乞免誅戮因即悉就擒獲俘獻京師自圍𠞰以來計四十餘日至是全境蕩平罪人斯得紅旗于二月十二日馳至桃花寺行宫適當告功諭將東陵之期此實仰賴士擇皇祖默佑益深感敬隨軍阿桂等統成功將日凱旋俟東巡回蹕至黃新莊舉行郊勞大典以昭偃武策勳之盛金川之功阿桂居首特恩異數加之宜厚征𠞰金川之役實由將軍阿桂藎誠體國不憚艱勞制勝運籌克成偉績實為此事首功特封為頭等誠謀英勇公加賞雙眼孔雀翎紅寶石帽頂四團龍補褂金黃帶紫轡以昭崇奬能出能入有權有經運長擊短後實先聲金川之功允資羣力寸步層峰氷滑石仄將軍指揮無不奮勇以此破敵鹿埵隴種金川之功非豫所期事弗可已久而得之鬬猶獸困捨懲雞肋念我衆勞至今心惻金川之功允賴上蒼靖彼蕃徼我武惟揚勒碑太學用遵成例靜言思之文以志愧御製文二集卷二十八
