body:
  text: 題辭王禹稱待漏院記題辭待漏院記理正言明膾炙千古無可雌黃然彼在臣言臣知一而未知二故題之辭記中厯針相臣賢者一邪者一庸者一列為三等亦既彰往者規將來可以為執政者之龜鑑矣但所謂一國之政萬人之命懸于宰相則吾不能無疑焉夫此三等之人豈能自用用之者君也若為君者不能自用其臣而或資于人焉則賢者不成其為賢邪者益肆其為邪而庸者且將自喜其為庸矣是則一國之政萬人之命不懸於宰相而懸于為君者明矣然而識此三等之人豈易易乎必存於心者克已而復禮接于物者大公而至明苟不如斯三等之人紛陳于前而無所主張去取天下之政將日壞而不可收拾非相臣之罪乃為君者之罪也禹稱所云君逸于上臣勞于下當與王褒所云為人君者勤于求賢而逸于得人之語並觀之然亦終無可逸之時則其義見于周公無逸之篇兹故申繹其義而題之辭以戒後之為君者且以自戒也再題樂律全書朱載堉樂律全書之謬已見前論兹一再閲其以曲調譜古歌者立我蒸民之歌乃調寄豆葉黃而合康衢童謡與老人擊壤歌為一章者其思文后稷章乃調寄金字經附以大禹謨水火金木土穀惟修八句為金字經之二皆雜輳而成至南風歌為調寄鼓孤桐先以古琴操返彼三山兮十六句而繼之以南風之薰四語更屬狂誕考舜歌南風見于樂記有篇名而無其辭韓非子淮南子史記皆是秦及西漢人未見其辭也鄭康成禮記注云其辭未聞是東漢亦尚無其辭也解愠阜財四句始于家語及尸子孔頴達正義云家語王肅所增加非鄭所見尸子雜説不可取證正經故亦斷為此詩今無是則南薰一曲漢唐人尚疑之惟輔廣以為家語必有所據南風長養萬物猶人君長養萬民為得聖人之意云云尸子為六國時人家語乃孔氏所傳且歌詞尚髣佛喜起之遺未可定斷為非虞廷雅奏若返彼三山兮十六句出自古琴操乃晉孔衍所編其書今亡惟見于諸家類書所引唐吳兢謂琴操紀事好與本傳相違朱子曰琴操一書載堯舜文武孔子之詞尤謬知者可一覽而悟也是琴操之紕繆古人早有定評今細核其辭首所云三山即尚書之壺口雷首太嶽孔安國傳以為三山是也漢書地理志太平寰宇記均以為地近蒲坂故緣舜都而附會其名其下文鋪敘五老及黃龍負圗之事則出于論語考比讖春秋元命苞皆緯書不足為證其語如後世侈陳符命者所為豈堯舜授受而出此且明云案圖觀讖讖始于秦盛于東漢三代之書無讖字也擊石拊韶鳥獸蹌蹌鳳凰來儀乃尚書益稷篇句凱風自南下同衛風其出于魏晉人偽作不辨可明凱風即南風見爾雅使舜果有此句郭璞注雅何以不引而獨指衛風且凱風南風不應連舉解愠阜財何返悲喟宋郭茂倩樂府雖引之尚為兩章載堉不但不知決擇且妄以贋詩冠于南薰之首以合于俗樂曲牌名實為昧古義而侮聖言矣若秋風章乃調寄青天歌雖全用漢武帝辭然漢代歌辭見于漢書樂志及諸籍者不下數千章載堉何以獨譜秋風辭考明徐學謨識餘録稱載堉之父厚烷以進夀表失稱臣及創二仙廟育才等館皆上僭無狀降發髙牆且謂其好為詭故不情之事欲以釣譽取名載堉或因其父獲罪不無怨懟之意漢武求仙嘉靖好道載堉或竟寓意于此亦未可知也夫援古入俗固載堉之謬樂記云君子于是語于是道古載堉不知古聖人致治之道又乏考古之識鹵莽滅裂真無知妄作之尤者是于樂理已失豈足與言正始之音哉因載明其謬並命以其四譜如宫商三百之例以一字一音譜以正調其載堉杜撰所為之四章亦按其宫商勒為一編俾知音律者一覽而知其妄庶亦復古之一端耳識語大宛馬識語嵗乙亥準噶爾平越明年左右部哈薩克以次內附又明年使臣入覲隨獵有詩紀事並加按定哈薩克為漢之康居又越二年哈薩克來貢馬因以成歌仍謂之大宛者以自古相傳大宛産善馬也夫西域諸國何地不産馬而大宛獨擅其名漢時人足未履其地僅聞其名阻閡䀛昧遂以為大宛所獨耳不寧惟是即我朝西極未定之前準噶爾所貢馬率謂之大宛向按大宛部落強盛附庸者多哈薩克當是其部中之一國非臆説也史記載康居南羈事月氏東羈事胸奴則康居固他人之屬國耳張騫使月氏為胸奴所閉及亡抵大宛而大宛遂能為發導驛抵康居是康居本聽大宛役屬也唐書載石國故康居小王窳匿城地漢書所謂康居小五王之一而唐顯慶中以為大宛都督府亦其一證故哈薩克以漢語言之則為康居自其服屬言之則原大宛近三十年來軍吏塗經貢使踵接汗血之馬服皂獨樹之迹寄題非如前代鑿空者比此歌與丁丑按語固相印合不得以異同致疑矣幾暇重書是卷因識之臨吳琚尺牘識語右臨宋吳琚尺牘內有襄州之行非所憚也不謂以常式辭免就降改命云云按宋時授官後率多上表辭免逮朝命再下乃始就任甚至有數次及十數次者殊可鄙笑且空缺既久固不曠官乎夫上之行政用人下之服官陳力胥當以誠意將之庶為各盡其道可以正朝廷而化民俗彼隱居髙尚者無論已如既受祿于朝則東西南北惟君所使安得為循例具文以示謙退而博虛譽且一代相習成風豈非上下相率為偽其政事有不叢脞者哉教亷興讓固不在是也豫是以臨御以來于凡大小臣工無不量材器使隨時黜陟以期有裨實政即如向來京察大典三品以上大臣俱親加察核而諸臣例須自陳求退以俟上命夫既隨時黜陟奚待自陳待自陳而後黜陟則平日之曠厥官者不知凡幾然較之宋時似此常式辭免猶非盡出虛飾而豫尚停格弗行從不肯務此等具文之舉蓋人君以至誠率下猶難還淳返朴況導之以偽耶至如宋之詞臣行制逞私意而快恩讎致啓門户黨援之習尤為粃政如蘇軾之賢尚不免此況他人乎我朝一切無之實足超越前代向于詩文中屢辨之兹閲琚書重臨此本並識重定元拓石鼓文次第識語周宣王獵碣十今在太學戟門下旁音訓一碑元國子司業潘迪撰依施宿序次者也嵗己巳曽拓本題長句匣貯乾清宫越癸卯得此元拓夲趙孟俯音釋乃依薛尚功序次者也復題長律並命儒臣跋于後兹幾暇兼取舊藏太學者相校則甲乙參互檢閲為艱思折衷以定一是夫石鼓之聚訟久矣蘇朂竇臮張懷瓘韓愈蘇軾以為宣王鼓韋應物以為文王鼓宣王刻董逌程大昌以為成王鼓鄭樵以為秦鼓馬定國以為宇文周鼓然自元至今定為宣王鼓無異辭者以車攻馬同合于小雅故也則􅏶車既工􅏶馬既同為第一鼓無疑矣其下曰􅏶車既好􅏶馬既􅥹即小雅之田車既好四牡孔阜也蘇軾詩我車既攻馬亦同其魚維鱮貫之栁舉第一第二鼓之文也鼓在鳳翔荒野人方取以為臼孰從整齊而行列之宋在稽古閣金在王宣撫宅誰能摩挲而排比之元皇慶始移國子監至元間潘迪作音訓孟俯在迪前故取薛説當南宋偏安舉中原而棄之淳化閣帖購自榷場定武蘭亭輦歸金府薛鄭諸人徒于紙本想像髣佛各以意為之何如潘迪之親見兹石為審也因準迪所次改訂前後并于孟俯注中標明今定第為幾鼓俾石墨相符校讐更易不沒其舊不戾于今斯善耳石鼓三代法物還取三代雅詩印之況十鼓具存顯顯如是薛鄭何取焉即儒臣舊跋之敘而不斷亦泥也不寧惟是事毋蓄疑政貴崇實倣井田封建之制且取未見井田封建者如劉歆王安石所論説以治天下其可乎哉乾隆己酉長至御筆重識五代胡瓌畨馬圖識語右五代胡瓌畨馬圖髙寒濶逺筆墨雄偉非近代畫家苶弱纎屑者所可幾及的是神品後有郭雍跋乃倣昌黎畫記句調成之夫古文之道主之以理行之以氣徒規規橅倣得貌遺神究何取焉近題瓌卓歇圖詩即以重儓斥之矣又有兀顔思敬跋亦于蒙古有貶詞考之輟耕録金人氏族兀顔曰朱夫完顔烏古論之類自係金源人之本姓譯以漢字已失其本又何有于曰王曰商乎此輟耕録之躗言也且思敬身本金源入元從明當洪武六年距順帝歸應昌僅五年北元猶行宣光年號而心忘故國口多微詞士品至如此又何以為文章之本哉豫非詡鑒别之精蓋示古文之法與作古文之本因端以發其藴俾學者共窺一二云庚戌初冬重閲再識不欲書其後命董誥書之書命館臣入吳三桂擒桂王由榔諭卷識語偶覽所書命館臣入吳三桂擒桂王由榔諭以吳三桂之擒桂王由榔與阿睦爾撒納之欲滅達瓦齊事適相同蓋彼時洞見逆賊蓄心竊據已久然非藉天朝聲靈兵力必不能速成功以逞其私故其為我宣力正所以自為謀古來姦雄類皆如是總在人君有以燭其隱微不事億逆而狡獪技倆自無所施耳因命將阿睦爾撒納所奏二摺翻譯清漢並其本文附録卷末以示萬世之馭逺夷者乾隆甲寅冬八十四老人御識歷年上元鐙詞册識語歷年上元鐙詞册識語之作乃識過非識佳也夫清平之世上元佳節為君者幾暇之餘摛詞以紀乃事之宜何過之有而豫以為過者非遜語實誠言也總計豫六十年之中得詞四百一十二首已涉杜甫之譏然豫自以為過者尚不啻此蓋詞册之書共成三十二册始于于敏中手蠅頭小楷以進者辛未以前章之數原不論然其時尚有奉懿歡事巡方撫新降諸盛典至敏中不能書命董誥繼書以後在辛丑則外歸者益衆而侈節者增繁是非豫過其誰之過哉為人君者一偏于喜事好功增華飾盛之念未有不黷武事而詡升平者豫雖慎未至此而不得其志幸災樂禍之人保無為此論者乎思及此而豫之過更不待人言且自以為甚矣且伏羲六十四卦分詠八章以為成數則始自戊申為豫七十八嵗之時七十八嵗可謂老矣要平聲以八年于可必不可必之間兹竟與草五嵗期滿六十年之在位同荷天眷以成符望則豫之感恩勑已凛凛危懼豈言語所能盡者哉則此識語所云識過者允出于誠而識過即所以識佳且即所以識幸觀此文者庶有以諒豫乎書後書宋孝宗賜曽覿書册後宋孝宗所為乃庶人之孝匪天子之孝向已論之詳矣兹觀其賜曽覿書唐太宗與張元素論隋主好専之事益足以知其無有為之志徒恃臣下之盡職以便已之髙拱圖自逸則所謂匪天子之孝豈吹求哉夫自専細務不任羣臣固無致治之理然居君師之責者一任羣臣為政不明察以専賞罰又安能率作興事以熙庶績哉書之稱堯曰欽明稱舜曰文明蓋必明察以照物然後能専以斷信賞必罰于以董正百官致治四海也然所謂明察者豈易言哉蓋欽者敬也文者達也敬于心而達于物堯舜之所以為明也如日月之眀容光必照而無所用其照若其以苛為察以刻為明必致寄耳目于宵小適足以自蔽非堯舜之明出于欽文則其専也更必有私以間之隋主之失實在于此唐太宗張元素並未論及亦可謂失言矣雖然更有一説蓋明者為人君所必當勉而為臣者所深畏者也臯陶之賡歌曰元首明哉股肱良哉為臣者能如臯陶者有幾則可知不欲其君之明者多矣則可見張元素之言唐太宗有所被其誤矣太宗為明君尚如此不及太宗者可不慎哉近巡經直𨽻處分滯獄一事頗有類此近因巡城御史穆克登額等奏緝獲王二等三犯供出隨同馬十等行劫建昌縣錢鋪一案事閲兩載有餘已獲正犯十餘人而尚未審結殊堪駭異隨將馬十提至行在交軍機大臣等審訊始知案犯于上年十月內已提至省城而臬司並不親訊僅委之首府首府又委之首縣該縣又未全訊各犯僅抄撮原供具稟以冀搪塞了事總督亦未飭催置若罔聞似此劫盜重案任意延挨此豈尋常玩誤可比不得不將劉峩等分别降革拿問以示懲創並傳諭各省督撫共知警凛毋蹈前車之轍而此册適隨行笈幾暇偶觀爰申其説如此不欲書曽覿册後故命董誥書之書韓昌黎答李翊書後昌黎平生得力處在此一書而其撮要示的又莫過氣水言浮物數語然有引而未發者焉是以申而論之易曰形而上者謂之道形而下者謂之器形者何氣也道者何理也器者何物也道存斯理存理存斯氣盛氣盛斯物之大小必浮昌黎但言氣貴盛而未言理貴存是故理以率氣氣以運物化而裁之推而行之匪啻為文天下萬事萬物無不備于是也然昌黎雖未言及理豈氣之外别有所謂理乎蓋氣實有正有邪理之氣為道心正也欲之氣為人心邪也孟子云浩然之氣至大至剛以直養而無害則塞乎天地之間氣何由塞理運之也理何由運道貫之也惟精惟一養氣即養道心也昌黎因文見道庶幾在是夫豈論文而已哉跋宋髙宗書馬和之畫唐風圗跋唐風十二篇髙宗書馬和之畫俱全張丑曽載之清河書畫舫馮銓摹其書入快雪堂帖豫嘗再臨且為補采苓篇名者也近始得之則二字具存後更有唐國十二篇五字鐫者脫之耳溯學詩堂彚藏作記二十有二年續得周頌閔豫小子之什亦已七年神物必合仍歸之堂笥因思此皆晉詩也本其風俗儉而用禮有陶唐氏之遺風故謂之唐風髙宗在臨安三秋桂子十里荷花徒以西湖為銷金窠罔知蟋蟀山樞之義矣不務返晉為唐而乃錯杭作汴所謂誦詩三百雖多亦奚以為者也晷長幾暇撫對真迹今嵗年豐人樂豫將推恩益下嵗聿其莫好樂無荒願與吾億兆共之辛亥長至御識重訂熱河考跋右熱河考乃乾隆戊子秋駐山莊時所作內云黃河之源自星宿海蓋據康熙年間侍衛拉錫等所窮但至星宿海而止即指為河源是以皇祖御製幾暇格物編亦以鄂敦漢云星宿他臘漢云岡海為河源也逮壬寅嵗命侍衛阿必達往窮河源親履目覩復命詳奏豫始知星宿海尚非真源其西南上遊一河蒙古語名阿勒坦漢云金郭勒漢云河其水黃色回旋三百餘里入星宿海合流而下至貴德堡水色全黃始名黃河又阿勒坦郭勒之西有巨石髙數丈蒙古語名噶達素漢云北極齊老漢云石其崖壁黃赤色上為天池釃流百道作金色入阿勒坦郭勒斯為中國黃河之真源也至羅布淖爾漢云蒲昌海伏流地中至此復出是又為阿勒坦郭勒之上源于是考詢始明確因著河源詩文並命館臣詳訂前史載記之訛輯為河源紀略一書刊行頒布以決疑而傳信然兹事體大理博彼桑欽酈道元輩拘墟耳食無足論已即元史有星宿海為河源之文亦失之疏而誤譯鄂敦為火敦則漢人不通蒙古語之故耳使非若今日之版圖式廓豫之精通蒙古語及漢文更詢之親履目覩之人率欲正千古之訛傳得其確實不亦難哉因閲舊考河源未臻更志續得真源梗概如右乾隆甲寅孟秋御識御製文三集卷十
