body:
  text: 經筵御論仁者先難而後獲問仁於孔子者多矣而所對各有不同然聖門以顔淵為髙弟孔子所對者則曰克已復禮以是知克已復禮實為仁之最切最要即所對樊遲者亦豈外于是哉蓋先難者何克已也後獲者何復禮也夫難莫難於克已仁者天理也私欲介于中其能存天理者鮮矣故易曰大師克相遇必用大師之力而後能克其私欲以全天理故易又曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行不逺復無祗悔元吉皆克已復禮之為也董仲舒正誼明道之論略為近之而朱子舉以為不求後效又以為警樊遲有先獲之病未嘗申明告顔子之意余故敘而論之功崇惟志業廣惟勤斯言也豈特卿士所宜勉而已哉卿士皆亮天功之人而用卿士以亮天功實為君者之責故必敬天愛民以永此志朝乾夕惕以勵此勤然後有以倡卿士而胥崇其功以廣其業故臯陶曰率作興事慎乃憲慎憲志之崇興事業之廣如是則所謂功業者仍不異敬天愛民之為而非好大喜功事紛更而無實惠者所可同年而語也日日新又日新曽子釋新民之義而引湯之盤銘此意最親切蓋湯之銘盤以修身而及正心也曽子之解經文則以治人而及修已也終必由始末當返夲故欲洗濯其身者要當先復其心之善而欲教化其民者要當先勉其身之修夫正心以修身者豈有他術哉亦惟克已復禮去其習染之汚而復其夲然之善而已蓋習染之最易害人心如塵埃之最易生室宇日日掃之塵埃未必能盡去日日新之習染未必能盡除日日新又日新如是而已矣若謂新民之道必更有以新之之法則是外夲內末雖日施訓誡之令有不出于栁宗元之所譏矣有孚惠我德易理廣大無所不包仁者見之謂之仁知者見之謂之知豫昔嘗以勿問其施惠釋元吉矣至于惠我德豫亦以為應于為君者言之蓋惠者何即我之德也我施德惠而稍有不孚于心則仍是違道干譽之為欲天下人愛戴此非問乎此非不孚乎且九五為君位亦不應計及人之愛戴也或曰如此不有違厯來釋經者乎曰觀象玩辭豫惟知盡豫為君之道百姓足君孰與不足後儒解此章者率以深言君民一體什一天下之中為言而戒夫橫征暴斂以虐民耳夫橫征暴斂自非大無道之君與夫極孱弱之國孰肯為之彼其剜肉補瘡胥淪于亡有如哀公所云二猶不足之歎耳余則以為為人君者當常存百姓不足而欲其足之心而此心常不足也蓋貴為天子富有四海豈有不足之理但四海之內百姓衆矣其皆足乎若但知已之不足而不知百姓之不足視已之足即以為百姓亦足則是孤為君之職背天理而失民心必在此矣然百姓之足豈易言哉水旱之不齊貧富之不等非輕徭薄賦之所能及也一人向隅仁者有所不忍而况向隅者衆乎此余所以宵旰祈年令各省無匿災傷而亟為賑恤緩貸補偏救弊之為夜以繼日猶不足也君子所其無逸無逸一篇凡七發端而皆以嗚呼始之所以長言詠歎戒宴安勵祇懼三致意焉而開章即曰君子所其無逸實挈通篇綱領夫所者處所也即地也蓋人晝而作夜而息皆必有所處之地不能離也為人君者果能以無逸為所處之地作焉息焉語焉默焉動焉靜焉無不以無逸為所焉則何私欲之侵而怠惰之萌哉召誥王敬作所益相發明而著誡深矣先之勞之請益曰無倦夫子為子路言先之勞之者似為有司親民者而發而人君為政之道亦實不外乎此蓋君與臣其職不同而為民為政則同先之以孝弟固君臣所應同者至于循阡陌勸農桑乃臣之事而非君所宜親者然則君可以不勞乎朝乾夕惕宵衣旰食又何以云乎是則君有君之勞臣有臣之勞臣之勞即所謂循行勸課勞其身之事也至于君之勞則所謂敬天勤民勑幾求賢先天下之憂而憂其勞蓋有不可勝言者而皆勞其心之事也設厭其勞而圗逸雖不乏一日之樂而將貽百世之害是則夫子一言而具萬世君臣為政之大要若夫無倦則益申乾象天行不息之義與公旦無逸之訓相發明非徒為子路好勇而戒其不能持久而已也自上下下其道大光自上下下二語非申明損上益下而言也夫既損上以益下民之説之自無窮極其為益也更有何言蓋自者由也自上下下重言為上者應不自恃居崇髙之位每虗已撝謙尊賢納諫縱能而視若不能已治而恆如未治延訪必以精明達必以遍雖芻蕘弗遺焉斯乃由上以下而其道有弗大光者乎或曰如此則益彖祇為為君言之乎曰易無不該且一邑有一邑之上下一家有一家之上下推是道也孰無自上下下之理而吾在君言君惟引以為已鑒耳此之謂潔矩之道曽子聞夫子一貫之心傳其告門人曰夫子之道忠恕而已矣故其釋治國平天下以為有潔矩之道又申之以上下前後左右各有所以接之之境處之之理而曰此之謂潔矩之道蓋矩者境也潔者理也理也境也不外乎一心境者心之接理者心之處中心之謂忠處理之謂也如心之謂恕接境之謂也一以貫之豈更外于此乎然非克已復禮理境相融其能與于此者鮮矣仲弓問仁而夫子示之以敬恕此物此志也乾始能以美利利天下不言所利項氏謂乾始而四德在其中俞氏謂乾始即乾元是二説也一則分始與元為二一則合始與元為一余以為俞説近之而猶未識夫始也元也總一乾也蓋乾具四德大哉乾乎乾之大不可見于四德見之所為始能以美利利天下不言所利天何言哉四時行焉百物生焉無所不利非可指名即貞也四德以是乎流行萬彚以是乎蒙美豈不大乎夫人君者體天者也有孚惠心勿問元吉余嘗申其義而論之亦曰不言所而已矣知者樂仁者夀仁者知之體知者仁之用亦如山者水之體水者山之用故無水之山必枯無山之水必泄知而離仁失之巧仁而離知失之訥朱子解此章雖云不是兼仁知而言而夫子之言實並仁知之形容及與其效相提並論以顯其相資殷而相得彰也明乎仁知之相資則體用各得其宜蓋知有知之體用仁有仁之體用而仁知又互相為體用渾然天理動靜周流其樂與夀不求而必得矣雖然其樂與夀豈一已之私哉知者無不通樂何如之仁者無不善夀何如之夫然則其樂其夀實泯彼此該物我樂以天下夀以萬世學者宜無不加勉而為人君者更當以是為亟也在知人在安民臯陶言人君為治之道在知人在安民斯言也實示千古帝王治世之要道舍是無他求矣夫知人安民非二事也人君以一身臨萬民之上萬民衆矣豈能一一教之養之是在知人善任內而百官外而民牧必各稱其職而能其事以相輔弼承宣然後庶政惟和萬國咸寧夫使若而人者皆各稱其職而能其事豈易致哉故大禹吁之曰惟帝其難之而何憂何畏皆重于知人是安民必在于知人而知人尤難于安民能知人則無不安之民矣夫以神堯所難之事而為帝王者無不有是責嗚呼可不畏乎可不慎乎悠久所以成物也解是章者率以久為內而悠為外分而言之豫以為悠久自是至誠無息之一貫雖有存內驗外之殊其實一而二二而一者也且天之髙明地之博厚可分為二乎博厚髙明既不可分則悠久之不可分不待辨而明矣是故天地之德不可見而見於博厚髙明聖人之德不可見而見於悠久惟其悠久故積纍之至而為博厚發越之極而為髙明斯則天地之大亦因聖人之至誠無息見之所謂致中和而天地位萬物育悠久所以成物非子思述曽子所聞於夫子一貫之道乎惟臣欽若惟民從乂説命四言余向為乾清宫屏銘亦曽發明其義矣兹因繹臣民之義而益凜為君者之上宜法天下宜表率臣民也夫人君而不能法天則何以使其臣民胥欽若而從乂乎且法天非虛言也必至公無私弗用聰明而於理於事自無不聰不明於是乎取舍當而賞罰明臣民其誰不欽若而從乂乎設不能克己復禮而欲其臣民之欽而敬之從而順之是則逞私欲而背天理豫無樂乎為君一言喪邦胥在是矣可不慎乎臨雍御論為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信此雖言文王之止于至善而實訓萬古五倫之要道也夫文王固身厯為君臣父子與人交而各盡其善者矣試思人孰不在五倫之中而各有當止于其善之道乎是故為君者匪惟博施濟衆以為仁即疸惡弼教之義亦必當夲于仁而出之所謂止也人臣之敬詎其夙夜匪懈恪恭承旨之謂即繩愆糾謬陳善閉邪亦必當夲于敬而出所謂止也生事死葬祭之以禮人子之止于孝蓋終身之事非謂無父母即無子之止于善也若夫父之日嚴似殊乎母之慈而不知父之嚴正所以行其慈也至于兄友弟恭夫唱婦隨皆與人交之義而朋友之信固該其中矣余故云此雖言文王之止于至善而實訓萬世五倫之要道也天行健君子以自強不息天一日一周是行健也然天之運行終古不息不惟不息蓋並不息亦無意于其間斯乃健也應與中庸至誠無息之語並觀之所謂誠者天之道也若夫法天之君子乃誠之者人之道然亦不外自強不息而已蓋天之不息無為而為人之不息則在自強自強者必夲于克已復禮人十已千成已成物胥在乎是聖人之言非特為為君者言蓋人人皆有法天之責此責不在于外而在于心人各盡其心之誠所謂天君泰然百體從令而為人君者益當法天行健夕惕朝乾孜孜亹亹不遑暇逸以是為亟耳御製文二集卷二
