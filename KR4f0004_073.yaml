front:
  text: 欽定四庫全書御製文二集巻三十九
  hash: sha256:a276dc7283b549abfcd0d9fbac3cf5e059ecf03911174586079b60f1afa32573
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_073-1a, image: WYG1301/WYG1301-0519c.png}
body:
  text: 硯銘松花石硯銘吉林松阿里江産此石松阿里者漢語天漢之謂江源出長白山故自古以此美名稱之出天漢勝玉英琢為硯純粹精勑幾摛藻屢省成玉帶生硯銘有序予樂善堂集内有玉帶生歌不過書忩日課想像為之耳近以幾暇檢閲懋勤舊物則玉帶生宛在不知何時入大内摩挲古潤的是信國舊器且白理圍腹益識玉帶之所以得名乃憬然悟而愉然喜肅然敬而惻然惜忠臣義士百世不冺有如是乎因泐舊歌於硯並為之銘激切盡節易從容盡節難窮北再經寒暑卓乎匪石之志見於正氣之篇日月争光泥而弗滓玉帶長生履善不死倣古六硯各製銘未央之甎胡為署建安年或三臺之所遺墜清漳而濯淵似孫不察謬為題箋形則長以橢聲乃清而堅嘉素質之渾淪浴初月於海天師其跡而不承其譌是亦稽古之一助焉右倣漢未央甎海天初月硯其制維何致之石渠其用維何承以方諸研朱滴露潤有餘文津閣鑒四庫書右倣漢石渠閣瓦硯一規内涵八稜砥琢端匹絳潤而理平水圓璧安足擬右倣唐八稜澄泥硯月之精顧兎生三五盈揚光明友墨卿宣管城浴華英規而成右倣宋玉兎朝元硯琴古之産兮星文徹端異種足珎兮辟塵辟寒他山可磨兮如瓶斯受聊以寓意兮取諸徳夀右倣宋徳夀殿犀紋硯春之徳風大塊噫氣從蟲諧聲於凡制字谷則為雨潤物斯濟石墨相著行若郵置豈惟天成亦有人事擬而議之既純且粹右倣宋天成風字硯澄泥硯銘欲善其事先利其器卌年始用以乾隆年訃之澄泥習字曰實踈乎斯亦有義初縁弗知兹知乃試偶命求之不脛而至汾水之泥墨池之製朱長文墨池編記澄泥製甚詳色古質潤體輕理緻比玉受墨較石宜筆叶臨池雖助書法實愧更予戒哉玩物喪志再題倣古六硯銘海天初月昇於水素華朗照清莫比鄼侯之甎曽無此誰與題名難擬議翰筵静用實佳矣抽思啓秘有若是右倣漢未央甎海天初月硯石渠閣覆以瓦肖其形為硯也出於琢非出治友筆墨佐儒雅思卯金太乙下右倣漢石渠閣瓦硯四維四隅是曰八方璧水環之圓於中央内外各具深義澄泥式仿乎唐此則端溪出舊阬右倣唐八稜澄泥硯小圓大圓如月盈其中更孕玉䨲形文房受墨宜管城宣毫顧處能無情右倣宋玉兎朝元硯硯研平聲理犀通靈純蒼玉質為瓶形數其典兮徳夀興我懐兮守口右倣宋徳夀殿犀紋硯大塊噫氣其名曰風天成取象製此陶泓綈几批諾綸綍成君子之徳惕予衷敢曰萬方無不從右倣宋天成風字硯宋三虎硯銘質堅而潤製雅以古代半千年名存三虎賈乎陸乎伊誰與侣宋黻字硯銘黼黻文章所戒虗車黼黻昇平持盈凛予出自舊阬古色穆如舍黼而黻崇文寓諸兩已相背黒而青於彰色辨等緬彼有虞用慎絲綸匪玩瓊琚澄泥虎硯銘汾州舊製囊沙濘是陶是冶良工整如金如石為用静大人虎變其文炳自新新民吾應省宋小澄泥硯銘圍不逾尺文房小品陶自趙宋經幾百稔璧池鐵銹醉乎墨瀋繭版蠅頭宜臨玉枕倣魏興和甎硯銘澄汾水之泥仿魏代之甎在興和已稱舊然豈久於祖龍之年今長城猶故物也夫誰迴顧以視焉是知物貴所託龍門謂青雲之士葢亦有感而為言紅絲石風字硯銘石出臨朐紅絲組錦製為文字宣和式審既堅以潤腴發墨瀋雖遜舊端足備一品宋澄泥蟠螭硯銘囊汾水之土乎規南皮之瓦乎是何質堅而色古乎扣之鏗然如戛金石其徐韵悠揚又如琴瑟之搏拊乎蟠以文螭有若蛟龍之興雲雨乎硯乎硯乎供奉懋勤渙汗其大號涣王居庶幾旡咎乎宋澄泥黼黻陶紋硯銘宋代澄泥豈曽藏於王氏天誘文筵陶紋黼黻又疑成乎宣和之年爾時豐亨豫大以飾太平用致金源之烽煙時移世變而陶泓如故曽無變遷以静為用有如是焉宋石渠硯銘石渠祕閣製元符年曾陪綈几翰墨周旋宜歐蘇之親耳何章吕之佳焉名曰紹聖實幸羣奸淬妃有知惜國是之變以赧然舊端石六龍硯銘墨磨硯硯則凹也硯磨墨墨則消也然而世未嘗缺硯與墨則東坡之言其理昭也鵒眼蕉白鐫以六龍蟠雲霄也我則懼為時乘作覩之五而願亹日乾夕惕之三爻也澄泥八方硯銘四維四隅義具八方匪燥匪濕含隂含陽從模則柔以陶則剛用之綸綍慎兹典常宋端溪如意硯銘既方而圓體合乾坤吾因思泰交之義而久具其説於開泰之篇嘗作開泰説申闡泰交之義言泰之九三即乾之九三君子必乾惕然後能常保其泰無往不復是用懼焉如意固美驕志應蠲吾是以恒自勵乎􅍀然舊蕉白緘鎻硯銘匪金人可緘口慎絲綸宣以手用卌年如故友此硯自臨御以來凡批答奏章宣示詔㫖恒用之宋井田硯銘硯學井田牛臥田邊豈有心乎復古抑喘月乎畧閒竹洲曽用天籟藏焉玩題識之宛在悟由今視昔而憬然吾獨惜夫耕硯田者缺二鬴以守殘篇舊蕉白雙螭硯銘臨池摛藻胥無進硯如故也恧則信幾暇作書及吟詠常用此硯倣古式製澄泥硯六仍各為銘未央之甎海天之月泥豈異其埏埴魄自永其圎缺合而為硯滴露芳馞詠希逸兮賦句發清興以無歇右倣漢未央甎海天初月硯炎劉瓦硯稱石渠汾沙摶埴其式俱以昔視今舊新殊由今視昔詎異乎右倣漢石渠閣瓦硯八稜含璧外方内圓唐即澄泥兹實肖焉枕葄六藝修身立言詎惟玩物思旅獒篇右倣唐八稜澄泥硯月中兎兮日中雞卯酉其象交坎離天然配合誰所為日雞月兎兩弗知朝元之硯恒如斯研朱㸃筆猶繁辭右倣宋玉兎朝元硯犀其文缾其口製治誰宋徳夀伊法書吾何有論伊人吾弗取右倣宋徳夀殿犀紋硯庶徵有五風惟殿休咎之間聖䝉辨叶趙宋製斯風字硯曰時曰恒其義見漉紗得泥自絳縣爰倣厥式綈几薦緬想歌薫萬民奠敢恃誇雄一已擅叶右倣宋天成風字硯宋端石五丁硯銘出宋舊阬蕉白側理為北為南莫可攷耳其古則同文房佳友覆手五丁意寓深旨立言不朽經天緯地以視蜀人眇乎小矣舊澄泥方池硯銘土可為石以陶甄也上之化下仲舒曾言也慎是絲綸無黨無偏也念兹在兹玩物非賢也宋澄泥硯銘正紫色而堅凝如端石出於舊阬叩以鏗鏘為金玉聲雖無吕字可定其為澤州吕老之所手成邇日名硯乃接踵呈為君者其好不可不慎也用為銘以自懲宋澄泥虎符硯銘聞之説命事須師古也物豈不然于硯尤宜斯語也宋代澄泥其形為伏虎也小篆曰符葢以用於軍旅也磨盾伊誰爰廼成其露布也觀象玩占我則念夫革之九五也自新新民順天應人之矩也古色斑斕文房朝夕與處也曰金曰石無不可也世問萬物曷莫不生於土也舊端石荷葉硯銘石本堅荷則脆劑柔剛琢硯器論其初原一致石溪出荷水植忽肖形成葉翠蟹與螺葉間戲荷易雕石久堅變柔晦為剛利如露盤承露墜突漢宫無銅氣有識哉作者意舊端石饕餮夔紋硯銘鑄饕餮於罇罍古之常也戒飲食以貪饀喻從方也誰用之以刻硯義可詳也每竊人以炫已文之殃也兹葢取以警兹其味長也讀昌黎之往作未可㤀也宋澄泥石涵硯銘絳州泥誰為澄端溪石誰為形泥而石非所料石而泥非所較一而二二而一水為入墨為出背畫井思復古也面磨凹不可補也經世修身宜思何以自處也唐八稜澄泥硯銘汾水澄泥絳縣製賈氏譚録詳紀事建武庚子分明識髙似孫謂是唐澄泥硯而銘有建武庚子字考唐時無以建武紀年者晋齊北魏西燕雖用建武紀年皆與庚子不合後趙石虎紀年雖合而與文事不相近惟漢光武建武十六年係庚子是此澄泥葢漢時物而唐製為硯耳海馬飛魚出波際佐我文房之五藝揮毫祗欲書亥字宋澄泥石圅硯銘石圅同舊具體而微舊有石圅硯已題銘入譜其欵識銘辭並與此硯同惟舊者寛廣較此約贏寸許博亦多三之一銘辭復同孰辨是非乾坤闔闔無縫天衣泥而成石殊塗同歸文以載道事在人為宋澄泥括囊硯銘言出諸口兮語書諸手兮君子之樞機可不慎坤四之守兮製硯者義或於此取兮然予恐過之弗聞而戒仗馬之醜兮澄泥硯四銘八稜仿唐今而非古也環以石渠亦素亦雅也起墨益毫是其為寳也物聚於好去聲實吾懼所也右倣唐八稜石渠硯河出圗馬負之闡先天興蓍龜陶為硯刻墨池事有朔文在斯勑幾浴徳無不宜批風抹月則已卑右河圖硯井田之行豈可復圖之於硯筆耕卜雖非我事厪彼篤戴勝降桑靈雨霖正念之哉望蒿目右井田硯趙宋吕字世鮮存漉之煅之製可論如金其堅如玉温琢以三台近紫垣墨卿偶命怵心源泰階六符豈易言右六符硯宋蕉白文瀾硯銘硯者研理存焉質蕉白號文瀾波不因風石也為紈雖觀水之有術要溯流而窮源願含英咀華者毋徒侈為風雲月露之篇舊阬蕉白𤓰瓞硯銘𤓰緜瓞蕚以成也性相近習逺情也濡墨摛毫貴研精也吾於𤓰瓞之硯不徒緬周雅詠民之初生也宋澄泥石圅硯銘瓦以漢稱逺或偽成泥以宋澄近而可徵逮兹其三石圅製同叶寓法化報三身義精况鈐凡夫寒山用經憶彼隠處我曾偶停片雲之軒水綠山青想其揮毫益助性靈而何賁然懋勤是登擬詢陶泓何以貢情宋端石印川硯銘月印千川率稱禪理一以貫之豈殊斯旨活眼對照非彼非此徒以品佳置於綈几臨池則恧形似而已御製文二集巻三十九
