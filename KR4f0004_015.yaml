body:
  text: 碑文聖德神功碑洪惟我聖祖仁皇帝統承三聖之謨烈奄奠萬方撫臨天下六十有一年實兼開創與守成之事爰自綏靖南荒翦除三蘖而後惟務以深仁厚澤淪浹中外俾涵泳優遊四方從欲而勵精圖治悠久無疆晚嵗之政尤欲申嚴庶務以正官方糾詰敝民以清禮俗以明作濟惇大以節制保豐亨故我皇考嗣承丕基凡誠孝中正寬仁之大原無一不與聖祖同揆至用人行政規模則稍有變通以求繼志述事之盡善惟皇考神聖之姿默契聖祖是以膺付託之重任而宏開夫萬年有道之長惟皇考誠敬之德簡在帝心是以致嘉祥之駢臻而即驗於四海於變之盛雖十三年之憂勞無一日一時少釋於宸衷而所以貽我子孫臣庶億萬祀之樂利無窮者誠如天地之無不幬載也皇考世宗敬天昌運建中表正文武英眀寬仁信毅大孝至誠憲皇帝聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝第四子也母孝恭仁皇后在妊時夢月中仙娥授以神子既覺而誕生皇考皇考幼而徇齊天性仁孝聖祖恩眷踰常八嵗時患腹疾皇祖方巡狩塞外聞之遽馳歸一晝夜而至其篤愛有如此者奉事庭幃數十年深愛慤敬無一言一動不允當皇祖之心每語衆稱為至孝先是舊皇太子贈理親王之未得罪也皇考小心承順恪盡臣弟禮而王恐聖祖眷愛日隆有妨於已遂至以非禮相加皇考每順受之而剛正之氣亦不為少屈律巳則篤謹有加焉及嵗戊子王以罪廢居常進諛者多背離相忌者率傾陷禍且不測皇考多方保護以悃忱惻怛感慰聖祖之心而曲為王解始獲矜容王乃愧悔自失東宫舊屬咸灑泣驚頌聖德方是時聖祖違和又以允禔允祀等屢作非彞以干天怒居常鬱鬱病勢增劇皇考竭心孝養凡百躬親靡晝靡夜逮四閲月聖躬乃安及理親王再廢聖祖春秋益髙諸王中私懷覬覦者往往矯飾名譽私樹黨援而皇考絶不以一事自表異友于兄弟均平如一莫不同其憂喜軫其疾痛其自取咎殃者亦不避嫌疑力為調劑自內外族姻左右大臣以及近侍宿衛無一人往來親密者聖祖用是灼知聖德淵懿大義明著無黨無偏足以膺宗社臣民之付屬也及遭大故水漿不入於口以乾清宫東廡為倚廬素服齋居養心殿三年如一日每遇朔奠殷祭及獻食壽皇殿悲不自勝哀動左右躬送梓宫安葬景陵仁壽皇太后升遐哀誠一如初禮凡太廟郊壇必躬必親致齋致慤觀者罔不肅然起敬每遇水旱之祲輒愀然曰上天譴責朕躬命直省旬月奏報雨雪苟應時則喜動顔色或過期即減常膳元年五月京畿旱虔禱於宫中自晨至夕不膳霖雨立沛蓋皇考深念所任受於皇天暨列祖者惟茲天下之蒸黎故休戚相關如保赤子而民之所以安者存乎政政之所以舉者存乎人故宵衣旰食日有孜孜尤以是為先務焉念民所苦病者莫如賦重而刑濫有司遇災祲而不恤巧法侵漁或惰侈以自耗致民俗之日偷逐姦利縱淫樂聚徒鬭狠若是者皆盜賊之源也皇考即位之元年即大免直省逋賦陕西甘肅二省以軍興運餉其所供賦稅無嵗不蒙豁免七年至九年輪蠲各省賦稅有差自元季張士誠據蘇松嘉湖陳友諒據南昌袁瑞與明太祖苦戰於江東西橫斂以給軍終明之世故籍未改特命永除數郡浮糧著為令典凡直省報災朝聞發不待夕夕聞發不待朝每語近臣朕蠲租發賑如救焚拯溺猶恐災黎之鮮有濟也彼視民之傷與已若無與者獨何心哉常念水土為農田之本而救荒之政莫要於興工築以聚貧民遂博求海內水利修川防俾各省河渠湖澤嵗久或淤塞為連州比郡農商害者咸開濬之京畿則命怡親王大學士朱軾經理水利營田官開水田數萬頃聽民自占者不與十餘年中費數百萬貧民皆取食焉洪澤湖都受淮流廣數百里恃髙家堰為關鍵以束淮而潄黃下河七州縣民命繫焉發帑銀百萬盡改石工浙江松江海塘經潮水屢漲修築相繼費數百萬濵海之民始得安袵席無為魚之患往者封疆大吏好因事以自為功有司承迎以速進取之路凡有興作及賑災動稱捐助或曰小民樂輸皇考再三諭禁以蘇民困州縣巧取有禁門關苛索有禁而民隱之萬難上達者莫不在皇考洞鑒之中每遇重囚即深厪睿懷屢飭法司必三覆奏好生之德發於不能自已者如此念刑罰所以濟政教之窮必修禮正俗乃可清其源詳注聖祖仁皇帝諭旨十六條親製勸農種樹之詔御書刋示四方命九卿詳定貴賤服色兵民婚喪禮制實舉孝義貞節分遣御史巡行直省常恐所任非人則雖有良法美意德難下究教不虛行故搜揚俊乂立賢無方自唐宋以後秩祿不足以贍庶官不肖者各以他途取之用此苞苴盛行不可遏止皇考於外省督撫以及州縣親民之官各賜養廉較正祿數十百倍其在京師卿二則賜雙俸司旅並給飯費雖間曹職官亦準俸銀之數賜之廩穀而寡廉鮮恥巧取以殃民者法亦有所必行焉左右輔弼及封疆重臣忠勤夙著猷績彰聞則推誠倚任坦然不疑俾得展盡底藴而常戒以面從責以啓沃優容寵賚十百於尋常其有恃功驕蹇植黨營私者則法立誅必而忠直善良即時有失誤屢被譴訶卒保全其終始建賢良祠崇祀纍朝碩輔其餘著勛伐效命疆場者皆録用其後人又念士者民之表儀而庶官所由備也故廣其登進之途而董之以教元年命郡州縣學官必用正途二年躬詣太學頒訓飭士子文四年命直省督學舉英才八年舉通曉性理舉人八人並賜進士各省會俱特建書院取之之廣恤之之周如此兵者民之衛藩而國威之所蓄也故勤其搜簡之政而曲體其情命提鎮考核將校必察其訓練拊循之實毋得循私提鎮之優劣一以整飭將校訓練行伍和輯兵民定之士伍則正糧之外别發帑銀俾軍帥營運以恤其婚喪蓋皇考蒞官馭將勤民養士整軍恤衆使文武並勵中外相維制防曲盡如此重念八旗乃國家根本內外大小臣工士民軍吏所觀式也故所以教之養之取之任之察其情而優恤之者尤詳且備焉元年即命舉人庠生之服公事者各還家專力於學誦設八旗官學各就其方簡其士之秀異者而官教之命諸王察舉孝弟守分力學者以承平日久生齒愈繁取八旗餘丁四千八百人為教養兵嵗給十七萬有竒自五旗諸王不得以旗分人員多供差役擅治其罪下此正副都統及參領佐領不得苛索外吏財物竊嘗審究皇考治法之源流然後古聖王所為以天下為一家以中國為一人者其規模氣象始可得而見焉皇考自宗親戚畹勳舊以及八旗之士衆自京師畿輔以及九州四海之軍民惟恐其疾苦之蔽壅禮俗之衰惡一如一身之中毛髮有觸而必動雖外藩蒙古皆如家人父子其職官並豫俸祿兵衆咸給月糧土默特守臺站人嵗時有賞用此凡有征討外藩效命屢諭蒙古王貝勒宜愛民惠下其子弟之俊秀者或在內廷教養之賜安南以隙地減朝鮮琉球貢物厚朝鮮俄羅斯國人之賞賚給琉球來學者歸國之道齎不獨澤流方外而聲教亦漸被於遐荒十有三年之間宵衣旰食無晷刻之寧不謂天下已治萬民已安而少懈夫朝乾夕惕之皇衷故以事天之誠敬昭事百神而神無不格以法祖之仁孝錫類萬物而物無不孚至於孔子德配天地尤加崇禮王爵之封上及五世跪獻之禮首著上丁詳定配享先賢增置五經博士皆前古所未有也教養宗室而寬其拘禁者自登宸極即封理親王子宏晳為郡王而於理親王未降一旨未遣一使曰吾不欲受其拜並聞感恩之言也錫賚頻仍惟命內監傳送且教以詢所從來勿令告以上賜及王薨躬臨哭奠追贈理親王命宏晳進襲親王爵分封供具特厚怡賢親王之喪躬臨哭奠哀慟久而不已自戊子年後允祀允禟輩莫不妄冀非分結黨樹援嘗觸怒聖祖聖祖降硃批諭皇考及諸王云朕與允祀父子之義已絶及皇考嗣位重念兄弟情且知彼明敏能任事爰命輔政加恩信用冀以感悟其心密封皇祖旨於內閣不以宣示外人乃允祀不但不改悔且心懷怨望怙惡不悛允禟在西寧多為不法顯悖臣禮皇考雖申告中外明正其罪絶其屬籍而兩人猶得以天年終罰弗及嗣自御極以後瑞應駢至日月如合璧五星如聨珠黃河之清自陜州至邳宿二旬有五日不變鳳集麟生慶雲甘露靈芝嘉穀之祥不可勝紀皇考每見奏章必深自警惕咨戒臣工苟德政之不修雖天瑞不足恃也彰明人紀更定刑章凡繼母虐殺前子以所生子抵法無故杖殺僕婢者分别重輕治罪訪明太祖本支裔孫襲封侯爵以承其宗祀自明初紹興有惰民靖難後諸臣抗命者子女多發山西為樂户數百年相沿未革一旦去籍為良民命下之日人皆流涕自準噶爾擾邉聖祖仁皇帝宿兵西北陲以保舊屬諸蕃青海之平也彼又納我叛臣雖屢加訓告襲盜不休故定議濯征為一勞永逸計及十年大破之於喀爾喀之地邊將爭言宜乘時進𠞰皇考念彼逺處外夷武不可黷乃遣使諭告決意罷兵西南洞苗自古為附近州縣之害自平定廣烏蒙古州歸義開地二千里而時戒邊疆大吏為善後之謀敬惟皇考自始至終所以蒞官勤民教士恤軍安內馭外者無不體之以誠本之以孝用之以中持之以正育之以仁撫之以寬與聖祖仁皇帝若合符節而更化砥俗使天下遵道遵路如優恤宗室而禮度必謹於防維愛禮大臣而法禁必行於貴近搜羅才俊而甄别不漏於昏庸教育士民而捕詰獨嚴於敗類蓋非此不足以移文恬武嬉隂私交結之風革吏蠧民偷險戾姦欺之習未嘗非聖祖晚年整肅官方矯除薄俗之遺意也是以數年之後蒸然丕變外自郡州縣吏私餽不行於大府監司內而閣部院司臺垣不敢以已事干外吏倉庫侵蝕者所在充盈庠序鮮囂陵之士門關無苛索之兵蠧吏散朋姦民徙業孔子所稱善繼人之志善述人之事者我皇考實克當之皇考即位之元年八月即手書建儲事密封宫廷布告羣臣八年六月聖躬違和特召臣及莊親王果親王和親王大學士內大臣數人入見面諭遺詔大意謂朕夙夜憂勤惟體聖祖之心以為心法聖祖之政以為政因見人情澆薄官吏徇私罔知改省不得不懲治以戒將來故有從前條例本嚴而改易從寬者乃原議未協朕與廷臣悉心酌定可垂永久有從前本寬而改易從嚴者本欲俟諸弊革除之後酌復舊章乃知皇考聖智天縱灼見聖祖不言之意以就前功而隨時取中用建民極蓋聖祖時瘡痍初復非遍覆包涵不足以厚生養而定民志皇考繼承之初則政寬而姦伏物盛而孽萌非廓清釐剔大為之防其流將溢漫而不可以長久兩朝聖治正如天地四時之運相推相代以成嵗功先儒所謂雖有改制之名而無變道之實者此也皇考聖意原欲大加整剔使弊絶風清人人皆知理法而後布恩施德以培國家萬年元氣昊天不弔未假之年使十有三年憊精勞神之聖心猶未釋於龍馭上賓之日而廣大欲沛之澤不及旁流汪􅐮以遂皇考之初志而親見黎民遍德之休也嗚呼痛哉雍正十三年八月己丑皇考崩聖壽五十有八乾隆二年三月庚寅葬泰陵小子謹拜稽首而獻頌曰惟天行健運而不息隂陽甄陶萬殊一則惟聖時憲建極宜民其用曷先曰義與仁當豐而亨蔀亦潛滋既大且豫必戒其隨皇帝繼序履盛持盈日暄雨潤雷動風行皇天所付惟此嘉師四聖容保豫承豫依曰豫作君在厚其生其災其害我躬是膺曰豫作師在正其德其薄其頑我躬之忒設監置牧惟民之安苟非其人慮為民殘心膂股肱信賢不二庶司百吏開誠以示片言必録小善必登耳提面命無或荒寧官針之敗交以賄成賢姦可易白黑可更植黨背公譸張譎誑上下相蒙斯民曷望重增秩祿用絶苞苴私塗既閉邦經可臚旌廉擢能俾欽俾慕誅恣懲貪俾愧俾寤九官承式庶事寡愆大府整躬百城晏眠敬刑明罰亂獄無滋嵗會月要出納無欺救荒拯溺家沾户浹增防浚川役均廩給興禮明教以示之則禁暴詰姦以除其慝煌煌帝京政肅風清豪強屏息姦宄潛形博戲鬬囂鶉茵雞柵竒技淫聲兒童莫識近自畿甸周於海隅山行野宿刁柝無虞曷占政成官稱其職曷占民安鼓腹作息皇帝致治身為表儀由中逹外誠一無私郊廟明禋洞洞屬屬闕廷涖政雍雍穆穆大孝備矣昭哉嗣服眷舊親賢久而彌篤近承德意逺樹風聲父勉其子弟祗其兄未明求衣日昃不食一日萬幾是匡是飭天現其光珠聨璧合地效其靈河清川翕畝穗叢岐陵芝結紐鳳􅔘麟逰近在郊棷皇帝曰咨毋安毋豫我君我臣惟戒惟懼遇災而懼災可為祥以祥為常志將日荒重道崇文德心是懋張皇六師武不敢究天衢如砥萬國朝宗開我明堂四裔來同盛德之氣生物之元於時為春在人曰仁尊嚴之氣物以凝閉於時為秋在人曰義巍巍聖皇是則是效雨露雷霆罔非至教德厚於地智崇如天儀我後昆億萬斯年御製文初集卷十五
