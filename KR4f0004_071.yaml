front:
  text: 欽定四庫全書御製文二集巻三十七
  hash: sha256:6cd107a2c0062fd723af6cdb57ef50512b9ff50bbb324b96b47eacac2e10d501
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_071-1a, image: WYG1301/WYG1301-0507a.png}
body:
  text: 頌恭祝聖母皇太后八旬萬夀鴻稱積慶頌謹序臣聞思齊顯徳徽乃播音繁祉介眉慶宜歌頌維天保之福孔固以莫不增由嘉樂之佑自申必得其夀絫萬萬而推軒紀旋八八以暢伶筩列纂組以成文效臺莱而稱祝恭惟聖母崇慶慈宣康恵敦和裕夀純禧恭懿安祺皇太后陛下承天資始斂福用敷俔摯纘莘駕姒任之毓粹膴原正域本嫄簡之儲祥俾夀而臧昭徳之致日星以為紀嵗以為量惟曰至于萬年子孫其逢吉身其康彊推而放諸四海兹者苞符介祉圖筴衍禔並悠久于兩儀屆延洪之八袠年符丕冒運際􅊖新月陽則庚兆大横日徳則酉占留熟駢彰夀牒疊奉嘏詞賦沿古詩之流五旬俶啓頌集羣經之液六甲環週洎乎七十萬夀之年祥呈合璧爰有六十三章之作體演聫珠爾乃吉祚大来熙臺共上屯豐濛汜畮服紈牛早逺渥洼道通縑馬耕有餘者三九扇景濩甘蠲惟正者萬千鏐租漕糈三依綵鷁標水誌以恬瀾四奉和鸞漲沙亹而鞏軸接析津之星次海近添籌寫岱嶽之真形山基積夀廣途銓士彚吉茅茹特榜興賢作人棫樸槐街鄉禄越百嵗以扶鳩棘院耆儒鍚乙科而鳴鹿門旌人瑞翁媪齊登書授民時羲和增録凡皆寅循慈訓九垓布大順之庥實惟申鍚景禧六幕蒸太和之氣况復純嘏彌厚戩穀罄宜秉莊敬以日强茂養恬之時引松齋留憩頥凝性以加康蘭塞迴瞻喜和神之益健膝前子帝䕃越六旬庭下孫曾支蕃五世負黼扆而臻三紀萃寰瀛以奉一尊愛日方升春暉久煦每當嘉辰令節宴侍顔和荷承温語之有加謂可禮文之從簡言不稱老敢紓鞠􅎽之䖍命滋益恭彌載恩勤之徳且夫髙堂華髮竸羡萱榮前席綵衣艷稱莱戯適大年之眠食事美含飴羅問旦之兒孫人夸㸃頷此在一門有喜便成家慶之圖矧乃六合同春罕覯史書所紀予小子並受其福故能以孝事親我聖母長發其祥是謂承天之祜慶逢祝嘏忻展呼嵩敞都福之庭璇宫賁采崇歸善之典璆冊肇尊寳甕八鴻春盈瑞露金函四果夀普慈雲擊壤聼歌㪺衢稱􅕌筐篚備陳庭之實絲綸宣鍚類之恩嘉予九有臣民共兹大慶外逮四裔君長莫不来同盛禮咸昭上儀具舉躋一世於仁夀無疆惟庥合萬國之歡心有秩斯祐臣愉殷酌斗忭溢循陔十六字義繹鴻稱億萬年詞申燕喜結纒綿之至性緒倍抽絲迓曼羡之貞齡繡徴添線鸞璈八疊王母歌介夀之章雲錦七襄天孫獻長生之籙兆綏洪算載晉長言作頌曰昊縡凝命誕畀我大清累洽重熙率俾紘瀛厚載光大至哉坤元登虹附樞亶毓祥源肆台小子依暉即阼尊以聖母養以天下叶樹徳孔峻納禄式固夐乎煒而三五靡並萬福来崇一人有慶右第一崇慶章維聖母之慈以篤藐躬鞠育顧復自我童䝉六十年于兹與日俱長叶尚迪懿訓聿臻大同夙興瓊闈其曷敢不宵衣分甘頤席其曷敢不旰食叶蘉哉負扆惟日孜孜佐歡適豫顒副翼貽宣昭中外維聖母之慈右第一慈宣章鴻化奕奕徳音洋洋亦既康止匪居匪康掖輦行慶以巡四方夀相臺懐天中嵩洛齊魯東奄呉越南宅叶陪京甸服及河喬嶽恵綏萬民慶賞乃作睿顧以懌而康而安湛恩既申祝頌闐歡右第三康恵章安土敦仁坤輿廣生理大物博蕃廡盈寜秋弛輸秸夏貸税畝藏富在民財可以阜數逾千萬推澤敦厚朝陽翽羽中沚菁莪有孝有徳式舞且歌以和召和乃大和㑹調幕登臺兆民永頼右第四敦和章郅福垂裕乃以民寜長之養之啿啿羣生逰扵化宇皇之人多夀其爾有位國之耆耉或禄成均或續賢書或偕期頤綽禊表閭三元甲子循環逓嬗維臣庶介釐維聖母鍚羡合萬萬人奉萬萬算右第五裕夀章猗歟純禧同天所燾昔定武功粤晉大號久底敉寜文同五譯馬貢龍騋雁臣玉帛戊巳告豐畋田宅宅一尉一候誕受方國維徳之純膺禧單厚逺至二萬里奔走恐後自痕都以東咸徕獻夀右第六純禧章周銘有言惟㳟則夀昭哉聖母徽柔是篤叶課晴問雨心勩占農率作蠶事分繭稱絲效功暢春祁幄夀康莘宫端居慎動示榘表沖恪秉淵懿克勤克儉彼哉明徳徒飾衣練彤史書型莫窮紀撰右第七恭懿章全徳胥彰顯名丕揚茀祿多益慶辰迎長儀備禮洽彞典何加搢册東朝隆以苕華令善髙厚莫贊一詞吉語臚實上祝安祺其安維何如彼南山其祺維何福海大環引申繼續京垓紀年右第八安祺章慈寜宫頌懿懿慈寜乾清宫右歴代敦崇以奉文母昔實單檐今易重構叶申無方養祝無疆夀三大朝禮率羣辟公觀瞻斯協慶忭攸同熊熊丸丸實實隆隆左平右墄納陛惟中嵗在重光月惟陽復八袠爰開萬年永卜五世曾元一堂雍肅曷其有極介祉景福五福頌有序寜夀宫後曰景福宫我皇祖奉孝恵皇太后所居也余既豫葺寜夀宫為歸政後燕憩之所而景福宫則仿建福宫中静怡軒之制鼎新之軒有屏嘗撰五事箴掲之以代銘座斯宫義取頥養實惟五福為宜夫五福世所艷稱顧昔人無闡之者爰頌而列諸黼扆苐考洪範五福傳疏或分詮或遞釋無所専主余以為夀富康寜及考終命皆受之於天而好徳則修之於人玩五皇極之辭曰予攸好徳汝則鍚之福與此互相發明中庸言位禄名夀必推本於大徳足為五福主徳之證而正䝉所云徳者福之基福者徳之致尤深切而著明余故於攸好徳之頌詳暢厥㫖然帝王之福乃天下之公而非一身一家之私其徴自與常人異誠如所期信為備福余益惟敬修徳以迓天庥而弗敢期其必箕疇凡九極建惟五斂時五福其目未譜於九詳焉夀為初祜華封所作麥邱所語唐堯則辭齊景則喜叶聖弗聖分於斯可覩景福之宫肇我皇祖竹苞松茂以養聖母叶嵗久重葺倦勤擬居叶作此屏扆五當其數叶衍繹範言頌是曼夀叶詩引昌黎敢怠永久叶韓即用句右夀國君大夫問富答殊有天下者奚問答諸既艱問答其富若無然亦有焉乃在民乎宣尼正對萬世帝模省力薄賦猶可勉圖時若雨暘屢豐難期叶是用危懼敢詡尊居又若求材常若不足叶艱致者多詎曰金珠菟裘豫營勒此屏辭叶設誠符望肩缷心娯右富皇清開國承運奉天宅中建極敷鍚八埏兹百餘載將萬斯綿三聖繼承謨烈丕宣藐予小子佛時仔肩治圗康寜夕愓朝乾愛民祈嵗察吏求賢雖有梗化弗致蔓延九州安内萬里拓邊幸未隕越敢為躗言八旬有五擬兹引年敬之一字用作心傳右康寜福何由生端在乎徳徳復在好人我胥棘顧名思義行道有得然殊吉凶原道言憶吉則徴善凶必召慝應好其善樂乃無射五福之四賅彼四則皇極敷鍚無好必斥作汝用咎禄賢是篤叶五九相應訓君尤亟勵以多年子云敬式垂老弗諼蘄告方来叶右攸好徳踐阼之初炷香告天設䝉洪庥歴六十年便當歸政以授後人豈圗逸豫有願扵中叶於穆皇祖幼齡居尊六十一載化被海壖小子廿五繼體乘乾敢同祖厯耆耋况臻新兹景福爰待即閒存吾順事横渠銘焉九疇所云五福冀全然未敢必敬俟天恩右考終命刻絲三星圖頌箕疇五福居一斯夀富即禄也繼而為偶曰夀曰禄資福以受必有司焉麗天拱斗旭日和風松蒼花茂叶境乎仙乎神霄擕手相好天福垂黻佩玖司祿抱子肫然慈母六星惟夀如現扵酉嶽嶽彬彬紫垣三友鍚祉延齡佑我九月於萬億年視此絲綹
