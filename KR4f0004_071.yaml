  text: 欽定四庫全書御製文二集卷三十七
  hash: sha256:48865a9d1b3d27e09824cf47d4553ba6fe536cbfe815cc1649844d5bec9d750e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_071-1a, image: WYG1301/WYG1301-0507a.png}
body:
  text: 頌恭祝聖母皇太后八旬萬夀鴻稱積慶頌謹序臣聞思齊顯德徽乃播音繁祉介眉慶宜歌頌維天保之福孔固以莫不增由嘉樂之佑自申必得其夀絫萬萬而推軒紀旋八八以暢伶筒列纂組以成文效臺萊而稱祝恭惟聖母崇慶慈宣康惠敦和裕夀純禧恭懿安祺皇太后陛下承天資始斂福用敷俔摯纘莘駕姒任之育粹膴原正域本嫄簡之儲祥俾夀而臧昭德之致日星以為紀嵗以為量惟曰至于萬年子孫其逢吉身其康強推而放諸四海兹者苞符介祉圖策衍禔並悠久于兩儀屆延洪之八帙年符丕冒運際􅊖新月陽則庚兆大橫日德則酉占留熟駢彰夀牒疊奉嘏詞賦沿古詩之流五旬俶啓頌集羣經之液六甲環周洎乎七十萬夀之年祥呈合璧爰有六十三章之作體演聫珠爾乃吉祚大來熙臺共上屯豐濛汜畝服紈牛早逺渥窪道通縑馬耕有餘者三九扇景濩甘蠲惟正者萬千鏐租漕糈三依綵鷁標水志以恬瀾四奉和鸞漲沙亹而鞏軸接析津之星次海近添籌寫岱嶽之真形山基積夀廣途銓士彚吉茅茹特榜興賢作人棫朴槐街鄉祿越百嵗以扶鳩棘院耆儒鍚乙科而鳴鹿門旌人瑞翁媪齊登書授民時羲和增録凡皆寅循慈訓九垓布大順之庥實惟申鍚景禧六幕蒸太和之氣况復純嘏彌厚戩穀罄宜秉莊敬以日強茂養恬之時引松齋留憩頥凝性以加康蘭塞回瞻喜和神之益健膝前子帝蔭越六旬庭下孫曾支蕃五世負黼扆而臻三紀萃寰瀛以奉一尊愛日方升春暉久煦每當嘉辰令節宴侍顔和荷承溫語之有加謂可禮文之從簡言不稱老敢紓鞠􅎽之虔命滋益恭彌載恩勤之德且夫髙堂華髮竸羡萱榮前席綵衣艷稱萊戲適大年之眠食事美含飴羅問旦之兒孫人夸點頷此在一門有喜便成家慶之圖矧乃六合同春罕覯史書所紀豫小子並受其福故能以孝事親我聖母長發其祥是謂承天之祜慶逢祝嘏欣展呼嵩敞都福之庭璇宫賁采崇歸善之典璆册肇尊寶甕八鴻春盈瑞露金函四果夀普慈雲擊壤聼歌㪺衢稱􅕌筐篚備陳庭之實絲綸宣鍚類之恩嘉豫九有臣民共兹大慶外逮四裔君長莫不來同盛禮咸昭上儀具舉躋一世於仁夀無疆惟庥合萬國之歡心有秩斯祐臣愈殷酌斗忭溢循陔十六字義繹鴻稱億萬年詞申燕喜結纒綿之至性緒倍抽絲迓曼羡之貞齡繡徴添線鸞璈八疊王母歌介夀之章雲錦七襄天孫獻長生之籙兆綏洪算載晉長言作頌曰昊縡凝命誕畀我大清纍洽重熙率俾紘瀛厚載光大至哉坤元登虹附樞亶育祥源肆台小子依暉即阼尊以聖母養以天下叶樹德孔峻納祿式固敻乎煒而三五靡並萬福來崇一人有慶右第一崇慶章維聖母之慈以篤藐躬鞠育顧復自我童蒙六十年于兹與日俱長叶尚迪懿訓聿臻大同夙興瓊闈其曷敢不宵衣分甘頤席其曷敢不旰食叶蘉哉負扆惟日孜孜佐歡適豫顒副翼貽宣昭中外維聖母之慈右第一慈宣章鴻化奕奕德音洋洋亦既康止匪居匪康掖輦行慶以巡四方夀相臺懷天中嵩洛齊魯東奄吳越南宅叶陪京甸服及河喬嶽惠綏萬民慶賞乃作睿顧以懌而康而安湛恩既申祝頌闐歡右第三康惠章安土敦仁坤輿廣生理大物博蕃廡盈寧秋弛輸秸夏貸稅畝藏富在民財可以阜數逾千萬推澤敦厚朝陽翽羽中沚菁莪有孝有德式舞且歌以和召和乃大和會調幕登臺兆民永賴右第四敦和章郅福垂裕乃以民寧長之養之啿啿羣生逰于化宇皇之人多夀其爾有位國之耆耉或祿成均或續賢書或偕期頤綽禊表閭三元甲子循環遞嬗維臣庶介釐維聖母鍚羡合萬萬人奉萬萬算右第五裕夀章猗歟純禧同天所燾昔定武功粵晉大號久底敉寧文同五譯馬貢龍騋雁臣玉帛戊巳告豐畋田宅宅一尉一候誕受方國維德之純膺禧單厚逺至二萬里奔走恐後自痕都以東咸徠獻夀右第六純禧章周銘有言惟恭則夀昭哉聖母徽柔是篤叶課晴問雨心勩占農率作蠶事分繭稱絲效功暢春祁幄夀康莘宫端居慎動示矩表沖恪秉淵懿克勤克儉彼哉明德徒飾衣練彤史書型莫窮紀撰右第七恭懿章全德胥彰顯名丕揚茀祿多益慶辰迎長儀備禮洽彞典何加搢册東朝隆以苕華令善髙厚莫贊一詞吉語臚實上祝安祺其安維何如彼南山其祺維何福海大環引申繼續京垓紀年右第八安祺章慈寧宫頌懿懿慈寧乾清宫右歷代敦崇以奉文母昔實單簷今易重構叶申無方養祝無疆夀三大朝禮率羣辟公觀瞻斯協慶忭攸同熊熊丸丸實實隆隆左平右墄納陛惟中嵗在重光月惟陽復八帙爰開萬年永卜五世曾元一堂雍肅曷其有極介祉景福五福頌有序寧夀宫後曰景福宫我皇祖奉孝惠皇太后所居也余既豫葺寧夀宫為歸政後燕憩之所而景福宫則仿建福宫中靜怡軒之制鼎新之軒有屏嘗撰五事針揭之以代銘座斯宫義取頥養實惟五福為宜夫五福世所艷稱顧昔人無闡之者爰頌而列諸黼扆苐考洪範五福傳疏或分詮或遞釋無所専主余以為夀富康寧及考終命皆受之於天而好德則修之於人玩五皇極之辭曰豫攸好德汝則鍚之福與此互相發明中庸言位祿名夀必推本於大德足為五福主德之證而正蒙所云德者福之基福者德之致尤深切而著明余故於攸好德之頌詳暢厥旨然帝王之福乃天下之公而非一身一家之私其徴自與常人異誠如所期信為備福余益惟敬修德以迓天庥而弗敢期其必箕疇凡九極建惟五斂時五福其目未譜於九詳焉夀為初祜華封所作麥邱所語唐堯則辭齊景則喜叶聖弗聖分於斯可覩景福之宫肇我皇祖竹苞松茂以養聖母叶嵗久重葺倦勤擬居叶作此屏扆五當其數叶衍繹範言頌是曼夀叶詩引昌黎敢怠永久叶韓即用句右夀國君大夫問富答殊有天下者奚問答諸既艱問答其富若無然亦有焉乃在民乎宣尼正對萬世帝模省力薄賦猶可勉圖時若雨暘屢豐難期叶是用危懼敢詡尊居又若求材常若不足叶艱致者多詎曰金珠菟裘豫營勒此屏辭叶設誠符望肩缷心娛右富皇清開國承運奉天宅中建極敷鍚八埏兹百餘載將萬斯綿三聖繼承謨烈丕宣藐豫小子佛時仔肩治圗康寧夕愓朝乾愛民祈嵗察吏求賢雖有梗化弗致蔓延九州安內萬里拓邊幸未隕越敢為躗言八旬有五擬兹引年敬之一字用作心傳右康寧福何由生端在乎德德復在好人我胥棘顧名思義行道有得然殊吉凶原道言憶吉則徴善凶必召慝應好其善樂乃無射五福之四賅彼四則皇極敷鍚無好必斥作汝用咎祿賢是篤叶五九相應訓君尤亟勵以多年子云敬式垂老弗諼蘄告方來叶右攸好德踐阼之初炷香告天設蒙洪庥歷六十年便當歸政以授後人豈圗逸豫有願于中叶於穆皇祖幼齡居尊六十一載化被海壖小子草五繼體乘乾敢同祖厯耆耋况臻新兹景福爰待即間存吾順事橫渠銘焉九疇所云五福冀全然未敢必敬俟天恩右考終命刻絲三星圖頌箕疇五福居一斯夀富即祿也繼而為偶曰夀曰祿資福以受必有司焉麗天拱斗旭日和風松蒼花茂叶境乎仙乎神霄擕手相好天福垂黻佩玖司祿抱子肫然慈母六星惟夀如現于酉嶽嶽彬彬紫垣三友鍚祉延齡佑我九月於萬億年視此絲綹
