front:
  text: 欽定四庫全書御製文三集卷十二
  hash: sha256:1d71cb854eba323c62a08c5859d91234e468887a99820fbf979b83b73b94f54a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_092-1a, image: WYG1301/WYG1301-0649c.png}
body:
  text: 書事書宋劉清之紀左傳叔向母之事叔向之母賢母也能訓其子為正人又能知叔虎之母美而惡入聲將生敗子惡去聲之而不使見羊舌職劉清之記此事而所注又不明幾不成句令人不可曉宋劉清之撰戒子通録記叔向母一事引左傳云晉叔向之母妬叔虎之母美而不使其子皆諌其母母曰深山大澤實生龍蛇彼美余懼其生龍蛇以禍汝汝敝族也余何愛焉使往視寢生叔虎美而有勇欒盈嬖之故羊舌氏之族及於難云云所注殊不明晰按左傳注不使謂不使見叔向之父羊舌職也又左傳汝敝族也下有國多大寵不仁人間之不亦難乎三語為劉清之刪去前後文義幾至不可曉亦著述者之過也然此誤不在劉清之而在左邱明夫妬婦人之惡德也叔向之母蓋能預見叔虎之母雖美而惡將生惡子以敝羊舌氏之宗然從子之諌使往視職之寢果生虎而羊舌氏之族遂及於難是誠仁人能惡人而有先見之明者矣左氏應謂之惡去聲而不宜謂之妬是誠其浮夸而不實也以致千載之下謂叔向之母果妬焉余不可不正其誣臣等謹按左邱明謂叔向之母妬後之耳食者遂羣以惡名歸之此不核其實也夫知叔虎之母美而將生敗子此好而知惡先見之明也非妬也能訓其子為正人可不謂之賢乎從子之諫而使往視寢可終謂之妬乎由前之言則為知幾而能見患於未萌由後之説則為聽諌而亦自明其不妬乃左氏不曰惡之而曰妬其美是沒其先幾之哲而誣以媢嫉之名此韓愈所以有浮夸之誚也臣等伏讀御製於千古是非賢否剖析精微以叔向母之一善足稱必為之核其實而正其誣使數千載後幽光潛德厯久彌彰所以存人心世道之公為萬世褒貶之法臣等曷勝欽仰恱服之至臣梁國治臣董誥拜手稽首恭跋書孟子對萬章焚廪浚井事辨古人之事而不折衷於理雖有懸河之口炙轂之智徒資蹖駁而無當於事如舜之焚廩浚井是矣夫此事始於萬章而成之於司馬遷遂令後世咸以為必有而余則以為必無亦惟折衷於理而已夫舜大孝者也蒸蒸乂不格姦是瞽瞍與象亦有所回心矣於是帝妻以二女百官牛羊倉廩備則是時瞍與象亦不能使之完廩浚井矣且捍笠而下匿空而出是舜預有防矣有所防非孝子之心也申生且弗為而謂舜為之乎使瞍象果有其事舜亦惟叩首泣血求之於瞍而已求而弗得舜亦必不為申生之勇於從而順命將陷父於不慈所為小杖則受大杖則走舜亦必有以處此矣孟子之對咸邱蒙不曰齊東野人之語乎然則萬章之問亦當以齊東野人之語折之而不答何必費辭後世若劉知幾蘇轍羅泌雖皆見及此而未嘗折衷於理以謂必無其事且費辭余故詳敘而簡論之書光武大破莽兵於昆陽事古今鴻戰以少勝衆遂以定天下之基者有三黃帝誅蚩尤於涿鹿尚矣邃古荒略莫可悉紀我太祖殱明師四十萬於薩爾滸别有著論其一則光武大破莽兵於昆陽也獨范曄所記欲張大其事反有未達事理者是以敘而明之夫莽兵四十餘萬號百萬是誠徑敵也諸將逡巡無定志光武為之圖畫成敗以十三騎出城召兵自將步騎千餘奔敵此其神武勇略為何如既又率敢死者三千人衝其中堅誅王尋遂以大潰敵兵追奔百餘里解昆陽之圍海內響應而漢家之業遂大定然光武所以能如此者亦惟求是於天立志不移用能見大敵以賈勇合衆志以成城耳而曄未言及此也乃稱莽軍驅諸猛獸虎豹犀象以助威此語則失之不經矣蓋自益烈山澤犀象非中國所有雖有虎豹其去人亦逺終不可如牛馬之類畜而馴之驅而使之戰也曄蓋誤謂黃帝教陳熊羆貔貅為勇鋭士之號而遂以為實有其事耳路史之注率已明之或曰田單之用火牛非此類乎曰以田單之火牛益足證虎豹之烏有蓋牛六畜之一束兵於角束葦於尾可聽人為之穴城出牛燃尾使奔牛必向前奔而敵駭此事之所有也虎豹野獸也柙而畜之或可其能如牛之聽人束首束尾乎一出柙必亂奔橫跳或且噬啓柙之人而已上聲軍先自亂其尚能威懾前敵乎豫故笑范曄之不達事理而猶效司馬遷之怪誕紀事嗚呼作史可易言哉𠞰滅臺灣逆賊生擒林爽文紀事語平伊犂定回部收金川是三事皆關大政各有專文勒太學誅王倫翦蘇四十三洗田五是三事雖屬武功然以內地懷慙弗薌其説至於今之𠞰滅臺灣逆賊生擒林爽文則有不得不詳紀顛末以示後人者向之三豫惟深感天恩蒙厚貺次之三豫實資衆臣之力得有所成若兹臺灣逆賊之煽亂乃卒然而起兵出於不得已而又不料其成功若是之易也蓋自康熙二十二年平定臺灣之後厯雍正逮今乾隆戊申百餘年之間率鮮丗嵗寧靜無事而其甚者惟朱一貴及兹林爽文朱一貴已據府城僭年號林爽文雖未據府城然亦僭年號矣朱一貴雖據府城藍廷珍率兵七日復之不一年遂平定全郡林爽文雖未據府城亦將一年始獲首渠平定全郡則以領兵之人有賢否之殊故曰事在人為不可不慎也林爽文始事之際一總兵率千餘兵滅之而有餘及其蔓延猖獗全郡騷動不得不發徑兵命重臣則豫遲速論所云未能速而失於遲豫之過也然而果遲乎則何以成功蓋遲在任事之外臣而速在籌策之豫心故始雖遲而終能成以速非誇言也蓋紀其實而已若黃仕簡任承恩初遲矣而豫於去年正月即命李侍堯速往代常青為總督辦軍儲常青往代黃仕簡藍元枚往代任承恩司𠞰賊之事而郡城與仕簡弗致失於賊手是幸也是未遲也黃仕簡任承恩既至臺灣南北互相觀望兩月餘遂至與賊以暇日以滋蔓幸豫於正月初旬值李侍堯入覲即命往代常青為總督而命常青代黃仕簡又隨命藍元枚代任承恩是以郝壯猷於三月初八日自鳳山棄城敗歸立即置之於法常青適於初九日到郡整頓兵威屢挫賊鋒郡城得以無失使常青不即到則郡城必失守仕簡或被賊獲皆未可知是始雖遲而實未為遲也既而常青祇能守郡城藍元枚忽以病亡是又遲矣而天啓豫衷於六月即自甘省召福康安來熱河授之方略八月初即命福康安海蘭察率百巴圖魯及各省精兵近萬往救諸羅是又未遲也常青雖固守郡城未能親統大兵往救諸羅藍元枚正籌會𠞰旋以病亡又幸豫於六月內早令福康安來覲熱河即命于八月初二日同海蘭察率巴圖魯侍衛章京百餘人馳赴閩省並預調川湖黔粵精兵近萬人分路赴閩維時諸羅被圍日久糧餉火藥道梗不能運送若非事是天啓豫衷及早命重臣統徑旅前往幾至緩不濟常青等救諸羅雖遲而豫所辦亦未為遲也福康安等至大擔門開舟阻風風略定而啓行又以風遮至崇武澳不能進是又遲矣然而候風之際後調之兵畢至風平浪靜一日千里齊至鹿仔港是仍未遲也福康安到厦門于十月十一日自大擔門開船被風打回十四日得風駛行半日又以風轉遮至崇武澳停泊似覺遲滯然當此候風之際四川屯練二千廣西兵三千俱至而風亦適利遂于二十八日申時放洋至二十九日申時兵船齊抵鹿仔港千里洋面一帆直達其餘之兵亦陸續配渡福康安率此生力之兵旬日內頓解諸羅之圍繼克賊巢生擒逆首是未渡以前若遲而計其成功又未可謂遲也夫遲之在人而天地神明護佑每以遲而成速視若危而獲安有如昔年開惑論所云者豫何修而得此於天地神明之錫祉哉如是而不益深敬畏勤政愛民明慎用兵則豫為無良心者矣豫何敢抑又何忍乎夫用兵豈易言哉必也凛天命屏己私見先幾懷永圖方寸之間日日如在三軍前而又戒掣肘念衆勞且豫老矣老而精神尚健不肯圖逸以遺難於子孫臣庶藉以屢成大勳此非天地神明之佑乎亦豈非弗失良心得蒙天鑒乎福康安等解圍殲賊以及生擒賊渠諸功績已見聨句之詩之序兹不贅言獨申豫之不得已用武又深懼用武之意如是以戒後世占驗家以正月朔旦值剝蝕為兵戈之象逺者固無考自漢至明屢逢其事然亦有驗有弗驗元旦日食自漢迄明有四十七其本係政治廢弛及僭竊偽朝無論已如唐之太宗宣宗元旦日食其年俱寧靖無事至宋仁宗四十餘年之中元旦日食者四最後嘉祐四年亦無事此其弗驗者也惟寶元元年元昊反康定元年元昊寇延州皇祐元年廣源州蠻儂智髙寇雍州又元代世祖至元二十九年元旦日食是年廣西上思州土官黃聖許結交趾為援寇陷忠州江州及華陽諸縣此其有驗者也若昨丙午可謂有驗矣以豫論之千嵗日至可坐而致剝蝕亦可笇而定也既定矣其適逢與不逢原在依稀戃恍之間且亦乏計預使之必無也若使之無是為詐也不惟不能避災或且召災故史載宋仁宗朝第二次康定元年春正月朔當日食司天楊惟德請移閏於庚辰嵗則日食在正月之晦帝曰閏所以正天時而授民事其可曲避乎不許夫日食必當在朔可知古稱月晦日食者多移閏曲避之術耳至於不得已而用兵惟在見幾而作先事以圖遲不失於應幾速不失於不達惟敬與明秉公無私信賞必罰用兵之道其庶幾乎夫行此數端甚不易矣知不易而慎用兵又其本乎凡軍旅事必當有方略之書書成即以此語冠首篇亦不更為之序矣御製文三集卷十二
