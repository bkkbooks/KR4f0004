  text: 欽定四庫全書御製文三集卷十四
  hash: sha256:7e65b6be45a75037cf31bb23f081405c9fac9778bc120e2df26c443ef4ffe89a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_094-1a, image: WYG1301/WYG1301-0659a.png}
body:
  text: 雜著讀史陸賈對髙祖語今古以為竒談而豫以為實有所未臻也夫髙祖之言在重武輕文而陸賈之言在重文輕武乃兩失之豈可獨以彼為韙乎蓋創業之君無不以馬上得之而敗業之君無不以忘其祖之馬上得之以致覆宗絶祀豈不大可畏乎周公之訓成王曰其克詰爾戎兵此即馬上治之之義周公之智顧不如陸賈橫議之士哉後世侈言太平文恬武嬉以致有創業馬上者乘其釁而得之是非陸賈之言為之作俑乎豫之是論作于木蘭行營即向年平伊犂定回部𠞰金川軍書馳至亦未嘗不以馬上治之何曽礙于理政哉且人之身舍勞就逸易去逸服勞難重文輕武是就逸重武輕文是服勞也設耽逸而厭勞寬衣博帶論安言吉動引聖人幾不失其所據而為武侯所譏耶兹故以身之所厯叮嚀示戒後之人其尚思開創守成興替之機以毋忘周公訓成王之語或庶幾乎讀洪範洪範一書為箕子衍神禹之言以誥武王者不惟姬周一代制治之源即萬世帝王制治之源也九疇之敘在君則係於極之建不建在民人則由于訓之行不行蔡沈之言盡之矣而豫獨以為萬世帝王制治之源者何蓋君者民之本也譬之木乎本正而枝自隨故疇雖有九無一不關于為君者之一身一心可不慎乎然豫之所以有會心者固在皇極之建九疇之省而原始要終則在乎第九之嚮用威用矣豫䝉天篤祐得建五福五代之堂其說已見前記兹以六極自省幸而無其五而不能去其一所謂憂也春憂雨之不足夏憂雨之㦯過秋憂嵗之不登冬憂雪之未降無不先時忖度切切于懷至于古稀說之八弊庚子年作古稀說數說前代之弊政有八曰強藩曰外患曰權臣曰外戚曰女謁曰宦寺曰奸臣曰佞幸幸皆無一倣佛者今又閲八年隨時省察不敢自恃其無惟慮或萌其漸未嘗不日惕于懷云時憂其或萌合寰中之萬民時憂其失所所謂先天下之憂而憂者不可究極而後天下之樂而樂者曾無幾希是則此憂不能去而亦不忍去且更不敢去也夫季世之君但知其樂而不知憂以致受大憂而不可救藥者多矣余幸於六極中免其五而得其一則此憂也將拳拳守之而惟恐其失之或者邀昊貺符宿願得歸政之後庶可免此憂乎然更當教子孫體余之憂為憂方將萬世守之庶幾永承天眷是則臣民或可去其憂而為君者終無去憂之道萬世為君者其尚勉守此憂庶幾不致大憂而保後樂尚敬之哉涇清渭濁紀實陶淵明讀書不求甚解嘗不韙其言蓋彼以隱居放言之人則可稽古考經之人已不可而況作君師司政治者乎故于勑幾熙績必不肯置疑似兩可其間而于考經稽古益必求其至當近賦心鏡詩因用邶風涇清渭濁事以詩義觀之則涇清渭濁也而朱注則以為渭清涇濁大失經義夫以者何因也涇以渭濁可知涇本清而因渭濁如左以右纍是左者因右而受纍賢以邪纍是賢者因邪而受纍也伊洛以河渾是伊洛本澄入黃河而為渾流也如是者原不可僂指數而朱子則讀書明理何乃顛倒涇渭之清濁一至此乎然此非獨朱子誤也蓋鄭康成箋本謂涇清渭濁鄭箋云涇水以有渭故見渭濁是康成明言渭濁不言涇濁其以為涇清可知自唐陸德明孔頴達諸人因之沿訛而經意遂失自唐時始因誤解鄭箋而顛倒其說其後入主出奴紛如聚訟益不可考朱子因訛傳訛後人更不敢議其非余細繹以字之義定當為涇之清因渭而濁為是然余亦不肯遂以為是爰命陜西巡撫秦承恩身至二河自甘省入陜省之源辨其清濁今據具摺貼說呈覽實涇清渭濁于是余之疑始解而心始安因命附録承恩之摺于後以志其詳設有人議承恩遵㫖為遷就曲說者可親至承恩所至二河自甘省入陜省之源視之則是非顛倒立辨朕當治承恩之罪不怙過也臣秦承恩上言謹查涇水發源甘肅平涼縣筓頭山東流至長武縣入陜西境又東至髙陵縣入于渭渭水發源甘肅渭源縣鳥鼠山東流至隴州入陜西境又東至髙陵縣與涇會其地即禹貢之渭汭今名上馬渡臣遵奉諭㫖即馳赴該處并泝流至長武隴州等處確加察視查得涇水一道約寬一二十丈不等入陜後并支流一十有四現在桃汛初過水勢漸澄其流與江漢諸川相似渭水一道約寬七八十丈不等入陜後并支流三十有三現在桃汛雖過水勢仍渾其色與黃河不甚相逺至合流處則涇水在北渭水在南涇清渭濁一望可辨合流以後全河雖俱渾濁然近北岸數丈許尚見清泚過此七八里外清濁始混而為一隨傳兩河船户及傍岸居民詳細詢問僉稱涇水係石子底四時常清惟春日雪消冰泮及夏雨暴漲時各處溪流匯集衝激奔騰以致河身渾濁遂與渭水無别十數日水退泥澄仍復清駛如故至秋冬間更為澄徹水底石子一一可數又間遇渭水盛漲倒灌入涇涇口內六七里亦皆渾濁然傍岸處仍係清流渭水係沙底水挾沙行四時常濁從未見有清徹之日並據稱涇河當水靜時可以隨汲隨飲渭河則無論四時必須澄淨然後可飲等語臣隨遣人探試涇水實係石子底渭水實係沙底並于二水急流處各取水澄之涇水一石澄滓三升許渭水一石澄滓斗許臣查勘既確復又恭讀聖諭並取詩意繹之在作者明以潔清自喻言涇水本清自入渭以後不得不合而為濁然其清處自在故下句接云湜湜其沚許慎說文湜湜水清底見若本體既濁安所得湜湜者耶謹按毛亨傳云涇渭相入而清濁異語意渾融初未言二水孰清孰濁也鄭康成箋涇水以有渭故見渭濁雖語意不免奧曲然明言渭濁不言涇濁也是漢以前本無涇濁渭清之說唐初傳本乃以鄭箋內故見渭濁為故見涇濁始欲以濁屬涇陸德明釋文定為後人所改而又云涇濁水渭清水殊與箋意未合孔頴達因之直解為故見其濁而經義愈昧矣然竊揆其致誤之由蓋亦有故漢書溝洫志涇水一石其泥數斗夫一石之水至有數斗之泥誠不淂不謂之濁既以濁歸涇自不得不以清屬渭是以潘嶽西征賦即有清渭濁涇之句而唐人解經亦多因此而誤不知漢書謂其泥數斗者特舉當時所利而言言其沖激之一時也谷風謂湜湜其沚者専取潔清自喻言其澄徹之本然也凡水皆暴漲時無不立見渾濁江漢且然何獨于涇而加以濁名乎查陜西通志載明季修廣惠渠議引古碑云四月閉涇口防濁水淤渠七月唘涇口引清水灌地等語可見涇水當四月後七月前始間有濁時餘則恆清秦漢時河髙渠下引水甚易故利其濁不取其清唐宋後河下渠髙防有淤墊則又引其清而拒其濁渠水為民間衣食之源以時唘閉垂諸貞石千萬人所共遵守以視經生之曲說雷同文士之陳言𠞰襲者洵為確然可據至渭水之濁前人固罕言之然蘇轍詩如衮衮河渭濁外尚有渭水帶沙渾之句轍少逰秦中其明言渭濁見于吟詠者不一斷非率爾操觚又寶雞縣志有云邑南諸川半發源于秦嶺其注漢者清則同清注渭者濁則同濁又渭自隴州石門來徑縣南入岐山境尋其原委無所謂湜湜其沚者而詩顧云涇以渭濁何也等語雖一邑専志未能于涇渭清濁之間詳加考正然以守土者紀其本邑山川亦明指渭水為濁則其言益足徵矣伏思唐人說經類多拘泥總因墨守舊聞遂致有乖經義今就臣所目驗參考碑乘博詢土著居民涇水實清渭水實濁豪無疑義但谷風一詩占畢者童而習之率皆因仍舊解莫有知其非者我皇上萬幾餘暇偶一指示遂正千古相傳之誤臣學殖淺陋無能仰贊髙深紬繹再三不勝欽服所有臣查看過涇渭二水合流處所實在涇清渭濁情形謹繪圗貼說恭呈御覽謹奏御書紀實卷附録讀書明理豈易言哉適書此卷至鄭箋云涇水以有渭故見渭濁句恍然有悟設如於渭字下增一而字或以有字易為入字明曰涇水以入渭故見渭而濁何等直截則其本意易明亦無唐宋以來之紛如聚訟矣千載注疏家似此者亦多矣豈能一一正之擲筆囅然附録于此御製西安巡撫秦承恩覆奏涇清渭濁實據詩以志事一韻二首附録近因詩中用邶風涇以渭濁事玩以字義自當作涇水為渭水所濁解乃朱注則以為渭清涇濁心疑其誤而泥其說者不免耳食因命秦承恩親履二水由甘入陜之源究其實在情形兹據覆奏辨析甚明果為涇清渭濁既詳著紀實文并附録承恩原摺因再成是什以志考古訂訛之意撫臣親履勘二水别分明秦承恩奏稱涇水發源甘肅平涼縣筓頭山東流至長武入陜西境又東至髙陵入于渭渭水發源甘肅渭源縣鳥鼠山東流至隴州入陜西境又東至髙陵與涇會其地即禹貢之渭汭也遵㫖馳赴該地并泝流至長武隴州自甘入陜之源確加察視二水入境及合流處所實在涇清渭濁繪圗具說覆奏涇暫有時濁又稱涇水係石子底四時常清惟春雪初消夏雨暴漲之時各溪匯集衝激奔騰河流暫致渾濁十數日後水退泥澄清駛如故至秋冬更為澄徹渭水則係沙底水挾沙行四時常濁從未見有清徹之日等語渭恆無日清暫賓自非實涇清也恆主合當名渭濁也格物致知要問朱可力行潔矩於為政益當衡鑑明僞清乃誠濁祛濁始真清兩可寧為實一成要正名那能不求解惟是勉躬行筆誤識過昨朝考之題于三月即擬定親書封識清晨連封發交監視王大臣以試諸士可謂謹密之極矣乃今日閲卷諸臣定等呈覽視之其疏題則積古也積古不見于經文乃憬然而悟曰本擬稽古而豫筆誤稽為積監試諸臣見不及此而未請㫖是諸士子之誤皆豫一人之誤也夫試題一字之誤亦何關要然使政之是非人之生死亦如此誤書可乎且豫誤而無人敢言則諸事叢脞其弊將不可勝言矣書以自責用戒後此硃筆之慎也豫更思之稽古固出于典謨但稽者考也稽在人而古在古猶有彼此之分焉至積則聚也稽而聚古于心施于言行播為政治而非徒資博雅之為不亦宜乎諸士子並未言及此是以申而論之然總類飾非文過之辭益重吾過而己耳御製文三集卷十四
