body:
  text: 碑文重建鐘樓碑記皇城地安門之北有飛簷傑閣翼如焕如者為鼓樓樓稍北崇基並峙者為鐘樓其來舊矣而鐘樓亟燬於火遂廢弗葺治朕惟神京陸海地大物博通闤别隧黎庶阜殷夫物龎則識紛非有器齊壹之無以示晨昏之節器鉅則用廣非藉樓表式之無以肅逺近之觀且二樓相望為紫禁後䕶當五夜嚴更九衢啓曙景鐘發聲與宫壺之刻漏周廬之鈴柝疾徐相應清宵氣肅輕飈逺颺都城内外十有餘里莫不聳聴仿挈壺雞人之遺制宵衣待漏均有警焉爰飭所司重加經度基仍舊址構用新製凡柱梲榱􅀈之用悉甃以甎石俾規制與鼓樓相稱經始於乾隆十年閲二年工竣所司請紀之石以式於後夫春秋之義興作必書矧兹樓之成昭物軌定衆志體國諴民著在令典修而舉之以重其事弗可以已也乃為之銘曰鳧氏賦形鼓盪元音體乾作則為圜為金式鎔九乳儆壹衆心啓閉出入罔敢不欽京邑翼翼四方之極洪鐘萬鈞司寤所職鏗以立號協於箭刻巍樓髙絙乗風屴崱昔罹鬱攸久廢不脩咨彼工師審揆其由木母火子長風颼飂鼓之則熾匪藉人謀聿規新制瓴埴比次巧斵山骨輸我匠契尺木不階屹然巨麗㧞地切雲穹窿四際岌嶪崢嶸金觚繡甍鳥革翬飛震耀華鯨不窕不槬桐魚應聲偕是雷鼓鏜鞳砰訇宣養九徳振肅庶類作息以時品物咸遂以器節時以時出治宵旰攸資亦宣堙滯聲與政通碩大龎洪正宫堂皇元氣昭融導和利用警聴達聰億萬斯年揚我仁風闕里孔廟碑文朕惟至聖先師孔子天縱聖仁躬備至徳修明六籍垂訓萬世自古聖帝明王繼天立極覺世牖民道法之精藴至孔子而集其大成後之為治者有以知三綱之所由以立五典之所由以敘八政之所由以措九經之所由以舉五禮六樂之所由以昭宣布列於天地之間遵而循之以仰溯乎古昔雖堯舜禹湯文武之盛弗可及已而治法賴以常存人道賴以不泯詎不由聖人之教哉往代表章尊禮隆重亦越我朝備極其盛當皇祖聖祖仁皇帝甲子之嵗東巡闕里躬謁殿廷盛典矞皇垂於冊府皇考世宗憲皇帝追晉王封鼎新廟貌崇敬誠切瑞應章顯實由心源孚契先後同揆惟聖人能知聖人所由躋海宇於蕩平仁壽之域也朕自養徳書齋服膺聖教髙山景行之慕寤寐弗釋於懐嗣統以來仰荷天庥海宇乂安用舉時巡之典道畿甸歴齊魯登夫子廟堂躬親盥獻瞻仰睟儀展敬林墓徘徊杏壇循撫古檜穆然想見盛徳之形容愾乎若接夫聞聖人之風誦其詩讀其書皆足以觀感興起況親陟降其庭觀車服禮器得見宗廟百官之美富有不益增其嚮慕俛焉而弗能自已者歟朕撫臨方夏惟日兢兢期與斯世臣民率由至道敷教澤於無疆顧徳弗類於衷歉焉恭繹兩朝碑刻之文益以知道徳政治體用一源顯微無間慕聖人之徳而不克見之躬行者非切慕也習聖人之教而不克施之實政者非善學也法祖尊師固無二道用勒石中唐志鑚仰服習之有素思以繼述前徽酬願學之初志云敬系以辭曰皇矣至聖代天覺民天何言哉聖人是申立人之極曰義與仁建治之統曰明與新聖謨洋洋祖述憲章配天廣運應地無疆四時遞嬗日月貞明濯以江漢暴以秋陽泱泱東海巖巖岱宗於穆聖徳疇與絜崇巍乎聖功疇與比隆循之則治彌暢皇風仰稽令辟展敬尊師過魯祠牢炎祚開基宫牆翼翼魯壁金絲蒼檜鬱鬱殷楹鼎彞皇祖皇考聖智達天探脈道要孚契心源豐碑虬䕶巨㮄鸞鶱上繼三五一中允傳顧惟寡昧仰紹先型時邁自東祇謁廟庭洋洋盈耳玉振金聲若弗克見時殫予誠見聖匪艱由聖則難弗克由聖孰圖治安亦既莅止觀止是歎摛辭表志乾隆戊辰菩薩頂碑文盖聞青鴛建刹須彌垂蘭若之規白馬馱經洛下記伽藍之始演龍華於印度輪轉蜂臺廣象教於閻浮鐙傳鵠苑矧擅神臯之名勝尤瞻佛地之崇嚴五臺菩薩頂者叶斗標靈虒陽結秀王舎城之宫闕白玉為階給孤獨之園林黄金布地溯化城之初啓原法像之由來厥有名緇親瞻鬘蓋寳珠五髻燦天半之圎光瓔珞千花示雲中之妙相於是蓮趺玉座號曰真容貝樹銀龕傳為靈蹟我聖祖仁皇帝躬探道妙心㑹真如停仙仗於青峯賁宸章於紫碣廓十方之淨境蓮界增輝振三要之宗風旃林煥彩朕欽承祖徳仰祝慈禧乃因清宴之期特舉遊巡之典鳴鑾靈嶽領物外之烟霞駐蹕精藍接空中之唄讃繞砌則一花寳樹影拂經幢環庭而八水香池聲凝梵磬攬兹聖蹟恍陟金沙顧此禪棲宜新珠網稍更位置益整規模轉初地之幡風重燃慧炬散諸天之花雨再現曇雲庶使薝蔔長芬苾蒭競集狻猊坐處宏開了了之門龍象行時共入如如之室用鐫貞石永煥仙都殊像寺碑文盖聞鐘函九乳輪王開説法之臺樹散千香菩薩啓經行之室鹿野仙人之苑白玉為階馬鳴花氏之城絳雲成蓋是以葱河既渡聿垂象教之荘嚴蘭若繁興共表鴦摩之願力五臺殊像寺者竒標紫塞秀聳蒼巖曼殊演教之場旃檀繞錫方廣化身之所薝蔔垂欄依初地之清涼踞中臺之名勝蓮趺妙相玉毫騰五髻之輝柰苑神工金界煥雙林之色晚漲浮杯之浪般若泉清晨飛補衲之雲梵仙山碧洵安禪之奥境誠選佛之靈區康熙三十七年皇祖仁皇帝臨幸名山鼎新舊刹水晶淨域瞻鳥革之凌霄金粟豐碑仰龍章之麗日迺以六輪風轉四紀星移經壇之紫翠依然畫壁之丹青非故朕以巡方之次選勝招提駐蹕之餘參元止觀溯宣遊於祖武迓景福於慈闈爰發金泉重修琳宇丹楹載啟紺榭還新五色琉璃光暎鴿王之座七重竹樹香霏獅子之園庶幾法鼔宏宣慈燈普照應真五百再留餌菊之蹤沙界三千復見拈華之教用鐫勝果永紀貞珉演教寺碑文宇内名山形勢皆以中峯為尊勝仙佛化現常安立道場此四臺所以環拱中臺而建刹表名獨以是為曼殊演教之區也夫菩薩之欲度脫衆生與聖賢之欲垂教萬世道不同而心則一但菩薩常顯示神變以警衆發心故說法度世無有窮盡華嚴謂東北方有清涼山文殊師利常在其中而演說法文殊亦嘗語舎利弗吾能持一切草樹無心之物變相說法皆令如佛今臺南谷中清涼石舊傳有梵僧說法其上即之則失後人因目為曼殊牀然則大士演教無生滅相法身圎對以不聞聞則無言無說而聲震大千入此寺者真入不二法門矣朕詣寺瞻禮恭誦聖祖御製碑文謂靈秀所鍾中臺尤異故知吉祥萬衆常行道於此爰命重葺而文以證明之望海寺碑文慈氏以性海為萬法之宗故息心淨行必窮極海藏超證圎通乃為深入佛海衆生縁未成熟則皆以津筏濟渡令到彼岸學人勤苦精進以求證入固瞻望覺海而未測究竟者也東臺之峯與寺並以望海名志稱東望大海如波若鏡盖盪雲沃日之觀境固然已朕命修葺此寺因思即境徵名是世諦非義諦也夫佛説國土如恒河沙皆依華藏世界海住國土無量海益無量今踞一峯之頂瞻望一隅遂以是為大觀而即藉以表佛刹之號乎象教流入震旦縁盛於東東臺那羅延窟經云是菩薩住處天龍八部圍繞供養則海㑹即在山中瞻謁曼殊者但當於此尋源東望滄溟猶墮見網昔聖祖駐蹕兹山諸寺皆降御筆而兹寺獨顔以般若原可循本而悟真詮矣普濟寺碑文五臺按方嶽峙而山勢北聳即東西中三臺皆偏近於北惟南臺正居丁位近接闗城于入山為初地聖真應化靈蹟實多盖象教遍四天下大乗氣象獨見南洲於此焉悟之矣清涼氷雪之窟山陽則葩卉欣榮峯攅錦繡琳宫華藏天與莊嚴普濟寺者建自宋時聖祖巡幸特命鼎新歴今六十餘載朕恭奉皇太后瞻禮曼殊重繕完而丹雘之夫能仁度世固將施洽羣有而室利行願廣大出生一切菩薩功徳滅除衆生無量苦惱人天瞻仰廣證善因此普濟之功也至於根極慧命䕶持正法用以祝釐資福上介慈闈下覃黎庶則朕之此舉猶先朝之志焉抑豈擬金閣螺城之幻化飾龍宫玉像之竒觀也哉已事而竣因勒石以紀嵗月法雷寺碑文西臺舊名栲栳山危磴縁雲蠡旋箕織厥狀肖焉五峯各表嘉名若以栲栳之稱之過質也則易之曰挂月唐建法雷寺頺廢久矣康熙二十二年與諸寺同奉勑修復甲子既周金雘改色朕咸葺而新之夫佛固西方聖人其徒行化中國常以西土為歸此間一草一木無非文殊境界雖不必執著西臺尋覓消息而西來大意正可當境有省昔如來唱導羣迷師吼雷音徧十方界文殊立光音天說法魔宫振裂惡道休息然則法雷之震歴劫並應警動又況指月妙諦傳自楞嚴登禮至此不隨在皆可證入乎朕以聖王之法治天下而於法王之法蚤承先訓深契淨因故推演至義為大衆津梁凡欲萬善同歸永資福祐云爾靈應寺碑文北臺髙出四臺之上凌薄斗杓故峯以叶斗名世傳龍窟所在雪罨氷封風勢尤烈臺麓纎蘿微動即其上噫氣鼔怒行者率裹足朕將詣靈應寺瞻禮從臣多以風為解且謂聖祖臨幸未嘗登此朕讀御製清涼諸詩有北臺眺望之作則當日登臨已有確據且致䖍祝釐亦未敢以道險辭也爰約飭騎從盤雲造天炷香金像已周覽八荒窮盡沙界羣山部婁時露頂雲霧中若俛滄海而辨島嶼于時山氣暄融氷雪滋液從者並如挾纊風亦間作殊不如向者所云因嘆險阻之境固時有不常有事可以理斷而數典尤足以證之則一舉足而紹聞之義著矣寺為康熙癸亥年修茲復葺而新之住山禪侣覩朕此行其共發勇猛精進心得大安隠而超悟最上乗乎平定金川告成太學碑文天畀我皇清握乾符俯坤軸函括萬邦悉主悉臣五后纉承創守佑啓亦惟是二三藎臣布徳宣力予曰有先後予曰有禦侮用造我丕丕基罔有蘖芽罔不煦嫗長養游於大當粤有金川娑羅奔者居西蜀桃闗以外界綽斯甲小金川之間向曾從征得受符檄與諸土司齒顧恃其險逺夜郎自大搆釁鄰番各土司申訴封疆吏吏曰蔓之不圗豈其視為甌脱乃請兵籌餉期掃其穴而司其事者或怯縮以老師或􅘀狡以蓄志軍無適從事用弗集予心􅍀然念邊徼之不寧或致增防置戍重勞吾民大學士忠勇公傅恒義同休戚毅然請肩斯任乃命以經畧印益厚集諸路軍芻粟相繼閭閻不驚卜吉於戊辰十一月之三日禡牙以指所征朕親御武帳賜經畧酒以行天日和昶陽氣宣復都人士聽覩聳躍罔不忭喜謂露布之旦暮至也乃歴燕晉驅秦隴越劔閣絶川江凌桃闗之巇徑天射之峻又日討軍實而教誡拊循之均其渴飲飢食同其曉征夜眠至於密贊機務親草奏章則又經畧獨勤其勞而諸武臣有所不知有弗能共者恩威既明士用益勵度番落如户庭過部伍於袵席奸酋授首軍聲大振復以巨礟擊其碉堅碉以摧將俟諸軍之集搗其中堅而番酋騤瞿駾喙稽首請降經畧臣以彼罪重惡極窮而乞生久或渝且偝焉慮不允所請朕惟天地之徳在好生彼蟻潰而鼠駭者毋寧赦而宥之且求降而盡殱之不可謂武矧不足以汚我斧也於是經畧宣朕明㫖登壇受降己巳二月之望日金川平定捷音至京是役也罙入數千里奏凱未七旬而振旅之師多有返自中途未究其用者昔之成功巴蜀如建武之定公孫江陵之降李勢皆在版圗之内無足比數廷臣舉皇祖朔漠皇考青海成例請勒碑成均以示來許夫秉丹誠而運籌決勝永靖荒徼者經畧大學士之功也商可否於帷幄衝石矢於行陣者參贊大臣及諸將士力也朕何有焉惟是體乾元之徳凛佳兵之戒保大定功安民和衆庶幾可以垂則乎乃系之辭曰維天生人類聚羣分凡茲林林孰非我民有羈而縻有誨而諄豈伊異視逺近殊倫守在四夷稽古名言無已用之寓義於仁蠢彼金夷恃其險阻蠶食豨張謂莫我拒不靖不庭侵厥鄰聚駭奔叫呶以干大咎匪棘匪紓玁狁之故我張我伐玁狁之故我師既集賊亦相持匪敢相持懼誅自支兩易寒暑敉功稍稽賊益以狂怒臂當車罪臣既誅以徇我師朕咨於恒汝徃視之朕咨於恒惟汝同徳惟我庶士亦乆于役将茲旗兵羽林神策其勇熊羆其心金石何敵弗摧何攻弗克濟以汝忠奏捷頃刻恒拜稽首臣敢弗既禡既宜師出于京師出于京時惟一陽未逾五旬乃壓其疆前旌獵獵有節煌煌羣畨迺驚謂自天降惟彼攸恃曰良爾吉以偵以諜如鬼如蜮其恃爰誅其類股慄紀律是明戎兵是詰鑄礟攻碉其守以失惟是懼誅潛弗敢出其潛弗出乃旦夕延將齊我軍披其中堅大鞣大膊期目之前彼乃窮蹙乞降悚䖍惟命是從六事永遵除道築壇肉袒羊牽赳赳鍾琪乃度之愬聿抵賊巢開誠以諭攜其二酋軍門親赴悔罪歸誠車塵馬足順斯撫之昭我王度昔也雷霆今也雨露七縱諸葛單騎汾陽曰我相臣于前有光晉爵錫服黼黻龍章速歸黄閣左右贊襄休養生息惠鮮蜀邦我武既揚無疆惟慶御製文初集巻十七
