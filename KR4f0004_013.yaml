front:
  text: 欽定四庫全書御製文初集卷十三
  hash: sha256:cce3100aa6d42f7af732c0ed29c659c39b21541acc0e241be9713a35986df4a0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_013-1a, image: WYG1301/WYG1301-0117c.png}
body:
  text: 後序世宗憲皇帝硃批諭㫖後序皇考世宗憲皇帝天縱聖神精勤庶政四方文武臣僚具摺言事者日或數人人或數事緘封直達御前手自批發或立見施行或咨詢廷議善者溫綸褒豫過者訓戒諄諄隨宜指示悉出睿裁一字不假手於人御極十有三年常如一日粵雍正十年特檢歷年批發奏摺命內廷詞臣繕録校理付諸剞劂彚成數帙輒以頒賜在廷羣臣工未告竣奄遘上賔豫小子纘紹丕基敬展遺篋見所貯手批奏摺不下數萬奎畫爛然充溢巨簏然以未經皇考檢定不敢意為增益謹就檢録已定者彚著為目前後凡二百二十三人分一百一十二帙統為十八函當時隨檢隨發無先後倫次茲亦不復排類蓋摺奏浩繁不勝編録所刻僅十百中之一二略見大凡本非全覽故也既告蕆事謹綴序言於後洪惟我皇考至仁如天至眀如日至誠如神簡拔賢才任之以心膂股肱之寄開誠布公藹然家人父子無不可盡之言諸臣之才具大小短長與性質之剛柔彊弱克知灼見如權衡繩尺之不爽片長足録亟登而進之有不及則激厲而開導之稍肆焉則裁抑之其陷於過始則訓飭之能改則已不悛則戒警之使知悔艾終於怙惡則亦未嘗姑容然哀矜惻怛之意尚流溢於毫楮間也同一事而此或俞之彼或咈之非有所好惡於其間也蓋俞之者必有可俞之道而咈之者亦必有可咈之端同一人而始或豫之終或斥之非有所喜怒於其間也蓋始有可豫則豫之終有可斥則斥之眀燭幾先坐悉情僞逺隔萬里遲閲數年睿鑒所周範圍莫越正人心厚風俗兢兢業業警戒無虞雖屢豐見告瑞應頻仍而惟是憂勤惕厲之心久而益篤記有之曰天道至教聖人至德春秋冬夏風雨霜露無非教也我皇考之為治一天道之運行教澤所被百志惟熙即萬世而下尚如日月之照臨光景常新春風之煦然被物不自知其感動奮發而興起也豫小子寅承鴻業自惟寡昧無能企逮萬一仰法皇考眀目達聰孜孜圖治之心祗紹徽猷夙夜黽勉其服教畏神警省弗怠之志詎敢以嵗月易耶謹序跋恭跋世宗憲皇帝御書法帖敬惟我皇考世宗憲皇帝天縱聰眀文思光被奎章寶翰精詣入神夙承皇祖聖祖仁皇帝指授神運天隨涉筆惟肖居潛邸時常以圖史翰墨自娛雅好臨池陶鎔晉唐宋元以來名家墨妙歷年所積充牣琅函逮繼登宸極日理萬幾手自裁答章奏訓迪臣民多至數千言少或一二字研硃灑翰運腕若神纍牘連章未嘗有一懈筆至於名山祠宇巨榜豐碑耆舊臣僚柱聨堂額寵頒殊錫照耀寰區而屏素箑頭長箋橫卷題新篇摹古蹟者復數十百種蓋惟我皇祖集書聖之大成超神入化莫可名言而我皇考以聖繼聖事事善繼善述作則垂憲貽萬世規盛德之至形於心畫是以變化隨宜不名一體雖一波一磔莫不矩矱天成神妙至於如此即以書法而言亦猶啓承夏后武紹周文羲獻専門固不足道也豫小子日侍庭闈仰瞻天藻恭蒙慈誨未涉津涘手澤留貽悲深弓劒爰出內府所藏倣皇祖淵鑑齊法帖排類編次曰朗吟閣法帖者潛邸所書凡十有六卷曰四宜堂法帖者御極以後所書凡八卷通二十四卷礱石選工命莊親王和親王董其事雙鈎入石豪髮逼真摹勒既成恭識卷末以昭聖神立極垂範墨池琬琰圖球永珍世寶云為君難跋豫昔為創業守成難易說亦既反覆辨論難與不易之輕重懸殊不可同日而語以為岑文本之言非是而定之曰開創不易守成難矣此非在守成言守成蓋實有見其難也茲特引伸觸類敬述勤政殿後楣皇考御書為君難之義而為之跋曰大哉王言示大清億萬斯年家法大訓歟夫為君難之言孔子道人之言耳而吾直以為皇考之言者何蓋耕當問僕織當問婢豈不以習焉安焉不見異物而遷之謂乎且孔子非為君者也其云難亦不過思其理而度其勢究未身歷其境而心親其勞也皇考禀內聖之姿行外王之道質諸心得驗以躬行故取孔子之言而銘之梠端所以自警也所以訓豫小子也所以詔世世孫曽常凛此志以迓天庥而基命宥密永永無極也是故言政莫備於尚書而言難亦權輿於尚書放勳重華一再曰欽引而未發至於大禹祗承于帝首曰后克艱厥后艱者難也承于帝舜者舜實承於帝堯也惟帝其難之則益深切著明言之矣無輕民事惟難伊尹之申誥也先知稼穡之艱難周公之作訓也五十八篇之中其於天命民碞之可畏暑雨祁寒之宜思誨之諄諄三致意焉甄古今之得失綜政典之治亂無知難而不興之世亦無不知難而不亡之朝然而知難非空言知其難而已其必敕命謹幾眀德修身以立其本懲忿窒欲親賢逺佞以正其施凛凛焉惴惴焉以謹對越而培永圖豫故曰大哉王言示大清億萬斯年家法大訓也或曰為君難為臣不易孔子之言也今獨舉其一豈股肱交警之義哉豫曰向不云乎難與不易輕重懸殊不可同日而語則為臣之不易吾將俟為臣者自言其不易可耳未若為君之難也且也當其不易者恆多語有之衆擎易舉則不易者亦將成易而當其難者一人而已嗚呼豈不甚難書後毛詩圖題後宋馬和之善畫人物山水供奉髙孝兩朝嘗取毛詩三百篇篇為一圖以進至今膾炙藝林特流傳零落未睹完璧為憾向在書舍稍解六法輒欲追擬全圖有志未逮御極後偶值幾餘檢內府書畫舊蹟得所圖毛詩若干篇筆法飄逸務去華藻洵如畫史所稱爰敇畫院諸臣規橅筆意舊有者臨之已缺者補之各圖梗槩清燕情閒間亦隨筆㸃染人物及山林水石致趣又仿束廣微作笙詩補亡六章並寫大意蓋始事于己未春積以嵗月迄今秋七月之望獲竟斯業雖畫法未克與和之先後而翰墨風流繼踪曩軌亦足標文苑雅事且不啻此詩之教以垂懲勸一披覽間里巷貞淫之故朝廷郊廟之遺犁然在目因是有以考其得失朱子云本之二南以求其端參之列國以盡其變正之于雅以大其規和之于頌以要其止則修身齊家平均天下之道不待他求而得之然則是圖成而可興可觀其禆益不更深切著明耶乾隆十年嵗在乙丑處暑日御識書唐太宗懷鷂事後豫讀綱目至唐太宗懷鷂事未嘗不益服孟子盡信書不如無書之言而歎司馬溫公之未致思也此事也唐史帝紀及魏徴傳皆無之溫公輯通鑑搜羅博採蓋取李延夀劉禕張文業諸家之說然正史不載删之可也筆而書之啓後世之疑其誰之咎耶夫溫公之書此事蓋亦表太宗之重賢與魏徴之敢諫而吾乃以為啓後世之疑者何蓋太宗與魏徴君臣相得虛受弼亮實為三代以下所僅見固不在此小節也且小節而信亦足為大者之證而夷考其事有不盡信者豈不反纍其大者耶綱目云上嘗得佳鷂自臂之望見徴來匿懷中徴奏事故久鷂竟死懷中鷂幸而死設不死則此事傳乎否乎且徴以此事為宜乎不宜乎以為不宜何不犯顔直諫而故為此譎術以徴平日敢言律之其亦必不出此也夫徴奏事故久之心誰則見之詭諫於君前後言於退食徴尚成其為徴耶唐有隋之宫室太宗縱喜延接羣臣其亦有堂廉之分矣徴之來也豈其突然即太宗之果自臂佳鷂以為非見大臣之禮預付侍臣夫豈不可而必倉卒納之懷中耶三家村孰中其師素嚴弟子畏而憚之一日者師出他往羣弟子伺其間無所不為倚梯於楹捎雀於巢師之返也怵栗無所避則納雀於懷而因以死焉觀太宗懷鷂之事豈不有類於此耶而豈太宗之所為耶夫小節之不辨將謂大者亦如此也則書此事者非太宗魏徴之功臣乃太宗魏徴之罪人矣李劉輩之記載雖未傳而其人亦不足責也余故益服孟子盡信書不如無書之言而歎司馬溫公之未致思也題趙孟俯十札後書格至孟俯一變說者謂其有意取妍微傷婉弱然右軍禊帖正以姿致勝固未可皮毛論也內府貯趙蹟甚夥觀蘭亭十三跋益知其師承所自原民部尚書王鴻緒舊名賞鑒家其子圖炯以所藏唐時僧義道小楷法華經及孟俯十札進經尾餘幅古香可愛為書心經全卷因留為珠林法寶朕惟取貴知足此卷展閲既竟為拈趙法源流題數語而還之俾王氏子孫傳為世守更增藝苑一段佳話云書漢文帝除肉刑詔後史稱文帝除肉刑以感女子緹縈上書救父其事不經余故叙而論之夫文帝除肉刑甚盛德也髙帝約法三章已去秦肉刑復肉刑其在吕后悖暴之時乎帝既去誹謗妖言之令因思及斷體刻膚之痛而有是詔稱虞氏之治欲以德化民固不因緹縈之言也必因緹縈之言是轉非帝之本意且其事亦有不可為訓者蓋淳于公罪屈耶不藉其女之言應出之淳于公罪當耶雖有其女之言應入之其出其入亦惟視其自取是所為與天下共之何容心焉而又何有於感一言而及天下乎且是詔之首即述有虞氏則舜之殛鯀禹固未聞有代父之請也史遷將以為緹縈之孝為過禹乎天下之被刑者多矣孰無子女使皆效緹縈所為從之則殺人者可以不死不從之則傷孝子之意如是則聖人明刑之教廢矣夫逮繫謾罵固常人之情激切救父亦女子所有余獨怪史遷牽及肉刑之詔使有識者必致疑無知者謂可法亂聖人之大經害賢帝之盛德是固不可不辨御製文初集卷十三
