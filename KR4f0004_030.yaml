body:
  text: 贊紫光閣五十功臣像贊有序西師之役賴天佑乘時運資衆力拮挶擘畫幸底厥績固非豫一人所敢逆料敢期必也然稍可以謝衆論愜深衷者無他則以賞罰信而應機速耳語云日中必熭操刀必割言應機宜速也書曰罪疑惟輕功疑惟重言賞罰宜信也機之來發於無窮之源而應以萬變之極蓋難言之若夫信賞罰似非難事而亦有所難者則以不能因物付物有所容心於其間耳且罪疑而後從輕若不疑而亦從輕則偷生者何懼焉功不疑而從重其理固當然涉疑而屢從重則冒賞者生心而真功反有向隅者矣是知疑不可也夫不疑而功惟真功賞斯重焉罪惟真罪罰斯必焉則捨命灰軀冒矢石投鋒鏑之倫孰不勸以懲乎茲者事定功成寫諸功臣像於紫光閣朕親御丹鉛各系以贊不過譽不尚藻惟就諸臣實事録之並闡其義如右雲臺二十有八凌煙閣二十有四而此五十人者則以國家中外一統宣力者衆然此猶舉其尤赫者若夫斬將搴旗建一績致一命者亦不忍其泯滅無聞將亦圖其形而命儒臣綴辭焉大學士一等忠勇公傅恆世胄元臣與國休戚早年金川亦建殊績定䇿西師惟汝豫同酇侯不戰宜居首功定邊將軍一等武毅謀勇公户部尚書兆惠濟爾哈朗喀喇烏蘇兩畨襲迫均保無虞以智濟險以誠感衆卓哉崇勳闢我提封原定北將軍一等誠勇公兵部尚書班第元戎率師平定伊犁而何阿逆叛亂乘危變出不期投軀西漠故里櫬歸痛哉酹酌原靖逆將軍三等義烈公工部尚書納木扎爾我懷賢勞命將往代正值黑水猖獗鼠輩以二百衆陷萬賊中因緣徇節勇濟以忠定邊右副將軍親王品級超勇郡王䇿布登扎布拍馬彎弓無敵所向不曽讀書如古名將和落霍斯少勝衆彼超勇親王額駙之子定邊右副將軍一等靖逺成勇侯理藩院尚書富德古云福將信有其言所遇均吉勇冠軍門不寧一勇兼善於謀吉林拔萃特賜封侯原定邊右副將軍二等超勇伯內大臣薩拉爾彼中宰桑識時早歸副帥以往克贊戎機拔身戰出不忘本朝云胡不死責備則澆原大學士三等忠勤伯陕甘總督黃廷桂外任封疆內司綸綍俾理儲胥經權弗詘殫誠盡智事協豫心未同凱宴痛惜曷任參贊大臣和碩親王固倫額駙色布騰巴爾珠爾惟科爾沁世連姻戚魯館承訓王庭宣力參贊軍務賊營夜侵中創弗退嘉乃忠心參贊大臣固山貝子扎拉豐阿準夷之叛奉命在道賊遮中途屢戰不撓其志既篤其材亦英蓋自髫年教養禁廷參贊大臣扎薩克多羅郡王羅卜藏多爾濟渭陽所出扎薩穎材命帥本部宣力龍堆及愛隆阿單騎見虜降哈薩克厥功甚巨參贊大臣多羅郡王額敏和卓土魯蕃族早年歸正命贊軍務以識回性知無不言言無不宜其心匪石弗可轉移參贊大臣工部尚書舒赫德屢授重寄亦屢左遷厲厥意懦䇿厥材賢白衣白水聞黑水信安衆進援爵秩重晉參贊大臣一等果毅公兵部尚書阿里衮富德入援次呼爾璊趲行戈壁馬不進焉以馬濟軍敵營夜襲同事建績曰鄂博什原參贊大臣三等襄勤伯總督鄂容安世臣知書料善論兵惜弗通語遂弗燭情變起倉卒力戰命畢用違其材實豫之失參贊大臣一等承恩毅勇公户部侍郎副都統明瑞椒室懿親年少志雄謂可造就俾學從戎獨出獨入既忠且壯屢立宏勳愜豫所望參贊大臣工部侍郎副都統阿桂阿克敦子性頗捷敏力請從戎宜哉惟允身不勝衣心可干城楚材繼出為國之楨原參贊大臣三等子户部侍郎副都統三泰率二百人共詣軍營臨敵而退寧謂忠誠如早聞信何致殞身不前不後失二賢臣原參贊大臣前鋒統領騎都尉又一雲騎尉鄂實其兄徇節其弟忍使欲報兄讐固請不已黑水之挫復以捐身超雪前罪賞延後昆領隊大臣內大臣博爾奔察矍鑠請行索倫巨擘挽五石弓尚能殺賊如鷙之擊不留飛鳥馬援來歸殊恩榮老原領隊大臣安西提督總兵官豆斌宿將行間久矣宣力所董緑旗遵其律則隊中獨喪是有命焉裹創慰衆益厪哀憐原領隊大臣甘肅提督總兵官髙天喜爪牙之將用不拘資感豫特達效命何辭百戰百進義弗旋踵怒則面赤是謂血勇領隊大臣副都統塔什巴圖魯端濟布將軍黑水先衆徑渡固營待軍實端濟布衆寡稍挫倉卒周防奪回人馬勇且謀長領隊大臣護軍統領愛隆阿將門傑種拍張撫髀受將軍檄力戰全歸整師再進賈勇陷堅弟巴靈阿盡節軀捐領隊大臣前鋒統領墨爾根巴圖魯瑪瑺侍衛從征竒功屢立雖賊萬衆單騎直入陷陳馬仆距躍彎弓賊人咋舌稱天上雄領隊大臣內大臣副都統巴圖濟爾噶爾都爾伯特部中傑驍嘉其心直授職本朝凡與交戰義弗返顧師濟和闐不孤恩遇散秩大臣穆爾德木圖巴圖魯齊凌扎布旗籍蒙古偏校從軍殺賊則奮鶻入鴉羣與噶布舒分守和闐保衆集事且有謀焉散秩大臣哈坦巴圖魯噶布舒躍馬抨弧先鋒鏖陳入俄羅斯得阿逆信和闐既定論功䇿勳衣錦歸籍散秩大臣副都統噶畢雅圖巴圖魯額爾登額軍門統事諸務勤宣亦能力戰突將無前入拔達山索逆􅉰馘曉諭殊方是其偉績郡王霍集斯奉元戎檄擒達瓦齊後稍觀望旋迎我師同大軍進被圍黑水回部望族居之京邸貝子鄂對平伊犁時歸順勤王回部傑出其心允良往諭和闐被圍三月共噶布舒全守卓越內大臣鄂齊爾前無堅對後無返思持矟一呼千賊披靡揚揚英氣洸洸偉身與薩拉爾蓋同部人散秩大臣喀喇巴圖魯阿玉錫於格登山賊據險守率草四人間道襲後諸賊大潰爰以成功本厄魯特降順效忠原散秩大臣騎都尉達什䇿凌衛拉從征喑噁吒叱額駙受創衛護以出用賜殊恩用益奮感畢命回城每懷惻慘副都統鄂博什索倫營總乙亥出師老而益壯頗識戎機厄魯回部胥聞其名聳身馬上如擊兔鷹副都統圖布巴圖魯溫布生不知懼戰不知退亦不受傷銅額鐵背弓可擔水箭如鍬鏵溫侯名布是耶非耶副都統克特爾克巴圖魯由屯本射生手狼不暇走以之殺賊如探囊取竒功屢建亦因閲厯世職崇階酬其勞績原副都統騎都尉又一雲騎尉三格渾齊濳遁疏防降謫從軍贖罪每戰必力黑水殞命豁罪論功圖像紫光表忠無窮原頭等侍衛舒布圖鎧巴圖魯竒徹布包沁之叛千賊一身賜巴圖魯昉乎斯人後復屢戰喪哈薩克始終於是曷勝悼惜頭等侍衛博克巴圖魯老格哈薩錫拉叫詉稱亂趨羊適過以計解難後復從軍屢戰屢進單馬衝突獅子奮迅頭等侍衛墨爾根巴圖魯達克塔納庫車圍攻命守要害偵賊來援周防以待賊卻乃前賊前乃卻引至大隊是鞣是膊頭等侍衛薩穆坦厄魯劫運構釁互戕識時拔出致力疆場首被掄選往拔達山譯語曉譬共索馘還原二等侍衛固濟爾巴圖魯雲騎尉璊綽爾圖捉生以出被回所遮衆寡不敵矢盡堪嗟罵賊以死雖死猶生時共事者達什䇿凌二等侍衛哈朗圭巴圖魯塔瑪鼐聞戰則喜無生有死五易馬進終弗却視身不及膽心則乏謀用以衝陳勝五百牛原二等侍衛哈布台巴圖魯富錫爾三巴圖魯於中之一要遮色楞忽墮其術不及彎弓白刃揮霍猶斬數人之死弗卻二等侍衛額爾克巴圖魯海蘭察烈風掃枯迅其奚難亦賴衆傑摧敵攻堅於塔巴台射巴雅爾是其偉績勇鮮倫比原二等侍衛雲騎尉富紹黑水築柵未畢賊侵蜂屯蟻雜攘攘林林持將軍令意氣昂藏來往慰衆銃殞堪傷三等侍衛賽音博勒克巴圖魯扎竒圖狗盜雞鳴孟嘗不棄竊馬何害用人之際間道達檄首遴斯人雙雄比肩衝出萬軍三等侍衛什倫哈什哈巴圖魯阿爾丹察騎二駿馬縱兩神鶻回如瓦雀伏不敢發共扎竒圖左旋右抽卒致軍信效力獨優三等侍衛卓里克圖巴圖魯五十保軍檄再發更掄五英馳驛逾月迅至北京捨身報國不可數算舉其尤者圖形作贊趙孟俯浴象圖贊五藴六根人物皆具岸然香象豈不可度以八德水浴四大身曰浴非浴則墮聲聞趙孟俯畫達摩像贊一葦橫江為來為去瞪目袖手淡然無慮江云渡所葦即是能兩不可得稽首聖僧玉鏤達摩面壁贊渡江一葦面壁九年何遲何速法爾如然古玉一握趺對以處不窄不濶全身裏許玉工琢玉思肖達摩汝却是誰知麼知麼元人寒山拾得像贊數珠在手右持棕帚一念一掃十八二九孰凡孰聖開口呵呵一二二一與麼與麼你即是我我却非你囅然嗒然水不洗水西天東土如是國清豐干饒舌真頓置生木刻文殊像贊是法王子即法王身非一非二何疏何親如是現象據師子背不見一法千古無對五臺示迹國清留蹤成所作智妙應無窮扶寸非小丈六非大住世度人云何不可木刻觀音像贊普門大士悲濟以慈隨聲應感實語非虛應以何度現身説法汝自不知墮鳩槃茶須彌棗葉孰大孰小是木栴檀示相了了水月宴坐花雨繽紛善財合掌稽首慈雲仿蘇漢臣古佛贊嵌巖盤石宴坐道場橫目豎鼻具毫相光羣魔伏盡諸天禮畢凡草枯木皆尼拘律偏袒右肩斫羅在手非語非默不空不有漢臣作像依樣偶為能所兩忘稽首導師寫五臺殊像寺文殊像成並贊五峯鼎峙境實清涼日面月面靈鷲中央曰有祇園巍然前麓殊像是名法光赫昱師子奮迅大士端嚴均佛性智稽首和南祝釐蕆慶載經花宫相好默識如印印空像即非像真豈誠真本無同異何復云云寫者為能應復有所乖曼殊義咄哉未可於未可中覩此滿月常住莊嚴利濟無竭南極夀星贊髙弧之南曰有六星聚而為體一老人形一六為七七日復來慈寧大慶七帙爰開綺眉聃耳曲録其腰長頭豐額絲髮飄蕭老人謂豫來祝懿夀如髮夀算無疆悠久宋人觀音大士像贊大水湯湯大山峩峩是西天竺是南補陀普門獨立山水一如西天南海何有分疏左持淨瓶右緑楊栁度世婆心非空非有佛觀察智赴感離塵應緣隨喜丈六金身丁雲鵬􅏻嚴大士相贊丗二之相八十種好與佛無差方便權巧彌陀灌頂足踏瑞蓮堂堂獨立法爾如然萬有之母調御丈夫執一以求去道逺乎寶冠若華天衣似鏡內外色空光光相映本願不離沛然甘露即今衆生無一不度鄭重􅏻嚴釋迦牟尼佛贊天上天下獨立稱尊水月道場現此金身三十二相八十種好曰是􅏻嚴見為顛倒維摩天花尚云弗著何佛光中曼陀紛落九華芝蓋七寶蓮臺三車法演五葉宗開即有即空非空非有衆生度盡宴坐叉手玉觀音贊善哉大士無像不現而不執像權巧方便西崑産玉王母所都大士王母何同何殊水月道場白衣宴坐施悲用慈無可不可當以何度説法無遮玉不藉鏤竟演法華謂珍琳琅則匹瓦礫三界十方甘露一滴於微塵裏轉大法輪如是瑞相稽首普門唐人羅漢贊龎眉台背示此幻身西天弗居而居聖因笻竹罷扶盤陀且坐一彈指間無可不可羚羊挂角銜芝而來埋沒家寶有如是哉左持淨瓶忽現大士明聖之湖全貯其裏黃龍古佛贊西湖之上北山之隂有石嶵崣有洞深沈我聞如是佛無今古偶然遊戲巖壑與處􅏻嚴相好現此半身那半弗欠全主全賓尋勝瞻禮調御丈夫默而識之設色為圖和闐貢玉按圖精琢是同是異一大圓覺曰毗婆尸曰釋迦文無可不可稽首慈雲逰黃龍禮石洞古佛默識而歸於舟次敬寫相好一日便成和闐貢玉適至即命按圖鑿相以為妙蓮華室清供大小同異玉堅石脆吾將以金剛四句槩之又是山之陽復有所謂石佛寺者志稱僧思淨鑿石為半身像七年乃成令錢汝誠至其處詳視回稱寺已頺廢像亦祇滿月面而非半身因並志之仿蘇漢臣古佛像贊嵌巖之中盤膝盎背天上天下獨尊無對有説無説二鐵圍山默然趺坐莫認不言偏袒右肩法輪在手三乘四諦轉盡奚有水澄於江月印於天像即非像法爾如然宋人維摩授經圖贊毗耶長者維摩詰是得無生忍神通遊戲叶不著三界示有妻子因以身疾説法隨喜調御遣問率不任使文殊爰行承佛之旨不二法門辨論彼此默然無言如乳合水全圖不存師利奚止天女散花聊復爾爾徐揚伏獅羅漢像贊百獸畏象象畏鬈獅應真宴坐以犬畜之問何神通不起於座曰有伏者頓置罪過如意在手內空外空侍者慢怖爾彼原同丁觀鵬降龍羅漢像贊尼拘律下盤膝足跣狰獰毒龍視如蝘蜓明珠示諦其捨之乎設云善豢劉纍何殊嶽嶽頂相之而欲出前身後身非二非一貫休羅漢像贊黃髮鮐背頂若癭瘤何弗醫去見有身不肉髻華鬘亦無所求以手支頤坐石優遊把卷不談若江海流義在汝邊寧待咨諏問誰作像得貫即休盧楞伽無量夀佛贊過去燃燈未來彌勒現在釋迦三身一德是無量夀是兩足尊是何佛法青蓮在盆鵲噪鴉鳴無非讚歎三際豎窮十方橫遍不離於座寶蓋蔭垂祥雲甘露稽首皈依倣趙孟俯古羅漢贊明珠相好滿月精神娑羅樹下聊憩幻身一花五葉傳法能仁不離坐處普度情倫西天震旦見布疑黂孰為此語水晶道人孟􅀈自跋云曽見盧楞伽羅漢像得西域人情態唐時京師多西域人耳目語言相習至五代王齊翰輩雖善畫與漢僧何異余嘗友天竺僧於像自謂有得夫羅漢以德稱不以貌較觀此則松雪猶未免有執相之見也丁觀鵬畫釋迦牟尼佛贊過去燃燈未來彌勒現在釋迦胥不可得堂堂趺坐四智三身諸魔降伏稽首能仁丁觀鵬畫十六應真贊第一阿迎阿機達尊者搘杖而坐方趾圓顱借問是相為有為無聞法最先成佛最後孰後孰先阿唎在手第二阿資答尊者驀爾遇鬼其心則怖大士嗒然金針已度貌既狰獰衣亦藍縷孰知其中相好爾許第三拔納拔西尊者坐崖入定閉目止觀云見暗不義具八還脫其雙鞋置之足底是何為哉或偶用耳第四嘎禮嘎尊者有眼如盲有口如啞祇拖雙眉長過足下或云方便以是示度是謂著魔不可救處第五拔􅀢逋答答喇尊者有涎弗吐有癢弗搔火食不親其身出毛在昔虞舜與鹿豕逰其施沛然同源異流第六拔哈達喇尊者持鉢塞莫轉佛真言所説云何春暖秋寒瞬目於空泯心於有如是如是則否則否第七嘎納嘎巴薩尊者倚刺竭節坐石而思障礙及覺同異然疑假使世間皆如舍利盡共度量不測佛智第八嘎納嘎拔哈喇錣雜尊者擎金剛拳竪其二指空色聖凡胥藴於裏有説野干無説獅吼水離非冰楊即是栁第九拔嘎沽拉尊者吧呀大口􅨮􅡩巨鼻束經弗觀無所為纍一樹一身法華有云蓬頭童子以其目聞第十喇乎拉尊者空山無人流水有聲悻然切齒雙目􅟑盯若有所怒其怒緣何以一切法行六波羅第十一租查巴納答嘎尊者心是死灰身即稿木一齊放下倚樹禿兀􅀈􅀈曰陋惻怛曰慈隨人識取尊者不知第十二畢那楂拉拔哈喇錣雜尊者黃耉台背如不勝軀現夀者相金剛云無夫既云無是誰坐者示以二指塵埃野馬第十三巴納塔嘎尊者如空印月月弗礙空展卷無字義具其中審如是云三藏何闡應真注目默然遍演第十四納阿噶塞納尊者以廣長舌現清淨身䀕爾怒目慈悲度人怒既慈因慈亦怒緣日面月面夫何不然第十五鍋巴嘎尊者持扇而踞露其半面聖亦弗居而況凡見春至花開秋來葉落將謂道著誰知已錯第十六阿必達尊者梵帙閲畢焚香薰之是何佛法不可議思生住異滅萬法歸一胡不視此傳神之筆金廷標畫古佛贊見身無實了心如幻海印發光盤膝指按伽梨不著偏袒右肩優曇樹側宴坐巖間諸魔伏盡亦無伏者波旬怒目意若弗下演三乘畢示萬法空無可不可逰戲圖中貫休臨吳道子古佛像贊天上天下一人尊獨竹杖誰量丈六丈六菩薩皈依波旬降伏不事莊嚴相好具足現此堂堂本來面目貫休所臨道子之躅作麼生會黃花翠竹御製文初集卷三十
