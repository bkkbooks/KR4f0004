front:
  text: 欽定四庫全書御製文初集卷二十九
  hash: sha256:d98af626cb40436788841d4e3b5ffb510b83ca063ec51e105f420ec4e95069e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_029-1a, image: WYG1301/WYG1301-0249a.png}
body:
  text: 贊貫休畫十六應真像贊第一阿迎阿機達尊者衣披百衲杖扶一笻梵書貝帙注目橫胸阿唎吒迦此云數珠若有所記記則不無而非文字第二阿資答尊者抱獨坐嗒然若忘心是菩薩貌是鬼王左栴檀塗右利刀割何怨何恩平等解脫第三拔納拔西尊者閉目巖中入無生忍流水行雲事理俱泯聊復爾爾起心則那威音賢劫一瞬而過第四嘎禮嘎尊者𢷾石側於焉以息惟是上人非語非默眉毛拖地以手挽之詎云揀擇示此絲絲第五拔雜哩逋答答喇尊者顤顟其面㱥殑其身中有相好孰識此因以經擲地參學事訖佛尚不居而況非佛第六拔哈逹喇尊者灌頂豐頤著水田衣七佛說偈都得聞之目窮色空任其蚌鷸趺坐盤陀行腳事畢第七嘎納嘎巴薩尊者前身飲光後身慧理西竺靈鷲識飛來此芒鞋幾兩竹杖一根可放下著永住聖因第八嘎納嘎拔哈喇錣雜尊者五藴六識真幻異同竪此一指非彼天龍與木石居毛生手足何不翦之誰翦豕鹿第九拔哈沽拉尊者軒鼻詬口數珠在手萬法皈一一法不受娑羅樹下兀然忘形演無聲偈有童子聽第十喇乎拉尊者亢眉瞪目若有所怒借問佛子怒生何處喜為怒對怒亦喜因畫師著筆任其傳神第十一租查巴納答嘎尊者倚槎丫樹憩傴僂身誰為觸背誰為主賔示其兩指以扇拂之捉摸不得擬議即非第十二畢那楂拉拔哈喇錣雜尊者有台其背有龎其眉經橫於無慮無思稽首尊者夀復何若侍燃燈筵待彌勒閣第十三巴那塔嘎尊者了一切法參如是經水流石冷風過花馨示囫圇地示光明藏立意掃除是謂理障第十四納阿噶塞納尊者䁱目突額若鬼㬰區見者莫怖大慈真如呿􅀈偃仰合掌雙手不聖不凡非無非有第十五鍋巴嘎尊者扇取袪熱衣取蔽寒云無寒熱是外道禪熱即熱中寒離寒裏金不復礦氷仍是水第十六阿必達尊者以沈水香炷折腳鼎三藏靈文轉彈指頃法尚不住何像可留問誰多事曰此貫休唐貫休羅漢贊上橫經略觀如是閒置草鞋事畢行履貫休作像稽首應真像及所像孰疏孰親尊者注目不加一語如人飲水冷暖自取趙孟俯畫第一祖贊巍巍相好坦坦跏趺西來北渡何同何殊受七佛偈開五祖傳芒鞋擲地袈裟在肩拂子絲絲豎者何限是塗毒鼓是正法眼蘇漢臣古佛贊偏袒右肩坐嵌巖裏示有為相示無生理若菩提樹若青蓮華頂肉髻光燭恆河沙是古燃燈是釋迦文均名字耳稱謂由人趙孟俯羅漢贊四大假名三身何有兀坐樹下示人以手背觸不得能所胥忘頂後圓相具足真常畫馬則非畫佛則是水晶道人猶著些子大士不言廣長無量稽首掌中如是供養丁觀鵬摹貫休十六應真像贊第一阿迎阿機達尊者兀坐磐石赤腳披緇橫經於胸若有所思思則不無能思者孰作如是觀觀此尊宿第二阿資答尊者􅀢其面吧呀其口龍準鳶肩抱膝露肘亟貌之猛亟心之慈慈猛胥忘合十皈依第三拔納拔西尊者於嵌崖中入大禪定一切佛魔弗著本性驀問大士何不示人無可示者不如不言第四嘎禮嘎尊者昨日過去明日未來孰是現在拖眉而咍亦水田衣亦著於體冷暖已知權護惜此第五拔􅀢逋答答喇尊者貝帙且置用觀則那袒裼裸裎焉能浼我是曰相好是曰威儀言同不可何況於異叶第六拔哈逹喇尊者以恆七寶滿布大千不如金剛能悟四言眉橫鼻直注目而視作麼作麼如是如是第七嘎納嘎巴薩尊者敷席坐石不蹙以嚬亭亭竹杖却具三身日面月面一吸一呼了本性空不離幻軀第八嘎納嘎拔哈喇錣雜尊者胮肛䩈扶杖合掌箇坐具地極樂安養示其雙足一跣一鞾設生分别未識禪那第九拔嘎沽拉尊者有樹槎丫束經置孔倚之小憩非靜非動靜為動母動亦靜因童子不答乃得其真第十喇乎拉尊者具大雄力坐不目逃於示怒中隨喜逍遙喜固春溫怒赤秋肅試觀代謝意於何屬第十一租查巴納答嘎尊者聃耳澤鼻其貌殊特仙乎鬼乎不離不即一身一樹示以二指於法華經我聞如是第十二畢那楂拉拔哈喇錣雜尊者在古九頭夀萬八千於此綺眉如嬰兒年若如是云綺眉何往水在瓶中月在天上第十三巴那塔嘎尊者展卷而觀乃無一字不禁囅然是真了義廓然無聖何有於凡於功德海亦不唐捐第十四納阿噶塞納尊者魌頭吐舌貌可怖人皎皎滿月蓬蓬逺春火劫非久剎那非暫擎金剛拳無分别念第十五鍋巴嘎尊者有扇不扇有衣還衣豈其捨求不可思議捨魔求佛佛即是魔了心如幻行六波羅第十六阿必達尊者擎經炷香供養如是能所兩忘於一彈指貫休作像觀鵬摹真黃花翠竹萬億化身唐貫休十八羅漢贊第一阿迎阿機達尊者履杖飛行非空非地作不二觀示第一諦雪山證道首聞雷音作麼生㑹如風竹吟第二阿資答尊者枯槎貫月負鬼㬰區尊者抱不動如如圓相一筆傳吳道子問誰師承貫休作此第三拔納拔西尊者嵌巖宴坐似水中月是丗二相是恆沙劫曰嘎禮嘎尊者比肩光光相映萬法如然第四嘎禮嘎尊者開眼見明閉眼見暗咨是上座於何置念學人稽首侍者擊磬曰如不覺其見墮聖第五拔􅀢逋答答喇尊者袒胸赤腳不著雙屐撫掌啞然一闔一闢秃髮龎眉面若凍梨喜少惡老非惑其誰第六拔哈逹喇尊者合掌詢法示之隻手曰再請益問汝㑹否如是說法豈不甚易本來不難汝自倒置第七嘎納嘎巴薩尊者眉目清揚示少年相曽見威音其夀無量手托鍵􅀈此云淺鐵鉢盛食及水渴飲飢餐不異人耳第八嘎納嘎拔哈喇錣雜尊者拄杖過橋拊侍者背無畏上人乃若有惴貯琴於囊急緩都忘我聞如是四十二章第九拔嘎沽拉尊者盤扁石非默非語著敝衲衣破則自補猴子􅰺齗蹲眩於旁金針度彼正自不妨第十喇乎拉尊者傴僂台背瘦如柴枯雖事爬搔不倩麻姑痛癢自如誰痛癢者局局解頤南無般若第十一租查巴納答嘎尊者怪石長松於焉小憩展卷而觀亦無文字五藴皆妄四大本空咨憩觀者曽何異同第十二畢那楂拉拔哈喇錣雜尊者念珠在手誦佛於口是一是二曰楊即栁聞法最初亦不執法賔頭盧是梵云畢􅀢拉􅀈喇錣雜華言切音為賓頭盧阿育設榻第十三巴納塔嘎尊者如意拄膝睟面盎背藴玉山輝涵珠川媚緑芭幾葉覔心則空設云即法墮異道中第十四納阿噶塞納尊者手擎窣堵髙不滿尺三千大千納之無迹諸佛開塔法華所云奚童烹茶乃如不聞第十五鍋巴嘎尊者注目於鼻叉手於胸息踵達臚內空外空身既如幻護惜作麼示大圓鏡行六波羅第十六阿必達尊者偏袒右肩合十雙手即佛即魔非空非有波斯長跪獻甘露漿受觸辭背真妄幻常第十七嘎􅀢巴逹喇瑪尊者手撫牛哀如愛花貍童子怖覻不知所為變相十八貫休所傳相即非相朵朵青蓮第十八納納答密答答喇尊者淨瓶貯水中育龍子獰龍欲取怒目以視爾慈用猛我猛用慈慈猛俱幻皈依導師震旦所稱阿羅漢之號十六十八傳聞異辭曩咨之章嘉國師而得其說因證以法住記及納納達答喇傳定為十六應真而以同文韻統合音字正其名命丁觀鵬視西湖貫休畫本一再仿之而再製贊焉今重閲祕殿珠林貫休羅漢像十幀其八並列二像與前所定數悉合其二像各一則世所為降龍伏虎者也始覽而疑之復詢諸章嘉則一為嘎沙鴉巴逹喇瑪尊者一為納納答密答答喇尊者乃知西域十六應真之外原别有降龍伏虎二尊者以具大神通法力故亦得阿羅漢名夫佛初出家時阿難迦葉為佛二大弟子已復合舍利弗以下八人有十大弟子之號而俱鄰婆敷二比丘亦隨佛修道為大弟子乃不列於十者之數則二尊者之於阿羅漢或分或合亦如是而已矣況乎得阿羅漢果者梵力圓成不復有我人衆生夀者相若五百若五千乃至二萬五千如恆河沙算數譬喻所不能盡皆可作平等觀顧於十六十八生分别想耶向嘗正蘇軾十八羅漢贊重出之訛今復取其文而讀之其於羅怙羅尊者則曰龍象之姿魚鳥所驚於伐那婆斯尊者則曰逐獸於原得箭忘弓非即降龍伏虎乎蓋既誤以慶友賔頭名復見而所云羅怙羅即喇乎拉尊者伐那婆斯即拔納拔西尊者賓度羅跋羅墮闍即畢那楂拉拔哈喇錣雜尊者蓋以唐音切梵音故舛訛至此不如同文韻統合音之為得正也軾又有蜀金水張氏畫十八大阿羅漢頌其標題有曰正坐入定大蟒出其下者有曰有虎過前童子怖匿竊窺者而其序若跋多引十六羅漢神變事則以軾之頌印軾之贊可以軾之頌贊印西僧之說亦無不可若夫羅漢顯示圓通不可究竟讃歎亦不可究竟一偈一句具大因緣瓶水雲天隨指應現佛聞如是或亦拈花一囅然乎系以華梵合音從其類押以珠林繼鑑璽者自今以後凡有重題將胥以此識之丁觀鵬畫初祖贊一花五葉前三後三西土震旦彈指華嚴露頂赤腳具大人相謂傳法來則墮語妄妄即非真真即妄也合十圖中觀如是者趙孟俯羅漢像贊抱膝搘頤嗒然若啞科頭赤腳徹上徹下是迦葉佛是達摩尊是即相好作麼見聞心本無生因境而有松雪仰像妙喜陶手姚文瀚畫羅漢贊翠巖袖手瓶鉢不持神通變化無所之施開眼見明閉眼見暗何處徴心本來弗缺了心如幻見身無實畫師寫照不殊面壁丁觀鵬畫大士贊具大人相坐青蓮華如水中月如蕉中芽空是性空色是性色性不自性相於何得調御丈夫妙觀察智救苦解灾乃其餘事真即是幻幻豈非真如是法焰稽首普門金廷標羅漢贊手持青蓮欲供金鉢需水沃之澗泉飛沫曰水有與是謂邪見曰鉢有取是何神變取與胥幻水鉢非二咨諸應真善哉逰戲趙孟俯達摩贊頂上肉髻膚已生毛長松盤石宴坐逍遙手中無花面前無壁㑹麼㑹麼是真花壁圖梁初祖是宋王孫曰宋梁幻已落聲聞李公麟十四羅漢贊我聞如是古德諸公渡海何往是異是同騎鯨踏犀曰何神通如彼香象踏地若空十六十八曽考厥宗入海算妙笑我猶蓬此則十四理又難窮應真大笑水月松風右李公麟渡海應真卷自龍神侍者而外其阿羅漢數祇十四而程嘉燧跋尾乃稱十六嚮命畫史仿貫休舊本曽參考梵典詳列位號十六尊者始有定名若世所傳十八羅漢特援羅怙羅伐那婆斯兩尊者增之耳今卷中已繪降龍伏虎二像則當是十八嘉燧跋尾時僅見十六則亦云十六及􅏻潢屢易較嘉燧時又遺脫其二耳抑或公麟未諳釋理且别有所本耶佛子無分别相是半是滿是滅是集一切種智不可思議余既贊之如是則亦志之如是云爾趙孟俯達摩像贊一片彩雲幻住虛空稽首法相是異是同異即非同同即是異一彈指頃去來今世得無生忍燃慧命燈向壁九載半語何曽披七條衣露頂赤腳地祇迎拜了覔不著法傳慧可履付宋雲多事圖像乃秀王孫盧楞伽阿羅漢像贊水月道場盤膝合手聞法最初得法則否十六十八其數異如考歸一是算沙嗤余鏡裏魔軍夢中佛事禮佛降魔兩皆兒戲楞伽作像證者瘦金大士默坐如獅吼音御製文初集卷二十九
