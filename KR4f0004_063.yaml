body:
  text: 碑文平定金川勒銘美諾之碑首禍者必有竒禍之遭偝德者必有凶德之報蓋儹拉之首禍實由促浸之教而促浸之偝德亦因儹拉之肇故戊辰之役以救儹拉而有促浸之征前因金川侵擾小金川拘其土司澤旺地方官諭之不從輒敢干抗戊辰冬遣經略大學士傅恆統禁旅往𠞰我武方揚而莎羅奔郎卡窮蹙乞命因矜其頑蠢遂允受降澤旺乃得復歸故地郎卡始尚畏懼斂跡未十年輒思吞噬鄰封時相仇殺彼時以蠻觸爭衡乃其常事亦遂聽之郎卡既死其子索諾木轉與小金川僧格桑狼狽為奸負恩梗化遂致復勞師旅深悔前此之姑息矣兹辛卯之師以伐儹拉乃並促浸而掃僧格桑恃有索諾木黨惡欺蔑鄰疆攻圍鄂克什官寨占其酋境地羈其土司經前督臣阿爾泰等往諭罷兵退地逆陽奉隂違浸至辛卯夏僧格桑乘索諾木侵害革布什咱土司之釁益復滋橫並且修築碉卡謀抗天朝勢不得不加以兵革而阿爾泰因循貽誤遂命溫福由滇入蜀授以大學士統兵征𠞰即攻克巴朗拉繼又克復達圍一帶以至資哩官兵前抵路頂宗仍不能進壬辰夏阿桂以參贊赴南路統兵於是年冬攻克僧格宗甫半月即乘勝攻得美諾其餘寨落悉傳檄撫定小金川平而僧格桑逃往金川索諾木匿而不獻於是移兵並討促浸矣彼其緩則頡利突利之相猜急則僑如榮如之相保然而地險人强機謀深造則儹拉逺不如促浸故美諾再入而再克美諾未嘗不險而一克僧格宗其勢遂如破竹逆酋僧格桑初竄布朗郭宗溫福由明郭宗統兵往捕僧格桑已從美卧溝遁入金川擒其父澤旺以歸溫福為將軍始猶勇往繼乃昧於籌畫又不得人心癸巳夏賊衆從後路潛出遂有木果木之變美諾亦尋失去乃命阿桂為定西將軍發八旗徑旅往𠞰阿桂部署稍定於十月草九日進兵自資哩至美諾五晝夜悉行恢復實為神速而僧格桑既至金川索諾木即羈留不遣即其謀擾木果木但令小金川賊目七圖安堵爾同往美諾號召而不使僧格桑復還故巢則索諾木之密圖吞併儹拉以次蠶食旁近土司并且欲侵及內地固已漸露端倪罪惡貫盈實難輕逭耳雖南有僧格宗北有明郭宗而我師奮力攻取無不立摧堅碉遂據官寨之穴窖美諾為小金川官寨即其巢穴也此固皇天助順將卒盡力而亦其首禍偝德之招是用勒銘酋巢永鎮筰徼平定金川勒銘勒烏圍之碑美諾既克移問促浸狼狽為奸而更謀深劫木果木自壬辰冬攻克美諾逆酋僧格桑竄去索諾木匿而不獻於是移兵申討促浸時溫福為將軍由功噶爾拉進𠞰阿桂為參贊大臣由當噶爾拉進𠞰溫福旋攻據昔嶺遂駐木果木師久不得進溫福絀於謀以營中所有之兵築卡布守既耗兵力且以分而見少癸巳夏賊酋窺其無能乃逞狡謀令賊目糾衆自美卧溝及大板昭潛出號召儹拉降畨復叛擾木果木後路溫福漫無部署軍營為賊所劫緑營怯兵一時俱潰溫福被害其餘大臣官員兵丁陳亡者甚多我朝用兵從無如此挫折者思之實堪切齒其恨至今將士何辜弗雪寃沉兵威大振徑旅繼至師分兩路谷噶馬尼去聲福木果木之失皆由營中無滿洲兵為之表率亦由溫等奏阻故已派而未遣及溫福既僨事知緑旗兵之終不足恃乃派健鋭火器營兵二千吉林兵二千索倫黑龍江兵二千並派西安荆州駐防滿兵四千前往以為之倡又添派陜甘滇黔兩湖精鋭數萬合力大舉以阿桂為定西將軍豐升額明亮為副將軍阿桂遂統八旗徑旅閲五晝夜而恢復儹拉全境乃進攻促浸甲午正月阿桂自西路攻克谷噶了口占其山梁入賊境百餘里明亮亦自南路攻克馬尼此為再進克捷之始軍聲大振上下同心攄忠敵愾西路遂進南路略泥去聲路勒烏圍從西路進攻噶喇依從南進攻阿桂自攻得谷噶了口遂能扼要所進據皆其險隘明亮等既得馬尼雖時有小捷然庚額特馬邦俱未易攻進於是遂專望西路之得手矣了口深入爰克羅博阿桂自了口進兵以羅博瓦為賊人緊要門户因派兵五路分將令率之超越而登遂將羅博瓦山峯及山岡碉卡盡行攻克喇穆喇穆併占默格叶晴阿桂自三月間攻得羅博瓦阻雨數月至六月初稍遂克其岡下之色淜普又於六月下旬盡克喇穆喇穆山梁及日則了口七月中又克其該布達什諾大木城并焚燒格魯瓦角寨落十月中復占其默格爾山梁其地在日爾八當噶之下榮噶爾博之上向閲地圖指以咨詢阿桂而所籌適相合既占此山梁遂克密拉噶拉木大寨並克獲凱立葉各寨我兵勢益聨絡矣獲康薩爾木思工噶叶自阿桂十月攻得默格爾駐兵密拉噶拉木幾兩月餘至乙未正月十二日官兵乃攻克康薩爾山梁其險倍於他處賊之守禦亦更堅而官軍於三日內全得之其後復因雨雪頓兵三月至四月初十日天霽雪消十四日中夜官兵潛進攻奪木思工噶克了口阿桂自謂一日而收三年未竟之功洵不妄也遜克爾宗其險難託遜克爾宗為勒烏圍賊巢外險自前嵗四月間攻之經年未克阿桂自得木思工噶克了口之後於五月初攻克噶爾丹喇嘛寺及噶朗噶又搶占舍圖枉卡已居髙得勢而留遜克爾宗在後究屬非計乃於五月十二派兵前往時霧氣四塞官軍乘勢攀越崖磡直至碉根遂將其地上下石碉木城悉行攻克是役也豐升額之力居多因於其公號果毅下增繼勇二字嘉其能紹乃祖額亦都之績也凡此數處林立堅碉層次攻𠞰我師實勞據昆色爾乃近賊巢北軍亦至隔河匪遙七月初二日官軍乘夜潛進直上昆色爾山梁蟻附登碉立時攻克初四夜官軍縱火焚賊寨至拉枯喇嘛寺飛騰而入又得喇嘛科爾三寨並攻克菑則大海竭三日三夜之力占地縱橫三四十里焚其碉寨一百三十餘先是明亮在南路以其株守無益令移兵北路㑹𠞰甫至宜喜即得達爾圖山梁至是復由茹寨攻進連克額爾替石真噶等寨盡得其上下沙爾尼之地與阿桂軍營僅一河之隔矣曰勒烏圍賊舊官寨垣固碉髙力守要害經樓輔車陡磡劃界木卡石城蠶簇鱗繪拏柵周遭援路截其泅水拽橋囊土濟師勒烏圍為賊舊巢恃其碉髙牆厚守拒甚力且有轉經樓相掎角中間碉卡鱗次又阻以髙磡五層殊不易攻阿桂於勒烏圍轉經樓之中拏柵以截賊人援路並令冷角寺一帶官兵由西北而南沿河拏柵以斷其下水之路又募楚兵善泅水者繫巨索於甲爾日磉橋柱以拽圮之又以磡邊賊人鎗石可及官軍頭戴柴捆手推沙囊匍匐而行至磡沿層積推起趕列三層木柵以擊磡下之賊穴道旁出轟以地雷叶凡此百計用盡無遺並於所掘地道中用炮轟擊磡下掘溝抗拒賊衆凡可以用力設法者籌畫備至阿桂可謂善於謀矣四面炮攻碉摧垣裂遂督大軍斫牆衝闑遊魂弗支奔迸蹩􅍷功成一夕中秋八月官軍四面合圍炮轟鎗擊並拋擲火彈所遇碉卡或拔柵斬關而入或攀援奮躍而登呼聲四起賊衆披靡殱戮殆盡惟莎羅奔兄弟及賊目丹巴沃雜爾聞風先竄究亦難逃天網計亥子丑三時將勒烏圍官寨轉經樓喇嘛寺悉行攻克凡賊所恃以抗拒之處一夕無不摧破時乙未八月十五夜也衆軍之力一帥之謀靖彼賊穴安我蜀陬肫乎厥忠卓乎厥猷銘志鴻功永示千秋平定金川勒銘噶喇依之碑向不云乎弗加征而自臣屬謂之歸順始逆命而終徠服謂之歸降若今索諾木之窮蹙率兄弟出碉獻印不但不可謂之歸順即歸降亦不可得而方彼其抗命相拒歷五年之長兹已密圍巢穴火器團攻腹心潰內羽翼失傍官軍初圍賊巢蟻衆猶負嵎抗拒我兵用大炮四面環擊賊自揣力不能支日形窘迫先是逆酋之母姑姊妹情急來投自請遣人回巢招諭索諾木乃遣其兄剛達克彭楚克以次詣營懇求皆就拘繫其黨惡之布籠普阿納木等先後求降山塔爾薩木坦等並經擒獲於是進圍益急賊勢日蹙官軍復摧其近碉斷其水道畨衆恇懼紛紛潰出索諾木遂率其兄弟莎羅奔甲爾瓦沃雜爾斯丹巴及兩土婦并助惡之大頭人丹巴沃雜爾阿木魯綽窩斯甲尼瑪噶喇克巴偕兩喇嘛挈屬二千餘人出寨逆酋跪捧印信羣泥首乞命由是罪人斯得獻俘奏凱方將劚寨搜穴利斧其吭生擒亦易旦夕滅亡乃始匍匐請命又安得比之肉袒牽羊噶喇依者蓋其世守官寨故多深塹髙牆我師萬層險歷千戰威揚譬之大木已盡去其枝葉則本根亦可待其立殭然而逆賊有言官軍若至當毁其重器聚族焚而自戕使果如所云則雖獻馘蕆事終不如生獲盡美盡善之慶是蓋凶渠罪大惡極而且貪生苟延以致獻俘闕下明正典刑於是疆界厥地屯戍我兵鎮羣藩而永靖樹豐碑以告成功嵗在丙申仲春日吉時良陶莊河神廟碑記成大事者必有其時事有視若易盡人力而為之然終於弗成者則以天弗助神弗相而非其時也事有視若難盡人力而為之而終於有成者則以天所助神所相而適逢其時也雖然天助也神相也無所為告之者也使時有可乘而人弗盡力而為之亦難望其有成也故舉大事者必當審事機乘時會盡人力以敬祈天助神相則庶乎奏平成之功三者不可闕一焉吾於陶莊引河益信此理之弗爽陶莊之土逼河南流近清口蓋始自宋時南徙歷元及明不知其幾何年矣於是有黃水倒漾之患於是有藉清敵黃之說然而清水常弱黃水常勝雖劼劬補苴終不能得其要領而倒漾自若也惟我皇祖聖祖仁皇帝首見及於此康熙己卯嵗南巡時即命開陶莊引河俾逺避清口以除倒灌之患誠釜底抽薪之計也其後庚辰嵗辛巳嵗壬辰甲午嵗以及雍正庚戌嵗歷任河臣屢挑屢淤於是引河之事遂置而弗論康熙己卯春清口皇祖南巡挑治親蒞河干閲視形北勢命於迤西隔岸陶莊引河導黃使並河臣命於南岸築挑水壩橫截河流逼入陶莊河口因董安國開放過早隨即淤墊庚辰春刑部侍郎常綬等遵挑濬㫖履勘以董安國所挑引河已淤壩亦毁壞請再寬深計長七百餘丈辛巳秋河臣張鵬翮以引河中段淤阻宜加挑濬又運南岸積土於北岸加挑新河五百餘丈其時黃河僅藉以分流不免沙停水緩壬辰甲午兩年河臣趙世顯兩次疏濬屢挑屢塞雍正庚戌北岸長出淤灘遂至大溜南趨全由故道逮乾隆己未嵗豫命大學士鄂爾泰視河仍持開引河之議而河臣河員率以為難行髙斌向稱為善治河者亦以為功不易就乃創建木龍挑溜北趨圖補偏救弊之為於是引河之事更罷而無有言及者矣鄂爾泰請開引河因訪知前此不成之故遂有河頭若不迎溜河尾若不順流開放若不及時三者有一於此無能成河之議髙斌正欲興辦適大水驟至不便施工逮汛水消退察看停淤形勢較前低窪恐水長易漫引河難望成功乃建木龍於南岸以挑溜引河之議遂寢然豫以為陶莊之引河不開終無救清口倒灌黃流之善策但南巡四次未至其地用是耿耿於懷適昨嵗東巡河臣吳嗣爵蘇州撫臣薩載各來覲因見嗣爵老病遂以薩載易之與之談及河務以為海口淤泥之說終難行至陶莊引河則必宜開而未敢必也命其抵任悉心相視及薩載之任與督臣髙晉親履其地測量髙下曲直頭尾寬窄繪圖貼說以聞朕復詳酌形勢以硃筆㸃記往返相商者不啻數次議既定乃於去嵗九月十六日興工以今嵗二月十五日乘春汛水長之候放流入新河而舊河築攔黃壩以禦之既放之後新河順軌安流直抵周家莊始會清東下去清口較昔逺五里於是永免倒灌之患而引河之工成引河既成薩載奏河長計一千六十丈其河頭原挑寬四十丈河身河尾原挑寬三十丈至三十五丈放流後續經將兩涯刷塌河頭寬至七十餘丈河身河尾寬至五六十丈河底水深一丈四五尺亦較原挑刷深六七尺云云此實默邀堤神相至舊河口既築壩堵流并於陶莊積土外添築新以防外灘漫水及薩載工竣入覲復面諭於新河河頭下脣至第三架木龍處添壩一道為重門保障薩載回任旋即興工亦善後最要機宜也夫自康熙己卯逮今乾隆丁酉歷七十餘嵗屢舉而未成及一舉而遂成者豈非時有可乘不可乘之殊而總賴天助神相之所致耶其能劼毖籌畫盡人力而不失事機任投艱而弗猶豫者則錫賚酬勳國家之典具在至夫天恩之賜助蓋自始事以迄成功豫實晝夜在心默叩禱謝無可言喻而河神之佑相非特建崇祠其何以顯明貺達羣誠乎爰即新口石壩建廟妥神俾司事者春秋潔祀以邀惠於無窮並為迎神送神之詞以協律焉河之舊兮本南每灌清兮黃兼神之相兮北漸即運河兮賴永恬迎神之來兮俎豆甘於萬斯年兮恩沛覃右迎神樂河之新兮移北既避曲兮就直神之相兮南塞去清口兮無復逼送神之還兮帷幕飾於萬斯年兮恆戴德右送神樂按記中有河南流近清口始自宋時南徙之語未甚明確蓋宋史所稱神宗熙寧時河道南徙尋經塞治即蘇軾河復黃樓諸詩所由作也惟統志所稱金明昌時河淮并為一瀆之言為今黃河南徙之確據然彼時有宋存焉淮泗一帶非金所有地當屬之宋此因今作河復詩考訂而得者則向之所云自宋時南徙亦未為不可特未詳明言之耳因附書本記後乾隆庚子清和月作御製文二集卷二十九
