front:
  text: 欽定四庫全書御製文三集卷七
  hash: sha256:45a51998a779c94e0062f3a0f5f261bc7fb266954edb7c78f424cc95487940c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_087-1a, image: WYG1301/WYG1301-0613a.png}
body:
  text: 記重葺盧溝橋記文有視若同而義則殊者不可不核其義而辨之也余既核歸順歸降之殊於土爾扈特之記辨之矣若今盧溝橋之重修重葺之異亦有不可不核其義而辨之者蓋今之盧溝橋實重葺非重修也夫修者傾圮已甚自其基以造於極莫不整飾之厥費大至于葺則不過補偏苫弊而已厥費小夫盧溝橋體大矣未修之年亦久矣而謂之葺補費小者何則實有故蓋盧溝橋建于金明昌年間自元迄明以至國朝蓋幾經葺之矣自雍正十年逮今又將六十年帝京都㑹往來車馬雜遝石面不能不弊壞行旅以為艱而橋之洞門間聞有鼓裂所謂網兜者謂下垂也司事之人有欲拆其洞門而改築者以為非此不能堅固爰命先拆去石面以觀其洞門之堅固與否既拆石面則洞門之形畢露石工鱗砌錮以鐵釘堅固莫比雖欲拆而改築實不易拆且既拆亦必不能如其舊之堅固也因祇令重葺新石面復舊觀而橋之東西兩陲接平地者命取坡就長以便重車之行不致陡然顛仆以搖震洞門之石工而已朕因是思之渾流巨浪勢不可當是橋經數百年而不動非古人用意精而建基固則此橋必不能至今存然非拆其表而觀其裏亦不能知古人措意之精用工之細如是其亟也夫以屹如石壁之工拆而重築既費人力又毁成功何如仍舊貫乎則知自前明以及我朝皆重葺橋面而已非重修橋身也即康熙戊申所稱水囓橋之東北而圮者亦謂橋東北陲之石隄而已非橋身也以是推之則知厯來之葺或石面或橋陲之隄胥非其本身洞門可知矣夫金時巨工至今屹立而人不知或且司工之人張大其事圗有所侵冒於其間焉則吾之此記不得不揚其舊過去之善而防其新將來之弊是為記以詳論之顔真卿祭姪文藁記內府所收顔真卿真蹟凡四入石渠寶笈者一真卿書建中三年朱巨川告身待續入者三真卿自書告身卷又書建中元年朱巨川告身卷又裴將軍詩卷别有一爭坐位帖似屬贋鼎列之石渠次等不以為珍也兹乃得其祭姪季明文藁真蹟披閲一再嘆其一家捨身盡節而為其君者如不知也又嘆其經千年滄桑之變而故紙宛存誠有所謂神物呵護者也昔張旭觀公孫大娘之舞而悟書法得端莊流麗之妙若自書告身帖及朱巨川告身帖所為端莊者也若裴將軍詩帖所為流麗者也合端莊流麗為一而更出以無心其在此祭姪文藁乎此卷之顯晦流傳王頊齡徐乾學論之詳矣兹不復贅獨是二人者皆本朝世家亦嘗叮嚀其子弟善守希珍矣今其子弟不能守而鬻之鹽商榷鹽者從而貰之以登之內府撫卷三嘆知忠烈之可以永存而聲華之未必恆保更思時有忠烈之臣則其世必多喪亂之事是可畏之甚也且此數卷獨非宣和書譜中所有之真蹟乎其輾轉流落民間又將六百餘嵗矣然則弆此卷於禁中胥足以為殷鑒之警是不可不記避暑山莊五福五代堂記五福五代堂之扁既額于寧夀宫之景福宫兹復額于避暑山莊者何故敬維本朝家法於凡內殿理事處御書之扁莫不厯代橅勒以志繼繩殷志故正大光明自世祖至今四世勤政殿自聖祖至今三世摹額諸楹是訓是行章章可考自祖書世正大光明四字懸于乾清宫嗣是之避聖祖書之觀德殿世宗書之圎明園豫又書暑山莊勤政殿凡三在瀛臺者山靜聖祖所書在圎明園者書之世宗所書豫于香宜園及茲避暑山莊亦豫因是而繹恩之正大光明修身正心之要勤政則治國平天下之本也內外交勗本末相資觸于目而警於心敢不以是為棘乎若夫五福五代之堂則自豫始豫蒙祖考之佑昊天之眷古希有七曽元繞膝是宜題堂以薌其事而勵其欽然五福之名實亦皇祖昔年所賜皇考之堂名也皇祖御書五福堂扁額之雍賜我皇考敬謹摹勒懸和宫及圎明園乾隆丙申豫葺寧夀宫內之景福宫以待歸政後居之因為五福頌書之屏間至甲辰豫得元孫五代同堂為古今希有之瑞因即景福宫增書五福五代堂之額志慶五福之義見于景福宫之記訖不復綴兹特舉厯世所為正大光明勤政之書以申寓修身正心治國平天下之訓蓋守此訓然後可以保五福是則相需殷而相得彰我子孫曽元敬承天貺世世書此必思祖宗垂訓之意栗栗危懼永保天命可不蘉乎因用此例書五福五代堂之扁以額于避暑山莊勤政殿之後殿蓋此山莊即豫十二嵗時受皇祖教養深恩之處也今得五代同堂神御咫尺有不愈恱而慶幸者乎則豫所以慕含飴而懼隕越又豈言辭所能宣述者哉設豫子孫不負祖宗垂訓惟日孜孜正心修身治國平天下或邀天錫亦得若豫五代同堂而重書五福五代堂之扁以額各處又豫所永望而不敢必者也是為記四知書屋記楊震四知千古以為名言而豫以為書屋之名者非􅊞其迹也彼其卻王密之賄廉則廉矣然而小哉為人君者亦無其事豫之所謂四知者蓋引孔子繫辭知微知彰知柔知剛之義內以正心外以勑政而更慎於用兵之際朱子疏此以為釋豫六二爻義且文王繫卦即曰利建侯行師周公繫六二之爻則曰介于石不終日貞吉是三聖人之意胥示以明慎用兵見幾而作不俟終日之義可不審乎豫昔著遲速之論雖約略言之而未闡三聖人之訓行師貴知幾親切著明若是也蓋微柔隂也彰剛陽也陽動而隂靜動無不由靜彰無不由微剛無不由柔然而柔能制剛微能掩彰靜能勝動此又聖人扶陽抑隂之本義正心敕政以及用兵者不可不深知所謂見幾而作不俟終日者宜何如其凜凜哉因思避暑山莊正殿後室皇祖題之為依清曠于楣間者實理事召見羣臣之所去嵗籌畫臺灣諸務日或三四覲軍機大臣於此兹幸賴天佑彰國威定海澨實因先事知幾得以有成不可不識其事且御筆祇題屋內楣間其外檐實無額名因即以四知書屋之名額之檐間更思依清曠似寄情山水之意無涉熙政詰戎之為而豫則亦有說焉夫水澄然而清故明山廓然而曠故公公與明非熙政詰戎之本乎由知幾而推為四知又豈外清與明曠與公乎是則奎文三字非示萬世以熙政詰戎之大法乎則豫題四知於書室之檐不亦宜乎戡定安南復封黎維祁為國王功成班師之記安南內訌始末及命師為之復國重封之故已見聨句之詩之序兹不贅記記功成班師事宜曰安南雖南瀛小邦耶然亦有民人焉有社稷焉且奉本朝正朔稱外藩者百餘年其邦遭亂興滅繼絶禮亦宜之是蓋奉天道也然彼邦之遭亂豈無所由且其據黎城而擅號召者原非一姓也安南自宋封丁部領為王其後黎桓李公藴陳煛黎季犛黎利莫登庸黎維潭遞相篡奪六百八十餘年國非一姓則自古至今主中華而稱正統者率可知矣雖乘除有命而興亡在人順天者昌逆天者亡吁是不大可畏乎黎城既復嗣孫重封其陷于阮之土地以次傳檄而定孫士毅出關由諒山一路進兵直克黎城復封黎維祁為國王阮惠等已逃回廣南舊巢所有安南境土除大兵攻克之太原處北宣光興化外其餘如海陽山南山西安廣各道俱經傳檄收復現在阮惠等所居之廣南原為占城國地並非黎氏境土二阮窮蹙竄歸廣南去黎城又二千餘里是役也官軍裹糧以進設臺站以運不資安南一草一木而安南荒亂之餘亦不能供軍儲也官軍才萬餘而臺站運糧之夫將用至十餘萬則勞內地矣因護外小邦為之掃穴執醜而勞內地是大不可也且既已為之興滅繼絶則彼之竄寇應付彼平之夫以國家之力抵廣南執二醜亦優為之但權其輕重知止不殆佳兵不祥且安南亦一小邦也黎氏近代以來鮮有能為自强之君或者天將厭其德乎夫天厭其德之邦而豫助之則豫豈敢出師以定亂班師以知退或者不違天道而有合於王者之師乎是為記書安南始末事記春日齊居敬觀皇祖御書心經張照等跋録御製戒之在得之諭憬然有悟因憶安南始末事為之記曰我皇祖戒之在得之訓孫臣固建堂於避暑山莊其義其事已見之前後之記矣昨嵗夏居山莊因有緬甸歸順之事不無為之喜無何而有孫士毅復黎城封黎王之奏則又不無為之喜夫喜者懼之對也懼則若有所失喜則無所更慮若有所失心不敢放無所更慮心或放乎緬甸歸順無過宴賚山莊事則已矣安南之事雖云復其城封其王而其凶首未擒弗屑費中國之力為藩國掃蕩擒渠因降㫖班師使孫士毅速遵㫖班師即逆凶復擾黎城則固外藩之事變亂無常亦不屑每問之乃孫士毅駐彼逾月以待或有所擒獻而又未曽謹設防以致逆凶席捲而來我師倉卒與戰遂有所失而提鎮三臣同以致命幸而孫士毅全師以歸尚不致有傷國體然而赫濯威重實不無少損焉夫興滅繼絶弗利其土地臣民此非欲得也然而得其名與得其實同之安南之事豫果無得名之意乎喜而忘懼謂之能戒可乎故豫不咎孫士毅之貪功久駐失防致損威重而自咎豫之未能體皇祖訓戒之在兹書以志過抑亦慎守此志於永久弗替云爾再書安南始末事記今春書安南始末事記者不在悉自昔安南事之成敗而在識豫畫安南事之喜懼大端已見前弗贅兹因孫士毅陛見熱河而此事亦去嵗駐兹所經理也故志其詳而書之蓋黎維祁之庸昏孫士毅之失算以致阮惠復據安南向固言之詳矣黎城初復使黎維祁果奮發有為自能力敵阮惠使孫士毅早遵㫖班師或預為設備亦不致阮惠率數萬衆忽至黎城而據之事固有相因而至者詳見向所作書安南始末事記然使孫士毅即早遵㫖班師而阮惠亦必復來是不過無傷我官軍之事耳但甫經興滅繼絶之藩國視其仍滅絶而弗救可乎則是師猶無了期也兹黎氏實因天厭其德而自喪其國而阮惠以獲罪王朝震悚悔過求降並請詣闕乞封阮惠復據黎城自知罪過重大再三于孫士毅處悔罪乞降孫士毅不為轉奏亦屬得體及福康安到彼阮惠知易威望重臣事必問罪益加震悚送還留滯之兵籲求來嵗詣闕恭祝八旬萬夀因以乞封並先遣其姪阮光顯於今嵗萬夀前來山莊乞加恩宥權其輕重既于國威無捐且於事機有合不為已甚豫宿志也蓋黎氏既為成此天所厭而中朝與其再興兵役何若允其請封以息師安衆之美然此皆此大上蒼眷佑豫躬不期而臻順耳斯則不勞師而寧衆與封黎氏無異若夫一提二鎮捐軀行陳國家酬庸自有恆典朕且責其於安南立廟崇祀亦足以表國家有勇烈之臣而自古死綏者或鮮其匹矣壯士臨陳非死即傷領兵之臣所弗諱也若孫士毅則總督而為帥臣也設亦如三武臣所為則所繫國家威重者其事體大將不可止所嘉者許世亨左右其間必令督臣全師而歸孫士毅當阮惠復來時帶兵身衝行陳聞許世亨力為勸阻且使武臣控騎遄行必令督臣全師入關無損國家威重世亨原捐軀異域實屬深識大體賢臣以此倍加嘉憫孫士毅原不欲生還既而納許世亨之正論寧全師振旅歸闕請罪是皆以國為重豫嘉憫不已不啻不以為非而且以為是也夫豫臨御五十四載經大事屢矣每以危而復安視若失而乃得即豫自問亦不知何以臻此所謂非人力也天也天之眷豫者獨厚不忍言報惟恐弗勝即此納降安南一事恐後人未識輕重久長之至計故復敘而書之御製文三集卷七
