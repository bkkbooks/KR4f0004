body:
  text: 序開國方喀序粤昔成湯放桀於南巢惟有慙徳曰予恐來世以台為口實斯誠大聖人昭徳垂裕萬世之訓而非漫為謙辭也盖世之治亂猶日月之盈晦四時之周序治極必亂亂極亦必返治此守器者所宜保泰而嬗代循環所由有開剏也湯之後為武王其於處桀紂則武已不如湯矣三代以下武之不如其餘又何足屈指數故以開剏論之實不如有元之與我大清也夫中國之嬗代莫非其祖宗本其君之臣子也有元興於北漠我大清興於東海與中國無涉雖曽受明之官號耶究不過羈縻名繫而已非如亭長寺僧之本其臣子也况乎戴不共之讐乘自壞之勢我國朝始基居長白山北之俄朶里城號滿洲越數世至肇祖居赫圖阿拉在俄朶里城西一千五百餘里地當明境邊徼之外本非屬國傳至景祖顯祖為尼堪外蘭搆釁於明貽害綱廢二祖我弄權太祖以不共戴天之讐又乘明季紀壞閹宦之勢乃奮志復仇於天命三年以七大恨告嗣於天遂滸破親統師征明撫順招降守將擊敗全軍薩爾明四路兵二十萬衆肇於神武布昭克定遼瀋我基遂此至我太宗雖亦國家億萬載之丕躬擐甲胄臨陣決戰然既得盛京規模已定較之太祖斯稍易矣撫定中原建基立極以武王于湯有光擬之則實於漢明有光而唐宋在所弗論矣故兹開國方畧之著不重於繼明定中原而重於自俄朶里以至赫圖阿拉因十三甲篳路藍縷得盛京而定王業若夫興王之始長白朱果盖猶簡狄元鳥姜嫄履跡天生聖人治四海必有祥符與衆不同而更在於聖人之奮智勇受艱辛有以冠人世答天命夫豈易哉予小子受祖宗之業每於讀實録觀我太祖開國之始躬干戈冒鋒刃有不忍觀不忍言而落淚者繼思不忍觀不忍言之心為姑息之仁其罪小觀至此而不念祖宗之艱難不勤思政治以祈天永命慎守神器其罪大故令諸臣直書其事以示後世即明臣之紀本朝事蹟如黄道周之博物典彚之類不妨節取以示證信實然予此為非啻自勵而已也欲我萬世子孫皆如予之觀此書之志其弗動心落淚深思永念以敬天命守祖基兢兢業業懼循環治亂之幾則亦非予之子孫而已矣此開國方畧之書所以作也嗚呼可不敬哉可不慎哉補詠安南戰圖六律序詢孫士毅安南戰事縷晰以陳因命畫院各為之圖補詠近體而序之曰安南戰圖非如伊犂囘部金川臺灣之始以戰而終以成功也非以戰成功則可弗圖而圖之者實縁我將帥之臣軍旅之士涉逺冒險攻堅破銳更有抱忠捐軀者不為之圖以紀其績則予何忍且阮惠之悔罪乞降原因有征斯亦未嘗非始終一事耳夫有征無戰尚矣戰而有成功次之予自定伊犂平囘部𠞰金川以至近日戡定臺灣之役皆經指授機要戰無不克攻無不取以成此數大功盖戡亂伐暴難言偃武則雖不能有征無戰而俱獲成功要皆天心佑順乃克臻此成而復變又終於不戰而成功其事當較於戰而成功者為勝焉阮恵復至黎城黎維祁仍棄其國可謂變出不意然予調福康安為兩廣總督仍將集兵聲討迨阮惠再四籲懇又遣親姪阮光顯詣福康安處齎表求降福康安察其情形實出至誠然後據情入告予因思黎維祁不能立國既徵亦不天心厭棄而中朝又不利其土地即使集兵聲討過歸於降服而究未必即服其心則何如此之不戰而屈者發於中誠蕆功寧衆轉為大順之機是更足以見天心之佑于躬實為至厚耳是豈人力所謀乎天也藐躬臨莅五十四載受天之祜不一而足而於安南之事復不戰而成功則予之所感激鴻貺益深敬畏者當何如間嘗論之使孫士毅收黎城之後即能銳師至廣南獲阮惠乎又如孫士毅遵㫖早班師雖無許世亨等三將之捐軀將未至我境而黎城復失其能不旋師以救之乎又如孫士毅亦同三武臣之捐軀沙場則士毅乃督戎重臣傷國體為大不得不興師問罪是誠佳兵無已時矣且許世亨委曲䕶令孫士毅振旅而還使已亦同歸則更有説乃仍捐軀疆場其知方有勇為常人所不能每一道及為之落淚嘉尚至孫士毅非不知朕之奬勵功臣賞延後世設亦捐軀則其公爵必世襲㒺替人誰不死且本欲衝鋒致命迨聽許世亨之言以國事為重寧歸而受朕之罰而朕豈肯不諒其心加以罰哉是二臣者其事不同而心則同兹事機之㑹總戎振旅以歸三將令藩國立祠酬忠且阮惠因有此過而畏罪求降不勞一旅以定海邦是皆昊運旋轉黙為呵䕶豈予一人思慮所能及哉自兹以後益深敬勤静待天恩六年歸政夫何敢更生别念乎此補詠安南戰圖之什所由作也集石鼓所有文成十章製鼓重刻序凡舉大事者必有其㑹與其時而總賴昭明天貺以成其功武成九次無論矣即如四庫全書及以國書譯漢藏經皆始於予六旬之後自癸巳年蒐輯海内遺書並於永樂大典内採集散篇命館臣依經史子集督繕四庫全書四分又佛經本出厄訥特克一譯而為唐古特之畨冄譯而為震旦之漢其䝉古經則康熙及乾隆年陸續譯成而未有國書之佛經先於三十七年亦命開館譯定兹二事巻帙浩繁俱非易於觀成者乃皆在予六旬後始命舉行初亦不覺其遲也既而悔之以為舉事已晩恐難觀其成越十餘載四庫全書則早㕘攷装潢畢以貯之閣而所譯漢藏兹亦將告畢就此非天恩垂佑俾予雖老而善成此二事乎近因閲石鼓文惜其嵗久漫漶所存不及半夫以國學興賢述古之為使千萬年之後並此僅存者胥歸無何有之鄉有治世之責者視之而弗救予且不成為讀書之人矣斯事體大千古讀書人所不能任亦從無道及者予故不作不文及此未至耄耋智昏爰蕆此事盖石鼓之為宣王時作與夫宜置國學為萬世讀書者之津逮自以韓昌黎之見為正車攻吉日之章班班可考也後人議論紛出如董逌程大昌據左傳成有岐陽之蒐以為成王鼓鄭樵據殹㞼二字見秦斤秦權以為秦鼓馬定國據後周書以為宇文鼓陸友仁據北史以為元魏鼓至楊慎之偽作全文為尤謬甚總不若韓愈之見為正盖即本鼓之文取證小雅可信也若歐陽修集古錄云韋應物以為文王鼓宣王刻今應物石鼓歌具存明以為宣王何曽有文王之説近者尚誤况與論三代以上哉夫昌黎有其見而無其力且未思及存其詩則予較昌黎為勝矣兹用幸翰苑之例乾隆九年重修翰林院落成親臨錫宴以張説東壁圖書府五律四十字為韻予賦東字及末音字二韻其餘飭諸臣各分一韻賦詩親定首章截其長以補後數章之短即用文中字並成末章自第二至第九命彭元瑞按餘字各補成章非因難以見巧實述古以傳今於是石鼓之文仍在十鼓井井有條而不紊矣舊鼓舊文為千古重器不可輕動但置木柵蔽其風雨以永萬世而新為十鼓以刻十章並列國學以公天下惠後儒則仍周宣之文也熱河文廟為嵗嵗惠逺詰武之地則亦命置之以詔來世庶乎宣王中興之烈不泯宣聖牖世之道恒昭而予及耄耋之年尚得蕆此崇文之舉孰非㑹之萃時之合深䝉昊貺之所致哉希周家卜世之久鬯皇清重道之規後世子孫尚慎念之是為序清文繙譯全藏經序為事在人成事在天天而不佑事何能成人而不為天何從佑然而為事又在循理為不循理之事天弗佑也予所舉之大事多矣皆賴昊乾黙佑以厎有成則予之所以感貺奉行之忱固不能以言語形容而方寸自審實不知其當何如也武功之事向屢言之若訂四庫全書及以國語譯漢全藏經二事胥舉於癸巳年六旬之後既而悔之恐難觀其成越十餘載而全書成兹未逮二十載而所譯漢全藏經又畢蕆夫耳順古希已為人生所艱致而况八旬哉兹以六旬後所剏為之典逮八旬而得觀國語大藏之全成非昊乾嘉庇其孰能與於斯而予之所以増惕欽承者更不知其當何如矣至於以國語譯大藏恐人以為惑於禍福之説則不可不明示其義夫以禍福趨避教人非佛之第一義諦也第一義諦佛且本無而况於禍福乎但衆生不可以第一義訓之故以因縁禍福引之由漸入深而已然予之意仍並不在此盖梵經一譯而為番再譯而為漢三譯而為䝉古我皇清主中國百餘年彼三方久屬臣僕而獨闕國語之大藏可乎以漢譯國語俾中外胥習國語即不解佛之第一義諦而皆知尊君親上去惡從善不亦可乎是則朕以國語譯大藏之本意在此不在彼也兹以耄耋觀蕆事實為大幸非溺於求福之説然亦即䝉天福佑如願臻成所為益深畏滿怵惕儆戒而已耳是為序石刻蔣衡書十三經於辟雍序前嵗集石鼓文而為之序有曰凡舉大事者必有其㑹與其時而總賴昭明天貺以成其功信弗爽也石鼓不過周宣王之事列於文廟之門以寓興文尚俟其時其㑹若夫十三經則古聖先賢出諸口以傳道授教其重於石鼓文奚啻倍蓰哉則今之石刻十三經是矣盖此經為蔣衡手書獻於乾隆庚申者其間不無少舛譌爰命内翰詳覈以束之懋勤殿之高閣至於今五十有餘年亦既忘之矣昨嵗命續集石渠寳笈之書司事者以此經請乃憬然而悟曰有是哉是豈可與尋常墨蹟相提並論以為幾暇遣玩之具哉是宜刋之石版列於辟雍以為千秋萬世崇文重道之規夫經者常也道也常故不變道則恒存天不變道亦不變仲舒之言實已涉其藩矣盖石經之昉自炎劉一字曹魏三字石經之刻所以考定聖賢經傳中文字同異歸於一是使天下萬世學者有所師承遵守盖考文為三重之事也昉自漢時經籍大出白虎觀講論之後熹平中以諸博士試甲乙科争第高下更相告言至有行賂定蘭臺漆書經字以合其私文者乃詔蔡邕等正其文字刻石鴻都一時觀視及摹冩者車乘日千餘兩填塞街陌事具後漢書至魏正始中更立石經並刻魏文帝典論六篇見戴延之西征記其一字三字之分宋洪适本朝朱彞尊俱以漢為𨽻字一體魏為古文篆字𨽻字三體盖石經自王彌劉曜入洛殘壞之後雖晉裴頠北魏崔光俱請修補訖未完工迨北齊乃自洛陽遷之鄴都隋復自鄴遷至長安屢經移徙散失及營造用為柱礎十不存一見隋書經籍志至唐時内府偶得一二遺字即鈐用開元小印列於法書名畫以為珍玩其流傳亦已僅矣訖不可攷李唐北南宋雖曽有刻或乖或不全唐太和七年勅於國子監講論堂兩廊創立石九經並孝經論語爾雅至開成二年告成其地舊在務本坊自天祐中韓建築新城而經石委棄於野至朱梁時劉鄩守長安用幕吏尹玉羽之言遷置唐尚書省之西隅至宋時地雜居民窪下霖潦隨立輒仆腐壊折缺吕大忠領漕陕右始移置府學至明時又補刻孟子嘉靖乙卯地震石經倒損西安府學生員王堯惠等按舊文集其闕字別刻小字立於碑旁以便摹補今在西安府學劉昫舊唐書謂石壁九經字乖師法本朝顧炎武作金石文字記亦刋其訛誤乃知唐石經未為善本劉昫之言未誣也其後孟蜀時亦刻石經北宋刻兩體石經今片石無存金燕京廟學有九經石刻見王惲秋澗集明時尚存二碑今亦無考南宋紹興九年刋石六經論語孟子成嵗久殘缺明宣徳中巡按御史吳訥收拾碎折補輳得碑百斤置仁和縣學宋廷佐復移之杭州府學今存然當時所刻春秋僅左氏傳禮記僅大學中庸學記經解儒行五篇又無周禮儀禮孝經爾雅非其全也兹則出一人之手經諸臣之目視厯代為加詳矣蔣衡後改名振生江蘇金壇恩貢生乾隆五年以所書十三經進賜以國子監學正銜其經冊貯懋勤殿今以之上石視唐石經所列銜有書石官書石學生體例殊為不倫特命大學士懋勤殿翰林校勘予自六齡入學堂讀易書詩三經所為易簡而天下之理得二典三謨為王道始正變風雅不知無以言及長而涉獵三禮覺與三經為有間去聲詩謂易書枕葄麟經慎正統偏安之必公春秋大一統尊王黜覇出於天命人心之公予讀之有年心契聖人筆削之㫖纂定通鑑輯覽一書袪後代操筆之自私示萬世守統之宜慎分注系年皆取春秋之義差自謂讀書有得耳孜孜饜飫耄耋弗衰雖自愧學之未成迺今刻諸石列諸辟雍應時舉事以繼往聖開來世為承學士之標準豈非厚幸也歟蔣衡一生苦學之勤亦因是酬矣若夫厯代注疏入主出奴紛如聚訟既冗且繁衡祇書諸經正文餘槩從刪是也或以為不觀注疏何以解經予則以為以注疏解經不若以經解經之為愈也學者潛心㑹理因文見道以六經㕘互之必有以探其源而晰其奥者是在勤與明而已且予重刻木版之十三經注疏頒布世間者不少也舉辟雍以五十年勒石經又越六載凡所以待其時而逢其㑹八十老人復得成斯大功者何莫非賴昊天之鴻貺乎昔著知過論以為其不可已者仍酌行之斯之謂矣盖凡物有其成必有其壞所謂石鼓石經者皆是也然向不云乎經者常也道也天不變道亦不變依聖人之門墻示萬世之楷則孰謂滄桑幻化能移我夫子不朽之道也哉是為序補詠戰勝廓爾喀之圖序補詠戰圖之什逮斯凡六伊犁囘部第一烏什第二金川第三臺灣第四安南第五及今廓爾喀第六厯數成功之全即今乃十平定伊犁二次囘部一次金川二次臺灣一次緬甸一次安南一次及今廓爾喀二次共十次予幸在兹予惕更在兹盖予受祖宗付託之重度德量力尚恐守成之或虧敢懷開擴之奢望且予自少讀書即欽天地愛物之心深知窮兵黷武之戒是以繼位之初即謹遵皇考之訓許準噶爾之求和罷兵寧人將二十年矣乃準夷内亂歸降者踵接思我喀爾喀之地不能容爾許人於是乘機撫衆有甲戌之師自是而兩定準夷一平囘部再靖金川緬甸安南各歸順臺灣一舉輯海洋及此前後收廓爾喀遂有十全之武功使予自問亦不知何以成此則實賴上天黙佑每以險而獲安常值危而得勝較古之英君賢將赫濯樹勲者雖不敢云過之而自審實無不及所云予之幸人或知而予之惕則人或未知也所惕者何自古為天子者孰非天之子既為天之子天孰不愛之而予獨承之深受之屢設有失德違愛則所以罰之者亦必重此予所以業業兢兢不遑刻安者也且前此八功之成雖云絶域外洋皆人力尚可施之地若斯廓爾喀則在萬里三藏之外更數千里陡壁線路下臨深川不能容馬人皆踵跡而行我將卒胼手胝足雖惰窳疲弊而氣愈鼓心愈壯突將無前賊人駭為天降鹿埵隴種傷生實多而憐之乃致彼魂落膽䘮匍匐求降此而弗圖其勞予心又何忍適不云乎自少年即深知窮兵黷武之戒乃四十年之間自甲戌始十成武功非用兵而何幸而䝉天眷佑得以劼劬蕆事於民無一賦之加於事有十全之美則予之所以早作夜思弊精勞神者庶可少逭窮黷之譏耳觀斯圖也不啻共將卒之辛苦實並切心膂之恫瘝詩以言志其志亦不外乎此爾續纂秘殿珠林石渠寳笈序秘殿珠林編自癸亥成於甲子石渠寳笈編自甲子成於乙丑逮今均四十餘年矣二集以三朝宸翰為宗而厯代所弆古人及本朝臣工之書畫分門别類精覈無遺胥内廷翰臣張照梁詩正等所為今視其跋無一存者亦可概也自乙丑至今癸丑凡四十八年之間每遇慈宫大慶朝廷盛典臣工所獻古今書畫之類及幾暇涉筆者又不知其凡幾無以薈輯日久或致舛譌且二集章程具在續纂亦非甚艱因命内廷翰臣王杰等重集一如前例若三朝宸翰已備録前集兹不復載其有石刻之未入者仍敬録各類之巻首然予之此舉實因誌過而非誇博古也盖人君之好惡不可不慎雖考古書畫為寄情雅致之為較溺於聲色貨利為差勝然與其用志於此孰若用志於勤政愛民乎四十餘年之間應續纂者又纍纍若此謂之為未害勤政愛民之念已且愧言之而况於人乎書以誌過後之子孫當知所以鑒戒去取矣至西清古鑑可以類推更弗贅言御製文三集巻九
