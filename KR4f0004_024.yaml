body:
  text: 賦氷嬉賦有序陸行之疾者吾知其為馬水行之疾者吾知其為舟為魚雲行之疾者吾知其為鵾鵬雕鶚至於氷則向之族莫不躄躠膠滯滑擦而莫能施其技國俗有氷嬉者護膝以芾牢鞋以韋或底含雙齒使齧凌而人不踣焉或薦鐵如刀使踐氷而步逾疾焉較東坡志林所稱更為輕利便捷惜自古無賦者故賦之其辭云嵗暮星窮和叔告冬隂凝北陸律中黃鐘景長而土圭可測瑞兆而雲物皆同撫序兮羣辟殷聘考時兮三農蕆功有厲疾之征鳥鮮求信之蟄蟲叫嚴飇兮栗烈凛肅氣兮穹窿於斯時也火井無燠溫泉不熱何水不凝何波不結阻平川之會海徒望􅞹潫勒奔峽之傾流惟聞幽咽澌盈九曲謝神禹之剔鬟凍合三山駐王喬之旌節躍魚之表孝曽傳覆鳥之昭祥見説則有鏡呈太液璧寫龍池占昏危之應宿值顓頊之司時沍而不流兮礙矜鱗之鯉凝而原徹兮疏倒影之梅叶皓皓皚皚兮映白塔之孤矗溓溓泠泠兮隔玉蝀之橫欹載取載藏兮順彼月令以訓以賚兮陳我氷嬉爰答嵗華率循舊典陳旅集衆既雷動而風行結部整行埓春搜而秋獮元冥授律戢水族與波臣蚩尤秉旗乃暴禦而祟遣於是戎士憑怒武卒振拳渴思一試遑慮誰先齊撙撙其轇轕兮昈陸離以屬聨駭營營其佖路兮紛偨傂以羅駢袒劉吕之左右兮各殊事以布班倐隂陽之閉闔兮期奏績以勤宣衣短後膝蔽前鞾齒雙利鞋刀兩儇編伍森列齊隊便旋於斯少息以待號令之傳焉爾其屯萬人於中堅兮屬堪輿以壁壘奔八神以周衛兮招丁甲而發指亘長縆以節止兮羣總總而切擬驛綵旌以傳符兮看縱縱之立俟心無别營目不他視遂乃朱旗颭捷步騰緹衣揚輕武􅚢聳擢布濩豗逐䞴趟踧沑波流蜂軼猋驚閃如曳電疾若奔星蹂蹈雲衢揚揮玉京故其為聲也軯礚隱訇礌硠激越硡砰殷轔雜沓震疊謍振天棖響匉地臬懾波底之娵隅墮林間之巢鶻元武縮殼而屏氣燭龍守珠而閉闕起湧泉會奔物雖天籟之毫竅比千鈞於一髮其為狀也似東皇整駕於若木之墟羲帝弭節於扶桑之津應真挂錫以凌虛茅君驂龍以羾天叶過驥羣而駿足搶捍上扶搖而鵬翼圖南叶蠖略回翔演沱糾紛鏡大圓而晶晶皛皛珠萬琲而爛爛璘璘交差曼衍厯落皴鱗突都盧兮輕趫迅龍驤兮麟振奕六虬兮沛艾御八風兮穆旻首進者郤視而小憩繼至者錯履而蹴跟虞後來之比肩更前往而擢身傑者得幟疇與比倫遺者失志第如逡巡復有革戲其名圓鞠漢家有執機之譬黃帝作練戎之俗武由是習兮其爭也君子好謀而成兮如祭則受福申明誓兮衆聽無譁陳廣場兮各司其局乃其氷牀駐於琉璃之界豹尾扈於鸑鷟之隈千官儼立於懸圃萬隊佇待乎瑶階歷天之旗影捎朵殿昭雲之蓋光熻躍臺殆而容與惄若邅徊執事者中立而不倚爭捷者有前而無回珠毬一擲虎旅紛來思摘月兮廣寒之窟齊趁星兮白榆之街未拂地兮上起忽從空兮下回突神龍之變化蕤祥鳯之䯱䰄鶣􅝎燕居姌嫋鴻猜怡情悅目有如是哉夫其伯仲分甲乙第併前行賞縱後亦逮叶勇者特旌任者均賜普被曰仁有差曰義則豈啻西苑飾紅板之柁溫泉設錦鞍之戲而已乎重曰仲尼有言射觀德兮安不忘危舊是式兮惟嵗之宴以休以息兮一日之樂匪賚曷得兮敬告後人無或逾則兮述悲賦有序乾隆十有三年春車駕幸山左禮成返蹕皇后以三月十有一日崩於德州舟次星夜解維兼程旋軫歸殯於長春宫奉遷於觀德殿喪儀有制時日如流觸緒增悲非文奚述感孫楚除服之篇效潘嶽悼亡之作用緣情而遣藻聊寫恨於哀絃賦曰易何以首乾坤詩何以首關雎惟人倫之伊始固天儷之與齊念懿后之作配草二年而於斯痛一旦之永訣隔隂陽而莫知昔皇考之命偶用掄德於名門俾逑豫而尸藻定嘉禮於渭濵在青宫而養德即治壼而淑身縱糟粳之未歷實同甘而共辛乃其正位坤寧克贊乾清奉慈闈之溫凊為九御之儀刑克儉於家爰始繅絲而育繭克勤於邦亦知較雨而量晴嗟豫命之不辰兮痛元嫡之連棄致黯然以內傷兮遂邈爾而長逝撫諸子如一出兮豈彼此之分視叶值乖舛之疊遘兮誰不增夫怨懟況顧豫之傷悼兮更恍悢而切意尚強歡以相慰兮每禁情而制淚制淚兮淚滴襟強歡兮歡匪心聿當春而啓轡隨豫駕以東臨抱輕疾兮念衆勞促歸程兮大故遭登畫舫兮陳翟褘由潞河兮返內朝去內朝兮時未幾致邂逅兮怨無已切自尤兮不可追論生平兮定於此影與形兮難去一居忽忽兮如有失對嬪嬙兮想芳型顧和敬兮憐弱質望湘浦兮何先徂求北海兮乏神術循喪儀兮愴徒然例展禽兮諡孝賢思遺徽之莫盡兮詎兩字之能宣包四德而首出兮謂兩字之可傳驚時序之代謝兮屆十旬而迅如睹新昌而增慟兮陳舊物而憶初亦有時而暫弭兮旋觸緒而欷歔信人生之如夢兮了萬事之皆虛嗚呼悲莫悲兮生别離失內佐兮孰豫隨入椒房兮闃寂披鳯幄兮空垂春風秋月兮盡於此矣夏日冬夜兮知復何時哨鹿賦有序賦者古詩之流詩以言志其有不能盡言之志則賦可以申之我皇祖昔喜哨鹿朕沖齡隨侍習聞其事年來乃親試為之嘉其有合於聖經顧古人無賦之者故不愧無文其辭曰伊白露宵中之候正伊尼孶尾之時生不息焉洪鈞運而誰測物雖蠢也氣機至而咸知故三序春夏冬則牝牡各從其類謂牝隨牝羣牡逐牡侣惟中去聲秋斯牝牡各媲其妃謂牝各分羣而匹牡強有力者不惟挾兩而纍十弱無能者或乏獨匹以相隨或依林而命侣或據嶺而分畿或悍害而傲衆或謹守而自持或豪敓而攘彼或竊取以私其萬態紛其莫窮一以音而宣之於是虞人善因聲以察情爰體情以斆聲喜金風之颯爽值玉宇之晶明霜重而不言其冷露濃而那覺其零陵嶮巇而如登袵席冒蒙茸而不異户庭慮吾逰之晏起虞原獸之怠鳴鹿逮晨則懶鳴哨亦不進故哨鹿者恆於未曙前即往夙戒僕而奚從欣戴月而披星舍彼寬衣宜茲短服荷長哨於左肩以木為哨鹿之具呦呦以鳴出象首於右簏象鹿之首人戴之則鹿不疑躐嶒陟嵕沿溪穿谷攀蘿兮豈辭胼手履石兮何妨馗足蓋以暢茲心神詎惟叨其口腹於焉蹴乎崔嵬軼彼嵾嵳上干丹楓之巘下視白雲之隈上風餮切之避忌陽林晃耀則紆回就叢薄之蔽翳反獺裘而毰毸衆條理焉畢會乃得傑雄之爭匹者呦踉蹌而徐來角八又兮嶷嶷耳雙聳兮濕濕挺強項兮莫攖矗靈鼻兮善䶋始嚇侣兮自間乃妬異兮矜急既漎漎兮疾赴復􅀢􅀢兮少戢蓋屢試兮絶猜遂鋭志兮直入爾其動林無形匪風有響適其將至撇爾懼往奮角思觸瀏睨爭長則在夫能哨者善達變以隨機比用中而執兩或激其怒兮使進或示以弱兮令放惟察情之喜怒乃應聲為低仰蓋用心於既専斯通靈而不爽既然矣無動無慮不徐不遽驀黶合之前陳陡應叱而少住屏營收息量卑揣髙傍斗窺星鎗上施星斗所以審髙低度分以毫審度發機馥焉中膏命處擇肥登於大庖若夫多疑旁剔既進中止膽劣心狷狐猜狼視未交戰而長跳驅叢樾而如駛則亦比之窮寇之莫追又何必焚林而盡取哉蓋嘗研精哨鹿之理而知五德焉取一以新匪二以頻仁也逆者斃之去者置之義也爰登簠簋爰嘏福履禮也招之即至獲之即遂智也呼哨以進射宿凛訓信也如是者蓋有合於聖人之洪道而又豈潘嶽耽盤流遁之所誡相如子虛上林之所嘲也哉靈珀賦繄靈珀之凝質稟粹氣於先天外標黃而潤玉中含金而吐蓮知四時以榮謝隨一氣為轉旋陽始生而蘂張去聲隂漸長而葩零叶比堯階之蓂莢符舜陛之璣璿雖異物之弗寶亦佳徴之賴傳葆法宫以協時爰紀實於斯篇夜亮木賦東坡先生謫居黃州蠻煙瘴雨之鄉不改其樂青瑣玉堂之側敢忘其憂則施施而行舒舒而逰惟木石之與居亦鹿豕而為儔一日者入深林窮回溪蒼然其暝不辨東西覩一物焉晶晶熒熒燦燦離離匪鮫人之宫宛呈火齊豈天祿之閣乃示燃藜逺而視之謝鶴焰之布暖昵而迫之肖螢火之生輝是何繼明之屬而光怪若是其離竒也哉於是徙倚倣徨瞻矚審詳厥有卧木於河之陽生意已盡葉落枝僵皮膚瓦裂癭瘤土囊木魅之所揶揄山精之所潛藏千齡寂滅萬古荒涼雖有九轉之丹祖洲之草不能起其生機豈復冀其妍好是固匠石之所棄顧漆園徒資諧喻棟梁弗任繩墨乖度永辭剞劂不受丹雘埋沒沈淪訖無用處乃其日月駐照雨露垂滋豈有取舍不分公私否之極者泰斯復暗之盡者彰亦隨則見夫微微耀吐熠熠精發含隂火之怫鬱比木難之熻蔚可以奪車子之囊可以掩纎阿之闕失路者得津夜逰者棄燭文梓徒爾青牛貞松彼哉白鹿枯樹緬東陽之庭朽社託髙橋之陸蘇子愀然扼腕竦立而歎曰木必先腐也而後蟲生之謂永世其無用而尚有自見之時況萬物之最靈豈終不及乎斯相隨二任顧而問焉是固極南麗明之區也若夫長城之北迤邐隂山人迹之所罕至鳥獸之所盤旋陽焰隂磷氷碎曦暄孕焱揚爚舒爓爭煓不假人力豈伊火傳孰繼其後孰啓其先蘇子失答笑而弗言南苑雙栁樹賦廣甸春風躞春騎兮玉驄伊雙栁兮宿識欣向榮兮菁蔥念此地兮少逰緒紛觸兮吾衷昔曽損一獨樹孤蹤伊誰補種新匹舊同其舊復枯賔為主翁而何新賔代嬗莫窮樹不能言長言以通若夫東門徒期上林復起嵇康則夏月居之張緒則當年似已桓司馬之金城所種攀枝泫然陶淵明之彭澤所栽酬觴醺矣雖亨屯之略殊總未出乎情之所使也爾其枯楊生稊老夫得其女妻雖云過以相與何妨聊復宜之豈知夫何能故者曰世不再來者惟時則見牂牂老葉蕭蕭敗枝強搖金以梳風慢寫玉以臨池對嫩條而常覺忸忸憶昔侣而那置依依值秋風而不禁溘朝露而豈辭好事者憐之曰樹可亡也名不可亡也幻者常之幻也常者幻之常也乃復移植新者而使成雙焉蓋經余見者三十年之間新舊迭為賔主者凡三矣嗟夫舊閲新而成故故何新之恆齊竒合偶而成雙雙何偶之弗離覩兩樹之如斯雖萬事其可知暮而隱几若有星宿之昆前而言曰大椿過八千朝槿榮其後是誰之詩乎曩何為而弗惜今何事而余悲乎且夫建木則大五千圍蟠桃則歷九萬嵗劫至數盈根蠧節瘁不聞名以實傳實以名寄如兩樹之閲滄桑而永世焉昌昌生意未婆娑方來日月其正多不亡者存感則那言訖而去若尼拘使者之相過也後哨鹿賦或問哨鹿之時之法之義蓋已藴賅前賦矣若夫冒凛冽之霜晨衝蒙翳之林薄踐岝崿之巉峯涉沮洳之幽壑十哨未必一來十來未必一獲獲乃心欣失斯興索多見其勞鮮聞其樂則何不張堂堂之圍按徐徐之度收藉藉之富免皇皇之謔而故為是寒征而曉作者何哉曰吁是何言耶是何言耶見土障葛燈而嗤為已過者非忘其先也耶逸則淫而勞則思季氏之婦猶聞之固可弛其惕乾耶或曰惕乾者蓋不若是矣意者慎大寶居法宫屏九御接三公劭農政熙天工豈謂當即鹿於隍中耶曰子知其一未知其二坐吾語汝賦以見兹若夫髙談堯舜深處廟廊文恬武嬉內弱外強孰不喜夫逸體而庸詎知其頺綱也哉且也身歷其難者告之以人之難而知而不知人之餒者方謂何不食肉糜也是以神區天闢後法先垂詰戎習衆謹度節時圍以示正哨以出竒得之艱者趣斯永躬其勞者樂亦隨蓋理境之當窮可潔矩而深思也於是秋本蕭辰塞猶凄所宵風定兮林靜曉月上兮山岨儦儦者妬羣俟俟者攜侣遵彼􅜓􅜓之蹊如或殷殷而佇吹長哨以通情似應聲而答語去亦弗追來亦弗拒則有強者捍捩弱者趦趄猜者飄瞥怯者踟躇慷慨者恲性昏瞀者模糊雖人情之萬態亦奚有以異諸緣輳物來獲一勝百其來也亦惟去之是慮其獲也夫何失之足惜去與來固難期之儻然失與獲亦無定之屢易吾因以參如幻於現前愛景光而為適也爾其問夜宵衣據鞍䇿馬萬帳燈明七萃聲寡是則始出營而覽離竒晃耀之狀也若夫炬影漸逺夜色猶暝峯嶺才分林樹未形乍如夢逰玉樓十二仙人京乃其曉蟾初吐或半或圓隔葉瀲露度水翻瀾又如虹橋可躡徑欲造廣寒髙山出雲雲去山在變幻頃刻步移觀改則何異夫黃山之海赤烏扶桑霧斂氛開玫瑰靺鞈熊熊回回又奚數其初陽之臺於焉入深樾凌崇巒密容單騎疏見線天千年落葉鱗裓谷填色作黃金風吹不翻臭如沈水履若罽氊邅徊乎靜真乎忽訝夫身入布地之園而伊尼之羣方且左右前後與人周旋失兮獲兮勞兮樂兮率已相忘於無何有之禪矣問者茫然不知所謂懡㦬局蹐唯唯而退神樹賦有序永陵內肇祖惟謹藏衣冠興祖實奉安龍脈正中景祖顯祖昭穆左右興祖寶鼎前生瑞榆一株輪囷盤鬱圓覆佳城尊之曰神樹敬為賦以紀之懿乎啓運之為山也分長白之龍幹結祕聖之神丘屏納緑窩集之瑞麓帶蘇克蘇湖之祥流是以橋山建鼎原廟藏旒以祀以禋綿繼繩於奕代卜年卜世揚光烈於千秋爰生神樹非柏非松根從天上分來想銀河之歷歷種豈人間所有鬱佳氣之蔥蔥前乎此者昭靈貺其若彼後乎此者垂景佑於無窮儼若帝謂東王木公曰赫圖阿喇興王之里山聲告慶繁禔祉乎丹陵河色呈榮郁英華乎白水宜有嘉蔭圓覆鼎湖如繖如蓋為禎為符木公承命咨之女夷叶選材去柘舉瑞得榆是誠兆大清之篤祜庇萬葉而多餘者也爾其夭矯蘢蓯閜砢蟠薄偃仰森沈離披錯落翩乎軒庭紫鳯翔阿閣偨池蔥蒨緑翠丹黃參差杳靄雲日風霜又如禹代御龍逰帝鄉夫其貝多菩提建木蟠桃荒唐謬悠增誕騰嘲至夫樗材散木枯樹浮槎玩世狎物寓意興嗟則何如徴實迹於無斁表庥應於有遐者哉乃作頌曰巍巍永陵興王都兮吉雲在上滃扶疏兮與地同久霜露濡兮金幢玉節布以舒兮蔭暄承潤永劫俱兮數上聲葉億萬綿世如兮樹根山子賦古木之根幻而為山昔木也本託山以菀植今幻也乃借根以形存孰久孰暫誰主誰賔則見崥崹磊砢偨池閘閜若太華之諸峯也拳曲盤坳戢孴蒨峭若岱嶽之五松也故乃神農甄四海之所遺白阜脈萬山而莫知莊樗惠瓠張槐盧梨名斯紛矣質詎如斯别有淮南髙蹈魯東隱淪望林巒而結念指雲壑以馳神蘇東坡之置几用夀弟轍庾新野之染翰託興仲文斯固閲桑田而莫變逾火劫而留芬者矣嘆夷齊松賦有序僧機圖嶺之下有喬松一根而二大幹向名之曰夷齊而繫以歌數嵗未經此地今來則已燬於火焦株突兀尚存徘徊其側者久之因感而為之賦繄橫嶺之案衍舊傳名曰僧機盤羊腸而就下既南折而少西有喬松之鬱鬱昔號之以夷齊料名實其並夀豈燋爛之不期因循未過忽忽嵗時重尋斯徑謂二老之我徯遙瞻失望見枯株之獨遺徘徊落莫於悒吁嘻夫其挺根拔出庸詎畏沙石之堙劙既其摩空盤翠又寧慮霜雪之凌欺是以閲滄桑而永茂侣椿樗以無危擬西山其毋忝摛東壁已有詞豈知火母惟木巽即鄰離匪牧童之偶失蓋谷神所默為爾其心空脈燥不燃自炊山雨不能息其焰谷風偏復煽其威吾雖未覩其焆㶿陵坂之狀而早想見其灼燌枝葉之時也於是陳根突兀以孤立雙幹南北以紛披鱗甲剝落卧於巖陲山禽尋巢而弗得原鹿擇隂以徒悲惜其淪於灰燼命以車而載之蓋其遭劫爍燬之餘猶足勝棟隆之吉而九牛領穿以難移者也嗟夫孰具形而無壞孰有成而弗隳孰云真之匪幻孰恆實之名隨羡枯樹之卓識更感歎其奚為然而少言之以八百為春秋者何一經詠才周紀而頓毁敗其如斯夷齊松歌作於丁卯今適周紀豈二老有待余之名題也既名立乃飄然返沖寞以無辭也抑謂名者喪實之具而有所弗居也將轉焰輪示第一義諦也其既隳者斯已毁而弗再其不壞者固將同天地而並垂也知然而猶嘵嘵不已者豈非余之癡也耶御製文初集卷二十四
