  text: 欽定四庫全書御製文初集巻二十七
  hash: sha256:5177526b6ec2a8a8bf6c73c91d990c842b2c2458f1c763c69cc92d2cfb3786c4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_027-1a, image: WYG1301/WYG1301-0234a.png}
body:
  text: 銘多福硯銘惟古有訓斂時五福敷錫庻民幽贊化育承天之序厥惟艱哉視民如傷孰釋予懷毋曰九重之宫而安其躬念蔀屋之竊歎每憂心以忡忡毋曰八珍之饍而供其宴念糲食之尚乏嗟何能以下嚥錫福謂何遑云建極期愆尤之或鮮恒小心而翼翼我心如是我志在茲視此䂥石貞堅不移庶天祖之鑒佑致風雨其咸時斯蒼生之多福即予一人之多福永與薄海而共之硯銘迺潤迺堅惟淵惟黙韜采含精在几之側用掩瑾瑜芳流翰墨端人與䖏長資畜德座右銘維月在天常缺於盈維水在器既滿則傾古之哲人業業兢兢慎彼盈滿若弗克勝意馳弗止防之若城言玷不為守之如缾無往不復何陂匪平勿謂豫大而侈豐亨矧茲九五位莫與京何求弗得何為弗成縱欲安止凛涉春氷適口斯己那事臠鯖容膝亦安奚必雕楹勞於求賢逸於制情對天惟敬法祖惟誠憂其可恃懼其可矜我志若斯我行未能苟行弗能言何足稱嗚呼小子終始斯銘負扆銘大徳曰生大寳曰位負扆荅陽天以民寄天視民視天聴民聴民欲天從影隨響應何以守位曰惟求仁君止於仁繼天生民告爾小子夙夜敬止仁逺乎哉及之須跂嘉量銘皇予聖祖建極憲天叶度律均鐘洞契元聲㣲顯闡幽何天衢亨小子纘緒寰區撫臨叶協時月正日同律度量衡製茲法器列于大廷匪作伊述大猷敬承遵鍾得度率度量成量為權輿律諧六英猗聖合天天心聖明七政是齊為萬世法程如衡無私如權不凝如度制節如量祗平律得環中紹天眀命叶永寳用享子孫繩繩我日斯邁而月斯征中元甲子乾隆御銘刻漏銘粤昔重黎分司地天迎日揆景舉分測辰叶明時敬授欽若昊乾予承百王省嵗祈年齊政協紀命彼疇人叶徼宫戒井斟衡酌權笵金規木製茲漏蓮玉注金筩水火燥寒協其髙卑别以方圓九十六刻成一日焉視彼陽晷明晦無愆較自鳴鐘淫巧徒傳攝提有紀孟陬用平于以考時寢興慎旃于以熙績勤民禮賢業業兢兢俯察仰觀器與道偕是騐是䖍作銘垂誡貽百曾元帶銘與處與興毋或不敬叶佩韋佩弦醫徳之偏未央宫瓦硯銘赤帝肈基酇侯正宅陶人為瓦堅若金石宵露凝精曦陽耀魄厯嵗二千印花暈碧佳士振竒摩挱惋惜曰是良材不礱而澤潤宜柔翰緻泛松液作硯惟寳重逾拱璧鑒賞秘藏流傳屢易曩遘陽九淪委沙礫貢珍天府輝暎東壁臨池静對俛仰今昔締構經營英姿奕奕懷賢興慕鑑古增惕何有區區文章字畫龍賔就召蟾蜍滴瀝摛藻西京卿雲接跡銅雀臺瓦硯銘金仙一去鄴臺荒也銅雀片瓦羽之吉光也窪其中以為硯温潤而栗直以方也前有甘泉後香姜也得此以鼎足貯金壺宜文房也龍尾珍於宋紫雲割於唐也傳之千載數百載非弗寳貴矣不若斯之夀而臧也勒為此銘發神雀之藻耀表甄官之精良也亦以慨奸雄之骨已朽建安之年號不亡也瓦腹有建安年造欵識座右銘凛于豐亨遹求厥寧思艱圖易居安慮傾堂下萬里無恃爾克明民方殿屎無恃爾善聽無矜大名無侈頌聲止慾於未萌防危於無形日慎一日先民是程昔之人有言曰堯業業舜兢兢臨淵履氷式鑒茲銘漢玉秘閣銘隆其背虚其腹近取象艮下覆承以香檀表良玉淋漓腕底松烟馥棐几長箋揮百幅漢玉璧銘虚其中維徳之容受小共大共以撫萬邦規其外維徳之㑹俾爾耆而艾兆民攸頼古硯銘有序内府藏硯甚夥向未經品題今年冬幾餘偶暇選其材良而製古者得唐硯三宋硯六元硯一皆真舊物也遲任有言人惟求舊器非求舊惟新夫人之惟舊千古不易而器之惟新獨於硯不然今端溪歙石非乏良材而沐浴詩書黝然光澤則古硯實有足珍者爰課實而錫之名并各為之銘刻之乾隆己巳長至記梁邱遲體美最中全體大用堅右觀象唐硯因文見道爾光用葆右蔆鏡唐硯水火既濟萬物得津逮右石渠唐硯硯者研也潄六藝之芳潤沃朕心田也右垂乳宋硯體具剛柔用合動静日萬㡬欽屢省福天下兮綿世永右黝玉宋硯與筆為入與墨為出不知不識是為寥天一右紫雲宋硯剛而柔翠欲流用以敷言萬春秋右翠濤宋硯珠含其胎澤潤於礎元雲蒸蒸不風而雨右暈月宋硯冽寒泉潤嘉頴立體於静福田斯永養而不窮者井也右方井宋硯有暈其黄載守其黒是為支離之珀右凝松元硯養心殿銘人心惟危在閑其邪道心惟微在培其芽其閑其培皆所為養操存舎亡毋須㬰放叶有如時雨沃此寸田大公順應動直静専動匪憧憧静匪寂寂矧其為君更宜乾惕一念之善百禩䝉庥一念之惡萬姓貽憂養之之方存誠主敬克己復禮外王内聖孰本孰末外由内施任重道逺責萃君師朶殿崇崇顧名思義作此銘辭永訓後世漢玉墨牀銘孕土華承墨瀋竹素園客卿枕董其昌硯銘其製朴其性堅伴香光居畫禪參五合常恧旃覕過眼幻雲烟一片石全其天吴鎮硯銘墨花吐沛時雨竹根筆筒銘懿此君植本固節已見文不露虚其中葆乃素封管城以類聚侍文房四美具黄楊木界尺銘大樸不雕好是正直温潤而澤矢其文徳金牛銘夏禹治河鐵牛傳頌義重安瀾後人景從制寓剛戊象取厚坤蛟龍逺避詎數鼉黿潫此昆明瀦流萬頃金寫神牛用鎮悠永巴邱淮水共貫同條人稱漢武我慕唐堯瑞應之符逮於西海敬茲降祥乾隆乙亥宫殿四銘有序宫殿者所以受之祖考傳之子孫建極撫辰以治四海且鴻稱煌煌顧名思義常恐羞之其視盤盂几杖日用之物不綦重乎因讀韓愈五箴有警倣其體為四銘焉大哉至健純粹而精昭昭成象蕩蕩難名四徳嬗用六位時乗静専動直資始大生我祖我考奉是丹楹五福敷錫萬國咸寧敢恃崇居惴惴矜矜益慎體乾惟皇永清右乾清宫銘萬物致養是曰厚坤安貞廣大配天為元昔在盛京清寜正寝建極熙鴻貞符義審思媚嗣徽松茂竹苞神罔時恫執豕酌匏廣博無疆黄中正位以繼以繩惟曰欲至于萬世右坤寧宫銘四徳何以首元四時何以首春仁者人也要莫大於親親刑寡妻以至兄弟民同胞而物吾與皆由此施關痛癢而肫肫然其所包者廣是以孔子對門人之問不同而莫非由己之所存人盡宜勉又何况乎為君吾用是居昭仁之殿怵然惟恐有愧乎斯言右昭仁殿銘求全之毁吉徳也辯之不已是惑也不虞之譽凶徳也居之不疑是惑也知惑不為直言其來知惑而為䛕言其滋諛滋悔生直來其亨宜已而辯汝奚為善宜疑而居汝惑奚祛屛乎營乎其思徳之所宏乎右𢎞徳殿銘鎛鐘銘自古在昔功成作樂辨物涓吉鑄此鐘鎛皇祖正音中和大備詎獨是遺或存深意績底西旅瑞出西江考制象器協和萬邦一簴特懸用起律首編鐘繼奏簫韶成九寛横欒舞必考必精慎遵前憲敢或損増宣陽導隂立均出度萬事本根百王榘矱叶繄予小子䝉業重熙頼天耆定惟曰際時範器識年悉新已盛銘無溢辭惕乾懋敬特磬銘子輿有言金聲玉振一簴無雙九成逓進凖今酌古既製鎛鐘磬不可闕條理始終和闐我疆玉山是矗青白玉石子出於河灘而緑玉則獨矗一山可得大材命工匠依黄鐘尺度採取以供壇廟朝堂之用依度採取以命磬叔審音協律咸備中和泗濵同拊其質則過圖經所傳浮嶽涇水誰誠見之鳴球允此法天則地股二鼓三依我繹如獸舞鸞鬖考樂惟時乾禧祖徳翼翼繩承撫是萬國益凛保泰敢或伐功敬識嵗吉辛巳乾隆夀安宫銘辛未題額非創伊修舊是地為咸安宫慈寧六袠行慶延庥愛日循環干甲載週金穰辛建物盛已逑七袠爰開萬壽惟悠合天下養與太古侔瓊宫枚枚有桷有桴蘭陔叶什梅席稱觩鴻儀重舉以十為籌則百斯十始而復周和闐玉龍馬負書銘土繡雲回蔚兮蒼然在彼玉河蓋千萬年粼粼璟璟曼衍臠巻西旅底貢有如獻環刻以龍馬負書洛川相承竒偶數肖地天奉若清寧安益求安敢誇耆定彌勵惕乾漢玉半截觚銘效梁邱遲體玉觚半截足娯玩潔御製文初集巻二十七
