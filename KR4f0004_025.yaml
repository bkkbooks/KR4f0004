  text: 欽定四庫全書御製文初集巻二十五
  hash: sha256:6289493b2fae870ca50283b14cfbae5a51680c0797edaf6e227e1805c68d0eac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_025-1a, image: WYG1301/WYG1301-0217a.png}
body:
  text: 連珠恭祝聖母皇太后七旬萬夀連珠臣聞山川納禄厥彰祥源苞符延洪斯引福紀是以泰筴執契推貞恒於璇庭洛文則書敷元吉於瑶戺臣聞壬以任養乎物坤珍既闡申以重巽乎命天庥是滋是以璿流毓慶嵗陽聿徴大徳金根兆祉支位用輯繁禧臣聞子半肇統斯天地見於復律元正候則鍾吕還為宫是以迎長日之至履端撓甲求中聲之先萌柢伶筩臣聞軒瑟調徽帝絃暢其醳攫羲畫觀象天數諧乎掛揲是以上瓊褘之曼夀探萬萬以介大年溯錦帨之誕祥合五五乃叶令節臣聞一六乗數七得相生之始萬億基算十為遞成之積是以寳籙駢羡而凝祚譬諸章啟蔀元璣籥撙總以迓釐時其圖衍疇䇿臣聞四府統元蠉蠕懐而喣嫗五徳盛木勾萌鬱以䓲茂是以承天育物則啿啿登春安土長人乃穰穰綏夀臣聞鴻化烟煴亭育博其愛醇意彌浹恩勤大其慈是以合萬國之歡惟殷祈頌依三春之暉敢曰報施臣聞融風翕習八紘欨於大順協氣氾濩六幕蒸為太和是以挹祥輝者式金玉之度誦徳音者譜韶韺之歌臣聞燠沐垂温布徳孔時徽柔𨗳訢孚心有恵是以恩紀渥洽邇澤懷其子良慶駢豐施逖光函其愷悌臣聞居敬直内允儷乎方儀作肅秉心載錫之純佑是以盤盂之琢由戢孔訓而安珩璜之型惟服周銘則夀臣聞通復有源含萬而立幬載所積得一以凝是以徳淵懇欵為聖人之本景撰悠逺惟至誠之徴臣聞符乾嫓昊乃以時行齊日得天曰惟久照是以華鐘景興躬表矱於求衣銅漏課勩先劬心於問燎臣聞示本於俗太素扶其質崇儉於上皇風播其徽是以訓垂國闈不侈罽軿之御道端宸掖維曳繻練之衣臣聞霄雯佑徳厖褫洽於化光虹樞迪熙醰粹孚乎旭卉是以篤昊縡之祐静言申䖍禀淵謐之榘惟寅畏臣聞有邰詒慶厥初顯昭周原建家克昌基本是以思齊式禮嗣音於徽牒懷福履綏纘順於懿壼臣聞坤輿厚載廣輪資其大生箕範敷錫繇條用以蕃廡是以泰元富釐徳亨乎品物圓舒麗象好從乎風雨臣聞澍潤般裔鳴鼓時應甘滋震灑滿缶有吉是以撤琱御而節歩速委雲於靊霳降釦砌以達忱大嘉貺於太乙臣聞三盆效功美利其溥六騩興事前典斯劭是以鞠衣時薦分繭練以令辰桑壇嵗臨濯龍宣夫徽詔臣聞星軒承曜順彰皇闈蘭掖景化職懋彤史是以母範作則四教迪穆雍之祥内政式序九御憲令善之軌臣聞文母貽緒麟振其趾豳室衍支𤓰緜其瓞是以含長樂之飴兆千億以蕃盛環大安之輿裕雲礽而愉恱臣聞族雲垂於霄堮䕃匝磐石榮光燭於宿海潤盈玉潢是以為善之樂甄埴乎誼美展親之隆泳翺乎徳洋臣聞蘋澗淑化漸訖九服雁塞熙度靖共六珈是以油軿朝正拜堯舜於宫椒殿燕喜合中外為家臣聞鞮譯萬里宣徽則通淵竁億臣慕義斯至是以干吕入律占慈仁而奉琛航澥梯嶂聞錫類而獻贄臣聞卭籠雖嶛稜武可讋槃木雖獷嘉信所懷是以鑱碉櫓而鞠旅威暢筰徼傃琁畧而底績格先干階臣聞来庭肇功常武昔譜於乙亥欵關拓疆都護初置以戊巳是以掃伊犁之穴竹書紀而符吉銘格登之崖鴻稱熙而歸美臣聞蒲類以西鑿空所未度䝉氾之濵仰流則偕徕是以櫜弓定勲版圖既綜𨽻屬國磨盾告㨗雲物乃象禧觀臺臣聞瑶池彈璈必陳充庭之樂蘭陛協律廣集介雅之章是以鞮鞻新歌貢音於僸裔花門小部列伎於舞場臣聞寳盈丹邱露甕琢瓊珍薈若水桂實纂棗是以于闐繅英三采則擢蘂碧樹筠沖匭甘四核則扇芬萐草臣聞金萱榮庭億葉煌扈星筠周阿貫時旉與是以敞髙闈而翼祺則篤其慶鞏慈宫以斂福有那其居臣聞閬風暢於崐崚九光爥彩恒春藹於巒雉四序佇馥是以西那所都松竹秩其芋寧南陔載循堂室劑以凉燠臣聞虞㲈九成儀足節以樂心菜綵五色舞斕斒以隆養是以鈞庭辬華進千萬夀而燕衎曾城苕亭奏十二安而音鬯臣聞履安之吉静而充符恒固之應動若操券是以頤性時泰備庥徴以用康禔躬日强叶亨衢以行健臣聞萬八千嵗之朔攝提貞孟三百六旬之首羲和授圖是以朝元長信率臣寀而拜閶闔上夀慈寧具家慶而飴􅂒蘇臣聞榑桑曣温候晷知贏昭華棣通龡琯依永是以揣稱愛日駐輪於鼂陽怡顔獻春調饍於初景臣聞農祥慶其豐鳧藻翔洽夫億兆泰簇鳴其豫鳯噦雝喈乎二六是以洞庭斯張𨗳龢軒樞豳堂用躋羾情文囿臣聞鼇炬冠山爛若霞電龍燭煇夜爚如星虹是以月宇嘉娱燄鶴騰上而扈扈霄峥麗賞火蛾綴空其熊熊臣聞蕤賔亭午引年以昌陽九節長贏殷仲延籙以雜組萬縷是以迴嶼艤鷁玉鱠羅於蓬池撇波躍龍金支颺於華渚臣聞洞淵之蘤蓲蘛瑛琢其鄂昆流之苓窋䆛珠垂其房是以丈䟽引薫澤芝馡於五沃芳盌調露氷蕅侑以千常臣聞三五而盈璧爓朗乎澄顥八千為秋桂窅窊其古柯是以慶霄延望舒之規琅磬鏘韻修齡酌臯塗之液金罌穆波臣聞菊潭滲甘滋其永年萸林綴朱佩以陽日是以芳醴鬯節則九英載馨粉餈飫豐則萬寳咸實臣聞玉積縣圃不若北陸沍澤鴻戲鏡海奚翅南溟培風是以太液磑即國俗循而習武嘉平儲與慈幰莅而旌功臣聞繚垣規圜惟南乃以建其極襟苑宅奥非海莫能喻其大是以飲池鹿馴扈斑麟之車比屋鱗次翼儀鸞之盖臣聞髙山天作度其隰原豐水東注自彼沮漆是以掖輦長白則駢苞之樹森遡澗混同則圓折之珠出臣聞霞砂毖泉温池濎濙雲根呀谷古嵐霮䨴是以氣霽波籞葆生之汞既長翠積巗館都福之庭斯在臣聞修序沖景暄凊所以均節秀臯清區爽塏所以承豫是以錘峯嘉凉升眺昭其宜鏡波澄華憩逰得其助臣聞懐瓊之獸呦而林衡告獮籋雲之駟同則圉奚載鑾是以鏤象𨗳夫金郊邁彼甫草珍庖尚以馨饍藐乎上蘭臣聞填星貫於中央標建珠緯崈門詄乎太室簡儲石函是以胥庭俶瑞啟洞天之六交路展衞呼曼齡者三臣聞東為羣物之始虞狩肆覲岱惟方嶽之長魯瞻奄有是以青社班春詡蒼祗之榮滋日觀賔暘睎若華之曜久臣聞岷江𨗳源川增其長勾吴茂俗富煴於地是以藻舟翼泛櫂鼓奉安悆之祺鱗隰穱秀簷茨拜温給之賜臣聞東南之美竹箭橚矗斗牛之野桑麻鋪棻是以陟虎林而繢湖則八繭摛錦臨樟亭而祝海則千巗蔚雲臣聞臺懷懸居妙持清凉之宇室利演乗普現吉祥之雲是以曇霏金花最上應瑞乎香界鬘涌寳卍無量同夀乎秘文臣聞一和扶榦階符繁其䕃三雍育才黌市榮其枝是以嘉植承楙乎絳旬協洽開秩喬柯兆菀於豐雅棫樸誦詩臣聞金方致環伻来琳館梁鄒即鹿祝敶畆邱是以甲子周綺稱兕麇至於象譯庚辛嫓純靈麅馴伏於塞秋臣聞鈎鈐之潤可以在玉衡之平旗翼之夀可以窺瑶光之正是以溟嶽和晏筦運乎璇極盖輿清怡囊括乎金鏡臣聞豐融昷於穹宰而農扈告稔盈沖芔於柔祇而富媪披英是以隂陽蓲敷則調燭布其大洽柯穂􅕜㙷則普淖誦其宗生臣聞錫羡阜運則衢多期頤之嬉含淳敦風則居有萃睦之協是以閩耆牉樂皆熙光所陶陕閭烝義實訢藹所浃臣聞重光協乎鳯紀次先甲之三已盛苞乎星序際正陽之四是以嶠西介景百昌若時而悉新弧南表瑞萬物成章以方熾臣聞軒闈祚緜萬區陶珍於朐鼎祁幄祉錫九寰㪺醲乎衢尊是以景飈融貺鏐檢躋而流慶湛瀣覃澤鵠書翔而逮恩臣聞霱䕃之垂不遺被褐祥風所灑暨乎窐衡是以作人左右倬為章於夀考宣譽先後篤惟徳於周京臣聞萬年賡庥拜嘉於召虎三夀頌眉延喜於子魚是以茀禄引康翽羽集彼藹吉熾昌式燕黄髪宜茲樂胥臣聞以天下養者膺禔孔厚惟庶民從者欨愉大同是以臺莱統尊􅎽稱闐夫蒼赤川阜増嘏臚懽訖於瀛濛臣聞大圜彪列蘿圖輯於堯紀泰鴻環均藻華昌乎姬籙是以三光同衡以肈祚覘祥袠増七政比躔以摛耀儷緯詞屬臣聞象載炘炘九垓均禧偉兆郁郁億齡展盛是以洊申無疆慈善膺洪算之茂誕畀多益保佑錫純嘏之慶御製文初集巻二十五
