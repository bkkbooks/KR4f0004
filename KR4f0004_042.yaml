front:
  text: 欽定四庫全書御製文二集卷八
  hash: sha256:6253eff6746a092b72816b42e276d8194e32986c05165a46bf714c9f8007e715
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_042-1a, image: WYG1301/WYG1301-0332a.png}
body:
  text: 諭命國史館以明季二臣傳分甲乙二編我國家開創之初明季諸臣望風歸附者多雖皆臣事興朝究有虧于大節自不當與范文程諸人略無區别因命國史館以明臣之降順者另立二臣傳據實直書用彰公是兹念諸人立朝事迹既不相同而品之賢否邪正亦判然各異豈可不為之分辨淄澠如洪承疇在明代身膺閫寄李永芳曽乘障守邉一旦力屈俘降厯躋顯要律以有死無二之義固不能為之諱然其後洪承疇宣力東南頗樹勞伐李永芳亦屢立戰功勳績並為昭著雖不克終於勝國實能效忠于本朝昔戰國豫讓初事范中行後事智伯卒伸國士之報後之人無不諒其心而稱其義則于洪承疇等又何深譏焉至如錢謙益行素不端及明祚既移率先歸命乃敢于詩文隂行詆毁是為進退無據非復人類又如龔鼎孳曽降闖賊受其偽職旋更投順本朝並為清流所不齒而其再仕以後惟務靦顔持祿毫無事迹足稱若與洪承疇等同列二臣傳不示等差又何以昭彰疸著交國史館總裁於應入二臣傳諸人詳加考核分為甲乙二編俾優者瑕瑜不掩劣者斧鉞凛然於以傳信簡編而待天下後世之公論庶有合於春秋之義焉然朕所以為此言者非獨為臣子勵名教而植綱常實欲為君者當念苞桑而保宗社蓋此諸人未嘗無有用之才誠使明之守成者能慎持神器而弗失則若而人皆足任心膂股肱祖業于是延人才即于是萃故有善守之主必無二姓之臣所以致有二姓之臣者非其臣之過皆其君之過也崇禎臨終之言不亦舛乎命館臣録存楊維楨正統辨諭元楊維楨著宋遼金正統辨大旨以元承宋統而排斥遼金其文不見本集惟陶宗儀輟耕録載之今館臣編輯四庫全書謂其持論紕繆並輟耕録內所載者亦與刪除且言隋先代周繼乃平陳未聞唐宋諸儒謂隋承陳不承周也此語似是而非蓋嘗論之春秋大一統之義尊王黜霸所以立萬世之綱常使名正言順出於天命人心之正紫陽綱目義在正統是以始皇之草六年秦始繼周漢始於髙帝之五年而不始於秦降之嵗三國不以魏吳之強奪漢統之正春秋之義然也楊維楨撰三史正統辨凡二千六百餘言義本春秋法宗綱目其欲以元繼南宋為正統而不及遼金其論頗正不得謂之紕繆夫維楨身為元臣入明雖不仕而應明太祖之召且上鐃歌鼓吹曲頌美新朝非刺故國幾於劇秦美新其進退無據較之錢謙益託言不忘故君者鄙倍尤甚向屢於詩文中斥之而維楨正統之辨則不可以人廢言也夫正統者繼前統受新命也東晉以後宋齊梁陳雖江左偏安而所承者晉之正統其時若拓跋魏氏地大勢強雖北齊北周繼之亦較南朝為盛而中華正統不得不屬之宋齊梁陳者其所承之統正也至隋則平陳以後混一區宇始得為大一統即唐之末季藩鎮擾亂自朱溫以訖郭威等或起自寇竊或身為叛臣五十餘年之間更易數姓甚且稱臣稱姪於契丹然中國統緒相承宋以前亦不得不以正統屬之梁唐晉漢周也至於宋南渡後偏處臨安其時遼金元相繼起於北邊奄有河北宋雖稱姪於金而其所承者究仍北宋之正統遼金不得攘而有之至元世祖平宋始有宋統當絶正統當續之語則統緒之正元世祖已知之稔矣我皇祖御批通鑑及朕向所批通鑑輯覽俱以此論定蓋春秋大義綱目大法實萬世不易之凖我朝為明復仇討賊定鼎中原合一海宇為自古得天下最正然朕猶于通鑑輯覽內存福王建國之號一年使其能保守南都未嘗不可如南宋之承統綿延不絶而奈其當陽九之運天弗與人弗歸自覆其宗社也此實大公至正天下萬世可以共見共守之論然館臣之刪楊維楨正統辨者其意蓋以金為滿洲欲令承遼之統故曲為之説耳不知遼金皆自起北方本無所承統非若宋元之相承遞及為中華之主也若以此立論轉覺狹小天下萬世必有起而議之者是不可以不辨朕以為不但輟耕録中所載楊維楨之正統辨不必刪除即楊維楨文集內亦當補録是篇並將此諭各載卷首以昭天命人心之正以存春秋綱目之義特諭命皇子等編輯明臣奏議諭厯代名臣奏疏向有流傳選刻之本四庫全書內亦經館臣編次進呈其中危言讜論關係前代得失者固可援為法戒因思勝國去今尤近三百年中藎臣傑士風節偉著者實不乏人迹其規陳治亂抗疏批鱗當亦不亞漢唐宋元諸臣而奏疏未有専本使當年繩愆糾謬忠君愛國之忱後世無由想見誠闕典也即或其人品誼未醇而其言一事陳一弊切中利病有裨時政者亦不可以人廢言至神宗以後諸臣奏疏內有因遼瀋用兵涉及本朝之處彼時主暗政昏太阿倒置閹人竊柄權幸滿朝以致舉錯失當賞罰不明其君綴旒於上竟置國是若罔聞遂至流寇四起兵潰餉絶種種粃政指不勝數若楊漣左光斗熊廷弼諸人或折衝強場或正色立朝俱能慷慨建議剴切敷陳設明之君果能採而用之猶不致敗亡若是之極其事距今百十餘年殷鑒不逺尤當引為炯戒則諸人奏疏不可不亟為輯録也除明史本傳外所有入四庫全書諸人文集均當廣為搜採裒集成編即有違礙字句祗須略為節潤仍將全文録入不可刪改此事關係明季之所以亡與我朝之所以興敬怠之分天人之際不可不深思逺慮觸目警心著派諸皇子同總師傅蔡新等為總裁其皇孫皇曽孫之師傅翰林等即著為纂修校録陸續進呈候朕親裁書成後即交武英殿刋刻仍抄入四庫全書將此旨冠於簡端所有前次紀昀等選出神宗以後各奏疏即著歸入此書按其朝代一體編纂特諭命館臣重訂契丹國志諭四庫全書館進呈書內有宋葉隆禮奉敕所撰契丹國志其説採摘通鑑長編及諸説部書按年臚載抄撮成文中間體例混淆書法訛舛不一而足如書既名契丹國志自應以遼為主乃卷首年譜既標太祖太宗等帝而事實內或稱遼帝或稱國主豈非自亂其例又是書既奉南宋孝宗敕撰而評斷引宋臣胡安國語稱為胡文定公實失君臣之體甚至大書遼帝紀元於上而以宋祖建隆等年號分注於下尤為紕繆夫梁唐晉漢周僣亂之主享國日淺且或稱臣稱兒稱孫於遼分注紀元尚可若北宋則中原一統豈得以春秋分國之例槩豫分注於北遼之下又引胡安國論斷以劫迫其父開門納晉軍之楊承勳謂變而不失其正時承勳同父被晉圍慮禍及身乃劫其父致被晉戮而已受晉爵賞夫大義滅親父可施之子子不可施之父父即背叛子惟有一死以答君親豈有蔑倫背義尚得謂之變而不失其正此乃胡安國華夷之見芥蒂於心右逆子而亂天經誠所謂胡説也其他乖謬種種難以枚舉朕詳加披覽經指駮者數十條館臣乃請撤出此部書朕以春秋天子之事是非萬世之公昨曽著正統辨論斷甚明今契丹國志既有成書紀載當存其舊惟體例書法訛謬於綱目大義有乖者不可不加釐正著總纂紀昀等詳加校勘依例改纂其志中之事迹如祭用白馬灰牛氊中枯骨變形視事及戴野豬頭披皮之事雖迹涉荒誕然與詩書所載簡狄吞卵薑嫄履武復何以異蓋神道設教以溯發祥古今胥然義正如此又何必信逺而疑近乎其餘遼帝過舉如母后擅權諸事足為後世鑑戒者仍據志直書一字不可易該總裁等覆閲進呈候朕親定録入四庫全書並將此旨書於簡端以昭綱常名教大公至正之義特諭命館臣編輯河源紀略諭今年春間因豫省青龍岡漫口合龍未就遣大學士阿桂之子乾清門侍衛阿彌達前往青海務窮河源告祭河神事竣復命並據按定南針繪圖具説呈覽據奏星宿海西南有一河名阿勒坦郭勒蒙古語阿勒坦即黃金郭勒即河也此河實係黃河上源其水色黃回旋三百餘里穿入星宿海自此合流至貴德堡水色全黃始名黃河又阿勒坦郭勒之西有巨石髙數丈名阿勒坦噶達素齊老蒙古語噶達素北極星也齊老石也其崖壁黃赤色壁上為天池池中流泉噴涌釃為百道皆作金色入阿勒坦郭勒則真黃河之上源也其所奏河源頗為明晰從前康熙四十三年皇祖命侍衛拉錫等往窮河源其時伊等但窮至星宿海即指為河源自彼回程覆奏而未窮至阿勒坦郭勒之黃水尤未窮至阿勒坦噶達素齊老之真源是以皇祖所降諭旨并幾暇格物編星宿海一條亦但就拉錫等所奏以鄂敦他臘為河源也今既考詢明確較前更加詳晰因賦河源詩一篇敘述源委又因漢書河出昆侖之語考之於今昆侖當在回部中回部諸水皆東注蒲昌海即鹽澤也鹽澤之水入地伏流至青海始出而大河之水獨黃非昆侖之水伏地至此出而挾星宿海諸水為河瀆而何濟水三伏三見此亦一證因於河源詩後復加案語為之決疑傳正嗣檢閲宋史河渠志有云河繞昆侖之南折而東復繞昆侖之北諸語夫昆侖大山也河安能繞其南又繞其北此不待辨而知其誣且昆侖在回部離此萬里誰能移此為青海之河源既又細閲康熙年間拉錫所具圖於貴德之西有三支河名昆都倫乃悟昆都倫者蒙古語謂橫也橫即支河之謂此元時舊名謂有三橫河入於河蓋蒙古以橫為昆都倫即回部所謂昆侖山者亦係橫嶺而修書者不解其故遂牽青海之昆都倫河為回部之昆侖山耳既解其疑不可不詳志因復著讀宋史河渠志一篇兹更檢元史地理志有河源附録一卷內稱漢使張騫道西域見二水交流發蔥嶺滙鹽澤伏流千里至積石而再出其所言與朕蒲昌海即鹽澤之水入地伏流意頗合可見古人考證已有先得我心者按史記大宛傳云于闐之西水皆西流注西海其東水東流注鹽澤潛行地下其南則河源出焉河注中國漢書西域傳于闐國條下所引亦同而説未詳盡張騫既至蒲昌海則或越過星宿海直至回部地方或回至星宿海而未尋至阿勒坦郭勒等處當日還奏必有奏牘或繪圖陳獻而司馬遷班固紀載弗為備詳始末僅以數語了事致後人無從考證此作史者之略也然則武帝紀所云昆侖為河源本不誤特未詳伏流而出青海之阿勒坦噶達素而經星宿海為河源耳至元世祖時遣使窮河源亦但言至青海之星宿海見有泉百餘泓便指謂河源而不言其上有阿勒坦噶達素之黃水又上有蒲昌海之伏流則仍屬得半而止朕從前為熱河考即言河源自蔥嶺以東之和闐葉爾羌諸水瀦為蒲昌海即鹽澤蒙古語謂之羅布淖爾伏流地中復出為星宿海云云今覆閲史記漢書所紀河源為之究極原委則張騫所窮正與今所考訂相合又豈可沒其探本討源之實乎所有兩漢迄今自正史以及各家河源辨證諸書允宜通行校閲訂是正訛編輯河源紀略一書著四庫館總裁督同總纂等悉心纂辦將御製河源詩文冠於卷端凡蒙古地名人名譯對漢音者均照改定正史詳晰校正無訛頒布刋刻並録入四庫全書以昭傳信特諭御製文二集卷八
