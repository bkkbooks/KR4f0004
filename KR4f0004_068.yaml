body:
  text: 雜著讀歐陽修縱囚論自天子以至於庶人壹是皆以修身為本修身若何忠孝而已矣唐太宗要父以叛君殺兄以逼父忠孝之道冺矣自知無以取譽於後世故即位之後於凡好名之事無所不為人之言曰三代以下惟恐不好名此雖矯枉之論然在人臣或猶可而在人君則斷斷不可盖名者實之末而君者臣之率天下之情偽萬變而總不出於為名為上者竭誠以感下猶懼弗當而顧先率以從其末幾何其不喪其實而失為君之道哉太宗好名之事不一而足向於樂善堂集曾論及之而莫過於縱囚之特甚歐陽修作縱囚論而評之曰安知夫縱之去也不意其必来以冀免所以縱之乎又安知夫被縱而去也不意其自歸而必獲免所以復来乎是上下交相賊以成此名烏有所謂施恩徳與夫知信義哉太宗設詐沽譽此數語足以抉其隠微矣既又斷之曰縱而来歸殺之無赦而又縱之而又来則可知為恩徳之致修之此語盖以闢太宗之為詐耳而未免失之以辭害義盖縱而来歸殺之無赦則再縱者豈肯復来乎是略託於存信義者被殺而怙終不悛者反得生有是理乎雖然三百人衆矣豈皆能為君子之所難而無一二求倖免者太宗多術人也意彼時必有以密示司理期三百人以必来而必免苟其不来必大索天下而誅之且及其父母妻子夫三百人者原在此域中也其敢不来以冀倖免而不来以累及其父母妻子乎史官無識未求其詳而載之反以為盛徳之感有識者觀之實不值一噱之兒戯耳而歐氏猶以可偶一為之予以為即偶一為之亦不可讀嚴光傳予讀東漢逸民傳至嚴光所以對光武及以足加帝腹太史奏客星犯帝座云云不覺听然失笑曰甚矣范曄之誕也夫光武之好賢與光之髙尚所為各盡其道足以風勵千古矣即光所對尚可謂不愧泥塗軒冕之志至於以足加帝則可信其必無孟子不云乎居移氣養移體光武既為帝矣親近故人論道累日足矣何至共相偃卧即偶爾偃卧亦何至以足加帝腹假使誠有其事又何至動星象此不待辨而可知其誣也且建武時朱浮許淑等皆上書言厯不正當改更爾時治厯者非太史氏乎以晦朔可考之事尚至於舛又何能知星象之幻眇哉吾意即偶有之必太史氏者㢘知其事飾奏動星象以神巳之精於推測夫推測之甚流而為䜟緯光武固好䜟緯者也遂不覺堕其術中耳雖然為帝者當以禮自律帝即重光安車賜還山中禮也命有司嵗時存問禮也賚以金帛禮也至於與光共偃卧則非禮也究以范曄好竒誕妄記為是讀韓昌黎雜説昌黎雜説凡四首餘姑弗論其第二篇論善醫善計者之察脈理審紀綱而歸要於憂其所可恃懼其所可矜所以告後世以憂盛危明三致意焉予向選文醇固已申論其義而題之殿壁矣養心殿東暖閣書此二語為聫獨所云不恃天下之安危而察紀綱之理亂二語所謂盡美而有未盡善昌黎盖未之深思也夫人之生死固不闗肥瘠而闗乎脈天下之安危豈得謂不闗紀綱之理亂哉自古及今未有紀綱理而天下不安者亦未有紀綱亂而天下不危者安危紀綱理亂呼吸相通豈若皮膚之肥瘠不闗脈之病否所可同日而語者乎至若周過其厯泰不及期秦之傾固因紀綱亡而周雖未傾王若綴旒亦尚何紀綱之可存而謂彼時天下不危得乎昌黎之意盖猶以封建為韙不知今古異宜漢明封建或致危唐宋不封建亦苟安盖紀綱在人主一心一念敬即紀綱理一念怠即紀綱亂天下之安危於是乎繋而豈繋衆建諸侯之云乎昌黎所謂知其一未知其二予故叙而論之讀蘇軾范增論蘇軾著范増論而引史記之言曰漢用陳平計間疎楚君臣云云夫軾達理識時務之人也陳平他計固多竒兹不具論若夫始進太牢繼持去以惡食進以為待亞父項王使者厚薄之異此直誑嬰兒稚子之為而謂項王即信以疑范增有是理乎夫增之去當於羽殺卿子冠軍時軾固言之矣豈不以疑增之本伏於是哉不用其言而殺其所立羽之疑增必自是始又痛快言之此非達理識時務之人不能及此則引陳平之事軾將信之乎抑不信之而漫舉以申巳説乎夫不合理之事則申己説以斥其非可也而軾也猶為兩可之説於其間則學不如軾而為史遷所誤者益不足恠矣讀後漢書明徳馬后傳予讀眀徳馬后傳嘉其不肯封外戚而不解肅宗之必欲封外戚以為盡孝之何謂又不解封侯誠舊典則不過加一爵禄儘可不令干預朝政而馬后之一再苦辭若有不可終日者之何謂及讀帝終封舅而馬后云何意老志復不從萬年之日長恨矣不覺廢書長歎歎范曄之但知章馬后之賢而不計肅宗之將置身於何地也夫馬后之為此言出於誠耶則子以封舅求悦何忍出此言出於不誠耶則前此之二詔皆不可信矣且肅宗封舅誠孝之小節然亦欲悦其親而已耳使其親死而齎恨不孝之大者肅宗亦何過而忍被之以此名哉宫闈之語外間何由傳之此實曄不知大義阿所好而不覺其言之過當背理耳又馬后身衣大練節儉尚矣傳中所稱賜諸貴人各白越三千端雜帛二千匹黄金十斤賜廣平鉅鹿樂成王各錢五百萬此又何来節儉者固如是乎豈但知一身之麤衣糲食而揮霍自如遂得謂之節儉乎外家車如流水馬如遊龍后固自言之其家微時亦能早如是乎孟子曰盡信書則不如無書周時已然而况人心日漓寖淫而至於兩漢六朝乎讀公羊公羊於隠公之何以不言即位也曰成公意也既又申其義曰立適以長不以賢立子以貴不以長夫成公意是矣而以長不以賢以貴不以長之説實甚謬盖以貴不以長或者袪諸孽覬覦之心猶託於各安其分之義至於以長不以賢則均貴也均貴則擇賢棄不肖有何不可而亦必為之防微杜漸曰以長不以賢乎且唘賢而賤辛貴而不肖立辛而商以亡是非萬世之炯鑒乎余以為棄辛之貴而立啟之賤猶不至於屋商之社夫商之宗祀不絶與棄貴而立賤其是非輕重必有能辨之者知此則公羊之説之謬不亦章章眀甚哉而劉頌引其言以為事情之不可易者識見庸愚固不屑再闢矣且以天下與人易為天下得人難堯舜禹傳賢傳子之事韓愈論之詳矣夫與賢之説後世固不可行顧於諸子中獨不可擇賢而與之必拘於以長以貴之小節而不為天下萬世擇賢君而立之是直以祖宗社稷為輕而以己妻媵娣為重千金之家有所不可而况天下萬民之大乎或曰後世嬖幸妾而立少子以致敗國亡家者亦有之矣不若守公羊之言為無患雖然嬖幸而立少十未必有其一二不擇賢而守分將十必居其十審是言則公羊之説為宜從乎為不宜從乎讀劉昆傳後漢書儒林傳載劉昆為𢎞農太守仁化大行崤驛道向多虎皆負子渡河云云夫虎猛獸也蔵林藪逐鹿豕以養其生虎之知止於此而已餘非所知也太守仁政祇能施之民而民豈能向虎告之虎又豈能㢘於民以悉之而又推太守之意不傷民而去之且一一負其子以行哉盖范曄紀此不過欲揚劉昆之美耳無識者或信以為實有識者必斥其非並劉昆之善政亦疑為阿好過頌是欲揚其美反致傷其實矣然范曄之為此盖亦有本彼見禮記孔子過泰山有苛政猛於虎之言故創為新竒之語以褒昆而不自覺其謬禮記出漢儒語多踳駁未必盡皆孔子之言即所云苛政猛於虎尚為指物喻政不失為正而虎知太守仁政相率負子渡河而去則必無其事也盖人聚則地闢地闢則獸逺此不易之理今之泰岱崤黽何並無一虎不啻此也天下郡縣其有虎者千百之一耳餘盡無虎豈為其地守土之人皆如劉昆之賢而虎皆避去哉是又不必絮辨而可證范曄之譌者讀韓非子昔韓非述管仲之對桓公曰知臣莫如君知子莫如父斯言也予以為非是夫自古及今多有以此言為然者而余以為非是者何盖其君若父果賢耶自能知之而亦無待其臣子及他人之頌使其不賢不能知在他人則是不闗巳之謬賛以害人家國設為臣子者亦如是言則是内懐怨懟而仍陷其君若父於不知也即以桓公屢舉鮑叔牙數人而管仲皆以為不可是果知臣乎桀之於闗龍逢紂之於王子比干亦猶是也瞽瞍之於舜獻公之於申生是果知子乎其類此者不可屈數余故以為非是盖不近情之論聴之似是而折衷於理其剌謬不通若是者亦多矣且君子立言將以為萬世法程而不可逞一巳之私智以欺世盗名也言治之書莫如典謨一則曰在知人再則曰惟帝其難之使世之為君為父者皆曰我已知臣我已知子誤知子者其害猶不過一家誤知臣者其害將及國與天下是誰作之俑哉夫自以為不知者或可勉以至有知之日而自以為巳知者吾知其為終於不知而已矣
