body:
  text: 序盤山志序向于雍正年間奉命敬謁景陵往來薊野田盤山色宜人蓋蓄于目且沃于心矣而以程期惟謹訖未登臨因索智朴志書讀之嗤其意求博而辭失冗夫耕問僕織問婢山經地志文士之事彼方外流拘名象而濫碔砆者何為哉踐阼以後敇幾勤政日不暇給閲七年而後一往逰焉及一逰則峯之秀泉之清松之蒼石之詭日往來于吾懷是猶未見君子惄如調飢亦既見止我心則夷矣嗣是規地建園施金葺寺迹之廢者日以舉境之幽者日以出上陵回鑾每憩止焉夫山川顯晦時有定數而必待人以彰不數年之間使田盤改觀者余也而顧兹寰宇風未臻乎唐虞嵗未餘乎三九恧焉抱愧者亦余也志盤山而請序者其亦同余此心也耶儀象考成序上古占天之事詳于虞典書稱在璿璣玉衡以齊七政後世渾天諸儀所為權輿也歷代以來遞推遞究益就精密所傳六合三辰四逰儀之制本朝初年猶用之我皇祖聖祖仁皇帝奉若天道研極理數嘗用監臣南懷仁言改造六儀輯靈臺儀象志所司奉以測驗其用法簡當如定周天度數為三百六十周日刻數為九十有六分黃赤道以備儀制減地平環以清儀象創制精密尤有非前代所及者顧星辰循黃道行每七十年差一度黃赤二道之相距亦數十年差一分所當隨時釐訂以期吻合而六儀之改創也占候雖精體制究未協于古赤道一儀又無逰環以應合天度志載星象亦間有漏略躐次者我皇祖精眀步天定時之道使用六儀度至今必早有以隨時更正矣豫小子法祖敬天雖切于衷而推測協紀之方實未夙習兹因監臣之請按六儀新法參渾儀舊式製為璣衡撫辰儀繪圖著説以禆測候并考天官家諸星紀數之闕者補之序之紊者正之勒為一書名曰儀象考成縱豫斯之未信期允當之可循由是儀器正天象著而推算之法大備夫制器尚象以前民用莫不當求其至精至密矧其為授時所本熙績所關尤不容有杪忽差者折衷損益彰往察來以要諸盡善奉時修紀之道敢弗慎諸至乃基命宥密所為夙夜孜孜監于成憲者又自有在是為序印譜序國家膺圖御宇神聖代興赫濯撻伐光啓鴻業時則有推轂命將之典及功成奏凱還上元戎佩印載在册府藏之史宬蓋法物留貽不啻如曩籍所稱玉節牙璋尚方齋斧者比乾隆十七年釐考國書篆字成因詳加酌定交泰殿所遵奉世傳御寶仍依本文不敢更易其常行誥敇所鈐用以及部院司寺已下外而督撫提鎮已下咸改鑄篆文以崇典章昭法守而大將軍經略及諸將軍之印或存舊或兼篆一依交泰殿諸寶之例各以時代為次兹西陲武功將竣爰譜圖系説如左書曰其克詰爾戎兵以陟禹之迹方行天下至于海表罔有不服信夫兵可百年不用不可一日不備披斯譜也必將曰是印也是我朝某年殄某寇定某地所用也又將曰是印也鑄自某年某官既奉以集事傳至某年某官復奉以策勳者也想見一時受成廟算元老壯猷豐紐重臺焜耀耳目繼自今覲揚光烈思所以宏此逺謨弼我億萬世丕丕基將于是乎在以視銘績鼎鐘而圖形臺閣者不尤深切著眀也歟然則觀于寶譜而一人守器之重可知觀于印譜而羣才翊運之殷又可知詩曰王之藎臣無念爾祖記曰君子聽鼓鼙則思將帥之臣一再披閲其何能置大風猛士之懷哉􅏻潢蕆事並令守者什襲尊藏為部凡四一皇史宬一大內一內閣一盛京也春秋直解序中古之書莫大于春秋推其教不越乎屬辭比事而原夫成書之始即遊夏不能贊一辭蓋辭不待贊也彼南史董狐世稱古之遺直矧以大聖人就魯史之舊用筆削以正褒貶不過據事直書而義自為比屬其辭本非得已贊且奚為乎厥後依經作傳如左氏身非私淑號為素臣猶或詳于事而失之誣至公羊穀梁去聖逾逺乃有發墨守而起廢疾儼然操入室之戈者下此齦齦聚訟人自為師經生家大抵以胡氏安國張氏洽為最著及張氏廢而胡氏直與三傳並行其間傳會臆斷往往不免承學之士宜何所考衷也哉我皇祖欽定傳説彚纂一書鎔笵羣言去取精當麟經之微言大義炳若日星朕服習有年紹聞志切近因輯易詩二書竣事命在館諸臣條系是經具解以進一以彚纂為指南意在息諸説之紛岐以翼傳融諸傳之同異以尊經庶幾辭簡而事眀于范寧去其所滯擇善而從之論深有取焉夫儒者猥云五經如法律春秋如斷例故啖助趙匡陸淳輩悉取經文書法纂而為例一一引徽切墨以求之動如鑿枘之不相入譬諸叔孫通蕭何增置傍章已後例轉多而律轉晦蓋曲説之離經甚于曲學之泥經也審矣書既成命之曰直解匪不求甚解之謂謂夫索解而過不直則義不見爾而豈獨春秋一經為然哉是所望乎天下之善讀經者皇朝禮器圖式序五禮五器之文始著虞書若璣衡若作繪絺繡若笙鏞柷敔粲乎具列逮成周考工記乃詳載廣圍尺度與夫方色鈞鋝圜匡縝疏侈弇之差説者謂器之有圖實權輿是漢儒言禮圖者首推鄭康成自阮諶梁正夏侯伏眀輩均莫之逮宋聶崇義彚輯禮圖而陸佃禮象陳祥道禮書復踵而穿穴之其書幾汗牛充棟然嘗念前之作者本精意以制器則器傳後之述者執器而不求精意則器敝要其歸不出臆説傳會二者而已我朝聖聖相承法物修眀折衷大備維是敬天尊祖頒朝詰戎之典弗懈益虔第所司展事具儀間沿前代舊式方名象數時有未協爰諏禮官自郊壇祭器及鹵簿儀仗輦輅以次釐正至冠服以彰物采樂器以備聲容宜準彞章允符定則而觀象臺儀器自皇祖親定閲數紀于今度次不免嵗差又武備器什有舊會典未經臚載者皆是笵是程進御審定于以崇飭祀饗朝會軍旅諸大政顧弗薈萃成帙慮無以垂光策府于是按器譜圖系説左方區為八部用付剞劂俾永其傳夫籩豆簠簋所以事神眀也前代以碗盤充數朕則依古改之至於衣冠乃一代昭度夏收殷冔夲不相襲朕則依我朝之舊而不敢改焉恐後之人執朕此舉而議及衣冠則朕為得罪祖宗之人矣此大不可且北魏遼金以及有元凡改漢衣冠者無不一再世而亡後之子孫能以朕志為志者必不惑于流言于以綿國祚承天祐于萬斯年勿替引之可不慎乎可不戒乎是為序大清通禮序伊古承天之道治人之情莫善乎禮顧其為用往往詳于朝廟略于鄉閭及考儀禮十七篇所紀獨多士禮自后蒼有推而逹之之説儒者奉為本經其等差節度互見於周官戴記然時有抵牾朱子嘗建議請修通解而未既厥業信乎完書之難而行典禮觀會通章志貞教經世者所宜重也經禮三百曲禮三千會典蓋經禮之遺矩而通禮亦曲禮之濫觴朕臨御之初敇儒臣搜訂前聞折中令甲準時會之宜衡質文之紀釐為全帙用詔方來越嵗己卯排纂裁就寧詎謂副在有司執以蒞事而已哉蓋嘗深維大順大同之化初不越納身軌物與天下共之焉耳三代以下漢稱近古觀叔孫通之朝儀公玉帶之眀堂不過椎輪粗具後此如唐開元禮宋太常因革禮元通禮眀集禮取足徴一朝掌故逮承用日久俗尚駸尋精意逺而敝攰隨之既苟簡慢易而無以稱其情甚且改錯偭規敢於侈汰而冒其上故禮之通也于是乎始難六經之士雖欲闡教正俗然居下不獲若考亭家禮涷水書儀黨孰間以為兔園陳策其事不關功令故禮之通也于是乎尤難是編也約而賅詳而不縟圭臬羣經羽翼會典使家誦而户習之于以逹之人倫日用之間興孝悌而正風俗則朕淑世牖民之意或在斯乎或在斯乎因禮官之請爰為序以諗其端沈德潛選國朝詩别裁集序沈德潛選國朝人詩而求序以光其集德潛老矣且以詩文受特逹之知所請宜無不允因進其書而粗觀之列前茅者則錢謙益諸人也不求朕序朕可以不問既求朕序則千秋之公論繫焉是不可以不辨夫居本朝而妄思前眀者亂民也有國法存至身為眀朝逹官而甘心復事本朝者雖一時權宜草昧締構所不廢要知其人則非人類也其詩自在聽之可也選以冠本朝諸人則不可在德潛則尤不可且詩者何忠孝而已耳離忠孝而言詩吾不知其為詩也謙益諸人為忠乎為孝乎德潛宜深知此義今之所選非其宿昔言詩之道也豈其老而耄荒子又不克家門下士依草附木者流無逹大義具巨眼人捉刀所為德潛不及細檢乎此書出則德潛一生讀書之名壞朕方為德潛惜之何能阿所好而為之序又錢名世者皇考所謂名教罪人是更不宜入選而慎郡王則朕之叔父也雖諸王自奏及朝廷章疏署名此乃國家典制然平時朕尚不忍名之德潛夲朝臣子豈宜直書其名至于世次前後倒置者益不可枚舉因命內廷翰林為之精校去留俾重鋟板以行于世所以栽培成就德潛也所以終從德潛之請而為之序也皇輿西域圖志序語云耕當問僕織當問婢志廣輿者不稽之歷代建置沿革將無從數典而志西域則有不能盡稽之歷代者實以幅􅊷所限言語不通雖漢唐盛時亦頗能威行天山迤南建官設都而天山迤北本不能至也即有一二羈縻之國然叛服不常征調弗應又安能履其地而疆索之哉且漢唐之程督異域者仍漢唐人而已其與準噶爾回部人語奚啻粵問而燕答則其所記魯魚亥豕之紛不待言而可知兹者叨天佑藉羣力湊時會幸成是役準噶爾回部之人皆在廷執事而國語切音譯外蕃語又甚便且易我諸臣馳驅往來其間目覩身歷非若耳聞口傳者比俾司校勘而正其訛傳其真較僕婢耕織之問為尤詳且厄魯特語及回語朕亦因暇而習焉時御丹槧為之改正是西域圖志之書必應及是時成之用開歷代之羣疑垂千秋之信録間亦涉及諸史以存述古總計分部二十分卷五十有二繪圖系説蔚為完書若夫闢地蕆功文臣或有過頌朕所不取惟是籌耕牧計久長圖所以永乾貺奠丕基思日孜孜持盈益凛豫安得有功成無事之説哉西域同文志序嵗庚午既定同文韻統序而行之蓋以梵音合國書切韻復以國書切韻叶華音字母於是字無遁音書皆備韻微特支那咒語窔奧可探而且寰宇方言拘墟盡釋兹者西域既平不可無方略之書然準語回文非纂輯文臣所曉是宜示之綱領有所遵循俾無蹖駁舛訛之虞因以天山北路天山南路準部回部並西藏青海等地名人名諸門舉凡提要始以國書繼以對音漢文復繼以漢字三合切音其蒙古西畨托忒回字以次綴書又于漢文下詳注其或為準語或為回語于是兀格蟀自之言不須譯鞮象寄而凡識漢字者莫不通其文解其意瞭若列眉易若指掌書既成名之曰西域同文志同文云者仍闡韻統之義而特加以各部方言用明西域紀載之實期家喻户曉而無魚魯毫釐之失焉然嘗思之天髙地下人位乎其中是所謂實也至于文蓋其名耳實無不同文則或有殊矣今以漢語指天則曰天以國語指天則曰阿卜喀以蒙古語準語指天則曰騰格里以西番語指天則曰那木喀以回語指天則曰阿思滿令回人指天以告漢人曰此阿思滿漢人必以為非漢人指天以告回人曰此天則回人亦必以為非此亦一非也彼亦一非也庸詎知孰之為是乎然仰首以望昭昭之在上者漢人以為天而敬之回人以為阿思滿而敬之是即其大同也實既同名亦無不同焉達者契淵源于一是昧者滯名象于紛殊是志也將以納方俗于會極袪羣疑之分畛舉一例凡豹鼠易辨即世道人心豈云無禆益哉翻譯四體楞嚴經序三藏十二部皆出自天竺流通震旦其自西逹東為中途承接者則實烏斯藏天竺即所謂厄訥特克烏斯藏即所謂土伯忒也故今所譯之漢經藏地無不有而獨無楞嚴其故以藏地中葉有所謂狼逹爾嗎汗者毁滅佛教焚瘞經典時是經已散失不全其後雖髙僧輩補苴編葺以無正本莫敢妄增獨補敦祖師曽授記是經當于後五百年仍自中國譯至藏地此語乃章嘉國師所誦梵典炳炳可據朕于幾政之暇每愛以國語翻譯經書如易書詩及四子書無不蕆事因思皇祖時曽以四體翻譯心經皇考時鋟而行之是楞嚴亦可從其義例也咨之章嘉國師則如上所陳且曰心經夲藏地所有而楞嚴則藏地所無若得由漢而譯清由清而譯蒙古由蒙古而譯土伯忒則適合補敦祖師所授記雖無似也而實不敢不勉力焉因命莊親王董其事集章嘉國師及傅鼐諸人悉心編校逐卷進呈朕必親加詳閲更正有疑則質之章嘉國師蓋始事自乾隆壬申而譯成于癸未莊親王等請序而行之朕惟楞嚴者能仁直指心性之宗旨一落言詮失之逺矣而况譯其語且復序其譯哉然思今之譯乃直譯佛語非若宋眀諸僧義疏會解嘵嘵辨論不已之為譬諸飢者與之食渴者與之飲而非揀擇其烹調引導其嗜好也則或者不失能仁徴心辨見妙諦俾觀者不致五色之迷目于以闡眀象教嘉惠後學庶乎少合皇祖皇考宣揚心經之義例乎御製文初集卷十二
