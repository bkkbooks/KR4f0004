body:
  text: 贊平定臺灣二十功臣像贊有序近著𠞰滅臺灣逆賊生擒林爽文紀事語以為伊犂回部金川三大事各有専文王倫蘇四十三田五次三事不足薌其功若兹林爽文之勦滅介于六者間雖弗稱大事而亦不為小矣故其次三訖未紀勳圖像而兹福康安海蘭察等渡海搜山竟成偉勳靖海疆吁亦勞矣不可湮其功而弗識故于紫光閣紀勳圖像一如向三大事之為然究以一區海濵數月砥績故減其百者為五十而朕親製贊五十者為二十餘命文臣擬撰一如上次之式夫用兵豈易事哉昔漢光武有云每一發兵頭鬚為白況豫古稀望八之年鬚鬢早半白而拓土開疆過光武逺甚更有何冀而為佳兵之舉誠以海疆民命不得不發師安靖所為乃應兵非佳兵也然亦因應兵非佳兵幸邀天助順而成功速此豫所以感謝鴻貺不可以言語形容而又不能已于言者也昔人有言滿洲兵至萬橫行天下無敵今朕所發巴圖魯侍衛章京等才百人已足以當數千人之勇緑營兵雖多怯而無用兹精選屯練及貴州廣東湖廣兵得近萬人統而用之遂以掃巢穴縛逆首是緑營果無用哉亦在率而行之者為之埋根倡首有以鼓勵之耳若福康安未渡海以前臺灣緑營已共有四萬餘兵何以不能成功則以無率而行之者豈不然哉且臺灣一嵗三收蔗薯更富朕若微有量田加賦之意以致民變天必罪之不能如是成功速也後世子孫當知此意毋信浮論富國之言愛民薄斂眀慎用兵庶其恆承天眷耳近日以宫商三百逐章饜飫其義竟如幼年書室學詩之時然彼時但知讀其章句而今則究其義味因思采薇出車諸章乃上之勞下其義正斯為正雅祈父北山諸什乃下之怨上其義變斯為變雅夫上勞下可也下怨上不可也何則下之怨上固在下者不知忠義然亦必在上者有以致之斯則大不可也我滿洲舊風以不得捐軀國事死于牖下為恥其抱忠知義較祈父北山之怨上為何如是則緑營之多恇怯思家伊古有之無足多怪矣然為上者不可不存采薇出車之意更不可不知祈父北山之苦如其一概不知而但欲開疆擴土是誠佳兵黷武之為望其有成豈非北轅而適越乎故因為功臣圖贊而申其説如此以戒奕葉子孫並戒萬世之用兵者大學士一等誠謀英勇公阿桂勘外守中未恆亮功馳咨軍務志每豫同歸朝襄贊翦逆除凶三登紫閣福厚功崇去嵗在山莊籌辦臺灣軍務其時阿桂留京辦事七月間又命往河工會辦堵築事宜是此次軍務阿桂並未辦理惟間有指示方略諭令閲看覆奏每多意見相同及後報捷之時阿桂甫得差竣回京是以一體豫以議敘且以班次在前故列為功臣之首云大學士三等忠襄伯和珅承訓書諭兼通清漢旁午軍書惟明且斷平薩拉爾亦曽督戰賜爵勵忠竟成國幹大學士王杰典學七閩肅正士風臺灣民俗頗悉心中山海險夷參畫具通有佐樽俎圗貌紀功協辦大學士吏部尚書陜甘總督一等嘉勇公福康安金川領兵已著偉名幾處封疆吏肅政成解圍擒逆能人不能崇封殊錫嘉爾忠誠領侍衛內大臣二等超勇公海蘭察勇弗知書謀勝智士匹馬彎弓賊不敢視欲致活口射勿令死進爵錫服言難盡美工部尚書福長安父兄及已胥國勳親英年習政其心孔純承旨參議有見敬申忠良之報並得圗麟户部尚書董誥舊例軍務多用清文兹或用漢緑營海濵治以馬上亦頗效勤堪同福將閣表書勳閩浙總督李侍堯以恆入覲命往閩疆戰固老矣謀猷允長渡兵濟餉井井有方不誤軍儲其績孔臧兩廣總督一等輕車都尉孫士毅粵閩接境脣齒相依資鄰守已均合時機向任部員曽隨出師文武幹才超錫允宜福建巡撫徐嗣曽宣撫之任守土安民一應軍務責成督臣佐之贊之竭慮攄勤渡海籌疆亦可稱勳成都將軍法式尚阿巴圖魯雲騎尉鄂輝無前出力屯練之兵將軍鄂輝實率以行覆穴摧壘到處功成勇而有謀覃國之英護軍統領穆騰額巴圖魯雲騎尉舒亮金川之役已為領隊事定功成統軍歸內搜捕逸賊不遺醜輩生致逆渠其能弗昧護軍統領沙爾瑪海巴圗魯三等奮勇男普爾普隨父入都甫十餘嵗既長上聲能勇曉兵有制同救諸羅通路府際先登拔柵圗容兩逮福建水師提督健勇巴圖魯蔡攀龍臺灣戰將巨擘惟兹向嘉大紀乃被所欺上年因柴大紀在諸羅被圍日久曽諭令酌量如實不能支不妨保護義民全師而出另圖進取而柴大紀覆奏不忍將數萬生靈委之賊手仍督率兵民忍飢固守以待援應覽奏為之墮淚是以特沛殊恩封伊伯爵並賞銀一萬兩以示優眷嗣據福康安奏其為人狡詐豫猶不忍以空言遽加之罪其後德成自浙江差竣復命細詢之遂將伊居官聲名狼藉之處逐一面陳因命福康安李侍堯琅玕各據實查奏則其貪劣釀成逆案種種竟有確據且當賊匪起事之初柴大紀正值巡察彰化不即帶兵𠞰捕轉託稱派兵回郡及聞彰化失陷仍復觀望不前遲至數日始行以致逆匪蔓延其罪尤不可逭因即令革職孥問其水師提督員缺即以蔡攀龍調補蓋前此未有人摘發其私豫焉肯為逆詐億不信之見逮既經敗露則不得不明其賞罰以示勸懲是柴大紀之前後功罪豫惟協于至公更無所容心于其間也賞罰各當弗濫弗遺惟明克允奉三無私福建陸路提督奮勇巴圖魯梁朝柱金川𠞰逆埋根進首鹽水恆瑞未免掣肘及防麻豆禦賊堅守受創力戰嘉哉鮮偶浙江提督堅勇巴圗魯許世亨黔省之兵素稱勇敢率以赴軍半天衝險嬰之者斷當之者斬不愧丈夫一身是膽四川松潘鎮總兵奮圖禮巴圗魯穆克登阿斗六里杙排竹為城直砍而入大敗賊兵隴種鹿埵內山遁形搜擒首惡林林衆英四川建昌鎮總兵扎敦巴巴圗魯張芝元金川隨征超熊羆旅兹領番兵以通番語賊屬生縛賊路嚴禦卒獲生俘厥功允巨臺灣鎮總兵沖傑巴圗魯普吉保攻克笨港本有微功未解諸羅賊衆難通賈勇贖過奮不顧躬扼科仔坑逸賊路窮散秩大臣贊巴巴圗魯四川土副將穆塔爾金川降番功難屈指兹領軍隊有進無止衆志成城妖氛淨洗晉秩中朝同仁一視呢瑪寧波噶布拉贊呢瑪畨語謂日寧波謂心噶布拉謂頂骨捨身為清淨供養博密博地名密謂人其山即以此得名在察木多碩板多之間山洞忽出現二千餘嵗傳至今五德七寶重莊嚴據駐藏大臣和琳奏稱查沙瑪爾巴陽八井廟內有呢瑪寧波噶布拉因送京遂命達賴喇嘛查其根源達賴喇嘛奏言釋迦牟尼佛涅槃後千餘年嘉噶爾地方出一泥瑪寧波呼必勒罕至第七世後一有道行僧名博嘛桑巴者獲其噶布拉藏于博密山洞五輩達賴喇嘛時又一有道行僧名多爾濟者夢中見一神女告其處依所言尋獲之後沙瑪爾巴之呼必勒罕多從博密地方轉世將此噶布拉世世供奉至今已二千餘年色澤古潤洵屬有道舍利實為罕見供養不作供養觀色見聲求一切非是謂如來之本智古噶布拉供碗贊我聞在昔佛月光明以頭施檀普度衆生左旃檀塗右利刀割于此二人不分别撥五印三藏古德多有用是義例自施其首十方十色一以化之同凡悲仰共聖慈悲是真供養無供養者作贊饒舌波羅般若西番古德噶布拉注見前供養器也贊西番古德閲百餘世凡身既棄聖迹仍示曰阿番文本曰吽番文本隱現二字西藏吉隆呼圗克圗所進古德噶布拉一具隱隱有文現出如阿吽二字非人工所作惟深得祕密正道者方能有是異迹阿寂靜源吽安樂義有為無為色空非二作是供養允第一諦平定廓爾喀十五功臣圗贊有序廓爾喀畏威乞降歸順武成平定功臣效力宜有圗贊例應論爵以軍機大臣為首而大學士阿桂以此番絶域厯險實異常之勞當以大將軍福康安為首因嘉許之為之序曰武成圗功逮此凡四紫光閣圖功臣像各為之贊自平定西域兩金川臺灣逮此凡四次夫用兵豈易言哉必出于不得已而不出于貪得恃強審時應機既明且斷信賞必罰仍總賴天貺助順捨斯數者未有不見其敗而資窮黷之譏者也伊犂回部金川既受俘蕆事余已不復萌用武之心無何而臺灣叛福康安等渡海𠞰賊不久生擒賊首故此戰圗仍依例以阿桂為首今之廓爾喀又在西藏數千里外絶壁衝天急湍臨峽捨馬單步非福康安海蘭察二人同心鼓勇身先士卒斷不能成此七戰七勝之功首圖其像允合豫心而符衆望也西師金川功臣各百豫親為贊者各五十餘命儒臣為贊各五十以成百數臺灣功臣豫親贊者二十餘命儒臣為贊者三十以成五十數今平定廓爾喀之功臣豫親贊者十五餘命儒臣為贊者十五以成三十數蓋以西師及金川厯年久而擴地廣故人數多臺灣成功速而地非廣故人數次之若廓爾喀則又速于臺灣地雖險而實弗廣也故豫親為贊者不過十五儒臣為贊者亦祇十五然以總數較仍勝凌煙雲臺之所表也此實昊蒼護佑國家祖宗教養所貽賢材接踵為邦家光豫藐躬欽承惟謹盛滿是懼且歸政年近老而畏事遑敢復有他圗哉大學士一等忠鋭嘉勇公兩廣總督福康安百戰久經兩功近成近之險絶前聞未曽七戰七勝度索乘桴舊勳新讓此番聲討廓爾喀福康安身先將士履險臨深無戰不捷大功克蕆其忠貞實邁等倫若以爵論阿桂本應居首而阿桂自以此次未臨行陳奏讓福康安為首功實為公允可嘉遂俞其請嘉許首圖大學士一等誠謀英勇公阿桂七旬以上身體康強從不言功黃閣贊襄威克安久此次用師必大彰國威而後允降庶幾可以久安不致再生事端唐太宗所謂示之必克其和乃固正合朕意福康安固能仰體此意力蕆殊勳而阿桂原有協謀之功亦不可掩曽亦協謀亶一個臣有容休休大學士三等忠襄伯和珅國家用武帷幄絲綸事殊四朝謂漢唐宋明清文漢文蒙古西番頗通大意去嵗用兵之際所有指示機宜每兼用清漢文此外頒給達賴喇嘛及傳諭廓爾喀敕書並兼用蒙古西番字臣工中通曉西番字者殊難其人惟和珅承旨書諭俱能辦理秩如勤勞書旨允稱能事大學士王杰司學閩疆臺灣事曉海洋進退頗亦了了短詩長記晝夜謄章每軍營奏報捷章皆有詩文志事隨時謄寫至西藏番地情形實未能知悉也無暇贊䇿人各用長大學士孫士毅安南之伇體國還軍安南之伇初以黎氏臣服年久不忍坐視惟是天厭黎德朕已先見及此使孫士毅既為復國之後果即遵旨班師何至後此有傷我官軍之事然孫士毅身為帥臣彼時設亦如武臣等捐軀效命則所繫國家威重匪小幸而全師以出寧歸闕請罪是尚知以國為重者也削功寬罪孫士毅克復黎城朕原賞以公爵逮失事之後彼亦自知罪無可逭朕削其功而寬其罪懲奬悉本至公蓋亦嘉憫能臣之意也懲奬能臣征廓爾喀命理軍儲盡其心力亦堪入圗原任領侍衛內大臣一等超勇公海蘭察勇而有謀侍衛洊公乙亥征討準噶爾時海蘭察方以索倫馬兵從軍先是輝特台吉巴雅爾率屬來降已封為汗及阿睦爾撒納復叛後巴雅爾旋亦從逆以大兵追急遁入塔爾巴哈台山中海蘭察奮力窮追射之墜馬遂生擒以歸以此立擢為侍衛嗣後每派出兵無不奮勉爭先而料敵策應宛若素嫻韜略者然屢以戰功洊封公爵此次為參贊功成後晉封一等超勇公實為索倫之傑出者矣索倫巨擘黼衣錫龍圖形四番福祿鮮比旋終于家矜惜無已户部尚書福長安戚畹閥門家國一體兄勤逺征弟贊近理鴻邱之隔樽俎之間無不同心弗稱已上聲人巳之巳關征廓爾喀之伇豫與軍機大臣等籌畫機宜福長安盡心襄贊悉合豫意伊本以國事為重詎稱關已而已哉户部尚書董誥儒雅搢紳本不識兵樞機久參習以盡誠地官掌賦軍中儲糈皆從內地撥往及凱旋後銷算事宜一切皆户部掌之度支是司軍儲萬里調撥合宜兵部尚書慶桂所謂故國賴有世臣量去聲材授職非卑踰尊用孟子語本兵習政明代最重本兵之職凡遇軍興悉以委之自中葉以後其君不親政事又無知人之明而肩斯任者率多庸懦腐儒動皆掣肘更恣苞苴此其國事寧復可問近作凱旋兵丁各歸營伍紀事文曽指其失以昭懲戒至我朝用兵惟任將軍參贊相機攻取是以所向無敵而兵部所司不過設驛安頓送往迎回諸事而已元長上聲之子慶桂為尹繼善之子繼善字元長跨竈是乎從前西域用兵惟傅恆與豫一心主必辦之説其時尹繼善為陜甘總督頗不欲用兵此亦習于書生拘守之常談不足以識事機彼時並慮辦理軍務非其所長因令黃廷桂調任陜甘専司其事是以西師蕆功伊雖為世臣未得列入戰圖今慶桂以軍機大臣邀恩得此榮遇轉覺跨竈矣圗形始爾工部尚書和琳二庸駐藏諸務推諉俘習渾雅滿泰二人同為駐藏大臣乃平時于廓爾喀之事置若罔聞藏中一切委之噶布倫等任其妄為逮廓爾喀侵擾藏地又不能帶兵征𠞰轉欲將達賴喇嘛班禪額爾德尼移至內地竟甘心棄置藏地不知是何肺腸因令將伊二人于藏地枷責以為推諉國事者之戒選良代之條條有理和珅之弟責難觀成和琳先為御史屢命巡漕于河道漕運頗能認真挑濬督催因悉其才具優長並知為和珅之弟去嵗令往代俘習渾等為駐藏大臣沿途據奏催儧烏拉立定期限嚴申賞罰軍裝火藥源源運送不致遲誤及到藏後辦理糧餉事宜整頓藏中諸務一切井井有條初不料其竟能副朕委任而國家得一良材尤堪慰恱喜得世臣為國之楨四川總督惠齡和琳督糧至藏之西濟嚨以內糧運烏拉専任和琳往來督催可以無誤然亦僅至藏之西界其大兵所到地方之後路亦難兼顧師進賊境繼運留資初命惠齡為四川總督即令同至軍營授為參贊大臣既念大兵深入賊境師行糧隨最關緊要而惠齡于調度既不能如福康安戰陳亦更不如海蘭察用其所長莫若竟以後路糧運専責其成其在拉子地方設法趕運糧石軍械及雇覓商民長運諸務悉為周妥並不貪得戰功希冀懋賞此意亦為可嘉餉械不匱用濟武成功亦懋幾初被圖形原任都統銜護軍統領喇布凱巴圖魯台斐英阿首攻擦木繼克濟嚨身先士卒奮勇成功遂至帕朗逼甲爾古台斐英阿自擦木進兵以後無不身先士卒往來截殺最為奮勇及攻東覺山梁尚用炮轟斃紅衣緑衣賊目其後進攻甲爾古拉復直前射斃紅衣賊目不意中鎗殞軀深堪痛惜直進殞身痛惜心楚護軍統領和隆武巴圗魯額勒登保石碉木柵鱗疊賊防勢如捲籜捷似頽牆將軍所示無不領略額勒登保時為翼長司軍前各隊營務及調遣諸事故能領略將軍意指此番前後七戰率領精兵攻碉奪柵所至無不克捷率領精兵埋根卓鑠原任副都統扎努巴圖魯阿滿泰遇有絶險莫弗身先詎惟力勇實以心堅攻堆補木奪橋命殞馬革未能官軍攻奪濟嚨官寨及搶奪熱索橋由峩緑大山繞至上遊紫筏渡河又攻克協布魯賊寨阿滿泰無不身先鼓勇痛殱賊衆忠悃實屬超羣乃至攻噶勒拉堆補木過河時見賊匪將徹橋板直前搶奪兵丁乘勢競進而伊適以在前中鎗落河水深溜急當爭先進擊之際不及撈覓並不得裹馬革以歸益堪憫惻更切哀憫副都統銜駐劄西藏協辦事務大臣賽尚阿巴圖魯成德曽爭巴忠前次廓爾喀侵擾藏邊巴忠授意噶布倫丹津班珠爾許銀贖地成德未嘗不知然聞彼時曽力詆其非而巴忠恃在御前行走諸事擅専雖爭之不得而心膽尚壯尚有雄心克聶拉木賊人占據聶拉木官寨成德與穆克登阿率兵乘夜前進距寨里許穆克登阿由西南伊由西北進攻拋入火彈燒斃賊匪甚衆其逃出者復被官兵殱戮二百餘名寨中尚屯聚賊匪令我兵四面圍困無一漏網者頗見勇略亦見韜襟重進𠞰賊别分一路既而大兵由色達木一路冞入賊境福康安分派成德由哈那衮木山一路進攻既同阿尼雅布等將扎木攻克又聞前途有鐡索橋即潛行樹林內奪據大河東岸賊卡乘夜奪橋並將西岸賊卡攻克沿途殺獲甚衆復由江各波邁山梁直趨隴岡與彥吉保會合兩面夾擊占住隴岡所有賊卡悉被焚燬此次成德分路攻𠞰功亦可録頗有所克圖形表故右旋白螺贊螺多左轉希有右旋孰謂生海而能從天天右旋日月左旋其向西行則以天行速而日月行遲天帶之而行似右旋耳古人以蟻退行磨上為喻甚精螺為海中一微物而或有右旋者涉海者攜帶于舟則吉祥安穩最為靈異所以梵帙標竒著編西畨藏大逰戲經載釋迦牟尼佛初入母胎時淨飯王家示現一切勝福吉祥所有金銀如意寶珠琉璃玻璃珊瑚一切寶篋以及增夀右旋白螺篋自然開放衆寶潔淨無垢盈滿其中云云丹書呈瑞每年藏中喇嘛于新正及萬夀節進丹書所陳供器時有獻右旋法螺者以為竒寶而不多見弗恆遇焉寓聲於寂三乘提全吹則有聲置則寂然聲為有寂為無有無一合而于螺之空體現之實寓三乘法也御製文三集卷十六
