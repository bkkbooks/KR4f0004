front:
  text: 欽定四庫全書御製文初集卷二十六
  hash: sha256:1df2b01c67acb26959aa40416b65244c48fc7336ff42774eef674a68fc282ec0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_026-1a, image: WYG1301/WYG1301-0224a.png}
body:
  text: 頌老人星頌金翼發南麗於南極聿瞻六星厥光熻赩比地凝精自天降祥乘白雲英來賁夀康華髮童顛目光其紫彭祖成鳩猶然孫子有餘樂易不待將迎眉黎笑口如聞其聲慶周花甲彩耀萱闈於萬斯年視此頌辭慈聖萬夀九如頌有序恭惟聖母崇慶慈宣康惠敦和裕夀皇太后陛下德駕二南徽儀四表凝符溈汭位祿名以夀彌昌衍慶岐山元亨利惟貞益固蓋綜百度於慈訓爰綏六宫而內和從提抱以來深恩鞠育暨涖臨之後懿範遵循鞏我丕基均由聖哲皇哉夏恢啓母允矣莘翼湯孫漢明德之儉約難方宋宣仁之憂勤亦遜六旬周甲萬夀添籌御殿含飴方物敷天之養奉觴上夀家人主鬯之歡光玉册以鴻稱播金聲於盛典約六經之吉語達萬國之䖍悰敬頌九如載申百拜其一章曰至哉坤元易於萬斯年詩斂時五福書而百化興焉禮記福履綏之詩照臨下土詩肅肅雍雍禮記禮義以為紀禮記叶威莊而安孝慈而敬禮記以豫小子書正家而天下定矣易其二章曰顯顯令德詩德音是茂詩遂布於三宫禮記以和長幼禮記以親九族九族既睦書謙尊而光易穆穆皇皇詩言而履之禮也行而樂之樂也禮記福祿來崇詩中心得叶也易其三章曰元年春春秋即命曰書天子親載耒耜禮記汝其敬書率作興事書叶維九年書春日載陽詩又曰書后妃齊戒親東鄉躬桑禮記以為黼黻文章禮記冬祁寒夏暑雨書求民之莫詩以穀我士女詩其四章曰學于古訓書憲章文武禮記教之誨之詩是謂承天之祜禮記敬哉書因吉土以饗帝於郊禮記敬哉書有事於太廟春秋叶大搜春秋巡侯甸書世德作求詩元子哉書我日斯邁而月斯征詩翕受敷施書然後能使人禮記叶以三十年之通制國用禮記百度惟貞書多文以為富禮記修辭立其誠易視乃烈祖書明德惟馨書其五章曰天作髙山詩繼序思不忘詩承天而時行易纘女維莘詩叶維十有三年春書至于岱宗書叶敬祀事禮記丕惟曰書品物咸亨易叶豫惟不可不監書命有司發倉廪賜貧窮禮記叶山川出雲禮記亦右文母詩秋春秋大有易厥篚檿絲書以介眉夀詩其六章曰萬邦惟懷書我不敢知曰書厥惟艱哉書我出我車詩自彼氐羌詩至諴感神書聖謨洋洋書命之曰書中和之紀禮記曰仁與義易叶義以正之禮記天之所助者順也易仁以愛之禮記人之所助者信也易七旬有苖格書實受其福易天地之大德曰生易以綏後祿詩其七章曰嵩髙維嶽詩如岱禮書南國是式詩叶淮海惟揚州書駕蒼龍禮記檜楫松舟詩三江既入書畇畇原隰詩何蓑何笠詩南山有臺北山有萊詩桃始華禮記天降時雨禮記楊栁依依詩有鶯其羽詩酌言獻之詩維筍及蒲詩黻衣繡裳詩其惟聖人乎易思媚周姜太姒嗣徽音詩以光大也易垂裕後昆書叶其八章曰修身及家均平天下禮記其旋元吉易俾緝熙于純嘏詩叶甲子春秋復易自今以始詩百年曰期禮記惟曰欲至于萬年書頥禮記頤貞吉易子子孫孫詩子孫千億詩叶其九章曰十有六年春秋冬春秋十有一月春秋律中黃鐘禮記萬夀無疆詩式燕且喜詩畢獻方物書小大稽首詩叶維豫小子詩拜手稽首曰書如山如阜如岡如陵如川之方至如月之恆如日之升如南山之夀如松柏之茂詩掖輦紀慶頌有序我皇祖孝侍兩宫於凡先意承歡冬溫夏凊行樂宫中者無不極天下之養示孫曾之則而翠華巡省蓋無虛嵗亦莫不䖍奉安輿膝前娛志則又自古帝王奉東朝以申愛慕者所無有也豫小子敬仰前規維懼弗紹聖母皇太后亦以繼祖烈恤民艱毋忘我國家習勤詰武之規諄諄是訓踐阼以來省方問俗必敬請慈闈臨幸皇太后怡顔首肯曰皇帝展義示度不宴息深宫豫所喜也夫慶夀致誠宣德陪奉偶一行之書史稱美未聞教之鴻猷朂以義方如我聖母者也而大安所過無不詢穡事驗民俗老婦黃僮覲光莫禁賞沿於途周逮於富故凡額手而祝大齡者人一其聲聲一其誠則知我聖母萬萬夀無疆應於人情是徴敬以邇年侍輦所歷稱頌八章詎能揚徽音於萬一用志欽懿訓於弗諼若夫夀康承慶暢春行時率臣民而祝純禧攜孫曽以介眉夀曰暘曰雨厪慈懷隨地隨時聆德誨芳溢彤管蓋不可殫述矣嵩髙申祝喬嶽維嵩宅是土中際時屢豐展義觀風聿奉安輿聿遵伊洛黃雲擁途兆庶孔樂二室華蓋峻極于天祝我聖母夀萬萬年聞呼者三艷彼史筆曷若我民口億聲一五臺禮佛有蔚清凉曼殊示相琳宫鐘貝五頂相望緬我皇祖龍馭載臨聖日在天光照祗林肅肅葆羽翼翼鸞輅言瞻臺懷言嗣神武猊座蓮臺不可思議佑我文母百福備致盛京展謁於鑠盛京崇基天作佳氣鬱蔥周豐殷亳載畋北塞載蒞陪都巍峩紫殿殷軫皇圖崇政清寧承歡廣宴賜復賜酺澤洽圻甸皇矣祖德長發其祥燕翼埀庥聖母之慶岱嶽觀日粵戊辰春駕言東巡既仰杏壇遂躋岱宗叶匪慕漢唐用事封禪以祝洪釐介祉錫羡暾彼扶桑升於東溟芝童緑髮玉女雲軿慈恩載普覃齊浹魯戴我文母式歌且舞興安閲圍皇祖詒謀嵗事秋獮並塞名王選徒屬鞬於皇聖母法祖是朂金􅒫氣霽靈囿土沃爰命三虞爰整六飛殪虎洞麋周阹合圍㡢城迢迢凌彼崇椒顧之色喜德音孔昭金山渡江於樂南國望幸有年載承慈命來遊來觀濟河涉淮慰彼傾心扶攜抃躍總總林林川后靜波屏翳送帆京江灝浮玉巉嵒兆庶孔愈伏迓金輿頂祝佛母香華載途聖因視膳載信吳閶于邁浙水佳麗明湖披圖可指瞻彼聖因聖蹟所留仰企前徽扶輦春逰隄樹簇錦江潮曳練南屏窈窕兩峯蔥蒨晨羞日視宛若宫庭以天下養勉紹先型江寧觀射旋舲吳會言循江滸虎踞龍蟠鍾山元武作鎮南服我旅我臣來覲行殿翟茀組紃聿敷湛恩聿申懿訓豫所有事文揆武奮詰戎保泰仰承聖慈超任越姒福履永綏針七情針喜萬類靜觀意愜斯喜神動天隨油然難已宣心之和導氣之滯不極不淫歸於有制禮樂以飾百度惟熙樂以天下奉此無私怒相彼天道有溫有肅維人肖天喜怒倚伏情炎於中莫之敢觸所貴中節雷霆亦福嗃嗃毋過悻悻勿遷和厥心性以師聖賢哀宣文有言哀而不傷感物切慮如川有防當其一往愀愴懊咿罔識止節心悴神疲噍殺非正毁滅非宜間之以則庶無倚毗懼萬幾待理知懼鮮失業業兢兢一日二日馭朽為戒臨深是怵於昭上帝相在爾室式茲不聞所其無逸惟敬勝怠動獲貞吉愛人有秉彞徴於好德善善欲長賢賢易色所以孔子曰生也直疏亦不忘親亦不㥾愛所當愛爵賞罔忒擴我天和容保萬國惡性本無為情生好惡俎徹鮑魚往訓攸著毋設成心因物以付智鏡在躬先覺有素郊遂是移僉壬必錯中正和平萬流景附欲養心有要道在寡欲從之則危淡泊宜朂緬維曩哲垂訓窒欲非禮必斥奉身如玉一人居髙九有咸矚不邇不殖永保天祿五事針懿戒有訓抑抑威儀洪範五事始貌終思動罔或愆敬義夾持作肅惟恭非禮弗為顧諟明命日監在茲輯柔爾顔友君子時屋漏有愧差之毫釐顒卬令望夙夜是祗毋尚巖巖咫尺天威毋示訑訑右史有司溫恭允塞為德之基樹之軌範視此針辭右貌針恢恢寰宇一人是主維命靡常有德斯祜王言如綸被乎下土無易由言惟敬作所彞訓聿昭四方是矩卓彼前王樹茲諫鼓柔亦不茹剛亦不吐進彼嘉言衮闕堪補聲為之律毋逞喜怒白圭謹言玷不在巨金人三緘非禮勿語從斯作乂敬茲九五右言針維目司視其德曰明明有由蔽物引欲萌伊古有訓五色目盲勿眩錦繡勤省農耕勿玩珠玉企望賢能知人則哲體察物情曰視有要視於無形如水如鑑萬象自呈靜虛動燭其本必清垂旒端冕儲神致精日月環照無幽弗瑩克艱厥后永正玉衡右視針宣聖有言非禮勿聽矧維建極承天永命惟精惟一敬勝義勝何以達聰容納諫諍執兩用中旌賢表正既髙乃聽亦逺彼佞五音耳亂樂必放鄭九歌驗民八風體政亦越卷阿矢音有詠雖隔九重而知民病雖聆萬言而執一柄毋俾聽熒尚其居敬右聽針基命有密厥惟思哉翼翼小心為德之荄是惟弗思思則弗回勿狃宴安而遺逺懷勿侈豫大而弛心齊貌恭言從匪思曷階視明聽聰惟思是裁無黨無偏惺惺靈臺勿縱其欲縱欲成災克己復禮四德具該朝斯夕斯天鑒恢恢告我後人皇圖永培右思針養心殿四針集經書句各十六韻有序我皇考聖訓曰敬天法祖勤政親賢事祗四端義該萬理自古帝王莫不守此以治違此以亂豫小子踐阼以來平旦莊誦惟日孜孜畏與年長會隨時觸爰集經書成句衍義綴辭各得十六韻入目警心既因自勵亦以昭示來許敬天針皇矣上帝詩鑒觀四方詩昭假于下詩赫赫明明詩惟聖時憲書承天而時行易終日乾乾夕惕若易無怠無荒書畏天之威詩勑天之命書不顯亦臨詩俾爾彌爾性詩惟豫一人書曷其奈何弗敬書敬勝怠者吉義勝欲者從國語日日新又日新禮記清明在躬禮記無然畔援無然歆羡詩昭升于上書在止於至善禮記先天而天弗違後天而奉天時易我不敢知書我其夙夜詩念茲在茲書怵惕惟厲書安而不忘危易於緝熙詩永言配命詩弼我丕丕基書法祖針明明我祖書既受帝祉詩我來自東詩永清四海書叶之綱之紀詩惟民所止詩無忝皇祖詩奉先思孝書作樂崇德易肅肅在廟詩春禘秋嘗禮記思其所樂禮記聖有謨訓書若日月之照臨書式如玉式如金左傳布在方䇿禮記罔有不欽書峻命不易詩遺大投艱于朕身書如親聽命禮記罔不惟德之勤書曰仁與義易迭用柔剛易一張一弛禮記不愆不忘詩民可近不可下書無教逸欲有邦書夙興夜寐詩其爾典常書啓佑我後人書俾爾熾而昌詩勤政針天行健易聖人則之易克綏厥猷惟后書一日二日萬幾書罔逰于逸書庶績咸熙書曰豫一人禮記昧爽丕顯左傳與公卿大夫共飭國典禮記考禮正刑一德禮記無敢不善書夙夜匪懈詩敷政優優詩惟幾惟康書斯謀斯猷書執事有恪詩亦又何求詩百工熙哉書我獨不敢休詩綱紀四方詩惟皇作極書先之勞之論語不遑暇食書念之哉書業廣惟勤書勤則不匱左傳時乃日新書承天之道禮記純亦不已禮記政貴有恆書慎終如始書親賢針粵若稽古書明四目達四聰書論道經邦書謂之三公周禮三事大夫詩百辟卿士詩宣力四方書以佐天子詩惟后非賢不乂書其惟吉士書寤寐求之詩任賢勿二書靖共爾位詩期豫于治書自朝至于日中昃書晝日三接易若涉淵水書用汝作舟楫書臣哉鄰哉書尚克相豫書豫其敷心腹腎腸書出入自爾師虞書假以溢我詩我應受之詩用勱相我國家書邇可逺在茲書人亦有言詩惟治亂在庶官書所寶惟賢書惟一德一心書欲至于萬年書御製文初集卷二十六
