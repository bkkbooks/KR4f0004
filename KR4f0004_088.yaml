body:
  text: 記八徵耄念之寶記豫年七十時用杜甫句鐫古稀天子之寶而即繼之曰猶日孜孜不敢怠於政也蒙天眷佑幸無大隕越於兹又浹旬矣思有所以副八旬開帙之慶鐫為璽以殿諸御筆蓋莫若洪範八徵之念且豫夙立願八十有五滿乾隆六十年之數即當歸政今雖八十逮歸政之嵗尚有六年一日未息肩萬民恆在懷庶徵之八可不念乎念庶徵即所以念萬民曲禮八十曰耄老而智衰之謂兹逮八十幸賴天佑身體康強一日萬幾未形智衰不可不自勉也如至果不能自勉則亦不敢曠職以待六年之期何則壇廟之祀不可不躬親雨暘之時不可不常驗中外之政不可不日勤民物之養不可不心存苟失其一叢脞隨之則吾豈敢是則耄而敬念庶徵仍古稀猶日孜孜之意也亦五福五代堂之説所謂皇極斂錫之志也亦即近讀洪範著論所謂六極中不能去其三曰憂之義也夫漢唐以來古稀天子才得六六之中至八旬者才得三而三帝之中惟元世祖可稱賢其二則豫所鄙也三代下諸帝登七十者僅六見豫向所為古稀説而六帝之中惟梁武帝宋髙宗元世祖年登八十梁武帝自貽傾覆宋髙宗忘恥偷安皆所素鄙惟元世祖乃創業大有為之君然踐阼非早建號僅三十五年傳孫成宗其諸王世系元史雖無表可稽但計其世次訖順帝不過四傳亦不能如今五世同堂之盛是則豫之仰荷天眷至為深厚不特云稀且自古所未有如是而不祇承鴻貺愛養黎元則豫曷敢抑亦有所不忍也即元世祖亦未如豫之五代同堂是豫沐昊乾鴻貺為獨深而豫之所寅承錫羡當何如亦曰體天愛民誠心勤政與洪範五之斂錫八之念徵九之三憂孜孜惕惕日進無疆云爾豫之子孫能心豫之心政豫之政惕豫之惕憂豫之憂或得仰邀天眷有年至七旬八旬者繼用此寶則又我大清國億萬斯年無疆之休所不敢必而深願者也是為記嘉靖玉印記內府舊藏玉印一刻為一文因非所識問之內廷翰臣知古篆者皆稱不能曉更命西竺唐古特回部及西洋人識之亦皆不知因思道家通符籙者或解其義問之法官劉元斌周元定則稱是其道家心印用於醮籙上章等事上之一畫為心字乃通用者其下則各從其欲為之彼此不通知亦不能曉如劉元斌之一上文為心下文則五嶽朝天也周元定之一上文為心下文則一朵紅雲也彼二人向亦弗相知則古玉印亦惟識其上文一之為心而下文實不知其為何義也此印既刻以玉而其紐復用蹲龍非道家方士所敢用者知為嘉靖好道乃其修醮飛章之所用耳夫天子宸章擇言鐫璽以示自警正也如考之皇祖之戒之在得日孜皇朝乾夕惕朕之猶孜莫非寓戒慎之意即偶寓意别裁然近玩物不足為訓若趙宋之君皆有御押已屬不正何至嘉靖效道家心印之為是較秦皇漢武益可鄙矣故記之墨雲室記畢沅進古墨一方長盈尺博二寸厚十分寸之二匣刻眺氏記以為僧法一所藏南唐李廷圭之物夫既為物矣玩物喪志一言皆可以概之而有不然者蓋古之物朴于今今之物華于古尚朴屏華孰謂蹈喪厥德之失而況文房之器繼往昭來潄六藝之芳潤視其珍他玩者為有間矣墨之形之膚之款之價眺氏言之詳矣兹弗贅獨其體刻為雲而眺則未言及之夫雲能致雨墨生筆花發為文其與春膏之澤被萬物何以異哉豫搆築養性殿于寧夀宫以為倦勤後寢興之所其義已見向年之什而其凊溫室宇一如養心殿之式養心殿西暖閣之溫室昔名之曰三希堂未可移之養性殿而名之也兹適得此古墨即可以墨雲名此室蓋三希為內聖外王之依仁正符養心墨雲為含英咀華之遊藝適合養性爰紀其實如右並為之圗命諸臣各以已意和之不必拘體賡韻亦西清一段佳話也正陽橋疏渠記正陽門外之石衢抵正陽橋橋之左右市鄽櫛比允帝王都會萬方輻輳之基也橋之南為天橋其南石衢直達永定門則答陽黃道蕩蕩平平會極歸極之宗也衢之左為圜丘祈年殿之西外圍垣右為太嵗壇先農壇之東外圍垣各有石衢二橫接圍垣之南北門為詣壇輦路蓋地勢東髙而西低故石衢之西恆積水而東之沙土常因西北風吹壅西垣之半每詣齋宫怵弗愜觀今年上辛祭畢爰命司工於天橋南石衢之左右自北而南各疏渠三第一渠長各一百六十餘丈寬北各三十餘丈南各二十丈第二渠長各一百三十丈寬各二十丈第三渠長各五十五丈寬各二十丈深各三尺其四達壇之橫衢命各闢土道寬二丈以為往來車路並各去其向禁人行之木柵東西詣人壇之橫衢四舊設木柵以禁行往來蓋地近壇垣理宜嚴肅而重車皆由正石衢以行易致石弊今石衢左右既開廣渠且各留土路是四橫衢之南北皆有界限木柵亦可以不設矣疏渠之土即簣為渠岸之山周植以樹兼培行車之土路于是渠有水而山有林且以禦風沙弗致堙壇垣一舉而無不便向來南城井多苦水兹胥得飲渠之清水為利亦溥而都人士之逰涉者咸謂京城南愜觀瞻增佳景然豫之意原不在此也潔壇垣而欽毖祀培九軌而萃萬方協坎離以亨既濟都城南為離位今開濬水渠六坎為水卦是為水火既濟之象亨之道也奠經塗以鞏皇圗其在斯乎其在斯乎故不待考工之請而為之記亦合向之知過論所謂不可已者仍斟酌為之之義值此耄齡復得蕆一大工作孰莫非昊蒼鴻貺欽承開國家萬年有道之長也哉十全記昨準廓爾喀歸降命凱旋班師詩有十全大武揚之句蓋引而未發兹特敘而記之夫記者志也虞書朕志先定乃在心周禮春官掌邦國之志乃在事旅獒志以道寧則兼心與事而言之然總不出夫道得其道乃能合於天以冀承乎貺則豫之十全武功庶幾有契于斯而可志以記之乎十功者平準噶爾為二定回部為一掃金川為二靖臺灣為一降緬甸安南各一即今二次受廓爾喀降合為十其內地之三叛么髍弗屑數也平準噶爾者二乙亥年以達瓦齊篡奪諸部瓦解朕因其部落接踵內屬乘機致討以成欲占前志未半載遂俘達瓦齊不意阿睦爾撒納潛逃伊犂於是復命進𠞰逆賊竄入俄羅斯以患痘身斃俄羅斯傳送其尸伊犂遂平定回部者一當大兵西伐時逆􅉰小和卓木背恩反覆因命兆惠等統兵追𠞰傳檄拔達充山縛獻于是其弟兄大小和卓木一擒一斃掃金川者二先是金川娑羅奔搆釁鄰番戊辰嵗命傅恆厚集諸路官兵將搗其中堅而逆酋稽首請降至壬辰兩金川聨結作亂命阿桂統師進𠞰至丙申遂平其全境靖臺灣者一丁未逆民林爽文莊大田創立天地會名目煽誘匪徒謀為不軌命福康安海蘭察等統兵過海將二逆悉行擒獲就誅降緬甸者一因緬匪侵擾邊境命傳恆為經略前往屢破賊壘而彼即詣營請降因而罷師至戊申其國長孟隕奉表入貢乞恕前罪遂允其請降安南者一初黎維祁為阮光平所侵命孫士毅統兵為之克復黎城復封黎維祁為王乃阮光平再至而黎維祁即棄國奔內地更命福康安前往𠞰除而阮光平備陳情事再四籲懇乞降並請于庚戌年親來瞻覲祝釐朕既先有降凡天厭黎氏之語而安南又無人可付亦即允其歸此八次用兵皆非得已而俱荷我天佑成功今并此廓爾喀兩次降順蓋已十蕆大功武既揚實屬厚幸至于誅王倫翦蘇四十三滅田五三事則係內地亂民旋即討平弗薌其事兹故不列于武功云前己酉廓爾喀之降蓋因彼擾藏邊界發偏師以問罪而所遣鄂輝等未宣我武巴忠乃遷就完事致彼弗懼而去嵗復來以致大掠後藏飽欲而歸使長此以往彼將占藏地嚇衆畨全蜀無寧嵗矣戊申嵗廓爾喀滋事之始命鄂輝成德統率徑旅往𠞰彼時因巴忠素曉唐古特語令往會同籌辦詎意巴忠諸事擅専竟與噶布倫丹津班珠爾等私同沙瑪爾巴定議每嵗令藏中許給廓爾喀元寶三百箇退還侵地並立大􅘁合同二紙鄂輝成德為其所愚隨同附和未曽示以兵威是以廓爾喀去嵗復敢侵擾既將丹津班珠爾等裹去為質並搶掠札什倫布廟財物披猖已極不得不命將興師聲罪致討且廓爾喀年來侵占附近部落兼并巴勒布三部與後藏之聶拉木濟嚨宗喀等處毗連不大加懲創必至搶占前後藏地蜀中打箭爐一帶將無寧嵗矣是以罪庸臣選名將勵衆軍籌儲餉去秋于木蘭圍場中聞廓爾喀復來侵擾之信朕謂不過與唐古特因錢債啓釁初未有發兵之意而已忠一聞此事旋即自戕始疑此事必有弊端諭令鄂輝查奏始知有許銀贖地之事駐藏大臣俘習渾當廓爾喀搶掠之時既不帶兵𠞰殺又欲將班禪額爾德尼及達賴喇嘛移駐泰寧等處幸而達賴喇嘛未從其言是竟欲委棄藏地本應即行正法念其父那木札爾曽經陳亡從寬令于藏地枷責雅滿泰同係駐藏大臣得習渾之奏竟與聨銜因令一併枷責以示嚴懲旋念事關重大福康安謀勇素著足堪倚任因命同海蘭察等率領巴圗魯侍衛章京及索倫屯踈兵丁前往大張撻伐福康安自擦木進兵之後連次克捷隨時褒賞軍糧軍械尤為緊要去冬即命孫士毅馳往籌辦今春更命和琳馳抵藏中辦理其濟嚨以外令惠齡往來専司趲運數月以來宵旰籌謀實未嘗一刻置懷也福康安等深感朕恩弗辭勞苦於去嵗冬月即率索倫四川降番等精兵次第由西寧冒雪而進今嵗五月遂臨賊境收復藏邊攻克賊疆履線險如平地渡溜要若蹄涔繞上襲下埋根批吭手足胼胝有所弗恤七戰七勝賊人喪膽福康安等到藏于今嵗閏四月草七日自第哩浪古帶兵起程五月初六日至擦木地方即乘隂雨連夜發兵分隊進討海蘭察等由正路直攻賊寨福康安督率官兵攻克碉座賊人即已驚怖初八日行抵瑪噶爾轄爾甲地方峭壁深林內藏賊匪三百餘名官兵擊殺數十名福康安又派兵埋伏半山故留一路誘賊上山及山半帶兵橫衝賊衆奔竄直追至邦杏地方沿途𠞰殺無算初九日直抵濟嚨官寨分遣兵丁攻撲使賊人處處受敵不能相顧初十日丑刻同時並進搶上東南山梁攻克喇嘛寺屯聚賊匪又將石砌碉座立時焚燬官兵等冒雨攻圍殱戮賊衆殆盡亥刻遂攻破官寨藏地全復十五日至熱索橋過此即屬賊境福康安等一面遣兵由上遊峩緑山下扎筏徑渡直撲賊卡而正路官兵桑勝搭橋一時並濟將士無不人人奮勇痛加𠞰殺十七日復行前進深入賊境一百六七十里地名協布魯該處當路有橫河一道水深溜急而橋座賊已拆毁福康安等于二十三日帶兵繞至橫河上遊借接枯樹搭橋賊匪鎗聲不絶因於日暮大雨時佯令各兵徹退至夜半賊匪回寨趕緊接縛大木過河分為三路于二十四日黎明併力壓下盡行焚燬賊寨痛殱賊衆二十四日攻克協布魯後自噶多正路至足木古拉巴載山梁山下有橫河一道對面大山即係東覺福康安與海蘭察分為兩路福康安探得上遊噶多普山上樹木茂密可以藏身因繞行于六月初六日下至山麓鳧水渡河官兵奮勇𠞰殺將近河碉卡木城盡行奪據而海蘭察亦連日潛伏冒雨步行初六日黎明徑登博爾東拉山巔繞至賊卡之上將木城石卡全行拆毁旋與福康安會合一處併力追𠞰於初九日至雍鴉地方因官兵等冒險登陟辛勤已甚暫令休息而賊酋遣人乞降經福康安嚴行駁飭惟是該處大山層疊而堆補木與甲爾古拉兩山之間又有橫河一道福康安等將官兵分為數隊左一路由橫河上遊繞道進攻右一路由帕朗古攻橋進撲甲爾古拉賊匪排鎗連環不斷我兵乘勢兢進奪據橋座𠞰殺更倍於前計自擦木邦杏濟嚨熱索橋協布魯東覺帕朗古前後凡七戰皆獲全勝共殺賊目二十餘名賊匪三四千名生擒二百餘名雖山徑險仄河溜湍急福康安等鼓勇直前如履平地如渡蹄涔賊勢甚為窮蹙前已屢遣頭人詣營納款至此次益加震讋哀懇乞降無不惟命是從矣及兵臨陽布賊遂屢遣頭人匍匐乞降將軍所檄事件無不謹從而獨不敢身詣軍營蓋彼去嵗曽誘藏之噶布倫丹津班珠爾等前去故不敢出也賊人經官兵屢戰屢勝之後其力實不能支卑辭乞命心膽俱落凡福康安等檄諭之事無不一一遵奉先將裹去之噶布倫丹津班珠爾等送出繼又將上冬搶去扎什倫布廟之金銀器皿悉數繳還並沙瑪爾巴骨殖及前私立合同二張亦俱呈出不敢再提唐古特錢債一事且言從前為沙瑪爾巴所唆實已悔之無及惟乞大皇帝憐憫全部生靈網開一面其畏懼情形似屬真誠其賊酋拉特納巴都爾與其叔巴都爾薩野不敢親自未營自謂從前誘裹噶布倫等一事罪惡已極懼干擒戮故不敢出此亦真情無怪其然也我武既揚必期掃穴犂庭不遺一介亦非體上天好生之意即使盡得其地而西藏邊外又數千里之遙所謂不可耕而守者亦將付之他人乃降旨允降班師以蕆斯事昔唐太宗策頡利曰示之必克其和乃固廓爾喀非頡利之比畨邊殊長安之近彼且乞命籲恩準之不暇又安敢言和乎然今日之宣兵威使賊固意求降歸順實與唐太宗之論有所符合昔豫記土爾扈特之事於歸降歸順已悉言之若今廓爾喀之謝罪乞命歸降歸順蓋並有焉以其悔過誠而獻地切也向著土爾扈特歸順記云始逆命而終徠服謂之歸降弗加征而自臣屬謂之歸順言土爾扈特之投誠乃歸順非歸降也若今之廓爾喀畏威悔罪雖屬歸降然其悔罪之意極為真摯並請定期五年一貢永遵約束又將邊外扎木地方獻歸西藏是則誠心嚮化不但歸降而且歸順矣乃知守中國者不可徒言偃武修文以自示弱也彼偃武修文之不已必致棄其故有而不能守是亦不可不知耳知進知退易有明言豫實服膺弗敢忘而每於用武之際更切深思定於志以合乎道幸而五十七年之間十全武功豈非天貺然天貺逾深豫懼益切不敢言感惟恐難承兢兢惶惶以俟天眷為歸政全人夫復何言御製文三集卷八
