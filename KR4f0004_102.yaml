body:
  text: 嘉慶五年夏上恭輯髙宗繩皇帝聖製詩文自再丙辰暨己未正月之作敬遵先志編為御製詩文餘集越秋告成親系跋語於是髙宗純皇帝之文章廣大配天地照臨若日月昭垂於億萬世者詩五集文三集聲之以樂善堂全集定本兹振之以餘集而十全具足允集大成矣臣等竊惟三極彞訓莫大乎書而斷自唐虞以二典三謨冠首所紀者授受之盛封山濬川之功命官敷政之績敬時齊政之規巡狩觀象之制武則征苗振旅之化文則明良喜起之歌猗歟顯鑠懿美矣而其開簡曰若稽古帝堯曰若稽古帝舜帝以表尊古以志代左氏傳於地平天成賦納明試戒休董威失不經邁種德成允成功念茲出茲等語引典謨者凡九見皆謂之夏書雖伏生以為唐傳鄭康成以為虞書而左氏在三代時舊說如此然則典謨雖堯舜之言堯舜之事而其成書則後之人仰思追慕繼序不忘之所纂述也我髙宗純皇帝貫道成化立聖人之言載前八集者已為生民以來所未有茲餘集更有不可階者自傳寶以來三年有竒殷殷訓政即亹亹敶詞凡敕幾主敬實晨昏而體驗之誨吏型民實綸綍而奉行之致宫中之齊肅則承祭必達恪誠侍蹕路之詠吟則按轡先窺色笑至於對時育物考古證今皆趨庭之立禮言詩聰聽彞訓也抑更有盛者恭讀聖製詩中有合帝鑒沐德馨斟福酒發御論諳凊溫兼愛敬君難父難子福豫福之句至愛深仁情肫言藹又敬讀恭跋中名集述鑑始之詩絶筆愴望捷之作捧爵隨鑾昕朝叢積凛心傳而懷手澤紹聞衣德慤著愛存盛矣大矣孟子謂聖人人倫之至而道法乎堯舜倫盡乎君臣猶未足以稱道我聖聖相承止慈止孝之郅隆也臣等檮昧墟拘幸親見編輯之成頒行海宇傳諸宙合俾咸誦聖謨明訓仰瞻至德要道謹以管窺錐指之見綴言簡末臣朱圭臣彭元瑞臣戴衢亨臣周興岱臣趙秉沖拜手稽首恭識
