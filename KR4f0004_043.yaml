  text: 欽定四庫全書御製文二集卷九
  hash: sha256:495d14ee7409ca71e7330af675bd22a83b0138256f7f20759cc1506729c688cc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_043-1a, image: WYG1301/WYG1301-0338a.png}
body:
  text: 諭重刻五朝册寶尊藏太廟禮成諭朕承上蒼眷佑列聖垂庥平伊犁定回部闢疆二萬餘里回子伯克盡為臣僕和闐良玉充貢內廷敬維太廟尊藏五朝册寶係隨時鐫造玉色長短未能一律用是選擇精璆特派大臣董率敬造五朝册寶全分以今嵗孟冬時享恭奉入廟舊有册寶送至盛京太室尊藏王檢金繩虔申對越聿照我祖宗功德之成於萬祀甚巨典也所有恭造餘存未鎸各分朕親加檢閲其玉色與五朝册寶相符者均編為廟字號嗣後有舉行册寶入廟之事概用此玉以昭畫一其玉色較白而未能一律者另編為喜字號將來朕歸政後嗣位之皇子崇上尊稱即將此玉成造册寶並嗣後皇孫皇曾孫輩有承事東朝尊崇徽號者皆以此等喜字號玉一體呈用永為定制洪惟我列祖列宗荷天之龍重熙纍洽勤求治理不敢康寧用克上協天心暨於朕躬纘緒承庥撫有方夏弗懈益虔克集大勳版圖式廓迄今年逾古稀猶日孜孜益不敢不敬天益不敢不勤民自新疆底定以來伊犁將軍及駐劄大臣盡皆恪遵功令撫綏安輯仰體朕一視同仁德意新疆萬里無不安居樂土效悃抒忱即有一二滋事之臣如素誠髙朴者皆不旋踵而敗露治罪不動聲色力加整飭俾享安全是以回部伯克內如色提巴爾第鄂斯滿等久在乾清門行走竭誠供役與內地臣民無異其𣲖令採玉者亦皆歡欣踴躍共效子來我子孫繼序繩承敬瞻册寶當益凛天命之難諶知守成之不易聮內外以同心設或稍存怠忽所用非人以致撫馭失宜則和闐珍産未必能源源而至又或意存徴索苛求苦纍則不惟玉不可得而且别啓事端其所關係甚大思艱圖易可不慎乎可不戒乎用是諄切訓諭面命耳提我子孫當以朕此心為心凝承鴻貺篤念前徽永存無疆之恤以保無疆之休庶無負朕反覆教誡之至意此旨著録三通一存內閣一存尚書房一存內務府其敬承無斁欽哉命館臣入吳三桂擒桂王由榔諭通鑑輯覽附録之載唐王桂王所以匹於宋之帝昺帝是以示萬世之實録也館臣以吳三桂為叛臣不書其擒桂王由榔事而以屬之愛星阿夫愛星阿固為定西將軍領兵而三桂彼時實為平西大將軍且必應殄滅由榔三患二難之議發自三桂即後之進兵檄緬甸驅李定國降白文選皆出自三桂之籌畫其功固不可泯也然其諸籌豈實為我國家哉彼時伊已具欲據滇黔而有之之心由榔定國文選而在伊豈能據之哉蓋自古權姦無時無之亦無地無之三桂之必欲滅由榔實猶近日之阿睦爾撒納之必欲滅達瓦齊達瓦齊而在阿睦爾撒納必不能據凖噶爾詳見西師詩及開惑論則彼之為我宣力皆所以自為也今昔相形三桂之姦計畢露又何不可功則功之而罪則罪之乎其依國史三桂傅盡載其入緬事莫刪昔許子將之相曹操兩言撮其要而操亦喜適所舉二人頗甚類之亦在用之而已矣又在先覺之俾毋出我範圍而已矣命皇子及軍機大臣訂正通鑑綱目續編諭朕披閲御批通鑑綱目續編內周禮發眀張時泰廣義於遼金元事多有議論偏謬及肆行詆毁者通鑑一書關係前代治亂興衰之迹至綱目祖述麟經筆削惟嚴為萬世公道所在不可稍涉偏私試問孔子春秋內有一語如發眀廣義之肆口嫚罵所云乎向命儒臣編纂通鑑輯覽其中書法體例有關大一統之義者均經朕親加訂正頒示天下如內中國而外夷狄此作史之常例顧以中國之人載中國之事若司馬光朱子義例森嚴亦不過欲辨眀正統未有肆行嫚罵者朕於通鑑輯覽內存𢎞光年號且將唐王桂王事迹附録於後又諭存楊維楨正統辨使天下後世曉然於春秋之義實為大公至正無一毫偏倚之見至於東夷西戎南蠻北狄因地而名與江南河北山左關右何異孟子云舜為東夷之人文王為西夷之人此無可諱亦不必諱但以中外過為軒輊逞其一偏之見妄肆譏訕毋論桀犬之吠固屬無端即區别統系昭示來許亦並不在乎此也况前史載南北朝相稱亙行詆毁此皆當日各為其主或故為此訕笑之詞至史筆係千秋論定豈可騁私臆而廢公道乎夫厯代興亡前鑒不逺人主之道惟在敬天勤民兢兢業業以綿億萬載之丕基所謂天難諶命靡常常厥德保厥位誠不在乎區區口舌之爭若主中國而不能守如宋徽欽之稱臣稱姪於金以致陵夷南渡不久宗社為墟即使史官記載曲為掩飾亦何補耶所有通鑑綱目續編一書其遼金元三朝人名地名本應按照新定正史一體更正至發眀廣義內三朝時事不可更易外其議論詆毁之處著交諸皇子及軍機大臣量為刪潤以符孔子春秋體例仍令粘簽進呈候朕閲定並將此諭冠之編首交武英殿照改本更正後發交直省督撫各一部令各照本抽改將此通諭中外知之特諭命廷臣更議厯代帝王廟祀典諭朕因覽四庫全書內大清通禮一書所列廟祀厯代帝王位號乃依舊會典所定有所弗愜於心敬憶皇祖實録有勑議增祀之諭今查取禮部原議紅本則係康熙六十一年十一月內具題爾時諸臣不能仰體聖懷詳細討論未免因陋就簡我皇祖諭旨以凡帝王曾在位者除無道被弒亡國之主此外盡應入廟即一二年者亦應崇祀煌煌聖訓至大至公上自羲軒下至勝國其間聖作明述之君守文繼體之主無不馨香妥侑不特書生臆論無能仰喻髙深即厯代以來升歆議禮未有正大光眀若此者也乃會議疏內聲眀偏安亡弒不入祀典而仍入遼金二朝不入東西晉元魏前後五代未免意有偏向視若仰承聖意而實顯與聖諭相背朕意若謂南北朝偏安不入正統則遼金得國亦未奄有中原何以一登一黜適足啓後人之訾議即因東西晉前後五朝有因篡得國擯而不列如操丕不得為正統之例殊不知三國時正統在昭烈故雖以陳夀三國志之尊魏抑蜀而卒不能奪萬世之公評至司馬氏篡竊以還南朝神器數易如宋武帝崛起丹徒手移晉祚自不能掩其篡奪之罪其他雖祖宗得國不正而子孫能繼緒承休即為守文中主亦不可概從缺略况自漢昭烈以至唐髙祖統一區夏時之相去三百餘年其間英毅之辟節儉之主史不絶書又安可置而不論至於後五代如朱溫以及郭威或起自寇竊或身為叛臣五十餘年更易數姓中華統緒不絶如線然周世宗承藉郭氏餘業憑有疆域尚不失為令主此而概不列入則東西晉前後五代數百年間創守各主祀典缺如何以協千秋公論他若元魏雄據河北地廣勢強太武道武勤思政理講學興農亦可為偏安英主並當量入祀典以示表彰朕前命館臣録存楊維楨正統辨諭內詳晰宣論以維楨所辨正統在宋不在遼金之説為是所以存春秋綱目之義見人心天命之攸歸且檢閲孫承澤春眀夢餘録所載眀代崇祀古帝王位號原未列遼金二朝今帝王廟崇祀遼金而不入東西晉前後五代似此互相入主出奴伊於何底是皆議禮諸臣有懷偏見眀使後世臆説之徒謂本朝於厯代帝王未免區分南北意存軒輊甚失皇祖降諭之本意也至眀之亡國由於神熹二宗紀綱隳而法度弛愍帝嗣統時國事已不可為雖十七年身厯辛苦不能補救傾危卒且身殉社稷未可與荒淫失國者一例而論是以皇祖睿裁將神熹二宗撤出而愍帝則特令廟祀褒貶豫奪毫釐不爽實千古大公定論乃諸臣於定議時轉復將漢之桓靈增入豈未思炎漢之亡亡於桓靈而不亡於獻帝乎從前定議未將東漢全局詳審論斷轉使昏暗之君濫叨廟食所議未為允協夫自古帝王統緒相傳易代以後饗祀廟廷原以報功崇德至於嚴篡竊之防戒守成之主或豫或奪要必𠂻於至當而無所容心於其間方協彰疸之義所有厯代帝王廟祀典著大學士九卿更行悉心詳議具奏並著於定議後交四庫館恭録皇祖諭旨並朕此旨於通禮廟饗卷首以昭殷鑒厯朝垂示萬年之至意御製文二集卷九
