body:
  text: 論黃鍾為萬事根本論史記律書曰王者制事立法物度軌則一稟於六律六律為萬事根本焉蔡沈書傳又曰黃鍾為萬事根本夫順天地通神明類萬物之情莫善於律然雄鳴有六雌鳴有六三分損益而次第相生者其數並起於黃鍾黃鍾正則十二律正而天下之聲無不正漢志所以有律本之說也昔者黃帝使伶倫取嶰谷之竹生而空竅厚薄均者斷兩節間而吹之以為黃鍾之宫班固曰黃中色也色尚黃五色莫盛焉鍾者種也陽氣施種於黃泉孶萌萬物為六氣元也其長得九寸其圍得九分其積數得八百一十分在氣為中氣在聲為中聲豈非太極元氣函三統為一而立天施地化人事之紀者哉且夫萬事之大端有五一曰備數二曰和聲三曰審度四曰嘉量五曰權衡而要莫不本於黃鍾黃鍾之數始於一而三之三三積之歷十二辰之數而五數備矣黃鍾之律九寸為宫緣此以定商角徴羽起十二律之周徑而五聲和矣黃鍾之長以一黍之廣為一分十分為寸積而為尺為丈為引而五度審矣黃鍾之籥容秬黍千有二百十籥為合積而為升為斗為斛而五量嘉矣黃鍾之籥重十二銖兩之為兩積而為斤為鈞為石而五權謹矣虞書所謂協時月正日同律度量衡其以此也夫蓋天下數必從其朔理必原其始乾之初九一陽始生天地之心而理數之權輿也黃鍾者於時為子其卦為復在人為喜怒哀樂未發之中是則造化之樞紐品彚之根柢得乎此以盡錯綜之數定變化之宗直一以貫之耳宜其為純粹中之純粹所由與天地同和者歟若夫定黃鍾之管者京房以準荀勗以笛蔡雍則以銅籥和峴則以景表以至或求之於度或求之於尺或求之於黍與鐸甚至執指節以尋黃鍾紛紜龎雜究莫得其指歸惟蔡季通所云多截管而吹之以候律元者其庶幾乎夫憑器考聲者形迹之論也審聲知音者神聖之藴也善乎馬氏之言曰心之精微口不能授性所解悟筆不能書惟人心自得其中和聲為律身為度然後究極理數博考典章以合天地之元聲此則宰萬事於一心而探本窮原有存於律象之先者矣漢光武論世之論光武者率無間言而多不足其尚圖䜟一事者此亦責賢惟備之意乎然猶有未盡之㫖焉余故叙而論之蓋世治聽於人世亂聽於神惡治而喜亂豈人之情也哉苟繫桑之不謹將復隍之可虞起伏循環一消一息至於人厭流離天思反德必挺生睿哲為人神主然而飈回霧塞之秋草創蓼擾之際一辰未居衆志不齊非有神道設教其何以服天下哉且光武之興也宛人倡復起之謠西門有當為之䜟既因集事難廢半塗是以身歷艱險手定太平大業爰濟明慎綜攬三大政之措施雖髙祖亦將遜其精到焉而顧以信䜟一節吹求慊德不亦失善善之意耶夫盤庚成王殷周之令主也其遷殷而誥衆則曰卜稽東征而誓師則曰龜命龜卜雖較圖䜟為正矣然使衆志一而奉命謹則亦曷藉之哉是則光武之為其亦如斯而已矣若夫稱聖經而罪桓談則又不無過甚云爾開惑論夫人情有所弗槩於懷者則不能無惑況西師之役決機於午夜之密勿馳檄於絶域之阻閡語言泮不相同風俗敻然各别是安能人人而告之以祛其疑故事以問明理以答晰因倣四子講德之遺意作開惑論其辭曰有春秋碩儒者是古卑今循規蹈矩喜寬衣博帶如魯諸生厭突梯脂韋若楚公子聞信天主人欲有所締搆撻伐雖不敢面折其非而每退有後語也既而定伊犁俘名王成舊志闢新疆兵不血刃而歸馬於華山之陽西陲一役自乙亥春兩路大兵進發所過迎降恐後遂擒達瓦齊定伊犁𨽻屬諸部及秋已告成事無頓弦遺鏃之費乃造於臻成大夫之席曰唉有是哉有是哉走懷杞人之憂有日矣夫守在四夷其德莫恢佳兵不祥其理莫賅今所見者回異乎所聞則是秦皇不必築長城而漢武不必悔輪臺也曷以啓豫蒙乎大夫曰子不聞長卿之言乎非常者固常人之所疑也無何阿逆叛羣凶應如蜩如螳曰梟曰獍斷驛虜牧奮臂以逞一二隻行野宿者或致戕其身命阿睦爾撒納濳蓄異志乘我師既平準夷覬為四部大台吉未遂中途叛逃而一時逆黨如伊犁之巴磉克什木西路之阿巴噶斯哈丹北路之包沁等先後煽附斷臺肆掠道路為梗於是碩儒復過大夫之閭曰如何如何果不出吾所訝宜亟罷是役禍庶少輯大夫曰子姑俟之於時師重進渠逺跳順者撫逆者𠞰丙子春我師整旅討逆阿睦爾撒納竄去其黨並就𠞰撫伊犁復定先是喀爾喀有青滚雜卜者􅘀狡僉回之駻獟也以收都爾伯特四部時曽賈其牛羊用賜新撫乃藉以煽惑衆喀爾喀且欲私通阿逆之醜虜青滚雜卜本喀爾喀台吉恩封郡王從征密㫖令將軍等計擒阿逆時青滚雜卜實漏其信復自軍營逃回遊牧蠱衆撤卡甘心從賦為我參贊大臣納木扎爾執送京師得正顯戮阿逆既竄罪人斯得喀爾喀衆以休以息然彼時將帥之臣追阿逆於哈薩克為其所賣同時準噶爾宰桑之在役者皆習為盜而慣軍詐者也見而輕之時阿逆竄跡哈薩克方以譎計緩師而將軍達爾黨阿不審先機競爾按兵待獻坐失事㑹既罷役則相率為亂欲復其舊制而恥為我臣是和起被欺於闢展兆惠戰出於濟爾哈朗之所因也厄魯特宰桑等從征哈薩克者既心輕將帥所為思逞亂階將軍和起方往追巴雅爾至闢展為逆􅉰莽噶里克厄魯特呢嗎等設計遣散駝馬倉卒被害而將軍兆惠自濟爾哈朗力戰得出賊勢復戢碩儒曰吁是蓋禍結兵連吾不知何日之息肩矣爾其重整四甄夾攻兩路阿逆復自哈薩克竄歸適遇我師又倉黃而遁去蓋自是哈薩克亦面內歸化欲助我以擒阿逆而阿逆乃隻身入俄羅斯境窮極伏冥誅之故也哈薩克以素稔阿逆反覆且畏懷中朝威德奉表來歸請以擒賊自效逆勢益蹙僅以殘喙投俄羅斯斃焉遣侍郎三泰驗實以聞豺狼不可以犬豕畜鴟梟不可以雞鴨育是反覆喜亂之徒再存之再不知感且殘賦為奸焉是惟翦刈灰滅之而已更不可以仁義化遷乃欲姑息了事者又以為不殺降人夫不殺降人可留降人之馬而與之足力以受其愚則大不可滿福之遇難以及助二􅉰酋與我抗衡皆此沙拉斯嗎唬斯二鄂拓之所搆禍也丁丑春復命將軍成衮扎卜參贊舒赫德等由朱爾都斯路進伊犁將軍兆惠參贊富德等由額林哈必爾罕路進塔本集賽而成衮扎卜等遇克勒特烏魯特沙拉斯嗎唬斯等鄂拓克皆撫降其衆不取其馬駝大軍過而賊皆反去乃遣都統滿福領偏師追勦沙拉斯嗎唬斯二鄂拓賊人詭持軍門劄自稱已就降撫並云前驅除道以待滿福行次哈拉和落竟以墮計捐軀至庫車之稽績實僨轅於逍遙更將申律旗鼓一新遂長驅直入而功垂成於崇朝先是大和卓木既還故部乃阿逆之叛小和卓木孤恩助惡及興師問罪圍庫車城而小和卓木來援身竄入城自投羅網雅爾哈善縱賊失機遂致飬癰貽患黑水之守主客衆寡之勢雖愚者亦知其漂搖以三千餘人敵數萬衆而搜穴得米掘井得泉賊銃著木取鉛丸數無萬反以擊賊無不中賊之酋豪於是兩軍相合賊乃遁逃及窮追異域駐旅馳檄獻馘稱臣遂成耆定之功髙戊寅冬將軍兆惠直薄葉爾竒木道逺馬疲被遮固守時經三月深溝髙壘賊不敢侵且屢獲神應而夏前調兵在道副將軍富德得以檄促赴援又參贊大臣阿里衮解馬適至內外夾擊軍威大振至己卯夏酋懼六師繼進棄城逺遁入拔達山界尋以追兵壓境其汗素爾坦沙聞風歸化殺賊函首以獻回部悉平西陲永定臻成大夫乃進春秋碩儒而詔之曰兩大部落不為不强周二萬餘里不為不廣五年成功不為不速前歌後舞不為不祥子徒見始事之秋選愞畏葸者之騰口是所謂人然亦然人否亦否者也且師旅征伐之於國猶雷霆霜雪之於天非霜雪則萬彚煩囂之氣不蕩滌非雷霆則四時湮鬱之氣不鬯宣非師旅征伐則梗我王化者無以讋伏懲創不敢抗干是以詰戎揚烈益當厪於重熙纍洽之年也子獨不見達瓦齊之懵懵乎達瓦齊獻俘後赦不誅且優賜王爵以善終設云事慎首禍禮不納叛是儼然以外夷弒君者為敵國豈不甹我君哉碩儒曰豈謂是哉陽舒隂慘生民大情離憂合歡品物同性絶者不可復屬死者不可復生損兵折將無補功成大夫曰吁子所謂執迷而不悟者矣成大事者不顧小謀圖大全者寧辭小害示應於近者逺有可察託驗於顯者微或可槩且子亦知損兵折將之由乎彼或內怯於心外受人詒決機不審遲疑擲埴而自貽伊悔豈主人之罪哉若夫虎臣羆士折衝宣力馬超囊足姚期攝幘渴賞捐軀實不乏人而一聞如是者午夜為之酸心舉案為之忘食雖刻木結蒲無以加兹而且賞延後昆太常紀績如子所云則漢祖唐宗撥亂草創之初寧無一人結纓死綏者哉禮記聽磬聲則思又何以云乎故非沉幾不足以圖功非果斷不足以定業彼其狼狽相顧濳包禍謀者以螳蜋之斧禦隆車之轍不自笇量何異葦苕之鸋鴂是以王師屢入霆奮席捲如舉炎火而焫飛蓬覆湯泉而沃白雪子何不度以全局待以嵗月而為是無稽之說哉碩儒曰若僕者乃隙中觀鬥井裏窺天以今日應機底績論之何妨再遲數年愧矣服矣豁然悚然大夫曰未也子姑聽之夫食椹懷音非納叛臣奬䠞優遇欲集其勳阿逆初降時備陳賊中情形請兵甚力即推誠奬任令副北路將軍以行時或有以厚遇新附竊議者密敕周防先示戚親時命固倫額駙色布騰巴爾珠爾與阿睦爾撒納偕行密諭察其動定雖非豫存逆億而逆賊狡獪故智未嘗不在意計中也操刀必割所戒逡巡阿逆既以未饜所望在伊犁時居常不衣賜服及用私印行軍檄踪跡頗露不逞屢敕將軍班第參贊鄂容安相機擒勦而因循寡斷阿逆得以入覲為詞乘隙生變子云應機亦非至論三隙可乘未興大軍或又以為乘人之釁不知䇿妄多爾濟那木扎爾年幼昏暴此一隙也喇嘛達爾扎篡奪又一隙也達瓦齊復篡奪之又一隙也彼時皆未興兵詳見西師詩加征增算何曽於民凡有水旱無不恤賑運輸給價防其蝕侵甘肅嵗賦豫免庚辰兩部永靖並及其鄰哈薩布露梟瞷文身無不內屬慕義歸仁鴻庸爰建千古未聞若子者所謂菽麥未辨安足以知我信天主人哉信天主人乃召大夫碩儒而告之曰若二子者所謂楚既失之齊亦未為得也夫順天者昌逆天者亡故粵宛猶不逆時氣而奉若者豈可恃力而誇張且屢危而屢夷愈變而愈康鉦鼓一動遂定二方鑿空二萬餘里蕆事五載已央使畏難而中輟未必不致禍而受殃浮議者方且謂老成之言臧也在易師之上六曰大君有命復之上六曰迷復有眚今得以利用禦寇由頥有慶是不亦大幸乎夫獲此幸者宜思何以獲此幸於昊蒼方將矜矜惴惴凛凛皇皇隕越是懼奚暇計之二子之短長也哉說創業守成難易說唐太宗與廷臣較創業守成孰難時房喬魏徴各以所見對太宗皆見其難獨岑文本則曰創撥亂之業其功既難守已成之基其道不易踵其論者率無軒輊於其間蓋以難即不易不易即難也而余則以為不然夫難與不易豈可同日而語哉今有二人焉甲則飢乙則不飽不飽者縱不果腹堪遲待焉而飢者一再不食將餒而僵矣以是喻難與不易其輕重不可立見耶或曰難亦不易也不易亦難也今必强為低昂是視死與不生為二也其可乎余曰是正所以為二也蓋不生者雖不得生而其實尚未至死其死者又安可復生乎以是喻難與不易其輕重不又可立見耶難與不易之說明則岑文本所云撥亂難守成不易之說余又以為不然蓋創業固難矣然以守成較之但可謂之不易而守成則實難耳何則創業之主救焚拯溺危然後安其難可謂至矣然於制度紀綱時有未暇留俟後人未為不可守成者遺大投艱單心繼序苟無以光前烈啓後圖斯凛然有不終畝之憂是創業者未竟之難亦守成者分內之難也所繫不愈重乎哉世之治産者或致億或致萬或致千百無不可也子若孫持其業者增之可耳少有所損於其間人將訾之然則嗣先王之基者不待失道失衆始為慙負前人但使式廓之版圖或有侵削垂裕之成憲或有廢弛是即無以覲耿光而揚大烈昔舜之稱禹曰克勤於邦克儉於家不自滿假君天下者勤儉尚已顧創業者櫛風沐雨不期勤而自無不勤篳路藍縷不期儉而自無不儉至於守成之主席豐履厚易至於驕驕則怠生焉故陳宵旰於太平之時言茅茨於玉陛之世輒厭而不納是非安不忘危存不忘亡鮮有不盛滿中之者以此思難則所以持難者可知矣况乎守成之責固開國之主與繼體之君所同一仔肩者也夏之王也以禹為創業以啓為守成殷之王也以湯為創業以太甲三宗為守成周之王也以文武為創業以成康為守成然禹湯文武未聞不自守其所創者以貽後昆也我不可不監于有夏我不可不監于有商我不可不監于有周嚮使為子孫者咸知守成之難雖三代至今存可也惟世少守成之主而後有創業之君出焉故豫之獨以難責夫守成者非敢忘創業者之難正以慰創業者之初心耳尚書五十八篇其涉創業者惟湯誓湯誥泰誓武成諸篇其自二典三謨以至太甲說命立政周官罔不於制治保邦為兢兢無逸一篇蔡傳謂周公所舉三宗皆繼世之君一篇中凡七更端深嗟永歎其意深逺周禮為致太平之書所言體國經野皆守成之事古人惟深見其難故言之不厭其詳也如文本之說將以繼世而有天下者坐享成功視開創為有間則古來守文令辟與蒙業而安者幾可等量而齊觀且使中才之主得所藉口謂昔之人既為其難我僅居其不易稍自暇逸亦無不可何用是汲汲為甚者溺於宴安弗克負荷棄厥基焉夫孰階之厲也故闡明其說如此既申警於後且藉以自朂焉古長城說木蘭自東至西延袤數百里中橫亘若城塹之狀依山連谷每四五十里輒有斥堠屯戍舊跡問之蒙古及索倫皆云此古長城也東始黑龍江西至於流沙類然夫蒙恬起臨洮而屬之遼東者今其城猶存乃去此數百里而南且東西又不若是其遼也則古長城者豈循蜚疏仡時所為者耶山海括地所未載於無意中得之荒略口傳而借余以垂其名豈非造物者之靈蹟久晦而必彰耶嘗苦載籍傳記浮夸多僞固不若芚蒙無文者世代相沿指實以道之無褒貶豫奪於其間也則秦之所築為擴邊乎為讓地乎於古無聞而今傳焉吾安知天下之似此未傳者當復幾何乎又安知今經豫傳而必保其後此之不又失傳乎或曰此非城也蓋天地自然生此所以限南北也夫天地既生此以限南北則秦之為長城益可笑矣臣汪由敦伏讀御製古長城說以化工之筆行自然之文深入顯出宇宙在手尋繹再四心目曠然在昔山經地志類出文人承傳沿襲掇拾諏採輒矜為創獲其經目覩記可覆按者百不一二數也况絶塞僻逺游躅所不至之地哉兹以六御所經名王部長旃裘之衆親履而指數之其核實為何如者且謂天地自然所生以限南北尤不易之論蓋嘗觀之百家之聚千室之邑率有岡巒川阜縈回環抱之勢至通都郡國則其厄塞阻要顯然為之疆域屏翰皆非人力所能為聖人者為之相其隂陽建城郭宫室規重門禦暴之制無非因其自然易曰地險山川邱陵也王公設險以守其國此物此志也蒙恬之為長城後人專罪其長惡𠞰民其垂死所嘆為絶地脈者一若設詞以自文而不知其拂天地之經而不因其自然彼固未嘗不自知之而深悔之也然非親歷而得其實其孰從而證之或疑塞外蕃部聨屬雖逐水草亦各有分地且此故元上都興州近境安知非昔之居是者殘壁故壘荒略失傳者耶是亦未可知然西北之瀚海流沙東北之窩集是非天地所限耶不寧惟是凡大川之達江海其入處必有砂橫亘若户閾然濬輒復淤是乃在水中又豈昔人所為耶觀此則天地所生自然者益信穿楊說國策稱楚養由基善射去楊葉百步而射之百發百中夫由基固善射者也觀其飲羽貫札實有出衆之能然稱人者當於事物情理之內苟其軼類絶倫而不至詭竒衒異令人可信斯足矣若穿楊云者第以文晦遂致義乖徒令後世疑由基未始有此匪曰褒之乃以貶之矣且楊葉寬以分計長以寸計於衆葉中指其一必將朱墨志之然後可夫此衆葉中之一葉立於二十步之外雖離婁之明不能辨也由基無離婁之明令其立於百步之外尚不能辨其誰何安能百發百中哉然則穿楊之說為僞乎曰何必僞嘗集善射之人而較之三十步命中者不能五十步五十步命中者不能百步百步命中者不能百五十步蓋物愈逺則視之愈小百步外之楊雖輪囷方丈視如三十步之樹侯耳况弓之彀也地逺則力微至指謂所指之處以為難何况中乎是則穿楊云者剸言一樹之葉而非一葉明矣我國家以弓矢雄中外支左屈右之技人盡能之然令立百步之外而穿楊百人中不能得一必其技果超羣者始能之而亦難保其百發百中也由基以荆楚三户之流能百步以穿楊斯已竒矣若必過為怪竒謬悠之談詫以貫其一葉則是世間情理必無之事愚者或驚為希有智者將信其必無夫表德紀實將以俟天下後世之智者乎抑其愚者乎或曰策士縱橫之論多屬子虛蘇厲之告白起亦取以相譬耳厲之言其誠其僞吾不知吾惟度之以理而并以已所能目所見者證之祝文告風神文維神大元中精輔翊生成以吹以噓百昌勾萌昔我皇考作是靈宇在紫禁巽方維歷有年所側聞曩時旱魃為灾彭怒漲天繼日以霾我考竭誠爰命宗枝曰帛曰牲祝史致詞遂蒙神庥駭飇為收禾黍沐澤乃亦有秋兹者雪旱於冬雨旱於春自春徂夏震雷無聞山川出雲慶散於風不惟其景乃惟其終曰豫不德小民何辜無麥無禾渺渺愁豫曰惟百神各有攸職功在蒼生乃廟而食用是陳詞祈神之佑致是咎徴皆豫之咎願敕飛廉速收其暴油雲以作雨師前導曰豫不誠明神之欺降罪於豫豫其敢辭屏息以待惟神之思社稷壇禱雨祝文臣聞人事失於下天變應於上兹亢暘之示警洵贊化之無能言念昨年秋霖缺而冬雪乏逮至今嵗春望霈而夏未霑歷四時之久矣嗟三農其如何常雩步禱弗蒙矜不敢再三之瀆羣祀親藩徒致籲益增宵旰之憂敬念右壇為祈報之所載稽祭義司土榖之精蠲吉䖍齊攄忱躬懇為民請命願代萬姓之灾責已惟誠奚啻六事之舛重舉答隂之典冀施甘雨之滂雲作雷隨毋俾箕伯侵軼犧成粢潔尚敷帝里休和殷佇神歆立沛祥􅉈大雩祝文臣承命嗣服今草四年無嵗不憂旱今嵗甚焉曩雖失麥可望大田兹尚未種赤地里千嗚呼其惠雨乎常雩步禱未蒙靈佑方社方澤均漠弗佑為期益迫嗟萬民誰救敢辭再瀆之罪用舉大雩以申前奏嗚呼其惠雨乎上天仁愛生物為心下民有罪定宥林林百辟卿士供職惟欽此罪不在官不在民實臣罪日深然上天豈以臣一身之故而令萬民受灾害之侵嗚呼其惠雨乎謹以臣躬代民請命昭昭在上言敢虛佞計窮力竭詞戅誠罄油雲沛雨居歆賜應嗚呼其惠雨乎御製文初集卷三
