body:
  text: 大學士臣梁國治侍郎臣董誥謹奏為恭編御製文二集告成敬請鐫刻以示訓行以彰美備事欽惟我皇上聖學淵富文徳日新以内聖外王之功致健行恒久之治文因見道化以觀成自癸未以前編刻御製文初集久已經緯輿盖照耀羲娥兹自甲申至乙已二十二年復得文四百一十一首臣等獲侍禁近每丹稿初成輙䝉宣示相與誦習􅊰貫適然若驚怳然若迷復涣然若釋思欲竭管蠡闚測萬一竊以為自虞夏商周秦漢唐宋之文所謂渾噩醇厚博大奥衍者各有専長論文者亦各有専主其言大而夸者莫如李漢序韓愈之文曰周情孔思是言也愈何足以當之周公之文多言治自易之爻辭書之立政周官無逸詩之豳風大雅諸什周禮之六官皆其文也不惟其文所以立法度宅宥宻萬世言治者之所守也孔子之文多言道自易之十翼春秋之褒貶論語之遺言禮記孝經諸賢之傳述皆其文也不惟其文所以昭天地系民物萬世言道者之所宗也臣等排次二集仰窺御製於祈天永命念祖由舊每篇之中三致意焉若廵典若水利若政經若武功若逺化凡出之為明堂之治即敷之為皇極之言若是者皆周公之文若經筵之論若剏發易書詩春秋之㣲言大義進退諸史之得失是正諸儒之舊聞慎守器失統之由闡褒忠討貳之義旁逮聲音文字名物象數以當名辨物正言㫁辭即小見大若是者皆孔子之文然後知李漢徒有是語舉千古之文皆足以當之至我大聖人而後周情孔思之得合而有真也然且漢之言曰情曰思者何也周公有其徳有其時而無其位孔子有其徳而無其位并無其時故其於文以是為聖人之情爾思爾我皇上坐而言即舉而措或綏猷建極經數十年夙夜劼毖而後為文以紀之或溥博淵泉萬㡬未起而先為文以發之藴為情思顯為事功盖兼徳位時三者而一之故合文與治與道三者而一之也臣等恭依初集體例排類為四十四巻繕錄進呈並請發下刋刻以傳布九有垂示萬世臣等曷勝欽服欣幸之至謹奏乾隆五十一年五月二十五日奏奉㫖如所請行欽此
