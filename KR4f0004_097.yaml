body:
  text: 欽惟太上皇帝天亶聰明生知濬哲本諸崇深之典學發為天地之大文富有日新髙厚悠久麗羲娥而共辰樞建極敷言以是彞是訓者琳笈巻充珠囊算積固己顯懿朗融久矣迺傳寳之三年申命臣等恭編御製文三集盖自御極之丙辰至癸未凡二十八年計文五百七篇為初集自甲申至乙巳凡二十二年計文四百十一篇為二集兹三集之成又得文一百九十四篇則自丙午至乙夘十年之作也此十年中天苞地符嶽輸川效以丕應元㑹運世之昌期光昭漸被變諧之盛軌實大衍成數之後洎撓紀週甲之辰八徵耄念五位十成易之賁曰觀乎人文以化成天下其恒曰聖人久于其道而天下化成慶逢聖夀益髙聖治益淳聖功益巍聖文益煥藴之則居安資深而逢原發之則根茂膏沃而言藹斯更進於初二集者則有稱八旬之觴鐫十全之寳闡四得之論是為夀身夀世之文再蠲賦鏐普免漕粲下詔弛逋臨雍廣額是為恵民恵士之文勒臺嶠之石摩廓喀之崖安南歸降之圗緬甸効順之蹟是為耆功柔逺之文開國方略之序辟雍石經之編全藏譯經之弁言石鼓排章之音訓是為念祖述聖之文而其中介幠昄箌以億萬世莫與京之事為億萬世始一見之文者立儲之詔慎建之論繹孟氏與子之義衍禹謨執中之傳定時憲紀號之規却期頤歸政之請禕鑠哉聖父聖子際盛唐虞逺賢堯舜溯初集不立訓諭二門二集有諭而無訓而諸篇獨登三集者誠以其典綦重綦崇而其慶郅隆郅逺也臣等授簡編輯祇奉聖誨以文有運㑹辭尚體要自乙夘以前為天子之文丙辰以後為太上皇帝之文分年為限則例立而理益彰文之三集與詩之五集同義臣等跽聆心悅竊惟堯有典而堯之言多入舜典舜有典而舜之言多入禹謨上日受終元日受命不在放勲重華之紀盖言無窮而義各有當也方今聖齡望九葆神純固析理粹精訓政之餘又已積成巻軸天行健而不息日月得照而長新惟鼓舞忭祝於後之成集其數更未有艾云爾臣沈初臣彭元瑞臣金士松臣周興岱臣那彦成臣吳省蘭臣阮元拜手稽首恭跋
