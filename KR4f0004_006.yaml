body:
  text: 記萬夀山五百羅漢堂記調御丈夫作天人師世出世間示權變法以度衆生得其門而入其室者自小乘進至四果方得謂之羅漢故楞嚴經富樓那言我於佛前助佛轉輪因獅子吼成阿羅漢十六應真之號諸經皆有而大論則云五千羅漢其力最大金剛經須菩提言世尊我若作是念我得阿羅漢道世尊則不説須菩提是樂阿蘭那行者是知五千不為多十六不為少五百羅漢堂之作抑亦槩於是乎昔蘇東坡有薦誠禪院五百羅漢記其言曰僧應言將造五百羅漢於錢塘而載以歸夫羅漢何處不可造而必錢塘乎及辛未南巡至浙若雲林若淨慈無不有五百羅漢之堂乃知五百之名始自錢塘其來久矣歸而萬夀山之大報恩延夀寺適成寺之西有隙地因命築堂以肖錢塘第雲林淨慈皆五百列坐斯乃置山林溪澗宫殿其中俾步以入者後先左右與袈裟鉢錫之侣相周旋若夫行住坐卧不拘一律又非盡跏趺之死灰稿木已也於諸境界各取梵經所載以標其名而五百人者不復一一為之安名立字所為不即不離如是如是而已甲祇樹園者金剛經所云佛在舍衛國祇樹給孤獨園與大比邱等説法之所也以杖錫擔棕毛坐具者一執如意者一執卷軸者一肩杖履若達摩者一執經册者一矮而擕笻竹以行者一皆若欲入園門而往聽法然者門之內步崖側者一踞石坐者一立峯頂而向下窺者一峯回路轉而為獅子窟所為善獅子吼施無畏聲者是以手指雲徑似示人以路者一合十隻手而執靈夀杖者一拂而左鉢而右立於兩傍者二崖之巔抱膝而坐者一以手指地若咨啓者一搖手者一憩樹下者一澗旁嵌穴而露半身者捻數珠者回首顧者將前却者閉雙目者嗒然笑者倚杖坐者竪一指者手擎卷者坐撫膝者披經示者瞪目觀者手揮拂者俯流泉者顧而問者凡十五澗之彼岸荷禪杖飛行為撒手懸崕者一徐而步者負囊者走且顧者二人持一杖者嗅天花者振錫者為思想者凡八而獅子窟之事略畢乙過獅子窟則為須夜摩洞須夜摩者此云善時分也洞之內坐而手持桃者立而合掌者袖手者問訊者凡四見於巖之穴者三或捧腹或槃陀或撫石狀各别引雙手者一拄木杖者一􅌑瓏峯之內或見半身或見其首者二垂膝坐而磕睡者指經册若參究者捧香爐者笠而執拂者持經函者側而𢷾石坐者攑窣堵波者凡七河之中立而􅑷雙手者一立攬雙手於胸者一河之裔端坐持斫訖羅此云輪於胸前者一擲杖為龍飛去者一前而行後而附其臂者凡二又前而却視者一坐石窟者立其側者揶揄者凝目視者凡四舞鐃鈸者二坐而觀空者二洞之右為阿伽橋阿伽此云水也橋之北閉目而坐於巒岫間者一拱雙手而立者一執如意行者一搘隙棄羅此云錫杖行者一隱現而見於峯隙石旁若笑若戚若語若默者凡四抱膝坐而回睇者一雙拳手者一挈杖且扶及所扶者二合掌立者一按手仰視山腰者一俯而若答者二度橋而南扶智杖偏袒兩肩者一合掌者一托鍵􅀈者一坐嶺上挺右臂摘星者一振德杖者一持應器對語者二怒者喜者欠伸者垂膝者垂頭者凡五提鉢塞莫此云數珠者一步屧澗道者一傴僂者一振鐸者一轉而右坐阿樓那崖阿樓那者香華如日出前紅赤相云鉢中生青蓮花者一立其側者二崖之畔舉一指出乾闥城者一若指人以正路者一袒裼雙臂若擲拂子者一撫膝不語者一立而問者疑者對者是者非者服者不服者自思者凡八過此而為摩偷地矣丙經云三天有摩偷地在須彌四陲住於是而證四果曰須陀洹曰斯陀含曰阿那含曰阿羅漢者凡四參六波羅蜜曰布施曰精進曰持戒曰忍辱曰禪定曰智慧而各執一義者凡六參六種性曰習種曰長養曰性種曰不可壞曰道種曰正法而各執一義者凡六於六波羅蜜而不住者一於六種性而善離者一窈然而深處於摩訶窩者三摩訶有三義謂大多勝各持一義而究之出石洞立而若有遲者一坐而竪天龍指者一並肩行者二接武行者三揎拳作相撲者二立而觀者二背而弗觀者一共語者二以屈眴此云大細布拭背者一轉而為徙多橋西域記所云冷河者也立此岸而振九連環杖者一著僧伽梨而乘馬於河中者一牽者一向而頂禮於此岸者一右膝著地舉一手啓請者一彼岸卓立翠微者一趺而揓鉢多羅此云應器者一搖扇者戲獅子者揮麈尾者握蓮花者數阿唎吒迦此云數珠者支頤者凡六立水中壺盧上者一橋之右立水中石砥者一浴者二將浴者三浴罷者二持淨瓶者一雙手抖擻數珠者一見於叢樾間或肥或瘠或肥瘠適中者三嶤峯拔起而立於最髙處者一欹仄以下得稍平可立二人一老者一壯年者又緣而下地遂廣把花籃者戴箬笠者承貝葉者騎白象者凡四綿谷沿緣以進趨步徐步連步展步者亦四却望而俟之者二將為五體投地頂禮者一合掌為恭敬者三此則彌樓前或至或未至者彌樓者此云光明七金山法華談經之所因以天竺紫金光如來像供之樓之背峭壁千尋不可上下一石撑澗底而亘立干雲霄是則砥柱也已柱之旁一鬚者一不鬚者鬚者拍不鬚者肩而不鬚者枝月牙杖云丁岈然窪然尺寸千里迥不可窮宏不可概者曰兜率陀兜率陀者妙足之謂也宴坐而談四大者四曰地曰水曰火曰風遙向望而瞻禮者二促膝坐而談二白法者二曰慙曰愧獨坐而究無生者一以拂拂之者一展瞿修羅此云圖像而視之者二為食施五福相者五曰富曰夀曰顔澤曰多力曰身安參楞伽三種波羅蜜者三曰世間曰出世間曰世出世間參圓覺三無礙法界者三曰靜曰幻曰寂戊兜率陀之南則功德池八功德水出佛攝受經往而浴者凡十三執珊瑚者徒步者曳杖者走而却者擎壺盧中出蜃氣者疾足躡足蹀足舉足行者擁膝盤膝側膝捫膝憩者池彼岸為坻為嶼髙下相錯坐而撫雄獅者一促膝觀者一獨坐止觀者一立而證三種羅漢果者三曰慧解脫曰俱解脫曰無礙解脫戲子母虎者一揚拳欲搏之者一拒而止之者一坐池邊參華嚴六相者六若總相若别相若同相若異相若成相若壞相杖而將至溪邊者一伸左臂其長不可量而入水捉月者一坐其側觀者一橫溪則為信度橋所為菩薩化為龍王流出信度河者是橋之西坐而隻手持輪者一橋之東坐穹洞劈腹見佛相者一向而作禮者六讃之歎之悲之欣之敬之慕之情不一背而立者一洞之隂藉草坐石者四振衣者舉扇者閉目入定者擊擊子聒之者狀不一轉而南則為香巖步巖洞將出者一旃檀功德佛相在焉合掌作禮者一執經者執法供者執七寶如意者凡三嶔崎旁出坐深穴中者二若不知有佛者然其知之乎其不知之乎吾安得而知之已樹之名不可窮也有菩提有娑羅有尼拘律陀有多羅而賅之曰栴檀林輪囷蒙絡槎丫搖綴日照之為空色風拂之為空音偃息其間者則有晳者黑者赤者黃者白者面之色各殊嚬者顰者吁者聽者哂者呿者􅀈者面之狀各殊若是者凡十二自頂門出嬰兒者一入三摩提毒蟲魑魅擾之而不動者一將出洞門手持拂子絲覼覼下垂者一出林洞則須彌頂此云妙髙也未至頂而徘徊於翠嵁間者五若獰貌若嬉貌若善貌若不善貌若美貌立於頂之上者八若長身若短身若粗身若細身若壯身若弱身若偉身若孱身步蜿蜒石徑將往法華所謂善現城者六趻而行者䟓而行者䟛而行者䟰而行者蹻而行者䟻而行者立善現城當門而咍者一若曰此不易入云爾庚振衣干仭之岡若跣足者婆娑大樹之下若鈎膝者若深目者若癢耳者若哆口者獨立詭石之側若方面者侣武羊腸之徑若疏眉者若曲碌腰者若彈指者若碧眼者徘徊溪谷之幽若挺臂者若台背者若拳攣手者踟蹰碧岫之旁若隆鼻者結伴峭蒨之叢若剖胸者若露肘者若露齒者若宣舌者是皆得於金田及陀羅峯之間凡十八金田者布金之田而陀羅者即所云能持集種種善法云辛極神通之變而莫可究範者莫過於阿羅漢矣則有若自手劈面而復露一面者以手捧膝􅀈立而旋轉無窮者以手按膝作胎息導引法者噀鉢而興雲者揮手而生風者擎一樹而三千年開花三千年結子如西池蟠桃者怡而為春舒者笑而為夏長者怒而為秋落者戚而為冬藏者説如不説者不説如説者示如不示者不示如示者劈胸見佛端坐者躴躿而不覺其長者侏儒而不覺其短者臃腫而不覺其肥者端坐琢齒潄舌為化身坐忘法者四肢距地伸縮引氣為鹿戲法者頽形雕容而相好具足者伸一指而具空色二諦者伸二指而具非空非色一諦者微笑不言而具空色非空非色皆非諦者凡二十四皆聚於雞園得見如來最初成道如楞嚴憍陳那五比丘所云者壬仙人鹿野苑者辟支佛所住世尊亦於此成道遙向室羅筏而頂禮者一旅而進將受教者二騎鸞鳯行空而來受教者二室羅筏者世尊談華嚴之所林曰逝多園曰給孤獨大莊嚴重閣在焉梵天紫金光如來據七寶座而為説法一切菩薩天人八部之所圍繞不可量數自重閣夤緣而下繚而曲窈而深者曰耆闍崛山形如鷲亦名鷲嶺撞鐘者一鳴鼓者一擊木魚者一由山徑降而復升招手者一搖手者一揝手者一斂手者一展手者一揚手者一披蒙茸躋巑岏則見所謂舍利塔者扶攜行者二握手行者二拾級登者一欲登且止而悟眼之見色耳之聽聲鼻之嗅香舌之辨味身之知觸意之思法者六及登塔院繞塔而悟四種性智者四曰大圓鏡智曰平等性智曰妙觀察智曰成所作智塔之下峯益峭樹益密徑益險坐雲竇雙手拖眉至地者一著鬱多羅繒此云七條衣者一瘦骨立者一磬折者一盤曲出幽可達蜂臺癸佛説法四十九年未曽説一字而謂有所説法耶所説法不可得而謂有聽法及於法得度者耶而謂有西天震旦種種世界國土之分别耶蜂臺者吾知其為天竺世尊誦經之處乎吾知其為樊忱詩中所云者乎則有若參禪那者有若持戒律者有若演大論者有若譯經論者有若搖扇思者有若扶刺竭節此云杖思者有若默坐思者有若倚樹思者有若掇籃思者有若捧册思者有若􅀈石思者凡十一大溪橫其前野彴可步過顤顟其面者褦襶其身者詬噓其口者凡三皆若有所佇嶊崣閜砢裊窕沖融之間若有路若無路若可見若不可見而呮爾詬爾卓爾提爾攜爾介爾率爾莞爾啞爾騷騷爾灑灑爾狰狰爾涼涼爾悠悠爾若是者凡十四溪流益濶橋益長其名曰毗訶羅此云遊行處也橋之南參眼受色者耳受聲者鼻受香者舌受味者身受觸者意受法者凡六是受者非受者凡二能受者所受者凡二非能受者非所受者凡二絶嶺之上各露半身逺而魁而衎而者凡三石室之中攢簇而立粲然肅然漠然怡然凜然隤然者凡六極下牝穴窅隘以深寂若邈若者凡二隔岫顒若者一緣磴而上躍如坦如招如昂如迢如仙如軒如泊如侃如皤如如如者凡十一磴側峭壁之下墟其頂而凹凸其面者凡二一按雙手於腹若運氣然其一挺一臂向空而握一拳當胸前坐其旁而持結夏具者三一以淨瓶植珊瑚一以玻璃盤貯修陀此云天食其一展畫卷華嚴所云露山者在焉穿洞而出亦可達香巖洞之左立而持鐼子者一坐而結手印者一洞之右展雙手若取物者一執朵蓮者一杖頭繫壺盧畫卷雜物而執之者一執舍羅此云籌也者一據洞頂一手持摩尼珠而戲天龍者一飛流直下自龍口出即信度河源也其菩薩所化為龍王者乎盤桓㠍嶫之嵕若坐若立者八則究涅槃八味者也若常住若寂滅若不老若不死若清淨若靈通若不動若快樂紆繞而下得稍平立者四則咨賢首四事者也為理為事為事理為事事轉而又下立平石者二則思楞嚴二殊勝者也曰上合聖曰下合凡翹立澗邊以軍持此云澡瓶接懸泉者一以二鐵鉢接者一既接水而灌潄罷者一嗅優鉢曇花者一彈指者一持七寶輪者一􅀈坐者一别為一旅騎麒麟而行者一前後擁護供養者凡八持淨水者澡水者香者花者燈者塗香者食者樂器者復有六曰執鏡者曰執琵琶者曰執炷香者曰執蒲闍尼此云正食者曰執震越此云衣者曰執如意寶者復有二曰供養作供養觀者曰供養不作供養觀者五百羅漢之迹于是乎畢闡御製文初集卷六
