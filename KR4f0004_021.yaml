  text: 欽定四庫全書御製文初集卷二十一
  hash: sha256:425fec1fef8c10c6f85087bf20cb4ad4a1d2353fafc31db9d331041a64589e23
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_021-1a, image: WYG1301/WYG1301-0179c.png}
body:
  text: 碑文重修𢎞仁寺碑文𢎞仁寺者康熙四年奉敕所建移供鷲峯寺栴檀瑞相於斯我皇祖再世如來現轉輪王相以金仙象教流傳資翊治化因而逺溯靈踪俾人天廣利迄今垂及百年丹雘之煥者日以剝龍象之獰者日以削敬惟開嵗為聖慈七旬大慶今嵗又朕五十誕辰思所以繩寶構祝鴻禧者爰以孟陬之吉出內府帑重加修葺閲八月訖工展禮為讃有瑞紀庚辰重輪奐竒從辛卯肇胚胎之句蓋志實也朕惟君子體仁則為𢎞世尊闡仁則為能彼弟子之未轃師學者尚不識何為𢎞而何為能有似與仁背馳宜乎儒者之闢為異端矣我皇祖內外一如本末共貫六十一年深仁厚澤普被蒼生則其𢎞也為何如抑其能也為何如此寺之建豈徒以人天福德供養世尊已哉經言世尊具三十二相八十種好然若以色見聲求即毗首天匠徒勞畫炭無有似處設諸淨信一舉念皈依亦得即覩百千萬億化身所謂即心即佛不可言同何况云異而彼優填王橅笵瑞相譬如日光月光本來圓滿一切衆生扣槃捫籥今將與操熒爝者求羲馭曷若引金燧以睎陽將與挹涓勺者擬望舒曷若懸方諸而衍潤矧爾時授記真容威德自在乃者勝幡法鼓莊嚴端好非謂與諸天寶網種種供養無二無别以是助宣政教永闡慈仁即現無量夀身而為說法則猶我皇祖上為宗社延庥下為蒼黎祈祐之志而瑞相因緣詳著皇祖御銘者此不復書重修涿州石橋記徒杠輿梁月令所著則橋之設與夫毁而修乃王政所必先而非浮屠氏漫舉因果利人所可同曰語也涿州為畿南要郡萬方玉帛諸生計偕以及官吏商賈攜孥負販之徒往來所必經郡城北胡良拒馬二河滙焉明時各就其上建橋顧北方之水流無定橋建而河徙橋乃跨陸河則仍資舟楫與無橋同庚辰春允地方大吏請於舊橋南移建九空新橋仍築石隄下為涵洞草有二屬之城北門其舊橋之頺廢者葺之改為涵洞十八以泄夏秋霖潦通新舊橋隄長二百丈有竒至八月而工成大吏請為碑記以記嵗月其辭曰涿之城誕拱皇京胡良拒馬自西東注厥初跨河橋營其所不合橋短而隄長北方水流無恆及齧隄隄敗橋反陸置往來之人嗟行潦以徂征墮者扶之堙者疏之俾水有就下之路而不與隄爭斯王政之一端以就舊材亦不大費司農或曰宫閫布施或曰璫豎威福緬遺蹟猶致恨夫前明君何為者乃若是焉宜彼社之屋吾於是凛殷鑒而兢兢重修涿州佑濟龍神祠碑文庚辰春命大吏重修涿州永濟橋橋東南故有龍神祠嵗久並就陊剝飭工斤而新之越辛巳西巡旋蹕省視落成則行者利往來居者時蓄泄善夫人事集而神貺臻數典庶無闕也議禮家謂龍之祀自史記朝那龍湫始顯其文不秩於三代殊不知經訓所載山川能興雲雨致神物以為民芘者民必祈而報之近至一坊一庸尸祝索饗惟恐後矧涿郡地列望緊當九畿之㑹而胡良拒馬二水渟涵噴欱用衍潤我神臯其必有以默相之也固宜或者疑有明已來水泛而橋圮匪一昔矣神將奚妥焉諗之曰神依無在無不在曩者祠與橋雖廢而神之精爽固無不在也今者橋與祠成而必曰在是是猶未知神之無不在也然橋若祠煥然一新顧弗致精乎其所式憑以蘄所為佑且濟者其可乎哉夫修廢舉墜不可以人事未集而一聽諸神其又可以神妥於斯而不益懋夫人事耶則輿梁為政之句足深長思已繼自今若蓄泄在居者往來在行者尚其善保厥成以永孚於神庥而可哉橋記緣起已詳茲因祠石請文書以揭之如此實勝寺後記嵗己巳建實勝寺於西山之下其緣起已見前記不復綴今賴昊天垂佑宗社篤祜平準噶爾回部拓地伊犁喀什噶爾葉爾羌一帶二萬餘里其外羈縻附屬如哈薩克布魯特安集延拔達克山等部不與焉凡乘機決計信賞必罰奉天討罪藉衆集事諸大端具見太學之碑開惑之論西師之詩亦不復綴茲記者寺左近健鋭雲梯營實居之營之兵是役效力為尤多故不可不旌其前勞以勸夫後進先是呼爾璊霍斯庫魯克之戰我師以少敵衆而賊據險伺隙故凡行陳參伍彌縫之際略覺旗靡鼓餒處得健鋭兵數十立其間則屹如堅城整而復進遂乃斬將搴旗用成殊績蓋索倫兵馬射雖精以之馳突乘勝破陳無不如志而知方守節終不如我滿洲世僕其心定其氣盛夫人出萬死一生為國宣力而為之君者事成而忽若忘獨何心哉朕豈為之哉自己已設此營而辛巳即收其效不啻樹樹十年之得報是潛移默運有若天授豫亦有所不知其然而然者而敬繩祖武丕揚國烈瞿瞿惴惴惟盛滿之是懼猶初志也是用重勒碑記之且肖喀喇烏蘇襲迫之狀築堡其側嵗時幸香山閲健鋭兵用寓尹鐸晉陽之意不亦可乎重修朝陽門石道碑文直省漕艘估舶帆檣數千里經天津北上至潞城而止是為外河引玉泉之水由京師滙大通橋東流以達於潞用以轉運者是為內河然外闊而內狹故自太倉官廩兵糈暨鄽市南北百貨或舍舟遵陸徑趨朝陽門以舟緩而車便南北之用有不同也其間輪蹄絡織曳挽邪許歡聲徹昕夕不休故常以四十里之道備水陸要衝而舊制初未甃石往往積涔成窪經潦作濘行者弗便焉雍正七年我皇考世宗憲皇帝命工始建石道規方定則垂利數十載於今顧神皋理大物博民用不舍質之貞者日以刓理之緻者日以泐不亟治將隳前功是懼爰咨將作都料以聞朕曰毋擳帑毋狹材帑擳是重糜帑也材狹是重廢材也時大臣董斯役者搘橢為平易礫以整物備用良無坎無垤而石之斥舊佐新者什不存四五矣計延袤六千六百四十四丈有竒支户部金二十八萬四千九百有竒經始於乾隆丁丑十月越庚辰七月落成所司請為之記朕惟古王者成梁除道若司空循邑遂師巡野諸令匪僅謂國家體制宜爾蓋深以息人勞珍物力使天下潜消夫湫隘耗憊之氣無歉於書之所云㑹歸易之所云往來受福者而天下肩摩轂擊轉相忘乎熙熙攘攘不過如庭斯墄如徑斯甓焉耳則王道之大也豈煦煦然起一夫之蹶與一車之柅若子輿氏所譏濟人為悅而已哉是地為國東門既食貨交㑹而修廢舉墜又立政之常經故於鐫碣無侈詞惟申言重修端委所由且作亭覆之俾勿壞重修廣寧門石道碑文廣寧門在京城西南隅為外郛七門之一然天下十八省所􅘗以朝覲謁選計偕工賈來者莫不遵路於兹又當國家戎索益恢悉荒徼别部數萬里輻湊內屬其北路則徑達安定德勝諸門而迤西接軔聫鑣率由緣邊腹地㑹涿郡渡盧溝而來則是門為中外孔道尤不與他等乾隆丁丑十月敕所司重修石道以利行者至庚辰七月乃竣於是上遡我皇考命工創建時逮今三十年矣茲役也因舊址修築者一千九百八十四丈有竒又新道增築者四百七十七丈有竒凡支帑金十三萬八千一百有竒崇先制詔後來不可以無紀也系之辭曰閶闔之門天垣所直揭以杓攜言歸有極聖者法象度地經涂詎惟同軌在闥孰隃眷時垓埏日就星拱巍闕中亘層闉外鞏西南坤位利用安貞魚鑰曙開蕩蕩由庚總總撙銜班班叱馭嘉此康馗敘其轚互赤畿望緊放乎澨陬冠帶畢徠䫜面纒頭記功伊始嵗届辛亥譬塗塈茨逮茲丗載石不可轉亦劌而刳冬皸沍凍夏齧潢汙大井之村盧溝是屬救之鑿之為經緣督萬指蕆事帖妥弗欹廣則由舊而修益之其修幾何匪作繄述其益幾何居五之一里鼓中頓堠亭前遮胥爾逖聽若轃厥家豫臨天下道在無頗敻哉壤歌何有於我重修萬夀寺碑文天純祐我函夏既屢豐錫羡俾恬養引年越大濛疏逖曶爽胥昄章耕牧躋之春臺是用大介蓋貞元嘉㑹保泰者兢兢乎千載一時而我聖母皇太后七袠慶辰適逢斯盛朕將率億兆臣庶祝嘏延洪以聖節崇唘經壇莫萬夀寺宜爰敕內府丹堊即工視乾隆辛未例弗懈益䖍事載蕆系之辭曰維茲寺修建端委暨諸天無量夀義著在前文者無俟繁稱矣曷記乎則敬頌我聖母愛民延禧之懿訓以質言臚近事可乎嚮者東南耆耉顒迓安輿樹頷翹趾者相屬偶㑹偏隅賙賑朕上體慈懷載稽撰日閲丙子而丁丑閲辛巳而壬午逮取道展禮清涼則祥霙甘􅉈馧馞繽紛九㝢奄觀倍稔揆諸古德所云覺照佛心福利仁化何以加茲若乃西人叩關請師亟於救焚拯溺朕荷天祖鴻庥寅承敢後每旁午擘畫禀命璇闈備仰我聖母始事之勤劬與成功之愷豫迄今流沙數萬里悉古烏孫大宛勃律于闐諸部不啻偃修羅之弓㦸而亭以慧雲沃以法雨同登極樂國土者我聖母夀世無量之心一我佛夀世無量之心而朕額手虞抃即願以無量萬世夀夀我聖母者庶於是焉徵實可記也夫遂繹其㫖而為之讃我聞法王法不受轉輪轉調御大能仁安車濟五衍以兹夀者相超劫長圓滿一萬二萬年迦葉那含闡至六萬七萬毗舍拘留展次佛及初佛積萬乃無算同聲祝聖慈金口宣元典夀世而夀身真實義斯踐佛云四部洲玉燭平潦旱化日諸衆生各各得飽暖是名恆春國有穀無不戩佛云彼羅剎種種方所限銷兵窮荒徼蒲海一清晏是名大願船淨域歸重趼聖慈皆佛慈是諦參密顯歡喜證人天三呼善哉善楊橋河神祠碑記乾隆辛巳七月豫中秋霖大至河溢祥符黑缸口急命侍郎裘曰修馳傳勘視俄而㑹城驟漲侵淫遂潰楊橋隄奪溜賈魯河河臣張師載撫臣常鈞連牘以狀聞且惶恐謝守土不謹朕曰爾勿棘爾分蒞有界限惟豫艱是圖寧為全河計乃者燕齊迤北並積潦滙中州而下勢必張所過事乘障不已將釀南河患艱以上遊之治治今爾疆陂堰縱不戒未越宿而徐城暴長之水乃陡落庸渠非不幸之幸然爾時賈魯方演漾潁夀注洪澤湖日夜挾沙奔流淮病黃愈病是不亟治上遊而下遊又烏可以不治治於時大學士劉統勳協辦大學士尚書公兆惠就行在授指往董厥事而撫臣常鈞等方議盡塞南岸旁決之口徐興築楊橋隄咈哉旁口益堵即大溜益湍此何異醫者不察標本欲悉壅閼諸孔竅妄覬調停腹潰哉咨爾胡寶瑔爾早習豫河要害其再調撫兹土汔贊有成咨爾髙晉爾簡率江南練工辨卒繕畚挶茭楗先後佽助之爰廣代賑集厥力增薪值贍厥財其急衝之不能猝迥者親為按圖審度㸃筆為志令鑿引渠釃河溜重臣覆奏至亦不謀吻合夫然後衆志齊而儲偫周工作以次就理斯役也漫口初止六十丈汕蟄至二百餘丈視前此南河之朱家海張家馬路蓋三倍而贏自蠲除賑給暨别件營輯外計大工専支帑金三十萬有竒經始於九月一日合龍於十一月一日為時甫兩匝月統勳等以程績罔稽導引時兼有返風之應宜建河神祠并請頒額勒碑用申昭報朕念洪河故四瀆之一而歷代遷徙不常雖神禹無由善其後豈非勢弛於日下補救者必以爭上遊為得䇿歟自豫河決而復合其嵗三吳沮洳之壤黃流順軌鼛鼓弗聞以彼潔此差數瞭然可覩匪神貺默臻曷以至是若朕宵旰勤求之苦衷具見志實詩中並命鐫諸石示我守臣體之有永毋隳後效毋棄前勞是為記御製文初集卷二十一
