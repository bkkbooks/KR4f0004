front:
  text: 欽定四庫全書御製文二集卷十八
  hash: sha256:0c63962600b675ac20374e058d4f5f2562f89377a5f3f8ea696cf433a852b10f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_052-1a, image: WYG1301/WYG1301-0393a.png}
body:
  text: 題辭題董其昌自書告身嘗閲張照跋董其昌書姜寶告身帖有云思翁有自書三世制誥今在上海葉忠節家其在海寧陳宗伯家者贋鼎云云乃取石渠續藏是卷其昌自書告身觀之卷中收藏圖記凡十一王鴻緒者五勵宗萬者四其二不知誰氏而總無葉應榴陳元龍印記或者照所見者其三世告身而此乃止其父母及已與妻之告身為異乎然豫思之制誥非美事也虞廷咨禹命棄契臯陶尚矣即周室君陳君牙諸誥皆君誨臣之言無所褒貶於其間也自唐始有知制誥浸淫至於宋而其權益重夫權者上之所􅋵以治四海者也太阿不可倒持雖文字為空言而邪正榮辱是非所繫綦重未可忽焉我國家一掃厯代陋習誠不可及文武各官制誥惟視其品之大小為髙下不過明訓數語足以彰其前而朂其後而止無所謂黃麻金匱登臺持筆之事也夫人之賢愚邪正當以其政蹟觀之教之數語而即身體力行以成賢臣者鮮矣使視草者為正人尚可若其為僉人其能訓人以正有是理乎即如宋之蘇軾不得不謂之正人其責吕惠卿之詞韙矣既而語人曰三十年作劊子今日方剮得一有肉漢見陳長方步里客談吁是何言耶不幾以九重之絲綸為一身之報復乎且為人子者孰不欲榮其親今付榮辱之權於知制誥入者主之出者奴之受榮者必感焉受辱者必憾焉即使正人君子知制誥尚不能無此弊而况苞苴諛墓有所不免門户於是乎别朋黨於是乎興清流之禍將不可底止尚空言而收實害鮮彰疸之益成聲氣之私為國家者亦何賴有此乎故曰我國家一掃厯代陋習為不可及也大禹治水圖題語大禹治水圖廣二尺七寸有十分寸之五髙四尺九寸上下左右邊幅都似截去不全故無作者及收藏家姓名印識按宣和畫譜有晉顧愷之夏禹治水圖郭若虛圖畫見聞志有隋展子䖍禹治水及五代朱簡章禹治水圖又王世貞弇州續集有宋趙伯駒大禹治水圖而疑以為非千里所能辦似周文矩云云夫既為割裂之餘無姓氏可考則其為顧為展為周為朱為趙不能以臆度徒觀其結搆筆法則內府本有愷之洛神圖子䖍春逰圖卷皆較此幅為更古簡章蹟未見迄不可證伯駒所作後赤壁圖較此幅筆實綿弱誠有如弇州所云則此幅或即文矩所為未可知也且與內府所弆文矩聖蹟圖筆意亦有相倣者至於三峽砥柱之雄壯㷊林烈峰之綢繆架木撐鐵拽杵撞石推之𢶍之析之撬之剔之鬟之釃之奠之衆役並力各極其致而大禹則免收祇坐躬持斧鑿共勞竭誠之意如可想見虛空金神遂有驅鬼怪轟雷掣電以為之隂助其工用奏地平天成之績信有非趙宋以下畫工所能摹擬者嗚呼微禹其魚功垂萬祀雖無圖畫人孰不思則况仰威儀而識胼胝䝉敷奠而緬隨刋起敬起慕又當何如豈藉考姓氏辨古今以為企景者哉題東林列傳東林講學始以正而終以亂馴致與明偕亡陳鼎叙為列傳其序曰梁溪諸君子講學東林天下從之皆尚氣節重名義及國亡帝后殉節效在五十餘年之後亡國有光于明為烈嗚呼是邪說也不可以不闢君人者以顯承祖業致太平安民物為有光耳不能守祖業徒以國亡殉節為有光有是理乎即如東林諸人始未嘗不以正其後聲勢趨附互相標榜糅雜混淆小人得而乘之以起黨獄是開門揖盜者本東林之自取迄明亡而後已何取乎帝后殉節為有光哉鼎此邪說不惟為明君良臣之罪人亦實為正人君子之罪人夫正人君子豈有不願其國祚之久長民物之安泰者哉且厯代名臣莫如臯䕫稷契伊望蕭曹房杜王魏韓范富歐是皆非講學者也而其致君澤民實蹟古今爭誦之漢室黨人已開標榜之漸激而致禍即宋之周程張朱其闡洙泗心傳固不為無功然論其致君澤民之實蹟如向之所舉若而人者安能並肩齊趨乎而蜀洛之門户朱陸之冰炭已啓相攻之漸蓋有講學必有標榜有標榜必有門户尾大不掉必致國破家亡漢宋明其殷監也夫至國破家亡黎民受其塗炭者不可勝數而方以死節殉難者多為有光于古收講學之效則是效也徒成其為害真所謂國家將亡必有妖孽而已陳鼎此書獨以裒集著述本末粲然觀者或可資論世之助以為萬世之戒故録而存之而其邪說背理則不可不揭正以詔為政者故題之簡端題楊維楨鐵崖樂府楊維楨於元仕不顯而不肯仕於明似為全人矣而其補集中有大明鐃歌鼓吹曲非刺故國頌美新朝非真全人之所為與劇秦美新何以異耶豫命為二臣傳於錢謙益之既仕本朝隂為詩文詆毁常惡其進退無據然謙益之所毁者本朝猶稍有懷故國之心若維楨則直毁故國較謙益為甚夫文章者所以明天理敘人倫而已舍是二者雖逞其才華適足為害不如不識字之為愈也若曰懼明祖之强留而故為此遜詞以自全乃明哲保身之計豫謂明祖直末强留耳若與之官將亦必受之何也以其忘故國而知之危素跋而贊之蓋亦同病相憐曲為之解耳因著此論並命録其集前亦所以教萬世之為人臣者題明神宗本紀偶閲神宗本紀見其為皇太子時方六嵗穆宗嘗馳馬宫中諫曰陛下天下主獨騎而騁寧無銜橛憂穆宗喜下馬勞之云云不禁廢書而歎而笑以為必無其事蓋笑作史者之無識歎明之亡已兆其幾於此也夫宫中非馳馬地六嵗童其見斷不及是而亦不能為此通文數語也必乳媪中涓信口說項作史者遂紀耳食炫以為竒夫豈幼而徇齊之比哉且洪武以馬上定天下永樂亦以馬上取天下神宗獨非其後嗣乎忘祖宗之勤勞諫父皇之習馬為穆宗者當撻而訓之又何至下馬而勞之哉吾故以為必無其事如果有之則明之亡本亡於神宗之惰政而先幾已早兆於其六嵗之時矣通鑑綱目續編內發明廣義題辭甚矣周禮等發明廣義之為誣而謬也大一統而斥偏安內中華而外夷狄此天地之常經古今之通義是故夷狄而中華則中華之中華而夷狄則夷狄之此亦春秋之法司馬光朱子所為亟亟也兹發明廣義乃専以貴中華賤夷狄為事貴中華賤夷狄猶可也至於吹毛求疵顛倒是非則不可而矢口謾罵誣白為黑又豈溫良君子之所為哉嘗考遼金元三朝惟金世宗元世祖二帝最為賢明史冊具在美不勝書而廣義則曰世宗固一世之賢君雖中華令主何以過之然羣臣不能將順其美以底大順要亦天厭其德故使之有君無臣僅成一代之小康耳夫賢如金世宗而又責其無臣且謂天厭厥德金世宗有何德之可厭豈非中外之見芥蒂於胸腹好議論不樂成人之美乎又如金禁女真人學南人衣飾一條金主謂從官曰女真舊風最為純直汝等當習學之不可忘此正敦尚節儉率由舊章發明乃云用夏變夷固為美事奚必禁而絶之特書曰禁深貶之也夫以遵舊制不忘本者而貶之尤為拘迂紕繆且自古變祖宗之章服制度者不數世而國勢衰弱元魏遼元已事可鑒彰彰甚明秉筆者獨不觀前史之事乎最其甚者䝉古額哷布格自歸於上都䝉古主釋不治其黨布拉噶等伏誅一事額哷布格世祖介弟也受命鎮和林乃敢搆逆興兵僭稱尊號其罪可勝誅乎元世祖以諸王乃太祖之裔不忍加戮惟誅布拉噶等此世祖之大度曲貸其死可謂韙矣乃發明謂世祖致令其弟僭立和林則所以處之未盡其道布格之悖未如象之頑而世祖處弟之友豈不有愧於舜乎云云其言尤為背謬夫象之傲不過不順於家所為䦧牆之釁耳額哷布格則儼然稱帝謀危宗社也其罪之輕重大小不待智者明之而猶謂不如象之頑乎益不然矣且春秋之義善善欲長從未有以堯舜責人者若象於舜升庸之後如額哷布格之所為舜亦未必復封之有庳而乃以此責元世祖非惟不公且不明矣又如書太子珍戩卒一條下載中庶子巴拜以其子阿巴齊入見諭之以毋讀䝉古書須習漢人文字初閲之以為太子珍戩令人毋讀䝉古書是忘本矣因重檢閲元史本傳則云中庶子巴拜以其子阿巴齊入見諭令入學巴拜即令其子入䝉古學逾年又見太子問讀何書其子以䝉古書對太子曰我命汝學漢人文字耳云云蓋珍戩之意以䝉古人習䝉古書自其家傳舊學如今滿洲人之於清文童而習之不須入學始能也命學漢人文字則欲其兼通經史知古今事耳乃綱目删改本文且云諭之以毋讀䝉古書則是毫釐千里而使後之讀綱目者竟以珍戩為忘本有是理乎總之是書之成乃成化時商輅等修輯其後周禮續為發明張時泰又續為廣義附刻於後吹毛求疵顛倒是非甚至矢口謾罵誣白為黑其所關於世道人心甚大昨既命皇子及軍機大臣量為刪去其破口者以符孔子春秋之義兹復舉其尤紕謬者數端用作題辭仍録是書卷端以存是非曲直之公以昭天命人心之正俾覽古者得以折衷焉雖然千萬年後寧無如周禮輩其人者之顛倒是非誣白為黑者乎吾於是知懼矣然而悠悠之口其亦不必懼而已矣題張照書白居易琵琶行卷張照此書出入乎董米而有過乎董米所謂寓端莊於流麗者矣至其識語則向於上書房已聞蔣廷錫蔡珽輩論之是早有此言非出於照也然府倅入民船飲酒誠有玷官方登之白簡固宜有以見唐政之弛而我國朝之政肅此不可謂煞風景也豈照之流猶以居易之事為是而今之法網過密乎即證以周官六計弊吏亦未嘗以此為應為也題之卷首用敕官針題張廷玉三老五更議戊戌年為三老五更說亦既闢其蹖駁而勒之新建辟雍之碑矣今秋駐避暑山莊檢續書之四庫全書內文頴集中有三老五更議之篇而挂漏其名因命檢文津閣之書乃知為張廷玉所撰憬然憶之事在乾隆戊午為草七月既閲諸禮畢舉之時於視學之前曽向軍機大臣等談及三老五更而咨其可行與否彼時鄂爾泰依違其間張廷玉則斷以為不可於是奏此議而遂寢其說蓋鄂爾泰固好虛譽而近於驕者張廷玉則善自謹而近於懦者且二人彼時皆可望登此席者也以今觀之則廷玉之議為當設爾時勉强行之必有如廷玉所謂資後人之議者矣若朕戊戌年之所為三老五更說戊戌去戊午厯四十年其事早已忘之蓋戊午朕方草八嵗而戊戌則六十有八此亦足驗四十年間學問識見之效而年少時猶未免有好名泥古之意至今則灑然矣兹觀廷玉之議與朕之說不約而同樹之前旌焉因命並勒辟雍碑以識已學之淺深及弗掩人之善也夫廷玉既有此卓識何未見及朕之必不動於浮言遵皇考遺㫖令彼配享太廟而臨休致歸里時乃有求入廟之請此所謂老衰而戒之在得乎朕又以廷玉之戒為戒且為廷玉惜之御製文二集卷十八
