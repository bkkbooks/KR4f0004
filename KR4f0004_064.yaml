body:
  text: 碑文七佛塔碑記七佛偈為禪門開宗了義然散見於梵帙而非出於一經近自西藏班禪額爾徳尼喇嘛處貢有七佛畨軸凡佛之父母眷屬名字悉備問之僧人皆不知其所以諮之章嘉國師乃於畨經漢經所謂長阿含經賢刼經降生次第經及佛源廣解内一一考得其源葢第一毘婆尸佛種刹利姓拘利若父槃頭母槃頭婆提居槃頭婆提城神足二一名騫荼次名提舎侍者名無憂子名方膺第二尸棄佛種刹利姓拘利若父明相母光曜居光相城神足二一名阿毘浮次名婆婆侍者名名行子名無量第三毘舎浮佛種刹利姓拘利若父善燈母穪戒居無喻城神足二一名扶遊次名鬱多摩侍者名寂滅子名妙覺以上三佛為過去莊嚴刼佛第四拘留孫佛種婆羅門姓迦葉父禮徳母善枝居安和城神足二一名薩尼次名毘樓侍者名善覺子名上勝第五拘納含牟尼佛種婆羅門姓迦葉父大徳母善勝居清淨城神足二一名舒槃那次名鬱多樓侍者名安和子名導師第六迦葉佛種婆羅門姓迦葉父梵徳母財主居婆羅柰城神足二一名提舎次名婆羅婆侍者名善友子名進軍第七釋迦牟尼佛種刹利姓瞿曇父淨飯王母大清淨居舎衞城神足二一名舎利弗次名目揵連侍者名阿難子名羅㬋羅以上四佛為現在賢刼佛夫一佛即恒河沙數佛而恒河沙數佛即一佛父母眷屬皆如是何有於分别然真如海内不受一塵萬行門中不捨一法既已明是因緣用泐諸貞石建七佛塔以為供養頌曰過去莊嚴刼現在賢刼是未來為星宿於一彈指頃佛説三即一過去三非三現在四豈四分别乃云七而實即一佛七佛各有偈普説一義諦一毫端之上能現寳王刹示兹滿月相聚七為一塔如法華所云非同亦非異佛語非綺語初學亦能曉聲聞與圓覺猶然未能行稽首吉祥雲永䕃娑婆界救度諸衆生各各精進證熱河文廟碑記丙申夏駐蹕熱河避暑山莊曹秀先以禮部尚書扈從幾暇召見談及時政秀先云臣春卿也在職言職以為此處宜興學校以造就士朕曰俞哉亦其時矣於是乎有設學之㫖於是乎有加額之恩學校既設則文廟亟宜建乃命相地伐材卜吉鳩工宫牆泮水殿廡禮樂一如制越二年己亥夏朕以來巡親釋奠而落成之夫熱河固自古闗塞以外荒畧之區也雖金遼有興州之稱然旋舉旋廢建置沿革率不可考而况有皋比之傳絃誦之聲哉是以我皇祖每年避暑於此亦不過名之曰山莊故有聚民至萬家之句蓋於禮樂之興未免存待以百年之意今則耕桑日以闢户口日以滋以幅員計之不啻數千里而版藉或逾十萬焉此而無學校以牖民迪俗豈宣祖猷揚聖化之道且今西域烏魯木齊等處率置郡縣立學校以此較彼為尤近矣則兹文廟之建於時於地胥不可緩亦不待人之請而後行稱之曰熱河文廟者今雖升之曰承徳府従其朔紀其因也昔蘇軾作韓愈碑記云公之神之在天下如水之在地中予謂韓愈因文見道我夫子體道垂文韓愈之所因者即夫子之所垂而見猶待乎行體則其本也且水在地中尚需求而得之我夫子乃天之經地之義山之峙海之淵無日不在人人心目之中範圍曲成而不遺豈待穿鑿求之而後得然則木鐸之音孰謂不可覺斯民於闗外荒畧之區也哉須彌福夀之廟碑記黄教之興以宗喀巴為鼻祖有二大弟子一曰根敦珠巴八轉世而為今達賴喇嘛一曰凱珠布格埒克巴勒藏六轉世而為今班禪額爾徳尼喇嘛是二喇嘛葢遞相為師以闡宗風而興梵教則今之班禪額爾徳尼喇嘛實達賴喇嘛之師也達賴喇嘛居布達拉譯華言為普陀宗乗之廟班禪額爾徳尼居扎什倫布譯華言為須彌福夀之廟是前衛後藏所由分也辛夘年曾建普陀宗乗之廟於避暑山莊之北山以祝釐也亦以土爾扈特歸順也今之建須彌福夀之廟於普陀宗乗之左岡者則以班禪額爾徳尼欲來覲而肖其所居以資安禪且遵我世祖章皇帝建北黄寺於京師以居第五達賴喇嘛之例也然昔達賴喇嘛之來實以敦請兹班禪額爾徳尼之來覲則不因招致而出於喇嘛之自願來京以觀華夏之振興黄教撫育羣生海宇清宴民物敉寧之景象適值朕七旬初度之年並為慶祝之舉也夫朕七旬不欲為慶賀繁文已預頒諭㫖而兹喇嘛之來則有不宜阻者蓋國家百餘年昇平累洽中外一家自昔達賴喇嘛之來至今亦百餘年矣且昔為開創之初如喀爾喀厄魯特尚有梗化者今則重熙休和喀爾喀久為世臣厄魯特亦無不歸順而一聞班禪額爾徳呢之來其歡欣舞蹈欲執役供奉出於至誠有不待教而然者則此須彌福夀之廟之建上以揚歴代致治保邦之謨烈下以答列藩傾心向化之悃忱庸可已乎既為記復作讚言印度既迥遥佛教亦式微梵僧捨天竺多臨衛藏地自唐代已然是為法源處一譯猶云近三乗無舛訛宗乗向東昌誠如佛所記衛藏雖徼外實在震旦中達賴及班禪宗喀巴髙弟前後燃智燈三車之綱領真文與滿字於是溯軌躅䝉古衆林林莫不傾心向皈依三寳門神道易設教兹聞班禪來如嬰兒遇母觀化闡宗風誠為吉祥事布達拉既建倫布不可少擇向興工作亦以不日成都綱及寢室一如後藏式金瓦映日輝玉幢揚風舞自成動靜偈朗標色空喻以是善因緣資無礙法喜祝嘏猶其小所欣象教宏舉似西域居無來亦無去上人演法輪蠢蠢普超度佐我無為治雨順與風調衆生登夀世慧炬永光明合十作讃言初非為一巳如懸大圓鏡徧照於十方而鏡本無心迴向亦如是重修正定隆興大佛寺記世間一切具體相者有成必有壞有新必有故自金身以至衆生概不出此然而成其壞則壞為成新其故則故為新所謂如來能轉物衆生被物轉是則重修建立之義所由起而常樂我淨之真身本不繫於成壞新故幻為之體相也正定隆興大佛寺始自隋開皇間至於今蓋千一百餘年其間成壞新故不可屈指數紀其近者則自康熙癸未皇祖聖祖仁皇帝重修之後逮兹又七十餘年矣日月推遷風雨剝落有所不免地方大吏屢以請且庚子嵗為朕七旬初度之年於是命吏發帑一律普新之沿其漏者正其向隆興寺為正定古刹自隋迄今千餘年戊戌嵗重發帑命周元理等督修其舊制正殿與寺門中路面向不對盖以寺前街路逼仄以致徑庭錯遌亦不知始自何代兹特令更正規制較前閎整矣阽其危者焕其觀無勞百姓不日而成越明年辛丑命行春而落成之並攜章嘉國師行慶讃禮西天震旦二萬里而遥兹古寺之重新得眞僧之宣教斯能調御慧力不期而然如來轉物豈不信乎所謂常樂我淨之眞身不繫於成壞新故幻為之體相益可以明其理而以重修建立為功徳者實是不知第一義諦者矣是為記國學新建辟雍圜水工成碑記名者實之賔實者名之主為學之方應務其實以蘄循其名不可炫其名以致亡其實興學之源綦要於國學國學者天子之學也天子之學曰辟雍諸侯之學曰泮水北京之國學自元歴明以至本朝蓋五百餘年矣有國學而無辟雍名實或不相稱焉雖有建議請復以乏水而格部議至今未復癸夘春始有復建之諭甲辰冬乃觀新工之竣將於乙巳仲春行釋奠禮遂臨雍以落成焉夫北京為天下都會教化所先也大典缺如非所以崇儒重道古與稽而今與居也雖乏水然有不改之井汲以綆而用之無窮亦在人為之而已於是石之鱗次見圜斯池水之鏡澄見明斯漪殿之據中見隆其榱橋之通行見接其基上庠下庠雖難考二典之制而東序西序總不出三代之規則是工之舉也又予知過論所謂於不可巳者仍酌行之之意而物給價工給值原非勞民動衆之為若夫三老五更之説予以為括於養老化俗之儀而非天子臨雍所必應並行而不遺者蓋弗見於詩書乃特出杜氏通典之私耳且予向有三老五更之説已明闢其謬兹不複綴乎辭雖然予更有所懼於是舉者夫是舉豈非復古興學之懿有何懼而予懼之者恐後之人執予復古之説於一切衣冠典禮皆欲效漢人之制則予為得罪祖宗之人匪教伊虐甚慮不宜也予之子孫臣庶體予此心於可復古者復之其不可復者斷不可泥古而復之夫徒慕復古之虚名而致有忘祖宗之實失非下愚而何予不為也予敬以是告子孫以保我皇清萬年之基也蘭陽睢寧新隄南岸河神廟碑記中州河神廟之建於北岸者二曰武陟曰蘭陽建於南岸者一曰中牟皆以禦災捍患有功徳於民而崇祀者也兹蘭陽睢寧之間新隄南岸復建河神廟者何乾隆四十九年秋八月河決睢州下汛二堡命大學士阿桂馳往會同兩江總督薩載南北總河李奉翰蘭第錫河南巡撫何裕城五臣會勘詳議築塞并選帶南河熟練河工員弁赴豫俾資調遣嗣據奏請改築南隄并開挑引河自蘭陽至商邱長一百四十餘里朕按圖審勢復命向北展寛引河因即取土築隄為一舉兩得之計阿桂等遵㫖督辧冬十一月引河成初五日啟放掣溜通暢至十四日夜東壩陡向西蟄直抵西壩底埽遂乗勢鑲壓至十七日金門旋即斷流天然合龍全河大溜盡歸引河是役也天庥神佑與庚子年儀封之天然合龍正同在事文武員弁以及逺近士民觀者無不踴躍歡忭額手稱慶以為非河神嘉佑不及此也夫神之靈盈天地間臨之在上質之在旁昭布森列無所往而不在而人之依於神將以邀福致敬冀遂其瞻仰祈籲之私者則非特建崇祠無以昭靈貺達羣誠爰命阿桂等度地於蘭陽睢寧新隄南岸適中之處鳩工飭材鼎新廟貌就南岸者所以别於北岸也蘭陽睢寧之間者所以别於武陟中牟也當睢州下汛之初決方以漂毁田廬為亟且以稽工曠日為虞葢自始事以迄成功予之晝夜齋心黙禱無可言喻凡賑助撫䘏和雇加價不靳千百萬帑金以拯濟我災黎而在事諸臣之竭誠襄事與我民之奔走役作子來恐後實亦不遺餘力是以昨冬合龍誌事詩云天然忽報合龍信神佑應憐衆力殫葢不敢謂予之盡心於民而實神之篤眷於予也且豫省頻嵗不登自昨冬睢工合龍後今嵗夏秋來連獲甘􅉈晚禾補種秋苗長發轉歉為豐是神之篤眷於予實神之保乂吾民也繼自今亦惟䖍鞏孜孜永祈安瀾之錫以與吾民邀福於無疆耳廟工成遂書緣起以勒於石御製文二集巻三十
