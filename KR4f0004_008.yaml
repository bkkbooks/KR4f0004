body:
  text: 序執中成憲序惟我皇考法天行健一日萬幾宵旰不遑猶以其間簡命儒臣採録經史子集所載自古帝王元德顯功訏謨大訓以及名臣奏章先儒語類深切治道者次第進呈皇考親為刪定命曰執中成憲始於雍正六年仲春成於十三年仲夏未及刋布而我皇考遽遐棄臣民豫小子煢煢在疚未之前見也嗣統既月勉從諸臣請躬涖庶政始發而讀之既卒業然後知聖心聖學實與堯舜孔子同揆而汲汲於是編則専以啓迪我後人示之標準也間嘗殫思大學一書竊見仲尼祖述堯舜之實義焉其所謂眀德者即虞書所謂道心也所謂眀眀德者懼其為人心所蔽也所謂格物致知者嚴辨人心道心之界以盡萬事萬物之理即書所謂惟精也所謂正心誠意者力袪人心之雜以致道心之純即書所謂惟一也所謂修身齊家治國平天下而止於至善者即書所謂允執厥中也然極乎執中之量則惟堯舜為無歉而中之散見於萬事萬物者則不惟三代聖王即秦漢以後仁厚英哲之君下及中主亦必有一事二事之合焉不獨臯夔益契伊傅周召孔曾思孟即近代羣儒文士亦必有一話一言之合焉故中庸曰舜好問而好察邇言執其兩端用其中于民蓋中之理無事無物而不具亦無人而不知是即眀德之根於性而不息者而惟舜能察之惟舜能執之惟舜能用之故善與人同合德於天地我皇考編定是書自二帝三王之事古聖賢之言下逮羣儒文士之可節取者兼收而不遺用是道也皇考之治天下無一事不審其則無一物能匿其情即書所謂惟精大學所謂物格而知至無一時之不敬無一念之不誠即書所謂惟一大學所謂心正而意誠故凡施於政教者或豫或奪或寬或嚴或抑揚遲速之稍有不同而無不立乎大中可為民極即書所謂執中大學所謂身修家齊國治天下平而眀德新民皆止於至善也而所以立綱陳紀更化善治其大者皆斷自聖心而細者亦博採於衆議有其人不能皆入於善而一言之中必不廢焉即中庸所謂好問好察執兩用中也然我皇考聰眀睿智夙具於聖性而養成於聖學者已數十年故皇考之惟精乃不思而得皇考之惟一乃不勉而中皇考之執中而化成天下乃從容中道無為而成豈復有資於是書所以親為刪定者正恐在後之侗懵然無見於執中立極之道爰示之以成憲也豈惟豫小子奉以終身惟日兢兢無敢踰越哉世世子孫苟能服膺勿失而溯其淵源則於堯舜孔子之道一以貫之矣豈惟君人者舍是無以建其有極以消天下之偏陂反側哉凡百有位果能是訓是行則上之可輔理成化以著勳猷而下亦可以謹身而寡過於以謨眀弼諧共臻喜起眀良之盛無難矣日知薈説序日知薈説者取豫嚮日日課所為文刪擇編次合而録之爰定之以名也豫稟承庭訓懋學書齋留連往復於六經四子之書求其義藴精微旁搜諸史通鑑考定得失區眀法戒以至儒先緒論詞苑菁華莫不遍覽雖究心探索饜飫其中然考之古聖賢躬行實踐之學蓋恧焉而未逮自十有四嵗學屬文至於今又一紀矣其間日課詩論雜文未嘗少輟積成卷帙瑕瑜各半踐阼以來萬幾待理豈復得如曩時専志篤學日與良師友敬業樂羣於翰墨之場哉紬繹舊聞念茲弗釋因取其精去其疵録其正棄其偏合二百六十則釐為四卷而舉凡道德性命之旨學問政治之要經傳之淵源古今之事迹莫不略見梗槩夫日知之説出自子夏繼以無忘所能必所知者日新不失而賡續以極於髙眀乃為學問窽要若豫嚮日所得尚非空言而無濟實用則今班朝蒞政之間豈不足自考其知行合一與否以發抒聞見遜敏敦修乎太祖髙皇帝聖訓序朕惟神聖首出濟世覺民立德立功立言三者統而有之蓋仁義中正之極定於厥躬布諸紀綱為巍巍之帝業頒諸誥令成洋洋之聖謨文教彰眀覃被海宇炳乎如日月之照臨窮天地亘古今而莫不仰焉於戲盛哉洪惟太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業髙皇帝體肖二儀量包六合應期受命肇建丕基叶雲雷以展經綸法四時而宣教化六師順動九有輸誠拯生民於塗炭之中轉宇宙為平成之運當是時締造維新規模盡善武緯文經萬物咸覩亦既布在方策傳信億年矣乃若心通造化道綜百王吐辭成經發聲為律闡精一之旨明至善之宗論聖學則以正心修身為先辨君道則以求賢聽言為要昭晰乎上天降監之原無念不將之以敬畏申警乎君臣契合之誼每事必體之以公誠以至班朝治軍眀刑制用靡不敷陳至理約而該復而不厭信乎有德者必有言也我聖祖嘗命儒臣編緝聖訓四卷類聚條分燦然眀備朕紹膺統緒追契徽猷口誦心維匪伊朝夕仰見義藴之淵閎典章之畫一庶政之周詳直與帝典周官同其廣大顧金匱石室之藏廷臣無由得見是用敬加剞劂宣示萬方俾我子孫臣庶率而循之世世罔斁奉之蒞政可以致治保邦準以淑躬可以警心寡過蓋一時之制作而萬古之世道人心胥賴焉非甚盛德其孰能及此乎謹序太祖髙皇帝實録序粵稽自古帝王乘時建極膺天命而佑下民豐功駿烈垂諸史乘炳炳麟麟是以紀言紀事必詳且核焉况於聖人首出開物成務經緯天地奠麗河山智勇沉深謨猷訏逺布為法則著為章程將使後世子孫繼繼承承遵循罔軼詎不重歟洪惟太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業髙皇帝以聖神文武之姿受天眷命誕興東土爰總義旅遹求厥寧九國連兵相向一怒而討平之眀人四路來攻亦剋日盡殱於境外師出有名光眀俊偉威愛並立近服逺懷當是時羣部來歸英豪響附奮迹遼瀋之間而號令行於萬里帝業之興何其神也由是天人協應建國紀元修眀庶政教育羣倫創國書分旗制申軍令定禮儀經營締造之際旰食宵衣不遑暇逸故乃綱舉目張傳之億萬年而不可易心法治法與二帝三王有同揆也太宗文皇帝繼天登阼命儒臣敬輯實録規模略備聖祖仁皇帝復加搜考修纂成書尊藏內府並貯史宬惟是山川疆土以及臣僚名氏前後間有異同清漢之文或簡或繁未經畫一我皇考世宗憲皇帝懼有舛訛特開史館重加校訂按日進呈親為閲定朕纘承丕緒仰體前徽用復潔誠披覽卷帙如舊繕録一新祇祇乎覘開國之鴻模昭垂統之大業書曰監于先王成憲其永無愆詩曰昭兹來許繩其祖武於以率攸行而保天祜其敢忘紹庭上下之思哉謹序太宗文皇帝聖訓序聖人之情因辭以見易曰修辭立其誠所以居業也蓋以通天下之志以成天下之務本乎至誠施諸命令無意於辭而理臻其極歷觀堯舜禹湯文武之世典謨訓誥釐然具存後人奉之為經列在學宫為載籍首矧夫運際開天功存繼志制作侔造化教澤被生民天下之文章孰有大於此者乎欽惟太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝英姿挺出聖武布昭大智如神淵衷若谷及登寶位疆宇日增厚祿以養賢勤身而率下恩威所及大畏小懷政教所孚逺來近説皇哉何化理之神也至若敷陳治道誨諭臣民不尚虛文惟崇實體謂行善所以事天而逺利始能服衆闡伊尹一德之訓稱曾參三省之言以勸農講武為立國之大經以考古讀書為服官之要務自立綱陳紀以逮服飾器物之間或即事以宣猷或因時而定制洪纎咸備張弛攸宜蓋察理精故見之也逺更事久故慮之也詳用能承藉丕基佑啓聖哲是誠億萬年繼往開來之極軌也順治中嘗因記注舊文纂修聖訓一書未竟厥緒聖祖仁皇帝特命儒臣詳加編輯事以類分凡二十有八言以條舉凡一百一十有一彚為六卷體要著眀朕在宫中蒙皇考恩勤教育定省之時備聞祖訓嗣膺大統志切纘承晨夕披陳尋繹仰見心符道要語中機宜旨藴閎深函蓋天地文辭昭晰彪炳日星垂裕後昆永昭法守用是勒為成書敬授剞劂頒示中外書曰聖謨洋洋嘉言孔彰又曰聖有謨訓眀徴定保我子孫臣庶其誦習遵循永敬承於世世哉謹序太宗文皇帝實録序洪惟太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝徇齊敦敏廣大寬仁早從太祖贊襄大業才德冠世中外歸忱逮乎嗣統之年敦宗睦族戢衆安民御將行師開疆拓土軍威震疊而以不嗜殺為心武功赫濯而以善養人為務存朝鮮故土字蒙古遺氓眀政不綱天人共憤且舊與我國有隙於是應天順人率師直抵燕京聲罪致討猶念彼為中國功垂成而弗取天性仁厚大度豁如固已超越百王包涵六合矣至若建官分職推賢舉能愷澤龎鴻刑章平允設制科以崇文教開言路以重忠良隆規巨典巍乎煥乎皆一統之大猷百世之良矩也世祖章皇帝輯為實録六十有五卷聖祖仁皇帝命儒臣搜討訂正繕録成編尊藏惟慎皇考世宗憲皇帝孝切崇先敬加披覽以前後字句之未盡畫一也復令臣工校對而躬為閲定焉朕仰承遺志莊誦繹思用竣厥事緬惟帝典商盤前王之懿範也天球琬琰宗廟之重器也昔之君珍為世寶奉以無墜矧夫典章所紀謨烈所垂造邦制治之圖啓泰貽安之要煌煌簡册世昭法守何止帝典商盤天球琬琰之寶重也耶謹序世祖章皇帝聖訓序古昔帝王應運而興開物成務有君天下之規模凝命敕幾有師天下之典則故言出而成經教思所被率土歸仁歷觀往代紀載肇乎二典彞倫敘於九疇罔不播為成憲炳若日星簡籍具存可考而知也欽惟我世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝秉岐嶷首出之資建永清大定之業沖齡踐阼統一車書義問達乎梯航仁聲遍於塗巷盛德大業富有日新自唐虞三代以來史册所傳罕有及者至若洋洋聖謨包涵萬有大之關倫教綱常之重而閭閻之日用飲食所弗遺精之在身心性命之微而宫府之制度典章所必飭巨細畢該綱維盡善要惟本精一執中之奧藴以成經世服物之鴻謨誕告多方嚴眀愷摯訓敇有位深切周詳意皆出乎至誠理尤協於克一用以光大前徽開萬年有道之長敻乎與天地為昭矣我聖祖仁皇帝躬承先訓命儒臣分類編輯計一百一十有三條彚成聖訓六卷以傳久逺我皇考念切紹衣宫庭宵旰追述先猷朕從溫凊之時聞知維謹嗣膺大統志在覲揚朝夕披陳具見開國經綸超越前古詒謀燕翼垂裕無窮是用敬為剞劂昭示臣民俾海隅出日之逺咸覩光華寶之如圖球信之如蓍蔡是訓是行欽承勿替庶幾道德一而風俗同唐之政要宋之寶訓夫豈可同年而語者哉謹序世祖章皇帝實録序我國家受天眷命統一萬邦日月所照血氣之屬咸切尊親亦惟是小心翼翼之忱有以通帝載而昭來許故乃朝廷宫府之政罔不參稽古訓溥協人心制定於一時而慮周乎萬世重熙纍洽至於今茲海隅蒼生穆然想見盛德信乎開國之規模詒謀逺而流澤長也洪惟世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝神靈天亶沖齡踐阼紹我太祖太宗丕緒懋建大猷勤思上理當是時流賊已入京師眀祚已成板蕩遂因明將吳三桂之請命將士入關定燕京殄羣寇挈斯民於水火之中而登之衽席之上爰主郊禋式頒正朔自古得天下之正未之有比也政令彰施百度具舉滌前代之煩苛沛興朝之膏澤治化翔洽達乎四表由是制禮作樂敷教眀刑虛己以尚賢推誠以納誨斟酌損益秉至中而時措之著為謨訓載在簡編皇哉唐哉子孫世世守之以成久安長治之業於是乎在康熙十一年聖祖仁皇帝特開史館纂輯實録凡一百四十六卷雍正十二年皇考世宗憲皇帝恭閲全書復令儒臣重加校訂事未竣而龍馭上賔朕哀戚之餘飭令陸續進呈敬加披覽嗚呼覩世祖聖祖經綸之巨典則知創業之甚難念世宗繼述之深衷則知守成之不易方策可傳者紀綱之成軌夙夜罔間者兢業之一心敢弗繹思而敬承之以迓上天無疆之休則是書也誠致治之權輿萬年之鴻寶矣謹序御製文初集卷八
