front:
  text: 欽定四庫全書御製文二集卷之十三
  hash: sha256:caca1350359bb7b51d5a70a1fbdbb2e5741ae66fc0f47f3dc1a2f7d1b8099305
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_047-1a, image: WYG1301/WYG1301-0365a.png}
body:
  text: 記文淵閣記國家荷天庥承佑命重熙纍洽同軌同文所謂禮樂百年而後興此其時也而禮樂之興必藉崇儒重道以會其條貫儒與道匪文莫闡故豫搜四庫之書非徒博右文之名蓋如張子所云為天地立心為生民立道為往聖繼絶學為萬世開太平胥於是乎繫故乃下明詔敕嶽牧訪名山搜祕簡并出天祿之舊藏以及世家之獨弆於是浩如淵海委若邱山而總名之曰四庫全書蓋以古今數千年宇宙數萬里其間所有之書雖夥都不出四庫之目也乃掄大臣俾總司命翰林使分校雖督繼晷之勤仍豫十年之暇夫不勤則玩日愒時有所不免而不豫之暇則又恐欲速而或失之踈略魯魚亥豕因是而生語有之凡事豫則立書之成雖尚需時日而貯書之所則不可不宿構宫禁之中不得其地爰於文華殿後建文淵閣以待之文淵閣之名始於勝朝今則無其處而內閣大學士之兼殿閣銜者尚存其名兹以貯書所為名實適相副而文華殿居其前乃歲時經筵講學所必臨於以枕經葄史鏡已牖民後世子孫奉以為家法則豫所以繼繩祖考覺世之殷心化育民物返古之深意庶在是乎庶在是乎閣之制一如范氏天一閣而其詳則見於御園文源閣之記文源閣記藏書之家頗多而必以浙之范氏天一閣為巨擘因輯四庫全書命取其閣式以構庋貯之所既圖以來乃知其閣建自明嘉靖末至於今二百一十餘年雖時修葺而未曽改移閣之間數及梁柱寬長尺寸皆有精義蓋取天一生水地六成之之意於是就御園中隙地一倣其製為之名之曰文源閣而為之記曰文之時義大矣哉以經世以載道以立言以牖民自開闢以至於今所謂天之未喪斯文也以水喻之則經者文之源也史者文之流也子者文之支也集者文之派也派也支也流也皆自源而分集也子也史也皆自經而出故吾於貯四庫之書首重者經而以水喻文願溯其源且數典天一之閣亦庶幾不大相徑庭也夫文津閣記輯四庫全書分為三類一刋刻一抄録一祗存書目其刋刻者以便於行世用武英殿聚珍版刷印但邊幅頗小爰依永樂大典之例概行抄録正本備天祿之儲都為四部一以貯紫禁之文淵閣一以貯盛京興王之地一以貯御園之文源閣一以貯避暑山莊則此文津閣之所以作也蓋淵即源也有源必有流支派於是乎分焉欲從支派尋流以溯其源必先在乎知其津弗知津則躡迷途而失正路斷港之譏有弗免矣故析木之次麗乎天龍門之名標乎地是知津為要也而劉協所云道象之妙非言不津津言之妙非學不傳者實亦先得我心之所同然夫山莊居塞外伊古荒略之地而今則閭閻日富禮樂日興益兹文津之閣貯以四庫之書地靈境勝較之司馬遷所云名山之藏豈啻霄壤之分也哉快雪堂記淳化閣帖之重刋以內府向有賜畢士安之初刻而世鮮原本用以永其夀而公後來臨池習書者也爾時並有以覔快雪堂原刻為請者其人為裘曰修置而弗許蓋以淳化所收頗富其內不過缺一快雪帖耳餘則倍蓰勝之至彼墨迹則早收入石渠且刻之三希堂法帖矣一之為甚其可再乎乃今楊景素以快雪石刻來獻且云快雪堂石刻本故臣馮銓所集其子孫不能守鬻於閩之黃氏兹黃氏復不能守臣曽督閩知其事故貰之以獻欲却之則事已成且舉關翰墨非貢諛逢惡之為因受之並築堂為廊以嵌石版從淳化軒之例也石版長短寬窄不一且有木刻三版因命內府摹淳化之善手重撫其迹而泐之石俾長短寬窄較若畫一其木版仍置堂中以記數典列觀兩廊秩如彬如弗啻黃氏所未營而亦馮氏所未逮矣夫快雪堂之建因石刻非因雪然循名責實三冬未逢時玉蒿目焦心又何有於悅目娛志而閲古則增滄桑之歎問今益凛好惡之戒凡吾所為記多出於志愧而不出於志喜也河復記河之復也以隄合龍隄之合龍也以天佑神助然天之佑廣大精微不可以一二事舉亦不可以一二日期神之助則有可以顯示昭靈事舉日期者此義已見於丁酉陶莊河神廟之文而今復有顯示昭靈聲應底績之貺是不可以不記儀封決口之築移金門開引河厯以年餘訖未成功亦無别法於舊冬仍為大開引河圖掣溜歸壑之為及今春二月阿桂等始有十一日兩壩自行合龍隨填壓茭土不逾數刻金門立見斷流俟十分穩固即馳報合龍之奏未數日而合龍之奏果至然所謂自行合龍之語不解何謂兹阿桂以善後大局已定來行在復命細問之乃稱二月十一日儀封漫口未合龍以前金門尚濶三丈水深十一丈餘至午時忽報順黃南壩沈墜驚往勘視則南壩掃根全勢向北移走陡與北壩接連時金門水面深止一二丈爾時見機可乘隨將合龍秸料趕緊填壓不三四刻已見斷流而掃底亦無翻花過溜若非南壩向北沈墜移走則三丈口門下掃合龍非三兩日不能完竣今機緣巧合因敗為功以兩載之勤劬收功片刻實由至誠感召天和河神默相非人力所能到更非在事諸臣所敢望云云自前歲河決後豫無日不叩天禱神冀速合龍以佑蒼生昨初十日渡黃於香棚及陶莊河神廟更益竭誠默籲而十一日遂有兩壩自行合龍黃流順歸故道之事此豈非天佑神助前記所謂適逢其時者歟豫非敢自詡誠之能感若謂能感則自前嵗至今二月初十以前豈誠之未至耶而神之顯示昭靈實不可以不志或謂陶莊在江南儀封在河南云一則不可兩處各有廟云二則此未必能及彼夫一佛而為千百億化身姑不必論即蘇東坡論韓昌黎所謂如水在地中無往不在昌黎不過文宗尚能如是而福國佑民之正神固當論其在此在彼是一是二耶及蒙庇蔭合答庥祉豫惟虔鞏孜孜日甚一日永祈安瀾之錫儀封合龍處已命建廟答貺當别有記而此陶莊實豫竭誠蒙佑之所因命樹碑紀實親書泐石一如前建廟之例時庚子嵗暮春上浣之吉也戒得堂記孔子三戒之論朱子注謂以理勝之則不為血氣所使又引范氏之言以為養其志氣故不為血氣所動蒙引又引新安陳櫟之語以為志亦定向於理志有善惡理無不善諸説繹聖析理各抒所見亦既擇之精而語之詳矣我皇祖聖夀望七時嘗欲鐫通用小璽命內廷翰臣擬文皆無當聖意者乃定戒之在得字用之此語聞之張照蓋爾時伊在南書房裏行也然當時聖意引而未發豫今年亦屆七帙於元旦試筆即櫽括此語為什兹駐蹕避暑山莊乃皇祖朝乾夕惕用此璽之處而豫受恩之所也適作書堂於清舒山館之左即以此題額而為記以闡皇祖之義曰帝王之學與占畢書生有不同則所戒亦當各異未定方剛之戒兹不復論兹所戒者當在得矣而得豈與庶人同乎欲得賢才而用之此可戒乎欲得億萬年永承天眷此可戒乎欲得寰宇安寧萬姓樂業此可戒乎欲得五風十雨屢綏普遍此可戒乎若夫欲得貨財為瓊林大盈金花內帑之私則是剜肉補創自速其亡之舉古有明戒而戒及此其亦小矣因敬思皇祖所云戒得者其在擴土兼逺之為乎擴土兼逺之不已必有窮兵黷武之事我皇祖雖征朔漠復衛藏非窮兵也不得已也豫小子欽承先志亦既平伊犁定回部靖金川擴土不為不遐兼逺不為不備然非敢恃兵之強將之略而窮黷以逞己之欲亦惟是不得已而用之耳幸蒙天助諸事順成今則夀登七旬亦既老矣尚何所不足敢弗以皇祖之戒為戒乎如是則先儒所謂志氣血氣胥不外一理然此理實非占畢儒生所得同而或有合於我仁祖垂示萬祀之義乎御製文二集卷之十三
