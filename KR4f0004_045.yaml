body:
  text: 記學詩堂記子曰小子何莫學夫詩於伯魚之過庭也曰不學詩無以言學詩尚矣然學詩者豈以駢四儷七叶聲韻諳練詞藻為能盡詩之道哉必於可興可觀可羣可怨事父事君之大端深入自得然後藴諸內則心氣和平發諸外則事理通達於是言之文而行之逺不讀關雎麟趾不能行周官法度則有天下國家者尤不可不學詩也宋髙宗命馬和之為毛詩全圖自書經以配之間亦有孝宗書豈和之始事於建炎而蕆功於乾道阜陵補書以卒成之乎歷年既逺散失者多其在內府已登諸石渠寶笈書者凡九卷書成之後續得者又八卷而以新證舊乃知向所藏或失之精核者凡五卷夫真者既知其醇則贋者宜去其疵於是萃前後可信為真者都為一笥别藏於景陽宫後殿而名之曰學詩堂後或有所得將以是證之而歸其笥焉各卷並為題識書之以傳信永世卷之甲乙以風雅頌為次苐而不計書經者之前後其已登石渠寶笈今訂為偽之五卷則仍其舊亦各為識語書其後夫髙孝兩朝偏安江介無恢復之志其有愧雅頌大旨多矣則所為繪圖書經亦不過以翰墨娛情而已豈真能學詩者乎詩曰髙山仰止景行行止惜乎吾不能揖讓於清廟明堂之間也抑齋記豫向居重華宫潔治西廂為書室而名之曰抑齋踐阼之後於凡御園行館據山水之佳適性情之雅可以憑棐几展藝編者無不以是為名示不忘舊也而向未有記夫記之意識也左史記言右史記事是也又記之言志也公府奏記進已志是也深居九重暇餘萬幾宵衣旰食之際左右史之職廢已久矣夫誰與記之而公府奏進已志其能陳天命之艱觖屋漏之隱者亦鮮焉是在自謹其起居自任其出令以代左右史之識凜顧諟欽幾微以通公府之志則抑齋之記尤不可不作於今日者也夫豫向之所云抑者不過欲退損以去驕吝慎密以審威儀所為敬業樂羣之事耳若夫今之所云抑則豈數語所能盡者命不易哉無曰髙髙在上抑也日盈則昃月盈則蝕抑也豫臨萬民凛乎若朽索之馭六馬抑也無平不陂無往不復艱貞無咎抑也斯其大者至於一言之不謹一事之不慎其害將貽天下後世嗚呼今日之抑之艱豈昔日之抑之易所可相提並論者哉衛武公作抑之詩使人日誦於側以自警彼諸侯也尚知以是為棘則豫之不忘舊日之命而益勵日新之德於以代左右史之識通公府之志不亦宜乎重華宫之抑齋其權輿也故書記於室開新河記熱河之水有二其自東北來者為固都爾呼河三源滙而為一即水經注所謂武列水也繞山莊東北錘峯下中關東溫泉為一源又山莊行宫內亦有溫泉流出滙之遂有熱河之名東南流入於灤其水雖大然向有隄以障之時復培鞏故得循軌而有所歸宿即盛漲不為患其自西來者為廣仁嶺及獅子嶺諸山之水水本無源常時無涓涔迹雨後則循山東赴至西紅橋轉而北又由東紅橋轉而南始緣南山溝流入熱河而溝道紆狹久復淤墊故宣導不能速向以其無大患亦遂易而忽之己卯夏大雨驟霔西南諸山水一時並集平地漲丈餘經西紅橋趨突北山下石激波轉勢益洶悍自北而南衝擊東紅橋奔湍蕩越市㕓廬舍當之者多隨波而圮事聞發內帑賑恤且量漂屋楹數給資繕復之及庚寅災仍如之其賑恤繕復亦如之夫十年之間兩遭其害警於已事曷可不籌度以善其後顧無源之水不能以有形治惟順其勢而疏之使下流暢達則其上自不復壅潰為害防弭之道無過於此蓋是水之致患徒以兩紅橋溝狹而不能容耳若舍此狹溝使緣南山下新濬河寬而能容東赴熱河宜免搏擊之勢乃命內大臣三和御前大臣努三等偕直𨽻提督王進泰熱河道明山保由南山下寬開河道西自同知衙前東至旗營長六百九十餘丈濶皆七丈深隨地形髙下自三尺八寸至一丈二尺有差其河身經流有直民居者令移構岸旁髙地仍計屋授之值俾各得安處工始於辛卯三月初至六月中告蕆通費內府金一萬三千兩有竒新河既成是秋雨復大漲復盛而水皆循河安行無遏無溢其效固已立覩矣熱河自皇祖締構山莊以來迄今六十餘年四方之民環集輻輳駢坒殷闐盛若都會朕敬繩祖武嵗奉聖母駐此承志頤和因以順時行搜習武從官衛士之扈行以逮新舊諸藩之執役者內外咸集以故熱河煙火之盛月益嵗增則計所以保聚而安全之者誠為切要而此新河之利尤大且逺也繼此之修濬惟勤毋使堙塞實蒞斯土者之責可不慎諸惟兹廣仁嶺下為每年躬迓安輿所必至爰即疏河起處規隙地朴築數椽以備憩候其前實臨經塗因植碑為亭記其原始以詔示無斁土爾扈特全部歸順記始逆命而終徠服謂之歸降弗加征而自臣屬謂之歸順若今之土爾扈特携全部捨異域投誠嚮化跋涉萬里而來是歸順非歸降也西域既定興屯種於伊犁薄賦稅於回部若哈薩克若布魯特俾為外圉而羈縻之若安集延若拔達克山益稱逺徼而概置之知足不辱知止不殆朕意亦如是而已矣豈其盡天所覆至於海隅必欲悉主悉臣為我僕屬哉而兹土爾扈特之歸順則實天與人歸有不期然而然者故不可以不記土爾扈特者凖噶爾四衛拉特之一其詳已見於凖噶爾全部紀略之文溯厥始率亦荒略弗可考後因其汗阿玉竒與策妄不睦竄歸俄羅斯俄羅斯居之額濟勒之地康熙年間我皇祖聖祖仁皇帝嘗欲悉其領要令侍讀圖麗琛等假道俄羅斯以往而俄羅斯故為紆饒其程凡行三年又數月始反命今之汗渥巴錫者即阿玉竒之曾孫也以俄羅斯征調師旅不息近且徴其子入質而俄羅斯又屬别教非黃教故與合族台吉密謀挈全部投中國興黃教之地以息肩焉自去嵗十一月啓行由額濟勒厯哈薩克繞巴勒喀什諾爾戈壁於今嵗六月杪始至伊犁之沙拉伯勒界凡八閲月厯萬有餘里先是朕聞有土爾扈特來歸之信慮伊犁將軍伊勒圖一人不能經理得宜時舒赫德以參贊居烏什辦回部事因命就近前往而畏事者乃以新來中有舍楞其人曾以計誘害我副都統唐喀祿唐喀祿于戊寅四月偕厄魯特散秩大臣和碩齊率兵追捕逸賊至布古什河源射舍楞弟勞章扎布仆而擒之既而舍楞至稱欲投誠請釋其弟唐喀祿雖許而疑其詐欲先擒舍楞和碩齊云擒之無益不若招之使降越日舍楞詭稱欲入覲且携衆至唐喀祿益疑之和碩齊復言彼畏我兵威不敢動移曷親蒞撫諭之唐喀祿信其言從數人往既至和碩齊勸各解鞍去櫜鞬俄頎變作唐喀祿遂遇害和碩齊即降賊尋擒獲伏誅舍楞乃竄俄羅斯境因以竄投俄羅斯者恐其有詭計議論沸起古云受降如受敵朕亦不能不為之少惑而略為傋焉然熟計舍楞一人豈能聳動渥巴錫等全部且俄羅斯亦大國也彼既背棄而來又擾我大國邊界進退無據彼將焉往是則歸順之事十之九詭計之伏什之一耳既而果然而舒赫德至伊犁一切安泛設偵籌儲密備之事無不悉妥故新投之人一至如歸且掄其應入覲者由驛而來朕即命隨圍觀獵且於山莊燕賚如都爾伯特策凌等之例焉夫此山莊乃我皇祖所建以柔逺人之地而宴賚策凌等之後遂以平定西域兹不數年間又於無意中不因招致而有土爾扈特全部歸順之事自斯凡屬蒙古之族無不為我大清國之臣神御咫尺有不以撡先劵閲後成愜志而愈快者乎豫小子所以仰答祖恩益凛天寵惴惴焉孜孜焉惟恐意或滿而力或弛念兹在兹遑敢自詡為誠所感與德所致哉或又以為不宜受俄羅斯叛臣虞啓邊釁蓋舍楞即我之叛臣歸俄羅斯者何嘗不一再索取而俄羅斯訖未與我也今既來歸即以此語折俄羅斯彼亦將無辭以對且數萬乏食之人既至近界驅之使去彼不劫掠畜牧將何以生雖有堅壁清野之説不知伊犁甫新築城而諸色人皆賴耕牧為活是壁亦不易堅而野亦不可清也夫明知人以嚮化而來而我以畏事而止且反致寇甚無謂也其衆涉逺厯久力甚疲矣視其之死而惜費弗救仁人君子所不忍為况體天御世之大君乎發帑出畜力為優恤則已命司事之臣土爾扈特部衆長途疲頓凍綏幾不能自存因命舒赫德等分撥善地安置仍購運牛羊糧食以資飬贍置辦衣裘廬帳俾得禦寒並為籌其久逺資生之計令皆全活安居咸獲得所兹不贅記記事之緣起如右優恤土爾扈特部衆記歸順歸降之不同既明則歸順歸降之甲乙可定蓋戰而勝人不如不戰而勝人之為盡美也降而來歸不如順而來歸之為盡善也然則歸順者較歸降者之宜優恤不亦宜乎土爾扈特歸順源委已見前記兹記所以優恤之者方其渡額濟勒而來也户凡三萬三千有竒口十六萬九千有竒其至伊犁者僅以半計夫此逺人嚮化携孥挈屬而徠其意甚誠而其占危求息狀亦甚憊既撫而納之苟弗為之贍其生猶弗納也贍之而弗為之計長久猶弗贍也故自聞其來及其始至以逮於今惟此七萬餘衆凍綏尫瘠之形時懸於目而側於心凡宵旰所究圖郵函所咨訪無暇無輟乃得悉其大要於是為之口給以食人授之衣分地安居使就米穀而資耕牧則以屬之伊犁將軍舒赫德出我牧羣之孳息驅往供饋則以屬之張家口都統常青發帑運茶市羊及裘則以屬之陕甘總督吳達善而嘉峪關外董視經理則以屬之西安巡撫文綬惟時諸臣以次馳牘入告於伊犁塔爾巴哈台之察哈爾厄魯特凡市得馬牛羊九萬五千五百其自達里岡愛啇都達布遜牧羣運往者又十有四萬而哈密闢展所市之三萬不與焉撥官茶二萬餘封出屯庾米麥四萬一千餘石而初至伊犁賑贍之茶米不與焉甘肅邉內外暨回部諸臣購羊裘五萬一千餘襲布六萬一千餘匹棉五萬九千餘斤氊廬四百餘具而給庫貯之氊棉衣什布幅不與焉計儲用帑銀二十萬兩而賞貸路資及宴次賚豫不與焉其台吉渥巴錫等之入覲者乘傳給餼而來至則錫封爵封渥巴錫為卓里克圖汗䇿伯克多爾濟為布延圖親王舍楞為弼里克圖郡王功格為圖薩圖貝勒默們圖為濟爾噶爾貝勒沙喇扣肯為烏察拉爾圖貝子葉勒木丕爾為阿穆爾靈貴貝子德爾德什達木拜扎爾桑為頭等台吉懇澤為四等台吉其未至之巴木巴爾亦封為郡王旺丹克布騰封為貝子拜濟呼封為公餘封台吉等秩有差備恩禮各賜鞍馬櫜鞬黃褂並賜渥巴錫策伯克多爾濟黃轡舍楞功格默們圖沙喇扣肯紫轡其汗王皆賜三眼翎貝勒貝子雙眼翎餘皆花翎並視其爵秩錫以章服其往也復慮其身之生不宜內地氣候蒙古以已出痘為熟身未出痘為生身其生身者多畏染內地氣候出痘則命由邉外各臺厯巴里坤以行而迎及送並遣大臣侍衛等護視之用以柔懷逺人俾毋致失所或有以為優恤太甚者蓋意出於鄙吝未習聞國家成憲毋惑乎其見之隘也昔我皇祖聖祖仁皇帝時喀爾喀土謝圖汗等為厄魯特所殘破率全部十萬衆來歸皇祖矜其窮厄命尚書阿喇尼等往撫之發歸化城張家獨石二口倉儲以賑其乏且足其食又敕大臣費揚古明珠等齎白金茶布以給其用採買牲畜以資其生遂皆安居得循法度樂休飬迄今八十餘年喀爾喀衆以康熙二十七年來歸畜牧日以蕃生殖日以盛樂樂利利殷阜十倍於初其汗王台吉等世延爵祿恪守藩衛一如內扎薩克之效臣僕長子孫莫不感戴聖祖德澤及人之深得以長享升平之福也朕惟體皇祖之心為心法皇祖之事為事惟兹土爾扈特之來其窮厄殆無異曩時之喀爾喀故所以為之籌畫無弗詳賙惠無少靳優而恤之且計長久庸詎知謀之勞而費之巨乎冀兹土爾扈特之衆亦能如喀爾喀之安居循法勤畜牧務生殖勿替厥志則其世延爵祿長享升平之福又何以異於今之喀爾喀哉用是臚舉大凡勒石熱河及伊犁俾土爾扈特汗王部衆咸識朕意且以詔自今以往我諸臣之董其事者土爾扈特部紀略事不再三精核率據耳食以為實君子弗為也言不求於至是已覺其失護己短而莫之改易君子弗為也必知斯二者然後可以秉史筆以記千載之公是公非余之為土爾扈特部之紀略亦亹是而已土爾扈特之初來也蓋嘗詠之詩載之紀皆以為始自阿玉竒汗溯而上之荒略不可考此亦述向之所聞者而書之而不知其更有所祖非始自阿玉竒兹以其麇至乃得一一詳徴其實為之重記何必隱約弗明以諱吾前言之未精核哉阿玉竒之父曰棚楚克其祖曰書庫爾岱青其曾祖曰和鄂爾勒克其髙祖曰卓立甘鄂爾勒克其髙祖之父則曰貝果鄂爾勒克自貝果鄂爾勒克溯而上之實逺不可徴其入俄羅斯也則自阿玉竒之曾孫和鄂爾勒克於策妄之祖巴圖魯渾台吉時其時四衛拉特各自為汗無所統屬又不相和睦和鄂爾勒克因率其子書庫爾岱青等至俄羅斯之額濟勒地其時阿玉竒尚在襁褓因留巴圖魯渾台吉處後書庫爾岱青往西藏而回遂向渾台吉索阿玉竒歸俄羅斯巴圖魯渾台吉為阿玉竒之外祖以時代計之適相當而阿玉竒汗時其子散扎布台吉率所屬一萬五千餘户往投策妄策妄盡留其屬而逐散扎布歸額濟勒則向記所云阿玉竒與策妄不睦亦未為大誤也自貝果鄂爾勒克至和鄂爾勒克皆單傳和鄂爾勒克有子六人一即書庫爾岱青餘三無子其二皆有子孫式微無足傅書庫爾岱青子四二絶嗣其一曰那木策楞四傳而至巴木巴爾今封郡王其一即棚楚克四傳而至渥巴錫今封汗棚楚克之子阿玉竒有子八人其六皆無子嗣其一曰衮扎卜有子嗣今之封親王策伯克多爾濟者其曾孫也衮扎卜乃渥巴錫之祖沙克都爾扎卜之親弟故其子孫為渥巴錫近族與沙克都爾扎卜子孫皆隨渥巴錫而來其户口之數已見前記兹惟記其始祖所自出並證前之失精核而未實者至其重黃教置鄂拓克宰桑之類率同凖噶爾但具體而微蓋凖噶爾之紀略紀其全部之盛衰而兹土爾扈特之紀略則紀其世系之詳悉云爾御製文二集卷十一
