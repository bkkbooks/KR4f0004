body:
  text: 諭重刻淳化閣帖諭朕幾餘不自暇逸典學之優時及臨池曩曽輯內府所藏前人墨迹刻為三希堂墨妙軒二帖廣示藝林復念古帖流傳可補墨迹所未備者惟宋淳化閣帖鐫集尤為美富逺出大觀太清樓諸本之上但惜初拓與賜者絶鮮或云版尋殘損當時已為難得後來翻刻愈繁真意寖失有志追摹者末由津逮內府舊藏淳化閣帖極多而此畢士安所得賜本拓最精好爰特敕選工鈎摹上石冀復舊觀第王著昧於辨别其所排類標題舛陋滋甚不當聽其沿訛以誤後學因命于敏中等詳加考正以次呈閲候朕參定分識各卷並命搜採諸家釋文依字旁注其互異者折衷附記于後以資省覽是於考文稽古之中兼寓舉墜訂訛之益用嘉惠海內操觚之士焉命通鑑輯覽附紀明唐桂二王事迹諭甲申嵗我國家既定鼎京師而明福王朱由嵩為南京諸臣迎立改元首尾一載其後唐王朱聿鍵桂王朱由榔相繼稱號者又十有餘年當時以其事涉本朝開創之初凡所紀年號例從芟削即朱璘之明紀輯略亦以附三王紀年為浙江撫臣等所奏燬兹以搜訪遺籍外省奏進此書閲其體例非不尊崇本朝且無犯諱字迹徒以附紀明末三王自不宜在概禁之列前命編纂通鑑輯覽館臣請不録福王事實因念厯朝嬗代之際進退豫奪繫乎萬世公論若前代偏私袒徇之陋習以曲筆妄為髙下朕實鄙之即如福王承其遺緒江山半壁強域可憑使能立國自強未嘗不足比于宋髙宗之建炎南渡乃孱弱荒淫自貽顛覆而偏安之規模未失不可遽以國亡書法絶之特命于明崇禎末附紀福王年號仍用雙行分注而提綱則書明以為别至蕪湖被執始大書明亡蓋所以折衷至是務合乎人情天理之公也至于唐王桂王遁迹閩滇苟延殘喘不復成其為國正與宋末是昺二王之流離海島者相類本不得等于福王之例是以輯覽內未經載入今思二王究為明室宗支與異姓僣竊者不同非偽託也且其始末雖無足道而奔竄事迹亦多有可考與其聽不知者私相傳述或致失實無稽轉不若為之約舉大凡俾知二王窮蹙情形不過如此更可以正傳聞之訛舛又其下諸臣以旅拒王師者向多以偽官目之然其間如白文選李定國等本獻賊義子反側無常彼在明已合稱賊稱偽自當凖春秋書盜之例又如金堡等之五虎橫行把持國是者亦無足齒録若其他各為其主始終不屈以至隕首捐軀者不一而足較宋末之文天祥陸秀夫實相倣佛雖混一之初兵威迅掃不得不行抗命之誅而諸人瑣尾間關有死無二洵無愧人臣忠于所事之義迄今日久將遂泯沒朕甚憫之亦宜略為紀録使之有傳于後設以為載筆有體則凡事涉二玊者不妨直以彼字稱之用存偏正之别而其臣則竟書為某王之某官某槩不必斥之為偽也明紀輯略已命有司弛其禁而通鑑輯覽校刋將竣其令四庫全書館總裁詮敘唐桂二王本末别為附録卷尾凡彼時仗節死義之人考訂事迹悉與備書朕將親為裁定宣付刋行俾讀者咸知朕大中至正未嘗有一毫私意偏倚其間而崇奬忠貞亦足以為世道人心之勸書成即以此諭同御製輯覽原序並冠卷端庶將來有所參考喻朕意焉命議豫明季殉節諸臣諡典諭崇奬忠貞所以風勵臣節然自昔纍朝嬗代於勝國死事之臣罕有録豫易名者惟我世祖章皇帝定鼎之初于崇禎末殉難之大學士范景文等二十人特恩賜諡仰見聖度如天軫恤遺忠實為亘古曠典第當時僅徴據傳聞未暇遍為搜訪故得邀表章者止有此數逮久而遺事漸彰復經論定今明史所載可按而知也至若史可法之支撑殘局力矢孤忠終蹈一死以殉又如劉宗周黃道周等之立朝蹇諤抵觸僉壬及遭際時艱臨危授命均足稱一代完人為褒揚所當及其他或死守城池或身隕行陳與夫俘擒駢僇視死如歸者爾時王旅徂征自不得不申法令以明順逆而事後平情而論若而人者皆無愧於疾風徑草即自盡以全名節其心亦並可矜憐雖福王不過倉猝偏安唐桂二王并且流離竄迹已不復成其為國而諸人茹苦相從捨生取義各能忠於所事亦豈可令其湮沒不彰允宜稽考史書一體旌諡其或諸生韋布及不知姓名之流並能慷慨輕生者議諡固難於槩及亦當令俎豆其鄉以昭軫慰嘗恭讀我太祖實録載薩爾滸之戰明楊鎬等集兵二十萬四路分出侵我興京我太祖太宗及貝勒大臣等統徑旅數千殱戮明兵過半一時良將如劉綎杜松等皆歿于陳近曽親製書事一篇用揚祖烈而示傳信惟時王業肇基其抗我顔行者原當多為獮剃然迹其冒鏑攖鋒竭忠效命未嘗不為嘉憫又若明社將移孫承宗盧象升等之抵拒王師身膏原野而周遇吉蔡懋德孫傳庭等以闖獻蹂躪禦賊亡身凛凛猶有生氣總由明政不綱自萬厯以至崇禎權姦接踵閹豎橫行遂致黑白混淆忠良泯滅每為之扼掔不平福王時雖間有追諡之人而去取未公亦無足為重豫惟以大公至正為衡凡明季盡節諸臣既能為國抒忠優奬實同一視至錢謙益之自詡清流靦顔降附及金堡屈大均輩之幸生畏死詭託緇流均屬喪心無恥若輩果能死節則今日亦當在豫旌之列乃既不能捨命而猶假言文字以圖自飾其偷生是必當明斥其進退無據之非以隱殛其冥漠不靈之魄一褒一貶衮鉞昭然使天下萬世共知豫凖情理而公好惡以是植綱常即以是示彰疸凡諸臣事迹之具于明史及通鑑輯覽者宜各徴考姓名仍其故官豫以諡號一凖世祖時例行其令大學士九卿京堂翰詹科道集議以聞命議諡前明靖難殉節諸臣諭前以明季殉節諸臣各為其主義烈可嘉爰命大學士九卿等集議豫諡所以褒闡忠貞風勵臣節也今復思建文革除之際其臣之仗節死事者亦具載史傳當時永樂一藩臣耳乃犯順稱兵隂謀篡奪諸臣以大義自矢固當不共戴天雖齊泰黃子澄輕率寡謀方孝儒識見迂濶未足以輔助少主然迹其尊主鋤強之心實堪共諒逮大事已去猶且募旅圖存抗詞抵斥雖隕身湛族百折不回洵為無慚名教者他若景清鐵鉉輩或慷慨捐軀或從容就義其致命縱各不同而志節凛然如在下至東湖樵夫補鍋匠之流姓名即隱晦不彰其心迹固可追溯也特以永樂殘刻性成淫刑以逞屠戮之慘極於瓜蔓牽連殆非人理余讀史至此未嘗不深憤而痛嫉之雖其中葉少弛厲禁而彼時臣子徇私曲諱終不獲顯示褒揚使忠臣義士之氣久弗克伸良可憫惻夫以勝國革命之時其抗我顔行者尚念其忠於所事特命表章矧建文諸臣不幸遘遭內難為國捐生成仁取義顧可令其湮沒于千百世下耶允宜再集廷議並豫易名以發幽光而昭公道其核實條具以聞命國史館編列明季二臣傳諭昨閲江蘇所進應燬書籍內有朱東觀選輯明末諸臣奏疏一卷及蔡士順所輯同時尚論録數卷其中如劉宗周黃道周等指言明季秕政語多可採因命軍機大臣將疏中有犯本朝字句者酌改數字存其原書而當時具疏諸臣內如王永吉龔鼎孳吳偉業張縉彥房可壯葉初春等在明已登仕版又復身仕本朝其人既不足齒則其言不當復存自應槩從刪削蓋崇奬忠貞即所以風勵臣節也因思我朝開創之初明末諸臣望風歸附如洪承疇以經略喪師俘擒投順祖大夀以鎮將懼禍帶城來投及定鼎時若馮銓王鐸宋權謝升金之俊黨崇雅等在明俱曽躋顯秩入本朝仍忝為閣臣至若天戈所指解甲乞降如左夢庚田雄等不可勝數蓋開創大一統之規模自不得不加之録用以靖人心而明順逆今事後平情而論若而人者皆以勝國臣僚乃遭際時艱不能為其主臨危授命輒復畏死幸生靦顔降附豈得復謂之完人即或稍有片長足録其瑕疵自不能掩若既降復叛之李建泰金聲桓及降附後潛肆詆毁之錢謙益輩尤反側僉邪更不足比于人類矣此輩在明史既不容闌入若於我朝國史因其略有事迹列名敘傳竟與開國時范文程承平時李光地等之純一無疵者毫無辨别亦非所以昭褒貶之公若以其身事兩朝槩為削而不書則其過迹轉得藉以掩蓋又豈所以示傳信乎朕思此等大節有虧之人不能念其建有勳績諒于生前亦不能因其尚有後人原于既死今為凖情酌理自應于國史內另立二臣傳一門將諸臣仕明及仕本朝各事迹據實直書使不能纎微隱飾即所謂雖孝子慈孫百世不能改者而其子若孫之生長本朝者原在世臣之列受恩無替也此實朕大公至正之心為萬世臣子植綱常即以是示彰疸昨嵗已加諡勝國死事諸臣其幽光既為闡發而斧鉞之誅不宜偏廢此二臣傳之不可不核定于此時以補前世史傳所未及也著國史館總裁查考姓名事實逐一類推編列成傳陸續進呈候朕裁定焉命追復睿親王封爵及復開國有功諸王原號並豫配享諭睦親彰善王政宜先繼絶昭屈聖經所重朕自臨御以來間日恭閲列祖列宗實録一册因得備知祖宗創業艱難及爾時懿親藎臣勤勞佐命底定中原偉伐殊功實為從古所未有而當時策勛錫爵榮號崇封所以酬答者本從優厚逮其後或有及身緣事旋被降削者或有子孫承襲更易封號者迄今平情凖理若不為之溯述闡揚追復舊恩于心實有所未愜因念睿親王多爾衮當開國時首先統衆入關掃蕩賊氛肅清宫禁分遣諸王追殱流寇撫定強陲一切創制規模皆所經畫尋即奉迎世祖車駕入都定國開基以成一統之業厥功最著顧以攝政有年威福不無専擅諸王大臣未免畏而忌之遂致歿後為蘇克薩哈等所搆授欵于其屬人首告誣以謀逆經諸王定罪除封其時我世祖章皇帝實尚在沖齡未嘗親政也夫睿王果萌異志則方兵權在握何事不可為且吳三桂之所迎勝國舊臣之所奉止知有攝政王耳其勢更無難號召即我滿洲大臣心存忠篤者自必不肯順從然彼誠圖為不軌無難潛鋤異已以逞逆謀乃不于彼時因利乘便直至身後以斂服僣用明黃龍衮指為覬覦之證有是情理乎况英親王阿濟格其同母兄也於追捕流賊回京時誆報李自成身死且不候旨班師睿王即遣員斥責其非並免王公等往迎之禮又因阿濟格出征時脅令巡撫李鑑釋免逮問道員及擅至鄂爾多斯土默特取馬令議其罪降為郡王平日辨理政務秉公持正若此是果有叛志無叛志乎又實録載睿王集諸王貝勒貝子公大臣等遣人傳語曰今觀諸王貝勒大臣但知諂媚于豫未見有尊崇皇上者豫豈能容此昔太宗升遐嗣君未立英王豫王跪請豫即尊位豫曰爾等若如此言豫當自刎誓死不從遂奉皇上纘承大統似此危疑之時以豫為君豫尚不可今乃不敬皇上而媚豫豫何能容自今以後有盡忠皇上者豫用之愛之其不盡忠不敬事皇上者雖媚豫豫不爾宥也且云太宗恩育豫躬所以特異于諸子弟者蓋深信諸子弟之成立惟豫能成立之每覽實録至此未嘗不為之墮淚則王之立心行事實能篤忠藎感厚恩深明君臣大義尤為史册所罕覯使王彼時如宋太宗之處心積慮則豈肯復以死固辭而不為邪説搖惑耶乃令王之身後久抱不白之寃于泉壤心甚憫焉假令當時王之逆迹稍有左驗削除之罪果出于我世祖聖裁朕亦寧敢復翻成案乃實由宵小姦謀搆成寃獄而王之政績載在實録者皆有大功而無叛逆之迹又豈可不為之昭雪乎昨于乾隆三十八年因其塋域久荒特敕量為繕葺並準其近支以時祭掃然以王之生平盡心王室尚不足以慰彼成勞朕以為應加恩復還睿親王封號追諡曰忠補入玉牒並令補繼襲封照親王園寢制度修其塋墓仍令太常寺春秋致祭其原傳尚有未經詳敘者並交國史館恭照實録所載敬謹輯録添補宗室王公功績傳用昭彰闡宗勛至意又如豫親王多鐸從睿親王入關肅清京輦即率師西平流寇南定江浙實為開國諸王戰功之最乃以睿親王之誣獄株連降其親王之爵其後又改封信郡王雖至今承襲罔替但以王之勳績超邁等倫自應世胙原封以彰殊眷豈可以風影微眚輒加貶易乎朕以為應復其原封又諸王中披堅執鋭拓土開強共成一統之業者如禮親王代善後改封康親王鄭親王濟爾哈朗後改封簡親王肅親王豪格後改封顯親王克勤郡王嶽託後改封平郡王當時俱茂著北猷克昭駿烈載在宗盟今其子孫所襲均非始封之名外人不知妄疑宗藩當國家締造時有大勳勞而後裔均不得長延帶礪似為闕典即其本支承家襲慶以去祖漸逺幾忘其先世錫封之由弗克顧名奮效所係于宗室子孫者甚重况功臣世封內如揚古利之英誠公費英東之信勇公額亦都之果毅公俱以本號相傳其子孫承襲者各能溯勛閥以宣偉績不失故家喬木之遺今以親賢世胄竟改其初封嘉號何以垂詒奕祀示酬庸追本之義乎朕以為應復其原號著交軍機大臣會同宗人府悉心妥議具奏其餘宗室諸王貝勒等如有顯著功績其封爵後經降奪者除本人身罹重愆自不當復邀優典若係承襲之子孫獲咎議處者僅當斥其本身而不當追貶其祖宗世爵方為平允亦著一併會查議奏再配享太廟諸王僅有通達武功慧哲宣獻四郡王其太祖太宗世祖時戮力行間櫛風沐雨之親藩如向所舉數人皆未之及蓋由當時議禮諸王各懷私意遂爾沒其勛伐不得同侑馨香豈足以彰公道所有睿親王禮親王豫親王肅親王克勤郡王俱著補置牌位配享太廟用以妥功宗而昭渥典至通達郡王係顯祖之子武功慧哲宣獻三郡王係景祖之子當時雖身與配享第以三郡王宗支已在覺羅宗室王公表傳內亦未立通達郡王傳國史傳又以屬在宗潢令此四王無所附麗亦覺缺典著交內閣國史館補為立傳通達郡王入於宗室武功等三郡王列于國史諸大臣傳之前或當時紀載簡少功績無由稽核不拘詳略各立一傳以徴信實御製文二集卷七
