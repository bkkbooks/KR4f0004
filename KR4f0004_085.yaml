front:
  text: 欽定四庫全書御製文三集巻五
  hash: sha256:2aee441e3fb9c0f68e45745f2a789c8a101f9875c7b2a9daab64b0115ca4f7a1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_085-1a, image: WYG1301/WYG1301-0599a.png}
body:
  text: 諭命諸皇子及樂部大臣定詩經全部樂譜諭朕向披閱明朱載堉樂律全書所載樂譜内填注五六工尺上等字並未兼注宫商角徵羽而扵雅頌烝民思文諸詩以時俗豆葉黄等牌名小令分譜未免援古而入扵俗又所著琴譜一絃之内用正應和同四聲長至十六彈不勝其冗而一音之中已有抑揚髙下是徒滋繁縟而近扵靡曼有類時曲曽經降㫖交樂部皇六子永瑢及徳保鄒弈孝等将朱載堉樂律全書内疎漏歧誤之處詳晰訂正分列各條載扵本書提要之後以垂永久而昭雅正因思詩三百篇皆可歌詠者也魏晉時尚有文王鹿鳴等四章但未著宫調學者茫然不知耳而朱載堉詩譜又固執周詩不用商聲之說以角調譜國風徵調譜小雅宫調譜大雅羽調譜周頌而専以商調譜商頌夫商調乃宫商之商非夏商之商也此其穿鑿拘墟不待辨而自明豈足與言五音述三百哉且古樂皆主一字一音虞書依永和聲雖有清濁長短之節合之五聲六律祗扵一句之數字内分抑揚髙下不得扵一字一音之内㕘以曼聲後世古法漸湮取恱聽者之耳多有一字而曼引至數聲此乃時俗伶優所為正古人所譏煩手之音未足與言樂也從前朕親定中和韶樂細繹皇祖欽定律吕正義考訂精審皆主一字一音實為古樂正聲永當遵守現在朝會大典鐘虡鏗鍧備極莊雅朕前扵經筵之典令歌抑戒之詩扵瓊林鷹揚兩宴令歌棫樸干城之詩皆親為指定而三百篇全詩三代而後未有全行譜定者朱載堉所譜又復襍以俗調或自行杜撰不可為訓所當詳加訂正叶之宫商俾操縵安絃之士皆得矢詩遂歌更足以昭復古著派皇子等會同樂部大臣悉心精核其詩篇内應用某宫某調者俱著詳審文義定為某宫調仍扵各譜駢注七音字様彚成一書俾四始六義之文皆可歌詠分刌節度悉符正始元音庶㡬考古而益進扵古以副朕條理集成引俗入古至意将来書成時即名之曰詩經樂譜全書並将此旨弁扵簡端亦不必重為之序矣特諭乾隆五十五年八十夀辰普免天下錢糧諭朕賴昊蒼眷佑既逾古稀欣開八袠幸得小康時懐大惕自乾隆十年以迄四十二年特布恩綸普免天下錢糧業經三次矣今嵗屆朕八旬夀辰仰荷天祖貽庥率土稱慶以至梯航重譯祝嘏来庭從古史牒實所罕覩是宜廣宣湛闓敷錫兆民用叶崇禧答嘉貺著将乾隆五十五年各直省應徵錢糧通行蠲免其如何按年輪蠲之處著大學士會同户部即速核奏遵行通飭各省督撫學政嚴禁坊刻經書刪本諭山東學政翁方綱奏其科試情形稱考試士子經解黙經時却扵坊間所刪經題内出題其有未讀全經者概不録取等語閱之不解何謂夫孔子刪詩書之後更有誰敢刪者問之習場屋者乃知近有刪其不祥諱用之語以為入場考題之捷徑怪哉士習之日下一至此乎夫不祥諱用語句不便出題迺後世過扵迴避之陋習朕所不取兹公然竟有刪去者豈不可鄙是亦學術式微之一證也為學政者應令承學之士全讀經義身體而力行之兹翁方綱明知坊間刪經之不可而不能去不過調停其間且相沿陋習形之奏章将定為例乎則朕為不讀書之人矣著傳㫖申飭山東一省如此各省當亦所不免而各省督撫學臣知而不言則更方綱之不如矣朕甚愧之著通諭各省督撫學政務須實心查察嚴禁坊間刪本以正士習俾各通經以振文風毋負訓迪之意特諭命普免六十年各省應徵漕糧諭粤予御天下五十有九年仰䝉昊蒼眷佑列聖貽庥薄海昇平梯航向化重熙累洽惟日孜孜無時不以敬天勤民為念行慶施恵錫祜延禧普免漕糧者二地丁錢糧者四偶遇水旱偏祲隨時蠲租賜復賑貸兼施不下帑金數千萬所以涵養生息子愛黎元亹亹扵兹明嵗正屆六十年稽諸史冊前代帝王享國長久者未可多得即有一二或係沖齡踐阼用能多歴年所其春秋二十有五始踐位逮今八旬開四康強逢吉五代同堂似予者盖少是皆上䝉昊貺駢蕃克膺備福感荷之餘彌深兢業早經欽天監推算六十年元旦日食上元月食古来史傳所載有日食修徳月食修刑之說固因上天垂象理宜修省其實君人之道扵徳刑二事平日本宜刻深兢勵亦何待日月薄蝕始懐寅戒之心應天以實不以文與其託諸空言寧若見諸行事之實修徳莫大扵愛民若覃敷恩澤加恵閭閻俾海㝢子民共臻樂利則所為修徳孰大扵是所有六十年各省應徵漕糧著再加恩普免一次其應如何分年輪免之處仍著該部核議具奏至以修刑而論則停免勾到即所以恤刑但赦非善政利扵宵小而不利扵善良昔人即有此論明年係六十年國慶後嵗丙辰為嗣皇帝即位元年俱應錫慶施仁矜恤刑獄若今年停勾則三年連緩莠民恃有寛政作奸犯科者無所儆畏轉非辟以止辟之意是以本年仍照舊勾到明年元旦著照五十一年之例不御殿不受朝賀是日午後向有諸王暨皇子皇孫内庭家讌之例五十一年元旦日食復圎後曽經舉行明嵗雖係六十年周甲年分所有内庭家讌亦著一併停止朕扵是日亦不御禮服照每年例恭詣奉先殿堂子及先師各等處依舊行禮過日食時換常服以示寅恭而寓修省日月薄蝕躔度本屬有定數千百年後皆可推算而得所謂千嵗之日至可坐而致但元旦上元適值日月虧蝕究為昊穹示儆之象幸天恩垂佑適在明嵗為朕即位周甲告成之年自應祇承無斁設在丙辰正月為嗣皇帝即位之元年扵吉祥盛事轉為未慊是即日月薄蝕一事而上天之篤祜藐躬以貽我子孫萬年無疆之庥者至優至厚朕惟有益感天恩倍深乾惕又明年乙夘為朕臨御六十年本欲扵萬夀節前由熱河囬京受賀今春因中外臣工懇請舉行慶典適以上冬雪澤未獲優霑春間又復缺雨業經降旨宣諭令将明年慶典停止舉行若仍照庚戌年八旬之例扵萬夀前囘京則王公外藩以及大小臣工等必又再四懇請舉行慶典則似今春所降諭旨轉為不誠是以明年仍定扵熱河駐蹕過萬夀後再行囘鑾俟至丙辰正月歸政嗣皇帝以符正月上日受終文祖之義彼時備儀授受盛典光昭嗣皇帝率領臣民以天下養介禧祝嘏慶洽敷天尤為千古罕覯盛事實我大清億萬載無疆之福也上丁親詣文廟釋奠諭朕自臨御以来恭遇郊廟大祀無弗祇肅躬親即中祀之禮亦多親詣舉行嗣因年屆八旬曽經降㫖所有中祀典禮如先農朝日夕月等壇俱扵八旬前兩年内以次親祭一周原因年夀日髙恐筋力或有不逮是以中祀之禮扵五十五年以後不復親行今思先師孔子道集大成師表萬世朕自沖齡服膺聖教久而無倦凡行政典學悉皆得自心傳況丙辰年即係歸政之期本年為朕御極六十年二月上丁允宜展禮宫牆用申企慕此次文廟釋奠朕親詣行禮以昭崇儒重道之誠其應行典禮著該衙門照例預備釋奠禮成廣各直省入學額諭朕臨御今六十年扵二月上丁親詣文廟釋奠禮成並閱視辟雍新刊石經瞻仰宫牆彌深景慕自惟沖齡肄學服膺聖教迄今八袠開五猶日孜孜誨學無倦舉凡行政念典悉皆䖍奉心傳今晨辟雍展敬祇肅躬親風日暄和典禮咸備景仰之誠先師靈爽式憑自必黙垂鑒佑當兹郅運増隆慶臻耆夀莫非仰邀錫貺允宜施恩黌序嘉恵士林以光盛典所有各直省嵗試入學名數著交該部查照向例分别廣額其太學肄業諸生並加恩免其坐監一月用示重道崇儒夀世作人至意普免嘉慶元年各直省地丁錢糧諭朕自臨御以来勤求民隠日有孜孜惟期蔵富扵民家給人足仰荷昊蒼眷佑列聖貽庥寰㝢昇平重熈累洽行慶施恵闓澤頻加節經普免天下漕糧三次地丁錢糧四次其餘遇有偏災隨時蠲賑不下千億萬兩近将各省積欠錢糧概行蠲免又復數千餘萬兩所以子恵元元休養生息者至周且渥今朕紀年慶符周甲丙辰元旦舉行歸政典禮為嗣皇帝登極初元大廷授受篤祜延釐實為千古吉祥盛事允宜廣沛恩綸俾薄海羣黎共霑湛愷本扵新正傳位後降㫖但思二月間即屬開徴之期恐逺省接奉稍遲著将嘉慶元年各直省應徴地丁錢糧通行蠲免以示朕與嗣皇帝愛育閭閻錫恩至意其如何按年輪免之處該部查照向例核議具奏施行再舉千叟宴諭我國家重熈累洽景運昌明綏萬屢豐中外禔福所以涵濡休養咸登仁夀者實為史冊所罕覯我皇祖聖祖仁皇帝沖齡踐阼統馭寰區仁漸義摩熙熙皞皞康熙年間曽舉行千叟宴與天下臣民躋夀㝢而迓繁禧為千載一時之嘉會朕誕膺丕緒敬紹鴻圗夙夜孜孜勤求治理仰賴昊蒼篤佑烈祖貽庥海宇乂安人民樂利曽扵乾隆五十年乙巳恭照皇祖千叟宴舉行盛典迄今已逾十年逢吉康強精神純固明嵗丙辰紀元周甲躬舉授受上儀尤屬曠古所未有天下臣民歌詠太平期頤衍慶者此十年内又不知凡㡬允宜再啟耆筵以紀重光之盛著扵明年正月初吉再舉千叟宴盛典惟是前次乙巳夀七旬有五是以六十嵗以上者俱令預宴明年朕夀八旬開六若仍照前次六十以上即准入宴年齒皆如兒輩長幼懸殊轉為未協此次應自七十嵗以上准其入宴用示朕介景延祺申錫無疆至意允皇太子率王公大臣等進乾隆六十一年時憲書備内廷頒賜諭皇太子率同王大臣等具奏恭進乾隆六十一年時憲書以備内廷頒賞之用覽奏具見悃忱朕登極初年黙禱昊慈事言之屢矣不復贅言明嵗丙辰改稱嘉慶元年舉行歸政之禮兹皇太子及王大臣以朕歸政改元為曠古未有之盛典雖現在頒朔以嘉慶紀年而宫廷之内若亦一體循用新朔扵心實有未安特進獻乾隆六十一年時憲書臚詞籲請出扵至誠朕亦俯從所請用備頒賞内廷皇子皇孫及曽元輩並親近王大臣等俾得遂其愛戴之忱其分頒各直省外藩可以不必竟當用嘉慶元年時憲書以符定制因思来嵗歸政朕為太上皇帝歴稽前典有上尊號之文殊屬無謂太上皇帝非若太皇太后皇太后因母儀而崇上徽稱者可比況朕御極六十年来敬天法祖勤政愛民及拓土開疆諸實政彰彰可考又何藉聖神文武文字虚示尊崇且以臣子而稱揚君父本屬後世沿用虚文扵禮原未盡協我聖祖仁皇帝平定三藩及恭遇慶節從前臣工等屢有以上尊號為請者聖祖皆却而弗許訓諭煌煌實可為萬世法今朕特預降此旨将上尊號一事停止即朕效法皇祖之心亦即御極初年齋心黙禱不敢上同皇祖紀年之初念也嗣皇帝及臣工當恪遵朕諭不必復有凟請朕惟敬祈昊貺精神純固康強逢吉嗣皇帝秉承指示克肩負荷海宇熙和治臻上理此即國家吉祥盛事況太上皇帝稱號已極尊崇嗣皇帝躬率臣民以天下養尤為古今郅隆盛軌又何必徒尚繁文務為虚美耶從前蔵廟尊太列朝冊寳乃隨時鐫造玉之色質長短本未能一律壬寅嵗特命精選和闐良玉敬製五朝冊寳全分以奉廟尊太廟而将舊奉之各分冊寳命恭送盛京與太蔵又将未鐫冊寳親加釐擇凡玉色其太廟相同者定為廟字號以備後来朝廷祔廟鐫用色質不同者為喜字號以備國家慶典鐫用並申諭内府大臣敬謹蔵弆若所用玉漸少該衙門應奏明取用永以為定制至朕歸政後應用喜字號玉寳鐫刻太上皇帝之寳玉冊即将近朕製十全老人之寳說鐫刻作為太上皇帝寳冊以彰熙朝盛瑞将来嗣皇帝亦能如朕之懋承天眷夀屆期頥再舉上儀一切典禮皆可敬謹遵循實我國家億萬年無疆之福也将此通諭中外知之御製文三集巻五
