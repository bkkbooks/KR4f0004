  text: 欽定四庫全書御製文初集巻七
  hash: sha256:9fd1d0d87c4594aaab0da6e856197e637d2780eed25ce93d4fdc0fa9bc7d0079
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_007-1a, image: WYG1301/WYG1301-0068a.png}
body:
  text: 記春耦齋記語云周過其厯秦不及期班固美其親親賢賢固本衆建至鄙秦以子弟為匹夫骨肉失藩衛其然豈其然哉夫秦之夫賈誼綸之詳矣闢封建之議則莫過於栁宗元而周之所以過其厯後世鮮有發厥旨者盖自后稷公劉世以治農為務惟土物愛知稼穡艱至於文武成康猶是道也立我烝民祈天永命詩書所歎畧同一軌國家龍興東海較之周家藝荏菽迺場疆者固有不同而天下初定禮樂未遑即舉祈糓之祭下力田之詔我皇祖建此豐澤園於西苑以劭樹藝而較晴雨至於皇考嵗舉耕耤之典必先演耕於園北弄田以視周家世業肯穫者有過無弗及予小子聰聽祖考之彞訓亦惟是無逸作所民本食天之念拳拳毋懈不敢以一己之貴而忽萬姓之窮不敢以四方之豐而忘一隅之歉二十一年以來此物此志也園之内有齋茲以春耦名之而闡其說如右石渠寳笈中舊蔵唐韓滉五牛圖農部尚書蒋溥因進其父故大學士蒋廷錫倣項聖謨摹本繼又得項聖謨巻古今名蹟一時㑹合良稱藝苑勝事夫服疇力穡牛之資用最鉅並貯齋中每一展觀如見洪縻縹軛馴擾膏壤間然予知依務本之意所為在此不在彼耳討源書屋記暢春園之西有屋數楹臨青溪面層山樹木蓊蔚既静以深溪之藻匪蒲伊荷山之禽匪嘵伊歌額之楣曰討源則我皇祖摛天文而垂擘窠也昔予小子日侍清宴之所今以問安視膳之暇亦每憩此咨政掄材肯構繼志之衷乆而弗敢懈盖嘗深維討源之義豈以其據渾渾之泉府似窈窈之洞天騷人寓意所為武陵花源之比也哉孟子曰原泉混混不舎晝夜盈科而後進放乎四海朱子解之曰如人有實行則亦不已而漸進以至於極斯言也引而未發然内聖外王之學實櫽括而無遺夫水則有源人何獨無是故堯舜政治之源也孔孟道徳之源也非特此也頡之書羿之射輸之巧曠之音鵲之醫僚之丸秋之奕無不各得其源或曰如是則其源已紛而流益莫可同矣顧嘗論之聖人人倫之至而武周夷齊相反是得謂之同乎然其心之自安各行其至是則無不同故百越適京師則北轅朔漠適京師則南首南首北轅大不同矣及其既至則同故堯舜政治之源在心而孔孟道徳之源亦在心頡之書羿之射輸之巧曠之音鵲之醫僚之丸秋之奕何一不在心哉且夫天下之水其源多矣而海則無源無源正衆水之源則水之源亦在心昭昭眀矣如是則聖人討源之旨直上接十六字之心傳而非怡情山水之為益可知矣小有天園記左浄慈面明聖兼挹湖山之秀為南屏最佳處者莫過於汪氏之小有天園盖辛未南巡所命名也去嵗丁丑復至其地為之流連為之倚吟歸而思畫家所為收千里於咫尺者適得思永齋東林屋一區室則十笏窗乃半之窗之外隙地方廣亦十笏命匠氏疊石成峯則居然慧日也範錫為宇又依然壑庵也汪氏别業舊名激水作瀑泠泠琤琤不殊幽居洞之所聞而黄山松樹子雖盈尺有凌雲之概夭矯盤拏髙下雜出於石筍峭蒨間復與琴臺之古木蒼巖􅌑瓏秀削不可言同何况云異吾於是知天地間之景無窮而人之心亦無窮境有異而人之心無有異夫此為軒為亭為磴為池為林泉為崕壑固不可歴歴手攀而足陟之者使目撃道存㑹心不逺則此為軒為亭為磴為池為林泉為崕壑又何不可歴歴手攀而足陟之乎昔新豐雞犬各識其户固己侈矣李徳裕平泉之像巴峡寫洞庭則又務窮逺盡態極妍而不必師所可師者其意而已然吾之意不在千里外之湖光山色應接目前而在兩浙間之吏治民依來往胸中矣是為記樂善堂記昔樂善堂集中有所謂樂善堂記者盖用此堂之名以名圓明園賜居桃花塢之堂而記亦記彼處之勝與宫中此堂無涉也然彼時之樂善祇數典漢東平王以為亟今斯堂則為重華宫之前殿不可以桃花塢堂之記槩之因思東平之樂善原數典於大舜所謂樂取於人以為善也兹適為重華宫之前殿則今之樂善祇宜景仰大舜之為而不必更宥於東平之蹟矣夫大舜之取諸耕稼陶漁之善世逺固不可徵而詢岳咨牧載在虞書者彰彰可考無非舎己從人與人為善而地平天成庶績咸熙胥於是乎基之是乃千古帝王之法則而非藩服屏翰者所可相提並論其事體大而責任重也昔之效東平為甚易今之企大舜為綦難是不可無記以朝夕體之心而措諸政也然而其志在是其慙亦在是矣寶月樓記文有神㑹落筆可以千言興有時來待機不妨數嵗寶月樓記之作遲速盖有如是寶月樓者介於瀛臺南岸適中北對迎薫亭亭與臺皆勝國遺址嵗時脩葺增減無大營造顧液池南岸逼近皇城長以二百丈計濶以四丈計地既狭前朝未置宫室每臨臺南望嫌其直長鮮屏蔽則命奉宸既景既相約之椓之鳩工戊寅之春落成是嵗之秋久欲為記輙以片時來往率即成詠罷輟兹始叙而記之盖是樓之經始也擬以三層既覺太侈則減其一延不過七間袤不過二丈據岸者十之四據池者百之一池不覺其窄㟁不覺其長拾級而登布席而坐則雲閣瓊臺詭峰古槐峭蒨巉巗聳翠流丹若三壺之隠現於鏡海雲天者北眺之勝槩也憑窗下視迥出皇城三市五都隠賑縱横賈貿墆鬻列隧百重華盖珂馬劍珮簪纓撫兹繁庶益切保泰與持盈此則南臨之所㑹也於東則紫禁紫微左廟右社規天矩地因上因下授時順鄉玉堂金馬慚茅茨於有虞法卑室乎大夏奉此宫室每同漢文恐羞之誠也而其西則西山起伏連延朝嵐夕靄氣象萬千春雨霂而農興秋霜落而林殷是又神臯繡壤下視三都與兩京也樓之義無窮而獨名之曰寶月者池與月適當其前抑亦有肖乎廣寒之庭也夫人之為記者或欣然於所得而予之為記常若自訟是宜已而不已予亦不知其何情也系以辭曰樓之聳惕居髙以悚樓之廓坦吾心以樂樂與民同悚勵已恭樂不忘悚樂斯益永謂悚匪樂悚不可藥摛詞壁間因識意之所存韻古堂記韻古堂因何而作也曰用舊堂而易以新名是易也非作也然則因何而易也曰以獲古鎛鐘貯之斯堂易其名亦可云作也鐘之出以臨江牧者物色坡陀間掘地而得古鐘十一地方大吏以聞傳至闕下辨其銘知為周時所鑄是宜羶薌其事而為之記也堂在淑清院南臨液池可望瀛臺故舊名曰蓬瀛在望而今易之為韻古也盖自黄帝命伶倫與榮將鑄十二鐘以和五音是鐘之於樂為最古黄鐘而下三分損益上下遞生黄鐘定而八音六律無不定以立均出度紀之以三平之以六成於十二以為萬事根本故帝王制禮作樂莫不以是為棘或曰鎛鐘大小殊編鐘大小同其説如何律鐘之説又如何曰八音無非律磬亦律磬琴亦律琴其他諸樂無不皆然獨鐘云乎哉然金聲而玉振之金為始故曰律鐘非編鎛之外别有所謂律鐘也云有律鐘者篤古泥而不知音者也鎛鐘大小殊而厚薄同編鐘大小同而厚薄殊其不同者正所為同也且如排簫長短殊而一孔長簫一器而六孔長簫編鐘之説也排簫鎛鐘之説也故鎛鐘排簫先出而編鐘長簫後出此首創質朴椎輪大輅之義也律應十二鐘缺其一為補成之以全厥初也聆其聲頗不合於今律則以古器經久而移其本音古人論之詳也我聖祖心天之心政古之政親考律吕正齊量無不大當而獨未及鎛鐘者豈以時將有待故引而未發耶今既得古鎛鐘於西師奏凱之時則闡前開後備八音之正撰垂一代之鴻規在此時乎在此時乎故因記韻古堂而申其義如此也鹿角記鹿陽類也夏至感隂生而角解然解者自其委蜕而新茸即漸長以成角則六陽之義益明蜕其舊而新生必較舊加長且豐兩叉四叉六叉以至八叉厯數十年而後成或踰八叉者不可辨其年嵗盖千萬中一遇而其鹿亦必數百千年之夀矣嘗閲武庫所藏皇祖時鹿角一記曰康熙四十八年九月五日上於巴顔陀羅海所獲其長自􅑠骨至尖各三尺九寸有十分寸之五兩尖抵直得七尺有九寸兩末徑距凡四尺叉之數十有六最末者不尖而博狀如魚尾又如芝朶近􅑠者其圍八寸有十分寸之二既堅且澤不紾而昔景鑠哉是盖我皇祖神威所攝山靈不敢閟其珎用出瑞獸以燕聖人而什襲天府示我後昆俾無忘前烈詰戎益勤也予小子敬仰之下不訝鹿角之竒而思鹿角所由來者竒庸可不表章厥蹟勒冊府以永垂乎月令仲夏鹿角解仲冬麋角解今木蘭之鹿與夫吉林之麋無不解於夏豈古之麋非今之麋乎是又不可得而知矣汲冡周書至謂麋鹿之角不解為兵戈不藏不息之兆荒誕更甚毋容闢譌因為鹿角之記遂並識之閲海塘記隆古以來治水者必應以神禹為準神禹乗四載隨山濬川其大者𨗳河𨗳江胥入於海禹之蹟至於㑹稽㑹稽者即今浙海之區所謂南北互為坍漲遷徙靡常地神禹親厯其間何以未治豈古今異勢爾時可以不治治之乎抑海之為物最巨不可與江河同人力有所難施乎河之患既以隄防海之患亦以塘垻然既有之莫能已之已之而其患更烈仁人君子所弗忍為也故每補偏救弊亦云盡人事而已施隄防於河已難而况措塘垻於海乎海之有塘垻李唐以前不可考可考者盖自太宗貞觀間始厯宋元明屢脩而屢壞南岸紹興有山為之禦故其患常輕北岸海寧無山為之禦故其患常重乾隆乙丑以後丁丑以前海趨中亹浙人所謂最吉而最難獲者辛未丁丑兩度臨觀為之慶幸而不敢必其久如是也無何而戊寅之秋雷山北首有漲沙痕己夘之春遂全趨北大亹而北岸䕶沙以漸被刷是柴塘石塘之保䕶於斯時為刻不可緩者易柴以石費雖巨而經久去害為民者所弗惜也然有云柴塘之下皆活沙不能易石者有云移内數十丈則可施工者督撫以斯事體大不敢定議夫朕之巡方問俗非為展義制宜措斯民於衽席之安乎數郡民生休戚之關孰有大於此者可以沮洳海濱地險辭而不為之悉心相度以期乂安吾赤子乎故於至杭之翼日即減從䟎程䇿馬隄上一一履視測度然後深悉夫柴塘之下不可施工以其實繫活沙樁橛弗牢訖不可以擎石也柴塘之内可施工而倉卒不可為以其折人廬墓桑麻填坑塹未受害而先驚吾民也即云成大利者不顧小害然使石塘成而廢柴塘是棄石塘以外之人矣如仍保柴塘則徒費帑項為此無益而有害之舉滋弗當也於是定議脩柴塘增坦水加柴價一經指示而海塘大端已具守土之臣有所遵循即隨時入告亦以成竹素具便於進止也議者或曰所損者少而全者衆柴固不如石堅何為是姑息之論然吾聞古人云井田善政行於亂之後是求治行於治之時是求亂吾將以是為折中而不肯冒昧以舉者此也踏勘尖山之日守塘者以漲沙聞後數日沙漲又增命御前大臣誌石簍以騐之果然自初三日親臨閲塘後即命都統努三額駙福隆安立標於石簍之上以騐増長今復遣往視回奏云十日以來沙漲至三尺餘土人以為神佑斯誠海神之佑耶但丁丑以前已趨中亹者尚不可保而况今數尺之漲沙乎然此誠轉旋之機是吾所以黙識靈貺益勵敬天勤民之心也是吾所以望神禹而怵然以懼慙無奠定之良䇿也至海寧日即䖍謁海神廟皇考御製文在焉因書此記於碑隂以識吾閲塘咨度者如是固不敢以己見為必當也御製文初集巻七
