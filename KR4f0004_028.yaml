front:
  text: 欽定四庫全書御製文初集卷二十八
  hash: sha256:00bafc9a46d9976df05701588726dfa2e91e87b3b66a7b7ccd96e1830c91b8ba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_028-1a, image: WYG1301/WYG1301-0241c.png}
body:
  text: 贊列代賢明妃后垂稱奕世者取繪十二繫以贊西陵教蠶在昔軒轅正妃嫘祖孕虞育唐發湯啓武得姓十二如千子乳創制蠶織窳陵為輔衣被天下功垂萬古後世文勝乃崇黻黼太姒誨子昏姻匹妃王化之始維周勃興嗣徽太姒富而能儉貴而不恃載在風詩葛覃卷耳更勤教誨有穀貽子昭哉嗣服武周濟美姜后脫簮黃裳六五以順為正子有幾諫妻寧無諍卓哉姜后宫闈之鏡金環進退瓜瓞衍慶彤史攸司慎儀宜令雞鳴朝盈脫珥待命樊姬諫獵先民有訓聿戒禽荒卓彼樊姬感悟楚莊有肉弗御乃止王欲一語進賢霸功以卜不謂婦人克相其君邈矣邑姜十亂稱臣燕姞夢蘭乙始啓商蘭亦徴穆吉人在宫天使貽穀國香揚揚掌夢其卜嘒彼小星三心五噣椒聊逺條爰昌七族鄭多君子宣尼所録許后奉案后母天下首崇儉德坤順承乾柔嘉維則繄維許后貴而能抑不忘寒微車服是飭日朝長樂用修婦職懿彼芳型永為後式婕妤當熊圈熊攀檻羽林驚迸得人則止誰歟知命婉孌季女忠貞維性直前當之熊為戢橫六宫咸怍一人倍敬埋禍無悶中語傳競班姬辭輦王者求賢爰載後車左右前後正士與俱景仰休風三代之隆何逮漢季嬖媵輦從一言稱善如圜斯轉永鑒班姬逺彼婉孌馬后練衣十嵗持户侯家整肅母儀天下六宫欽服練裙浣衣以率戚族儉德之共綏將福祿車水馬雲明訓在牘豈伊輝漢作則椒屋徐妃直諫元成有言願為良臣流風丕振乃自宫嬪徐妃上書東征抗陳惜哉唐宗納而弗斷外事征討內營宫館頓忘初年如圜斯轉昭容評詩玉稱降天乃生女子衡才汝耶孩笑而唯昆明賦詩綵樓落紙辭華哲匠月旦自彼千載騷壇一時牛耳展如之人文亦可喜曺后重農稼穡維寶王政所崇襏襫耒耜必親必躬維宋曺后播種于宫倣佛親蠶獻繭效功克勷內治聿著芳踪嗤彼雕鏤何事傷農闕里十贊有序戊辰春二月東巡狩奠先師法皇祖也日戊寅至闕里所司以詰朝舉祀禮具儀聞朕惟車駕既蒞廟貌遙瞻隔宿偃居非所安也爰以始至日瓣香瞻謁肅拜以布誠待質明而釋奠斯於禮為宜乃易吉服率近臣入萬仭宫墻歷奎文閣撫遺檜過杏壇遂登大成之殿以展謁焉粹容如日月麗天聖蹟似江河行地既而周循右序更轉左廂所云金絲詩禮故井故宅無不考其蹟而想見夫子之遺澤至今存也為之歔欷為之䖍悚夫孔子萬古一人也誰能贊之然天地不言其髙厚而生天地之間者無不知天地之髙厚是贊也亦如是云爾萬仭宫墻芚豫自幼被服聖言眀德新民知易行難顒有素誠瞻謁尼山亦既蒞止敢云得門奎文閣奎婁垂象爰在魯東夫子之文天地並隆煌煌御書充牣其中先聖後聖其揆則同手植檜文欄肥壤厥有檜株先聖攸植繄手澤餘幾經枯榮左紐右紆造物憑護孫枝扶踈杏壇憶昔緇帷詩書授受與有榮焉軼桃轢栁博厚髙明亦曰悠久萬世受治杏林何有禮器祗謁先師載觀禮器犧尊象尊伊古之制有道存焉儀型攸繫申命太常記豫初祭聖蹟殿眀王不興夫孰能宗豈無宗者邈矣莫從鐫勒苕華景仰遺踪七十三年雲中見龍金絲堂禮樂詩書金絲萬古豈繫魯恭廣宅斯舉在左移西亦惟其所懸甕乃神夫子不語詩禮堂昔者趨庭詩禮垂訓維言與立伊誰不奮九仭一簣願勉乎進御堂聽講景仰聖舜故井疏食飲水曲肱樂之既清且泄汲繩到茲我取一勺以飲以思嗚呼宣聖實我之師故宅門居廟之左厥門斯故藻繢不施意存後素徘徊瞻仰心焉學步告爾後人由茲義路漢柏贊鬱鬱嵩陽枚枚書院仙柏挺生代紀炎漢匪漢伊始錫名始見伯仲大椿招搖佺羡豫奉慈闈省方周甸望古徘徊祝釐宴衎繪圖以歸璇宫拜獻正值稱觴日長綵線鳯翥鸞翔金輝玉燦怡顔顧之同增遐算如呼其三永夀於萬慈竹贊有猗者篔異幹並根傍以文石生於沃原詎擬渭川奚必嶰谷鳯影龍文詩人詠足嘉茲德植其名曰慈萬葉千篠百世本支不老後天密䕃垂露有雲有仍如復如顧山樵創法繼者石田撫厥粉本載獻夀安華有同不樹稱連理取義徴祥其焉匹此芳飇若拂愛日初長翠映萱階萬夀無疆十六羅漢贊第一阿迎阿機達尊者龎眉皓首赤腳露肘一亦不立二復何有左執提罏香雲無量以拂拂之是真供養第二阿資答尊者扼腕趺足宴坐偃息問此大士為語為默默者動母語者靜因動靜兩忘誰為法身第三拔納拔西尊者住可住山證無所證或問佛法竪二指應髮長更籋髭生不除去留之間寄此幻軀第四嘎禮嘎尊者聞之吾參心廣體胖芥及須彌何隘何寬雙手指端各振金鈴即聲即寂非寂非聲第五拔雜哩逋答答喇尊者衣取蔽身座取息體同異色空示之一指在鉢刺拏隨喜六檀檀喜相忘亦不相捐第六拔哈達喇尊者肩披七條耳屬雙環是栗棘蓬是金剛圈貌狠可怖其心則慈慈狠胥幻稽首導師第七嘎納嘎巴薩尊者心似枯木面若凍梨古有彭聃見其孩時手拖絲縧其長如許縛乎解乎惟人自取第八嘎納嘎拔哈喇錣雜尊者著迦鄰陀藉以蒲團展目揚眉亦不止觀歸根得㫖隨照失宗得失失得同乎不同第九拔嘎沽拉尊者萬物我備何踈何親手撫山鼯喜其性馴馴則不擾喜則無憂與諸衆生佛土優游第十喇乎拉尊者如來轉物衆生物轉誰識此者頂門巨眼持七寶冠將供如來有能所乎不言已該第十一租查巴納答嘎尊者端坐叉手具何神通有相無相孰是真宗頂後圓光如月入懷行腳事畢幾兩草鞋第十二畢那楂拉拔哈喇錣雜尊者左擎梵帙右挈鍵􅀈行住坐卧不即不離佛出世時度此黃耉說法則雄如獅子吼第十三巴那塔嘎尊者佛陀羅尼按之在手面暈霞紅如醉於酒於四諦理斷疑惑根巴那塔嘎是聞佛所云第十四納阿噶塞納尊者振隙棄羅瞪目傾耳視乎聽乎非彼非此左持淨瓶貯如意珠意且假名珠誰如乎第十五鍋巴嘎尊者我觀四大孰是真常水流石冷風過花香尊者橫經注其兩目何不啓觀未觀意足第十六阿必達尊者色相雖幻壯則勝老豈其揀擇護茲三寶雙手擎塔其質黃金是法華劫示現至今十六羅漢之名見於梵經納納達答喇傳及法住記俗所稱十八者不見梵典咨之章嘉國師云西域但有十六之號而無十八若增以第十七嘎沙鴉巴逹喇瑪伏虎尊者第十八納納答密答答喇降龍尊者則正符今之所謂十八也宋蘇軾十六羅漢贊不載其名復有十八羅漢贊備書梵號其前十六人與法住記合而後二人一曰慶友即所謂難提蜜多羅為諸苾芻說十六大阿羅漢住處者一曰賔頭盧即賔度盧跋羅墮闍實乃一人重出良由此土僧伽未能深通貝策展轉傳訛博辨如軾亦不免因人致誤耳夫神通顯示多至五百若八百乃至九十九萬億奚事十六十八之斤斤哉顧佛薄伽梵般涅槃時以無上法付囑十六阿羅漢令其護持自當以十六為正前人畫羅漢相如張僧繇盧楞伽二人皆止十六斯亦一證也茲命丁觀鵬寫十六應真像成朕各為之贊而應真法號一正以章嘉國師所定同文韻統合音字并系唐古忒梵字於前有學無學人可共證之云釋迦牟尼文佛贊轉物覺生能仁調御寶月常圓法雨普霔天上天下世出世間六度萬行作如是觀趙修録羅漢贊手持明珠瀉之為水赤腳踏波渡不須葦是一是二非彼非此和南應真全身裏許丁觀鵬摹丁雲鵬羅漢贊具足神通如是游戲狂象獰龍孰非我類無降伏意有皈依心厯厯淨土馥馥香林進者呼來繼者應往借問何之極樂安養四大本幻作麼傳神雲鵬觀鵬前身後身丁觀鵬摹丁雲鵬十八羅漢贊應真二九林間宴息或具威儀或露肘臆龍女捧冊童子華瓜孰凡孰聖分疏則那異類中行如是處止金不博金水不洗水五體三鬛同乎不同厯劫游戲大圓鏡中福祿夀三星贊福我受命溥將詩降福穰穰詩大有元亨易用敷錫厥庶民書豈弟君子詩受天之祜詩永言保之詩俾緝熙于純嘏詩祿俾爾戩穀詩受天百祿詩惠我無疆詩寵綏四方書受小球大球詩天其申命用休書綏萬邦屢豐年詩萬物皆致養焉易夀天保定爾詩萬夀無疆詩保合太和易身其康强書君子所其無逸書信彼南山詩以引以翼詩惟曰欲至于萬年書丁觀鵬畫不二圖贊居士示疾調御遣視五百菩薩不任其使曼殊室利稽首請行常言致問盡契佛經曰色曰空是二是一竪雙指應擬議即失天花繽紛散天女手咨是空色花曾著否姚文瀚掃象圖贊檀林宴坐義手如如牽來香象課童掃除象即非象塵自何來曰何來者寧非纎埃踏河到底驚雷成紋具此正見曾不疏分大士不言象自了了運帚揮苕侍者顛倒御製文初集卷二十八
