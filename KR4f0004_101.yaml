body:
  text: 恭跋皇考詩文餘集洪惟我皇考御極以來勤政之暇每以詩文紀事巨細畢該天人理貫誠圗治之權衡臨民之準則也自乾隆元年丙辰至六十年乙卯詩成五集共得詩四萬一千八百首文成三集共得文一千三百五十五篇富有美備不可殫書滿望夀越期頤長瞻天藻與日月同輝昭垂不朽願未能遂痛莫能伸今夏宫中守制敬於幾暇校閲黃綾詩文本計自後丙辰至戊午三年中併己未正月復得詩七百五十首文三十六首謹編成餘集命尚書彭元瑞侍郎戴衢亨敬司其事顧餘集之名非豫小子所敢臆造恭檢戊午避暑山莊鑑始齋御製詩附識內云計丙辰至今又閲三年復得詩數百首此後應於五集外另編餘集煌煌聖諭敢弗敬承餘集中諸作訓政居十之七八不倦於勤孜孜以誨豫小子為先務方期日聆庭訓永侍慈顔得所遵循免致失措况近年邪民弗靖塗炭黔黎示以行軍勝算勉力籌幾雖逆首連伏憲章餘孽未能盡淨己未正月二日力疾成望捷之詩孰意此章竟為絶筆嗚呼痛哉天下臣民讀殘赤不勝災之句亦可知豫皇考愛民之一念直流傳於億萬祀亦可知豫承皇考之訓誨除邪安民之苦心實出於萬不得已也餘集既成敬跋於末頁系以銘曰文以傳心詩以言志日月麗天江河行地六十四年實心實事萬有畢該衆理咸備法祖敬天臨民圗治文德武功良猷薈萃顧豫藐躬欽哉後嗣若凛淵氷持盈恐墜憶昔承歡膝下日侍捧爵依筵隨鑾攬轡莫覩慈容昕朝揮淚倐過小祥邪氛猶熾望捷未酬憂懼叢積願鑒寸忱速昭靈異佑子佑民遺謨早遂庚申孟秋拜手敬志
