body:
  text: 論論趙簡子齊威王事近書向所題養正圖解以向所題語猶有未臻者兹故申而論之夫此二事讀書者所咸知亦咸以為英舉者雖然欒激阿大夫非簡子與威王所用者乎進過求譽者固有罪則用而聽其進受其求者獨無罪乎而沈之河烹之鼎亦所謂牽牛蹊人之田而奪之牛罰亦重矣盖簡子威王以為必如是然後可缷已過邀人譽而置人命於不問斯亦狠矣斯亦不足譽而已矣伊尹周公諸葛亮論輔少主而能格其非終成令辟者伊周尚矣諸葛亮有伊周之能而未成其志斯可哀焉是以叙而論之夫千古之君孰非受天之禄者哉然錫禄在天而能否承之則在為君之人不惟其人之身尚視其祖宗之所以基命宥宻制治保邦之深淺有以荷鴻庥而垂永祚如太甲成王是矣太甲去湯弗逺成王去文武亦弗逺成湯文武之澤未斬也是以伊尹幽王復辟克終厥徳然孟子已云有伊尹之志則可無伊尹之志則簒矣若夫成王之過未如太甲三叔流言起自近親周公天子之叔衆所仰望若如伊尹營宫之事則天下歸心成王不得為王矣周公豈肯出此亦惟有避之而已不忍為伊尹之為也孟予所云周公之不有天下猶益之於夏伊尹之於殷盖求其說而不得強為之辭並伊尹之志亦失之矣終以雷電示警親迎公歸稱守成之令主者首數成王非周公之徳有以感天而格王乎且成康之後今何在焉而元聖之祀千載東魯其百倍之勝於有天下者為何若予獨惜夫諸葛亮之有伊尹之能而未成其志遇劉禪之昏足以亡漢則亦有說焉盖光武明章之徳不及成湯文武逺矣不惟五世而斬而又加之以桓靈之殄徳天之厭漢久矣諸葛亮一人其能挽漢已墮之運㢤且其時外有強隣自救之不暇使亮而為伊尹之事蜀中先自亂安能尚存乎予讀出師二表實矜亮之心且憐亮之不能為伊尹之事而終於責為人君者當識天難諶命靡常兢兢業業以永保其祖宗之基或庻㡬乎蘇軾御書頌論蘇軾此頌盖因仁宗為太子時書賜張士遜而作也其文其書固美而其事則有大謬者是以叙而論之夫太子者儲貳之君易所謂潛龍勿用也兹公然曰寅亮天地弼予一人又曰日新其徳夫日新其徳猶可寅亮天地弼予一人則真天子也将置其父於何地且仁宗固為天子矣士遜亦為丞相矣即位之後書以賜之則可未即位不可為此言亦不當存此心也夫蘇軾固通古今達時務之人幸其時無江充李林甫之流設有之則太子危矣尚何徳之可頌而軾乃頌之乎然考仁宗以十二嵗即位則在東宫時甫十嵗十一之間亦不能知此文義書以賜人若果知此文義出於自為則是志大言侈昧勿用之理更為不當其即位之後必大有更張見長之事仁宗無之也盖仁宗不過温柔忠厚之人亦不能為此予以為此事出於士遜之偽為欲以榮耀眩世彼固依違曹利用之流耳但考軾為此頌乃因士遜之曽孫欽臣之請作於元豐七年去仁宗時六十餘年矣其真其偽皆不可知抑亦如昌黎諛墓之為乎是以君子立言不可不慎也蘇楊論蘇武留匈奴十九嵗而還楊重英留緬甸二十一年而還念其事相類作蘇楊論武在匈奴餐旃齧雪勢不能久向已有說然其娶妻生子漢書章章可考重英在緬甸其誓死不降與武同而無武娶妻生子事今呼路人而詢之曰重英與武孰優必甲武而乙重英彼故不知武之為何如人何如事徒以羶薌久而耳食熟耳則司馬遷所云非附青雲之士惡能施於後世語誠不爽緬甸之歸順也總督富綱猶責其弗獻重英予以為過於羅索既而其長隨以重英及其時被遮之兵並自暹羅所獲粤民致之邉及入邉重英謂同歸之兵曰今生還本朝即伏國法亦瞑目是可哀矣問其在緬有無易衣娶妻生子事則皆以為無而重英本抱病來因遂故以其志可憐憫命給道員銜仍将録其子夫重英究為在緬偷生兹仍加薄恩所為仁義兼施教忠之道也若武之為典屬國漢之恩為過優矣而猶有嘆其被賚薄者是何耶且以重英所為較武有過之無不及武乃奉使而重英則不過從軍被拘留也若曰因附青雲而得名之傳則其傳與不傳固不足為貴耳四得論昨自避暑山荘迴至御園之作有慙愧徳無稱四得之句盖引而未發兹乃敘而論之夫子思引孔子之言以為位禄名夀胥因徳而得之則知有徳而得之者為實無徳而得之者為虚若予無其實而得其虚其慚愧可勝言哉盖予之位天地之所命祖宗之所授無是二者予因何而得之亦惟栗栗危懼慮鰥厥官遑敢自詡其得以傲物哉至於禄則九㝢所同仰萬民所共奉豈啻十目十手之視指哉豪釐之失謬以千里威福玉食一涉私欲之作必致越其始而隕厥終能常保其得乎若夫名為實之賔實則賔之主也居九重之上臨百辟之尊孰不以虚言譽之即今八旬大慶之獻詞頌者不可僂指數則此名也亶其實乎雖文治武功微有實蹟之可稱然無一不由兢兢業業中所出且恐具其始而失其終得将不保敢自怡乎兹逮八旬不可不謂之夀然此夀乃天地黙佑祖宗延禧予一人幸逢其會敢強顔以為有所致哉且予五十五年之間無一日因微疾而不理事者求仙素所鄙即醫理並不識亦惟慎起居節飲食以為養生之常道耳則又有何術之可得凡此四者皆予所得而實皆非徳之所致也非徳之所致則所謂有其名而無其實忸怩之不暇又何能蕼然自居而不疑方将慎半九十之懼孜孜矻矻以待五年之歸政可稱全人則惟敬待天恩而不敢或必者耳著論自警並以示羣臣之獻詞頌者四得續論近作四得之論非自謙也盖紀身之鮮實徳與已之所實見耳然尚有未盡意者前論切乎已續論公天下抑亦有所獨重者耳盖中庸第十七章子曰至子孫保之而止所以戒為天子者保其位而已此皆夫子之言其下四得之譯意謂子思之語非夫子之語也以位言之易曰君子思不出其位則君子之位也又曰聖人之大寳曰位則聖人之位也豈必曰天子之位乎堯舜禹有天子之徳可謂得天子之位其餘皆不可謂得天子之位孔夫子有聖人之徳可謂得聖人之位其餘皆不可謂得聖人之位也孟子所云故益伊尹周公不有天下其心未嘗不羡天子之位雖欲行其道之意耶然非至言也盖益得益之位伊尹得伊尹之位周公得周公之位非不得也若孔子必無是語而朱子注子思此章直以為必受命為天子是亦孟子之遺意耳予以為後世之亂臣賊子未必非此言有以唘之然此言非予言之他人不敢言也且自古至今無一代無天子是皆得其位者乎予不敢以得位自居實因徳不勝而滋懼耳至於禄則自天子以至百辟卿士皆食禄者也盡其職乃可謂之得鰥厥官不可謂之得而其本均不出於修徳也王禹偁待漏院之記微見其端矣若夫名乃實之賔實者徳之謂也無其實而有其名不滋愧乎三代以下惟恐不好名予謂此語亦未臻而清流操室中之戈者非因名有以害之乎夀則秉來之氣數所不可強盜蹠夀而顔淵夭盜蹠果得夀乎顔淵果不得夀乎古來盡節以終者謂之不能得保其夀可乎兹故申而論之以戒後世之不務脩其徳而徒慕四得以反致敗其徳且以靖天下後世之託聖賢之書以妄興其欲有所得之位之心有位與無位之人可不深思所以自䖏㢤作是論時引用繫辭聖人之大寳曰位盖亦斷章取義耳予之意則以天子有天子之位聖人有聖人之位分而言之然亦非始予意也盖中庸上節孔子之言徳為聖人尊為天子已區而二之矣既而思之繋辭本文下即繼以何以守位曰仁何以聚人曰財理財正辭禁民為非曰義是則天子之事也似繋辭所指聖人即天子也然按諸經從無尊當時天子為聖人如後代所稱聖君聖主聖上者大禹謨乃聖乃神為益對舜稱堯之辭微子之命克齊聖廣淵為成王對微子稱湯之詞皆非稱當時天子也三代上君臣之際情親而語質無取乎頌語惟荘子華封人祝堯使聖人夀使聖人富使聖人多男子為當時語堯固聖人也然則稱天子為聖人起於周秦之間亦如朕之字専為天子自稱乃昉自秦也十翼為孔子作不應繋辭有是語且上繋第十一章莫大乎富貴莫大乎聖人又分著矣歐陽脩以擇之不精繁衍叢脞近於戰國後語疑十翼為雜取後世講師之說非孔子所作亦不為無見論成偶思及此并按於後脩徳脩刑論管子曰日食修徳月食修刑斯言也千古以為至論而予則以為未臻何言之為人君者無時無刻無不宜修徳與修刑必待日月之變而後修之不已逺乎設遁其辭曰日者陽之屬遇變則更宜修徳月者隂之屬遇變則更宜修刑不知日變恒少月變恒多日行一嵗一周天月行一月一周天日月近交則食雖入交而非朔望則同緯而不同經當朔望而不入交則同經而不同緯皆無食必經緯同度而後食月行速與日近交次數較多故月食多於是有一嵗兩食者日行遲與月近交次數較少故日食少於是有隔數嵗一食者此求日月食一定之法也或隔數嵗或隔數月遇其時更當修之不遇其時可以不修乎且視徳與刑為二事君之修也有可急可緩之時是大不然矣御製文三集巻二
