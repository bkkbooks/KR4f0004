body:
  text: 記玉甕記昔閲輟耕録及金鰲退食筆記知有元時玉甕而淪為西華門外道人貯菜器命以千金易之仍設承光殿一再題詠亦既惜荆凡惕殷鑒矣既而定回部悉有産玉之山孕玉之水蓋水孕者精而山産者巨因命輿致一山産者為玉甕則較承光殿所設者質美而工精於庚寅春與諸翰臣聨句而落成之一之為甚豈可再乎乃今復有玉甕之記則以事有不期而文有紀實所以志吾幸抑以志吾過也其志吾幸也若何回部逺在萬里之外自古中國所不能臣今則一視郡縣取携自如且元時僅能致其一今則有其二而質美器巨乃過之雖弗侈言懷畏而較有元為勝此吾所以為幸也其志吾過若何方取斯玉於密爾岱之山也司事之臣蓋駐葉爾羌之大臣瑪爾興阿於凡鑿採遞運無不給以日價茶鹽衆回初無工役之苦其後髙朴代之不唯減其官給抑且勞以私力為竊取牟利之計於是窮回胥怨幾致激變幸因塞提卜阿爾迪之訐命永貴審明置髙朴於法而回衆始安髙朴代瑪爾興阿為葉爾羌駐劄大臣到任後勒索回衆金寶剋減官給回人之茶鹽又與伯克厄對阿布都舒庫爾郭普爾等通同作弊請開密爾岱山𣲖回人三千餘至山採玉所獲大小玉料無算勾通姦商私售牟利回衆被纍無不怨憤適命永貴至彼經阿奇木伯克塞提卜阿爾迪列欵呈首永貴據實入告事始敗露若再擾纍日久葉爾羌回衆憤怨益深必致激生變故因諭永貴將髙朴等嚴訊明確即於該處正法示衆其派往採玉之回人並令查明免其來年應納之稅以示體恤回衆始各歡然寧貼此吾所以為過也夫為幸不過騁一時之觀設為過而反之不速則或失土地而興兵戎成何事體不將貽笑後世乎然其反之之速蓋難言矣夫非明理識人公而無私正而能斷未有不因遲疑以致決裂者今則誅僨轅而致重器葉爾羌萬里以外羣回安堵有熙皥之樂免兵戈之苦是吾於志過之中而又有大志幸者存焉故為文泐甕中吾子孫視此文當以吾之過為戒不可以吾之幸為可幸徼尚慎旃哉戒得堂後記戒得之義於前記言之宜無不盡兹後記何為而作也曰前記之義蓋言其欲得兹後記之義乃言其已得欲得者有形得與失任彼其過小已得者無形得與失任已其過大兹後記之戒所以不可不謹不可不作也夫已得則有形而吾謂之無形且曰任已而其過大者何試以吾之所得者言之平伊犁定回部靖金川不為不遐不為不偹是皆有形者然而消息盈虛之理滿損謙益之機伏於無形苟有或渝復隍隨之故戊寅之嵗作勒銘伊犁之碑於凡栽培傾覆之道屯種萬里外非計之得三致意焉至今亦草餘年矣荷天之寵疆宇日以安耕闢日以廣方敢言有形之得而吾心之栗栗危懼於無形以戒夫或有所失而不能保其得全之意豈謂此一記遂足以息吾肩而卸吾責哉亦惟日慎一日以待吾歸政之日而已爾文溯閣記輯四庫之書分四處以庋之方以類聚數以偶成文淵文源文津三閣之記早成則此文溯閣之記亦不可再緩因為辭曰權輿二典之贊堯舜也一則曰文思一則曰文明蓋思乃藴於中明乃發於外而胥藉文以顯文者理也文之所在天理存焉文不在斯乎孔子所以繼堯舜之心傳也世無文天理泯而不成其為世夫豈􅖳槧簡編云乎哉然文固不離乎􅖳槧簡編以化世此四庫之輯所由亟亟也兹則首部告成綱紀已定與之暇以究其核督之勤以防其忽乙夜幾暇亦亹披覽怪僻側艷滌濯剗磢犁然理明裒然文顯所餘三部惟鈔胥之事然而豕亥陶陰猶不可不讐校也四閣之名皆冠以文而若淵若源若津若溯皆從水以立義者蓋取范氏天一閣之為亦既見於前記矣若夫海源也衆水各有源而同歸於海似海為其尾而非源不知尾閭何泄則仍運而為源原始反終大易所以示其端也津則窮源之徑而溯之是則溯也津也實亦逮源之淵也水之體用如是文之體用顧獨不如是乎恰於盛京而名此名更有合周詩所謂遡澗求本之義而豫不忘祖宗創業之艱示子孫守文之模意在斯乎意在斯乎重華宫記宫殿之制乾清坤寧二宫為紫微正中左右各二永巷每一永巷以次列三宫斯為十二宫其後東西以次各列五所重華宫則昔之西二所也雍正年間豫蒙賜居於此即位後應升為宫彼時大學士鄂爾泰張廷玉擬以重華為額雖頌之意耶而規即在此是以俞而稱之夫重華協帝豈易言哉必有所以敕幾興事知人安民而其本則在於審危微之心執精一之中是以四十餘年惟日孜孜宵衣旰食雖未致隕越而於熙世化民究無所成是故紀恩堂之記為於丙戌抑齋之記作於辛卯凡所以遲遲慎重者恐有言行不符致負初心耳若夫重華宫之記自不可闕而其應慎重又奚啻前二記之比哉少而居之長而習之四十餘年之政皆由是而出之兹去歸政之年亦祗一紀然豫猶是豫也政猶是政也寰區猶是寰區也而户口日以增榖帛日以昂養且不能那更言教蒿目焦心難臻大當回思居是宫勤聖學而談王道不唯莫之有為而竟失於無策則是記也亦自訟自責之章益增慚愧而已昔宋孝宗倦勤之後所居號重華宫此係近年觀武林舊事而知者其名不約而同然既為上皇奚取重華之義彼其之人實非豫所羡也一紀之後將退居寧夀宫亦不忍移此名於彼蓋宿學之所安舊劍不能忘也是以四十八年以來元旦除夕無不於此少坐新正與諸臣茶宴聫句率為例典異日歸政或時一來臨更成佳話其能踐斯言與否則敬俟昊蒼之春佑今日之下亦不敢預為侈談也五經萃室記事雖大而無關於天理人心之正者不可炫其有文而為之記事雖小而有關於天理人心之正者不可􅍀其無文而弗為之記兹五經萃室之記蓋有合於後之所云五經之有關於天理人心夫人之所知也而謂其事小者徒以萃宋時嶽珂所刻之五經故曰小然而六百嵗之間分之復合散之仍聚則其事亦不謂小而况闡數大聖人之精微示天理正人心斯可􅍀其無文而弗為之記耶嶽珂所刻之五經奈何蓋自乾隆甲子時薈萃宋元明三代舊板藏之昭仁殿名曰天祿琳琅其時即有嶽氏所刻之春秋未詳其所由來亦不過與别部春秋一例載之天祿琳琅之書而已兹復得嶽氏所刻易書詩禮記四種而獨闕春秋因思天祿琳琅中或有其書命細檢之則嶽氏所刻之春秋故在其板之延袤分寸無不吻合而每卷之後皆有木刻亞形相臺嶽氏刻梓荆溪家孰印大小篆𨽻文楷書不等且每頁之末傍刻篇識如易之乾坤卦書之堯舜典之類其用心精而紀類審即宋板之最佳者亦不多見也至於收藏家則易書詩蓋同經七八家而略有異易書詩三經皆有晉府書畫之印及徐乾學季振宜陳定書李國夀陳氏世寶敬德堂諸印尚書又有覃懷李氏印蓋大同小異云藏禮記者四家晉府書畫印李國夀印覃懷李氏印敬德堂圖書印藏春秋者三家宋本印項氏萬卷樓圖籍印季振宜卬夫嶽氏之書既分而合幸合則不可使復分但天祿琳琅之書久成所録諸書皆以四庫分類架貯昭仁殿其丙申以後所獲之書别弆於御花園之養性齋以待續入兹撤出昭仁殿之春秋以還嶽氏五經之舊仍即殿之後廡所謂慎儉德室者分其一楹名之曰五經萃室都置一几是舊者固不出昭仁殿而新者亦弗闌入舊書中似此位置可謂得宜吾因思之位置一切政務亦能如是胥得宜乎所謂得宜者亦有合於天理人心之正而不違五經之旨乎刻書家多矣若兹分而復合者蓋少遂命選善書者如影宋鈔之例通鋟其五經正本以夀世而公來者吾於是慨武穆之忠而喜其有文孫承繼家聲也又恨宋髙宗之信姦相忘復讐而自壞其長城也又謂天之報施善人固不爽而司馬遷怨尤之語誠不足為信史也南巡記舉大事者有宜速而莫遲有宜遲而莫速於宜速而遲必昧機以無成於宜遲而速必草就以不達能合其宜者其惟敬與明乎敬者敬天明者明理敬天斯能愛民明理斯能體物千古不易之理也豫臨御五十年凡舉二大事一曰西師一曰南巡西師之事所為宜速而莫遲者幸賴天恩有成二十餘年疆宇安晏兹不絮言若夫南巡之事則所為宜遲而莫速者我皇祖六度南巡豫藐躬敬以法之兹六度之典幸成亦不可以無言我皇祖蕩蕩難名豫藐躬瞪乎景仰述且弗能作於何有然而宜遲莫速之義則不可不明示豫意也蓋南巡之典始行於十六年辛未是即遲也南巡之事莫大於河工而辛未丁丑兩度不過敕河臣慎守修防無多指示亦所謂遲也至於壬午始有定清口水志之論向來河臣率皆靳拆清口恐干多費工利之議洪湖盛漲則開五壩下河一帶無嵗不被偏災自壬午三次南巡始定髙堰五壩水志髙一尺清口則開放十丈為準俟秋泛後洪湖水勢既定仍如常接鑲口門嗣是河臣恪守此法數十年來下河免受水患田廬并資保護丙申乃有改遷陶莊河流之為向來清口每慮黃水倒漾康熙己卯春口迤皇祖南巡陶莊親蒞河干閲視形勢命於清西隔岸挑引河導黃使北因河臣董安國開放過早旋復淤墊其後庚辰辛巳壬辰甲午以及雍正庚戌厯命大臣會同河臣籌勘挑辦功迄未就嗣以黃水倒灌含開陶莊引河更無善策乾隆丙申春諭河臣薩載詳悉履勘繪圖貼説返往指示即於是年秋興工至丁酉仲春蕆事開放新河大溜暢達既免黃流倒漾之虞更收清水刷沙之益因命建見河神廟以答神佑詳御製碑記庚子遂有改築浙江石塘之工浙江海塘自戴家橋迤西皆柴塘不足資鞏護庚子南巡親臨閲視因飭該督撫於老鹽倉一帶改建魚鱗石塘仍諭令存留舊有柴塘以為重門保障辛丑壬寅等年陸續採辦石料勘估建築至癸卯八月該撫富勒渾福嵩等奏報石塘三千九百四十丈全行告竣今甲辰更有接築浙江石塘之諭浙江海塘老鹽倉一帶魚鱗石塘雖已全竣而章家庵以西惟藉范公塘土隄一道衛護形勢單薄不足以資捍禦因先期傳諭該督撫詳晰籌畫採石鳩工兹甲辰南巡親臨指示不惜百餘萬帑金降旨一律接築石塘俾濵海黔黎永資樂利至於髙堰之增卑易磚庚子南巡閲視髙家堰工據薩載請將三堡六堡等卑矮磚工加髙余以磚工究不若石工之經久因命毋惜帑費一律改建石工分年修甃以兾永逺鞏固徐州之接築石堤並山丁丑壬午乙酉三次南巡均至徐城閲視河工形勢次第籌辦添甃石隄俱用石十七層以資鞏固其舊有石工三假長九百七十餘文較之丁丑新建石隄短少二三層於庚子南巡時命嵇璜薩載會勘一律加髙十七層又自韓山至奎山一帶向止土堰兹亦一律接築石隄四百五十丈直連山腳俾濵河永保安居無不籌度咨諏得宜而後行是皆遲之又遲不敢欲速之為夫臣之事君其有知不可而強諍者鮮矣河工關係民命未深知而謬定之庸碌者惟遵旨而謬行之其害可勝言哉故豫之遲之又遲者以此而深懼豫之子孫自以為是而後之司河者之隨聲附和而且牟利其間也與其有聚斂之臣寧有盜臣在他事則可在河工則不可河工而牟利宣泄必不合宜修防必不堅固一有踈虞民命繫焉此而不慎可乎然而為君者一二日萬幾胥待躬親臨勘而後剔其弊日不暇給焉則仍應於敬天明理根本處求之思過半矣豫之舉兩大事而皆幸以有成者其在斯乎其在斯乎若夫察吏安民行慶施惠羣臣所頌以為亟美者皆人君本分之應為所謂有孚惠心勿問元吉豫嘗以此自朂也至於克己無欲以身率先千乘萬騎雖非扈蹕所能減而體大役衆俾皆循法而不擾民亦亟其難矣斯必有以振其綱而挈其要然後可以行無事而胥得宜實總不出敬明兩字而已故兹六度之巡携諸皇子以來俾視豫躬之如何無欲也視扈蹕諸臣以至僕役之如何守法也視地方大小吏之如何奉公也視各省民人之如何瞻覲親近也一有不如此未可言南巡而西師之事更不必言矣敬告後人以明豫志御製文二集卷十四
