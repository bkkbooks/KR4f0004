body:
  text: 巻之一詔丙辰元日𫝊位子皇帝並却上尊號詔諭重舉千叟宴加恩百嵗夀民等諭授受禮成申未撰進頌冊諸臣諭再免湖南湖北眀嵗應徵錢糧諭蠲承徳府屬眀嵗地丁錢糧諭命蠲免湖北被擾州縣及附近之湖南龍山四川酉陽地方本年應徵錢糧諭命蠲免四川達州陜西漢中興安府所屬被賊地方来嵗應徵錢糧諭命蠲免貴州南籠安順貴陽所屬地方未完銀榖及本年應徵秋糧諭再免貴州興義永豐等處一年錢糧及奬賞兵勇諭命蠲免四川夔州府屬明年應徵錢糧諭記匣衍記觀瀑亭紀實記序補詠平苗戰圖四章序巻之二識語上元前一日家讌親藩及曽元詩識語二月朔日作詩識語詠和闐白玉椀詩識語題文津閣詩識語詠荷一律識語安眠口號識語上元後一日小宴廷臣詩識語嫌偽詩識語題四朝選藻冊詩識語閲授受禮成示撰進頌冊諸臣諭識語上元日詩識語問津處口號識語鑑逺堂詩識語題和闐玉筆筒詩識語題韓幹畫馬詩識語戲題眼鏡詩識語直𨽻總督胡季堂奏報二麥約收九分有餘詩以誌慰識語口號識語鑑始齋題句識語含徳齋詩識語牣魚亭得句識語石城詩識語雜著書虞書舜典集傳
