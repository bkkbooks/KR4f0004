body:
  text: 辨三傳晉假道伐虢辨三傳為素王輔臣而各有失若夫志晉假道伐虢之事則更同一失而且相矛盾此不可以不辨也左氏稱晉假道滅虢在僖公五年冬師還館於虞遂襲虞滅之公羊榖梁則均在僖公二年而高之言則曰還四年反取虞赤之言則曰獻公亡虢五年而後舉虞雖楊士勛疏曰謂僖五年此蓋遷就欲合左氏之意然以荀息借道之言證之又當先五年亦不合宫之竒諫之日也異哉文人之紀事艷者務其富清者欲其婉辨者圖其裁而不論理之從違迹之真偽以致失之誣失之短失之俗雖前人已有定論而後之踵事增華者其才識已不如三氏重加之以阿好而毁惡則其事之可信與否又當何如哉若夫假道之事又可略言矣蓋所謂道者經由之路也晉在北而虢在南虞在其間晉欲滅虢假道於虞似矣然左氏稱宫之竒之言則曰虢虞之表公榖則皆曰唇亡則齒寒夫虢既在虞南則虞實表與唇非所謂虢也使虞虢疆相並而界相連如公羊所稱欲攻虢則虞救之攻虞則虢救之今破其相救之䇿權和一以攻一則可更不可言假道矣且以幣假道是有求於人有求於人者聽與否固未可定虞公雖至愚豈其貪璧馬而受亡國之憂哉以豫觀之晉即不假道其亡虢之後亦必將破虞不繫道之假與不假也則三傳之煩辭皆不必信而惟信經之二年虞師晉師滅夏陽五年晉人執虞公斯可廣陵濤疆域辨枚乘七發觀濤廣陵之曲江注云廣陵國屬吳自是詠潮數典者概舉廣陵而於其封域則姑舍而未詳酈道元水經注於漸江引海水逆流江水上潮似神而非為江流兩山間濤來高大之據亦不定云廣陵所屬自元時錢惟善試羅剎江賦始云惟羅剎之巨江實發源於太末人皆知此語始自惟善而不知惟善實祖元稹為問西州羅剎岸濤頭衝突近何如之句於是以浙江為曲江而浙江潮廣陵潮遂溷而為一矣夫乘漢人也其舉方域不能違漢制考漢書地理志廣陵國高帝六年屬荆州十一年更屬吳所治廣陵江都高郵安平四縣而錢塘在當時為餘杭𨽻會稽郡雖顔師古注有景帝四年屬江都之文劉敞駁其非是敞長於考訂其説必有可信則會稽之不屬廣陵明甚然以今日濤形論之揚子之潮雖亦應朝夕期候若七發所侔揣刻劃目為似神者固究於浙江之潮為近然其理又實有不可強為比附者即以乘所云弭莭伍子之山通厲胥母之場而言不特越絶書所云旦食於組山晝逰於胥母其文與姑胥之臺相屬即胥山之見於史記及吳越春秋者注一以為在吳縣西四十里一以為在太湖邉皆不出今蘇州境於揚於杭又皆風馬牛不相及矣揚子固不能逺踰吳松以通潮汐具區雖連亘數郡而去海逺甚浙江之濤又安能指數百里外之湖濵而弭且厲哉是乘之言已不免自相矛盾矣蓋七發之作不過文人托事抒藻之為如子虛亡是騁其贍博非必若山經地志専供考資者之脈絡分明也又唐李紳詩云揚州郭裏見潮生而蔡寬夫詩話亦以為潤州大江與揚子槗對岸瓜州乃江中一洲疑曩時大江之潮揚州固嘗見之又何必以文人怪異詭觀之辭夲無確據而拘墟享帚定以廣陵古國屬之餘杭抑亦刻舟膠柱之甚矣臣等伏見御製廣陵濤疆域辨考據精博思力高健實足以破羣書之疑而乃聖懷沖挹爰命臣等看詳臣等學識淺陋何能仰贊高深憶臣等少時讀書至枚乘七發所稱觀濤廣陵之曲江一語心竊疑之夫廣陵之名始於周顯王三十五年楚并越置廣陵縣秦屬九江漢屬荆州既而屬吳景帝四年為江都國元狩六年為廣陵國是廣陵厯楚至漢不易也而秦之會稽郡兼有吳越之地漢時雖亦同屬荆楚然景帝四年以後江都易王非廣陵厲王胥皆都廣陵並得鄣郡而不得吳則漢之廣陵國疆域不能至吳明甚既不能至吳豈能越二郡而兼有會稽之錢唐乘乃漢人以漢地證漢文其非錢唐之潮而為廣陵自有其濤審矣乘何以云廣陵之曲江耶按水經注浙江徑錢唐定已諸山水流兩山之間江川急濬兼濤水晝夜再來二八月最高峨峨二丈有餘吳越春秋以為子胥文種之神也此與枚乘七發所言情狀相似蓋本七發為注故於岷江條下語不及濤或酈道元泥於乘語耳至弭莭伍子之山通厲胥母之場地皆在吳然吳録所云胥山在太湖邉去江不百里是猶未至錢唐而闔閭之旦食組山晝逰胥毋與鷗陂石城長洲並稱則實近蘇之地而錢唐之濤亦不能至也再如篇內南山朱泛藉藉之口諸地名今亦未能確指其處文人之筆縱其所之無乎不可誠如聖論况楚太子吳客問答原與子虛亡是相匹不足深泥而廣陵之曲江五字終難強合竊謂江皆有潮非獨浙江潮之壯即不如浙何妨鋪張揚厲以作文瀾乘七發內似此者甚多豈能一一求其指實臣等惟有咏歎鴻文莫能妄置一喙臣莊有恭臣于敏中臣錢汝誠臣李因培恭跋翻譯名義集正訛嵗辛邜為皇太后八旬大慶年欲敬書華嚴全部以祝無量夀算因取宫藏明宣德間全書經閲之則稱于闐國三藏沙門實義難陀譯于闐之名見漢書即今所正為和闐而自古及今不易之回部也回部本自有回經不信佛教不宜有名僧譯佛經之事命考翻譯名義集則所載略同心知其非而不能為之説也問之章嘉國師乃知實義難陀本梵僧之高行者以今同文韻統證之應為施嘎剎納納低而直書之則為施剎難低此實義難陀所由訛而訛尚不至大相徑庭也施剎難低生於鄂德納答直書之則為鄂等答德納切漢字不可得當作吳人呼等音乃近之乃天竺之西印度也唐時此僧自天竺至中國譯經實見於梵經天竺畨經西藏及漢經高僧傳此鄂等答所由訛為于闐而其訛乃不啻魯魚豕亥矣於是霍然去疑而憮然恨法雲宋僧作翻譯名義集者之不悉心考究誤後世為不淺也雖然彼以一漢僧不深解梵語畨語梵音畨音即漢文亦非通今博古之大手筆也而勤索二紀乃成是編則其用力之苦亦有可尚向作萬泉莊記所謂賴有失實者存而得以考是非辨差訛未嘗無小補者未足深怪也既正其訛乃命司事者一依同文韻統所定書其名地至全集之似此錯謬者想復不少當付章嘉國師一一更正夫鄂等答訛為于闐不過音韻之偶誤耳遂致疑天竺為回部並有疑回部亦有佛教者展轉耳食愈幻愈逺豈特失之毫釐而且謬以萬里吾更因之瞿然有戒於綸綍之悖矣三韓訂謬嘗讀後漢書三韓傳稱辰韓人兒生欲令頭扁皆押之以石訝其説之悖於理而肆為詭誕以惑世也夫以石押頭壯夫且不能堪而以施之初墮地之小兒實非人情所宜有間考三韓建國本末諸史率多抵牾以方位凖之蓋在今奉天東北吉林一帶壤接朝鮮與我國朝始基之地相近國朝舊俗兒生數日即置卧具令兒仰寢其中久而腦骨自平頭形似扁斯乃習而自然無足為異辰韓或亦類是耳范蔚宗不得其故從而曲為之解甚矣其妄也且如漢人生兒常令側卧久而左右角平頭形似狹蒙古人生兒以韋帶束之木版植立於地長則股形微箕此亦皆習而自然無足為異藉如蔚宗所言豈漢人蒙古亦皆以石押之令其頭狹而股箕乎若夫三韓命名史第列馬韓辰韓辨韓亦曰辨辰而不詳所以稱韓之義陳夀魏志直云韓地韓王魚豢魏略且以為朝鮮王凖冒姓韓氏其為傅會尤甚蓋國語及蒙古語皆謂君長為汗韓與汗音相混史載三韓各數十國意當時必有三汗分統之史家既不知汗之為君而庸鄙者至訛韓為族姓何異扣槃捫籥以喻日哉且中外語言不通不能強為詮解者勢也今夫天昭昭在上人皆仰之然漢語謂之天國語謂之阿卜喀蒙古語謂之騰格里西畨語謂之那木喀回語謂之阿思滿以彼語此各不相曉而人之所以敬與天之所以感則無弗同若必一一以漢字牽附臆度之能乎不能夫韓與汗音似義殊謬而失之誣猶可也至於以石押頭之謬實悖於理斯不可也然則余之三韓訂謬之作烏容已乎哉御製文二集卷二十四
