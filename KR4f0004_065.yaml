body:
  text: 書事書髙士傳披裘公事晉皇甫謐著髙士傳凡九十人其記披裘公也則以季子令取遺金投鎌瞋目而言曰五月披裘負薪豈取金也哉季子驚謝而問姓名云云始讀而怟不知所謂既思而咍笑其騖於竒而晦於不知時也其意曰披裘公安貧樂道者耳夫冬而葛不能有裘也則樂之是安其所樂也夏而裘不能有葛也亦樂之是樂其所不必安也葛易有而裘難有炎易禦而寒艱禦不能具葛獨不可脫其裘乎然則披裘公反為趨炎者乎不然則其性情特殊於人而好為竒異以沽譽者乎是大不然也余故笑其騖於竒而晦於不知時也至夫王倪齧缺諸說益失不經宜例以夫子之不語可耳書史記漢髙帝論蕭曹等事史記載髙帝論蕭曹等事膾炙人口率以為吕氏之禍髙帝若先知而終令平勃安劉者然嗚呼世之好竒而不槩之以理有如是哉夫髙帝素稱知人善任而蕭曹輩五人又其所與共患難日夜咨􅓪庶事者有不知之悉而論之當乎若夫吕氏之禍髙帝所不期也吕氏之妬髙帝則誠知之然亦不料其日後狼藉若彼之甚也徒以微時結髮惠帝復年長是以割愛而立之此髙帝之韙也使帝預知必有後日之禍幾於移漢祚焉則帝權其輕重廢吕氏立趙王且遂其願以髙帝分羮之忍何不可為而獨顧惜吕氏徒令周勃為太尉以救漢祚於可存不可存之間雖愚者不肯為顧髙帝肯為之哉余故曰世之好竒而不槩之以理有如是哉失之毫釐繆以千里司馬遷蓋不能辭其責矣書黃庭堅為母滌溺器事明屠隆書二十四孝圖蹟稱黃庭堅性至孝身既顯貴仍為母滌溺器此事正史不載隆蓋私竊史記石建取親中裙厠牏身自浣滌移之於堅炫以為竒而不知其實失正道也夫大孝莫過於舜與曾子矣舜與曾子不聞有此也子夏曰雖小道必有可觀者焉致逺恐泥蓋謂此耳且蓬户甕牖貧窶之人家無次丁孰不為其親滌器是盡可謂之孝乎既至貴顯則孟子所謂居移氣養移體祿位足以榮父母奴婢足以供使令豈必躬自滌器而後為孝乎躬自滌器以為孝斯不啻徒盡小節乃務為竒名炫世背常經而失正道將知其必有不能盡孝之大者矣吾惜夫蓬户甕牖者雖有過此之節不得稱孝又鄙夫身既顯貴者區區炫竒節而以孝稱馬遷所云非附青雲之士惡能施於後世吁是即馬遷之所以取榮也歟抑亦馬遷之所以取辱也歟書明臣史可法復書睿親王事幼年即羡聞我攝政睿親王致書明臣史可法事而未見其文昨輯宗室王公功績表傳乃得讀其文所為揭大義而示正理引春秋之法斥偏安之非㫖正辭嚴心實嘉之而所云可法遣人報書語多不屈固未嘗載其書語也夫可法明臣也其不屈正也不載其語不有失忠臣之心乎且其語不載則後世之人將不知其何所謂必有疑惡其語而去之者是大不可也因命儒臣物色之書市及藏家則亦不可得復命索之於內閣冊庫乃始得焉卒讀一再惜可法之孤忠嘆福王之不惠有如此臣而不能信用使權奸掣其肘而卒致淪亡也夫福王即信用可法其能守長江為南宋之偏安與否猶未可知而况燕雀處堂無深謀逺慮使兵頓餉竭忠臣流涕頓足而歎無能為惟有一死以報國是不大可哀乎且可法書語初無詬誶不經之言雖心折於睿王而不得不强辭以辨亦仍明臣尊明之義耳余以為不必諱亦不可諱故書其事如右而可法之書並命附録於後夫可法即擬之文天祥實無不可而明史本傳乃稱其母夢文天祥而生則出於稗野之附會失之不經矣附史可法復睿親王書南中向接好音法隨遣使問訊吳大將軍未敢遽通左右非委隆誼於草莽也誠以大夫無私交春秋之義今倥偬之際忽捧琬琰之章真不啻從天而降也循讀再三殷殷至意若以逆賊尚稽天討煩貴國憂法且感且愧懼左右不察謂南中臣民偷安江左竟忘君父之怨敬為貴國一詳陳之我大行皇帝敬天法祖勤政愛民真堯舜之主也以庸臣悮國致有三月十九日之事法待罪南樞救援無及師次淮上凶問遂來地坼天崩山枯海泣嗟乎人孰無君雖肆法於市朝以為泄泄者之戒亦奚足謝先皇帝於地下哉爾時南中臣民哀慟如喪考妣無不拊膺切齒欲悉東南之甲立翦凶仇而二三老臣謂國破君亡宗社為重相與迎立今上以繫中外之心今上非他神宗之孫光宗猶子而大行皇帝之兄也名正言順天與人歸五月朔日駕臨南都萬姓夾道歡呼聲聞數里羣臣勸進今上悲不自勝讓再讓三僅允監國逮臣民伏闕屢請始以十五日正位南都從前鳯集河清瑞應非一即告廟之日紫雲如蓋祝文升霄萬目共瞻欣傳盛事大江湧出柟梓數十萬章助修宫殿豈非天意也哉越數日遂命法視師江北刻日西征忽傳我大將吳三桂借兵貴國破走逆成為我先皇帝后發喪成禮掃清宫闕撫輯羣黎且罷剃髮之令示不忘本朝此等舉動振古鑠今凡為大明臣子無不長跽北向頂禮加額豈但如明諭所云感恩圖報巳乎謹於八月薄治筐篚遣使犒師兼欲請命鴻裁連兵西討是以王師既發復次江淮乃辱明誨引春秋大義來相詰責善哉乎推言之然此文為列國君薨世子應立有賊未討不忍死其君者立說耳若夫天下共主身殉社稷青宫皇子慘變非常而猶拘牽不即位之文坐昧大一統之義中原鼎沸倉卒出師將何以維繫人心號召忠義紫陽綱目踵事春秋其間特書如莽移漢鼎光武中興丕廢山陽昭烈踐祚懷愍亡國晉元嗣基徽欽䝉塵宋髙纘統是皆於國仇未翦之日亟正位號綱目未嘗斥為自立率以正統與之甚至如元宗幸蜀太子即位靈武議者疵之亦未嘗不許以行權幸其光復舊物也本朝傳世十六正統相承自治冠帶之族繼絶存亡仁恩遐被貴國昔在先朝夙膺封號載在盟府寧不聞乎今痛心本朝之難驅除亂逆可謂大義復著於春秋矣昔契丹和宋止嵗輸以金繒回紇助唐原不利其士地况貴國篤念世好兵以義動萬代瞻仰在此一舉若乃乘我䝉難棄好崇讐規此幅員為德不卒是以義始而以利終為賊人所竊笑也貴國豈其然往先帝軫念潢池不忍盡戮𠞰撫互用貽誤至今今上天縱英明刻刻以復仇為念廟堂之上和衷體國介胄之士飲泣枕戈忠義民兵願為國死竊以為天亡逆闖當不越於斯時矣語曰樹德務滋除惡務盡今逆成未服天誅諜知捲土西秦方圖報復此不獨本朝不共戴天之恨抑亦貴國除惡未盡之憂伏乞堅同仇之誼全始終之德合師進討問罪秦中共梟逆賊之頭以泄敷天之憤則貴國義問照耀千秋本朝圖報惟力是視從此兩國世通盟好傳之無窮不亦休乎至於牛耳之盟則本朝使臣久已在道不日抵燕奉盤盂從事矣法北望陵廟無涕可揮身蹈大戮罪應萬死所以不即從先帝者實惟社稷之故傳曰竭股肱之力繼之以忠貞法處今日鞠躬致命克盡臣節所以報也惟殿下實昭鑒之書通鑒輯覽明崇禎甲申紀年事通鑑輯覽將成司事者舉通鑑綱目三編之例於甲申嵗欲大書順治元年分注崇禎十七年於下且凡勝朝事皆别書明而於李自成陷京師即繫以明亡余曰不可夫三編之例非述續編之例乎續編於元順帝二十七年即分注明年元主北奔而繫以元亡去至正二十八年為洪武元年且自順帝十五年明祖起兵之後於凡元政即别書元以示異雖臣各私其君之義也而朕實鄙之蓋以理責人者必先以理自處天下者天下之天下非一家之天下也言悖而出者亦悖而入居今之時貶亡明而尊本朝如明之於元其誰曰不可然朕不為也通鑑輯覽之書非一時之書乃萬世之書於正統偏安之繫必公必平天命人心之嚮必嚴必謹且正編續編既一正其自視尊大之陋習而顧於本朝嬗代之際有所偏向是不有恧於心而貽來世之譏乎兹於甲申嵗仍命大書崇禎十七年分書順治元年以别之即李自成陷京師亦不遽書明亡而福王𢎞光元年亦令分注於下必俟次年福王於江寧被執而後書明亡夫福王設於江南能自立未嘗不可為南北朝如宋髙宗之例也而奈其日即慆淫以致天命去而人心失是非開創者欲究我兵威而實守成者自失其神器也若夫唐王桂王窮竄邊隅苟延旦夕此正與宋之帝昺帝是同例不可仍以正統屬之用以示萬世守成之主思天命人心之難諶凛凛乎惴惴乎保祖宗所貽留為臣民所繫屬而不敢謬恃書法之可有髙下焉庶幾朕纂通鑑輯覽之本意或不失春秋大一統之義乎書蜀志諸葛亮傳七縱七禽事諸葛亮本王佐材而世或詡其事為神竒不折衷於正道致使鹽梅匡濟之器流而為黃冠術士之儕則一失之於陳夀之挾讐多貶詞一失之於裴松之之無學濫引注怪哉史筆已難得而付之挾讐無學之流則其事尚可問哉且以覔米不與即不為立傳之人而望其能通世理具正辭以紀如管樂器人之本末心蹟不猶北轅而適越乎諸葛亮之事不可枚舉即如先主永安數語孫盛已斥其非是兹姑弗論其征孟獲也正傳謂三年春亮率衆南征其秋悉平軍資所出國以富饒夫亮之表固云深入不毛矣彼不毛之地何致出軍資而饒國計至於裴松之引習鑿齒漢晉春秋為注乃云七縱七禽之夫一陳之頃固無七縱七禽之理若縱之去而復為陳戰以禽之則蠻烟瘴嶺之間如是七往返勢必曠日持久何能春出而秋還亮之表又云並日而食矣三軍儲偫何所取資此實事之必無而世反以此訝之為至神仰以為至竒耳食口傳羣然不以為怪至於亮之扶持危國鞠躬盡瘁以事其主之誠或鮮豔稱者豈非陳夀裴松之之罪哉嗚呼讀史者其能具卓識酌正理不為遊辭所誤者亦實希矣書司空圖論封建事王應麟著困學紀聞其考史類有云司空圖謂房琯建親王分鎮天下議肅宗以是疑琯受讒廢先是安祿山見分鎮詔書拊膺歎曰吾不得天下矣夫明皇雖從琯議何嘗免西蜀之幸長安之陷若琯之得罪實以誤用古戰法敗於陳濤斜其時帝雖恨琯喪師眷任未衰後始以挾黨背公出為刺史則琯之廢乃有以自取豈因賀蘭進明之譖哉蓋分鎮即封建之意司空圖猶惑於劉頌封建之說且阿其所好遂以為琯廢被屈耳封建之不可行栁宗元蘇軾言之詳矣兹不復論獨論司空圖之不達事理未免掩不善以著其善而王應麟採而録之津津然若有惜乎琯之去者雖善善欲長之義哉然未免重耳食而無目光矣書唐太宗欲觀實録事唐太宗欲觀實録而褚遂良不與觀後卒令房元齡上而觀之夫太宗英明之主也而何獨於此事乃憒憒若是乎人君言行即史官不記天下皆記之矣豈得遍天下之人索其記而觀之今太宗之言曰欲知前日之惡為後來之戒苟其謹言慎行雖不觀實録可也苟其恣意妄為則今日觀之明日忘之雖百觀實録無益也且太宗納巢刾王妃失德之甚者而新舊書本紀皆無此非史官所紀載者乎由是觀之遂良已不能逃為其君隱之罪則謬為不與觀之言為能彰其直乎綱目於是條下又注上見書六月四日事語多微隱謂元齡云云猶是史臣欲掩其不善而著其善之意所謂欲蓋彌彰胥不足為訓耳書南宋論兵事南宋棄河北而不守忍二帝而弗顧志恢復而知兵者莫過嶽飛一人以讒誅之是尚可與言兵哉而最可笑者莫若上皇與吳璘相論之事宋史稱上皇嘗問勝敵之術於璘對曰弱者出戰强者繼之上皇曰此孫武子三駟之法一敗而二勝吁其識之鄙可怪哉夫亦知孫武子三駟之法乎彼教田忌與諸公子置馬較射此尋常賭金為戲以是法相馳固當一不勝而再勝在馳射較勝負則佳而豈可以用之於行軍乎且是法也市井博奕之徒無不知之亦不得謂孫武子行軍妙算也夫兩軍對敵所貴先聲其勝敗祇在呼吸頃耳以大為小以强為弱不過俯仰之間今以弱者出戰以當敵之强者跌而不振後之强者亦將望風而敗又豈能收兩勝之功哉若夫臨敵出竒制變或先示之以弱而繼以强勇之兵搗其虛則可要非對戰時當使弱者居前而强者繼後也昔宋楚泓之戰襄公稱先道古言之非不亹亹而卒致於敗為天下笑豫謂髙宗之舉孫武子其亦類於此矣書通鑑宋太祖云守財事宋太祖禁永寧公主服貼繡鋪翠襦及斥皇后稱黃金裝輿意在崇儉似矣而所云為天下守財之言豫不得無鄙焉蓋守者保而有之又聚而儲之之謂也易曰何以守位曰仁何以聚人曰財傳曰財散則民聚但聞守位未聞守財且欲聚民必當散財今曰為天下守之則民何以聚乎其意若曰為天下守財將以散之於民則何不曰守此財以與民亦見其以辭害義矣且措大之語非藝祖所云乎斯語也措大者流必咨嗟嘆賞以為名談而實不宜出諸天子之口有如馬援守錢虜之誚耳豫即位四十年之間凡兩免天下正供一免天下漕糧而水旱蠲賑又不啻數千百萬故直鄙藝祖之言而不愧若其已不知節儉濫賜近幸而弗博施黎庶者其視藝祖又相去逺矣御製文二集卷三十一
