body:
  text: 賦鬬鹿賦有序或問哨鹿之義已具於前後二賦若夫鹿之所以致哨其義亦得聞乎曰善哉問蘇子不云乎物必先腐也而後蟲生之人必先疑也而後讒入之鹿不相哨何以致人之哨哉而其相哨也以鬬作鬬鹿賦其辭曰有八義之角獸當五月而解舊既新茸之漸生至仲秋而始就其角之未就也牡自牡而牝自牝其角之既就也牝隨牡而牡相鬬其牡自牡而牝自牝也有男女異路之風其牝隨牡而牡相鬬也有夫妻相庇之救雖或以豪相􅟃以力相寇諒其事則無曲故其義有可究然鹿之相鬬也不於九衢之市不於百畝之田必其深深林裏迥迥山巔車馬之所不至虎豹之所逺遷於是呼羣别隊防後突前互爭雄而較力不略遜而頓旋雖獵騎亦罕遇則文士固無從而見焉吾嘗從山莊而逰矣是地也雖避暑之離宫實絶塵之仙境外遮邏以延城中聳峙以峻嶺陡澗冷而泉清虛谷深而林靜於是麌麌之族祁祁之等既日孳而日繁乃時背而時並夫其寥寥秋令霅霅金颸景清兮氣霽巖額兮峯眉值萬幾之餘暇擕數騎而相隨或捨馬以更進豈由鹿之為欺則見兩雄賈勇誇匹敵強角如戈利目似電光蹄卓立以擇勝胸憑怒以當場奎踽則林壑為之搖蕩嚶咿則風露為之飛揚竦體則髙膺鶚厲待觸則強項蝟張九天九地之機莫窮其壯三出三入之態愈奮其剛吾因之思其神趣觀其猛勢而從禽之意有時而相忘雖然鹿之鬭也可見人之鬭也難知彼其牟然相鳴悍然相持是即鬭而已矣亦易得而窺之若乃機械巧搆城府深為笑中之刀莫測暗裏之穽不期翻手雲而覆手雨谷可陵而岸可池其鬭也固不若鹿之聲色相陵而吾實有感於斯芝屏賦我聞芝之種類甚繁抱朴論之最精具五色而表瑞得千嵗以延齡光可照夜洞若堅氷朱柯翠羽三秀九莖乘車覆雲返矢辟兵若是者不可更僕而數而非所論於吾之芝屏夫其生於千仭之岡長自十圍之木君遷古度之倫平露賓連之屬元氣之所絪緼甘雨之所滲漉遁世無悶猶輕漢代之歌升仙亦虗豈作松子之服徒觀其面也層層蟠錯縷縷蟬聫撑如蓋而團如盤焉繼觀其背也既玲瓏而又相附雖妥帖而實便嬛香似桂而燦似蓮焉伊何人之選質乍我座而為屏既切清防之義匪誇延夀之名吾獨怪其挾不老之姿而岸然辭故土以成器也靈乎不靈人字栁賦有序西苑南液池北岸有人字栁者數百年以上物也今秋仆於風命補種之因成是賦憶行春於癸酉賦南苑之雙栁歎賔主其莫恆感新舊為非偶歸而禁籞偶臨池岸間走若人字者有言寓以意而非口曰樹有菀枯奚與人世彼補植者已是贋鼎則體物者寧非多事爾時雖心知其非而莫能與之為議也逮今秋之孟月忽終風之落天乍似轟雷耾耾而有如熛怒弗止振蘀蓬蓬而遇輒摧堅蔥菁者亦莫不偃婆娑者安望其全然而蔥菁者暫偃而其身復起如故婆娑者難全而連根遂以仆焉爰命奉宸例視海子種仍各根培植而冀其生成合為一樹絞縛而無分彼此靈和殿前何異張緒當年上林苑中慢稱公孫病已於是兩足分立一項挺成俯液池以寫影望躍臺而馳情則何異樓閣東風聼歌舞於宣德荆凡南國閲紀載於春明者哉乃對人字而歌曰昔議雙栁今何若兮使無補種終寂寞兮實固非久名可托兮人字若答而歌曰名實胥幻誰恆在兮成則有壞匪愛實害兮一之為甚豈可再兮西畨蓮賦考花譜則類屬之荷非水植而名乃曰蓮弗經見於中國誰與號謂西畨昔詞臣曾寫質亦點筆以稱妍羣芳譜載有西畨蓮僅言其花淡雅而不詳其跗萼若何又載有鐵線蓮云花葉俱似西畨蓮心黑如鐵線山莊舊藏錢維城花卉册有花一種稱西畨蓮但其色淡碧而兼微紺與今所見西畨蓮不甚似或鐵線蓮也曾題詩云種自西畨一線分訝曾拈起悟聲聞白華却是心如鐵不解其他祗淨芬觀此詩可以知二花之同不同矣又不同乎斯卉訝孰果其真詮斯卉也扶架用長施蔓以延向日敷榮傍晚收姢一莖一朵有葉擎焉其朵則緑跗五出白華五仚細蕊紛敷中碧外藍近心紫簇心湧青拳橫吐五鬚結如意團頂作三珠綘色呈鮮葉亦無瓣紺絲引牽竒形異種絶等超凡雖圗書之集成未麗譜而芳傳余因思之初祖有一花五葉之偈或即指此而標禪不然何五敷之盡同而三珠在其頂也豈非具三乘之義元爰設色以傳形笑積習之未蠲銘乾清宫五屏風銘有序豫年十二時始解文義每侍皇祖於乾清宫得瞻御座後屏風集諸經銘語即知綜括治道無遺而為君者必如是然後可謂盡君道也踐阼後益用以自勵思欲衍繹諸句各為一銘而理精義博日引月長三十六年於兹豫亦六旬有一矣昔衛武公作抑戒老而自警也豫侍聖母不宜言老而自警之意則不可無夫此集諸經語誰不能成誦然言之易而行之難語云適百里者半九十里苟所行不符乎所言豫愧不滋甚哉正中四則自我民聼天以為聰自我民視天以為明叶無曰髙髙在上惟命不于常奈何弗敬夙夜不遑純佑惟休惟恤亦無疆右帷天聰明粵我列祖憲天惟聖宅中圖治敬勝義勝允兹克明佛時仔肩以似以續惟曰欲至于萬年右惟聖時憲豫有股肱豫有心膂恤小民之依帷豫與汝曰惟欽哉厥欽匪從陳善弼邪無私則公右惟臣欽若至弱而不可勝至愚而不可欺心焉懷保庶其從治厥類有四厥數無萬暑雨祁寒曰咨曰怨思艱圖易遹求厥寧用顧畏于民碞遹觀厥成右惟民從乂左次二則百姓注耳目一人孩之萬幾凛旦明一人裁之惡乎危于不知惡乎失于好逸惡乎損招于矜驕右首出庶物人莫不衣食也足之則寧民猶水也澄之則清使菽粟布帛如水火亦其難矣豈可虛詡升平右萬國咸寧右次二則和樂且湛君子之愷叶平易近民君子之悌君子終日乾乾體仁長人大都為為君者而言右愷悌君子譬如北辰居其所而衆星拱之德斯要矣為則者心誠奉之苟失其德孰與為則戒之慎之斯焉愓息右四方為則左末二則在昔文王即康功田功志厪惠鮮受命帷崇詰戎固要黷武非賢以是為功失之天淵右功崇帷志曰宵衣豈誠宵衣乎曰旰食豈誠旰食叶乎即誠宵旰而心不在焉亦得謂之真勤叶乎君者臣之師乎將以督人而已固可遺乎右業廣惟勤右末二則為君奚難難於知人唐虞已然而况而今叶忠邪莫辨善惡紛陳藐不易察心更難諶叶量材授職各有分司廣咨博訪或稱不知在彼則可在我則遲蒿目焦心分憂其誰右知人則􅀢三代以下治世常稀其故云何安民莫為安民若何莫如惠施惠心勿問元吉易辭右安民則惠交泰殿銘乾清宫後坤寧宫前殿名交泰象取地天丕顯祖宗奉兹宫殿居正臨民曰明曰旦始惟宫壼逮及臣鄰以御家邦必本修身匪祗循名亦欽責實健順協中所其無逸財成輔相小往大來叶無為以治殿楹額無為二大字皇祖御筆也聖訓昭垂小人道消君子道長以左右民尚慎無往持盈保泰勿恤其孚於萬斯年凛懷永圖寧夀宫銘寧咸萬國夀先五福宫用題額文叶義淑於赫皇祖奉養慈闈孝惠爰居愛日延暉小子踐阼兹歷􅜼年設復草嵗八旬五臻敬思仁皇卜號康熙六十一載今古誠稀同以為艱敢期過益况值耄耋歸政理得遹新是宫以待天庥企豫望之願可如不授終奉懿其禮自殊斟酌損益匪曰侈圗殿稱皇極重簷建前宫仍其舊為後室焉我朝規制宫為奉養寧夀宫所是慈寧東朝之以前殿即以宫名並皆不施重簷有深意也恭遇簷以聖母八旬萬夀朕始於慈寧宫增加前殿重崇尊養兹新葺寧夀宫待豫歸政後居處則為太上皇臨御之所宜有前殿受賀因題額曰皇極殿制用重簷而寧夀宫之榜則移於後殿云執豕敬神我朝舊制異日遷居禮弗敢廢清寧坤寧祖宗所奉盛京大政殿後曰神之所祭畢清寧宫大臣祖宗時祀召王公進內食肉神國初定鼎燕京則于乾清宫後殿章坤寧宫行祀時禮一如清寧之制至今遵循舊余將來歸政自當移夀坤寧宫所奉之竿于寧宫仍依現在祀神位禮神神之朔吉修祀寧夀斯踵雖謝萬幾寧期九畿始豫一人夀同黔黎告我子孫毋逾敬勝是繼是繩永膺福慶璧背銘綘雲璘玢素月隱現閲幾滄桑無虧一片御製文二集卷三十八
