  text: 欽定四庫全書御製文初集卷九
  hash: sha256:0cf7eab64755c6c7e73f603c6053277b10fece24c7097f572fdee2e30d261ee5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_009-1a, image: WYG1301/WYG1301-0083a.png}
body:
  text: 序聖祖仁皇帝聖訓序自古聖人誕受天命為下民君師必亶聰眀睿智之資首出乘乾以綏猷而立極凡其經緯萬端敷之彞訓者罔不深切著眀炳日星而章雲漢典謨所載雅頌所陳唐虞三代之隆有如一轍欽惟皇祖聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖德廣運久道化成文治光昭武功赫濯薄海內外深山窮谷之衆總淪浹於仁心仁政之中教思無窮訓詞深厚厯考熙眀之運未有躋此崇隆者也肆我皇考世宗憲皇帝以聖繼聖用人行政一一仰法前徽既纂修實録成書復分類恭輯聖訓六十卷俾皇祖六十餘年敬天尊祖經國保民農田學校禮樂兵刑之盛蹟見之都俞吁咈間者粲然常新釐然備具永貽我後嗣子孫億萬年升平矩範蓋皇祖性本生安道兼創守實集千古聖帝眀王之大成是以聖謨洋洋眀徵定保宏綱巨目有要有倫精一之心傳蕩平之王路胥不外乎此也豫小子昔在齠齡早荷聖慈賜育宫庭祗聆訓迪茲膺基緒紹聞衣德之志兢兢業業不懈益䖍昕夕尋繹惟期懋遵祖訓以無負皇考善繼善述之貽謀顧金匱石室之藏中外無得見者爰命儒臣敬謹繕寫授之剞劂庶我皇祖聖祖仁皇帝建中表正牖民覺世之言昭垂寰宇羣工士庶咸得漸摩於聖訓之崇閎而率由無斁也不亦庥歟謹序聖祖仁皇帝實録序皇祖聖祖仁皇帝臨御六十一年耿光大烈融爍古今積惠襲恩淪浹寰㝢功德之盛具載實録垂千萬祀我皇考世宗憲皇帝御製序文推本上天孚佑下民列祖垂裕後嗣篤生至聖開邃古以來未有之盛業煌煌乎言之廣大精密至矣蔑以加矣豫小子寅承丕緒紹聞衣德兢兢業業仰思繼述皇祖皇考成憲日於治事之先展誦列祖實録周而復始皇祖實録卷帙浩繁排日敬覽寒暑靡間至自今凡數閲矣緬維尚書史記所載古帝王治化之隆各極其至而孔子於堯曰惟天為大惟堯則之蕩蕩乎民無能名焉於舜曰無為而治孟子則曰王者之民皥皥如也豫嘗推繹其㫖想見唐虞中天之盛乃今思皇祖之世之民有以知孔孟之言信乎其能知聖人也皇祖自親政之始即手鉏三蘖蕩定南疆滇黔閩粵之奧揭日月而掃氛雺海內赤子喁喁向風由是亭之毒之煦以淳風沃以甘澍浸以醲化甄以大鈞數十年之間南奠臺澎北犁沙漠命將肆征而閭左無徴發之警親臨淮河指授方略歷吳㑹陟會稽登岱宗謁闕里西巡關隴抵雲中三覲祖陵觀於東海嵗出塞外獮狩上都天行之健古無以加而庠序詠仁氓庶樂業市廛殷阜卒伍服習熙熙然相忘於無所事事於焉正晷緯考律度定元聲煥為宸章灑為奎翰集古帝王文治之大成而穆清宥密凝然不見經營之迹簡任公卿百執事器使而責其成俊夀魁碩布列有位外自節鉞連帥以至守令賢否清濁立判剔侵蠧勵亷平吏治蒸蒸無綜核之煩而德意宣究蠲逋賑恤肆赦緩刑指揮深宫之中風馳萬里匹夫匹婦無不浸潯涵育鼓舞德化而不能自已當其時誠所謂不識不知順帝之則者耶歷今二十餘年遺澤餘烈深入人心固結而不可解回溯鼎成之初謳思如一日夫乃恍然曰是所謂至仁如天民無能名者也無為而治恭己南面者也孟子所謂王民皥皥者也於戲四海九州之民無得而名豫小子又烏能名之憶自幼沖䝉皇祖撫愛日侍左右用人行政皆覩記所及簡冊紀載政如杓衡規天躔次測日可見者迹象而已於穆之運重離之眀終無能言其所以然者盥誦之次稽首敬為之序以志紹庭繼序之忱於罔斁云世宗憲皇帝聖訓序自古人君有盛德大業者其規畫周詳而詒謀悠逺則必敷之彞訓以眀定保之徴紀之簡編以著經綸之蹟非徒為一時事功計也亦將以示後嗣昭法守焉我皇考世宗憲皇帝亶聰眀睿智之資建中立極茂登上理御極十有三年體聖祖之心以為心法聖祖之政以為政祗承郊廟惇睦宗親整飭官方修眀法度正人心厚風俗文經武緯禮序樂和凡宏綱巨目罔不默運於深宫乾健之精神以圖其乂安而計其久逺聖謨洋洋有典有則或因人以立教或隨事以敷言存之淵然而有條理發之渙然而無凝滯其與二帝三王都俞吁咈咨警誥誡之㫖曷以異焉允矣彪炳之綸音治平之模範也可不謂至盛者歟既命大學士等詳慎纂輯恭成世宗憲皇帝實録一百五十九卷復於編年繫日之中分類備録恭成聖訓三十六卷仰惟皇考德合天地眀並日月序參四時躬荷聖祖仁皇帝積厚之貽善繼善述故乃保泰持盈諴民阜物寓惇大於眀作劑整肅以寬仁致治規條炳如星日豈第豫小子朝乾夕惕之衷期於謹凛率由嗣守丕緒繼自今億萬斯年子孫臣庶沾被熙洽之澤者庶咸有以遵聖訓之光昭而頌鴻猷之允塞也謹序世宗憲皇帝實録序國家受天眷命集慶垂光承承繼繼肆我皇考世宗憲皇帝荷三聖之洪庥祗紹聖祖仁皇帝丕緒宵衣旰食底區宇於和恆以茂衍億萬年無疆之祉厚德隆功溢於簡牒巍乎煥乎治平之盛軌未有逾茲者也皇考徇齊敦敏仁孝性成蚤嵗承歡聖祖友愛同氣逮膺大統一切禮儀隆備廟號尊崇莫不定自宸衷符乎典則仰惟聖祖仁皇帝臨御六十餘年濊澤洽人心醇化流方外豐亨豫大之福極盛無加皇考承郅治之餘因時制宜以善繼而善述惟是本之以誠持之以敬行之以中正要之以寬仁用能杜玩愒於熙時綿升平之泰運大經大法粲然為後嗣子孫法焉薦馨郊廟必躬必親旁秩祀典懷柔百神間遇水旱微愆祈禱深宫罔弗潛孚立應聖學髙深探性命之精操治平之要天德王道一以貫之隆禮先師孔子增祀先儒右文重道之典超越常制猶復表章經術廣勵士風籲俊興賢蔚有德造辟雍鐘鼓後先疏附之風殆無以過念用人為愛民之本自公孤卿尹下至庶司百執事登眀選公咸稱任使而守令之親民暨封疆大吏之司董率者尤厪聖心重撫字之方嚴貪墨之罰眀四目達四聰賜復蠲租農桑被野遂躋斯民於衽席之安刑罰者所以佐政教之不逮也皇考如天好生既已刋布律令俾愚氓重於犯法復詳定貴賤服色兵民婚喪禮制更闡明聖祖諭㫖十六條細加訓注家喻户曉翕然從風河防之關於運道民生也萬里黃流滙以百川之水兖徐而下嵗苦沮洳皇考默運神謀指示經畫加長淮之石堰闢三省之引河渙發帑金厥有成績又吳越海塘南北水利凡可以惠此蒸黎者悉因時而修舉之先是聖祖親統六師平定朔漠威靈所加青海扎什巴圖兒等震讋承令因沛殊恩畀以爵秩垂三十年而羅卜藏丹津與吹拉克諾木齊等誕敢首造逆謀擾犯邊域皇考聲罪致討密授方略於閫帥戈鋋所指電掃風驅振旅獻俘勒成功於太學準噶爾蠢動西陲數肆患於喀爾喀部落南方苗蠻蔓延行旅居民苦其侵掠皇考為藩服計久逺為遐陬圖寧謐或命將興師或諭文武諸臣隨宜搜𠞰至逆夷悔禍輸誠傾心納土則皆宥其前愆而曲賜包容焉德威並耀無逺弗屆賜安南之地減朝鮮之貢俄羅斯南掌等國阻昧幽深胥漸被於聲教他若警怠荒矯浮薄求言納諫教孝褒忠宗室天潢之胄多方造就八旗根本之地備豫綢繆頒訓諭於臣工飭官常也錫侯封於眀裔示殊典也豐盈遍萬國而服御有經見聖躬之儉焉嘉應在庶徴而憂勤益懋昭聖德之謙焉蓋我皇考誠敬之心中正之道寬仁之恩悉同符乎聖祖以綏猷而立極十三年中有如一日宜其治功之盛綱舉目張蕩蕩平平樂樂利利傳之愈逺而可法可守也歟豫小子繼序之初即命監修總裁大學士等董率儒臣稽歷年之紀載敬謹纂修次第進呈齊肅披閲迄今五載恭成世宗憲皇帝實録一百五十九卷在昔唐虞三代制治保邦之道備載於書惟我皇考際重熙纍洽之盛勵精圖治良法美意歷久彌新玉簡琅函實與典謨訓誥相輝映用是裝繕尊藏朝夕循誦以志繹思衣德之義垂裕後昆永永無極焉謹序日講春秋解義序嘗考春秋經文不過萬有六千三百餘言自三傳以後羣儒義疏纍數千萬言而微辭隱義之難眀者猶十有六七蓋是經乃孔子所手定也辭約而義深聖心之所運用每舉一事其義必貫於全經非若他經一章一節各指一事雖有不通而不害其可通者故程朱二子深探力索久之皆見為難眀而止至眀初胡氏安國之說遂獨列於學官以朱子深病是經之難通而教門人姑從胡氏之說也然謂其以義理穿鑿則非義理之真而於聖人筆削之㫖未能吻合眀矣故自眀以來雖著功令科舉之士禀為程式而終不足以服學者之心我聖祖仁皇帝聰眀天亶自少時即篤好經書及躬攬大政辨色出視朝裁決萬幾甫畢即召儒臣講論經義務抉其根源參伍羣言以求至當經筵所進日講四書及尚書周易解義皆裁自聖心以為無憾者故即時刋布及晚年以眀初五經大全收採討論尚未精詳口授指畫成周易折衷一書詩書春秋則命重臣開館編次而親釐定之惟三禮體大未議纂修蓋有待也周易折衷成於康熙五十四年春秋傳說彚纂成於六十年已經頒布餘二經則至我皇考繼序之後始次第告成皇考大孝尊親凡皇祖一言一動莫不敬述以昭示來茲念欽定春秋於胡氏之說既多駁正則廷臣當日所進講義一遵胡氏之舊者於聖心自多未洽是以遲之又久未嘗宣布必將俟諸經備成而後重加討論也故再降諭㫖命果親王允禮大學士張廷玉內閣學士方苞詳細校訂始事於雍正七年恭呈御覽者再而後告成凡六十四卷乾隆二年鋟板既訖諸臣請製序文頒示海內朕反覆循覽於胡氏穿鑿之說曠若發䝉筆削之㫖闡眀者亦過半焉夫解義之成蓋數十年於茲矣觀皇祖之久不宣布可以徵望道未見之心觀皇考之再三考訂而後命刋可以知善繼善述之義豈惟是經之窔穾將由是以開通哉即兩朝聖人之心法治法亦於斯可覩矣樂善堂全集序朕少讀尚書見二帝三王以及繼世之哲后君臣咨警惟是身心性命之本原其敷政命官亦惟根柢道德而不規規於事為之末及考詩易四子之言凡論政者皆與書所稱同其指歸互為表裏其後博涉諸史則雖眀盛之世所殫心竭慮者大槩詳於事功而略於本原教化之升降治象之崇卑其分岐實判於此用是日有孜孜求所以取道入德之門䝉皇考示以眀理立誠之大訓而略得其統貫又念修辭必本乎誠故凡見於古文詩辭者咸以是為宗而不敢有二焉往者嵗庚戌曾録數年中所作序論書記雜文詩賦次為十有四卷置諸几案時就所言以自檢其行嗣是所作蓋四倍前繼序以來躬理萬幾兢兢業業惟恐一事失宜負皇考付屬之重思如曩時從容文墨之娛不可復得然少有餘閒未嘗不考鏡經史以自觀省爰取庚戌文鈔所載存十之三續作未訂入者存十之七總為一編共若干卷非欲以文辭自表著蓋是集乃朕夙昔稽古典學所心得實不忍棄置自今以後雖有所著作或出詞臣之手真贋各半且朕亦不欲與文人學士爭巧以轉貽後世之譏則是集之輯有不得已者記曰本諸身徵諸庶民曩豫自檢所行以勉副所言者乃日用酬酢之常今茲所行事無大小莫非政教之平陂生民之苦樂相倚不可以中立者也因此益自警惕而克艱天位顧畏民碞庶幾眀理立誠之學參前倚衡永永勿替也夫柏梁體詩序我皇祖聖祖仁皇帝皇考世宗憲皇帝嘗集在廷諸臣於乾清宫肆筵設席授以筆札御製首唱羣臣以次遞成效漢代柏梁之體續虞廷賡歌之義光垂奕世猗歟盛矣朕敬承丕緒惟日孜孜期與百爾羣工共圖治理言念股肱之佐卿尹之班何一非我祖考所貽以與朕寅亮天工者哉宗室屏藩之寄則又𣲖衍天潢分所宜親也宜有以篤親親之情叙堂亷之誼乃者臘雪盈疇已兆二麥之稔光風應律初回大地之春爰集王公卿二授几賦詩一如舊制朕非欲誇詞藻以耀羣臣倡為豐亨豫大之說也思祖考遺朕以升平之業吾君臣何幸得優游以享之夫享升平匪艱而保升平為難羣臣其體朕意焉一宴㑹之樂尚思繼祖考之庥祖考之良法善政布在方策吾君臣其何以立綱陳紀熙績寧人以覲揚祖考之光烈乎羣臣其體朕意焉授時通考序孟子言不違農時穀不可勝食蓋民之大事在農農之所重惟時敬授人時載於虞典周公七月一篇於日星霜露之候昆蟲草木之化詳哉其言之故先王之民莫不震動恪恭於農以修其事者懼失時也我聖祖仁皇帝勤咨民隱首重農桑率育蒸黎涵濡德澤六十餘載户慶盈寧皇考世宗憲皇帝嵗舉耕藉之儀率先天下興水利廣儲蓄為萬世規凡茲薄海蒼生得荷鋤饁餉優游隴畝之間樂生遂性衣食滋豐者何莫非我祖宗宵旰勤勞以貽樂利於無疆耶朕纘承基緒鑒前代生深宫之中長阿保之手誠知稼穡艱難日與中外臣工為斯民籌食用至計胼胝機杼之作苦日厪於懷因檢前人農桑通訣農政全書諸編嘉其用意勤而於民事切也命內廷詞臣廣加修輯舉物候早晚之宜南北土壤之異耕耘之節儲偫之方蠶織畜牧之利自經史子集以及農家者流凡言之關於農者彚萃成編命之曰授時通考夫天道廣運於上而四時行萬彚生地道發育於下而庶品蕃百昌遂人事參贊其中而六府修三農殖輔相裁成固國家之大政也趨事赴功亦閭閻之本業也貴穀劭農服田力穡上下交勉弗懈於時以副朕阜成海宇之至願覽斯編者尚有取焉御製文初集卷九
