  text: 欽定四庫全書御製文三集卷十三
  hash: sha256:bded307fc87c9a0c08867dd1596c11471a0541b5723eb12c8e5bef0433b962f2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_093-1a, image: WYG1301/WYG1301-0654c.png}
body:
  text: 書事福康安奏報生擒莊大田紀事語昨生擒林爽文則𠞰滅逆賊事可稱蕆大端兹生擒莊大田則肅清臺灣事方稱臻盡善二逆狼狽為奸得一而不得二餘孽尚存慮其萌芽且彼既聞首禍被獲則所以謀自全而幸逃生入山固易追赴海則難捕矣是以先事周防屢申飭諭莊大田在南路距海甚近不慮其入山而慮其入海則追捕甚難因屢次降旨令福康安等慎防其入海之路思慮所及隨時預勑兹福康安盡心畫策凡港口可以入海者無不移舟設卡因聞莊大田帶同匪衆俱在柴城初二日欲往蚊率社經畨衆極力抵禦復行退回初五日黎明官軍由風港發兵越箐穿林遂有賊匪突出拒敵我兵迎擊海蘭察率領巴圗魯侍衛奮勇齊攻殺賊三百餘生擒一百餘追至柴城賊愈衆多然恐攻撲過急莊大田或臨陳被殺㦯乘問竄逸轉不能悉數成擒福康安分兵數隊以徐合攻自山梁布陳抵海岸適烏什哈達所率水師得順風連檣齊至沿海進圍水陸合𠞰自辰直至午刻殺賊二千餘羣賊奔潰投水尸浮海如雁鶩而獨莊大田伏匿山溝以致生擒是豈人力哉天也二逆以么䯢小民敢興大亂殺害生靈無慮數萬使獲一而逃一未為全美斯皆生致闕下正國法而快人心反側潛消循良樂業福康安海蘭察等畫謀奮勇不負任使固不待言然非天佑我師俾獲萬全豈易致此耶更查康熙六十年四月朱一貴于臺灣起事提督施世驃總兵藍廷珍于五月由澎湖進兵至六月收復臺灣府城計閲七日于閏六月始擒獲朱一貴計閲一月餘至雍正元年四月而餘黨悉𠞰盡自朱一貴起事至臺灣全郡平定始末閲兩年兹林爽文于五十一年十一月起事其黃仕簡等前後誤事經一年福康安等於上年十一月由鹿仔港始進兵其間解諸羅縣之圍克斗六門攻破大里杙賊巢至本年正月獲林爽文計閲四十二日繼獲莊大田計閲三十二日自林爽文起事至臺灣全郡平定始末共閲一年三月是較之藍廷珍等成功更為迅速矣夫逆賊入內山生畨非我臣僕性情不同語言不通其遵我軍令與否未可知也福康安示之以兵威使知畏給之以賞項使知懷其經畫周密賢于施世驃藍廷珍逺甚又得海蘭察率百巴圖魯攻堅陷鋭遂得前後生獲二囚且李侍堯悉心董理軍儲毋誤行陳使不以李侍堯易常青之總督則軍儲必誤不以福康安易常青之將軍則成功必遲兹盡美盡善以成功于三月之間則上天之所以唘佑藐躬俾以望八之年而獲三捷之速則豫所以深感昊慈豈言語之所能形容也哉自斯以後所願洗兵韜甲與民休息保泰持盈日慎一日以待歸政之年庶不逺矣雖然仔肩未缷必不敢以娛老自怠所為猶日孜孜仍初志耳書揚雄法言偶觀法言用智之句喜其有卓識可謂明哲矣夫奔壘之車沈流之航迫不及待安用其智然不有未奔沈之先乎是誠明哲者所宜思也既而笑雄之能為此言而不能行夫劉棻為車航之小而莽為車航之大劇秦美新為在奔沈之先乎抑在奔沈之後乎雄何不思于奔沈之先以致生而有投閣之驚死而䝉莽大夫之諡則是雄之為言仍虛飾之車有繫之航耳吾於是知言顧行行顧言之為難也且以知立言之不可不慎也書晏嬰叔向論齊晉事晏嬰叔向齊晉之賢大夫也其論齊晉為季世將不延厥祚而為異姓所有如燭照數計而龜卜後之讀是篇者無不以為韙而吾獨以為非非非其論之不中去聲而正論其論之中為不韙也夫齊之將移陳氏晉之將分三家兩國之存亡繫焉君棄其民以樂惂憂是自取其亡也大夫者與國同存亡者也不知者愚不足誅既知之矣不亟諫其君思所以防患存國是不忠也諫而不從死其職為上辭其職為次二子不聞有此也徒如越人視秦人之肥瘠且私議其君國大事于異國之大夫是可謂之與國同休戚之人乎子為父隱臣不當為君隱乎有識之人將鄙之二子自居為有識者乎無識者乎故吾獨以其論為非亦責賢者備之意云爾夫叔向之言獨重于其私宗而晏嬰所謂陳氏以家量貸而以公量收之雖市惠之意耶實亦難為繼也世之好名者固不無施惠之心然亦必量入為出為其可繼陳氏以私恩小惠籠絡人心容有其事若必如左氏所云齊舊四量陳氏三量皆登一焉按杜預注陸德明音義解公量豆四升四豆為區一斗六升四區為釡六斗四升釡十為鍾六斛四斗家量登一豆五升積至于鍾為八斛則多一斛六斗是家量較公量加十分之二以家量貸而以公量收之則貸者如騖入不償出勢必難繼陳氏先自貧矣是左氏欲藻飾其詞而不知其出于情理之外浮夸之誚有由來也且嬰向私議誰則聞之此㦯出于左氏品藻浮夸之為是則嬰向之語並不能不疑為邱明之躗言㦯非實出于嬰向者矣書隋文帝改元事隋文改元之事昔於通鑑輯覽但評其好祥貢諛及加課工役之非而于袁充晝夜短長之妄至引京房所說闢之尚有未盡兹故申而論之夫晝長則夜短夜長則晝短堯典所載千古不易之定論也天不變日月亦不變豈有因世道之治亂而因之有長短之殊哉如其所言則堯舜之時當何如其長桀紂之時當何如其短且自上古以至于今又當有幾多長短殊節挈壺之士當何以考之此其貢諛無勞更辨矣又所引京房上道次道下道之說更屬囈語夫治易以無私為本京房以有私而治易故其師焦贛即曰得我道以亡身者京生也京房分卦直日以風雨寒溫為候其說蹖雜且佚其本而被他人假藉以入者又不知凡幾漢室公卿以為煩碎不可行是也至于其後乃専言䝉氣以為蔽己之賢之兆此非私意而何䝉氣之說治厯之家不甚解至我皇祖考成之書乃明言其故䝉氣即地中遊氣上騰于太陽未出之前日出後漸次散去日以為常我為詳皇祖御製厯象考成書內所言清䝉氣差一篇最盡蓋清䝉之氣有厚薄髙下由于地勢之殊于人事無關若京房云係賢人閉塞之徵已屬穿鑿附會而且専指為蔽已之賢更為用私可鄙矣萬古有日月即有此氣與人之賢不肖為隱顯何預蓋略通隂陽天道之人不得志舒其憤悶幸灾樂禍申己私害公道似房者不少矣符其師言不亦宜乎然此等言世治則少世亂則多亦不可不知兵部奏凱旋兵丁至京由驛各歸本地營伍紀事古之三時務農一時講武為制兵善策其不及者更役流民使之戰戍皆所謂驅犬羊以飼虎豹殊可笑耳惟我朝用禁旅及東省旗兵以張撻伐是以所向無敵莫不成功兹之征廓爾喀七戰七勝致其畏威降順即明驗也若夫兵部所司不過設驛安頓送往迎回兹以蕆事奏聞亦循例而已豈似明之本兵哉明之本兵以庸儒登科甲洊久至司馬不知兵為何物何事幸逢無興戎資苞苴以飽囊槖不幸有敗衄受攻斥以喪首領其亦可哀可鄙而其國家亦隨以衰滅是不大可慎乎有明自中葉以後諸帝率多怠荒不親政事凡遇軍務委之樞臣至末季疆場多故尤重本兵之權是以其時國法敵兵薄城則殺大司馬如丁汝夔王洽等皆以備禦踈忽調度乖方置之于法蓋維時本兵既多庸暗闒冗動掣邊帥之肘而其君又暗于知人委任失當欲求國事不誤其可得耶即今之平定廓爾喀自前秋以至昨夏凡遲速之機進退之宜內而軍機大臣外而將軍參贊皆與一心一力日夜籌畫不為掣肘任其攄衷且沿途之督撫又復屢命繼儲餉供廩給並禁兵役之滋擾勒索是以民不知兵行若無事豈如前明之所為哉若夫地方官以兵行辛勤捐給勞去聲銀每兵不過二三兩此亦大員以已既弗躬荷戈敵愾以申同仇之誼非行賄也雖弗過而問之而亦未嘗不知但于其與者不嘉其揮霍弗與者亦不責其慳吝而窮兵逺涉邊荒既屢受官賞更得此資助積少成多亦其宜耳若尹壯圖之流又且以為非出官捐皆害民力蓋彼若當兹定出于是庸人豈可與言政哉御製文三集卷十三
