front:
  text: 欽定四庫全書御製文三集巻十三
  hash: sha256:b354e6799a5d0b862e593d17e700deb827a03b18dfab596640f897700e42cd3d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_093-1a, image: WYG1301/WYG1301-0654c.png}
body:
  text: 書事福康安奏報生擒荘大田紀事語昨生擒林爽文則𠞰滅逆賊事可稱蕆大端兹生擒荘大田則肅清臺灣事方稱臻盡善二逆狼狽為奸得一而不得二餘孽尚存慮其萌芽且彼既聞首禍被獲則所以謀自全而倖逃生入山固易追赴海則難捕矣是以先事周防屢申飭諭荘大田在南路距海甚近不慮其入山而慮其入海則追捕甚難因屢次降旨令福康安等慎防其入海之路思慮所及随時預勑兹福康安盡心畫策凡港口可以入海者無不移舟設卡因聞荘大田帶同匪衆俱在柴城初二日欲往蚊率社經畨衆極力抵禦復行退囘初五日黎明官軍由風港發兵越箐穿林遂有賊匪突出拒敵我兵迎擊海蘭察率領巴圗魯侍衞奮勇齊攻殺賊三百餘生擒一百餘追至柴城賊愈衆多然恐攻撲過急莊大田或臨陣被殺㦯乗問竄逸轉不能悉數成擒福康安分兵數隊以徐合攻自山梁佈陣抵海岸適烏什哈達所率水師得順風連檣齊至沿海進圍水陸合𠞰自辰直至午刻殺賊二千餘羣賊奔潰投水屍浮海如雁鶩而獨莊大田伏匿山溝以致生擒是豈人力哉天也二逆以么䯢小民敢興大亂殺害生靈無慮數萬使獲一而逃一未為全美斯皆生致闕下正國法而快人心反側潛消循良樂業福康安海蘭察等畫謀奮勇不負任使固不待言然非天佑我師俾獲萬全豈易致此耶更查康熙六十年四月朱一貴扵臺灣起事提督施世驃總兵藍廷珍扵五月由澎湖進兵至六月收復臺灣府城計閱七日扵閏六月始擒獲朱一貴計閱一月餘至雍正元年四月而餘黨悉𠞰盡自朱一貴起事至臺灣全郡平定始末閱兩年兹林爽文扵五十一年十一月起事其黄仕簡等前後誤事經一年福康安等於上年十一月由鹿仔港始進兵其間解諸羅縣之圍克斗六門攻破大里杙賊巢至本年正月獲林爽文計閱四十二日繼獲莊大田計閱三十二日自林爽文起事至臺灣全郡平定始末共閱一年三月是較之藍廷珍等成功更為迅速矣夫逆賊入内山生畨非我臣僕性情不同語言不通其遵我軍令與否未可知也福康安示之以兵威使知畏給之以賞項使知懐其經畫周宻賢扵施世驃藍廷珍逺甚又得海蘭察率百巴圖魯攻堅陷銳遂得前後生獲二囚且李侍堯悉心董理軍儲毋誤行陣使不以李侍堯易常青之總督則軍儲必誤不以福康安易常青之将軍則成功必遲兹盡美盡善以成功扵三月之間則上天之所以唘佑藐躬俾以望八之年而獲三捷之速則予所以深感昊慈豈言語之所能形容也哉自斯以後所願洗兵韜甲與民休息保泰持盈日慎一日以待歸政之年庶不逺矣雖然仔肩未缷必不敢以娱老自怠所為猶日孜孜仍初志耳書揚雄法言偶觀法言用智之句喜其有卓識可謂明哲矣夫奔壘之車沈流之航迫不及待安用其智然不有未奔沈之先乎是誠明哲者所宜思也既而笑雄之能為此言而不能行夫劉棻為車航之小而莽為車航之大劇秦美新為在奔沈之先乎抑在奔沈之後乎雄何不思扵奔沈之先以致生而有投閣之驚死而䝉莽大夫之諡則是雄之為言仍虚飾之車有繫之航耳吾於是知言顧行行顧言之為難也且以知立言之不可不慎也書晏嬰叔向論齊晉事晏嬰叔向齊晉之賢大夫也其論齊晉為季世将不延厥祚而為異姓所有如燭照數計而龜卜後之讀是篇者無不以為韙而吾獨以為非非非其論之不中去聲而正論其論之中為不韙也夫齊之将移陳氏晉之将分三家兩國之存亡繫焉君棄其民以樂惂憂是自取其亡也大夫者與國同存亡者也不知者愚不足誅既知之矣不亟諫其君思所以防患存國是不忠也諫而不從死其職為上辭其職為次二子不聞有此也徒如越人視秦人之肥瘠且私議其君國大事扵異國之大夫是可謂之與國同休戚之人乎子為父隠臣不當為君隠乎有識之人将鄙之二子自居為有識者乎無識者乎故吾獨以其論為非亦責賢者備之意云爾夫叔向之言獨重扵其私宗而晏嬰所謂陳氏以家量貸而以公量收之雖市恵之意耶實亦難為繼也世之好名者固不無施恵之心然亦必量入為出為其可繼陳氏以私恩小恵籠絡人心容有其事若必如左氏所云齊舊四量陳氏三量皆登一焉按杜預注陸徳明音義解公量豆四升四豆為區一斗六升四區為釡六斗四升釡十為鍾六斛四斗家量登一豆五升積至扵鍾為八斛則多一斛六斗是家量較公量加十分之二以家量貸而以公量收之則貸者如騖入不償出勢必難繼陳氏先自貧矣是左氏欲藻飾其詞而不知其出扵情理之外浮夸之誚有由来也且嬰向私議誰則聞之此㦯出扵左氏品藻浮夸之為是則嬰向之語並不能不疑為邱明之躗言㦯非實出扵嬰向者矣書隋文帝改元事隋文改元之事昔於通鑑輯覽但評其好祥貢諛及加課工役之非而扵袁充晝夜短長之妄至引京房所說闢之尚有未盡兹故申而論之夫晝長則夜短夜長則晝短堯典所載千古不易之定論也天不變日月亦不變豈有因世道之治亂而因之有長短之殊㢤如其所言則堯舜之時當何如其長桀紂之時當何如其短且自上古以至扵今又當有㡬多長短殊節挈壺之士當何以考之此其貢諛無勞更辨矣又所引京房上道次道下道之說更屬囈語夫治易以無私為本京房以有私而治易故其師焦贛即曰得我道以亡身者京生也京房分卦直日以風雨寒温為候其說蹖雜且佚其本而被他人假藉以入者又不知凡㡬漢室公卿以為煩碎不可行是也至扵其後乃専言䝉氣以為蔽己之賢之兆此非私意而何䝉氣之說治厯之家不甚解至我皇祖考成之書乃明言其故䝉氣即地中遊氣上騰扵太陽未出之前日出後漸次散去日以為常我為詳皇祖御製厯象考成書内所言清䝉氣差一篇最盡盖清䝉之氣有厚薄髙下由扵地勢之殊扵人事無關若京房云係賢人閉塞之徵已屬穿鑿附會而且専指為蔽已之賢更為用私可鄙矣萬古有日月即有此氣與人之賢不肖為隠顯何預盖略通隂陽天道之人不得志舒其憤懣幸灾樂禍申己私害公道似房者不少矣符其師言不亦宜乎然此等言世治則少世亂則多亦不可不知兵部奏凱旋兵丁至京由驛各歸本地營伍紀事古之三時務農一時講武為制兵善策其不及者更役流民使之戰戍皆所謂敺犬羊以飼虎豹殊可笑耳惟我朝用禁旅及東省旗兵以張撻伐是以所向無敵莫不成功兹之征廓爾喀七戰七勝致其畏威降順即明驗也若夫兵部所司不過設驛安頓送往迎迴兹以蕆事奏聞亦循例而已豈似明之本兵哉明之本兵以庸儒登科甲洊久至司馬不知兵為何物何事幸逢無興戎資苞苴以飽囊槖不幸有敗衂受攻斥以喪首領其亦可哀可鄙而其國家亦隨以衰滅是不大可慎乎有明自中葉以後諸帝率多怠荒不親政事凡遇軍務委之樞臣至末季疆場多故尤重本兵之權是以其時國法敵兵薄城則殺大司馬如丁汝夔王洽等皆以備禦踈忽調度乖方寘之扵法盖維時本兵既多庸闇闒冗動掣邊帥之肘而其君又闇扵知人委任失當欲求國事不誤其可得耶即今之平定廓爾喀自前秋以至昨夏凡遲速之機進退之宜内而軍機大臣外而将軍㕘賛皆與一心一力日夜籌畫不為掣肘任其攄衷且沿途之督撫又復屢命繼儲餉供廩給並禁兵役之滋擾勒索是以民不知兵行若無事豈如前明之所為哉若夫地方官以兵行辛勤捐給勞去聲銀每兵不過二三兩此亦大員以已既弗躬荷戈敵愾以申同仇之誼非行賄也雖弗過而問之而亦未嘗不知但扵其與者不嘉其揮霍弗與者亦不責其慳吝而窮兵逺涉邊荒既屢受官賞更得此資助積少成多亦其宜耳若尹壮圖之流又且以為非出官捐皆害民力盖彼若當兹定出扵是庸人豈可與言政哉御製文三集巻十三
