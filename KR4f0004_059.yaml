front:
  text: 欽定四庫全書御製文二集巻二十五
  hash: sha256:3c1b88ee8c84b370122def4b0ad38198f7b0f63506a9bb5facca740c5ea8aabc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_059-1a, image: WYG1301/WYG1301-0435a.png}
body:
  text: 辨國風正譌孔子杏壇刪詩曰風曰雅曰頌無所為國也自毛萇始以國標題而鄭康成因之後世遂沿襲莫知改正夫孔子既以二南别周召而邶以下各從其類邶以下謂之國可也今云周南之國召南之國是何語耶王者有天下之號降而為風見周道之衰可也今云王國是何語耶或曰如是則書所云以長我王國詩所云王國克生皆非乎曰詩書所云統天下國家之王國非列於衛國之後鄭國之前之王國也夫孔子作春秋尊王大一統豈於詩乃降王為國以比於諸侯有是理乎且魯誠侯國也孔子以父母之邦猶躋之於頌顧以東遷之王朝而等之侯國不與春秋之義自相刺謬乎至於豳乃周先王造基之地既有天下尊王太王王季上祀先公以天子之禮亦無復降而為國之理知此則毛鄭之譌不待辨而自見故為是説以正之後世若宋程大昌之輩頗見及此然未能挈要㫁之以正故復有駁其説者不啻議禮如聚訟矣附録數條於後亦㡬暇稽古之所及云爾宋程大昌作詩議十七篇首論古有二南而無國風之名今考之禮王制云命太師陳詩以觀民風樂記云宜歌風周禮春官太師教六詩一曰風皆言風而不言國本朝毛竒齡引表記國風云我躬不閲之文以駁之夫坊表諸篇皆漢儒所作昔人已詳論之未可以為据也宋鄭樵六經奥論文王之詩見於風者二南是也成王之詩見於風者豳風是也平王之詩見於風者王風是也若謂降黍離而為國風則豳詩亦可降耶其説近是然樵又云周召王豳之詩同出於周而分為四國之聲則顯然以二南王豳繫之於國不亦自相矛盾乎宋李樗黄櫄毛詩集解載楊時云豳風周公之詩也周公居攝政由己出謂之雅則人臣之事而已謂之風則周公非有國也而七月之序陳先公風化之所由故併繫之豳風其説本小序視集解所引諸家較優然所云謂之風則周公非有國又若必有國而後有風亦無定識矣本朝顧炎武日知録云豳詩不屬於國風周世之國無豳似矣考后稷封于邰公劉始居豳是周之先封國乃邰而非豳篤公劉篇云豳居允荒于豳斯館皆言豳而不言國則豳非國名不獨周世為然也即使公劉之時或曽稱豳國而武王得天下之後亦不得復以國目之且亦無封子孫於豳國之文也炎武又以南豳雅頌為四詩而舉禮經所言入樂者為證論雖創而理亦正乃又云自邶至曹十二國為風無害則是欲降王畿以下儕列國何明於論豳而昧於論王耶夫餘國傳訂訛近閲四庫全書内元郝經續後漢書所作夫餘國列傳其官有馬加牛加之名訝其誕詭不經疑有舛誤因命館臣覆勘其説實本之後漢書及三國魏志夫餘傳之文於是歎范蔚宗陳夀之徒不識方言好竒逞妄疑誤後人而更惜郝經之失於裁擇也其傳曰國以六畜名官有馬加牛加豬加狗加諸加别主四出道有敵諸加自戰下户擔糧飲食之信如其言則所謂諸加者何所取義乎史稱夫餘善養牲則畜牧必蕃盛當各有官以主之猶今䝉古謂典羊之官曰和尼齊和尼者羊也典馬者曰摩哩齊摩哩者馬也典駝者曰特黙齊特黙者駝也皆因所牧之物以名其職特百官中之一二誌夫餘者必當時有知夫餘語之人譯其司馬司牛者為馬家牛家遂訛為馬加牛加正如周禮之有羊人犬人漢之有狗監耳若必以六畜名官寓相貶則剡子所對少皞氏鳥名官為鳥師而鳥名又何以稱乎蔚宗輩既訛家為加又求其説而不得乃强為之辭誠不值一噱總由晉宋間人與外域道里遼阻於一切音譯素所不通遂若越人視秦人之肥瘠率憑耳食為傅㑹甚至借惡詞醜字以曲肆其詆毁之私可鄙孰甚且蔚宗以附彭城王義康謀反伏誅陳夀索米為人作佳傳其人皆不足取其言又何足據乎第後漢書三國志久經刋行舊文難以更易因命於續後漢書中改加為家並為訂其蹖謬如右程敏政重修觀音寺記訂訛朱彞尊著日下舊聞載玉河鄉之觀音寺所供奉觀音大士像謂自杭州天竺寺移來而引程敏政記以實之程敏政記稱近得石刻於土中謂金天㑹七年梁王統軍至杭謁上天竺禮觀音大士像及大蔵經異之因徙而北有比邱智完率其徒以從斯寺之所由始也考梁王即烏珠石刻於大定十七年然咸淳臨安志又謂僧道元逢金難時秘大士於井兵退知井所在得像歸之咸淳臨安志載靖康初屬有全難僧道元秘大士像於井兵退瓦礫中忽鏗然有聲始知井所在得像歸之院是疑案也不可以不辨夫大士為佛妙觀察智豎三際横十方無時無處不在不係乎像也故佛云以色見聲求皆屬邪道法身化身不可見報身則可見像者報身之偶託者耳既云偶託則假中之真亦不可不求其非中之是既求其非中之是則吾以為仍在天竺者是而玉河鄉者非也何也天竺嘗四至矣大士相好宛存於心且命工肖斯像二而供奉之於御園之法慧寺及玉泉山之清涼禪窟兹觀程敏政之記乃若實有其事亦不無生疑遂命奉宸詣玉河鄉舁大士像至觀之則長短豐瘠迥然不同天竺者且五色装嚴非所謂古木本色者也於是憬然悟程敏政之傳訛並翻然悟道元之傅㑹而天竺之大士本不即不離無來無去謂燕京之大士與天竺之大士是一不可何况云二是則兩處之記本出於僧人執像炫俗之見而不明理好竒之文人遂亦信耳食而恣影談即以彼時事蹟論之烏珠南下欲得宋之土地耳其次欲得其貨財耳且金與元不同元固䝉古信佛金則不然何必遷大士至北京乎盖兵燹之餘寺或因亂致燬僧或随而至北在北者欲神其説而剏寺在南者欲復其跡而耀人以致兩地各有一大士而豈知大士無來無去是一不可何况云二哉雖然余兹筆之篇而訂其訛者得毋仍執一二是非彼此之見而違大士如如無我之本願乎哉濮議辨濮議司馬光等以濮安懿王宜稱皇伯而歐陽修引禮云為人後者為其父母報則是雖出繼而其本生猶稱父母也光與修皆號正人而持論各不相下迄未有折衷一是盖嘗論之本生父母天性之親也子雖為人後聖人著之禮經曰為人後者為其父母報報者降服齊衰期也盖服可降父母之名不可改所以明示天下為萬世法也且人臣出繼為人後者世所嘗有皆得推恩封其本生父母不改稱伯叔禮也天子以孝教天下而因出繼稱所生父為伯叔是以帝王為重而以父母為輕可乎舜竊負而逃雖孟子强為之辭然實有以見父母重於帝王也明興獻王之議張璁桂萼等阿諛逢迎力請去本生之號至稱為皇考追諡帝號入廟苟以竊一時之利禄而不顧其君貽天下萬世之訾議其亦可謂㝡無忌憚之小人者矣予以為為帝王者苟不違君道以致見棄於天自無有無嗣旁支入繼之事苟有其事則必其身或其祖考有得罪於天之事即所謂國家将亡必有妖孽而已然設萬一有其事何不稱所生曰皇帝本生父歿則稱本生考立廟於所封之國無國則於其邸第為不祧之廟祀以天子之禮亦合父為士子為大夫𦵏以士祭以大夫之義則尊親之誼交盡而於公義私恩兩無遺憾何昔之議禮者未見及此而紛紛聚訟為耶余因感司馬光歐陽修濮議之事以局外而觀局中為之權衡斟酌期合夫天理人情之正因著濮議辨為萬世旁支承統者有所折衷俾不致賢如司馬歐陽互為水火邪如張璁桂萼為夤緣捷徑而總歸於戒為君者平時敬天愛民不致見棄於天嗚呼可不慎哉艮嶽三丈石闢辭錢塘吳焯撰南宋雜事詩稱艮嶽有三丈石謂出艮嶽記是誑也非實也凡有形者有成必有壊具知識者其壊速無知識者其壊遲而各於其類中又有遲速之異焉蟪蛄不知春秋鯤化為鵬背㡬千里具知識者其壊之異遲速也朝菌不知晦朔大椿以八千嵗為春秋無知識者其壊之異遲速也若夫石其亦無知識之類耶宣和去今不過七百餘年縱遭兵燹石不至壊也庚午巡豫曽至艮嶽荒涼之墟未見所謂三丈之石也日下舊聞明宣宗廣寒殿記稱金破開封輦艮嶽石至燕京為萬嵗山即今之白塔山亦並無所謂三丈石也夫石之較木其夀長焉縱日炙風吹寖以剥落亦當不讓大椿八千嵗之春秋明矣而今無焉則是石果飛而去無何有之鄉乎夫予弗謂石不壊而謂石之壊必不若是其速則吳焯之言誠誑也非實也御製文二集巻二十五
