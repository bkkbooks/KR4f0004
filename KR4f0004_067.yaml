  text: 欽定四庫全書御製文二集巻三十三
  hash: sha256:8eec4a93e5fa199b993d7cbf1ba8097be15c5e1280d92602a1370c81d51aa33c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_067-1a, image: WYG1301/WYG1301-0485a.png}
body:
  text: 書事書中庸九經敬大臣義中庸九經各具一事皆為天下國家者之要道敬大臣與尊賢其義似同而實不同其歸也原無不同盖尊賢者所以籲俊旁求以資唘沃至於敬大臣則所為敬大臣之職而非謂敬其人而已也且敬者誠也臣哉隣哉作朕股肱耳目舜之所以敬大臣也敬者正也惟暨乃僚罔不同心以匡乃辟髙宗之所敬大臣也又敬者畏也霍氏之禍萌於驂乗又敬者尊也太陽下同萬物蒼生何以仰照依乎前二敬其職而得依乎後二敬其人而失則可知所謂敬大臣者敬其職而非其人矣敬其職則必求所以稱其職者而尊賢其可緩乎予故曰其歸也原無不同也書夏僎尚書詳解費誓篇論淮夷徐戎事嘗謂解經者不可以巳意穿鑿見長欲出人頭地而反晦經義之本㫖也如夏僎之尚書詳解其研精捜羅酌古準今用意不為不勤而瑕瑜各半政以欲為新竒中之其他姑弗具論如解費誓之淮夷徐戎不失之穿鑿哉盖孔安國之傳固已有淮夷徐戎錯居九州秦始皇逐出之之語然引而未發僎則謂徐州淮浦中夏之地安得有戎夷似先王于此事有不及始皇能除害更泛論波及先王雖不能逐戎夷而能用周召始皇雖能逐戎夷而不知逐趙髙李斯雖寓鑒誡之意耶然于費誓經義有何闗渉哉盖古時之中國幅員小後世之中國幅員大其非中國幅員以内之地則率以戎夷目之如禹貢之莱夷作牧孟子之舜東夷文王西夷之類不一而足豈其時東莱諸馮岐周亦有戎夷雜處乎宣王薄伐玁狁至于太原或者其地近北狄闌入居之耳若夫淮浦徐州去邊外逺甚戎夷何所利而捨其故土来居之乎可知淮夷徐戎即其地之土著爾時或有跳梁梗化者未為中國幅員以内之地故以戎夷目之耳即如春秋抑呉越與楚謂之蠻夷猾夏不但不可以例今之江浙湖廣即漢唐以来已無此論矣孔傳固已失之而夏僎以訛傳訛更枝其辭以為始皇能除害先王有不及而申其不憂中國有戎夷第憂朝廷無忠臣之説不已甚乎支離其辭而盩庢其義乎書春秋元年春王正月事春秋聖人尊王之經也元年春王正月開宗眀義之第一也解此者自三傳以至後儒其説充棟或致操戈無容置議然識聖人之深意者有幾乎王道熄而作春秋春秋魯之舊史也自隠公始則不得不書隠公元年而即繼之曰春王正月前史所無有也盖言公之元年乃禀王之春王之正而得是非尊王之義乎且是言也于齊為九年于晉為二年衞鄭以下各為其年不可婁指數而總為平王之四十九年于斯時也世人將何以紀其年而知其嵗乎是則聖人之書元年春王正月也者其亦有感於斯乎行夏之時聖人之私議不能行於時言春王而不言王春月可改而春不可改亦隠寓夏之時與王之元所謂大一統足以一天下之心而不可任其紛有不能行之嘆矣兹為開宗始義乃貫春秋之本末而絶筆於獲麟盖聖人之道在萬世即聖人之憂在萬世然則封建之説不惟不可行於後世知聖人亦未必以為宜然也書洪咨䕫春秋説論隠公作偽事春秋以三傳為近古後世注疏家愈逺愈竒而愈不得其正即如不書隠公即位左氏謂攝盖引而未發似矣公羊以為桓貴則已失之惟榖梁一則謂成公志再則謂成人美終則謂輕千乘之國蹈道則未持論平正而不苛然三傳即能得聖人筆削之精義耶吾不敢信而後世操同室之戈炫獨出之見求勝人而反昧已比比是也如洪咨䕫春秋説之論隠公直以作偽日拙吹求實已甚焉其言盖出於盧仝春秋摘微之緒論盧仝摘微日隠越次而立久不歸位外示攝而中實奪之故不書即位明春秋之由作也是書久佚惟宋杜諤春秋㑹議採其説今於永樂大典散篇内裒輯得之夫仝去三傳幾千百年而咨䕫又去仝幾四百餘年拾人唾餘而以為自出已見此何能欺千載之公論乎謂之為責賢者備猶屬左袒耳書眀列代玉冊事予於戊辰年奉蔵歴代帝后像於南薫殿並弆勝朝列帝玉冊之貯於工部者於殿之西室其時究年少未問及於有冊而無寳也兹因一律重造太廟冊寳告成因取眀十三帝玉冊觀之並思其有冊無寳之故盖其冊多用條玉四條凑成一板以繩穿之此即玉檢金繩之遺義耶於是憬然悟曰此冊之所以存而寳之所以失也夫一板四條而又有穿成造時豈不費琢磨然析其條則為無用之物矣若其玉寳則固囫圇一物磨去其字仍然一寳改製他器隨意可成且宋元近代其冊寳胥不見於世亦可徴也而眀末經流賊之變蹂躪兵燹遷其重器寳失而冊存其理固然夫何疑之有盖天難諶命靡常常厥徳保厥位歴觀諸史開創者多賢或一二世或二三世即有不常厥徳以致失其祖宗之業者此非天使之亡實自取其亡也宗器固重而九有萬民其重於宗器奚啻倍蓰未有失民心而能保其宗器者也而獨於宗器中計其歴久不失斯亦小矣奈何不敬奈何不慎是則予之弆徹出之冊寳於陪京之太廟者其亦有深意耶予之子孫以至百世雲仍亦以予慄慄危懼之心為心而敬天愛民以凛難諶其庶幾乎其庶幾乎書史記冒頓髙后事冒頓寖驕遺書髙后云云是直以髙為妻也髙后大怒欲發兵猶有生人之氣也樊噲請十萬兵横行匈奴中是知主辱臣死之義也而季布乃曰噲可斬且咄咄舉平城事夫平城直髙祖受冒頓欺耳其讐可弗報兹冒頓嫚髙后之言可聞諸耳乎髙后雖牝雞耶巳儼然漢之主矣主受辱而其臣腆顔亦受之不為怪是漢為無人矣雖不反戈向之可乎而布以噲為可斬豈自忘少年一諾任侠之氣哉且其言曰夷狄譬如禽獸審如是是以其主為禽獸之妃矣而年老氣衰弊邑無罪等語豈中國之君所以答外夷之君之語直無生人之氣者矣後世讀史者率是季布而非樊噲懼其啟邊釁也然因懼而受外侮喪師亡國者多矣嗚呼樊噲果非哉季布果是哉雜著讀韓子韓非著説難其於人情世態亦既知之悉而言之詳矣而其所稱周文王晉文公之結韈結履何其謬之甚哉韈履之有帶古制姑弗論而文王文公之事如出一轍一之為甚再何堪焉夫伐與戰嚴装時也臨陣而帶繋解已屬烏有之事而二君者方且周旋道古以為無可使結帶之人則一國之臣孰非先君之臣乎上者中者固不必其下者亦不敢使則二君之於其國竟無一人可使執賤役者將厠牏浣滌亦皆自親之乎夫重士理也重士而失之諂文公之譎或偶為之孰謂文王之聖而為是乎予故斥其謬之甚而眀示重士之有常經也讀周易枯楊生稊辨詁易大過之九二曰枯楊生稊王弼注云楊之秀也孔頴達謂枯槁之楊更生少壯之稊取象顯而易見陸徳眀經典釋文從之考夏小正云正月栁稊稊也者發孚也戴徳自釋其文確然可信足與弼注相發明且微獨王孔之説為然也唐以前諸儒講易者莫不然即鄭康成書作荑而解為木更生虞翻詁作穉而解為楊葉未舒辭雖小異義實不相逺也惟朱子本義以稊為梯且訓為根謂榮於下者其説本之程傳而程子則舉劉琨勸進表發繁華於枯荑為證夫琨信筆為文無與易理然亦未眀言根義而荑之訓又為草琨所謂枯荑安知非在彼而不在此其不足據審矣程朱之意不過以卦體二爻初隂在下遂以為下生根梯而於五爻老隂在上則以為上生華秀夫以一之比初為老夫得女妻五之比六為老婦得士夫可也若拘上下爻之象以根梯華秀分上下爻而言則不可朱子不又云乎榮於下則生於上既曰生於上非秀而何矧植物之性其生莫不由根而幹而枝而芽蘖若舍稊秀而専言梯且訓為根則所云生於上者曷所指乎攷之朱震河上易傳曰二變而與初二成艮巽木在土下根也枯楊有根則其穉秀出稊穉出楊之秀也震未嘗不兼言根而引而至於稊則較程朱之説為賅舉矣間嘗綜爻象之辭而覆按之生稊必當以弼注為正盖陽雖過而濟以隂故能成生發之功譬猶枯楊之生稊始孚秀而具生生不已之象猶老夫得女妻之過以相與也故无不利也五爻生華直當作華絮解陸佃埤雅云栁華一名絮是其義矣盖楊而至於華絮其生意已過自此以往將就衰落故不可久也亦猶老婦得士夫之可醜也則以象辭釋爻辭其義自合即以卦體釋爻象亦無弗合又何必泥程朱之曲解為梯乎但稊之為字雖今時所行大戴禮亦從木然詁解無異義或出刋寫之譌而張參五經文字則列稊於禾部唐國子學石經本漢鴻都之遺最為近古木旁之梯則説文廣韻並訓木階與發榮義無渉亦不可以不正
