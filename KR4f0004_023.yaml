body:
  text: 賦五六天地之中合賦以敬授民時聖人所先為韻繄鴻濛之坱圠兮肇兩儀而互應昭法象之崇卑兮紛萬物其繁盛羌孰體夫天心兮伊誰契乎地柄揭造化之元樞兮示羣生以金鏡粵若宓犧畫卦而知一元之廣運亦越周文繫彖而明三才之有正於焉定嵗序乎星辰總以握綱維於祇敬爾其渾淪初分經緯斯究竒全偶半地天恰配乎朔南兼兩函三剛柔各居其左右積五位以相乘合六爻而互就置閏則道在歸竒積䇿則法惟用九載在周禮屬太卜之攸司稽乃虞書實羲和之所授孰云一三二四之當前與夫七九八十之應後此蓋隂陽定位其運乃神至聖觀象用以前民來復而知履端於子交泰而識建統於寅覘氣候於十有二月驗嵗差於三百六旬彼夫土圭銅渾之是製保章馮相之所陳或北陸而成嵗或東嵎以紀春豈能外大衍之名數總萬有之紛綸若乃衍母衍子各殊其用大餘小餘不紊其時雖月窟天根眇忽難窮其象罔而乾維坤絡翕闢自著其端倪天五得其中也地六從而合之五挈陽樞五五二十五數而不忒六維隂紐六六三十六宫而咸宜於以協大中之運於以定保合之規乃其變化相尋權輿斯定天數六為用而五為體倍其五兮天干盈地數五為君而六為臣重其六兮地支竟氣降為味兮聿觀大化之所由敷民受以生兮乃識萬彚之所從孕圖呈龍馬兮妙用泄造物之竒象著龜書兮至瑞應憲天之聖辨方辨卦定至定分六甲為日五子維辰十一而道畢六十而數均極其數兮遂定天下之象通其變兮遂成天地之文陽竒隂偶兮合而言之曰易天圓地方兮中而處者惟人茲五六之迭乘兮實行生之橐籥惟中合之妙構兮顯天地之絪緼於是順布五行修和六府言乎理兮健順統會乎苞符言乎器兮權度不差乎絫黍用布令於提陬遂紀元於章蔀占鳥火虛昴而定嵗功乘震兊坎離以致時序豈其事事而為之則物物而為之所哉重曰居寰中以御極兮道在節宣察璣衡以齊政兮聖人我先愧參贊之靡易兮凛若氷淵顧民事之綦重兮時罔或愆敷五典與六職兮取法自然期無逸以勤恤兮欽若昊天恭祝聖母皇太后萬夀無疆賦有序伏聞纍洽重熙光啓夀昌之運垂恩儲祉慶延慈訓之隆惟懿德在躬以至仁為茂育斯降年有永自諸福之駢臻我聖母崇慶慈宣皇太后化協乾樞恩周坤絡興媯佐嚳申錫久而長發其祥明德宣仁垂裕深而並受其福茲值仲冬之月欣逢萬夀之期禹甸春回堯封慶洽集衣冠於萬國率拜舞於千官共稱北斗之觴竊擬南山之頌謹拜手稽首而獻賦曰惟坤德之無疆乃自天而凝命既體順以承乾遹鍾祥而衍慶王母受介福逺垂羲易之文京室紀徽音載詠周詩之盛禮崇尊養會下國之共球律轉陽和運中天之璣鏡桃熟三千之候愛日舒長山呼萬嵗之聲慈雲髙映占南極之光華奉東朝之溫凊擁佳氣於蓬萊共欽瞻於慈聖徽號極域中之尊至仁為天下之母配天而虔奉三無應地則含宏九有永彌性以優遊介繁禧而昌後竊欣膝下之承歡就養無方於左右黃裳中正開長信而禮洽宫庭彤幄輝光出丹泉而瑞盈郊棷挹天酒以潤芳萱回鳯輦而縈宫栁臨華渚以逍遙邁斗維之悠久於時律中黃鍾日臨婺女驗添線於金針候吹葭於玉吕恭逢誕聖之辰正協履長之序聲傳綘幘尚衣初進雲裘光映朱霞列樹猶然彩炬引璇宫之法駕盛儀衛於鈎陳振丹陛之元音應鏗鏘於鐘虡雲開扇影瞻寶座而奏瑶箋香裊爐煙啓芳筵而斟桂醑躬舞蹈以奉觴循玉除而容與歡騰薄海慶溢敷天曠代之苞符輻輳殊方之寶賮駢闐九葉金芝吐榮華於天秀萬年玉册銘琬琰以神鐫雲綃呈織女之機七襄錦麗寶綴仙人之珥四寸珠圓饌龍根而待御擘麟脯以烹鮮紫府之瓊漿若醴華峯之碧藕如船盡入充庭之貢並登介夀之筵若乃車書南北尉候西東競厠身於朝列隨稽拜於臣工共晉九如之祝羣欽萬福之同聽仙韶之應節覘瑞靄之浮空鳯舞鸞歌奏鈞天而陳廣樂雲蒸霞蔚揖金母而拜木公花滿瑤池之上籌添海屋之中信上元之資福綿景祚於無窮臣祇奉母儀儼同天覆幸當清晏之期喜值文明之晝遊觀上苑效扶侍於鸞輿瞻望春暉煥斑斕於舞袖天開有道之祥星紀長庚之宿仰純嘏之緝熙兮荷貽謀之孔厚愧頌揚而莫罄兮願福祿之永茂自今以始兮八千春長祝慈闈兮無量夀建福宫賦居寰中以御物凛天命兮難諶懼大業之弗勝恆乾惕兮小心戒峻宇與雕牆鑒酒池兮肉林愧飢溺其未解遑安逸兮是尋乃者新宫落初玉戺金鋪創名建福義何居乎蓋是地也圍於宫牆而弗加擴卑於路寢而弗增華畏炎歊之相逼乃託興於清嘉儉不至陋幽而匪遐況在重華之右重華宫朕舊居也在新宫之左比之興慶之宫未費司農之帑何勞庶民之攻經之營之募千夫而齊力如松如竹閲數月而成功於是殿方馺娑宫比駘蕩長春長樂披青簡而空傳太和保和憑朱欄而相望千門萬户兮笑漢制之太奢茅茨土階兮欽堯儉之堪尚軒號靜怡兮期成性之常存齋名敬勝兮恐舉念之或妄亭顔惠風兮欲膏澤之旁敷閣扁延春兮與羣生而咸暢觸目警心兮守此志而始終居安思危兮常厪懷而籌量爾其文石矗立嘉木叢生羅芝田兮蕙畹來燕賀兮鶯鳴披薰風兮思解愠對時雨兮樂向榮觀太宇兮調元化育萬物兮驗農耕又何必焚隋廷之甲煎樹漢苑之金莖歌陳宫之玉樹聽唐曲之新聲而始稱悅情也哉於時而春覽生意而欣欣於時而夏逺煩暑而灑灑乃其秋也偉西成之可慶乃其冬也體貞元之凝命載色載笑奉慈闈而承歡來遊來歌與良臣而交警於以承先廑肯構而勿忘於以示後庶斯言之是聽重曰洪範有言斂時五福敷錫庶民與時茂育豫宅是居心乎肅肅受天之祜匪藉田燭建民之極匪侈華屋繼繩光烈對越於穆進賢納諫懲惡旌淑志苟懷安是謂不穀尚慎旃哉永膺天祿盛京賦有序嘗聞以父母之心為心者天下無不友之兄弟以祖宗之心為心者天下無不睦之族人以天地之心為心者天下無不愛之民物斯言也人盡宜勉而所繫於為人君者尤重然三語之中又惟以祖宗之心為心居其要焉蓋以祖宗之心為心則必思開創之維艱知守成之不易兢兢業業畏天愛人於是刑兄弟而御家邦斯以父母之心為心也民同胞而物吾與斯以天地之心為心也孔子曰明乎郊社之禮禘嘗之義治國其如示諸掌乎宗廟禘嘗之典固先王繼志述事之大經也然自聖人象大過肇封樹以來上陵之制漢代已然我國家肇興盛京邠岐之地橋山在焉昔皇祖六十一年之間三謁丹陵用展孝敬皇考在位百度維新日不暇給適西鄙有事徴役已勞又藩邸時曽奉皇祖命往謁祖陵是以十有三年中未舉是典豫小子纘承丕基懼德弗嗣深帷祖宗締搆之勤日有孜孜敬奉神器言念盛京為天作之基永陵福陵昭陵巍然在望不躬親祀事其奚以攄慤忱而示來許爰以乾隆癸亥秋恭奉皇太后發軔京師屆我陪都孝思以申祖武是仰因周覽山川之渾厚民物之朴淳穀土之沃肥百昌之繁廡洵乎天府之國興王之會也昔豳居相度召頌公劉岐宅作屏周歌大王莫不於上帝之監觀下民之君宗三致意焉故物以賦顯事以頌宣既見於斯豈默於言乎遂作賦曰嵗大淵獻時旦栁中協律無射辨方庚辛厯吉日以建旗駕應龍之和鸞紛灕呼蕤蜿蜒旌雄虹橦鳴鳶周乎神臯之壤屆乎箕尾之躔循我留都殺禋珠丘懷精氣仰德流既備既申乃御黼座而覲臣僚維締造之彌艱撫草創之鴻圖曰於休哉是蓋突載亳之子殷躐宅鎬之姬周憑虛致譏於東約安處薦誚於西踰下此離為十二之國合為六七之侯鼎立瓜分者益瑣纎旁魄不足以殫攄而孟堅平子太沖者倫方且艷陳崤函隴坻之隘鹽池墨井之腴枍詣天梁之麗三條五劇之區極鋪張以詭辨彼何辭乃稱諸奚侔夫天作之皇宅又何藉萇宏與魏舒於是咨文獻考圖册不恧不文爰賦其略聚精搆思挂一漏百粵我清初肇長白山扶輿所鍾不顯不靈周八十里潭曰闥門鴨緑混同愛滹三江出焉帝女天妹朱果是吞爰生聖子帝用錫以姓曰覺羅而徽其稱曰愛新是翦是除匪安匪康乃有葉赫輝發界蕃撫順遂築城於遼陽以為東國之宗天篤其祜載恢厥功天命十年相險宅中謂瀋陽為王氣所聚乃建盛京而俯關西故言其封域則雖始自秦漢厯隋唐以迄遼金歟而舉其規模則維新皇運膺靈佑之獨深也仰符十度之尾實臨析木之津得雲漢之所垂維北極之所鄰亦何異乎召伯相宅卜惟洛食奉春建䇿留侯演成哉於是乎左挾朝鮮右據山海北屏白山南帶遼水滄溟為池澎湃灅偎流湯湯赴瀰瀰撇􅪋訇回渾渼浴日沃星莫測其始東盡使犬之部朔連牧羊之鄙啓我漠惠之原擴我俄朵之址髙燥埤濕原田每每走大野而拱太室者萬有餘里其山則鐵嶺繡嶺平頂降龍木查石門東水南雙矗嵑􅙙聚􅀢嵏􅀈兮屴崱嵌兮􅭆洞􅀢兮巃嵃嵂兮嵣嵡蔽虧日月源流湖江既孕竒而盤鬱亦含秀而隆崇故夫四蹄雙羽之族長林豐草之衆無不博産乎其中蹄類則虎豹熊羆野馬野騾鹿麞麅麀狼豺封駝狐貍貛貉跳兔婆娑蚡鼯艾虎貂鼠輕嘉其他牛馬羊豕之資以日用者蓋填閭巷而蒸寢訛羽類則野雞沙雞鵝鴨青􅝄鸛鶴禿鶖維鵜在梁縮脖鳩燕啄木鵲鶬鷹鷂雕鶻紅牙商倉黃鵪鼠化白雁霜橫曰海東青出黑龍江林擊則天鵝褫魄甸搏則窟兔走僵其他鴿雀銅嘴桃蟲鴛鴦雜沓紛泊騰軼翺翔其草則蒿艾香蒲蘆葦蕭荻章茅水蔥紅藍綬虉馬藺知時木槿紀節厥惟人參三丫五葉氣稟地靈功符隂隲商陸茵陳萹蓄葶藶蠡實兔絲均能已疾其林則五針之松萬年之柏重障隱天幽林蔽澤挺崇槐之曽青蔭匱栁之濃碧大椿以八千為春夀櫟以不材為德爛紅杏與緋桃紛白梀與黃蘗山藤柔韌是資鞭䇿雞桑落黃可供蠶織陸珍既牣海錯亦繁鯉魴鱒鱖鯼鯽鱅鰱鰷鯝鱧鱤鮠鰌鮎鱓比目分合重脣浮湛劔飾鮫翅栁炙細鱗牛魚之長丈計帶魚之白韋編烏鰂之鬚粘石渡父之喙矴船他如虴馬驢狗豚獺豹貛出沒乎洶涌潛躍乎遊淵蒼龍揵鬐而雲作赤螭掉尾而波開老蚌含珠九光燭天神竒是韞瓌瑰是生雖山經與地志羌莫得而詳焉懿茲奧區原隰畇畇厥田上中厥壤惟平抱海負蓋跨遼欱宣渾河為帶興京為襟袤復陸而坦坦黋拓落而藝藝偉嘉禎之萃薈信槖籥之絪緼帝眷東顧用畀皇清而為萬載之沛豐若其測圭臬度廣輪依繩尺疏渠川歌經始詠攸寧又可略聞矣天命天聰丕顯丕繼因其舊瀋拓我新制規天矩地嚮明授時增八門之詄蕩脅九逵之邐迤翼翼俾倪岧岧堞雉起圜丘於郊南單埢垣之潔祕欽柴揚槱陳玉薦幣鼓雲和升繭栗以邀肸蠁而昭祀事霜露在履春秋聿遷愾乎僾乎肇禋閟宫滌濯毛炮元酒太羮文祖神宗爰歆於斯符帝車之太乙正王宫於未央重三殿之實枚表雙闕於闔閶闕名維何文德武功殿名維何崇政建中髙樓望氛厥題鳯皇後宫紫極交泰清寧關雎麟趾化洽家邦維朴而安乃鞏而臧豈其工㮰檻之刻鏤豈其飾榱橑之焜煌豈其疏龍首之崴嶫豈其叛鳯翼之昻藏匪有心於儉約乃潛揆夫陶唐大政當陽十亭雁行爰諏爰度日贊日襄吉君臣之一德而擴我闥於八荒正號紀元以受天慶於是定兩翼之位列八旗之方黃白紅藍有正有鑲法其象於河鼓則其數於羲經神其變於三五握其竒於九宫大聖創制動協天象是猶易之書契乃觀蹄迒焉樹以屏翰馭輕居重本支百世昌我宗潢佐命之勳曰費英東額都希福績茂蕭張曰有坐謀曰有折衝既彬彬而濟濟亦赳赳而彭彭其餘附鳯而攀龍者蓋車載與斗量爰制國書聿興文教演義譯音物取其肖允維大海克稱檢校雖絶域其必通即纎故其亦貌若夫人自為戰王者無敵角嚴則百墉失憑旌揮則三邊定檄義不返顧勇不重壁是以敉四海而莫攖亘千古而鮮匹故班録於纍世用以酬夫勞績及其斗杓北指涉冬背秋爰狩中原我戎是修靡虹采裊霓斿拖霧纛建雲旗後屬車前導遊乘我良産屏彼雕輈右忘歸之箭徑左繁弱之弓柔倩浰而雷動鴻絧而星流又何必王良執轡纎阿御軥也哉於是帶甲之士百萬盡發鷹犬而驟驊騮卑泰山之為櫓跨渤海以張罘林林裔裔列列裒裒命地而後中應聲而先掊散壄麋之羣友剔穴狸之伏留駭巘麢之儦俟讋郊兔之佻偷既肩惰指倦而麌麌之羣猶緣陵蔽野比夏草之稠焉爰用三驅示無盡劉更命羽林佽飛之士手豹尾踞虎頭搏洞熊殱澤䝏觀壯夫之鶴躍快猛獸之貙膢乃獻我成禽舍彼踐毛擇其上殺允惟左膘以奉宗廟乾豆亨炮次充賔客乃薦君庖班獲行賞訖乎輿僚是蓋因天地之利習軍旅之勞戰則克而祭受福古者搜苗獮狩之禮所為昭詎其害三時之土穀奪百姓之腴膏蹂桑柘之地廣虞獵之郊如子虛上林之所嘲也哉將將蕃后夔夔列君奉贄來朝齋遫侍宸或稽首而請聘或傾心而納姻於是樂以九奏饗以八珍邁呼韓之朝天踰頡利之舞庭合內外為一家自我祖而已然坰牧之宜曰大凌河亘肥壤之博衍茁靈草之敷披夏蚊避境春泉漾波是以駉駉之牡蕃孶孔多爾其驪驈騅駓騂騏駱驒騮馰驔騧馯帆駰騢或眠而馾或行而􅀈惟致逺之有賴亦揚威之無過畿甸既闢農桑是咨爰飭田畯爰勵甸師物早晚之種辨髙下之宜男則耕耘是務女則織紝是謀抑工商之末業勤衣食之本圖故深耕易耨穀用滋也九夏三耘免汙萊也雨我公田遂及私也庤我錢鎛銍艾時也我簋斯盛實佳粢也我倉如陵庾如坻也服尚布棉奚纎美也器用陶匏戒奢靡也土物是愛神降嘉生黍惟秬秠稻惟糯粳粟惟穈芑梁惟白黃解蠡胡麻來牟鈴鐺蘇分紫赤豆有豌豇蔬則蕓薹薤蒜蘿蔔韭蔥蔞蒿蒲筍紫堇茴香壺盧蔓菁萵苣葵薑鮮不斾斾穟穟唪唪幪幪驛驛厭厭綿綿穰穰惟脈土之獨純斯穡事之孔良農隙教戰守禦相望國以殷富兵以盛強鬱蔥佳氣盤礴無垠民風噩噩伾侁自然休有烈光格于皇天上帝其子之維有厯年是以我世祖因人心之歸清順天意之厭明掃驅除之閏位統子弟之精兵無亡矢遺鏃之費而膺圖正位乎燕京蓋嘗考千古之興替稽百代之厯數拒符瑞之難諶信仁義之堪守斥逐鹿之蠱説審神器之有授乃知帝命不時眷清孔厚也不有開之何以培之不有作之何以得之夫其披荆棘冒氛霾厯艱辛躬利害無嬗代之迹而受車書之來者蓋書所謂于湯有光詩所謂民之攸歸矣皇矣陪都實惟帝鄉乃命秉鉞之帥乃置五部之卿民安郡縣旗樂屯莊春秋耕斂我倉我箱朝會朔望躋躋蹌蹌昭萬年之有道卜百世之靈長乃作頌曰於鑠盛京惟瀋之陽大山廣川作觀萬方虎踞龍蟠紫縣浩穰爰浚周池爰築長墉法天則地陽耀隂藏貨别隧分旗亭五重神基崇俊帝系綿昌周曰邠岐漢惟豐沛白水慶善興王之會長白隆隆滄溟濊濊形勝之選奕世永賴俯臨區夏襟控中外休養百年既豐而泰溯其始謀繼序敢懈昔我聖祖三至斯土棽麗六飛森沈萬旅孔碩九重不遑安處祇謁山陵亦臨朝寧置酒故宫用酬父老乃霈恩施逮乎編户匪勤於巡良慕乎古閔豫弗德實纘丕基嵗時太廟陟降格思緬仰鼎湖惟瞻惟依荷天之龍際時之和駕言徂東絡繹羽儀風舉雲搖鱗萃魚麗我賔我臣我行是隨載至神鄉載覲園寢靈鬱崇輝祥凝巨瀋原廟衣冠霸陵衾枕松柏雲縵溪池流淰蕩滌洪爐陶甄羣品石馬悲風淚泉沾衽豈必羮牆一氣是稟聿造故宫故宫赫赫聿升太階太階奕奕無彩之飾惟厚之積皓曜䨲照歙赩烏赤左墄右平坤闔乾闢土壁葛燈遐哉儉德詒我孫謀萬年之宅乃開南端設席肆筵爰爵周親及彼鵷鸞南陽故舊灑如言言惟此嘉師列祖之臣是噢是咻是貽我躬敬之敬之翼翼惴惴於億萬嵗皇圖永綿御製文初集卷二十三
