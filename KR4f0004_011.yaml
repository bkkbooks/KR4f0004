body:
  text: 序重刻十三經序班固氏曰六學者王教之典籍先聖所以明天道正人倫致至治之成法也漢代以来儒者傳授或言五經或言七經暨唐分三禮三傳則稱九經已又益孝經論語爾雅刻石國子學宋儒復進孟子前明因之而十三經之名始立自宋易漢唐石刻之舊五經始有板本及眀南北監板行而箋䟽傳義臚列具備學士家有其書傳習彌廣顧訓詁繁則蹖駁互見卷帙重則豕亥易訛或意晦於一言之舛或理乖於一字之謬校讐踈略疑誤滋多承學之士無所取正我朝列祖相承右文稽古皇祖聖祖仁皇帝研精至道尊崇聖學五經具有成書頒布海内朕披覽十三經注䟽念其嵗月經乆梨棗日就澷漶爰勅詞臣重加校正其於經文誤字以及傳注箋䟽之未協者參互以求其是各為考證附於巻後不紊舊觀刋成善夲匪徒備金匱石室之蔵而已書曰學于古訓乃有獲傳曰經籍者聖哲之能事其教有適其用無窮朕咨采勅㡬實無審定之暇亦無鑒古之識而惟是緝熙遜志日就月將則有志焉而不敢不勉繼自今津逮既正於以窮道德之閫奥嘉與海内學者篤志研經敦崇實學庶㡬經義明而儒術正儒術正而人才昌恢先王之道以贊治化而宏逺猷有厚望焉重刻二十一史序七録之目首列經史四庫因之史者輔經以垂訓者也尚書春秋内外傳尚矣司馬遷創為紀表書傳之體以成史記班固以下因之累朝載筆之人類皆嫻掌故貫舊聞傍羅博采以成信史後之述事考文者咸取徴焉朕既命校刋十三經注䟽定本復念史為經翼監本亦日漸殘闕併勅校讐以廣刋布其辨譌别異是正為多卷末考證一視諸經之例明史先經告竣合之為二十二史煥乎冊府之大觀矣夫史以示勸懲昭法戒上下數千年治亂安危之故忠賢奸佞之實是非得失具可考見居今而知古鑒往以察来揚子雲曰多聞則守之以約多見則守之以卓豈不在善讀者之能自得師也哉日講禮記解義序皇祖聖祖仁皇帝稽古右文命儒臣日值講筵五經通鑑以次進講薈萃羣言發明㫖要臚為解義積有成編譯以國書頒示中外各製序言弁其端而授諸梓易書詩三經先竣春秋若干卷刻於雍正年間惟禮記巻帙浩繁藁夲存繙書房久之未竟厥業朕御極之初允儒臣請纂脩三禮義䟽因取日講禮記解義原本㕘校異同歸於一是并命翻譯授梓以備五經之全敬列皇祖御製原文於前而略述大槩以誌成書嵗月惟禮記出自漢儒然多本於七十子之所傳習如大學中庸二篇既經有宋大儒定為孔氏遺書訓釋而列於學官其他精言奥義往往與易詩書春秋相發明非董仲舒揚雄輩所及盖其来有自去聖人之教固未逺也雖月令王制附益其間有以啟後人疑議而先王之制所傳各異事之不可考而説之不可强同者亦已多矣依文立訓以存舊觀說經之通例也抑班固有言六經之道同歸而禮樂之用為急經禮三百曲禮三千豈惟其文而已盖將以章志貞教大其坊與天下臣民共之仰惟聖祖序言所謂體諸躬修措之邦國者禮之實而明經之大用也因言以求其義因義以逹其用夫豈章句訓詁之足云敢申言之以闡至訓欽定三禮義䟽序三禮之傳逺矣周禮六官河間獻王上之儀禮十七篇禮記四十九篇髙堂生戴聖傳之漢唐以来箋䟽訓釋無慮數十家考其義或相牴牾先儒嘗譏其聚訟要其掇拾灰燼之餘傳先王制作之舊得什一於千百好古者所為鄭重而愛惜之也我皇祖聖祖仁皇帝表章羣經既御纂周易折衷而詩書春秋則以分授儒臣纂輯義䟽頒布海内惟三禮未就朕御極之初儒臣上言今當經學昌眀禮備樂和之㑹宜纂輯三禮以蕆五經之全爰允其請開館編校越十有一年冬告竣夫禮之所為本於天殽於地達之人倫日用行於君臣父子兄弟夫婦朋友之間斯須不可去者天不變道亦不變此其本也其制度品節服物采章随時損益屢變以適其宜者禮之文也三代去今數千年矣脩其教而教眀循其道而道行謂三代至今存可也何則其本得也若其用之朝廷邦國名物器數之具周旋進退之儀雖先王處此必将變通以適其宜而不泥扵其迹故言禮者惟求其修道設教之由以得夫禮之意而已顧其教之不冺道之所由傳未嘗不賴於經好學深思之士讀其書有惜不能俯仰揖讓於其間者先王制作之精意尚可想見扵抱殘守闕之餘則經傳之為功也大矣鼎彛鈎劍之遺篆籀之蹟流傳有自尚摩挲而寳䕶之况制作之精意所賴以傳者歟獨其貿扵衆說無所取衷爰命校纂諸臣芟煩截浮約文申義敷暢厥㫖至其說之不可强同者稍為辨正而仍其舊盖其承傳各異必牽合附㑹比而同之則其惑也滋甚故無取焉刻既成為之叙論以發其端俾隆禮者有所考云皇清文頴序我大清受命百有餘年列祖徳教涵濡光被海宇右文之盛炳焉與三代同風朕紹聞遜志以是為學亦以是為治矢其文德一紀扵兹易曰觀乎人文以化成天下盖自有天地而人經緯乎其間士君子之一言一行國家之制度文為禮樂刑政布之為教化措之為事功無非文也乃其菁英所萃蔚為國華詞以殽之聲以永之律以和之諧協六同彰施五色典謨作焉雅頌興焉詩不云乎追琢其章金玉其相文之盛也而賡之曰勉勉我王綱紀四方則所謂其風自上也曩我皇祖命大學士陳廷敬選輯皇清文頴儲之延閣未及刋布皇考復允廷臣之請開館編輯随時附益久之未竣朕因命自乾隆甲子以前先為編次凡御製詩文廿四巻臣工賦頌及諸體詩文一百巻録成序其首簡昔之論文以代為次者扵漢則有西漢文類唐則有文苑英華唐文粹宋則有文海文鑑元則有文類眀則有文衡皆博綜一代著作之林無體不備今是編惟取經進之作朝廷館閣之篇與諸書小異然以觀斯文風尚當有取焉在易渙之象曰風行水上善立言者以為天地自然之文而序卦受之以節言文之不可過也繼之以中孚言有實也節而不流徴之以信有典有則可久之道其在斯乎朕孜孜典學求所以善持之者因以為摛文者鵠俾共勉云重刻通典序稽古帝王治天下之大經大法以及累朝名物制度因革損益之詳紛綸浩博散見典籍未有統貫唐宰相杜佑於為淮南節度書記時始出己意捜討類次勒成一書名曰通典為類八為書二百卷自唐肅代間上溯唐虞雖亦稍据劉秩政典及開元新禮諸書要其網羅百代兼綜而條貫之斯已勤矣厥後鄭樵廣之作通志馬端臨續之作通考三書並行於世朕以其歴年乆逺頗有殘缺特命重為校正刋刻以廣其傳通典實先告竣朕惟三書各有意義鄭樵主扵考訂故旁及細㣲馬端臨意在精詳故間出論斷此書則佑自言徴於人事将施有政故簡而有要核而不文觀其分門起例由食貨以迄邊防先養而後教先禮而後刑設官以治民安内以馭外本末次第具有條理亦恢恢乎經國之良謨矣書曰學于古訓乃有獲為國家者立綱陳紀斟酌古今將期與治同道而不泥其迹則是書實考鏡所必資豈以供博覽而已哉爰掲之以告讀是書者詞林典故序詞林典故書成大學士張廷玉等以序請朕惟六經之士豈易言哉而况躋玉堂而列芸署者盡六經之彦也木天故事歴代沿革具見扵斯則又何言惟是國家重館閣之選極優遇之隆詎祇蜚其英聲将以華國而已哉如濂溪所謂文以載道者舍是無他求夫布衣韋帶之士由立言以期不朽足矣若夫國家右文重道将以淑世熈績繼往聖之絶學開萬世之太平胥是賴焉名之盛者實難副任之大者責彌重譽之来者毁亦随其尚思春華秋實之喻而凛虛車麟楦之譏哉重刻文獻通考序朕允儒臣之請校刋三通通典既竣即以文獻通考付之剞劂是書曾蒙皇祖聖祖仁皇帝命禮臣補訂殘缺御製序文梓行宇内顧簡帙繁重年乆不無漫漶今悉仿十三經二十二史成式刋訂盖扵是家有其書矣朕惟㑹通古今該洽載籍薈萃源流綜統同異莫善扵通考之書其攷覈精審持論平正上下數千年貫穿二十五代扵制度張弛之迹是非得失之林固已燦然具備矣夫帝王之治天下也有不敝之道無不敝之法綱常倫理萬世相因者也忠敬質文随時損益者也法久則必變所以通之者必監扵前代以為之折衷大哉我聖祖之序曰有治人無治法師古者師其意不師其迹誠體此意而因其可因損益其所當革因時以制宜理得而事舉則是編也誠考据之資可以羽翼經史禆益治道豈淺鮮也哉是為序初集詩小序向叙樂善堂集云夙昔典學所心得不忍棄置後雖有作或出詞臣之手真贋各半且亦不欲與文人學士争長故十數年来臣工以編次詩文集為請者槩弗許然㡬務之暇無他可娱往往作為詩古文賦文賦不數十篇詩則托興寄情朝吟夕諷其間天時農事之宜涖朝将祀之典以及時巡所至山川名勝風土淳漓罔不形諸詠歌紀其梗槩積至今以數千百首計矣而較晴量雨憫農疾苦之作為多觀其詩可以知憂勞而騐今昔使閱嵗逾時或致殘缺失次其不忍棄置較先為甚因取丙辰以迄丁卯所作略加編定都為四十四巻古今體計四千一百五十首有竒命翰林中字畫端楷者分巻抄錄装為一集不付剞劂猶初志也時乾隆己巳夏六月望日毛詩全圖小序己未春乗萬㡬之暇補宋馬和之舊蹟為毛詩全圖間亦指稿渉筆並錄全詩扵右越數年始成帙帙成序其事扵後因念詩義深逺尤切扵尋繹宣聖以詩設教與書禮並雅言之昔人蔵書猶備數本况兹圖本不徒以文翰重乎爰命畫院諸臣設色為之詞臣裘曰修録詩别為一部庶政稍閒棐几時展覺三代朝章民俗一一具存淳龎忠厚之風猶去人不逺也夫詩以言志言之不足故長言之長言之不足故嗟歎之嗟歎之不足故不知足之蹈之手之舞之是圖也錄至於再其亦長言永歎之㫖乎重刻通志序宋鄭樵氏以閎通之學思欲極古今之變㑹通扵一仿厯代史例采正史及百家雜録為紀傳為譜為略所撰二十略者包羅天人錯綜政典該括名物上下數千年首尾相屬用功亦良勤矣觀其詆訶司馬遷班固之失髙自稱許謂足以盡學者之能事豈不卓然雄視著作之林而後人復歴舉其踈漏如馬端臨通考之所議者則亦不䏻為之諱也夫博物洽聞之士殫畢生之精力從容几研囊括貫丳勒為成書宜其援据精而條理宻顧紀事纂言尚不免扵紕繆若此豈非所謂多而不䏻無失者歟而况設局分曺成扵衆手動淹嵗序舉後忘前亥豕魯魚觸目而是任操觚者其可不知所懼也乎甚矣夫著述之難也好古者類矜三通既重刻通典通考工竣爰出内府通志善本校而付之剞劂以廣考索之助而序之如此叶韻彚輯序叶韻非古也而即古也有今韻而後有叶韻叶韻者以古韻而協之扵今故曰非古然以今視之則用叶以合異以古視之則非叶而本同故曰即古朕幼習易詩諸經考其音多與今韻不合長而汎覽百家其用韻亦往往異扵今讀盖韻書之行權輿江左至唐以聲律取士部分較嚴而今所循用則出扵宋元人之分併宜其與古不相契也三代而上言律吕言諧聲言書名其扵音韻當必審清濁别脣齒喉舌有一定之部分勒之簡策與律度量衡象魏之法同為當世所遵守而惜其世逺而不傳也好古之士欲忖而求之其道無由宋吴棫本易詩史漢諸書為韻補子朱子嘗取以釋毛詩楚詞眀楊慎廣之為古音號稱淵博及證之羣籍其䟽略不備者則已多矣因扵㡬暇指授儒臣博考經史諸子以及唐宋大家之文所用古韻舉而列之䟽其所出次扵今韻之後臨文索句就考焉可以恢見聞可以益思致獨是四庫之編浩如淵海學士畢生不䏻窮其讀區區掇拾而覼縷之何異稽躔次而溯有虞氏之敬授汎江淮河漢而追禹功之䟽鑿其可指而數者㡬何然方之嘗鼎之一臠則未始非汲古之助云爾爰授之梓而行之御選唐宋詩醇序文有唐宋大家之目而詩無稱焉者宋之文足可以匹唐而詩則實不足以匹唐也既不足以匹而必為是選者則以唐宋文醇之例有文醇不可無詩醇且以見二代盛衰之大凡示千秋風雅之正則也文醇之選就向日書窓校閱所未畢付張照所足成者兹詩醇之選則以二代風華此六家為最時於㡬暇偶一涉獵而去取評品皆出扵梁詩正等數儒臣之手夫詩與文豈異道哉昌黎有言氣盛則言之短長與聲之髙下皆宜然五三六經之所傳其以言訓後世者不以文而以詩豈不以文尚有鋪張揚厲之跡而詩則優游饜飫入人者深是則有文醇尤不可無詩醇也六家品格與時㑹所遭各見扵本集小序是編彚成梁詩正等請示其梗槩故為之總序如此沈徳潛歸愚集序沈徳潛将鋟其歸愚集前稽首而請序且曰人臣私集自古無御序例第受特逹之知敢恃寵以請不即望序或訓示數語可乎徳潛老矣憐其晚逹而受知者惟是詩余雖不欲以詩鳴然扵詩也好之習之恱性情以寄之與徳潛相商㩁者有年矣兹觀其集故樂俞所請而序之夫徳潛之詩逺陶鑄乎李杜而近伯仲乎髙王矣乃獨取義扵昌黎歸愚之云者則所謂去華就實君子之道也夫子之訓小子曰何莫學夫詩使如後世雕龍祭獺之為者聖人将斥而禁之顧反䟽其源而導其流乎亦惟是名教之樂必有言之不足而長言之者舎是其何以哉昌黎因文見道始有是語固不必執風骨體裁與李杜較甲乙而歸愚叟乃䏻深契扵此識夷守約斂藻就澹扵向日所為壯浪渾涵崚嶒矯變人驚以為莫及者自視若不足且有悔心焉是則李杜髙王所未到而有合扵夫子教人學詩之義也夫非常之人然後有非常之遇徳潛受非常之知而其詩亦今世之非常者故以非常之例序之異日者江國行春靈巖駐蹕思欲清問民艱暇咨新什将訪歸愚叟扵愚公溪谷之間矣詩古文書窓所夙嗜踐阼以来萬㡬鮮暇雖或寄興吟詠而古文不數數為之是序構思染翰至四刻始就非復有曩日弓燥手柔之樂况能津逮古人耶歸愚叟扵近代詩家視青邱漁洋殆有過之無不及者故樂為之序不復計其工拙遲速書巻以賜嵗云暮矣封事稍稀更償文債亦足為藝林增一勝事也乾隆辛未小除夜書於坤寧宫御製文初集巻十一
