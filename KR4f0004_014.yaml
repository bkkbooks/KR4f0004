body:
  text: 問經解問儒者之學莫尚於窮經經籍浩繁毋煩臚舉今試撮其大綱凡通儒所宜共曉者為多士詢焉經之名昉於何時五經六經七經九經十一經十三經之名分於何代秦焰雖烈而不能掩其光者藏於何人所藏何書其後出於何地獻於何朝頒於何世各經授受源流何所依據章句注疏傳解箋詁之屬有何異同其施諸學官用以取士者何所因革又如古有三易夏何以稱連山殷何以稱歸藏周何以稱周易且連山不始於夏歸藏不始於殷周易不始於周其說可得聞歟傳周易者有四家其興廢可得考歟書何以有古文今文之别詩何以有齊魯韓毛之殊春秋左氏公穀而外又何以有鄒氏夾氏鐸氏虞氏之類諸家分門别派其說可悉數歟禮始於髙堂生顯於后倉其轉相傳述者誰歟二戴何刪馬氏何補冬官何闕儀禮何逸羣儒議論紛紜其說可詳陳歟論語何以有魯論齊論大學孝經何以有古本今本爾雅或曰周公作或曰子夏作其說何居孟子何以或刪或疑或翼或尊何其識之相逺歟惟中庸無異說而學庸二篇原皆載於戴記其别為詮說而列於四書者自何而始歟凡此經傳源委其能條分縷晰闡其微言抉其奧義而銖黍之不爽歟漢唐以經學取士或専通或兼通或帖十通五皆得與選舉之格多士果能博學該通條對精詳斷制明决者固膺上第即或就所已知各抒所見而言有條理詞歸雅馴亦足以備採擇其悉言毋隱朕將親覽焉史論問儒者學術之要先經次史凡具淵通之學必擅著作之才然非熟於掌故周知上下數千載之事理而剖决其是非者不足以語此則史學尚矣今之稱正史者皆曰草一史豈草一史之外别無正史歟抑草一史之名遂定而不可移易歟又豈正史之外别無他史歟考之漢唐宋藝文志及隋經籍志所載諸史其名類甚多而稱史學者惟以馬班諸人為宗何歟史記漢書成於遷固不自遷固始也開之者誰補之者誰注解之者又誰也范史一書與馬班並稱三史而袁宏荀悅之作獨不可嫓美歟陳夀之志帝魏退蜀正統已紊孰稱其是孰正其非可與三史並傳歟即三史之書又果無遺憾歟晉書創於何人共有幾家唐太宗命房喬等再加撰次所稱房喬者何人也其稱房喬等者又共幾人也觀其文多駢麗史體固應然歟南北史皆成於李延夀而考之南朝北朝各有専史乃延夀復為合之合者可取則専者宜刪専者既行則合者可廢而八書二史皆得並行辭多重復後之作者獨不可彚而修之歟六朝之後隋書頗善其所撰諸志綜核尤工近世儒者専稱五代史而不及隋書又何說也唐書新舊二編各有短長自新書出而舊書流布無多不得並載十七史中其故何歟梁唐晉漢周皆有史薛居正嘗修之歐陽氏之本誠善矣而薛氏之本猶可得見歟宋遼金三史已不及前代而元史成於倉猝舛謬尤多乃後儒罕能刪定以成佳史豈古今人果不相及歟且史之體有二曰編年曰紀傳紀傳之善自司馬遷史記始而編年之善則自司馬光通鑑始通鑑本春秋之法至朱子則綱仿春秋目仿左氏而前編續編之作亦皆得其遺意此外體例甚繁沿革互異作史者奚啻數百家多士有能悉數其姓氏詳其名目以證其是非者歟將備舉作者之優劣以考正諸史之得失則一代著作之任殊有厚望焉毋剿說毋雷同毋苟且以干名毋徇人以自誤有志進取者尚慎旃哉其各矢乃心獨抒所見以毋負朕延訪之至意乾隆四年三月廷試貢士策問朕惟帝王統御寰區代天子民敇眀旦凛對越廣咨詢切飢溺朝夕乾惕不遑寧處者亦惟思措天下於治安登斯民於衽席緬想唐虞之世吁咈一堂時幾互警其時黎民於變府事修和猗歟盛矣朕以凉德纂承丕基孜孜圖治四年於茲勤恤民隱痌瘝在抱蠲復遍于各省而閭閻尚覺艱難賞賚時及八旗而京師未見富庶論者謂泉布之貴病在禁銅今銅禁開矣而錢價轉昂又謂物料之貴病在稅重今關稅薄矣而物價未減用是日夜思維不能稍釋惟恐言路或有壅塞而利弊不知乃咨詢倍切而假公借私者多實心忠愛者少苟且塞責者多直陳時務者少豈折檻牽衣之流不可見於今日耶元為善長宅心豈可不寬而尚寬大則諸弊叢生民生轉受其纍恐其流也稍事整飭而觀望者又以為上心在嚴遂莫不以苛為察以刻為眀而民受其困矣夫以今日之風行今日之政不過補偏救弊權宜設施思欲家給人足講讓興廉成比户可封之俗將何術之從歟又如河工一事動如聚訟新開運口論者紛紛彼身當其事者稍自擔承衆即以為固執而措置失宜若一無釐正又以為因循而不足與為是責人則易而自處之則又難也生民休戚視庶司賢否而承宣表率則大吏之責也乃今之課吏者不過稽其案牘察其考成其愛民若子如召父杜母者果得與旌揚之典耶凡此數事皆朕時厪於懷而未得其要領者爾多士起自草茅入對眀廷既無顧忌之嫌宜盡敷陳之義若能仿治安六策賢良三策深達天人之理性命之原治亂安危之機者亦不拘體制詳切陳之朕將進而親詢焉乾隆七年三月廷試貢士策問朕德弗類託於士民君公之上凛對越之小心思安危之至計兹爾多士釋褐觀光宜有以陳古今之通變直指當世之切務是以詳延於廷諏以政要丐以啓告朕匪惟覘多士之所學亦以匡朕不逮思益下民耳蓋君之於民其猶舟之於水耶舟不能離水而成其功人主亦不能離民而成其治是以古先聖王恫瘝懷保􅍀然惟日不足者非蘄民之懷惠而已也實有見於君民一體之故今君與民誠一體歟德之不修政之不宣賢才之不進民隱之不聞有一於此其能成治道者未之或聞也將欲補四者之闕又何術之從歟夫天下不必治也君眀而臣良上令而下從天下雖亂識者知其有治之幾焉天下不必亂也君庸而臣諂上令而下違天下雖治識者知其有亂之幾焉其盈虛消息之機多士亦嘗籌之素而欲有辰告乎務民之本莫要於輕徭薄賦重農積穀我國家從無力役之征斯固無徭之可輕矣而賦猶有未盡合古者乎賦之外曰耗羡此固古之所無也抑亦古嘗有之不董之於官則雖有若無而今不可考耶且康熙年間無耗羡雍正年間有耗羡無耗羡之時凡州縣蒞任其親戚僕從仰給於一官者不下數百人上司之苛索京官之勒助又不在此限而一遇公事或强民以樂輸或按畝而派捐業田之民受其纍矣自雍正年間耗羡歸公所為諸弊一切掃除而遊民之借官吏以謀生者反無以糊其口農民散處田間其富厚尚難於驟見而遊民喧闐城市貧乏已立呈矣人之言曰康熙年間有清官雍正年間無清官亦猶燕趙無鎛非無鏄也夫人而能為鎛也而議者猶訾征耗羡為加賦而不知昔之公項皆出於此而有餘今則日見其不足且動正帑矣是亦徒被加賦之名而公與私交受其困而已矣將天下之事原不可以至清乎抑為是言者率出於官吏欲復耗羡者之口乎多士起自田間其必不出此而於農民之果有無利弊必知之詳矣又如常平之設遍天下而卒不聞百姓無鮮飽之嗟或者禾栖畝而給銀稼登場而責穀是民未受其益先受其害矣將欲改絃易轍而天時不可必其何恃以無恐耶凡此數者皆朕日夜躊躇而未得其領要者多士其無以朕為不足告而閟之隱之其尚以朕為足告而敷之陳之悉言其志毋有所諱乾隆十年四月廷試貢士策問國家設科取士每三年而賔興之復眀試於廷以覘所志朕既不逮立政無方常思進彼嘉言佐豫休治比策試貢士亦既不愧不文爰咨爰度矣乃多士之對揚者華藻是飾骨鯁無聞豈朕求之不誠歟抑司其事者抑不以進歟不然豈時無闕政民無隱情耶則多士以起自田間未諳政務為辭耳夫政事與學問非二途稽古與通今乃一致爰以多士所素服習敬業者詢之必有以導朕焉五六七九十一十三之經其名何昉其分何代其藏何人其出何地其獻何時傳之者有幾家用以取士者有幾代得縷晰而歷數歟三選四科五問十條乃周漢以下取士之别為取為棄為同為異為得為失可得而詳言歟其銓除也代復不同魏晉而下率循資格有四科九班之别五保七流之異其體例亦能條對論列否耶將欲得賢材舍學校無别途將欲為良臣舍窮經無他術多士宜有以奮發敷陳啓迪朕蔽其有深悉時政得失直言極諫者聽考辨黃子久富春山居圖真僞辨乙丑夏沈德潛進其所為詩古文稿幾暇披閲則跋黃子久富春山居圖在焉所記題跋收藏始末甚詳是年冬偶得黃子久山居圖筆墨蒼古的係真蹟而德潛文中所載沈文王董鄒氏五跋有董鄒而缺其三且多孔諤一跋以為山居與富春自兩圖也然愛其溪壑天成動我吟興乃有長言亦命德潛和之且詢其較富春為何如德潛之跋以富春山居歸安氏為未得所安氏不知也越眀年丙寅冬安氏家中落將出所藏古人舊蹟求售於人持富春山居卷并羲之袁生帖蘇軾二賦韓幹畫馬米元暉瀟湘等圖共若干種以示傅恆傅恆曰是物也飢不可食寒不可衣將安用之居少間恆舉以告朕朕謂或者汝弗識耳試將以來翦燭粗觀則居然黃子久富春山居圖也五跋與德潛文吻合偶憶董跋與豫舊題所謂山居圖者同則命內侍出舊圖視之果同次日命梁詩正等辨其真僞乃咸以舊為真而新為僞反覆詳覽始知燈下駭以為更得富春者乃誤也匪惟豫誤沈德潛之嗟咨嘆賞勒文以記者亦誤也奚啻德潛髙士竒王鴻緒輩之侈賞鑒之精賈直之重以為豪舉者均誤也富春山居本屬一圖向之題山居者遺富春二字故雖真而人疑其非是耳雖然摹董而即董肖黃而即黃蓋非近日俗工所能為且其别種亦有實出舊人手筆而古香清韻堪以繼武石渠寶笈者槩以二千金留之豫因之有深警焉歎盛衰而歸夢幻德潛蓋詳言之玩物喪志又不若不識者之為得矣而况目迷五色易眩鮮眀於流覽其尚可也於出治用人其可乎哉因一事乃獲三益是不可以無記爰書之於舊圖而正其名曰富春山居云西域地名考證叙概禹貢稱析支之叙周書紀西旅之貢自是而外西域之志經書莫詳詳西域實權輿司馬氏然司馬氏實未身涉其地而詢諸其人也徒以漢武勤逺使張騫輩持賂鑿空繼以二師興師一狼千羊所得不償所失遷之所記出於傳聞夫魯魚豕亥以華言傳華言尚不能無訛而况語音殊衣服異嗜好不同之絶域哉其不能無訛不待燭照而龜卜矣今我師平西域伊犁之地屯牧者我人回部之城蕃宣者我臣且國語切音實能盡各部轉韻曲折之妙是則傳萬里幅員之悉正千古紀載之舛實惟此時漢唐往事無論即如朔漠方略所載初征噶爾丹時有回回國王阿卜都里什特者來降稱其地為葉爾欽哈思噶爾後盡歸準噶爾我之使臣不過至伊犁而止不能至回部諸城也乙亥興師以來執訊獲醜屢詢其人稱為葉爾竒木哈什哈爾今則二城之人住京師者有之細詢其音乃定為葉爾羌喀什噶爾蓋回語謂地為葉爾寬為羌謂各色為喀什謂甎房為噶爾合而言之則葉爾羌者地寬也喀什噶爾者各色甎房也其他類此皆有名義然彼地自隆古以來其名其義未之或易徒以阻隔幅員不通音問遂至屢易文而始得其正夫以國語近各部之轉韻而一譯漢音必待再三詳考始能無訛則史遷之不免闕漏益不待燭照而龜卜矣茲為方略之書恐分纂之人無所取裁濫觴者豪釐之差承流者且致千里之謬因取各部山川疆域部落姓氏命軍機諸臣詳考確證歸於一是如提要凡例之作而叙其概如右自是之後統以新正之名為指南云爾茅山正訛壬午春巡將發金陵道句容徴三茅之勝而邑志率托吳越春秋禹改茅山曰㑹稽為茲山數典所自是援越入吳疆域紊而世代淆豫不可以不辨按史記注引越傳禹到大越上苗山苗與茅古字通而小異其為屬越則均水經注漸江條云㑹稽古防山亦謂之茅山别稱防者蓋以防風後至故而漸江即浙江其山𨽻今紹興境眀甚若句容之茅山本名句曲亦名已山自後漢茅盈兄弟學仙於此三茅之名始著距吳越時既逺地與紹興又絶不相蒙輯志無識者沿名竄附牽連為一謂㑹稽同出異名若良常秦望海江仙韭之屬二十有六實為一山且注出吳越春秋今核全書初無是語况自紹興至句容道踰千里中隔一江三茅即號地肺安能呼吸一氣若此使其言然則方內纍纍宫霍蜀繹者疇不當名之曰崑崙岱宗乎再考江寧郡志良常秦望仙韭諸山並與句曲壤接道里可數更於紹興無涉即以所引秦望言紹興句容皆有要各自為一山未可强而合之獨於茅山乎何疑或曰㑹稽為古揚州鎮山後漢移㑹稽郡治越秦初置時本治吳焉知㑹稽始名之茅山不可通於句曲後著之茅山也豫得仍以吳越春秋正之其書凡六卷前吳傳三後越傳三茅山之改名㑹稽入越外傳不入吳內傳當時方隅所限詎不較然風馬牛哉用覼縷析之以俟後之訂山經者古泮池證疑甚矣讀書之忌粗踈浮過不沈潛深造博綜詳考執一為是譬為禾者鹵莽耕而鹵莽穫確乎其弗可也今之泮池非古之泮池歟而豫丙子過此曽有詩闢之舊詩云十里東郊舊魯城新城安得泮池名徒以新城舊城之說橫於中遂以為新城不應有古池耳丁丑再過闕焉未證其疑茲南巡回蹕復駐曲阜廣核諸書及詢之孔氏家乘乃知古魯城即今曲阜其可證者以史記孔子葬魯城北泗上也水經注所引亦與吻合輿志稱今之曲阜為新城者蓋因宋大中祥符間移築城於東十里許眀正德間因流寇兵燹仍徙還魯古址而築新城焉夫以眀視宋固為新而不知以宋視古為尤新也是則統志諸書錯出者悉可按訂乃知今之曲阜縣治實即古之魯城也古魯城既不舛則古泮池之與靈光舊址其不出此城章章眀矣至若南北步武之數偶爾差乖大者同而小者異稽古者可以折中而弗覼縷究也豫實悔夫前詩之率爾置論不足為據也甚矣讀書之忌粗踈浮過不沈潛深造博綜詳考執一為是譬為禾者鹵莽耕而鹵莽穫確乎其弗可也御製文初集卷十四
