body:
  text: 卷之二十一考陽關考天竺五印度考訛熱河考濟源盤谷考證卷之二十二考灤河濡水源考證吳道子畫天龍八部中四部圗卷考證書小序考卷之二十三考濟水考卷之二十四辨三傳晉假道伐虢辨廣陵濤疆域辨翻譯名義集正訛三韓訂謬卷之二十五辨國風正訛夫餘國傳訂訛程敏政重修觀音寺記訂訛濮議辨艮嶽三丈石闢辭卷之二十六碑文重修歷代帝王廟碑文寶相寺碑文重修天津海神廟碑文普樂寺碑文卷之二十七碑文重修文廟碑記淀神廟碑記重修功德寺碑記普陀宗乘之廟碑文重修馬駒橋碑文卷之二十八碑文平定兩金川告成太學碑文卷之二十九碑文平定金川勒銘美諾之碑平定金川勒銘勒烏圍之碑平定金川勒銘噶喇依之碑陶莊河神廟碑記卷之三十碑文七佛塔碑記熱河文廟碑記須彌福夀之廟碑記重修正定隆興大佛寺記國學新建辟雍圜水工成碑記蘭陽睢寧新隄南岸河神廟碑記卷之三十一書事書髙士傳披裘公事書史記漢髙帝論蕭曹等事書黃庭堅為母滌溺器事書明臣史可法復書睿親王事書通鑑輯覽明崇禎甲申紀年事書蜀志諸葛亮傳七縱七禽事書司空圗論封建事書唐太宗欲觀實録事書南宋論兵事書通鑑宋太祖云守財事卷之三十二書事已未嵗我太祖大破明師於薩爾滸山之戰書事卷之三十三書事書中庸九經敬大臣義書夏僎尚書詳解費誓篇論淮夷徐戎事書春秋元年春王正月事書洪咨䕫春秋說論隱公作僞事書明列代玉冊事書史記冒頓髙后事卷之三十四雜著讀韓子讀周易枯楊生稊辨詁讀歐陽修縱囚論讀嚴光傳讀韓昌黎雜說讀蘇軾范增論讀後漢書明德馬后傳讀公羊讀劉昆傳讀韓非子卷之三十五雜著讀伯夷列傳讀金史讀左傳季文子出莒僕讀孟子滕文公章句下讀宗澤忠簡集讀歸有光易圗論讀王應麟困學紀聞讀禮記文王世子篇論王充論衡卷之三十六雜著讀左傳晉椘城濮之戰說讀髙唘威愛論讀宋仁宗夲紀贊讀史記儒林傳讀宋史河渠志讀熊廷弼傳讀召誥讀易繫辭上傳第五章書讀韓愈對禹問卷之三十七頌恭祝聖母皇太后八旬萬夀鴻稱積慶頌慈寧宮頌五福頌刻絲三星圗頌卷之三十八賦鬥鹿賦芝屏賦人字栁賦西畨蓮賦銘乾清宫五屏風銘交泰殿銘寧夀宫銘璧背銘卷之三十九硯銘松花石硯銘玉帶生硯銘倣古六硯各製銘澄泥硯銘再題倣古六硯銘宋三虎硯銘宋黻字硯銘澄泥虎硯銘宋小澄泥硯銘倣魏興和甎硯銘紅絲石風字硯銘宋澄泥蟠螭硯銘宋澄泥黼黻綯紋硯銘宋石渠硯銘舊端石六龍硯銘澄泥八方硯銘宋端溪如意硯銘舊蕉白緘鎖硯銘宋井田硯銘舊蕉白雙螭研銘倣古式製澄泥研六仍各為銘宋端石五丁研銘舊澄泥方池硯銘宋澄泥硯銘宋澄泥虎符硯銘舊端石荷葉硯銘舊端石叨餮䕫紋硯銘宋澄泥石函硯銘唐八稜澄泥硯銘宋澄泥石函硯銘宋澄泥括囊研銘澄泥硯四銘宋蕉白文瀾研銘舊坑蕉白瓜瓞研銘宋澄泥石函硯銘宋端石印川硯銘卷之硯銘舊龍尾石日月曡璧研銘題澄泥硃墨二研銘宋端石貨布硯銘舊端石子午明硯銘澄泥虎符研銘倣唐菱鏡澄泥研銘舊蕉白龍池硯銘倣觀象唐硯銘蘇軾東井硯銘宋合璧端硯銘宋端石龍馬負圗硯銘魏興和甎硯銘元趙孟俯松花石研銘舊洮石黃標硯銘倣唐菱鏡硯銘宋紫端涵星硯銘倣澄泥虎伏硯銘舊端石四螭研銘舊澄泥四直研銘宋澄泥䕫紋研銘舊端石辨星硯銘舊坑端石松皮研銘唐寅龍尾石瓦硯銘唐螭虎石渠研銘宋端石紫腴硯銘倣晉璧水暖硯銘倣宋歙石龍尾為澄泥硯因製銘舊端石洛書研銘舊蕉葉白雙螭瓦式硯銘舊端石倣唐石渠硯銘宋四螭澄泥硯銘宋端石風字硯銘倣唐菱鏡研銘舊端石玉繩研銘括囊硯銘舊端石海日初升硯銘宋端溪八柱硯銘舊端石弦文硯銘倣唐八稜澄泥硯銘宋端石洛書硯銘舊端石多福研銘宋天然石子端硯銘舊端石倣唐石渠硯銘舊端石飛黃硯銘舊澄泥伏犀硯銘宋端石列宿硯銘宋端石奎璧研銘舊龍尾合璧研銘舊澄泥長生未央瓦頭硯銘唐澄泥六螭研銘卷之四十一贊徐揚仿貫休羅漢贊和闐玉古佛相贊和闐玉文殊像贊和闐玉觀音像贊玉蓮瓣觀音贊和闐玉伏虎羅漢贊摹貫休古佛像贊文殊像贊觀音像贊盧楞伽畫六尊者像贊陳士俊畫觀音贊金廷標畫羅漢贊李公麟畫大士像贊繡線釋迦牟尼佛贊貫休極樂圗贊李遹羅漢贊玉真武贊丁觀鵬畫十六應真贊卷之四十二贊五代人畫伏虎羅漢贊丁雲鵬掃象贊陳居中書無量夀佛贊玉刻達摩贊宋人達摩像贊吳道子畫寶積賓伽羅漢像贊丁觀鵬十八羅漢贊丁觀鵬畫三世佛像贊丁觀鵬畫觀世音像贊丁觀鵬畫地藏菩薩像贊丁觀鵬畫四天王贊陳居中畫釋迦佛贊陳居中畫羅漢贊次右陳居中畫羅漢贊次左如松柏之茂贊白玉福祿夀如意贊宋人畫逹摩贊仇英畫普賢像贊和闐玉達摩渡江屏風贊吳道子畫文殊像贊和闐玉鏤面壁達摩圗贊宋人畫白衣大士贊玉鏤達摩贊宋人畫文殊贊和闐玉鏤羅漢贊趙奕畫白衣大士贊牙刻五百羅漢贊劉松年羅漢贊卷之四十三贊平定金川五十功臣像贊卷之四十四贊馬和之畫如來贊宋人十八應真贊宋人應真渡水贊觀音像贊玉達摩渡江贊和闐玉釋迦牟尼佛贊班禪額爾德呢所進古佛像贊梵銅緑衣救度佛母贊寫娑羅樹夀班禪喇嘛並為贊言天然石大士相贊丁雲鵬大士相贊朱侃文殊贊法螺贊趙雍無量夀佛贊趙孟俯釋迦牟尼佛贊繡線如來海㑹極樂世界圗贊和闐玉釋迦牟尼佛贊和闐玉觀世音菩薩贊鄭重無量夀佛贊五代馮翊大士像贊元人毗盧遮那佛贊和闐玉釋迦牟尼佛贊和闐玉十八羅漢贊和闐玉三世佛贊元人