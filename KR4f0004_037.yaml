body:
  text: 論湯武論世之論湯武者多是湯而非武王亦有曲為武王解者曲為武王解者莫若王柏之書疑其言以為周之以王自處久矣故其辭迫其禮傲勢使之然審如是則殷未滅而周先自王益見其非此不必論即是湯而非武王者多以湯放桀武王斬紂為優劣之分然武之斬紂實不見於書而見於史記史記好竒乖舛以是右武王者得以闢史記之蹖而以證武王之烏有其事豫以為史記固不足徴而足徴者仍莫過於書湯之言曰非台小子敢行稱亂又曰豫恐來世以台為口實何其恭也武之言曰我伐用張于湯有光又曰撫我則后虐我則讎何其矜也且湯放桀之後天下晏然即太甲自底不類伊尹放之於桐亦未聞有乘時搆亂為夏反正者何則湯之德入人者深也武王甫喪而三叔之流言且生於鬩墻邦君御事或其違卜比事觀辭不且章章易明乎豫故曰徴之書足以見湯武之優劣固不必信史記過甚之辭始定其為武之不及湯也齊桓公論齊桓公有管仲而霸諸侯無管仲而致危亂此足以為千古炯戒矣紀其事者或務竒而失之誣則不可不辨也夫五霸以力假仁心皆不正然害不以孔孟之言為折衷乎孔子曰齊桓公正而不譎孟子曰五霸桓公為盛葵邱之會諸侯束牲載書而不歃血是則桓公九合一匡亦有足取于聖賢者且能任管仲以究其材非桓公之善乎而司馬遷史記則稱易牙殺子以適君王充論衡則稱負婦人以朝諸侯而管仲為之解説不經孰甚焉夫人肉不可食人誰不知之非甚飢饉不得已誰肯食之而桓公不至此也易牙雖善煎熬燔炙其不能以人肉勝羊豕雞鴨明矣且先告其君以殺子乎抑殺子而後告其君乎若先告桓公必不從既食而告桓公將嘔吐致病豈有反以為愛已之理哉桓公雖好內也然亦應有間時豈有會諸侯之頃而不能離乎即頃刻不能離亦無負之身後之理且管仲賢臣也豈有不力諫其君而反從而為之曲解者哉是二事也智者觀之必斥其謬記笑其怪誕而耳食之流方且信以為誠有詫以為竒談則有害於人心者不淺兹故闢而正之論重瞳史出於經經莫古於尚書易雖始自伏羲然伏羲但畫卦而無辭文王周公則已後焉故紀事之書必以典謨為信而可徴溯而上之三墳十紀或出後人耳食之辭矣典謨之記堯舜亦惟載放勳重華之實政無所謂八彩重瞳之語也自莊列謬悠之説興而好竒炫古者無不極其詭僻譎誕之撰述思以尊古聖實則誣古聖也而司馬遷乃至稱舜重瞳子項羽亦重瞳子且以謂或其苗裔吁可怪哉審如是則虞遂伯戲箕伯胡公實舜後也千百年之間何無一人重其瞳者夫重瞳者何蓋謂目明耳如日重光月重輪之類非必有二日兩月並照于天也且人之生也五官四肢百骸各有定體異此則為怪異鬼物聖之為聖不繫此也故闢四門明四目舜之重瞳即在此項羽有范增不能識即可定其為非重瞳而豈在兩瞳子之在目中乎甚其説者且以謂舜之重瞳並立羽之重瞳上下立夫羽之瞳或有見者舜之瞳有誰曽見哉此真不直一噱矣至蒼頡四目之説亦謂其始制文字教後世有並明之德耳又豈真有四目生其面乎論漢光武廢郭后事余向讀公羊立長立貴之言而斥其不韙既已論之詳矣兹因光武廢郭后事更進其説而申之夫光武以陽為賢而強不及廢強立陽是不泥於以長以貴而與賢可謂知輕重利社稷非卓識英斷之君必有所不能然有所惜者何不徘徊少待必先立強而後復廢之乎至於牽過其母並郭后廢之則失德莫甚焉且郭后史徒稱其寵衰懷怨無可廢之大過也寵衰懷怨婦人之常今以將廢其子而並廢其母聞之母以子貴不聞母以子賤則光武之嬺新棄舊雖百置喙豈能辭哉胡寅論綱目於此節乃云春秋聞立長立德不聞貴若云貴即強母不嘗為后乎夫強可廢也郭不可因強而廢也后正位中宫孰非其子乎寅之意蓋以為不宜廢郭及強遂不覺自與其論矛盾且于公羊之言亦少舛因並識之金世宗論金史成於元如元之托克托輩非真史才也從來論史者於帝王事迹無不吹毛求疵如世宗之信賞重農選吏求賢諸實政悉皆班班可考世號小堯舜而猶必議其羣臣偷安苟祿不能將順其美以成大順為惜是則無一而可為帝王者抑亦難矣金世宗他政兹不論獨嘉其不忘故風禁習漢俗拳拳以法祖宗戒子孫為棘蓋自古帝王未有不以敬念先業而興亦未有不以忘本即慆淫而亡者是以書稱無逸詩詠豳風周之所以過其厯也夫金世宗述祖業之艱難示繼繩之不易叮嚀反覆一再歎惋使數百年下有志永命之君為之感泣及繼世之孫不數年而遂易漢服又不數十年而遂以屋社吁可不畏哉可不懷哉作福作威論洪範六疇三德而衍其辭曰惟辟作福惟辟作威斯言也箕子蓋引而未發所包者廣而蔡沈作傳遂以為福威者上之所以御下戒其權不可下移其然豈其然乎夫福威雖自辟作亦視其人之自取是作之者不可不謹也其善者乎戒之用休而非吾有意福之也其不善者乎董之用威而非吾有意威之也是雖有作之之名而無有作之之意所為作而無作也設徒曰辟可以作福作威於其不善者而福之於其善者而威之則章疸有乖刑賞顛倒其可乎哉善乎司馬光之言曰誅一不善而天下之不善者皆懼故謂之威賞一有功而天下之有功者皆喜故謂之福人主必聰明剛斷然後能收威福之柄蔡沈之權不可下移蓋取諸此然光徒見及於福威不可錯用而未見及於作福作威之在人自取必知在人之自取然後不致錯用余故申其説如此明哲保身論大雅蒸民之篇曰既明且哲以保其身中庸引之善夫朱子之言曰順理而行自然災害不及揚雄説明哲煌煌是占便宜所以被誤又曰若捨身取義處又不如此論而於詩傳則曰非趨利避害偷以全軀之謂然皆引而未發兹故申而論之蓋保身者保此身不陷于不義耳詩之美仲山甫曰明哲保身即繼之曰不侮鰥寡不畏強禦是豈徒以柔嘉惟則者哉且比干諫而死可謂不能保身矣孔子稱其仁未有仁而不明哲者也唐之顔假張許皆不能保其身而捨身取義所以保其身者愈大不謂之明哲不可朱子所云非趨利避害偷以全軀之謂正使後世委蛇取容與夫靦顔事二姓者不得藉口誠云先獲我心夫解書所以牖世賴有此也近命為二臣傳其義亦以是為棘耳知過論豫去歲為古稀説厯數古來粃政之過曰強藩曰外患曰權臣曰外戚曰女謁曰宦寺曰姦臣曰佞幸而幸今都無其事非驕也蓋紀其實且以自勵也然則豫遂無過乎曰有為何過曰為興工作蓋豫承國家百年熙和之會且當勝朝二百餘年廢弛之後不可無黻飾壯萬國之觀瞻四十餘年之間次第興舉內若壇廟宫殿京城皇城禁城溝渠河道以及部院衙署莫不為之葺其壞新其舊外若海塘河工城郭堤堰莫不為之修其廢舉其湮是皆有關國政則胥用正帑物給價工給值而弗興徭役加賦稅以病民他若內而西苑南苑暢春園圓明園以及清漪靜明靜宜三園又因預為莵裘之頥而重新寧夀宫别創長春園外而盛京之屬城式築其頽永陵福陵昭陵陪都宫殿胥肯搆以輪奐又景陵泰陵往來之行宫以及熱河往來之行宫避暑山莊盤山之靜寄山莊更因祝釐而有普陀宗乘之廟延班禪而有須彌福夀之廟以至溥寧普樂安逺諸寺無不因平定凖夷示興黃教以次而建是皆弗用正帑惟以關稅盈餘及內帑節省者物給價工給值更弗興徭役加賦稅以病民夫弗興徭役加賦稅則雖有工作閭閻本不知而物給價工給值貧者且受其利是實我朝之善政家法是以各省偶遇水旱率興工作有以工代賑之請而內之司園囿工程者且或以其年無工作為苦如是則所為興工作者為無過矣而豫引以為過者蓋心有所縈繫必有所踈忽得毋縈繫于小而或有踈忽于大者乎夫小者逰目賞心是也大者敬天勤民是也豫雖不敏實不敢因其小者廢其大是以向偶逰萬夀山諸處率過而弗留尹繼善遂有馳驛觀山之語豫不惟不責且笑而肯之實獲我心也若夫時巡所經各督撫每繕行宫以備駐憩雖云出自捐飬亷資商力然爭竒較勝豫不為之喜且飭諭之究其致如此者過應歸于豫謂之無過實自欺也夫不知過其失猶小過而弗改又從而為之辭是文過也其失大既知過矣欲改矣如向所云者繼自今豫惟視其不可已者仍酌行之其介於可已不可已之間者率已之而已耳已過伯玉知非之年未逮武公作戒之嵗細審實有此過故著論書卷以當自訟乾降辛丑八月中浣並識於避暑山莊之抑齊御製文二集卷三
