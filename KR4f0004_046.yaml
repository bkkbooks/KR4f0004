body:
  text: 記古玉斧珮記內府銅玉諸器率以甲乙别等苐兹古玉斧珮一白弗截肪赤弗雞冠土漬塵蒙列其次為丙而棄置之庫亦不知幾何年矣偶因檢閲舊器覺有所異命刮垢磨光則穆然三代物也嗟乎物有隱翳埋沒於下不期而遇識拔尚可為上等珍玩若夫貞幹良材屈伏沉淪莫為之剪拂出幽以揚王庭而佐治理是誰之過歟吾於是乎知慙吾於是乎知懼淳化軒記淳化軒何為而作也以藏重刻淳化閣帖石而作也蓋自伏滔崆洞之銘石虹堯碑之文厯代相傳石刻尚焉然物有其成必有其壞世逺年湮真偽莫辨則漢唐且難得其全者無論周秦以上矣故言帖必以趙宋為猶近而宋帖必以淳化為最美重刻之由考稽之故已見於帖前之旨册後之跋兹不復記記所以藏石作軒之故云石刻既成凡若干頁使置散之慮其有失也爰於長春園中含經堂之後就舊有之回廊每廊砌石若干頁恰得若干廊而帖石畢砌焉廊之中原有藴真齋因稍移齋於其北即舊基而拓為軒事起藏帖則以帖名名之夫淳化宋太宗之紀年也為人君者即不能以唐堯虞舜為師亦當以夏甲周成為軌所謂取法乎上僅能得中耳若宋太宗始終家國之間慙德多矣吾所不取而又有何慕於淳化而以之名軒為哉閲永定河記永定河之本無定也此氣數之可以授其權於人事者也無定河之求永定也此人事之不可以諉其柄於氣數者也自前嵗夏秋瀕河田廬被潦特命髙晉裘曰修周元理等會勘利病所由發帑五十餘萬金大加疏築浹嵗訖功農臻倍稔遂俞所請以今春省成事而詔之曰河之工兹式集矣雖然朕能遽信為一勞永逸計乎昔之河故無工也惟我皇祖聖祖仁皇帝蒿目民艱為畿甸東南勤求保惠之政莫若興建隄工遡自康熙三十七年始事迄今億兆蒙庥淪浹肌髓中間偶值水旱不齊此濫彼淤遷流遞易自安瀾城而桞岔口而王慶坨而氷窖草壩而賀老營而今之調河頭或北或復南凡六徙皆審時度勢善為相𨗳惟務順小變以歸大常而於成謨罔敢稍斁斯誠皇考世宗憲皇帝以暨朕躬數十年來繼志繩武之苦心不容自己者何者在河固無一勞永逸之方在治河實有後樂先憂之責也或者耳食漢田蚡天事非人力及晉杜預請決諸陂之膚見謂棄地與水可聽無定者之所之嘻何其戾耶夫以水故棄地猶可並地故棄人可乎子輿氏稱神禹行所無事無事而曰行則必有無事之事所謂疏瀹決排者非耶以黃河證之積石龍門故迹可按而啇患五遷周移千乘即已世近而事殊厥後赴海南趨殆更燕齊與吳之境雖神禹復生亦難力挽以從其朔苐更一境即治一境仍與當年𨗳源之績等耳豈竟以不治治之耶桑乾流經近圻勢若建瓴非挾沙將一泄而無餘惟挾沙又四出而莫遏運道民生無隄曷賴前此督臣孫嘉淦建議試開金門閘上遊中亭河遂不能容所至村莊漫溢幸急飭堵閉民獲安居尤近事之足為炯戒者且朕匪直為愛護已成之工起見也假令是河在今日尚無隄工而籌運道策民生朕亦必自為始事之舉易地以觀益知我皇祖皇考默鑒今日之發帑疏築有深許為後先克紹者矣不然者惡勞惜費朕寧必大矯乎人情而甘為是汲汲也哉是行也往復周咨既嘉大吏能體朕意猶慮其不克堅持定識勉繼前功爰特揭大指鍥之河上其他條具規制存乎神而明之者皆不書避暑山莊紀恩堂記圓明園之紀恩堂紀受恩之自避暑山莊之紀恩堂紀受恩之迹名同而實異文異而事同一而二二而一者也蓋皇祖飬育豫於宫中之旨原降於圓明園之紀恩堂兹不復贅然其時實仍居皇考藩邸中及從皇祖來避暑山莊乃賜居斯堂之側堂即三十六景中所謂萬壑松風者夙興夜寐日覲天顔綈几翻書或示章句玉筵傳膳每賜芳飴批閲章奏屏息侍傍引見官吏承顔立側或命步射以示衆臣持滿連中皇祖必為之色動至於釣魚而得則令持去以給皇考若隔旬餘半月則遣往獅子園以謁聖母而其年秋隨皇祖幸木蘭又有宜紀者入木蘭初圍場曰永安莽喀圍中有一熊皇祖御火鎗中之熊伏不動久之皇祖謂其已斃命御前侍衛引豫去射之意欲使豫於初圍得獲熊之名也其時豫甫欲上馬而熊突起奔前皇祖御虎鎗殪之事畢入武帳皇祖顧溫惠皇貴太妃指豫曰伊命貴重乃以射熊事告之曰使伊至熊所而熊起馬驚成何事體又一日虞者告有虎皇祖命二十一叔父後封慎郡王者往豫跽奏請去皇祖曰汝不可去俟朕往之日携汝去耳似此深恩彼時不知至於今每一念及即欲墮淚夫五十餘年之事厯厯如昨而豫六旬有三亦視曾孫矣不有以紀之子若孫其何由知之此豫所以追憶而涉筆也子若孫其尚念我皇祖何以眷顧我之深及我之乾乾矻矻何以不敢負皇祖之恩將億萬斯年永丕基而承天眷胥在是矣距惟一堂之記云乎哉白塔山總記京都於唐為范陽於北宋為燕山遼始稱京金元明因之雖城郭宫市建置沿革時或不同而答陽都會居天下之上遊俯寰中之北拱誠萬載不易之金湯也宫殿屏扆則曰景山西苑作鎮則曰白塔山白塔山者金之瓊華島也北平圖經載遼時名曰瑶璵或即其地元至元時改為萬嵗山或曰萬夀山至明時則互稱之或又謂之大山子見王紱北亰八景圖識語中本朝曰白塔山者以順治年間建白塔於山頂然考燕亰而詠八景者無不曰瓊島之春隂故豫於辛未年題碣山左亦仍其舊所為數典不忘之意耳山四面皆有景惜春明夢餘録及日下舊聞所載廣寒仁智之殿玉虹金露之亭其方隅曲折未能盡髙下窈窕之致使人一覽若身步其地而目其概蓋地既博而境既幽且禁苑森嚴外人或偶一窺視或得之傳聞其不能覩之切而記之詳也亦宜兹特界為四面面各有記如栁宗元之鈷鉧石城諸作俾因文問景者若親歷其間嘗鼎一臠足知全味云爾塔山南面記承光殿之北跨太液為橋南北各有坊南曰積翠北曰堆雲過堆雲坊即永安寺殿曰法輪殿後石磴拾級而升得稍平道左右二亭曰引勝曰滌靄復因回疊石中仍拾級左右各為洞玲瓏窈窕刻峭嶊崣各極其致蓋即所謂移艮嶽者也穿洞而上適與拾級而上者平洞之上左右各有亭覆之曰雲依曰意逺平處為覆殿前曰正覺後曰普安兩廂各有殿東曰聖果西曰宗鏡又自永安寺墻之東緣山而升路中有振芳亭再升為慧日亭稍西則順治年間建塔碑記及雍正年間重修碑記復略升則進普安殿之東廊矣其寺墻之西亦緣山而登半山有亭扁曰蓬壺挹勝再登則為悅心殿偶臨塔山理事引見恆於此其後為慶霄樓每逢臘日奉皇太后觀冰嬉之所也悅心殿東側書屋為靜憩軒轉石屏入墻門則仍普安殿自殿後陟石階將百磴即山頂白塔建於此塔前琉璃佛殿曰善因考日下舊聞山頂為廣寒殿蓋即建塔之所山中為仁智殿則今普安佛殿是塔後列剎竿五或謂之轉梵經或謂之資瞭逺其下為藏信炮之所八旗軍校輪流守之蓋國初始定燕亰設以防急變者雍正年間復申明其令載在史策其發信炮金碑則藏之大內豫因思之比及藉此知守其失守已多矣然而覩此知懼凛天命畏民碞戒盛滿之志繫苞桑之固則信炮之制豈非祖宗之良法美意萬世所當慎守者乎塔山西面記室之有髙下猶山之有曲折水之有波瀾故水無波瀾不致清山無曲折不致靈室無髙下不致情然室不能自為髙下故因山以搆室者其趣恆佳慶霄樓既據山之髙樓西緣廊而降有二道其一向南不數武為一房山蓋房中覆湖石成山云厯磴以下為蟠青室回廊環其外緣廊北降達山之西憑廊向南俯睇有深淵東則山之西腳而山半腰有亭曰揖山乃從悅心殿西角門而出者其下峭壁插入滉然靚然若龍湫之有神物也波與太液通石橋鎖其口橋之南步隄東轉可通悅心殿及永安寺前橋之北則琳光殿前為山西總路矣又其一轉而北有亭焉曰妙鬘雲峯厯石磴而下則水精域其下有古井古井向有記闢諸家記載謂引金水河轉機運㪺之非及輦土壓勝之謬凡山之隂山之麓所為屈注飛流線溪畝池皆綆汲此井以成其勢水精域之下為甘露殿又下為琳光殿則就平陸為山西之路轉而北為閲古樓樓壁砌三希堂法帖碑版攀梯而登與平地稍北則鑑畝室窗臨清池即鑿山溪引古井之水也閲古樓後楹平臨山溪石橋架其上度橋有小石亭梁柱皆泐詩過亭㟏岈崱屴徑祗容人攝齊而上出巖墻門與慶霄樓後門相望而山西之景略畢塔山北面記自閲古樓巖墻門出轉而東則邀山亭又東北則酣古堂堂之東室倚石洞循洞而東則寫妙石室堂與室之南皆塔山之隂或石壁或茂林森峙不可上而室之東間乃樓也踏梯以降復為洞􅌄窱窅映若陶穴若嵌䆰旋轉光怪不可殫極若是者行數百武向東忽得洞門出則豁然開朗小丆三間曰盤嵐精舍而其南則仍石巖陡立然羊腸之徑可以躋而上逹看畫廊廊屬山東景兹不復綴自精舍轉而北至環碧樓緣飛廊而下則嵌巖室折而西為小山亭額曰一壺天地西扇面房額曰延南薰其盤嵐精舍之西由洞門北行數十武亦達扇面房自房而西為小崑邱蓋畝鑑室水盈池則伏流不見至邱東始擘巖而出為瀑布沿溪赴壑而歸墟於太液之波又西為銅露盤銅仙竦雙手承之髙可尋尺此不過綴景取露實不若荷葉之易則漢武之事率可知矣又西為得性樓為延佳精舍為抱沖室為鄰山書屋名雖殊而因髙以降或一間或兩架皆隨其宛轉髙下之趣而各與題額又自畝鑑室北墻門而出緣山蹊亦可達此至鄰山書屋則就平地廊接道寧齋矣其東乃漪瀾堂蓋山之北以堂與齋為主室而圍堂與齋北臨太液延樓六十楹東盡倚晴樓西盡分涼閣有碧照樓逺帆閣分峙其間各對堂與齋之中南瞻窣堵北眺滄波頗具金山江天之概故登樓與閣偶有吟詠無不以是為言由漪瀾堂而東則蓮華室以奉大士及妙法蓮華經得名出墻門而南則為塔山東面之境矣若夫各室內或題額或聨語率銘意寄興無關於景概之全斯則不悉載塔山東面記因舊置而修飾之謂之沿易新建而創為之謂之革山之南沿者多而建者少山之北革者夥而置者稀然東北泐瓊島春隂之石幢雖出於新建亦實述其舊置由石幢登山徑為看畫廊其上則交翠庭庭之下廊之側攀援石洞以出為古遺堂對之者巒影亭自堂躡梯以下仍依洞以出為見春亭遂循東岸可至半月城前而自交翠庭步嶺路至智珠殿者分左右階而下亦達半月城前蓋殿原據城上埤堄即平地基也過石橋則陟山門而白塔山四面之事畢矣白塔建自順治八年辛卯至於今蓋百有二十年矣夫士民之家尚以肯構為言况兹三朝遺迹地處禁苑聽其荒廢榛薉為弗當然豫自辛酉壬戌之間始稍稍有所葺建至於今凡三十年而四面之景始畢成而為之記雖云發內帑以徐為之然而視春明夢餘録日下舊聞所載有過之無不及矣知我罪我吾豈能辭哉御製文二集卷十二
