body:
  text: 欽定四庫全書御製文初集序于敏中排次數年來所為御製文初集成而以序為請夫序者所以敘陳經旨故孔子作書序子夏作詩序未聞自序其文也自序其文蓋漢唐以後之事乎為天子者所以修巳治人必當以三代以上自勗豈可以漢唐以後自畫此正務也至於文乃其餘事耳然亦豈可以漢唐以後為法哉如是則敏中之請序可以不允既而思之向之樂善堂全集及御製詩初集不既有序乎於凡惕已敬天本身徴民憫農桑驗今昔蓋已言之悉矣例以向不可以不序而以向之言之悉則又可以不必序矣雖然不欲與文人學士爭長亦向之本意也則今之裒然成集者與向之言為合乎為否乎以之自問抑又不能措一辭云乾隆甲申嘉平御製經筵講官户部左侍郎臣于敏中謹奏為聖文日富巨製宜宣恭請編刻以昭化成事欽惟我皇上濬哲天成緝熙時懋每當敕幾勤政之暇尤著立言載道之功經緯為章積盈卷册臣伏見御製詩篇前蒙俞付剞劂初集二集燦若珠聨凡薄海操觚之士得共仰矚光華詠歌抃舞惟是御製文集未經宣示書林喁望積久彌殷臣愚竊念鴻篇美富自臨御以迄於今多至五百餘首囊括古今苞涵鈞軸賅六籍之奧旨集羣言之大成上而揚謨訓以欽燕貽奉慈寧以申祝嘏大而䇿勳紀績以慶武成導河觀海以勤民事誠格天而應禱雨告風之版德孚逺而訂同文輿地之編紬繹聖言則跋為君難而書屏扆創制國篆則記傳寶譜而慎典司闡治要而衡創業守成備制作而釐鐘懸禮器溯肇造之規模盛京賦所以述懿美晰撻伐之事理開惑論所以迪凡蒙禔躬而針銘勒諸官殿牖世而經史頒在學官講筵闢道藴之精臨軒發䇿科之問以至會心體物考古訂訛紀勝鐫珉辨詞選要或因器以形道或程藝以喻言或識縑素而寓鑑甄或贊圖像而通微妙莫不元元本本炳炳麟麟理實兼乎內聖外王言有禆於人心世道文成而規矩準繩斯立氣盛而短長髙下皆宜散行則漢唐諸家所不能窺韻語則卿雲流輩所不能逮臣日侍禁近先覩為榮謂宜並夀棗梨垂光宇宙區區愚悃蓄有嵗年為此繕摺瀆陳仰懇皇上俯允臣請俾臣以次盥録排類成編上呈乙覽恭候訓定仍乞賜製序文敬謹刋刻冀縹函緗帙與詩集同布藝林以式楷模而垂悠久臣曷勝顒企踴躍之至謹奏於乾隆二十八年正月二十五日奏奉旨如所請行欽此一恭按樂善堂全集十有四門以論為首誠以闡發精微彰明道法不獨賅六藝之大成實可垂萬古之經訓兹編次御製文集恭載經筵御論為冠以見君師統合文德光華為從來藝林集部未有之盛自論以下復依次排類為十有八門先散行次韻語並按嵗月前後敬謹編列一恭按聖祖仁皇帝御製文集內有敕諭一門伏見我皇上御極以來絲綸渙汙記載浩富自應另俟宣付史館專刻成編頒示天下若於文集節録轉虞挂漏未敢一體編載一聖祖御製文集內又有奏書一門仰惟皇上孝思誠篤流為至文每逢聖母萬夀大慶親製賦頌諸體鴻篇美盛備登集內至每次恭上皇太后徽號奏書及慶賀令節箋表例由閣臣撰擬不敢贅録一恭繹御製樂善堂全集序文有云自今以後雖有所著述或出詞臣之手真贋各半此蓋謙尊之德因時立言臣忝列禁近伏見我皇上典學幾餘研朱濡翰刻晷成文數百千言不加點乙皆在廷諸臣管蠡所不能窺涓壤所莫能贊若前序所云或指尋常碑文序記循例撰擬者而言兹集編載並親御丹素所成向登文本者其臣下代言諸作概未敢附列以紀徴實一敬編御製文集計自臨御以來至今積五百餘篇輝煌灝瀚足煥縹緗謹擬列為前集自後日益嵗增積盈卷帙俟與現在排類篇册相埓即續請恭刋以次分集傳示無窮欽定四庫全書集部七御製文初集目録一别集類六國朝卷一經筵御論道之以德齊之以禮有恥且格咨十有二牧曰食哉惟時寬則得衆信則民任焉敏則有功公則説兢兢業業一日二日萬幾聖人治天下使有菽粟如水火菽粟如水火而民焉有不仁者乎象曰天行健君子以自強不息唯仁者能好人能惡人德唯善政政在養民執其兩端用其中于民以義制事以禮制心凡為天下國家有九經所以行之者一也罔違道以干百姓之譽罔咈百姓以從已之欲詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母元者善之長也亨者嘉之會也利者義之和也貞者事之幹也一日克已復禮天下歸仁焉天地之道恆久而不已也子曰性相近也習相逺也天地養萬物聖人養賢以及萬民子曰古之學者為已今之學者為人天地之大德曰生居之無倦行之以忠天地感而萬物化生聖人感人心而天下和平子路問政子曰先之勞之請益曰無倦修辭立其誠卷二經筵御論致中和天地位焉萬物育焉闢四門明四目達四聰自天子以至於庶人一是皆以修身為本天施地生其益無方樊遲問仁子曰愛人問知子曰知人君子以教思無窮容保民無疆夫子之道忠恕而已矣上下交而其志同也君子之於天下也無適也無莫也義之與比知人則哲能官人安民則惠黎民懷之視其所以觀其所由察其所安人焉廋哉人焉廋哉君子體仁足以長人自誠明謂之性自明誠謂之教敕天之命惟時惟幾博學而篤志切問而近思仁在其中矣思其艱以圖其易民乃寧成已仁也成物知也易簡而天下之理得矣四時行焉百物生焉其難其慎惟和惟一舜明於庶物察於人倫由仁義行非行仁義也益動而巽日進無疆如保赤子心誠求之雖不中不逺矣咸速也恆久也卷三論黃鍾為萬事根本論漢光武論開惑論説創業守成難易説古長城説穿楊説祝文告風神文社稷壇禱雨祝文大雩祝文卷四記皇考世宗憲皇帝恩賜御書記圓明園後記遊盤山記三希堂記國朝傳寶記靜宜園記靜寄山莊十六景記麥莊橋記南薰殿奉藏圖像記卷五記登開化寺六和塔記皇太后駕臨金山記萬夀山昆明湖記玉泉山天下第一泉記虎神鎗記盤山千尺雪記玉泉山竹爐山房記玉杯記永安寺古井記石舫記鐵章記卷六記萬夀山五百羅漢堂記卷七記春耦齋記討源書屋記小有天園記樂善堂記寶月樓記韻古堂記鹿角記閲海塘記卷八序執中成憲序日知薈説序太祖髙皇帝聖訓序太祖髙皇帝實録序太宗文皇帝聖訓序太宗文皇帝實録序世祖章皇帝聖訓序世祖章皇帝實録序卷九序聖祖仁皇帝聖訓序聖祖仁皇帝實録序世宗憲皇帝聖訓序世宗憲皇帝實録序日講春秋解義序樂善堂全集序柏梁體詩序授時通考序卷十序大清律例序御選唐宋文醇序協紀辨方書序大清一統志序八旗姓氏通譜序明史綱目序律吕正義後編序新刻稽古齋文集序惇敘殿柏梁體聨句詩序瀛臺賜宴聨句詩序卷十一序重刻十三經序重刻二十一史序日講禮記解義序欽定三禮義疏序皇清文頴序重刻通典序詞林典故序重刻文獻通考序初集詩小序毛詩全圖小序重刻通志序叶韻彚輯序御選唐宋詩醇序沈德潛歸愚集序卷十二序盤山志序儀象考成序印譜序春秋直解序皇朝禮器圖式序大清通禮序沈德潛選國朝詩别裁集序皇輿西域圖志序西域同文志序翻譯四體楞嚴經序卷十三後序世宗憲皇帝硃批諭旨後序跋恭跋世宗憲皇帝御書法帖為君難跋書後毛詩圖題後書唐太宗懷鷂事後題趙孟俯十札後書漢文帝除肉刑詔後卷十四問經解問史論問乾隆四年三月廷試貢士䇿問乾隆七年三月廷試貢士䇿問乾隆十年四月廷試貢士䇿問考辨黃子久富春山居圖真偽辨西域地名考證敘概茅山正訛古泮池證疑欽定四庫全書御製文初集目録二卷十五碑文聖德神功碑卷十六碑文文廟碑文重建泰山神廟碑文安佑官碑文雍和宫碑文闡福寺碑文重修大覺寺碑文卷十七碑文重建鐘樓碑記闕里孔廟碑文菩薩頂碑文殊像寺碑文演教寺碑文望海寺碑文普濟寺碑文法雷寺碑文靈應寺碑文平定金川告成太學碑文卷十八碑文實勝寺碑記重建夀皇殿碑記碧雲寺碑文金剛寶座塔碑文香界寺碑文梵香寺碑文重修惠濟祠碑萬夀山大報恩延夀寺碑記卷十九碑文平定準噶爾告成太學碑文平定準噶爾勒銘伊犁之碑平定準噶爾勒銘格登山之碑普寧寺碑文玉泉山東嶽廟碑文浙海神廟碑文卷二十碑文中州治河碑平定準噶爾後勒銘伊犁之碑重修柏林寺碑文平定回部告成太學碑文平定回部勒銘葉爾竒木之碑平定回部勒銘伊西洱庫爾淖兒之碑卷二十一碑文重修𢎞仁寺碑文重修涿州石橋記重修涿州佑濟龍神祠碑文實勝寺後記重修朝陽門石道碑文重修廣寧門石道碑文重修萬夀寺碑文楊橋河神祠碑記卷二十二雜著擬九歌十二首題莊子故事圖讀宋史徐積傳漢玉斧欵識讀公羊讀荀彧傳讀唐太宗集讀邶風匏有苦葉第二章記載準噶爾全部紀略卷二十三賦五六天地之中合賦恭祝聖母皇太后萬夀無疆賦有序建福宫賦盛京賦有序卷二十四賦氷嬉賦有序述悲賦有序哨鹿賦有序靈珀賦夜亮木賦南苑雙栁樹賦後哨鹿賦神樹賦有序樹根山子賦歎夷齊松賦有序卷二十五連珠恭祝聖母皇太后七旬萬夀連珠卷二十六頌老人星頌慈聖萬夀九如頌有序掖輦紀慶頌有序針七情針五事針養心殿四針有序卷二十七銘多福硯銘硯銘座右銘負扆銘嘉量銘刻漏銘帶銘未央宫瓦硯銘銅雀臺瓦硯銘座右銘漢玉祕閣銘漢玉璧銘古研銘有序養心殿銘漢玉墨牀銘董其昌硯銘吳鎮硯銘竹根筆筒銘黃楊木界尺銘金牛銘宫殿四銘有序鎛鐘銘特磬銘夀安宫銘和闐玉龍馬負書銘漢玉半截觚銘效梁邱遲體卷二十八贊列代賢明妃后垂稱奕世者取繪十二繫以贊闕里十贊有序漢柏贊慈竹贊十六羅漢贊釋迦牟尼文佛贊趙修祿羅漢贊丁觀鵬摹丁雲鵬羅漢贊丁觀鵬摹丁雲鵬十八羅漢贊福祿夀三星贊丁觀鵬畫不二圖贊姚文瀚掃象圖贊卷二十九贊貫休畫十六應真像贊唐貫休羅漢贊趙孟俯畫第一祖贊蘇漢臣古佛贊趙孟俯羅漢贊丁觀鵬摹貫休十六應真像贊唐貫休十八羅漢贊丁觀鵬畫初祖贊趙孟俯羅漢像贊姚文瀚畫羅漢贊丁觀鵬畫大士贊金廷標羅漢贊趙孟俯達摩贊李公麟十四羅漢贊趙孟俯達摩像贊盧楞伽阿羅漢像贊卷三十贊紫光閣五十功臣像贊有序趙孟俯浴象圖贊趙孟俯畫達摩像贊玉鏤達摩面壁贊元人寒山拾得像贊木刻文殊像贊木刻觀音像贊仿蘇漢臣古佛贊寫五臺殊像寺文殊像成並贊南極夀星贊宋人觀音大士像贊丁雲鵬裝嚴大士相贊鄭重裝嚴釋迦牟尼佛贊玉觀音贊唐人羅漢贊黃龍古佛贊仿蘇漢臣古佛像贊宋人維摩授經圖贊徐揚伏獅羅漢像贊丁觀鵬降龍羅漢像贊貫休羅漢像贊盧楞伽無量夀佛贊仿趙孟俯古羅漢贊丁觀鵬畫釋迦牟尼佛贊丁觀鵬畫十六應真贊金廷標畫古佛贊貫休臨吳道子古佛像贊臣等謹案御製文初集三十卷凡五百七十餘篇先散行次韻語為十有九門門各以嵗月為次皆萬幾之餘親御丹素所成其尋常碑文序記之屬臣下恭擬代言者不與焉伏覩聖文之富亘古未有且兹集特為初基繼是而日新月盛源源刋布以嘉惠無窮洵為薄海儒林之厚慶至於載道修辭盡善盡美之極則如星雲輝縵有目咸覩且具見於諸臣後跋臣等無能復贊一詞矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
