front:
  text: 欽定四庫全書御製文二集卷三十二
  hash: sha256:d372e8c88986dfab9abaaa3b6639765711a88859a0b74566f3e582590bb9d7ba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_066-1a, image: WYG1301/WYG1301-0478a.png}
body:
  text: 書事己未嵗我太祖大破明師於薩爾滸山之戰書事蓋聞國之將興必有禎祥然禎祥之賜由乎天而致天之賜則由乎人豫小子於己未嵗我太祖大破明師於薩爾滸之戰益信此理之不爽也爾時草創開基篳路藍縷地之里未盈數千兵之衆弗滿數萬惟是父子君臣同心合力師直為壯荷天之龍用能破明二十萬之衆每觀實録未嘗不流涕動心思我祖之勤勞而念當時諸臣之宣力也謹依實録叙述其事如左己未二月明帝命楊鎬杜松劉綎等統兵二十萬號四十萬來攻左翼中路以杜松王宣趙夢麟張銓督兵六萬由渾河出撫順關右翼中路以李如柏賀世賢閻鳴泰督兵六萬由清河出鴉鶻關左翼北路以馬林麻巖潘宗顏督兵四萬由開原合葉赫兵出三岔口右翼南路以劉綎康應乾督兵四萬合朝鮮兵出寬甸口期並趨我興京三月朔我西路偵卒遙見火光馳告甫至而南路偵卒又以明兵逼境告我太祖曰明兵之來信矣南路駐防之兵有五百即以此拒之明使我先見南路有兵者誘我兵而南也其由撫順關西來者必大兵急宜拒戰破此則他路兵不足患矣即於辰刻率大貝勒代善後封禮親王及衆貝勒大臣統城中兵出而令大貝勒前行時偵卒又以明兵出清河路來告大貝勒曰清河之界道途逼仄﨑嶇兵未能驟至我兵惟先往撫順以逆敵兵遂過扎喀關與達爾漢侍衛扈爾漢後授三等子世職集兵以待上之至時四貝勒即我皇帝太宗文以祀事後至謂大貝勒曰界藩山上我築城夫役在焉山雖險倘明之將帥不惜士卒奮力攻之陷夫役奈何我兵宜急進以安夫役之心大貝勒等善是言下令軍士盡擐甲日過午至太蘭岡大貝勒及扈爾漢欲駐兵隱僻地以待敵四貝勒艴然曰正宜耀兵列陳明示敵人壯我夫役士卒之膽俾并力以戰何故令兵立隱僻地耶巴圖魯額亦都後為一等大臣追封𢎞毅公曰貝勒之言是也我兵當堂堂正正以向敵人遂督兵赴界藩對明兵營列陳而待初衆貝勒兵未至我國防衛築城夫役之兵僅四百人伏薩爾滸谷口伺明總兵杜松王宣趙夢麟之兵過谷口將半尾擊之追至界藩渡口與築城夫役合據界藩山之吉林崖杜松結營薩爾滸山而自引兵圍吉林崖仰攻我兵我兵四百人率衆夫役下擊之一戰而斬明兵百人時我國衆貝勒甫至見明兵攻吉林崖者約二萬人又一軍列薩爾滸山巔遙為聲勢四大貝勒與諸將議曰吉林崖巔有防衛夫役之兵四百人急增千人助之俾登山馳下衝擊而以右翼四旗兵夾攻之其薩爾滸山之兵則以左翼四旗兵當之遂遣兵千人往吉林崖上至問四大貝勒破敵策四大貝勒具以前議告上曰日暮矣且從汝等今分右翼四旗之二與左四旗兵合先破薩爾滸山所駐兵此兵破則界藩之衆自喪膽矣再令右二旗兵遙望界藩明軍俟我兵由吉林崖馳下衝擊時并力以戰是時我國近都城之兵乘善馬者先至乘駑馬者後至其數十里外者尚未至於是合六旗兵進攻薩爾滸山明兵駐營列陳發鎗炮我兵仰而射之奮力衝擊不移時破其營壘死者相枕藉而所遣助吉林崖之兵自山馳下衝擊右二旗兵渡河直前夾擊明兵之在界藩山者短刃相接我兵縱橫馳突無不一當百遂大破其衆明總兵杜松王宣趙夢麟等皆殁於陳橫尸亘山野血流成渠其旗幟器械及士卒死者蔽渾河而下如流澌焉追奔逐北二十餘里至碩欽山時已昏軍士沿途搜𠞰者又無數是夜明總兵馬林兵營於尚間崖濬壕嚴斥堠鳴金鼓自衛我兵見之乘夜馳告於大貝勒翼旦大貝勒以三百餘騎馳往馬林兵方拔營行見大貝勒兵至回兵結方營環營濬壕三匝列火器俾習火器者立壕外繼列騎兵以俟又潘宗顔一軍距西三里外營斐芬山大貝勒見之使人馳告於上時我國逺路之兵亦陸續至與大貝勒兵合明左翼中路後營遊擊龔念遂李希泌統步騎萬人駕大軍持堅楯營於斡琿鄂謨地環營濬壕外列火器上見之與四貝勒率兵不滿千人分其半下馬步戰明兵發火器拒敵四貝勒引騎兵奮勇衝入我步兵遂斫其車破其楯明兵又大敗龔念遂李希泌皆陳殁焉會大貝勒使人至知明兵巳營尚間崖上不待四貝勒兵急引侍從四五人往日中至其地見明兵四萬人布陳成列上趣令我軍先據山巔向下搏擊衆兵方欲登山而馬林營內之兵與壕外兵合上曰是將與我戰也我兵且勿登山宜下馬步戰令大貝勒往諭時左二旗兵下馬者方四五十人明兵巳自西突至大貝勒代善言於上曰兵已進矣即怒馬迎戰直入其陳二貝勒阿敏三貝勒莽古爾泰與衆台吉等各鼓勇奮進兩軍搏戰遂敗明兵斬首捕鹵過當方戰時我六旗兵見之不及布列成陳人自為戰前後弗相待縱馬飛馳直逼明營明兵發鳥鎗巨炮我兵衝突縱擊飛矢利刃所向無前明兵不能支又大敗遁走我兵乘勝追擊明副將麻岩及大小將士皆陳沒總兵馬林僅以身免滅跡掃塵案角隴種尚間崖下河水為之盡赤上復集軍士馳往斐芬山攻開原道潘宗顏兵令我兵之半下馬仰山而攻宗顏兵約萬人以楯遮蔽連發火器我兵突入摧其楯遂破之宗顏全軍盡沒時葉赫貝勒錦台什布揚古欲助明與潘宗顏合其兵甫至開原中固城聞明兵敗大驚而遁是時我軍既擊破明二路兵上乃收全軍至固勒班地方駐營而明總兵劉綎李如柏等由南路進者已近逼興京偵卒馳告上遂命扈爾漢先率兵千人往禦翼旦上復命二貝勒阿敏率兵二千繼之上率衆貝勒大臣還軍至界藩行凱旋禮刲八牛祭纛告天大貝勒代善請曰吾先歸從二十騎微行探信祀畢上徐來上許諾三貝勒莽古爾泰亦相繼行四貝勒馳至上前請與俱往上曰汝兄微行往探汝隨吾後行四貝勒曰兄獨往吾留此未安也遂亦行日暮大貝勒回至興京入宫則皇后內庭等見大貝勒至亟問禦敵策大貝勒曰撫順開原二路敵兵已破誅戮且盡南來兵已遣將往禦我待父皇命當即往破之於是大貝勒復出城迎上於大屯之野上自界藩啓行至興京平明命大貝勒三貝勒四貝勒統軍士禦劉綎而留兵四千於都城待李如柏賀世賢等之兵初劉綎兵出寬甸進棟鄂路我居民避匿深山茂林中劉綎悉焚其柵寨殺其孱弱佐領託保額爾訥額赫率駐防五百人迎敵劉綎兵圍之數重額爾訥額赫死之并傷我卒五十人託保引餘兵與扈爾漢軍合扈爾漢伏兵山隘以待巳刻大貝勒及三貝勒四貝勒引兵甫出瓦爾喀什窩集時劉綎所率精鋭二萬先遣萬人前掠將趨登阿布達哩岡布陳大貝勒欲引兵先登馳下擊之四貝勒曰兄統大兵留此相機為援吾先督兵登岡自上下擊之大貝勒曰善吾引左翼兵出其西汝引右翼兵登山俾將士下擊汝立後督視勿違吾言輒輕身入也四貝勒遂率右翼兵往先引精騎三十人超出衆軍前自山馳下奮擊之兵刃交接戰甚酣後軍隨至衝突而入大貝勒又率左翼兵自山之西至夾攻之明兵大潰四貝勒乘勝追擊與劉綎後隊兩營兵遇綎倉卒不及陳四貝勒縱兵奮擊殱其兩營兵萬人劉綎戰死是時明海蓋道康應乾步兵合朝鮮兵營於富察之野其兵執筤筅長鎗被藤甲皮甲朝鮮兵被紙甲其胄以栁條為之火器層疊列待四貝勒既破劉綎兵方駐軍衆貝勒皆至遂復督兵攻應乾明兵及朝鮮兵敵發火器忽大風驟作走石揚沙烟塵反撲敵營昏冥晝晦我軍乘之飛矢雨發又大破之其兵二萬人殱焉應乾遁去先是二貝勒阿敏扈爾漢前行遇明遊擊喬一琦兵擊敗之一琦收殘卒奔朝鮮都元帥姜功烈營時功烈據固拉庫崖衆貝勒復整兵逐一琦遂攻朝鮮營功烈知明兵敗大驚遂按兵偃旗幟遣通事執旗來告曰此來非吾願也昔倭侵我國據我城郭奪我疆土急難之時賴明助我獲退倭兵今以報德之故奉調至此爾撫我我當歸附且我兵之在明行間者已被爾殺此營中皆髙麗兵也明兵逃匿於我者止遊擊一人及所從軍士而已當執之以獻四大貝勒定議乃曰爾等降先令主將來否則必戰功烈復遣使來告曰吾若今夕即往恐軍亂逃竄其令副元帥先往宿貝勒營以示信詰朝吾率衆降遂盡執明兵擲於山下付我明遊擊喬一琦自縊死於是朝鮮副元帥先詣衆貝勒降翼日姜功烈率兵五千下山降衆貝勒宴勞之送功烈及所部將士先詣都城上御殿朝鮮都元帥姜功烈及副元帥等匍匐謁見上優以賓禮數賜宴厚遇之士卒悉留豢養四大貝勒既殱南路明兵四萬人我軍駐三日籍其俘獲人馬輜重鎧仗而還是役也明以傾國之兵雲集遼瀋又招合朝鮮葉赫分路來侵五日之間悉被我軍誅滅其宿將猛士暴骸骨於外士卒死者不啻十餘萬我軍邀天佑助以少擊衆無不摧堅挫鋭迅奏膚功策勳按籍我士卒僅損二百人自古克敵制勝未有若斯之神者也時明經略楊鎬駐瀋陽聞三路兵敗大驚急檄總兵李如柏副將賀世賢等回兵如柏等自呼蘭路遁歸我哨兵二十人見之據山上鳴螺繫帽弓弰揮之作招集大兵狀已而呼噪下擊殺四十人獲馬五十匹明兵奪路而逃相蹂踐死者復千餘人庚寅大軍還至都城上顧衆貝勒大臣曰明以二十萬衆號四十七萬分四路并力來戰今我不踰時破之遂獲全勝各國聞之若謂我分兵拒敵則稱我兵衆若謂我往來𠞰殺則服我兵强傳聞四方孰不懾我軍威者哉嗚呼由是一戰而明之國勢益削我之武烈益揚遂乃克遼東取瀋陽王基開帝業定夫豈易乎允因我太祖求是於天復讐乎祖同兄弟子姪之衆率股肱心膂之臣親冒矢石授方略一時聖嗣賢臣抒勞效悃用成鴻勳我大清億萬年丕丕基實肇乎此豫小子披讀實録未嘗不起敬起慕起悲愧未能及其時以承訓抒力於行間馬上也夫我祖如此勤勞所得之天下子若孫覩此戰蹟而不思所以永天命綿帝圖兢兢業業治國安民凛惟休惟恤之誡存監夏監殷之心則亦非豫子孫而已爾此豫覩薩爾滸之戰所由書事也此豫因實録尊藏人弗易見而特書其事以示我大清億萬年子孫臣庶期共勉以無忘祖宗開創之艱難也御製文二集卷三十二
