  text: 欽定四庫全書御製文二集卷二十七
  hash: sha256:fc855c9193e7073f29f9092cde677d742320d46837c2ecfd6155a385b6038af2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_061-1a, image: WYG1301/WYG1301-0446c.png}
body:
  text: 碑文重修文廟碑記舉江淮河濟以贊海吾知其不知海舉嵩岱恆華以贊地吾知其不知地然則舉道德仁義以贊孔子者其亦類於是乎夫江淮河濟豈不為海所納而不足以形海之大然海固不拒江淮河濟以為水也嵩岱恆華豈不為地所載而不足以究地之厚然地固不讓嵩岱恆華以為土也道德仁義豈不為孔子所垂而不足以盡孔子之量然孔子固不外道德仁義以為教也教之義始見於虞書而未有定所夏校殷序周庠學則三代共之是國學所昉乎夫三代既有學亦必有教而吾以為孔子立道德仁義之教者何蓋三代以前之教非孔子不明三代以後之教非孔子不立亦猶江淮河濟非海不納嵩岱恆華非地不載道德仁義非孔子不垂也國學始於元太祖置宣聖廟於燕京由元及明代有損益修葺至本朝而崇奉規模為大備列聖右文臨雍必事輪奐乾隆戊午朕詣學展儀先詔易蓋黃瓦聿昭茂典然丹雘雖致飾壯觀而上棟下宇風雨燥濕厯年既久浸欹是虞爰以嵗丁亥發帑二十餘萬特簡重臣司其事越己丑仲春告蕆工朕親釋奠以落成焉先是言臣有以宜乘此時修復辟雍圜水之制為請者禮官以為三代之制弗相沿襲實政不必泥古朕以其言良是遂從之門殿諸額一凖會典皆親書各懸於其所舉大工者必泐碑以志故敘其事書之若夫述孔子之言仍以頌孔子是猶繪日月星辰以象天朕有所不能淀神廟碑記畿南之地廣衍多隰衆水所鍾翕之渟之呀然成淵而以時輸壑者則惟淀淀之名始見於左思魏都賦所謂掘鯉之淀是也字亦為澱水經注新唐書志皆云九十九澱酈道元又稱為清河後世約其數為七十有二其名皆不可臚舉其散見宋遼金史者今或淤廢或傳聞訛舛所可指者不過四十餘其他或曰泊曰窪曰窩曰港隨方俗所稱而統言之則東西兩淀西淀之大周三百餘里槩州一縣四東淀尤大周四百里而贏槩州縣七其為藪澤也廣故畿內之水大則沽渝濡􅋤派滋易淶小則山泉澗流無所不容而旁境之溝澮汙涔亦無所不赴其受水多故兩淀又各有經河以條貫釃𨗳之依城溫義亢其首四角引其吭玉帶會同緣其督扼以茅灣掖以中亭十望絡以南北中三股欱於臺頭滌於大清河趨西沽為尾閭之泄焉其上則千里長隄控界維鞏下則格淀隄以拒子牙六郎諸隄以障永定而閘而涵洞羅布莭宣者無弗具於是兩淀無渾流之患而専清水之利黍疇稻畦既膏既溉厥惟上腴舟航是通貿遷列隧而菰蘆菱藕鳬魚之屬仰資生者億計非有宰其化者孰使我民利賴若是記有之山林川谷為民取財用皆曰神蓋淀之有神昭昭矣人第習焉不察廟闕未舉嵗丁亥朕敬循皇祖成憲巡覽淀海爰自趙北口御安福艫沿蘇橋而東厯揚芬港至於天津嘉文安窪之既涸懲渾河故道之不可復則有詠而三灘里淀隄之弗屬者出帑繕之亦惟紹我祖烈以求民寧維時春水方渙和飈習帆蒸徒弗勩繄川祗實昭厥佑爰進大吏詔之曰惟淀縈薄左輔袤延且千里理大物博用阜乂我畿內民曷可弗重以神事其相地飭祠用饗乃發外府金二萬五千卜度兩淀中庀材經始之閲再期工蕆堂廡既崇輝庖咸列以妥以恪式副彛典大吏復籲以明年春蒞而落之且以碑辭請則又繹告之曰惟淀實嘉利我甸人匪今斯今食神之福而淀左右耆庶婦孑焉正嵗時祈報走廟下則自今始神實馮而歆之惟是毋霪毋潦毋有災沴豐殖錫康俾我民其永利利用光我秩祀有司亦毋怠祠事毋弛民功益迓神惠而溥淀之利識其詳謹肇祀也重修功德寺碑記道海淀徑青龍橋折而西距玉泉山麓不盡於二里有遺剎一區重門三塗不可識已延睇香積頽垣離立艿荄間訊諸土人曰是功德寺也考元史文宗天厯二年建大承天護聖寺而都穆南濠集稱功德寺舊名護聖寺蔣葵長安客話載寺修於明宣德初及嘉靖巾車駕駐此見廊廡金剛像獰甚心悸因坐僧宫殿愆踰罪撤去之寺竟廢盩怪哉有明閹焰滋熾若瑾振輩橫作罔禁顧獨毁兹寺使勝國名迹就湮於意何居爰詔將作兹寺久著圖志且當靜明園蹕途乃者嵗庚寅為朕六帙慶辰越辛卯恭逢聖母皇太后八旬萬夀聖節宜加釐飭用迓鴻禧其出內帑繕而復之暨所司以落成告則材緻工完自層闉周阿登登戢戢以逮幡楔鐘魚靡弗嚴淨具足夫其臂倚嶔岑旃檀蔚森迦陵囀梵六時送音非功德之林耶面俯湖堧神瀵奫潫耨池分罫條衣水田非功德之泉耶然而朕之記之詎惟在是貝夾嘗言以兹功德無量無邊必進而讚之曰不可思議夫不可思不可議者特從其波及一四天下一切衆生隨分圓滿末由舉似而為言耳其在能仁有建立之功有精進之德固無一息不心之以為願而身之以為行無量夀佛經所以有善思議菩薩之目又豈容委之不關思議輒自弛其擔荷哉正如古帝者致巍乎煥乎之盛美持不矜不伐之淵沖其功德至於民無能名而方其食旰衣宵常於一堂命禮樂工虞之佐吁咈都俞相與動色而交警凡皆起於思之精議之熟而後不識不知被之者亦並忘乎思議其為無量無邊也以證帝釋真詮亦若是則已矣斯尤其可記者至虞集寺碑謂始作土功時得古金銅事佛儀器於地中以為先有密契帝京景物略謂寺僧板庵能役木毬使者出外募金直襲唐咸通中正覺禪師軼事傅會其説蓋皆誇功德而涉思議其義轉墮又奚足云普陀宗乘之廟碑文山莊迤北普陀宗乘之廟之建仿西藏非仿南海也南海普陀在浙東定海縣境朝山之舶嵗嵗淩越洪濤瀾涆間擎薌頂禮唯謹曰大士道場舍兹奚屬是獨震旦緇流方隅所見故然考之貝夾普陀有三一居額訥特珂克一居圖伯特一居南海蓋南海特大士行教至此偶一示現云耳庸可以此為是而彼為非乎額訥特珂克即印度是由此以證西來因緣自印度而西藏自西藏而南海了了可識第印度金剛座遼逺難稽詎若西藏都綱法式具備為天人攝受之閎規藩服皈依之總滙也哉乃者嵗庚寅為朕六帙慶辰辛卯恭遇聖母皇太后八旬萬夀自舊隸蒙古喀爾喀青海王公台吉等暨新附凖部回城衆蕃長聨軫偕來臚歡祝嘏念所以昭褒答示惠懷者前期咨將作營構斯廟以乾隆三十二年三月經始至三十六年八月訖工廣殿重臺穹亭翼廡爰逮陶笵斤鑿金碧髤堊之用莫不嚴淨如制夫羣藩信心回向厥惟大慈氏之教而熱河尤我皇祖聖祖仁皇帝撫綏列服嵗時肆覲之區嚮也西陲內面景從朕勤思纘述普寧安逺普樂諸剎所謂嗣溥仁溥善而作也今也逢國大慶延洪曼羡而斯廟聿成三乘之宗實其統會於焉宣寶鐸演金輪關禽流梵樂之音塞樹種菩提之果一切國土善信膜拜歡喜以為得未曽有而久入俄羅斯之土爾扈特以其為外道非黃教所概舍久牧之額濟勒率全部數萬人厯半年餘行萬有數千里傾心歸順適于是時蒞止瞻仰善因福果誠有不可思議者是則山莊之普陀與西藏之普陀一如與印度之普陀亦一如與南海之普陀亦何必不一如然一推溯夫建廟所由來而如不如又均可毋論即如如之本義豈外是乎豈外是乎先是羣藩合辭請進千佛像懇欵弗可却因命就廟中庋閣奉之别有記不復詳綴為説偈曰我聞贍部洲古德有道場天龍各護持名四大結聚九華及二峩五臺亦初地普陀南海南觀自在所住其言限方所不出邊邪見譬如一搩手眯萬億由旬若人證三摩要令不失故衛藏妙莊嚴竺乾祖庭意興桓足香界成此大勝因百部諸賢王合十聆唄讃塞土黃金色是處菩薩面其前羅漢峯磬石為犍椎舉似象王巖非離亦非即其下獅子溝武列功德水舉似鐵蓮洋無垢亦無淨能具等正覺皆作如是觀五十三參竟還叩兩足尊長現調御相為説無生法重修馬駒橋碑文水自南苑出者二其南源曰團河出南苑墻東南釃為鳳河又東滌永定之濁由大清河以歸海向固疏治之矣其北源曰一畝泉出新衙門北屈曲東南流徑二閘涼水河自北來會之涼水河者出右安門西南鳳泉東流徑萬泉寺分為二其一南徑草橋曲折東注一自北徑廣恩寺曲折東注至永勝橋復滙為一東南流循南苑繚垣而東至小紅門之西入苑墻東南徑沙底橋折而南與一畝泉合又南而東至鹿圈村三海子以上之水自西南來注之又東南流穿苑垣而出逶迤至張家灣入運河是水之初出苑垣也瀠演噴欱千溜一趨瓴如矢如回激弗止則有巨梁揵之曰馬駒橋橋建自勝國嵗渝寖以圮壞農旅交病石陀入水水梗或溢出妨民田廬而中澀則旁淤間塞水所由道益不可以不亟治乃命將作相視因其舊材撤而新之縱之得丈二十有五橫之得尺亦二十有五為孔洞者七視昔制雖少狹而壯固有餘工始於乾隆三十八年之春越其冬落成夫治水者必溯其源由源而及其支流條派剔之鬟之乃可以不紊今一畝泉源委既已剗治而涼水河所徑漫流積潦寖成沮洳爰自鳳泉至馬駒橋濬河八千餘丈修葺橋閘凡九新建閘五即以濬河之土於右安門外築甬道一千餘丈以便行人其河旁稻田數十頃既墾且闢益資灌溉之利而兹橋實下遊關鍵暢尾閭以利導之尤施功之弗可己者若前代著述家睫視臆論妄以玉泉傅合南海子之水舛錯糾紛至可嗤笑曩賦海子行曽詳著其説兹因所司請記復為詮敘水道大略俾方來圖經輿記知所考據而若河若塗若橋皆王政之大端所繫綦巨毋廢毋墜誠有司所當務書之碑用示來許御製文二集卷二十七
