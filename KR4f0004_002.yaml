body:
  text: 經筵御論致中和天地位焉萬物育焉天地萬物本一體致中和而天地自位萬物自育其理自然不待勉强夫所謂大本不可不立達道不可不行豈非教人以戒懼謹獨之意乎然究而言之有不可則有可者在是尚出於勉强也出於勉强則不能致中和而位天地育萬物矣蓋天地本無不位也萬物本無不育也元黄分而清濁奠形色章而動植殊歴混茫以來有不位不育之時乎其不位不育皆自人心不能致中和而然初非天地萬物之過也孟子得子思之正傳故其言曰萬物皆備於我矣反身而誠樂莫大焉彊恕而行求仁莫近焉反身而誠致中之道也强恕而行致和之道也信矣致中和而天地自位萬物自育也闢四門明四目達四聰從來釋書者率云闢四方之門以來賢俊明四方之目達四方之聰以去壅蔽夫明目達聰以去壅蔽似矣而所云闢四方之門使賢者由此而入則是門當設於何所乎舜制九州幅員不為不廣四岳十二牧之徒内外弼亮豈必設之閫閾以限量之哉蓋目為視之門耳為聴之門闢門者闢此耳明達者明達此耳苟其視聴無所壅蔽則賢材亦由是而升民隠亦由是而達使不能兼聴並觀則所謂賢者未必賢矣故闢門明目達聰本為一事不可岐而二之且兼聴並觀尤以得賢為要設不能得賢則兼聴並觀適滋叢脞又何民隠之能周知乎故為君者以天下人之聰明為聰明則公以一二人之聰明為聰明則私言之易而行之難此吾所以望勲華之世而興歎也自天子以至於庶人壹是皆以脩身為本天子庶人其分雖殊而脩身則無二致脩身者天子之所以為天子庶人之所以為庶人也故中庸曰脩身以道脩道以仁仁者人也此以見身為心之所託而家國天下之本也正心以上皆所以脩身而齊家以下則舉此而措之亦云有其本則末不求而自至如影之隨形響之應聲焉非云我之脩身所以為齊家治國平天下也如以為齊家治國平天下則修身非為已矣庶人無治平之責者亦可不脩身矣不知人也身也心也三而一者也心不可見於身而見人亦形名以身而名脩身要矣明徳新民其皆以是為宗乎天施地生其益无方蓋嘗觀於造化自然之流行而知天地之大矣天地之大未嘗自言其益而其益乃无方焉一隂一陽之謂道四時行焉百物生焉往者屈而來者伸息復消而消復息天地何容心哉而惟是日進無疆之體健行不息化育萬物各正性命何其益之大也彼惠心而或問者固不足稱即心乎愛矣遐不謂矣而苟其内無健順藏用之功則不足以建知始作成之本外無丕冒顯仁之量則不足以贊覆幬化育之權然而天地無心於萬物而萬物亦無心於天地故其益无方焉聖人有心於萬物而萬物亦有心於聖人故其益有量焉此裁成輔相者所以倍難於資始資生之無為也樊遲問仁子曰愛人問知子曰知人問仁而曰愛人問知而曰知人此非啻示仁知之用而且括仁知之體嘗謂聖人之言大小畢該有如海焉以瓶取之盈瓶以罍取之盈罍無不滿其量故聖門問仁者雖多夫子各告之殊而無非為仁之極則也乃樊遲以仁知兼問夫子亦惟是直指其要曰愛人知人似乎隨所問而揭指歸於以明仁知有相成之用而已然仁知之全體大用無有過於此者大哉乾元萬物資始天地以生物為心也聖人得乾之元以為仁聖人之愛人即天地生物之心也舎生物之心不可見乾元之資始舎愛人又何能見聖人之仁哉愛人之為仁明則知人之為知可類推矣余故曰非啻示仁知之用而且括仁知之體君子以教思无窮容保民无疆易道廣大無不備體以示其象徳以寓其理闡天地自然之藴者其惟極深研幾之聖人乎試觀澤上有地臨之象也悦以强教順以含容臨之理也具其象而理或乖玩辭者其何所從焉澤上有地人咸知其為臨之象矣而因悦之教與順之容更識臨之理教而不養操切之政也養而不教姑息之為也從古盡臨之義者舎是其何以為治民之急務哉且也教與養亦相資而不可離者是故無包荒之量則振徳之心究不能至誠無斁也鮮納汙之徳則虚受之懐究不能廣大無限也人徒知教養之宜並行而不知教正所以為養養正所以為教也有臨民之責者所宜視為一事而日勉焉弗遑也夫子之道忠恕而已矣一貫不外於忠恕而實則忠恕即一貫而已蓋一貫即所云如有所立卓爾雖欲從之末由也已此其道無端倪之可見而非不可見也於忠恕見之天何言哉四時行焉百物生焉天地不可見也於四時之行百物之生見之謂四時百物非天地可乎謂天地將借四時百物以見可乎忠恕之於一貫亦如是而已矣形而上者謂之道天地是也一貫是也形而下者謂之器四時百物是也忠恕是也夫聖人又何嘗有告曾子之别傳而曾子乃假借是語以泛應門人之問哉上下交而其志同也上下交而其志同此語當與君子和而不同句並觀蓋所云同者非同其私也同其志也其志維何敬天勤民而已夫惟同其志則都俞同也吁咈亦同也使以其私則都俞乃阿諛之風而吁咈亦後言之漸安得謂之其志同乎故天地有髙卑之經而上下有氣機之應君子法乎此是以志氣相孚疇咨交儆無非欽若亮采之心也此所謂和而不同也而適成其為上下交而其志同也魏徴之面折廷諍韓范之上殿相争胥是道而已爾君子之於天下也無適也無莫也義之與比聖人勉人以順應天下之理故先示人以大公無我之心蓋人必有所不為而後足以有為然此以言其立志而非謂其於制天下之事也於制天下之事而預存一必為必不為之心則非大公無我之道失義之宜矣如衡如石不定物以數物之懸者輕重自鑒如水如鏡不示物以形物之鑑者妍媸畢露内聖外王之學莫不以是為要而有臨民之責者舎此更無以為出治之本此執中之傳所以為千古帝王之師範也知人則哲能官人安民則惠黎民懐之人君亦孰不欲知人而安民哉然知人固不易人固不易知天下之人衆矣人君則惟一人以衆人之心欲蘄一人之知而一人持此一心以應天下衆人之心且欲知之無遺焉此不待智者而後知其難矣然禹必曰惟帝其難之者何哉蓋自是者見人之非而不見已之非自易者見人之難而不見已之難惟帝欽若之衷常見已之非常見已之難是以知人本難而堯能官人則不難矣能官人斯能安民若夫黎民之懐必其深仁厚澤實有淪肌浹髓使百姓尊親於自不容已有非驩虞之政所能勉强而致之者矣視其所以觀其所由察其所安人焉廋哉人焉廋哉所以所由所安雖在人曰視曰觀曰察則在已必也如衡如石而物之懸者自呈其輕重如水如鏡而物之照者自露其妍媸故聖人教人無非自盡其力而更要在不存成見不然萬理紛前一指或蔽其為以為由為安且不能辨又焉能致視致觀致察以期人之不廋哉雖然知人則哲惟帝其難是以聖人再三丁寧而不厭其詳者抑亦有懼於聴言觀行矣君子體仁足以長人元足以包四徳而仁亦足以貫四端體仁即所以體元體元即所以體乾也然四端無非仁而仁之本則在於博愛四徳無非元而元之本則在於大生試觀四時之春而可知天地之心矣體仁長人又何待蓍占而龜卜哉雖然無亨利貞不能成其為元而無義禮智亦不能成其為仁故聖人義制事禮制心不妨並用而其為全體大用之本者必於仁焉是存肫然而無不愛廓然而無不容已飢已溺關切深衷曰教曰養籌之無窮此聖人之所以體仁也此其所以能長民也自誠明謂之性自明誠謂之教徳無不實而所明皆善性而有之聖人也先明乎善而後實其徳教而入之賢人也誠者理之當然明者明其所以然性即理也教即所以明理一而二二而一者也是故誠之外無性明之外無教聖人渾然天理無所用其明而明無不照謂之所性而有尚屬强名則何藉乎教賢人日月至焉必待先明乎善而後實之乃復其性然明即明此理實亦實此理而已夫豈别有所謂教哉朱子謂與天命謂性脩道謂教二字不同予以為政無不同耳勑天之命惟時惟幾天髙聴卑一念之克罔聖狂分焉而天之眷顧與否亦捷於響應故求天於天不若求天於已人事盡而天理見幾者事之微天理存而人事脩時者理之運無時無事而不戒勑則不覩不聞之戒慎恐懼勵朝乾夕惕而無間以是而對越顧諟庶幾乎私欲濳消克已復禮以之脩身則履中而蹈和以之施政則形端而表正即臯陶之颺言亦豈外夫大舜庸作之意哉博學而篤志切問而近思仁在其中矣此非四事蓋兩事耳博學而不篤志則或涉為荒唐切問而不近思則或入於無稽然志也思也一心之事耳仁人心也安見篤志近思而心常馳騖於外者哉故曰仁在其中朱註以為未及乎力行而為仁此或為下學者言夫篤志近思而不力行則又安得謂之篤志近思乎子夏雖文學之科此言實見道之論故博學切問仍文學之事歟而篤志近思則心存矣心存而仁存是知學問思辨智之事而智亦仁之事不然元何以貫四端而長萬善哉思其艱以圖其易民乃寧夏不能不雨冬不能不寒於其常也而民猶有怨咨者非怨雨寒也力耕桑而不得飽食煖衣斯其艱也斯民之宜其無時而不怨咨也治人者豈可不思其艱乎思其艱則當圖其易而易正不易圖也必也生衆食寡為疾用舒三物五典以教以安庶其菽粟如水火而民免罹於艱得少寧乎然民有可免艱獲寧之理而上終不可得有覺易不艱之日蓋以為易則其艱立至矣治民乃一節若夫守先王之業綜萬幾之理其難其慎惟日孜孜又何嘗一息一刻有不艱覺易之時也耶成已仁也成物知也至誠如神斯已物一貫無所用其成而無不成譬之天地化四時育萬物而四時萬物無非天地故天地不自見為天地而誠者不自見為誠也誠之者則不然見有所謂誠則有所謂已既有所謂已即有所謂物雖然已與物又豈有二致哉反身而誠斯盡已之性誠精故明斯盡物之性然而脩身脩道當盡克已復禮之功欲立欲達當推胞與為懐之量所為人欲盡而天理存外内合而時措宜仁也智也皆一誠之實理而已但人道無不當勉而有位與無位者其成已成物措施參贊之功所殊自覺霄壤是又予所抱歉而刻不能已於懐者夫易簡而天下之理得矣乾坤之撰至健至順確然隤然示人易簡而人或不知即有知之者亦云乾坤始能如是而人豈能惟聖人體天地之心以為心斯參天地之化以為化然而乾坤運終古而無窮者則以得易簡之理也聖人雖百世而罕遇者則以失易簡之理也失易簡之理何以其有人已之分也一有人已之分則物來而不能順應憧憧往來朋從爾思又何能崇徳廣業成參贊之功哉故人欲效乾坤之易簡當法聖人之無私無私則理存理存則守者約而應不窮乆大之規胥於是乎在矣四時行焉百物生焉斯言也蓋孔子知命耳順以後所以示學者真實至當之理非因子貢以言語觀聖人徒為是不待言而可見之語而别有所謂妙道精義也且四時行百物生之中何一非天乎而四時行百物生之外又何别有可以見天者乎聖人視聴言動晝作夜息之中何一非妙道精義乎而聖人視聴言動書作夜息之外又何别有所謂妙道精義者乎天即聖人聖人即天四時行百物生即聖人之視聴言動晝作夜息吾故曰此孔子知命耳順以後所以示學者真實至當之理非因子貢以言語觀聖人徒為是不待言而可見之語而别有所謂妙道精義也士希賢賢希聖聖希天學者由躬行實踐深造而自得之可矣其難其慎惟和惟一諸家解此者大約以其難其慎屬之君惟和惟一屬之臣如是則是伊尹泛訓之辭而非訓太甲之辭矣蓋難於任用慎於聴察此固君職不待言矣即惟和惟一何莫非君職乎哉且也不惠於阿衡是不和也庸罔念聞是不一也以致邇訓允徳是既和且一然後能為商令主而謂是為訓人臣之語可乎然欲和一於後必當難慎於先周而不比慎終惟始用是道也則君子進而小人退相需殷而相得彰蔡傳引而未發予故申而論之舜明於庶物察於人倫由仁義行非行仁義也明以識事物之理察以盡人倫之詳察雖若精於明然事物原不出人倫之外也處人倫之間而能盡仁義之詳者莫過於舜故孟子曰由仁義行非行仁義也蓋由仁義行則仁義與已為一行仁義則已與仁義為二仁者安仁無所勉强而所行無非仁能仁而安有不能義者乎知者利仁則是知其為利而行之者其視從容中道由仁義而行渾然無間不待用力者則有别矣易曰同歸而殊途一致而百慮不察於人倫之間而盡仁義之詳者烏足與言内聖外王之道也耶益動而巽日進无疆脩已治人之道莫善於日新莫不善於自畫動而巽不惟學者作聖之功實王者體乾之徳蓋不震動則不能奮發有為不巽入則不能遜志涵養遜志則雖有為而亦不鄰於躁奮發則雖涵養而亦不入於弛以之脩已則徳崇以之治人則業廣文王之於穆不已周公之無逸作所胥是道也豈徒學問之益云乎哉如保赤子心誠求之雖不中不逺矣赤子之在母旁形日近而情日接然猶待心誠求之而後不中不逺若夫居九重之上臨兆民之衆勢分相隔委曲莫達其能洞悉民艱呼吸相關使無向隅之歎而皆得養育之資蓋亦難矣故禹稷已飢已溺文王視民如傷用是道也接屋連閣非不麗然民有掘穴狹廬者弗樂也肥醲甘脆非不美然民有菽粟不接者弗甘也蓋不樂為脩飾豐亨之説則牧民者或可祛其匿灾之心不肯存惜帑省費之見則持籌者或可杜其節用之口如是而猶懼有或遺焉庶乎民隠得通不中不逺曽子舉武王訓康叔之言明立教之不假强為在識其端而推廣之然吾因推廣益識其艱蓋齊一家治一國者其分小其事易而平天下者其分大其事難雖日孜孜朝乾夕惕猶慮弗克勝任欲不勉强勤求其可得乎咸速也恒久也易分上下二經上經首乾坤此天地之大經大法固不待言下經首咸恒解之者泥於夫婦之一語於是有少男少女感之深長男長女倫之正之説是皆以世俗夫婦之情窺聖人序卦之義並且曲為損益不首下經之論其去聖人之意蓋已逺矣夫何不觀於雜卦咸速恒久之説哉且易雖有六十四卦何一非乾坤乎乾坤者天地之象咸恒者蓋天地之象之所以示人最深切而著明者也夫周天三百六十五度天一日而一周日月五行所不能及是最速者莫如天而咸象之華嶽有時而損益河海無日而不流而載之振之者終古無遷是最久者莫如地而恒象之且彖傳於咸則曰天地感而萬物化生於恒則曰天地之道恒久而不已一再舉之語焉而詳實於雜卦之義互相發明所謂聖人之情見乎辭矣蓋咸恒非不備夫婦之道而徒舉夫婦之道以闡咸恒之義則不足以盡之若夫自强不息厚徳載物乃君子所以法乾坤即君子所以法咸恒不息感之速也厚徳常之久也虚受無我立不易方内聖外王之道於是乎在如是則咸恒一乾坤之具體其首下經不亦宜哉御製文初集巻二
