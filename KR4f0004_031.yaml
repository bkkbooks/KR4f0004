body:
  text: 皇上敕幾典學夙夜懋修功業既昭文章丕煥御製詩初二集已裒成巨帙中外臣庶咸得欽奎藻之光華遵風雅之極軌矣所喁喁延首者鴻文美富猶未得快覩瑶編以章醲化茲蒙俞允宣付剞劂共得文五百餘首既告成臣等竊就蠡管所能窺及者綴於簡末竊惟自古帝王之文尚書尚矣其載堯以來典謨誓誥焜耀簡册然徴詞紀事多出諸史臣之手惟相傳精一數言獨為萬世心法治法之要何也為其敷言自出也我皇上心與天遊身為律度化工在手因物裁成每當清晏操觚不移晷而千言立就即萬幾一日庶政時殷而間事抒毫筆無停綴點乙不加條理燦具煌煌乎竹素之大觀也臣等仰誦之餘竊見紹揚謨訓祝嘏慈寧凡愛敬之至文悉本性真之流露至於思艱圖易創業守成之旨持盈保泰禔躬牖世之針以及導河防海之機宜井牧農桑之要術與夫辨名體物考異訂訛刻畫圖書陶鎔縑軸莫不滂沛宸衷發抒藴奧此豈一二區區簪筆之臣所能贊一詞綴一字者況乎西庭暢武拓地二萬餘里其間命將行師發謀授略當尺一飛馳廟謨決勝之際指掌所運不隔呼吸開惑論銘功紀績諸巨作雖日侍樞管之臣有雒誦細繹而猶不能深悉夫崖略者而又安能贊助豪楮禆益涓壤哉若夫講席解經臨軒發䇿皆儒臣例應授簡之作猶且親灑寶墨蔚為鴻構初不假槖穎提槧之手然則御製樂善堂集序所云自今以後或出詞臣之手真贋各半者由今觀之固咸知其不然即今日恭誦御製初集文序所云不欲與文人學士爭長者又豈文人學士所能幾及萬一者哉伏惟皇上宵旰之餘日新問學課藝有常凡六籍百家子史之富罔弗貫弗殫洽用能爐錘萬有瀝液衆言甚至俯採典實多臣等所未經披誦莫能記憶者及翻閲再四然後窺識端倪每於直次俯首欽悚同謂大聖人之文不獨本於生知實由好古敏求得之也自茲宇內臣士既讀初二集詩篇復景誦琅函文集若涉水之導津涯若登山之識巔崿萬分一端隨所圭臬皆可以冶鑄程材嘉惠藝藪則觀文以化成天下之盛心亦於是寓也夫臣劉統勳臣劉綸臣彭啓豐臣董邦達臣裘曰修臣于敏中臣錢汝誠臣觀保臣王際華臣蔣檙臣竇光鼐拜手稽首恭跋
