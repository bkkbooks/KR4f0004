  text: 欽定四庫全書御製文初集卷十
  hash: sha256:55e0f3d8dc5268d020853a30f8aa23888f10ca724ebbd8a0ed0d409ad25ca5f2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_010-1a, image: WYG1301/WYG1301-0092c.png}
body:
  text: 序大清律例序象刑有典肇見虞書其用之之道則曰欽曰恤曰眀曰允一篇之中三致意焉武王誥康叔以用其義刑義殺而吕刑則曰士制百姓于刑之中以教祇德古先哲王所為設法飭刑布之象魏縣之門閭自朝廷達於邦國共知遵守者惟是適於義協於中弼成教化以洽其好生之德非徒示之禁令使知所畏懼而已我列祖受天眀命撫綏萬邦頒行大清律例仁育義正各得其宜聖祖仁皇帝至仁如天化成久道德洋恩溥涵浹羣生皇考世宗憲皇帝際重熙纍洽之運振起而作新之親定大清律集解刋示中外甄陶訓迪刑期無刑法外之仁垂為眀訓有曰寬嚴之用必因乎其時洋洋聖謨洵用法之權衡制刑之準則也朕寅紹丕基恭承德意深念因時之義期以建中於民簡命大臣取律文及遞年奏定成例詳悉參定重加編輯揆諸天理準諸人情一本於至公而歸於至當折衷損益為四百三十六門千有餘條凡四十七卷條分縷析倫敘秩然頒布宇內用昭畫一之守於戲五刑五用以彰天討而嚴天威豫一人恭天成命監成憲以布於下民敢有弗欽雖然有定者律令無窮者情偽也易曰君子以眀慎用刑而不留獄書曰式敬爾由獄以長我王國忠信之長慈惠之師尚其慎厥用敬厥由體欽恤明允之意率乂於民棐彞克協於中以弼豫祈天永命允升于大猷從事於斯者胥懋敬哉是為序御選唐宋文醇序不朽有三立言其一言之無文行而不逺若是乎言之文者乃能立於後世也文之體不一矣語文者説亦多矣羣言淆亂衷諸聖當必以周孔之語為歸周公曰言有序孔子曰辭達而已矣無序固不可以達欲達其辭而失其序則其為言奚能雲粼波折而與天地之文相似也然使義則戔戔而言有枝葉妃青嫓白雕琢曼辭則所謂八代之衰已其咎同歸於無序而不達抑又有進焉文所以足言而言固以足志其志已荒文將奚附是以孔子又曰言有物夫序而達達而有物斯固天下之至文也已昌黎韓愈生周漢之後幾五百年逺紹古人立言之軌則其文可謂有序而能達者然必其言之又能有物如布帛之可以暖人菽粟之可以飽人則李漢所編七百篇中猶且十未三四況昌黎而下乎甚矣文之至者不易得也明茅坤舉唐宋兩朝中昌黎栁州廬陵三蘇曾王八大家薈萃其文各若干首行世迄今操觚者膾炙之本朝儲欣謂茅坤之選便於舉業而弊即在是乃復增損之附以李習之孫可之為十大家欲俾讀者興起於古毋祇為發䇿決科之用意良美已顧其識之未衷而見之未當則所去取與茅坤亦未始徑庭朕讀其書嘉其意而亦未嘗不懲其失也夫十家者謂其非八代駢體云爾駢句固屬文體之病然若唐之魏鄭公陸宣公其文亦多駢句而辭達理詣足為世用則駢又奚病日月麗乎天天之文也百榖草木麗乎土地之文也化工之所為有定形乎哉化工形形而不形於形而謂文可有定形乎哉顧其言之所立者何如耳敇幾之暇偶取儲欣所選十家之文録其言之尤雅者若干首合而編之以便觀覽夫唐宋以來名儒碩士有序有物之嘉言固不第十人已也雖然嘗鼎一臠亦足以知道腴之可味况已斟其雉膏哉協紀辨方書序粵昔帝堯命羲和敬授人時厥民知析因夷隩之節後聖有作推而彌廣至於外事用剛日內事用柔日此皆載之經典百王不易者也厥後濫觴日以訛謬術士以吉凶禍福之説震驚朕師不可方物如褚少孫補史記所稱彼家云吉此家云凶彼家云小吉此家云大凶茫乎不知其畔岸漢武以來已如聚訟而荀悅王充輩斥為理之所無棄而勿論者也雖然天以日月行四時人奉天而時若嚮眀而治嚮晦而息后王君公所以奉若天道也日出而作日入而息羣黎百姓所以奉若天道也否則不能晨夜不夙則暮詩人譏焉人人所知也然則舉大事動大衆協乎五紀辨乎五方以順天地之性豈無寸分節解以推極其至精至微之理者歟其支離蒙昧拘牽謬悠之説乃術士之過而非可因噎而廢食者也欽天監舊有選擇通書刻於康熙二十二年其書成於星官之手因訛襲謬見之施行往往舉矛刺盾皇祖聖祖仁皇帝知其荒率不可以訓曾纂為星厯考原一書刋刻頒行而未將監本改正蓋以待夫後人聖人之心慎而又慎如此也以諭監臣監臣曰通書之謬允宜改正朕因其請謂及今猶有莊親王等數人曾經皇祖指授稍眀此理使此時不加訂正恐後此益復無可任使爰命編輯成書頒布天下較之舊本謬説少除然俗所久沿則亦不能盡去便民用也命名曰協紀辨方書夫協紀辨方者敬天之紀敬地之方也一作止一語默天地實式臨之况其大乎如曰如是則吉如是則凶如是則福如是則禍則眀者所勿道也雖然敬不敬之間吉凶禍福隨之矣是為序大清一統志序惟上天眷顧我大清全付所覆海隅日出罔不率俾列祖列宗德豐澤溥威鑠惠滂禹迹所奄蕃息殷阜瀛壖炎島大漠蠻陬咸𨽻版圖置郡築邑聲教風馳藩服星拱稟朔內附六合一家逺至開闢之所未賔梯航重譯歷嵗而始達者慕義獻琛圖於王會幅隕袤廣古未有過焉聖祖仁皇帝特命纂輯全書以昭大一統之盛卷帙繁重久而未成世宗憲皇帝御極之初重加編纂閲今十有餘載次第告竣自京畿達於四裔為省十有八統府州縣千六百有竒外藩屬國五十有七朝貢之國三十有一星野所占坤輿所載方䇿所紀憲古證今眉列掌示圖以臚之表以識之書成凡三百五十餘卷夫肇十有二州見於虞典禹貢一篇備列九州疆域山川土田貢賦物産實為方志之權輿周禮大司徒以天下土地之圖周知地域廣輪之數辨其山林川澤邱陵墳衍原隰之名物土訓道地圖誦訓道方志職方氏掌天下之圖辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人與其財用九穀六畜之數漢郡國地志與計書俱上太史厥後寰宇志記列於正史者代數十家蓋將以觀民設教體國經野表皇威之有截眀王道之無外匪徒備掌故徵博洽已也撫疆宇則念肇造之艱稽制置則念經畫之要采謡俗則念化導之方考循良人物而知治理之效念所以振興而長育之核户口田賦而察登耗之故念所以懷保而蕃殖之書曰皇天既付中國民越厥疆土于先王肆王惟德用和懌先後迷民用懌先王受命我祖宗克眀峻德以有九有之師傳緒在豫敢不惟德之勤篤前人成烈其在我內外百執事慎固封守阜成兆民懋相豫修和有夏亦越我後嗣子孫咸敬厥德以昭受丕基萬年惟無斁覽斯編也其善體諸八旗姓氏通譜序我祖宗誕膺天命勃興東土德綏威讋奄甸萬姓維時龍從鳯附之衆雲合響應輻輳鱗集強者率屬歸誠弱者舉族內附我祖宗建師設長以蒞之分旗𨽻屬以别之厥有熊羆之士不二心之臣效命疆場建謀帷幄親以肺腑重以婚姻酬以爵命逮入關定鼎或聚居遼左或散處燕畿錫之土田爰及苗裔至於今百五六十年生聚蕃衍時萬時億纍朝休養煦植鞠保胥勤越我嘉師咸能永世以滋大朕惟祖宗德澤之深不可不繼修令緒益綿延惇固於無疆重慮物阜且博代序日逺族姓日繁不為之眀章統系俾知世德所自將罔克念先人之勤無以光昭前烈爰發金匱石室之藏徴載籍稽圖譜考其入我朝來得姓所始表之以地系之以名官階勳績綴為小傳勳舊戚畹以及庶姓釐然備具秩然有條與國史相為表裏昔周小史定繫世辨昭穆左氏內外傳言天子建德因生賜姓胙土命氏而司商吹律以定姓名蓋萬物本乎天人本乎祖木有根而枝附焉水有源而流出焉譜牒者所以聨人情之渙而維舊俗之漓不可忽也相昔先民遺風敦朴不徒以俗望相髙是書之作非如魏晉隋唐譜牒之學炫博聞而廣附會以膏粱閥閲為尚也書曰古我先王暨乃祖乃父胥及逸勤又曰惟乃祖乃父世篤忠貞服勞王家纘乃舊服無忝祖考前之人既以忠實勤勞覆幬其後嗣凡茲食舊德而服先疇者其何以無隳厥緒書亦曰率乃祖考之攸行昭乃辟之有乂是則朕所厚望也夫眀史綱目序編年之書奚啻數十百家而必以朱子通鑑綱目為準通鑑綱目蓋祖述春秋之義雖取裁於司馬氏之書而眀天統正人紀昭監戒著幾微得春秋大居正之意雖司馬氏有不能窺其藩籬者其他蓋不必指數矣嘗謂讀書立言之士論世為難非如朱子具格致誠正之功眀治亂興衰之故其於筆削鮮有不任豫奪之私失褒貶之公者自綱目成而義指正大條理精密後儒有所依據踵而續之由宋迄元釐然方䇿至眀代君臣事迹編輯之難更倍於諸書蓋明史已成於百年之後而世變風漓記載失實若復遲待將何以繼續編而示來許爰命儒臣法朱子通鑑綱目義例增損編摩大書以提要分注以備言每一卷成呈覽朕於幾暇亦時御丹鉛為之參定雖於天人一貫之精微未之能盡而惟是謹嚴之義守而弗失簡正之旨志而必勉書既成羣臣舉唐太宗之事為言勉從其請而為之序云律吕正義後編序皇祖聖祖仁皇帝建中和之極通聲氣之元欽定律厯淵源一書審推步以眀象緯研數理以備成法至律吕正義凡所以定尺考度制器審音與夫五聲二變應和之原析其精微區其訛舛古樂之大義明而千古有定論今樂之至理具而千古有正聲誠所謂惟聖人能之者顧七政授時九章布算至今遵循罔斁而律吕尚未暇施行太常之司和聲之署習其器而不能究其所以然遂并其所習者而失之襲謬承訛不協不度篇章音節非重為釐正不可和碩莊親王親承皇祖指授貫徹樂義尚書張照研窮律本博習往訓因命協同考正朕親加釐定為器為音為宫為調聲之髙下節奏之短長分刌而節比之合則仍其故不合則易其辭更其調或出自臣工撰述或出自幾暇親裁必考義理之原究制作之本夫而後郊廟所陳朝會燕饗所奏律吕各得其宜歌奏不淆其序八音克諧無相奪倫矣爰詮次成編俾垂永久更參稽前代因革損益之異為樂器考樂制考樂章考度量權衡考以備律吕之條貫復推闡為樂問三十五篇以申眀其旨趣於是而聖祖之所為審音定樂制器協均者一一施諸實用自漢魏以迄元眀是非得失之故瞭然可述名之曰後編者實以徵皇祖天縱聖神通極造化千古作者無能出其範圍亦無能窺其涯涘至於繼述先緒則在我後人益亹焉而弗敢忘新刻稽古齋文集序吾弟和碩和親王所著序論詩賦雜文曰稽古齋文集者凡若干卷編次於雍正八年秋越今年夏將以授梓來請豫書舊所為序辨諸卷首蓋去作序時忽忽十有七年矣豫與王幼同學同課習為詩古文詞當是時侍奉皇考膝下優遊書府日寢饋於經史文字中世網塵務毫髮不以嬰其心吾兩人者相觀以善交相勉相得無間如是者垂二十年天倫之樂無過於是集中所載大都至性所呈流溢豪素之表讀其辭可想見其為人也顧豫與王同時訂定詩文豫以乾隆元年勉從內廷諸臣之請刋布樂善堂文集迄今十有一年王始出是編命梓其遲回慎重不自滿假謙德雅懷足為師法是則豫之所深愧而嘉歎為不可及者夫抑豫重有感者豫自踐阼以來萬幾在御惟日兢兢馭朽臨淵未足為喻雖結習未忘時亦寄懷翰墨求如曩時之暢情専意上下古今流連陶泳其為樂既不可復得而王亦典旗務領內府亮采有邦非復書齋稽古之舊娛意斯文者蓋亦希矣豫每循覽舊作俯仰疇昔未嘗不為之撫卷三歎故於王之來請非僅僅重録原序所可盡其意輒復為之序如此王之年日增德日進文日多異時有二集三集者出豫當以是為例一一為王序之惇敘殿柏梁體聨句詩序乾隆丙寅秋八月式宴王公宗室於瀛臺之惇敘殿法皇祖也惟時朕諸叔父列王爵者四人皇弟封王者二人皇子三人宗室王公有爵者三十二人念我羣從子姪孫姓之同出自皇祖者或俟封或爵不至與宴之列十年以來未舉和會之典親親之誼踈焉則亦命入今日之座凡六十有二人其以事故是日未至者復五十餘人於戲自黃虞以來有大德者之得其位得其祿得其名夀如我皇祖者其誰耶即子姓之繁衍雖文王不得尚之使目前之振振揖揖我皇祖皇考式臨式憑豫與諸弟兄子姪孫姓稱觴獻夀於其間其愈悅鼓舞又當何如歡極而戚固情之所必至也然今日之宴會我皇祖皇考實式臨之實式憑之諸伯叔父自當以豫言為不謬也則又灑然以怡焉昔漢武帝柏梁之宴同姓者惟梁王武及宗正安國而已其餘皆羣臣然尚以此留詩唐明皇改集仙殿為集賢籲俊之義尚矣而周親未與亦闕典也朕今易崇雅為惇敘以紀今日之事復倡為首句以俟衆作之成凡今茲之掞藻得句者皆我皇祖皇考遺教之所垂也又何必舉金谷之例乎瀛臺賜宴聨句詩序稽古虞廷卿雲有什亦越周廟湛露升歌股肱之義斯眀上下之情攸暢胥任亮采惠疇之寄應同先憂後樂之心故以式宴陳詩必有取爾揚言拜手豈徒然哉嵗在攝提月維夷則披雄風於閶闔揚皓日於蓬萊慶叶西成感圓穹之厚賜筵開上苑仰聖祖之徽猷蘭沼澄而鏡影開楓林踈而黛光罨蘆藏回雁無煩寄塞上之書藻樂遊魚更致想渭濵之釣召儒雅而布席匪為賞花對景物以開樽多因登穀桂馥涵元殿甫度中秋之晨菊芳待月軒預借重陽之會園臨豐澤麟鳯紛來院賞淑清魚龍曼衍於是庖人設宜涼之饌常侍頒授衣之緋藻思構而艷吐筆花繪景呈而香霏墨雨三爵無限尚餘恭儉之儀一日追歡敢忘惕乾之警千言成序自愧無文七字導吟共成全首御製文初集卷十
