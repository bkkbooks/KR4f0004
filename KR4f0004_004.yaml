body:
  text: 記皇考世宗憲皇帝恩賜御書記乾隆元年丙辰恭送皇考梓宫自泰陵回忽忽若有失也乃開琳笥啓錦囊展向日所賜手迹敬觀之慰與悲俱來瞻與否罔措爰拜手稽首而為之記曰惟我皇考世宗憲皇帝本天亶資懋日新學養潛朱邸三十餘年朝夕書史自娛每當明窗淨几輒弄翰作書凡晉唐宋元諸名家迹罔不心摹力追實集古今書法之大成較之漢帝唐宗徑庭過之逮臨御區宇勵精圖治自朝至于日中昃不暇時親筆墨然間一臨池而翔鸞翥鳳之竒印泥畫沙之妙薈萃行間宏璧天球無足為重也臣承顔侍膝猥被寵光迄今霜露屢易龍髯莫挽墨瀋猶新每一啓緘肅容仰閲輒嗚咽流涕而不能自已記有之父沒而不能讀父之書手澤存焉爾矧我皇考拂素飛毫駕顔淩栁俾豫小子獲瞻天藻之光華兼誦宸章之美富興思手澤視古人所不能讀者有加焉其能弗愴然於懷而翹然思屢覩耶圓明園後記昔我皇考因皇祖之賜園修而葺之略具朝署之規以乘時行令布政親賢而軒墀亭榭凸山凹池之紛列於後者不尚其華尚其朴不稱其富稱其幽樂蕃植則有灌木叢花怒生笑迎也驗農桑則有田廬蔬圃量雨較晴也松風水月入襟懷而妙道自生也細旃廣厦時接儒臣研經史以淑情也或怡悅於斯或歌詠於斯或惕息於斯我皇考之先憂後樂一皇祖之先憂後樂周宇物而圓明也圓明之義蓋君子之時中也皇祖以是名賜皇考皇考敬受之而身心以勗户牖以銘也不求自安而期萬方之寧謐不圖自逸而冀百族之恬熙則又我皇考綏履垂裕於無窮也豫小子敬奉先帝宫室苑囿常恐貽羞敢有所增益是以踐阼後所司以建園請卻之既釋服爰仍皇考之舊園而居焉夫帝王臨朝視政之暇必有遊觀曠覽之地然得其宜適以養性而陶情失其宜適以玩物而喪志宮室服御竒技玩好之念切則親賢納諫勤政愛民之念踈矣其害可勝言哉我皇考未就暢春園而居者以有此圓明園也而不斫不雕一皇祖淳朴之心然規模之宏敞邱壑之幽深風土草木之清佳髙樓邃室之具備亦可稱觀止實天寶地靈之區帝王豫遊之地無以踰此後世子孫必不舍此而重費民力以創建苑囿斯則深契朕法皇考勤儉之心以為心矣藉曰祖考所居不忍居也則宫禁又當何如晉張老之善頌甚可味也若夫建園之始末聖人對時育物修文崇武煦萬彚保太和期躋斯世於春臺遊斯人於樂國之意則已具皇考之前記豫小子何能贅一辭焉遊盤山記連太行拱神京放碣石距滄溟走薊野枕長城是為盤山蓋冀州之天作俯臨衆壑如星拱北而莫敢與爭者也昔魏田疇隱居於此故名田盤或曰古有田盤先生自齊來棲止焉地僻而山秀樹密而谷深韓昌黎文所稱太行之陽有盤谷者無從考其非是而其為隱者之所盤旋則一也山亦有盤谷寺自唐寶積開堂代有名宿憨山拙庵後先輝映為是山佳話然吾儒木石居而鹿豕遊者田疇之後無聞焉四顧梵宇精藍依山隱谷鏤峯磨石刻畫天真而乏栁州西山之文杜陵北征之作嗚呼是亦可慨也已乾隆七年秋因謁陵回鑾便往遊之斥警蹕減儀從輕輿朝陟搴蘿扳磴曉嵐豁開泉白山青颯然林空鬱然松翠於是停蓋駐轡怡情縱目者久之既而行漏催吟興盡夕陽在山金吾整駕雖命省騶從而近御執事者汗雨揮而塵煙騰向誚隱者之絶少翻疑隱者之避而逺去耳乃知千乘萬騎不可以遊山偶一過之山靈將毋笑其不韻也耶三希堂記內府祕笈王羲之快雪帖王獻之中秋帖近又得王珣伯逺帖皆希世之珍也因就養心殿溫室易其名曰三希堂以藏之夫人生千載之下而考古論世於千載之上嘉言善行之觸於目而會於心者未嘗不慨然增慕思與其人揖讓進退於其間羲之清風峻節固足尚即獻之亦右軍之令子也而王珣史稱其整頽振靡以廉恥自許彼三人者同族同時為江左風流冠冕今其墨迹經數千百年治亂興衰存亡離合之餘適然薈萃於一堂雖豐城之劍合浦之珠無以踰此子墨有靈能不暢然蹈抃而愈快也耶然吾之以三希名堂者亦非盡為藏帖也昔聞之蔡先生名其堂曰二希其言曰士希賢賢希聖聖希天或者謂余不敢希天余之意非若是也常慕希文希元之為人故曰二希余嘗為之記矣但先生所云非不敢希天之意則引而未發豫惟周子所云固一貫之道夫人之所當勉者也若必士且希賢既賢而後希聖已聖而後希天則是教人自畫終無可至聖賢之時也孟子曰盡其心者知其性也知其性則知天矣人人有盡心知性之責則人人有希聖希天之道此或先生所云非不敢希天之意乎希希文希元而命之曰二希古人託興名物以識弗忘之意也則吾今日之名此堂謂之為希賢希聖希天之意可慕聞之先生之二希而欲希聞之之希亦可即謂之王氏之帖誠三希也亦可若夫王氏之書法吾又何能贊一辭哉國朝傳寶記國朝受天命采古制為璽掌以宫殿監正襲以重盝承以髤几設交泰殿中以次左右列當用則內閣請而用之其質有玉有金有栴檀香木玉之品有白有青有碧紐有交龍有蟠龍蹲龍其文自太宗文皇帝以前專用國書既乃兼用古篆其大小自方六寸至二寸一分不一嘗考大清會典載御寶二十有九今交泰殿所貯三十有九會典又云宫內收貯者六內庫收貯者二十有三今則皆貯交泰殿數與地皆失實至謂皇帝奉天之寶即傳國璽兩郊大祀及聖節宫中告天青詞用之此語尤誕謬大祀遵古禮用祝版署名而不用寶聖節宫中未嘗有告天事或道籙祝釐時一行之亦不過偶存其教耳未嘗命文臣為青詞亦未嘗用寶且此璽孰非世世傳守而專以一寶為傳國璽亦不經蓋緣修會典諸臣無宿學卓識復未曽請旨取裁只沿明時內監所書册檔承訛襲謬遂至於此甚矣紀載之難也且會典所不載者復有受命于天既夀永昌一璽不知何時附藏殿內反置之正中按其詞雖類古所傳秦璽而篆法拙俗非李斯蟲鳥之舊明甚獨玉質瑩潔如截肪方得黍尺四寸四分厚得方之三以為良玉不易得則信矣若論寶無問非秦璽即真秦璽亦何足貴乾隆三年髙斌督河時奏進屬員濬寶應河所得玉璽古澤可愛文與輟耕録載蔡仲平本頗合朕謂此好事者仿刻所為貯之别殿視為玩好舊器而已夫秦璽煨燼古人論之詳矣即使尚存政斯之物何得與本朝傳寶同貯於義未當又雍正年故大學士髙其位進未刻碧玉寶一文未刻則未成為寶而與諸寶同貯亦未當朕嘗論之君人者在德不在寶寶雖重一器耳明等威徴信守與車旗章服何異德之不足則山河之險土宇之富拱手而授之他人未有徒恃此區區尺璧足以自固者誠能勤修令德繫屬人心則言傳號渙萬里奔走珍非和璧制不龍螭篆不斯籀孰敢不敬信承奉尊為神明故寶器非寶寶於有德古有得前代符寶君臣動色矜耀侈為瑞貺者我太宗文皇帝時獲蒙古所傳元帝國寶容而納之初不藉以為受命之符由今思之文皇帝之臣服函夏垂統萬世在德耶在寶耶不待智者而知之矣善夫唐梁肅之言曰鼎之輕重璽之去來視德之髙下位之安危然則人君承祖宗付畀思以永膺斯寶引而勿替其非什襲固守之謂謂夫日新厥德居安慮危凝受皇天大寶命則德足重寶而寶以愈重璽玉自古無定數今交泰殿所貯歷年既久紀載失真且有重復者爰加考正排次定為二十有五以符天數并著成譜而敘其大指如此靜宜園記乾隆乙丑秋七月始廓香山之郛剃榛莽剔瓦礫即舊行宫之基葺垣築室佛殿琳宫參錯相望而峯頭嶺腹凡可以占山川之秀供攬結之竒者為亭為軒為廬為廣為舫室為蝸寮自四柱以至數楹添置若干區越明年丙寅春三月而園成非創也蓋因也昔我皇祖於西山名勝古剎無不曠覽遊觀興至則吟賞託懷草木為之含輝巖谷因而增色恐僕役侍從之臣或有所勞也率建行宫數宇於佛殿側無丹雘之飾質明而往信宿而歸牧圉不煩如岫雲皇姑香山者皆是而惟香山去圓明園十餘里而近乾隆癸亥余始往遊而樂之自是之後或值幾暇輒命駕焉蓋山水之樂不能忘於懷而左右侍御者之揮雨汗而冒風塵亦可厪也於是乎就皇祖之行宫式葺式營肯堂肯構朴儉是崇志則先也動靜有養體智仁也名曰靜宜本周子之意或有合於先天也殿曰勤政朝夕是臨與羣臣咨政要而籌民瘼如圎明園也有憩息之樂省往來之勞以恤下人也山居望逺村平疇耕者耘者饁者穫者斂者厯厯在目杏花菖葉足以驗時令而備農經也若夫巖巒之怪特林薄之華滋足天成而鮮人力信乎造物靈奧而有待於靜者之自得耶凡為景二十有八各見於小記而系之詩靜寄山莊十六景記塞外之山岡巒渾噩堂阜連延以雄峻勝塞內之山峯巖峭拔崜嶬崱屴以竒秀勝造物之靈有獨鍾南北之分鮮兼美也而惟田盤自太行而來塞垣依此以築故介在南北之間兼收雄秀之粹卓為造物奧區焉乾隆壬戌夤緣往一遊自是山川之美不能恝置然朝往暮歸僕從侍御之臣不免於勞乃發內帑建山莊於山之陽買地繚垣據景搆舍髙因迥有僻以幽探藻繢不施亭臺間出園之內得景八園之外標舊迹與諸寺復得景八合為山莊十六景而名之曰靜寄夫靜者山之體其寄於天地也恆得常焉人生而靜則靜亦人之體也而恆不得其常者則其寄蓋不如山也余之以是取名其亦所以自警也若夫山莊之號則法皇祖避暑山莊之例第其去京師較避暑近十之五為幅員較避暑僅十之三尚朴素屏文繡適可而止容膝亦安守舊規而勉欽承讀是記者尚知吾繩武之意而所重固不在卷阿之遊歌也歟麥莊橋記水之有伏脈者其流必長亦如人之有藴藉者其德業必廣濟水三伏三見黃河亦三伏三見此其大者矣如京師之玉泉滙而為西湖引而為通惠由是達直沽而放渤海人但知其源出玉泉山如志所云巨穴噴沸隨地皆泉而已而不知其會西山諸泉之伏流蓄極湓涌至是始見故其源不竭而流愈長元史所載通惠河引白浮甕山諸泉者今不可考以今運河論之東雉西勾如俗所稱萬泉莊其地者其水皆不可資所資者惟玉泉一流耳蓋西山碧雲香山諸寺皆有名泉其源甚壯以數十計然惟曲注於招提精藍之內一出山則伏流而不見矣玉泉地就夷曠乃騰迸而出瀦為一湖康熙年間依金章宗之舊地建園於山之陽名曰靜明園之西乳竇淙淙如趵突者為玉泉總脈其餘氿然而泛濫於湖者不可勝數詩人比之垂虹之瀑及所云疏龍首而出之者皆妄也東流而為西湖則以居京師之西又明時有西湖景之稱乃假借夫餘杭而倡説於璫豎耳折而南徑長春麥莊二橋夾岸梵宇頗麗其大者為廣仁昌運萬夀萬夀之左即為廣源閘於是水有髙下之分矣自閘東西行經白石髙梁二橋遂至城之西北隅分為二一由西直門外繞而南東又東北以會於大通橋一由德勝門外繞而東南又東行以會於大通橋其自德勝門西分流以入太平橋者為積水潭為太液池分合有數道並環繞紫禁由東南御河橋穿內城以出以會西來之水自大通橋以下至通州為閘五為橋三夫東南轉漕國家之大計也使由通而車載背負以達於都門將不勝其勞則玉泉之利豈非天地鍾靈神京發皇之禎符哉青龍閘非盛漲不啓奉宸苑司其事蓋如尾閭之泄云爾麥莊橋為城外適中之地故為之記而勒碑於是南薰殿奉藏圖像記內府藏列代帝后圖像傳自勝國典在有司嵗以盛夏曝而庋之扃鐍惟謹朕於幾暇省閲內庫積儲敬得展觀則裝池之以嵗久渝脫者已多矣因思我朝崇禮前代建廟京師春秋禋享且為之護陵寢禁樵蘇聖賢名臣咸秩典祀凡以篤髙山景行之思抒望古興懷之慕而况流傳有自縑素猶新日角珠庭冕旒秀發德容可挹英表如生其奚忍夷諸繪事供几席珍鑒者比爰命工重加裝潢自太皥伏羲氏而下帝后圖像為軸者六十有八為册者七為卷者三先聖名賢圖册五舉襲以綈錦尊藏於紫禁西南之南薰殿大學士會同領內務府王大臣等詳定位置謹其籍識次第甲乙秩然有章明諸帝玉册廟中所陳當時寶為宗器者也今貯工部外庫慮其不免散軼附藏殿之西室俾虔視焉既竣事因備紀之勒石前榮以示帝統相承道脈斯在朕之隨在盡其誠敬不敢苟且褻越有如此圖像自唐宋以下缺十之二三溯而上之存者僅矣時久而易晦幸其存也可弗保持使可及久歟缺者弗復追補逺無徴也懼失真也以致慎也御製文初集卷四
