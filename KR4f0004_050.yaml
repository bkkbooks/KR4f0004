front:
  text: 欽定四庫全書御製文二集巻之十六
  hash: sha256:be0487c360c0eb81da2258a0286e0616868d2fd562e45f515163087dbd32bde1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_050-1a, image: WYG1301/WYG1301-0381c.png}
body:
  text: 序大清㑹典序自郊廟朝廷放之千百國徼荒服屬之倫而莫之偝自創業守文繩之億萬葉矩矱訓行之久而勿之渝非㑹典奚由哉顧維聖作明述政府粲陳其間有因者即不能無損與益而要之悉損益以善厥因則方策所麗乃一成不易之書非閲世逓輯之書也國家膺大寳命列聖肇興禮樂明備皇袓聖祖仁皇帝康熙二十三年始勑釐定㑹典則以時當大業甫成實永肩我太祖太宗世祖三朝之統緒不可以無述而述固兼作矣皇考世宗憲皇帝雍正五年申諭閣臣敬奉成編攷衷條系則以累洽重熙更兼皇祖景祚延洪化成久道不可以無述而述且未遑言作矣暨朕寅紹丕基祗祗翼翼壹惟法祖宗之法心祖宗之心發冊披圗㒺或偭隃尺寸㑹西陲大功告蕆幸纉成祖宗欲竟之志事而凡職方官制郡縣營戍屯堡覲饗貢賦錢幣諸大政於六曹庻司之掌無所不𨽻且我皇考勵精圖治十三年之間立綱陳紀復不可無紀以垂永世爰咨館局次第具草乙夜手批是正而諗之曰嚮者發凡排篹率用原議舊儀連篇並載是典與例無辨也夫例可通典不可變今将援典而傳例後或摭例以殽典其可乎於是區㑹典則例各為之部而輔以行諸臣皆謂若綱在綱咸正無缺而朕弗敢專也盖此日所輯之㑹典猶是我皇祖皇考所輯之㑹典而俛焉從事於兹者豈真義取述而不作云爾哉良以抱不得不述之深𠂻更推明不容輕述之微指稽典者當瞭然知宰世馭物所由來無由疑每朝迭脩為故事耳若夫治法心法表裏兼賅精之而貫徹天人擴之而範圍今古如往牒所稱惟睢麟足以行官禮者是又數典之原嘉㑹之本也朕其敢不懋諸敢不與子孫臣民交朂諸御製文初集序于敏中排次数年來所謂御製文初集成而以序為請夫序者所以叙陳經㫖故孔子作書序子夏作詩序未聞自序其文也自序其文盖漢唐以後之事乎為天子者所以脩已治人必當以三代以上自朂豈可以漢唐以後自畫此正務也至於文乃其餘事耳然亦豈可以漢唐以後為法哉如是則敏中之請序可以不允既而思之向之樂善堂全集及御製詩初集不既有序乎於凡惕已敬天本身徴民憫農桑騐今昔盖已言之悉矣例以向不可以不序而以向之言之悉則又可以不必序矣雖然不欲以文人學士争長亦向之本意也則今之裒然成集者與向之言為合乎為否乎以之自問又不能措一辭云通鑑輯覽序編年之書莫備於皇祖御批之資治通鑑綱目盖是書集三編為一部自三皇以至元末明初振綱挈目謹予嚴奪足以昭萬世法戒為人君者不可不日手其帙而心其義也然皇祖雖嘗抉精㣲徴辭㫖著論百餘首亦惟析疑正陋垂敎後世耳於其書則一仍厥舊無所筆削也故全書篇幅雖多而議論仍什倍於事實即如前編之中縂論史論音釋辨疑考証紛不一家已上縂論等五種襍引諸家之説或稱胡氏宏胡氏一桂熊氏禾並無専家主名且有自稱愚按者考前編第一巻首載外紀乃元陳桱編次則各種所引皆桱采集無疑正編之中凡例朱子著發明尹起莘著書法劉友益著考異汪克寛著集覽王幼學著考證徐昭文著正誤陳濟著質實馮智舒著濫觴益甚至於續編之作成於有明諸臣其時周禮沿尹起莘例作發明而廣義則出於張時泰效劉友益書法而為之者夫發明書法其於歷朝興革正統偏安之際已不能得執中之論而况效而為之者哉且以本朝之臣而紀其開國之事自不能不右本朝而左勝國此亦理之常也况三編中嬗代崛起之際稱太祖而繋以我者不一而足亦非體例也故命儒臣纂歷代通鑑輯覽一書盡去歷朝臣各私其君之習而歸之正自隆古以至本朝四千五百五十九年事實編為一部全書於凢正統偏安天命人心繫屬存亡必公必平惟嚴惟敬而無所容心曲徇於其間觀是書者凛天命之無常知統系之應守則所以教萬世之為君者即所以敎萬世之為臣者也書中批論一依皇祖之例自述所見據事以書者十之三儒臣擬批者十之七而經筆削塗乙者七之五即用其語弗㸃竄者亦七之二云平定準噶爾方畧序平定準噶爾方畧書成纂言者以序請夫序者所以叙其事之本末而因文以悉其肯綮也事之本末則方畧三編盡之矣太學之碑磨崖之銘西師之詩開惑之論亦既悉其肯綮矣如是則可以不煩重序雖然五年之間大勲兩集又十年而後書成是不可以無序且朔漠金川前例具在也乃允其請而為之序曰功不可以虚成名不可以偽立幸不可以屡徼志不可以少侈夫用兵中國自古為難而况踰沙漠天山萬里而遙乎旰斯宵斯劼劬以至有成功非虚而名非偽是僅可免後人之指摘耳若夫揚揚自詡以為誠若能撡必勝之劵則不惟致物議而貽口實於心亦誠恧若也藉衆之力幸底於績然我士卒之攖鋒鏑者不為少矣故此書之輯率因忠魂義魄不忍令其冺沒無聞具載以誌之而猶不在於擴土開疆之為也既平準噶爾延及回部悉主悉臣耕作賦役興焉此亦一再徼幸矣而猶不自知足欲屢試我鋭而别有圗是志侈也志侈者不祥故近日撤征緬之㫖甫降而彼適投誠我兵振旅以還告成事焉此非盈虚消息之理㨗若響應乎是則此序之作不惟廻思而若有驚亦且永圖而懐有戒也増訂清文鑑序稽古語言文字之傳不能不随方随時代為變易将欲觀其㑹通惟音義兩端為之樞筦獨是施之繙繹則以字之不得其音而舛者亦以字之強索其義而逾舛嚮評通鑑輯覽糾前史譯本失真則有校正金元國語解之命及製西域同文志序諸作復連類而引伸之兹増訂清文鑑告竣並為鬯厥指以詔來者夫字之不得其音者如明安之為猛安穆昆之為謀克猶云對字未叶耳甚者乃因字法以寓褒譏如金史書烏珠為兀术貝勒為勃極烈或為孛堇者是也具同一䝉古人名於膺世爵者則書羅卜蔵於𨽻讞牘者則書羅卜贓沿流至今未改不綦誕乎至以字文強索其義者如䝉古語鄂博特堆砌之統詞而曲説者以鄂為嵯峨之峨博為軷祭之軷自詡語出經傳究之求其義而不得遂并其音而失之不愈盭乎盖對音本無義也即如國語稱天曰阿卜喀䝉古語則曰騰格里西畨語則曰那木喀回語則曰阿思滿以漢文求之皆無義之可索且以漢文天字設用國書合音則字當云梯煙夫梯煙寧有義乎豈梯必梯磴之梯而煙必煙霄之煙乎穿鑿者又将謬解為梯煙而上為天之義可乎盖嘗推而論之前代之主其不暇兼治漢文者乃轉為漢文所牽掣而不克博訂方言之異精研聲律之兀譬如以水濟水誰能食之非虚語也洪惟皇祖聖祖仁皇帝神靈天亶制度考文於列祖剏垂國書廣大精微貫丳䀭洽御定清文鑑全圅折𠂻大備惟當時編纂諸臣依國語分類排纂未列三合切音漢字注中間採經傳成語以佐訓詁日久易啟傅㑹穿鑿之習朕志切紹聞指授舘臣詳加㩁覈每門首著國語旁附漢字對音或一字或二合或三合切音俾等量者不爽苖髪而字之淆於不得其音者尠矣詮釋具以日用常言期人共曉其俗解摭拾陳編章句及以之乎者也為文者悉汰之而字之汨於強索其義者抑又尠矣綜計續入新定國語五千餘句若古官名冠服器用鳥獸花果等有禆參考者别為補編系之巻末庻㡬嘉與我子孫臣民可以同文可以傳世而行逺是為序平定兩金川戰圗詩序丙戌戰圗紀西師事而有補詠六詩戊子戰圖紀烏什事亦有補詠六詩兹繪平定兩金川戰圗凢十六幀則皆歷年因事成什無煩補為者也夫戰圗之不可無以将士盡忠敵愾宣猷立勲不可忘其勞也而一而再再而三雖曰應天順人出乎不得已非窮兵黷武之為誰其信之曹松之言非為将者之過皆予一人之愆幸而集事庻免勞而無功之譏耳然圗以旌其勇詩以釋其詳觀其圗以繹其詩則予所以夙夜勤劬運籌狎至不啻與諸將士共折衝於矢石金鼓之間者畢見於是或少謝但知已逸而不知人勞是則予所深企而猶未可必者也予之子孫其尚以予之所為為戒更當以予之所為為勉如其不能則莫如息事寕人如漢文帝宋仁宗之自守可耳
