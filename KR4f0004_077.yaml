  text: 欽定四庫全書御製文二集巻四十三
  hash: sha256:1257c8973c711c97b225bdb9b9fd102b34b9ceb60bae1ac05e23c868115713cd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_077-1a, image: WYG1301/WYG1301-0546a.png}
body:
  text: 贊平定金川五十功臣像贊有序金川既平定圖功臣像於紫光閣序而贊之一依伊犁回部之例其故其義前序言之詳矣兹復何言而不能無言者誠以諸臣宣力攄猷或定筞於樽俎之間或衝堅于石矢之隊且捐軀盡節者指不勝屈寧忍令冺沒無聞而弗夀厥儀表彰厥名聲者㢤夫用兵盖難言之矣無應機之謀乏識人之鑒而徒俾推轂是藉㓂兵而齎盜糧也温福之僨車朕深引以為愧而阿桂終能集事朕又畧因觧嘲至於午夜廢寢當食忘餐吁亦勞矣夫無此勞而徒曰有兵有将汝其為我征伐則真窮兵黷武而付其天下之成敗於不問者朕弗為也觀此序者或諒朕非窮兵黷武之為幸何如之冀何如之而朕之子孫當凛佳兵之誡苟不得已而用之必深體此序之意弗以冒昧行焉則我大清億萬年無疆之休基于是矣前圖逮今甫十六載事故過去者即十分之九為之愴然而後生疊奮繼前人之光為國家之用林林源源以出因又為之慶矣其兩被圖形如阿桂之倫豈非徳業之光輝人臣之厚幸而較衛霍英鄂之流更為榮遇超越乎定西将軍一等誠謀英勇公協辦大學士吏部尚書阿桂西師㕘贊經歴多年兹為巨擘掄掌兵權西師之役阿桂為㕘贊大臣著有勞績因其嫻習軍務特授為定西将軍統兵勦兩金川阿桂承命以来籌畫盡心不憚艱險用䏻掃蕩賊巢俘擒逆黨大勲克集實為首功錫爵圖形優加章服懋昭酬庸之典誠而有謀英弗恃勇集衆出竒成勲克鞏定邉右副将軍一等果毅繼勇公加一等子户部尚書豐昇額宜喜弗動癸巳夏因促浸賊人勾通趲拉降畨潜出滋擾時豐㫒額駐兵宜喜諭令就近赴大板昭堵勦豐昇額得㫖時已知有木果木之事又未得阿桂軍營信息恐将綽斯甲布一路兵力分單徒去無益竟未移兵前往奏至嘉其有識特降㫖奬勵之定見識機後副西路親勵戎衣遜克爾宗督兵進取國之藎臣勇繼乃祖遜克爾宗地最險要且在我軍之後豐昇額督兵進攻或斫寨而入或梯牆而進遂爾得碉殱賊嘉其勇敢無愧乃祖巴圖魯公額亦都之風因於所襲公爵加繼勇二字以旌之定邉右副将軍一等襄勇伯成都将軍明亮獨統一路頗有斬獲姻戚少年世承恩澤明亮為親孝賢皇后姪察其少年誠篤俾習軍旅命為副将軍在南路綂兵隨即攻取馬尼繼復移兵襲取宜喜山梁遂于北路進勦尋克日旁沙爾尼一帯亦屢著功績建績抒忱是用褒嘉俾司将印永靖筰巴兩金川既平於其地設鎮安營駐守因授明亮為成都将軍以控馭之大學士舒赫徳土爾扈特安集邉城辛夘夏土爾扈特汗渥巴錫等率全部歸順特調舒赫徳為伊犁将軍經理其事安措極為妥協旋授為大學士甲午秋命統兵勦捕山東逆匪王倫甫六日而蔵事命入綸閣速定臨清金川之役未悉端委書㫖承行時亦贊理大學士一等輕車都尉于敏中内地土司事須漢字國家用兵一切機宜率以清字書㫖兹金川乃内地土司軍書徃来多用漢字五年以来于敏中始終其事禀受機宜承㫖書諭頗著勤勞既加恩賞以世職並賜雙眼孔雀翎圖形紫光閣尤儒臣従来未有之榮遇自始至終勤勞弗替相機擬諭厥功茂焉賜翎寫象儒臣孰肩兵部尚書一等忠勇公和碩額駙福隆安父定復叛子嘗愧之戊辰金川之役大學士傳恒前徃經畧時以莎羅奔郎卡畏罪投誠遂奏聞受降未十年郎卡即滋擾鄰封其子索諾木益偝恩反噬實深悔前此之姑息非一舉而殄滅之不能永除後患福隆安因此屢懇赴軍營自効皆未允所請留之禁近俾習贊軍務是用稽首躬請出師留於左右俾習規畫頗有嘉謀協予廣益原㕘贊大臣固倫額駙贈和碩親王色布騰巴爾珠爾伊犁宣力屢立戰功金川㕘贊仍勵勇忠抱病軍營弗令奏聞惜竟不起未觀成勲㕘贊大臣一等超勇侯都統海蘭察射巴雅爾超授侍衛洊至都統㕘畫軍計堅碉險砦無不先登勇而有謀封侯實應㕘贊大臣一等嫻勇男䕶軍統領副都統額森特虎鎗隨圍覺與衆殊命徃勦賊攘臂以愉閲歴既多遂㕘謀議獨當一面亦復集事㕘贊大臣䕶軍統領舒常八旗子弟總屬世臣菁莪造就命以従軍勇弗搴旗智堪入幕北路贊機時資其畧領隊大臣一等承恩武勇公加一等男都統奎林兄終王事至今為恨奎林乃發勇公明瑞親弟皆兵孝賢皇后親姪明瑞為將軍督征勦緬匪陣亡朕毎以為恨不忍更命徙軍乃奎林力請不已因許之奮勇屢著功績屢請効力披堅斫陣心源落落膽氣堂堂世家英器是予所臧領隊大臣三等果勇侯都統和隆武襲父䘏職和隆武之父将軍和起征勦準噶爾時在闢展為莽噶里克等所害議䘏予以世襲子爵和隆武襲之此次征勦金川不意其勇敢超衆若此因晋封侯爵少年老成囊錐脱頴竟善用兵畧曰旁寨獨擅偉勲楚材繼出既憐以欣領隊大臣内大臣都統户部侍郎三等嘉勇男福康安代兄以徃繼父而奮福康安福隆安之弟也矜許厪勵王臣之藎登碉奪砦那須䝉甲嘉勇錫名世傳勲業領隊大臣副都統三等奮勇男普爾普父是日磾子非弄兒普爾普之父巴圖濟爾噶爾以都爾伯特部宰桑来降隨征回部於和闐立功仕至都統普爾普臨陣奮勇頗䏻繼其父志因特錫男爵命徃勦賊盡力無遺金戈鉄衣氷山雪窖能入能出敵不敢校領隊大臣荆州将軍輔國公興兆憶當國初創業開基宗室王公宣力率師承平襲慶安享榮華董軍建勲斯為可嘉原㕘贊大臣西安提督哈國興中土回人性多拳勇哈其大族毎出将種向畧趲拉屢舉險要中道病殂成功未告領隊大臣西安提督馬彪西師効勇早著旂常命勦逆畨盡力以蘉搘橋渡河奪卡據水用濟我軍井井有理原領隊大臣江南提督馬全挾翼雖英御湏造父設非其人良材徒苦陷木果木将軍僨轅温福頓兵昔嶺株守不進以所統二萬衆散布各卡遂以分而見少致為賊人所輕趲拉降畨七圖甲噶爾思甲布等約促浸許為内應賊衆各由間道潜出擾温福後路漸逼木果木軍營緑旗懦卒聞風驚潰温福率十餘人突出遇賊被害馬全在後抵禦遂殁於陣英材為庸帥所誤雖加恩贈䘏至今惜之殿後捐軀愧惜難言領隊大臣廣西提督書麟本非習戰遇戰即奮恐孤父名書麟乃大學士髙晉之子偉㢤後進功成事定提督鬱林攻則壮志守則小心領隊大臣副都統綽克托巴圖魯三保本射生手獸無跳走以之射賊探嚢物取冒險屢進志篤且純受創獨重禄養終身三保在軍營毎戰勇徃不避矢石因攻甲槖賊寨右臂受鳥鎗傷甚劇乆治不瘥憐其臂已殘廢免令入直當差仍留副都統之任俾得禄以贍領隊大臣副都統法福里巴圖魯烏什哈達有足如鑷有手如翼削壁尖峯行無難色領隊奮勇屢克碉堅羌兒畏之若雀遇鸇領隊大臣副都統多布坦巴圖魯瑚尼爾圖木思工噶躍入賊碉督衆鞣膊勇不目逃巴占牽敵俾無遮􅓈畨人望之弗戰辟易領隊大臣副都統扎克博巴圖魯珠爾格徳奎林深入賊刄将及發矢斃之險中救急同心合力共集大勲寫圖旌壮惇史流芬領隊大臣副都統咱爾親巴圖魯阿爾都喀咱奎林及和隆武絶地被遮餘勇猶賈曰阿爾都據險牽賊二人乃出其功允特領隊大臣副都統阿爾杭阿巴圖魯阿爾薩朗跬歩皆山面前萬仭無著足處攀騰奮迅遂破扎古扎古即扎烏古急呼之則為兩字既翹且英人中獅子實稱其名阿爾薩朗國語謂獅子也領隊大臣副都統穆騰額巴圖魯舒亮率健鋭營訓練有素節制之師五歩六歩礌䃧叢中鼓勇身先勞而不伐是用稱賢原領隊大臣副都統銜納親巴圖魯科瑪堂堂之陣亦藉出竒潜行僻路附葛踔巇直越峯頂火攻石碉破二百寨色格功髙科瑪于沙壩山率兵潜行攀陟山頂為賊所阻即分兵搶拈色格落喀爾都等處抛入火彈燒賊寨二百餘問領隊大臣副都統銜扎濟克巴圖魯伊蘭保有賊必戰有戰必先率我勁旅攻其中堅志不顧身勇能知義噶占進棧丹格建幟原領隊大臣副都統銜扎爾丹巴圖魯佛倫泰功成一将那保無虞争前恥後舊風未渝當噶之戰直進身殞使我心惻優䘏惟允領隊大臣副都統三等信勇公富興信勇世家志不愧祖富興為信勇公費英東之曽孫以有足疾不䏻登陟攻戰而駐守要隘則甚得力徒以窳痿艱于歩武蠶叢鳥道登進則遲據險守要千軍不移領隊大臣副都統徳赫布賊之所恃據碉堅守我之所利拏柵進取知彼知已正以出竒􅌽隙攢射善手是資原領隊大臣副都統莽喀察索倫善射其中稱最西師建勲紫閣形繪逞其猿臂搜彼蟻封不虞創重歎惜何窮領隊大臣直𨽻天津鎮總兵噶布什海巴圖魯海禄資哩美諾皆樹竒績奪昆色爾攀枝援壁固資衆力率先必親事定酬庸命鎮天津領隊大臣貴州鎮逺鎮總兵僧格巴圖魯敖成甘涼宿将屢立戰功以其驍習俾伐蠻賨于巴布里攻其恃固乗雪㧞之有如李愬領隊大臣山西大同鎮總兵巴爾丹巴圖魯官達色連環火攻國之雄器率領得人無徃不利及至近碉斫門穴孔大呼直入嘉乃獨勇領隊大臣四川川北鎮總兵賽尚阿巴圖魯成徳沈舟側畔鼓棹為難受創復進其心審丹似若而人不勝屈指養育八旗報非虚飾叶領隊大臣陜西固原鎮總兵法福里巴圖魯圖欽保承平日久敢恃内安永憶文子厥有名言嘉我諸臣遇兵則奮竭力敵愾世承家訓原甘肅肅州鎮總兵札親巴圖魯曹順始由偏禆洊至總戎騎牆殺賊受傷捐躬賞延于世為之惜悼季世朱門歌舞以笑領隊大臣陜西興漢鎮總兵三等義烈公保寧父殁王事保寧之父納木札爾以晴逆將軍征勦回部於黒水陣亡䘏贈義烈公保寧襲爵因其力請出師遂允之在軍營屢著功績襲爵為公不忘忠藎力請従戎雖屬少年乃如宿將持重戒輕心精膽壮領隊大臣山西太原鎮總兵特成額誰謂世家而多紈絝後生可畏不忘祖父叶原特成額為果毅公筞楞之子其髙祖即巴圖魯公額亦都也是予所嘉是予所憐願予世臣綿此萬年原領隊大臣陜西延綏鎮總兵烏爾納平生若懦戰則倍勇雖屢受傷進不旋踵功成事定賊寨火延沒于弗值實可嗟焉将軍等既平促浸賊巢掃蕩數日後噶喇依寨内忽火起延及火藥局烏爾納督兵徃救不意藥轟石飛傷腦而殁為之悼惜因勅部照陣亡例議䘏原署福建建寧鎮總兵敦柱披堅破銳突将無前衆志成城而各力宣威震卭筰拉朽摧枯宜喜已克惜㢤捐軀頭等侍衛札卓穆巴巴圖魯額爾特七校䕶衛無殊衆人及至臨敵其膽包身地道深入木城超躍遂克勒圍厥功允卓頭等侍衛揚達克巴圖魯托爾托保毎戰俱前三遇三克勝彼忠嗣王耀武漠北漠北可馬此歩而攀氷巘萬仭所以為難二等侍衛拉布凱巴圖魯泰斐英阿一木曷支衆擎易舉嘉我諸臣心同力努人自為戰各有所成攻康薩爾直進賊營二等侍衛崇籛巴圖魯柏凌于戰可觀人之立志或挺而前或退而避受傷雖多其節弗渝如柏凌冬壮矣丈夫原二等侍衛額依巴爾巴圖魯達蘭泰或仰而攻或俯而壓仰以鷹抄俯如馬蹋么䯢迹遁鬼蜮魂銷追奔逐北處處功髙原二等侍衛善巴巴圖魯薩爾吉岱賊之長技在於善守反而用之拏柵進取滴博蓬婆威名逺服惜㢤陣亡於阿穰曲索倫佐領舒克丹巴圖魯特爾惇澈賊之所懼勁弓長箭飛鋒蝟集對則色變索倫㨗手射畨最多毎據要害其功弗磨貴州副將奢特陳巴圖魯興奎黷武豈願詰戎敢忘因弗得已曉夜傍徨良材總總為國宣猷寫圖表績永示千秋
