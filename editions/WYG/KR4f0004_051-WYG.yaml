  text: 欽定四庫全書御製文二集巻十七
  hash: sha256:d5798388ce57e4a4a5bc7a03e87209230b843b5563419927e6c6dcd3fb3c392e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_051-1a, image: WYG1301/WYG1301-0387a.png}
body:
  text: 序硯譜序向詠文房四事謂筆硯紙墨文房所必資也然筆最不耐久所云老不中書紙次之墨又次之惟硯為最耐久故自米芾李之彦輩率譜而藏之以為藝林佳話内府硯頗夥或傳自勝朝或弆自國初如晉玉蘭堂硯璧水暖硯久陳之乾清宫東西暖閣因思物繁地博散置多年不有以薈綜稡記或致遺佚失傳為可惜也因命内廷翰臣甄覈品次圖而譜之凡舊藏者若干枚散置者若干枚新獲者若干枚其棄置庫中為之剪拂刮磨鬱為竒品者又若干枚譜既成欲命于敏中擬四六引言以行之既思題句銘辭皆自作且六日而成四十首所為惜淪棄悟用人慎好惡戒玩物無不三致意焉則又不可以無文而不序其梗概也昔許採一文人耳藏硯㡬至百枚兹百年太平石渠天祿之府貯硯多至二百枚亦不為過而予以為已過者盖意有所好必有所繫若謂文房之資立言傳道有異他物之為嗟夫是予所以自解乎抑亦所以自訟乎滿珠䝉古漢字三合切音清文鑑序向既増訂清文鑑序而行之與夫穿鑿字法謬寓褒譏曲解方言傅㑹漢語一切務竒求勝亦既辨之詳矣兹三合切音清文鑑書成司事者以序為請夫既有前序則此可以不必重為然前書祇載國語漢語而未及䝉古此書乃並載䝉古語所為異於前書者是不可以不闡其義我國家自太祖太宗以來近邊諸䝉古部落久為世臣而至今則喀爾喀青海及準噶爾之四衛拉特前後歸順盖無一䝉古之非我臣矣諸部語言音韻剛柔雖畧殊而大段則一即國語雖與䝉古語異而亦有一二相同者朕即位初以為諸外藩嵗來朝不可不通其語遂習之不數年而畢能之至今則曲盡其道矣侵尋而至於唐古特語又侵尋而至於回語亦既習之亦既能之既可以為餘暇之消遣復足以聨中外之性情因悟天下之語萬殊天下之理則一無不戴天而履地無不是是而非非無不尊君上而孝父母無不賢賢人而惡小人彼其於語言文字中謬存我是彼非入者主之出者奴之不亦仰而唾空終於自汚其面哉故向有校正金元國語解之命及製西域同文志壹是義也雖然予以為亦無足深怪作金元史者之讕文何則彼一類之人尚有越人視秦人肥瘠之言而况非其類者乎又况彼實不解其語言音義乎則又安能保千秋萬世後不解此書者之不又将如作金元國史者之其人乎前書之序並命載於後庶㡬並觀以互相發明也平定兩金川方畧序前平定金川實祇受促浸一處之歸降後平定兩金川則併促浸儧拉兩處削平之而屯戍其地不讀前方畧不知予之撫順宥過之寛恵不讀後方畧不知予之保大經久之苦心兩金川之偝恩奢望屢赦屢叛與夫不得已用兵之原委亦既見之後告成太學之碑文矣兹方畧成而司事者以序請從其請是贅言不從其請是闕體以書之有弁詞蕆體例也夫示之義方之謂方定之智畧之謂畧有方無畧失之執有畧無方失之隨二者相需殷而相得彰且方有隅之義而象地畧有包之義而象天乾圓坤方隂静陽動即兵法實不出乎此要之本於敬而弗懈公而無私泰而不驕勤而非躁然後能賞罰明而進退當緩急應而機宜合運之九重之上示之絶域之遥忘憂不可掣肘益不可是必注精神於董事之諸臣而念辛苦於衝鋒之䇿士嗚呼定方畧豈易言而成方畧更難覩也今幸覩方畧之成庶乎五年忘餐廢寢之勞得以少慰而藉以解後世窮兵黷武之譏所為伐逆不伐順伐險不伐夷者或庶㡬乎熱河志序為各省之志書易為熱河之志書難彼其以漢人書内地事且各府州縣本有晉乗楚檮杌薈而輯之其易也不待燭照數計而龜卜也熱河之志則以闗外荒畧非内地而遼金元之史成於漢人之手所為如越人視秦人之肥瘠忽然故曰難夫遼金元非若唐宋之興於内地而據有之也又其臣雖有漢人通文墨者非若唐宋之始終一心於其主語言有所不解風尚有所不合且遼金元皆立國不久旋即遜出則所紀載欲其得中得實盖亦難矣夫遼金元之史紀内地而欲其得中得實尚且難之況紀邊闗以外荒畧之地乎其不能得中得實亦益明矣當今之時熱河之志不可不成者則以本朝荷天之寵百有餘年累洽重熈漢人已數世被覆載生育其語言風尚薫陶漸漬不可以遼金元之漢臣例之亦理之必然况我皇祖建山莊於此地非為一已豫逰實貽萬世之締構而顧可無書以垂永久乎山莊内本有温泉出而滙武列之水俗遂有熱河之稱兹雖為府為縣而仍以熱河稱之者存其朔便於衆也皇祖有詩云聚民至萬家盖篳路之際人烟尚少後乃閭閻日以富耕桑日以闢至於今将百年屹為都會皇祖雖嘗名之曰避暑山莊序詠三十六景而未輯志者其或有待耶抑亦文獻不足徴而遲遲為之耶山川里邑建置沿革與夫古蹟人物司事之臣雖捃摭遺逸猶有未備未信者其説具見於前而吾之序是書以行世者正所云在此不在彼改譯遼金元三史序改譯遼金元三史成司事者以序請史無序例也齊梁陳書及後五代乃有序盖出於宋臣修史者剏為之飾例也亦足以觀其政之不綱而事之紛紊也若今三史之請序將比於孰乎曰彼之序皆序其事而此之序乃序其言則不可以齊梁等比之矣序其言亦非為之修辭飾説乃改譯漢文譯其國語之訛誤者至於其國制度之理亂君臣之得失未嘗一字易盖史者信也所以傳萬世垂法戒彼其時之史或已不能保其必信數百年之後無庸為之修飾且改譯者不過正其訛誤之語而其舊史之布天下者自在也讀史者執舊簡而證以新書則可知語之異而事之同則此序之不可不作乃所以明吾志也夫春秋一字之褒貶示聖人大公至正之心若遼金元三國之譯漢文則出於秦越人視肥瘠者之手性情各别語言不通而又有謬寓嗤斥之意存焉此豈春秋一字褒貶之為哉向於改譯三史之㫖及同文韻統熱河志諸序已屢言之兹不複綴夫遼金雖稱帝究屬偏安元雖一統而主中華者纔八十年其時漢人之為臣僕者心意終未浹洽我國家承天庥命建極垂統至於今百四十年矣漢人之為臣僕者自其髙曽逮将五世性情無所不通語言無所不曉且今之纂修諸臣即有善通清書兼習諸國字之人則兹三史必當及此時而改譯其訛誤者是則吾於遼金元三代實厚有造而慰焉雖然是造非吾造乃天造我國家重熈累洽而後得此則所以祈天永命日慎一日之忱惟益兢兢懼乃勝於慰焉云耳後序避暑山莊後序我皇祖於辛夘年成此避暑山莊三十六景繢圖賦什為序以行之而予適生於是年此中因縁不可思議即位後於辛酉年始為巡狩之舉至山莊徘徊思慕因敬依元韻以誌景仰甲戌年又增賦三十六景盖以皇祖昔曽題額而未經入圖及余逰覽所至隨時題額補定者總弗出皇祖舊定之範圍故永恬居之詩曰已是洞天傳玉簡得教福地續琅書永恬居即皇祖御書也御序至矣盡矣兹後序何為而作盖予之生年既同山莊而予之侍皇祖適以壬寅而今嵗又恰當壬寅六十餘年藴於深衷者不可以不明白宣示以自戒已者戒我後人耳夫居此山莊日凛敬天法祖勤政恵民柔逺寧邇諸大端見之詩文者不知凡㡬何尚有未宣之深衷乎無而謂有是欺已有而弗宣是欺人我皇祖建此山莊所以詰戎綏遐崇樸愛物之義見於御製序中意深逺也是以皇考十三年之間雖未舉行此典常面諭曰予之不往避暑山莊及木蘭行圍者盖因日不暇給而性好逸惡殺生是予之過後世子孫當遵皇考所行習武木蘭毋忘家法煌煌聖訓予與和親王及爾時軍機大臣實共聞之而今皆無其人矣予如不言後更無知皇考聖意者又數年來日涉成趣於向所定景外不無建置如創得齋戒得堂之類不下二十處既見之昨嵗知過之論矣而予之意猶有未盡者亦不可不宣示後人也盖漢唐以來離宫别苑何代無之然不過費人財逞己欲其甚者乃至破國亡家是可戒無足法也若今之山莊乃在闗塞之外義重習武不重崇文而今則升府立學駸駸乎崇文矣然杜甫所云将軍不好武稚子總能文之句余常駁之以為各有其地其職也設衆人遂以此為美亦美中之不足矣又扈蹕之衆厯數月于役采薇出車古人所以恤下此亦不可不念俾人知其所繫者大且時加恵賜焉則勞而不怨若圖已樂而忘人苦亦非仁人之所為也若夫崇山峻嶺水態林姿鶴鹿之逰鳶魚之樂加之巖齋溪閣芳草古木物有天然之趣人忘塵世之懐較之漢唐離宫别苑有過之無不及也若耽此而忘一切則予之所為羶薌山莊者是䧟穽而予為得罪祖宗之人矣此意蓄之久而不忍言今老矣終不可不言故書之既以自戒仍敬告我後人若後人而忘予此言則與國休戚相闗之大臣以及骨鯁忠直之言官執予此言以諫之可也設諫而不從或且罪之者則是天不佑我國家朕亦無如之何也已矣御製文二集巻十七
