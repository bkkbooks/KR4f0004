  text: 欽定四庫全書御製文二集巻十
  hash: sha256:02444ebf8425e60d5fb382322df74c6b25ba238bba54769f141017fa41d9c144
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_044-1a, image: WYG1301/WYG1301-0343c.png}
body:
  text: 記萬夀山清漪園記萬夀山昆明湖記作於辛未記治水之由與山之更名及湖之始成也萬夀山清漪園成於辛巳而今始作記者以建置題額間或緩待而亦有所難於措辭也夫既建園矣既題額矣何所難而措辭以與我初言有所背則不能不愧扵心有所言乃若誦吾過而終不能不言者所謂君子之過予雖不言能免天下之言之乎葢湖之成以治水山之名以臨湖既具湖山之勝概能無亭臺之㸃綴事有相因文縁質起而出内帑給雇值敦撲素袪藻飾一如圓明園舊制無敢或踰焉雖然圓明園後記有云不肯舎此重費民力建園囿矣今之清漪園非重建乎非食言乎以臨湖而易山名以近山而創園囿雖云治水誰其信之然而暢春以奉東朝圓明以恒蒞政清漪静明一水可通以為勅㡬清暇㪚志澄懷之所蕭何所謂無令後世有以加者意在斯乎意在斯乎及憶司馬光之言則又爽然自失園雖成過辰而往逮午而返未嘗度宵猶初志也或亦有以諒予矣安瀾園記安瀾園者壬午幸海寧所賜陳氏隅園之名也陳氏之園何以名御園葢喜其結構致佳圖以歸園既成爰數典而仍其名也然則創歟曰非也就四宜書屋左右前後畧經位置即與陳園曲折如一無二也四宜書屋者圓明園四十景之一既圖既詠至於今已厯廿年也土本之工廿年斯敝故就葺修之便稍為更移費不侈而一舉兩得也彼以安瀾賜額則因近海塘似與此無渉也然帝王家天下薄海之内均予户庭也况予繾念塘工旬有報而月有圖所謂魚鱗土備南坍北漲諸形勢無不欲悉安瀾之願實無時不厪於懐也由其亭臺則思至鹽官者以籌海塘而願其瀾之安也不寧惟是凡長江洪河與夫南北之濟運清黄之交滙何一非予宵旰切切闗心者亦胥願其瀾之安也是則予之以安瀾名是園者固非逰情泉石之為而實蒿目桑麻之計所為在此不在彼也永佑寺舎利塔記自辛未奉慈輦南巡於夫招提蘭若轉輪祝釐無不䖍掖金根随喜檀界乃識所謂金陵之報恩武林之六和歸而欲肖之以延鴻算無何而一不戒於火其一將成而圮龜玉毁於櫝有司者不能辭其責也雖然予豈肯以工作微過而責人於是一無所問且或者如形家之言北方其誠不可如南方之為塔乎則有誌過之作永罷塔而弗為然同時之建於熱河之永佑寺者不可中止恐其蹈轍乃命拆其弗堅及築不如式者而概易之以石越十嵗甲申窣堵乃成巋然峙於避暑山莊較京師為尤北則堪輿風水之論固不足慿此亦黙有以啟予之不必信八㑹地莭之濫陳禍福以聳聴乎若夫工匠於未經試䋲墨者棘手瞠目亦人情之常政不必畏難塗廢而棄前功於無用也然是塔經營之初實為四衛拉特來歸西師籌畫之始至自今大功告成伊犁耕牧日以闢而堵波法輪舎利迥煥所謂有志者事必成儒釋雖殊途其理則一也兹故詳誌其事而於刹土僧祗化城福田之説則畧之抑以金剛六如雖調御相好有所弗屑何有於塔也塔隂泐避暑山莊百韵詩敬闡皇祖巡狩之義欲以示範永世乃予本意後之人讀是碑者當以繼武詰戎為兢兢政不必以闡象教期利益為亟亟則思過半矣荆山橋記乾隆丙寅允尹繼善之請重修荆山橋越明年丁夘橋成而未有記丁丑壬午忽忽兩過之各有詩紀梗概然亦未悉其肯𦂳為之記也去年甲申用崔應階議濬微湖下㳺乃復疏剔荆山以資宣洩兹自韓莊遵陸往徐閱河長橋所必經兼欲洞燭源委因慿輿厯覽過北山口不一里許則逮橋之北梁兩旁麦田齊橋頂漸南田漸低見跨橋有隄髙亦與橋欄齊以為南岸矣至隄始知為所除沙土積以成者實北隄也其内方為正河果深濬露石橋中間十九洞未全過水夏秋盛漲頗足容河南之隄之梁之田以次低髙與北同乃愕而吁曰有是哉橋之所以長圖容水也今束其中間為河而兩垂之餘出者棄之隄外豈資容納之計乎然南北之田以次漸髙者多與橋面齊平實亦無藉其橋之長如許也則有詩曰橋建苟非虚河疏功乃捐二者必居一於此矣因考張玉書為邑人張膽作重修橋記引周禮雨畢治道水涸成梁云云乃知此地故為沮洳之鄉橋之築一所以釃巨浸一所以避泥潦曡土為路虞不固故甃以石耳然舊橋長三百六十丈已屬過甚而重修者乃至四百八十丈是甚而又甚矣舊橋所費財二萬六千餘金今所增之石梁長未至一倍而所費乃至五萬八千餘金是倍而又倍矣以是詢之尹繼善則稱承修者為張宏運後以張家馬路工侵帑治罪然督察之未詳自不能辭其責因思近有詠桃源耕者句云斌豈欺予者葢受人欺蔽非斌為然尹繼善即其次矣然屢受人欺朕亦豈能以觀過知仁自解哉傳云與其有聚歛之臣寧有盗臣此朕本意也兹盗臣以他事抵罪則天網原未漏而既往不咎今亦仍置之弗問但記其詳悉如此使後之復修是橋者不更張大其事冐帑干咎而已耳雖然天下大矣萬㡬煩矣必待目擊而後知其當否一人之聴明其與幾何可不畏哉可不勗哉雪浪石記丙戌春直𨽻督臣方觀承獲蘇東坡雪浪石並其故以聞請移置苑囿予曰否否東坡之石宜置之東坡之雪浪齋而此何有焉然向過定州齋與石非不屢形之歌貌之圖而今又出所謂雪浪者真偽果孰是哉則稱今所出者乃所謂真稽其故葢自康熙初年有臨城令宋廣業者自定州移此石於彼建亭鑿池詩酒其間而有中山一片石之句其後亭圮石仆鞠為茂草衙之人或以為馬厩皁棧而繫馬於此石馬輙咆哮􅀈躟不敢遺溲齕草否則踜蹬病以斃人異之今牧趙州李文耀者聞其事乃親詣臨城掘土剔苔沃之以水而石之上宛露雪浪二篆題因以告之方伯是可信矣夫何信在是其不可信即在是何言之東坡之石宜以東坡之詩為凖東坡之詩一則曰朅來城下作飛石一礟驚落天驕魂一則曰異哉礟石雪浪翻以詩質之則向置定州者􅀈屯磊磊有礟石之用焉若今之片石髙且盈丈其不可為礟石而非真益明矣既考墨莊漫錄稱東坡帥中山得黒石白脈如蜀孫位孫知微所畫石間奔流云云則兹得之臨城者又實似之而向之定州所置者實不似焉夫東坡去今六百餘年風流太守一時遣興摛詞即瓦礫可為珠王而必爭是非真偽於此時是不大可笑哉且也可移之中山而去即可移之臨城而來又安知他日之不可復移之中山而去哉然則向之形之歌貌之圖者為均誤耶曰不誤也形之歌貌之圖者自在東坡之雪浪石而不在礟石片石之間也是不可起東坡並向承予命圖中山雪浪石之張若靄而一問之矣紀恩堂記圓明園之後記成於昔壬戌紀恩堂之題額乃於今丙戌始黾勉以亟為既鄭重以有待事若相殊理則一致我皇考之為圓明園前記也凡夫遵訓勤民親賢勵已之要深切言之而於昔恭迓皇祖鑾輿欣承色笑綢繆懇欵三致意焉予小子敬奉先帝園囿此對時而此臨政故敬成後記申闌皇考遵訓勤民親賢勵已之義惟日孜孜毋敢少懈黽勉亟為者以此若今紀恩堂之題額實因紀皇祖之恩紀皇祖之恩必有差所謂不負皇祖之恩者是不易言也我皇考迓皇祖承色笑者嵗每一再舉行至予小子之恭承皇祖恩養育宫中則在康熈壬寅春即駕臨之日而覲於斯堂之内云斯堂在圓明園寢殿之左舊謂之牡丹臺即四十景内所稱鏤月開雲者向於詩中亦經言及惟時皇考奉皇祖觀花燕喜之次以予名奏聞遂䝉眷顧育之禁廷日侍慈顔而承教訓即雍正十三年詔尚以是為言故予小子自踐阼以來敬惟古帝王所以凛承付託者不過於其考或偶於其祖若子則皇祖皇考付託所洊重言念及此自視常若不足遑敢弛朝乾夕惕之志故凡出治臨民罔不盡心籌度日慎一日至於今三十年仰䝉天佑内恬外闢政雖未臻上理而民則可謂粗安此所謂差不負皇祖之恩者乎鄭重有待者以此夫人之論周室率謂太王欲傳位王季以及文王泰伯知而避去此非也盖知子莫若父王季其勤王家實足以興周家也若泰伯之不從朱子以為即夷齊叩馬之心予以為在夷齊則可在泰伯則不可何則從聖父以翦寖衰之啇正也太王知泰伯有㢘譲而無締構王季又聖故傳位焉是亦正也是知以及文王之言乃後人想當之談政恐後人之謬為比擬是以申而論之然則紀皇祖之恩即所以紀皇考之恩則先此之不敢遽云紀恩者以有待也雖然豈一題額即可以告畢吾事而息吾肩者哉苟吾志之偶渝即吾言之自寒矜矜焉惴惴焉將日觸吾目而警吾心且以告後來之入斯堂者亹繼繩而篤勤敬云爾萬泉莊記萬泉莊之名不見於日下舊聞春明夣餘錄二書而經其地指其村者無不知為萬泉莊若夫丹稜沜之稱互見扵二書而經其地指其村以問諸土人則茫然不知所謂吾於是慨然歎千古紀載家之述耳食而鮮目撃於是乎失實者多矣繼又思失實者固由彼之未平心精思廣諮博考不究乎實而不已然尚賴有此失實者存而得以考其是非辨其差訛則彼述耳食而鮮目擊者亦未嘗無小補於後世未足深怪也丹稜沜之說二書所載雖小異而謂出巴溝以達於髙梁則同然其同歸於失實者寔亦在此盖丹稜沜本明戚清華園之蹟今暢春園其故址也園之前有水一溪俗所稱菱角泡子者疑即其地其水實由南而北巴溝在其南安能逆流而上以入於髙梁橋乎盖髙梁之水自由玉泉發脈滙為昆明湖流為長河以經髙梁而為通恵河其詳悉已具於向作之麥莊橋記與此無渉也今巴溝橋之名尚存而橋之南實有大沙泉小沙泉在焉其平地淙淙出乳穴者不可勝數與二書所載東雉西勾水入地中者頗合獨水盡向北流而從無涓滴向南者此為異耳夫水性就下人所易知萬泉莊髙於巴溝巴溝又髙於稜沜則水之北流而不南流不待燭照數計矣而猶有此訛焉則吾謂朱彛尊孫承澤之述耳食而未目擊非刻論也且二人去今不過百餘年所記者又不過明季之事其訛已如此之甚溯而上之其紀載之訛又豈待燭照數計哉而又豈啻丹稜沜之與萬泉莊哉夫人皆知此為萬泉莊而泉之源又實在此此不可不正其名而核其實也因命所司建泉宗廟於此地若大沙小沙巴溝皆立碣以誌之而廟之内東西為池沼亭臺若干所其淙泉處亦皆與之名而誌之碣凡二十有八廟之外噴出於稲町栁岸如盂漿如蹄涔者盖不可勝記則萬泉之名益應在此而不可他屬因綜其大要樹以豐碑以證二書之訛如右云泉宗廟記萬泉荘之記記泉之源委泉宗廟之記記神所慿依或曰泉之數以萬而神之祠惟一其一以貫萬之㫖乎曰然又曰知一以貫萬則玉泉山天下苐一泉不既有祠乎其亦可以概之矣而又為是若殿宇若像設者不已多乎曰否奚以然然乎然奚以否否乎否於是申其義而詔之曰天一之精流而為水四凟四海一水而已綜而括之其神惟一㪚而分之各有所司非特此也一黄河而神之祠不啻數百十此謂之非合且不可而謂之是分又豈得乎故泉之所在神斯在焉則吾之構殿宇而嚴像設之意其亦如此而已矣且玉泉之水自西山諸泉伏流而來其義已見於向記兹萬泉之地實近長河之東提其伏流隐脈至此而一蓄一現於是乎泛濫演漾溉町塍而資挹注仍一玉泉之功用也則以河瀆神祠例之實亦不見其異而又何必言同哉祠之後為傑閣奉北極以鎮之盖亦取乎元武主水之義而所以崇􅆄蠁祈昭育永灌注之利無旱暵之虞重農興穡則吾之意實在斯乎實在斯乎因為之記而泐之廟前御製文二集巻十
