  text: 欽定四庫全書御製文二集巻二十六
  hash: sha256:499617656993f96d06cd4a2d5b8ded12375b920eba20dcf06c82524b8eb7cfca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_060-1a, image: WYG1301/WYG1301-0440c.png}
body:
  text: 碑文重修厯代帝王廟碑文厯代帝王之祀其凖古遷廟觀徳遺意而推而放之者歟書曰七世之廟可以觀徳疏家以謂世祧者迭遷徳盛者弗毁盖就一朝為言而周禮鄭氏四類注稱三王五帝九皇六十四氏咸祀之繁露引為自近遡逺之明證斯正合食所權輿然漢魏已來有司具儀率求之肇迹建都而不聞立廟洎唐迄明廟立而代以専祀開剏為常其制又缺焉未備我皇祖聖祖仁皇帝康熙六十一年勑諭禮官増祀苟非失徳失器即䝉業守成者皆得與饗我皇考世宗憲皇帝丕纉先型詳定位次臨御伊始親詣視成著於奎文者綦悉間考舊史所紀剏守難易之辨尠有折衷定論以是對揚曩昔所為法施於民者不克兼既其實獨斤斤於殿於門於坊具顔之曰景徳景徳焉爾徳故若是其偏而不舉耶寅惟祖宗懋敬厥徳咸秩孔修觀法之所存即知戒之所寓義至深逺大雅不云乎天難忱斯不易維王召公奭迪王祈天永命一則云監於有夏再則曰監於有殷寖假入廟而徴統系由百世之後等百世之王一自昭代概之皆名之為勝國有不深厪夫屋與墟之儆而怵惕動容者哉顧於其間厯選列辟若稽古之化浹烝人治光往牒者罔不穆穆棣棣式在几筵崇異代同堂之報故於世數之遷而得其示戒於無形抑於世數之屢遷而不遷而得其垂法於有永稔乎此者觀徳之意愈以睪然而興矣廟自雍正癸丑繕葺距今且三十載爰以乾隆壬午出内帑金庀而飭之故事瓴甋甃以純緑兹特易盖正殿黄瓦用昭舄奕工告訖功適屆甲申季春吉祀祇承家法躬薦新宫已為長律述事掲言其大指㑹所司請製文並鍥諸碑復詳闡之如此寳相寺碑文嵗辛巳值聖母皇太后七旬大慶爰奉安輿詣五臺所以祝釐也殊像寺在山之麓為瞻禮文殊初地妙相端嚴光耀香界黙識以歸既歸則心追手摹系以贊而勒之碑香山南麓曩所規菩薩頂之寳諦寺在焉迺於寺右度隙地出内府金錢飭具庀材營構蘭若視碑摹而象設之金色荘嚴惟具惟肖寺之制甃甓幕圜不施杗廇桴棁而崇廣閎麗則視殊像有加經始於乾隆壬午春越今丁亥春蕆工既敬致瓣香而慶落之所司礱石以俟因記之曰文殊師利久住娑婆世界而應現説法則獨在清涼山固華嚴品所謂東方世界中菩薩者也夫清涼在畿輔之西而香山亦在京城之西然以清涼視香山則香山為東若以竺乾視震旦則清涼香山又皆東也是二山者不可言同何况云異矧陸元暢之答宣律師曰文殊随緣利見應變不窮是一是二在文殊本不生分别見倘必執清涼為道塲而不知香山之亦可為道塲則何異鑿井得泉而謂水専在是哉且昔之詣五臺禮文殊所以祝釐也而清涼距畿輔千餘里掖輦行慶向惟三至焉若香山則去京城三十里而近嵗可一再至繼自今億萬年延洪演乗兹惟其恒是則余建寺香山之初志也寺成名之曰寳相綴以偈曰㬅殊室利七佛之師經厯人間至福城東東方世界名曰金色常在其中而演説法摩竭阤國其東五峯是名雪山惟清涼境金剛窟聚北代州是大士示現妙相荘嚴振大法輪坐師子座師子奮迅具足神威中臺現身寺曰殊像我昔瞻禮發大宏願䖍誠祝釐普諸福緣相好印心如月在水即幻即真證真幻相以此真幻還印金容香山浄域多祇樹園寳諦之西營是寳相荘校七寳晃曜大千日面月面了無分别我聞如是文殊應緣緣即随緣何有彼此矧東西方因見生名見即不拘名亦不著清涼香山非二非一復念文殊菩薩久住而此世界實曰常喜以常以久延祝慈禧惟願自今嵗萬又萬寳算盈積如恒河沙䕶妙吉祥生大歡喜以是因緣夀復無量重修天津海神廟碑文渤海介析木之津襟帶畿輔揵雄闍而鞏之寔惟神京左絡翕受靈長厥利斯溥神故不列海瀆秩次康熙間盛京有汎舟之役袵波飈颿厥事迅蕆我皇祖嘉神之功飭廟薦馨祀在彛典我皇考詔即舊規重事葺治豐碑並峙昭鑠瀛際崇示禮秩莫不備舉越嵗既久風雨剥陊無以掲䖍妥靈乃發水衡鼎厥工楹輝雘新式奐式壮朕今春率皇祖舊章巡幸天津莅而謁禮為詩以落之盖自淀池循子牙􅑴海河既得悉其歸墟原委至則登觀海之臺澄波澶湉引控瀛棣東眺扶桑熻赩蔥鬱光延我陪都而旅順登萊廟島環拱羅布胥靖以安其旁穿壕坒場曝鹵出素邱如皜如牢盆之獲什倍而斥壤沮洳瘠不宜植於是蠲澤民之逋爰復憬然曰渤海之繫誠大矣凡海職納而兹所職乎納者尤要夫東南之海吸吞江河風濤是防治在塘堰若西北諸水滹滏漳易衛白或奔瀉千百里而永定最横且駛瀦以七十二淀瀹以三沽釃澹委輸厯直沽以入禹貢所謂同為逆河入海者此居其大半而崇沙外亘如户斯闑無拒而壅流乃軌注曩者京南州邑苦積潦載洩載導田廬用寧邇復相示咨度渠之墊者濬之隄之缺者續之施人力靡弗至洎覽五牐春灌夏禁啟塞以時匪潮弗盈匪寒弗縮嘘噏迴斡通乎自然固非人事補苴之可作而致而朕飢溺為念時罔不在民則因天之功其又敢不事事且海之為物既鉅受川迣波有宿有統與夫所以若雨暘迪節宣康又我民人而惠阜我田疇者咸依神庥洪惟我祖宗懐柔報祀􅆄蠁昭融厯有年所朕勤思下氓計安恬者甚摯亦惟神是憑蘄自今祇循儀軌宣道和令於以疏潤輯瀾俾暑無盛漲秋無霪霖用貽我甸人無疆之樂利嗣是百執事嵗有事於廟下醴芬牷腯無不恪共而神之彰靈效順以宏佑我邦家者亦永永弗替爰系其事於碑以示來許普樂寺碑記避暑山莊當興桓隩區直北地亘獅溝西南官廨民廬聚落殷羨獨其東偏列嶂邈緜周原案衍則諸經所稱廣長清浄於佛土宜乾隆乙亥西陲大功告成衛拉特各部長來㑹時事嘗肖西域三摩耶建寺曰普寧嗣是達什達瓦屬人内徙即次旅居環匝山麓越嵗乙酉復於迤左仿伊犁固爾札都綱建廟曰安逺然自廟南延望錘峯式塏式閎厥壤猶隙惟大濛之俗素崇黄教将欲因其教不易其俗緣初構而踵成之且每嵗山莊秋巡内外札薩克覲光以來者肩摩踵接而新附之都爾伯特及左右哈薩克東西布魯特亦宜有以遂其仰瞻興其肅恭俾滿所欲無二心焉咨之章嘉國師云大蔵所載有上樂王佛乃持輪王佛化身居常東嚮洪濟羣品必若外闢重闉疏三塗中翼廣殿後規闍城内叠磴懸折而上置龕正與峯對者則人天咸遂皈仰将作如制以丙戌正月經始洎丁亥八月訖工爰取普樂顔寺額而為之記曰自西人之瀕於塗炭也湫隘阽危不能終日朕則為之求寧焉既寧之後奔奏偕徠室家還定朕則為之計安焉既寧且安其樂斯在譬如佛影覆於鴿身四大得所離怖畏想生歡喜心蘄自刹那以逮億刼同遊春臺化宇樂其樂而不能名其樂真上樂耳雖然曷易臻此哉語曰民可與樂成難與慮始又曰先天下之憂而憂後天下之樂而樂是朕所由繼普寧安逺而命之為普樂者既以自慰且重以自勗而匪直梵文勝因福利之云云也記成并系以讃善哉大能仁無去亦無住以何因緣故現此説法身人天咸䕶持功徳甚希有云何稱上樂自小千中千暨三千大千法界無究竟爾時兩足尊甘露為灌頂一切諸衆生若有情無情念彼佛力者受特陀羅尼三世諸如來神力並如汝第一具根性即身得證佛其次小乗人得八大成就靈丹浄眼方徹地智慧劍空行遍周厯延年無疾病自洛义俱胝無量僧祇刼萬行齊完滿求福不唐捐普種福徳田普蔭如意樹普覆大慈雲普渡大願船震旦閻浮提清寧共安隠而彼狼荒俗永脫修羅天合十白佛言此是法王力要知大自在本分元自足無苦彊言樂即堕分别相樂故無名名上亦無等等東峯開妙鬘寳閣照旭光舉似日出處了了正知見光與日無盡誰識所本來八寳莊嚴成香華天樂備大㑹啟無遮同證無上道御製文二集巻二十六
