  text: 欽定四庫全書御製文初集巻十九
  hash: sha256:5e6a7b1cddb498d405aabe5fde42fd027de9b32758beab12cd1a3d38f99e29c3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_019-1a, image: WYG1301/WYG1301-0164a.png}
body:
  text: 碑文平定準噶爾告成太學碑文遼矣山戎薫粥旃裘毳幕之人界以龍沙畜其驒奚雖無恒業厥有分部盖自元黄剖判萬物芸生東夷西夷各依其地謬舉淳維未為理據皇古莫紀其見之書史者自周宣太原之伐秦政亘海之築莫不畏其侵軼猾夏是虞自時厥後一二奮發之君慨然思挫其鋒而納之宥然事不中機材不副用加以地逺無定處故嘗勞衆費材十損一得搢紳之儒守和親介胄之士言征伐征伐則民力竭和親則國威喪於是有守在四夷羈縻不絶地不可耕民不可臣之言興矣然此以論漢唐宋明之中夏而非謂我皇清之中夏也皇清荷天之龍興東海撫華區有元之裔久屬版章嵗朝貢從征狩執役惟謹準噶爾厄魯特者本有元之臣僕叛出據西海終明世為邊患至噶爾丹而稍强吞噬鄰蕃䦨入北塞我皇祖三臨朔漠用大破其師元惡伏㝠誅脅從逺遯跡毋俾遺種於我喀爾喀厥姪䇿妄阿拉布坦收其遺孽僅保伊犁故嘗索俘取地無敢不共逮夫部落滋聚乃以計襲哈密入西藏準夷之勢於是而復張兩朝命将問罪雖屢獲捷而庚戌之役逆子噶爾丹䇿凌能用其父舊人乗我師怠掠畜於巴里坤𢷬營於和卜多於是而準夷之勢大張然地既險逺主客異焉此勞往而無利彼亦如之故額爾徳尼招之敗彼亦以彼貪利而深入也皇考謂我武既揚不可以既允其請和以息我衆予小子敬奉先志無越思焉既而噶爾丹䇿凌死子䇿妄多爾濟那木扎爾暴殘喇嘛達爾扎簒奪之達瓦齊又簒奪喇嘛達爾扎而􅒬酒虐下尤甚焉癸酉冬都爾伯特台吉䇿凌等率數萬人來歸越明年秋輝特台吉阿睦爾撒納和碩特台吉班珠爾又率數萬人來歸朕謂來者不可以不撫而撫之莫若因其地其俗而善循之且毋令滋方來之患於我喀爾喀也於是議進兩路之師問彼罪魁安我新附凡運餉籌䭾長行利戰之事悉備議之始熟經於庚戌之艱者咸懼蹈轍惟大學士忠勇公傅恒見與朕同而新附諸台吉則求之甚力朕謂犁庭掃穴即不敢必然喀爾喀之地必不可以久居若而人毋寧用其鋒而觀厥成即不如志亦非所悔也故凡禡旗命将之典槩未舉行亦云偏師嘗試為之耳塞上用兵必以秋而阿睦爾撒納禡木特請以春月欲乗彼馬未肥則不能遯朕謂其言良當遂從之北路以二月丙辰西路以二月己巳各起行哈宻瀚海向無雨今春乃大雨咸以為時雨之師入賊境凡所過之鄂拓克攜羊酒糗糒迎恐後五月乙亥至伊犁亦如之達瓦齊於格登山麓結營以待兵近萬我兩将軍議以兵取則傷彼必衆彼衆皆我衆多傷非所以體上慈也丁亥遣阿玉錫等二十五人夜斫營覘賊向賊兵大潰相蹂躙死者不可勝數來降者七千餘我二十五人無一人受傷者達瓦齊以百餘騎竄六月庚戌回人阿竒木霍集斯伯克執達瓦齊來獻軍門準噶爾平是役也定議不過二人籌事不過一年兵行不過五月無亡矢遺鏃之費大勲以集遐壤以定豈人力哉天也然天垂佑而授之事機設不奉行之以致坐失者多矣可與樂成不可與謀始亦謂蚩蚩之衆云爾豈其卿大夫之謂既克集事則又曰苟知其易将勸為之夫明於事後者必将昧於㡬先朕用是寒心且準噶爾一小部落耳一二有能為之長而其樹也固焉一二暴失徳之長而其亡也忽焉朕用是知懼武成而勒碑文廟例也禮臣以為請故據實事書之其辭曰茫茫伊犁大幹之西匪今伊昔化外羈縻條支之東大宛以南隨畜獵獸蟻聚狼貪乃世其惡乃恃其逺或激我攻而乗我緩其計在斯其長可窮止戈靖邊化日薫風不侵不距不來其那欵闗求市亦不禁訶始慕希珍終居竒貨吏喜無事遷就斯愞漸不可長我豈懼其豈如宋明和市之為既知其然飭我邊吏弗縱弗嚴示之節制不仁之守再世斯斬簒奪相仍飄忽荏苒夙沙革面煎鞏披忱集泮飛鴞食黮懐音錫之爵位榮以華裾膝前面請願効前驅兵分兩路雪甲霜鋒先導中堅如鼂錯攻益以後勁蒙古舊屬八旗子弟其心允篤二月卜吉牙旗飄颻我騎斯騰無待折膠泉涌於磧蕪茁於路我衆歡躍謂有天助匪啻我衆新附亦云黄髮未覩水草富春烏魯木齊波羅塔拉台吉宰桑紛紛款納牽其肥羊及馬潼酒獻其屠耆合掌雙手予有前諭所禁侵陵以茶交易大愉衆情衆情既愉來者日繼蠢達瓦齊擁兵自衞依山據淖惟旦夕延有近萬人其心十千勇不目逃掄二十五曰阿玉錫率往賊所銜枚夜襲直入其郛揮矛拍馬大聲疾呼彼人既離我志斯合突将無前縱横鞺鞳案角鹿埵隴種東籠自相狼藉孰敢攖鋒狐竄䑕逃將往異域回部遮之兇渠斯得露布既至告廟受俘凡此蕆功荷天之衢在古周宣二年乙亥淮夷是平常武詩載越我皇祖征噶爾丹命将禡旗亦乙亥年既符嵗徳允協師貞兵不血刃漠無王庭昔時準夷弗恭弗譓今隨師行為師候尉昔時準夷日戰夜征今也偃卧知樂人生曰匪準夷曰我臣僕自今伊始安爾逰牧爾牧爾耕爾長孫子曰無向非豈有今是兩朝志竟億載基成側席不遑保泰持盈平定準噶爾勒銘伊犁之碑惟天盡所覆俾我皇清罔不在宥惟清奉昊天撫薄海兆庶悉主悉臣叶太祖太宗世祖肇基宅中皇耆其武聖祖世宗覲光揚烈克臻郅隆逮予藐躬思日孜孜期四海同風咨汝準噶爾叶亦䝉古同類何自外攜數世梗化簒奪相仍碩仇其下厥達瓦齊甚毒於酲衆心疧疧如苗斯蟊如虺斯螫衆口嗷嗷視爾嗷止予焦勞止期救不崇朝止視爾疧止予噫嘻止亟出汝塗泥止迺命新附爾為先鋒熟悉其路迺命勁旅攜數月糧毋或掠擄師行時雨王旅嘽嘽亦無潦阻左旋右抽王旅渾渾既暇以休烏魯木齊及五集賽度之折折台吉宰桑迎降恐後奚事斧吭波羅塔拉闥爾竒􅊐險如闗闔倒戈反攻達瓦齊走旦夕塗窮回部遮獲彼䑕斯喙地入無隙露布飛至受俘午門爰貸其罪自今伊始四部我臣伊犁我宇叶曰綽羅斯及都爾伯特和碩特輝特封四可汗衆建王公逰牧各安宰桑公臣屬我旗籍誰汝苦辛爾恭爾長爾孶爾幼徐以教養爾駝爾牛爾羊爾馬畜牧優㳺分疆各守毋相侵陵以干大咎齊禦外域曰布魯特越哈薩克醉飲飽食敬興黄教福自天錫伊犁平叶矣勒貞珉矣於萬斯年矣平定準噶爾勒銘格登山之碑格登之崔嵬賊固其壘叶我師堂堂其固自摧格登之嶻嶭賊營其宂我師洸洸其營若綴師行如流度伊犁川粤有前導為我具船渡河八日遂抵格登面淖背巗藉一昏㝠曰𢷬厥虚曰殱厥旅豈不易易將韜我武将韜我武詎曰養宼曰有後謀大功近就彼衆我臣已有成辭火炎崑岡懼乖皇慈三巴圖魯二十二卒夜斫賊營萬衆股栗人各一心孰為汝守汝頑不靈尚竄以走汝竄以走誰其納之縛獻軍門追悔其遲於恒有言曰殺寧育叶受俘赦之光我擴度漢置都䕶唐拜将軍費賂勞衆弗服弗臣既臣斯恩既服斯義勒銘格登永詔億世普寧寺碑文乾隆二十年夏五月平定準噶爾冬十月大宴賚四衛拉特部落舊附新歸之衆於避暑山莊曰綽羅斯曰都爾伯特曰輝特曰和碩特四族台吉各封以汗王貝勒貝子公若而人其無𨽻屬之宰桑則歸之公如内八旗外四十九旗喀爾喀四部之例至是而内外一家遐邇同風之言允符昔我皇祖之定喀爾喀也建彚宗寺於多倫諾爾以一衆志式循舊章建普寧寺於山荘之北麓而為之記曰皇天有輔徳之私至聖有越世之度君子有見㡬之作兆人有可格之誠我國家撫有衆䝉古詎準噶爾一部終外王化雖庸衆有威之不知畏恵之不知懐地不可耕民不可臣之言其然豈其然哉以我皇祖皇考聖徳神功經文緯武其於奠伊犁勒銘格登山朝四部落之衆而錫之爵賜之幣式宴陳舞可汗起奉酒稱萬夀如今日者何難黙契大造意若有待是以遵養時晦垂成弗為予小子敬承乾佑以為不可失者時遲徊觀望寧二聖付託藐躬之意且此山荘即皇祖嵗時巡覲諸䝉古賓客之所也越三十年而克見準噶爾之衆咸覲於此豈非皇天無私惟徳之輔至聖之度越世先知而見㡬君子之作予亦不敢不勉衛拉特之衆豈終不可格以誠哉䝉古向敬佛興黄教故寺之式即依西藏三摩耶廟之式為之名之曰普寧者盖自是而雪山蔥􅊐以逮西海恒河沙數臣庶咸願安其居樂其業永永普寧云爾復依普賢世界品而述偈言抖贊轉輪王功徳甚深大造寺於西域其名三摩耶逮今千嵗餘願海装嚴就肖彼須彌山巍閣凡三層日月在兩肩地金水風輪其内小鐵圍大鹹海水滿持地障礙山馬耳及善見擔木並持軸持雙凡七山其中乃香水其上堅手天持及恒憍四天王所住復有四方天其數各以八中乃忉利天善見帝釋宫欲界四天子色界無色界次第居其上東曰勝神洲小勝及勝勝左右以次住南曰贍部洲妙拂並小拂左右以次住西曰牛賀洲行道将小行左右以次住北曰俱盧洲㝡勝復諂勝左右以次住供養佛無數如普賢願海復為四色塔義出陀羅尼四智標功用懿此避暑荘古佛所㳺歴較彼衛藏地佛土無差别有來衆蒙古及新衛拉特咸敬黄教人爰作大利益肖彼三摩耶為奉天人師作此曼拏羅嚴潔身口意依法香泥塗一切皆清浄香花供養具法螺法音聲轉無量法輪聚無量法衆誦無量法寳作無量法事我聞普賢言華藏荘嚴海是毘盧遮那往刼修行處種種寳光明大雲徧一切捨身等塵刹以昔願力住徧十方國土出苦向菩提方便示調伏世界所有塵一一見法界現佛如雲集此是如來刹大願周法界一切化羣生莊嚴從此出西土及震旦究竟無同異衆生皆安隠暨蠕動肖翹遂生明佛性稽首天人師普賢行如是玉泉山東嶽廟碑文東嶽為五嶽宗徳發揚詡萬物出雲雨以蕃殖嘉穀阜成兆民伊古以來秩視三公載在祀典尚已顧天門日觀去京師千里而逺嵗時涖事職在有司方望之祀非遇國家大慶及巡狩所至未嘗輒舉是以郡邑都㑹往往崇廟貌以奉苾馨夫亦以東方春生之氣貫於四時明靈肹蠁無往弗格祝釐祈禱誠應響捷如生氣之於物肖翹跂喙洪纎媺惡無不畢達固非特巖巖具瞻表望齊魯而已京師之西玉泉山峯巒窈深林木清瑟為玉泉所自出滋液滲漉澤潤神臯與泰山之出雲雨功用廣大正同爰即其地建東嶽廟凡殿宇若干楹規制崇麗以乾隆二十有一年工竣有司以立碑請稽古制四望無廟祀然周官小宗伯所職四望有兆典祀掌外祀之兆皆有域又山虞祭山林則為主曰兆曰域曰主皆欲神有所憑依而致其昭格也近代既有象設則立廟以祀尤洋洋顯赫其致精誠以交於神明不益著歟夫七十二君封禪之説荒邈無稽而金泥玉檢登封岱宗漢唐令辟尚不免侈為盛儀動色矜耀謂合於經所云因名山以升中於天夫名山所在多有均為造化靈粹所鍾英爽若接東嶽之為泰岱人皆知之而不知山嶽之靈不崇朝而雨天下其精神布濩固無不之譬夫山下出泉隨地歕湧導之即達固不可謂水専在是則東嶽之祀於茲山也固宜是為記浙海神廟碑文浙西地瀕海扼其衝者先海寧次錢塘錢塘距海門尚一舍而逺然天下言觀潮之竒者獨推廣陵之􅇧母盖徽歙衆山水自新安江下至富陽而金衢嚴處數郡千巖萬壑復滙入錢塘出海必得海潮逆之坌涌拗怒軋盤盪裔然後流益急而軌益順故江之歸壑非濤不為功然其北撃南蕩生民農桑之命繫焉斯恃塘堰為保障漢書注始紀郡議曺華信作塘捍潮唐書捍海隄凡二百二十四里宋元二史並誌袁花諸塘之修築及石囤木櫃之坊禦如世所傳斛土千錢之諺其勤且囏如此雍正八年我皇考世宗憲皇帝以海塘告成維神効靈助順特勑建廟海寧褒封秩祀用申昭報近海州縣不知有水患者二十餘年於茲然其時潮尚循北亹也乾隆辛未丁丑朕兩巡浙水登觀潮樓乃悉所為趨北亹而有軼則仁錢迤西害不可言趨南亹則蕭㑹諸邑之戴山者藩㰚畧具猶間有陊囓之虞比年來大溜直趨中亹兩岸沙潬鱗起如左右引從民居其間川原膏沃可耕可桑曽不知白馬胥濤足以動心而駴目夫人之情久則忘而逸則淫今之居樂土安作息者非昔之日夜怵惕懼為魚之民也耶則我皇考之深宫宵旰謀建塘以衛生靈與明神之肹蠁垂釐嘉佑是邦其何可以弗紀觀潮樓當錢塘都㑹之地東瞻中亹為尤悉爰視海寧祠宇之例命守臣鳩工庀材崇象設而展時事夫元氣灌輸端委相成無感弗假又何一二之可區分哉因為迎神送神歌俾肄之工祝以揭䖍妥靈其辭曰赭龕閕兮翼户睋紫瀾兮滄嶼氷夷導兮江婓扈兩旍􅆴㲚兮金支中樹神之來兮按部迴水犀兮萬弩虹隄一綫兮安堵福我民兮於昭揚詡傳芭兮鼚鼓紛配藜兮神靈雨右迎神擥若木兮留暉櫩雲解駮兮赬霞罨幃罇蠲滌兮俎腯肥聆繁㑹兮叶呼豨神之去兮載祈波恬羅刹兮石平磯潤千里兮涵郊圻引晦濁兮歸墟是歸式歆饗兮庶㡬朝潮夕汐兮長無違右送神御製文初集巻十九
