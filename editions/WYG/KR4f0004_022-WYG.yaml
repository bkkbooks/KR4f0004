body:
  text: 雜著擬九歌十二首題荘子故事圖姑射神人雲巃嵸兮絙崇岡峯碕礒兮葉丹黄藐姑射兮名誰名若有人兮處其中氷雪肌兮綽約容乗雲氣兮御飛龍逰凌兢兮周八荒羌萬物兮被礴旁羨莫見兮増慨慷庖丁解牛徹胹鼈兮炮羔與安胡兮楚苖薦庖丁兮犓牛睇理解兮崇朝既踦膝兮倚肩乃奏刀兮騞然經肯綮兮未嘗況大軱兮是干繄㳺刃兮有餘地曷試思兮其始難支離鼓䇲􅀈若人兮形支離肩髙頂兮頤隠齊五管在上兮髀為脅其餬口兮以鼓䇲無逺戍兮免常徭以病受粟兮養其身以不勞吾於是知神人之無用兮恒萬古而逍遥壺子示機神之子兮曰季咸期夭夀兮若神曷壺子之猶龍誕猶喻夫三淵雲出谷兮水行地彼寧知其誰何兮夫豈大塊之有意鄭人之㝠㝠兮第未解夫四示詎吾宗之可常兮固知之人之未深思列子食豕歸來兮列子蹇宅外兮不可以止忘糠缶兮漿觴知食人兮食豕既復朴兮紛而封馳萬物兮無窮春蘭滋兮時雨秋梧飄兮涼風吾方與天帝同㳺兮寧知日月之有終儵忽鑿竅斡元縡兮造太清曰渾沌兮爰帝名何儵忽之二子獨憧憧兮屢征彼報徳乃戕身兮人皆咎二子之不近情嗚呼儵忽兮獨非渾沌之所生孰能保此太初兮膏吾車兮吾将從象罔得珠赤水兮崑崙峯碅磳兮波沕淪君於焉兮夷猶駐芝盖兮華軒遺元珠兮屢索異哉象罔兮乃可以得余幼寳此竒琛兮年既老而不衰怳偶遺之若失兮幸屢索而得之吁嘻象罔兮得毋余嗤輪扁斵輪君讀書兮堂上臣斵輪兮堂下君之書兮古人臣之輪兮臣者疾則苦兮徐則甘應心得手兮口不能言有數存焉於其間庸詎知臣言之非糟粕兮君幸恕臣之狂顛東施捧心有美人兮山之阿溪若耶兮村苧蘿常病心兮若思矉雙眉兮修蛾姱曼睩兮曽波彼何人斯强效為富閉户兮貧去之所以美兮彼不知貌假借者盍鑒茲濠梁觀魚撰良辰兮遊濠梁眄遡波兮風迴風流澹湛兮水草芳鯈魚出兮游從容噞薵蓼兮之而張是魚樂兮爾我同聊容與兮斯徜徉吾固知之兮於濠之上痀僂承蜩爰有人兮形痀僂居楚野兮山之幽仰叢薄兮枝相繚臂若槁枝兮日承蜩天地之大有所弗知兮惟蟬翼之是求盖有道兮不與萬物為儔吁嗟斯人兮羌得全於天者流伯昏論射觀君射兮信竒鄰至人耶然疑登髙山兮嶻嶭臨百仞兮淵漪背逡巡兮足垂外揖君進兮君辭君於中兮殆矣挟弓矢兮奚為縱余目兮青天寄余神兮九圍永泊然兮自適歴萬劫兮不知讀宋史徐積傳予嘗讀宋史徐積傳載積孝行出於天三嵗父死旦旦求之哀母亡廬墓三年哭不絶音又稱以父名石終身不用石器行遇石則避而不踐未嘗不三歎史筆之難得而怪托克托輩之無史識也夫叢冗委屑華而不實俚而不文如是者皆不可以當史筆無是病矣而一字之褒貶不足誅奸回於既往發潜徳之幽光則不能出没人於千百嵗後是史筆非難史識為尤難也故大惡大善雖細行必紀反經由權雖嘉言亦黜積也孝書其生事死葬之盡誠盡禮足矣不應以其不用石器與避石不踐之細行累孝子之大徳夫積不用石器不踐石豈非以其觸父諱乎諱亦出於禮而吾直以為累孝子之大徳者其亦有説盖禮云二名不偏諱言在不稱徴言徴不稱在是在徴二字單舉之尚在所不諱必其姓與名合斯則諱而不敢稱然亦孝之小節而已矣若以父名石而子不踐石為孝則公子地之子當舟居而不履地乎父名石而子不踐石人尚可能父名地而子不履地人所不能也詩曰孝思不匱永錫爾類大孝達於天下必蘄人人皆如已之孝於父母孝子之心斯愉快焉今乃為人之所不能為以為己之孝過於天下人之孝豈孝子之心哉故大孝莫如舜不聞其見瞽目者輒拜而積乃今以不用石器與避不踐石稱豈非累積之大者乎然積非有心於為此以求名也觀其讀孝經輒淚落不止雪夜伏墓側悲慟嘔血是乃本於天性之自然彼遇石則怵然傷心而思親亦其出於至性有不能自己者而為史者例當守千秋法則之正一字褒貶之公凡不合經常之行雖嘉可刪設惜其湮没而無聞則自有稗官野史在吾故曰史筆非難史識為尤難而怪托克托輩之無史識也漢玉斧欵識漢玉斧一羨七寸有十分寸之七博四寸以為首豐其末加十分寸之二首之厚六分剡其末以為刃記曰朱干玉戚冕而舞大武此其遺制歟古者以斧為文義取其斷而以玉為之意温潤之中不失裁制之用耶讀公羊余讀公羊至許世子止之事不禁廢書而歎曰嗟乎迂儒失聖人之㫖逞强辭之奪而後世方稱其鼎足邱明獨能傳説不亦師心剌謬乎夫許世子之事左傳隠躍其言而穀梁則不過曰即止自責而責之而已耳至夫子髙則直引樂正子春之事以證之一則曰聴止也再則曰赦止也且人子之視疾或一藥而愈或數藥而愈或數藥而竟不愈或一藥而竟不愈者有之矣即子春之親豈能常存於世其非進藥而不愈者乎則是千萬世之人盡不能免止之罪抑亦盡将得止之赦也夫逆天之誅聖人何忍慢以罪人而又慢以赦人也止之進藥必有不敬誤投之咎非啻不盡不嘗而已然其心終無他故其罪止於是而蘇轍胡寅之流方且祖其説演義游辭失之愈逺矣讀荀彧傳予讀范曄荀彧傳而歎曄之有史材而無史識也夫史材非難史識為難自遷固即已不免此病而何怪乎曄哉盖遷固之失失以駁而未嘗混黒白妄褒貶若曄之稱彧以歸正成仁則何異乎譽盜跖為義而美桓温以匡主之忠耶善乎劉友益之論彧云身為漢臣為操謀畫以贊其業業已成矣甫以正論自詭其無益可知今夫葛之與裘其相去逺矣然必無今日葛而明日頓裘之理以漸使之然也操之移漢成魏其隂謀秘䇿皆彧有以佐之即其沮董昭之議毋亦内慙樊郭外怯孫劉思欲徘徊少待乎而操已不能平至於發伏完之書為狙詐之計禍生空器卒至飲酖所為進退無據孽由自作耳而曄乃以為崇明王畧紓人於倉卒審如是則仲連之蹈東海顧乃謂不達時務可乎彧之事人不難知而已有顛倒是非如曄者吾於是歎史識之難得而任好惡為予奪者盖不少矣讀唐太宗集予讀唐太宗集見有賜魏徴詩云云注之者曰徴善治酒世所未有信斯言也徴為諂臣太宗不得為令主矣夫太宗三代以下之賢君而魏徴亦有唐之遺直也徴之於太宗知無不言且有不必言而言之者矣􅌬醁善醉之物而謂徴自釀以媚君有是理乎夫􅌬醁媚君封徳彞之流或為之徴而知之将痛切諫之而已乃蹈之耶昔梁王酒酣請魯君舉觴魯君避席擇言而舉禹疏儀狄之事徴豈不知且徴固欲致其君於禹而已乃自甘儀狄必不然矣或曰太宗納巢刺王妃而徴不能諫則徴毋亦好名茹柔之為而隂有容悦之事或不可知予曰固也夫好名之人激於一時則或能捨死處之順境則不忍忘生䦧牆之對徴之能捨死也巢刺妃之佯為不知徴之不忍忘生也即不進不敗之醪太宗未必致徴於死也而徴何必亟亟為之哉三代以下惟恐不好名且以徴之好名而成太宗之名於無窮者亦已多矣徴豈不知治酒之非美名哉千日之醉奚啻十漸不克終而已乎實有其事其時君若臣亦必不肯公然見之歌詠矣或曰太宗之詩多出於董思恭所為是則不可知也已讀邶風匏有苦葉第二章詩傳疏及朱注皆云飛曰雌雄走曰牝牡毛孔固失之而朱子亦未詳考也夫見於詩書者雄狐綏綏獸也何嘗不謂之雄牝雞無晨禽也何嘗不謂之牝善乎歐陽修本義云古語通用無常雉鳴求其牡者興夫人不顧禮義而從宣公又宋逸齋補傳謂雄當求匹雌不當求牡斯皆足以喻夫人之犯禮必穿鑿而釋之謂雌雉當求其雉之雄今乃求其獸之牡以為非禮則禽與獸合有是理乎鳥䑕同穴之山雖鳥䑕同穴而各為匹配無亂羣之事也藉曰禽獸所無而人為之斯禽獸之不如因設烏有之事以刺淫佚則怪亂夫子所不語何刪詩而尚存此章乎且宣姜夷姜論者紛如聚訟而伋朔之事張照已辨之詳兹不複綴余謂讀書當識大意具正見若注疏家片言隻字之訛政不必為之勉强湊泊而反晦正義也記載記載之失實雖正史不能免而莫甚於稗野之刺謬彼以一已之私心設為莫須有之論所惡者雖伯夷之清而不為揚其善所喜者雖盜跖之貪而謬為隠其惡所喜者雖盜跖之貪而曲為稱其善所惡者雖伯夷之清而刻以求其惡夫不揚而謬隠猶可也至於曲稱而刻求則是非顛倒莫可究詰使後人見之愚者固以為必然知者且不能不致疑矣知者致疑将謂正史亦未免如此害天下之公亂聖人之道非稗野之所馴至乎如聞見録龍川志之紀范仲淹富弼論晁仲約之事是已夫范富二人豈非宋室之名臣哉設如二書所云則是小人之尤而不可入君子之林矣何則仲約之罪或者當時介於可殺不可殺之間二人争之所為上殿相争下殿不失和氣者是也今乃曰不可教之手滑然此猶可也至曰吾輩首領皆不保是何言耶豈有忠臣義士預為己地而視人君若三尺之童之理哉使范富具此見是與王安石吕恵卿之流何異其生平立朝出鎮致君澤民之蹟又何能如正史所傳班班可考若彼乎且二書載仲約以知軍事遇盜不捕乃斂民金帛餌之過境事蹟詳略互異罪状則同至龍川志仲約姓姚而言行録引之别作晁又志稱知髙郵軍而聞見録作光化郭公傳譌即此可見今覈之萬姓統譜有晁仲約時與官並合是從晁較為有據第其職惟注正奉大夫則其事其人之果否有之固無確據也夫世之隨人是非而無定見者多矣觀此書必且謂范富果有其亊仲淹為能先見弼為能服善是教後世為臣者欺其君而盜世名犯少正卯之誅者有之矣邵伯温吾不惜而獨惜蘇轍尚稱具正知卓識者亦為此卑謬之論豈其未之思乎抑或未曽質諸其兄以為何如乎準噶爾全部紀略自古無不誌外夷而實者少舛者多非以其方域所限言語不通耶得什一於千百加以魚魯亥豕其堪信者鮮矣兹者平定準部止封達瓦齊子一人居之京都且城伊犁駐将軍鎮守事耕牧焉念彼原一大部落不可無紀故就親詢實事書之亦以便方略纂敘也準噶爾四衛拉特者綽羅斯部都爾伯特部和碩特部土爾扈特部是其輝特一部本附庸於都爾伯特後土爾扈特竄歸俄羅斯故别輝特為一部仍稱四衛拉特云衛拉特明史稱為瓦剌其音頗近史所載脱歡太師盖其始祖元亡而其彊臣分為三其渠曰馬哈木者即脱歡之父也脱歡者䝉古準語同為釜今準人語釜為海蘇而䝉古語則仍舊盖準人自避其祖諱此亦一證也自脱歡逮孛汗其世次不可考孛汗背正妻與他婦野合而生子曰烏林台巴靼太師其母棄之澤中孛汗收養之遂統部落又十一世而傳至賽音諾顔哈喇忽剌是為䇿妄阿拉布坦之曽祖子曰巴圖魯渾台吉有子十二人五曰僧格䇿妄之父六曰噶爾丹博碩克圖其餘無事無足稱長曰䇿臣次曰巴圖魯䇿臣與巴圖魯殺其弟僧格噶爾丹博碩克圖始自蔵中回舊部反俗為汗於康熙年間犯塞戰敗走死先是噶爾丹博碩克圖既殺兄僧格之次子索諾木阿拉布坦僧格舊臣七人與䇿妄阿拉布坦同逺逃準語所謂多倫努庫爾者是多倫者漢語為七努庫爾者漢語為友盖其患難相共所謂世臣並赦其子孫七死云及噶爾丹為我兵敗䇿妄始還和博克薩里收其父舊屬及噶爾丹餘衆復成部落并縛噶爾丹子獻闕下遂自據汗位子噶爾丹䇿凌噶爾丹策凌子䇿妄多爾濟那木扎爾其庶兄喇嘛達爾扎執而簒之達瓦齊復因阿睦爾撒納之計簒奪其位達瓦齊者巴圖魯渾台吉之第七子布木之子大䇿零敦多卜之孫於䇿妄為再從姪孫其小䇿零敦多卜則䇿妄之祖巴圖魯渾台吉之弟黙爾根代青之曽孫其去䇿妄世派盖已逺矣先是康熙年間噶爾丹博碩克圖拘繫和碩特車臣汗收所屬人衆併入準噶爾鄂拓克其時有和碩特之拉蔵汗者居唐古忒地即顧實汗之裔也子二人一名丹衷一名索爾扎丹衷由唐古忒仍回至厄魯特娶䇿妄阿拉布坦之女博托洛克為妻後䇿妄阿拉布坦知其學習哈拉爾查達術即巫蠱事也以兩釜夹丹衷身烙死遂令大䇿零敦多卜領兵六千襲西藏擒殺拉藏并擄伊子索爾扎我聖祖仁皇帝勅諭䇿妄阿拉布坦不得繹騷唐古忒地並發大兵進𠞰於是大䇿零敦多卜攜索爾扎逃回厄魯特藏地復平迨雍正年間䇿妄阿拉布坦死子噶爾丹䇿凌欲與唐古忒和好給索爾扎户十資養並以博托洛克與韋徴和碩齊為妻其在丹衷處所生子班珠爾給户五資養彼時博托洛克復有孕未産適韋徴和碩齊後乃生一子是曰阿睦爾撒納故阿睦爾撒納雖為輝特台吉實與班珠爾皆丹衷之子噶爾丹䇿凌死䇿妄多爾濟那木扎爾恐索爾扎之子納哈查逃往唐古忒将伊禁錮至達瓦齊簒立始将納哈查釋放又和碩特羅卜藏車凌者娶䇿妄阿拉布坦之女達什色布騰為妻噶爾丹䇿凌時因羅卜藏車凌率領伊屬萬户欲往土爾扈特遂遣兵擒獲羅卜藏車凌囚之以其妻給韋徴和碩齊二子交烏魯特鄂拓克宰桑伍巴什安置至青海居住之羅卜藏丹津於䇿妄阿拉布坦時逃至準噶爾䇿妄阿拉布坦死後羅卜藏車凌羅卜藏丹津二人謀殺噶爾丹䇿凌嗣因羅卜藏丹津被拘羅卜藏車凌恐亦被囚遂欲逃往土爾扈特故雍正年間我世宗憲皇帝索羅卜藏丹津噶爾丹策凌稱已縛送至中途聞進兵而止者非詐也盖彼業經拘繫之囚故不靳固而且欲以為竒貨也噶爾丹䇿凌於丑年死䇿妄多爾濟那木扎爾年幼其姊鄂蘭巴雅爾同母出也每以善言相勸禁其淫亂䇿妄多爾濟那木扎爾年既長遂不受其禁制並聴讒言謂其姊欲效俄羅斯自立為扣肯汗扣肯汗者女人掌國事也遂将鄂蘭巴雅爾拘繫並殺戮多宰桑其後屠狗盜妻之事無所不為益無忌憚鄂蘭巴雅爾之夫薩音伯勒克遂同噶爾丹䇿凌庶子喇嘛達爾扎攻執䇿妄多爾濟那木扎爾喇嘛達爾扎遂簒汗位有噶爾丹䇿凌幼子䇿旺達什者阿睦爾撒納班珠爾欲誘出䇿旺達什立為汗後被喇嘛達爾扎知覺遂殺䇿旺達什阿睦爾撒納班珠爾二人慫惥達瓦齊云喇嘛達爾扎既将與爾同讐之達什達瓦小䇿零敦多卜之子殺戮恐禍将及爾於是達瓦齊阿睦爾撒納班珠爾三人同逃哈薩克至申年達瓦齊阿睦爾撒納班珠爾復回舊逰牧處阿睦爾撒納遂殺其兄沙克都爾據其衆復與伊犁喇嘛等合謀殺害喇嘛達爾扎立達瓦齊為汗其次即阿睦爾撒納用事二人仍屬親厚有達什達瓦姪訥黙庫濟爾噶爾者欲與達瓦齊分領準噶爾猝率兵一萬至伊犁與達瓦齊戰達瓦齊敗至舊㳺牧額米爾處與阿睦爾撒納㑹因阿睦爾撒納計誘執訥黙庫濟爾噶爾誅之準噶爾衆仍立達瓦齊為汗達瓦齊聴伊犁衆宰桑言與阿睦爾撒納生隙阿睦爾撒納本垂涎汗位既失望遂與班珠爾納哈查及都爾伯特訥黙庫等㑹同哈薩克将額米爾一帶住牧者肆行擄掠且耕種額爾齊斯為自固計達瓦齊凡三遣兵𠞰阿睦爾撒納皆不克其後自領兵三萬至阿睦爾撒納㳺牧之額爾齊斯蹙之阿睦爾撒納勢不敵始投誠來歸此準噶爾始終搆亂所由也至準噶爾鄂拓克昂吉之名各異者鄂拓克為其汗之部屬昂吉為各台吉之户下舊鄂拓克凡十有二烏魯特有四宰桑人五千户為一鄂拓克喀拉沁有一宰桑人五千户為一鄂拓克額爾克騰有一宰桑人五千户為一鄂拓克克里野特有二宰桑人六千户為一鄂拓克卓托魯克有一宰桑人三千户為一鄂拓克布庫斯有一宰桑人三千户為一鄂拓克阿巴噶斯哈丹各有一宰桑共人四千户為一鄂拓克鄂畢特有一宰桑人三千户為一鄂拓克鄂羅岱有二宰桑人三千户為一鄂拓克多果魯特有一宰桑人四千户為一鄂拓克霍爾博斯有一宰桑人三千户為一鄂拓克綽和爾有一宰桑人三千户為一鄂拓克其後復立鄂拓克十有二巴爾達木特有三宰桑人四千户為一鄂拓克庫圖齊納爾有五宰桑人四千户為一鄂拓克噶爾襍特有三宰桑人四千户為一鄂拓克沙拉斯有二宰桑人三千户為一鄂拓克嗎唬斯有一宰桑人五千户為一鄂拓克布庫努特有一宰桑人二千户圖古特有一宰桑人五百户為一鄂拓克烏拉特有一宰桑人三千户為一鄂拓克阿爾闥沁有一宰桑人五百户為一鄂拓克扎哈沁有三宰桑人二千户包沁有三宰桑人一千户為一鄂拓克竒爾吉斯有四宰桑人四千户為一鄂拓克特楞古特有四宰桑人四千户鄂爾楚克有一宰桑人五百户烏爾罕濟蘭有一宰桑人八百户為一鄂拓克明阿特有二宰桑人三千户為一鄂拓克鄂拓克之外復有五集賽阿克把集賽有二宰桑人四千户賚嗎里木集賽杜爾把集賽推素隆集賽伊克胡拉爾集賽各有一宰桑人各一千户其後復立集賽四温都遜集賽善披領集賽各有一宰桑人各一千户桑堆集賽品陳集賽各有一宰桑人各三百户此九集賽辦理喇嘛一切亊務喇嘛有六千餘準噶爾共六十二宰桑二十四鄂拓克一切供賦俱其汗公物其外復取烏梁海及葉爾羌喀什噶爾阿克蘇和闐四城回人租入其二十一昂吉為各台吉所有而統屬於準噶爾之汗昂吉者準語分支之謂也綽羅斯部之達瓦齊一昂吉達什達瓦一昂吉多爾濟丹巴一昂吉噶爾藏多爾濟一昂吉訥黙庫濟爾噶爾一昂吉鄂齊爾伍巴什一昂吉都爾伯特之䇿凌一昂吉達什一昂吉伯什阿哈什一昂吉和碩特之沙克都爾曼濟一昂吉輝特之塔爾巴哈沁薩音伯勒克一昂吉和通額黙根一昂吉多羅特舍楞一昂吉敦多克一昂吉葉克明安巴雅爾一昂吉車凌班珠爾一昂吉巴圖爾額黙根一昂吉察罕圖克阿睦爾撒納一昂吉博洛果特台吉諾海竒齊克一昂吉土爾扈特台吉巴圖爾伍巴什一昂吉吞都布一昂吉共二十一向於西師詩稱二十一昂吉為其汗公屬者盖考之而未詳茲始詳詢縷細如右然各台吉雖分領其昂吉凡出師執役無不聴其汗之令則初所譯者亦未為大差也統計其汗之二十四鄂拓克九集賽及各台吉之二十一昂吉得二十餘萬户六十餘萬口成一部落者百十餘年語云十人成之而不足一人敗之而有餘吾於紀準噶爾之事益見其不爽賈生所謂仁義不施而攻守之勢異雖夷狄之有君豈能外是道哉御製文初集巻二十二
