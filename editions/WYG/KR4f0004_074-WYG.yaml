body:
  text: 硯銘舊龍尾石日月疊璧硯銘舊溪龍尾既琢既追面背受墨左右胥宜合璧其章雙丸日月蹟紀石帆寳雲異説硯左側鐫余於戊辰十月朔登鷹窠頂擬觀合璧先一夕夢見日月如合璧三因琢是硯下鐫亷讓識三字考亷讓為本朝淅江舉人曹三才别號一綂志載鷹窠頂在海鹽縣石帆山相傳十月朔日月同度登絶頂觀之如合璧又西湖志初陽臺在寳雲山頂舊傳葛洪於此吸日月精華錢塘志稱每嵗十月朔旦見日月並升云云則又一説也珎此龍賔盍簮其來律以亷讓吾斯愧哉題澄泥硃墨二硯銘㸃周易艱研理批奏章慎臧否遣興摛詞餘事耳然而無不慙乎爾右珠硯絳縣得材偶倣古近于山西絳縣購得舊澄泥硯材倣古式為之復以餘材别製二硯合貯一匣以供硃墨之用餘製二硯硯匣貯臨池五合之一助叶逮憶蘇言意則憮右墨硯宋端石貨布硯銘置於几曩弗知也掲匣觀覺其竒也與衆商如一辭也果舊端宋之治也貨布形髙眼池也銘而譜胥曰宜也賢久隠是可思也棄以富復足思也疏矣哉吾之為也舊端石子五明硯銘子石天然畧加玉成形橢而圓體潤以貞活眼凡五因號五明如舜之扇寓意實精匪箑之義著文有評向因崔豹古今注言舜廣開視聴作五明扇而後世遂以為扇所自始其誤殊甚佘謂扇乃禮所云闔扇之扇仍是闢四門意而非扇箑之扇曾作五明扇説以明之澄泥虎符硯銘貌其金質其土象虎符詰戎旅彰斯文濟彼武草露布是資汝倣唐蔆鏡澄泥硯銘唐本歙石兹以澄泥澄泥法失求而得之囊沙汾水是陶是炊舊藏古式命匠倣為澄泥法久失傳前嵗閲四庫全書舘所進書内有賈氏譚録載絳縣人善製澄砨硯縫絹囊置汾水中踰年而後取沙泥之細者已入囊矣陶為硯水不涸焉云云因諭山西巡撫巴延三試仿為之一年後巴延三以所造硯材進試其中有可作蔆鏡硯者乃出舊藏硯式命匠製此硯葆光返照厥義入微何求弗得其戒宜思舊蕉白龍池硯銘舊阬之白號蕉葉兮玉潤金堅剛柔協兮既圓而橢製穏貼兮墨池弗涸有波疊兮龍守其珠緯蕭涉兮書而供跳王之帖兮文而寓雕劉之勰兮問誰所珎蕉林篋兮何來西清伴芸笈兮一誦旅獒慚弗愜兮倣觀象唐硯銘古聖觀象意在筆前卦雖畫八理具先天伊誰製硯義闡韋編四維四隅匪方匪圓弗設竒偶全體備焉玩辭是資選石倣㫋滴露研朱用佐窮年蘇軾東井硯銘井者清也可用汲慎王明也井者養也老安少懐聖言仰也如子瞻者雖不能行其志於時東井硯銘足睪思也吾恐明於古而昧於今將為人所􅅓也宋合璧端硯銘取石自然既剖仍合合不見縫刻不見迹方而上斂如風字式月為硯池日為硯頰伊誰八分鏤以合璧匪祥是飾惟文斯洽用以雕龍遜乎其勰宋端石龍馬負圗硯銘石刻硯殊非古也懐鉛槧事可舉也端之阬宋始覩也馬負圗卦之祖也會為一典用數也帝鴻紐或其伍也誰其用莫之考叶也佐文房可與處也掞鴻文夫何有叶也慎絲綸則我所也魏興和甎硯銘扣如金聲聲和緩背識興和年造宛彼其偏安世季晩何有此哉郁翰苑信乎斯文行之逺元趙孟頫松花石硯銘松化石須千年松花有松花江亦有松化石人或取以為礪詎康干唐六帖載囬紇有康干河斷松投之三年化為石色蒼節理猶在云云似其石竞可速化不待千年而成是又記載之未可盡信也松雪翁銘識旃三含一妙理詮木之理尚依然水中變膏受全勝溪石取於端弗礱琢存厥天十三行書以傳兹用兹審愧焉舊洮石黄標硯銘臨洮緑石有黄其標似松花玉珎以年遥惠周惕識語云是臨洮綠石之黄標諦視之與今松花玉相似因其閲年已久銘而譜之比之舊端郊寒島瘦聊備一品圗左史右倣唐蔆鏡硯銘蔆花旉瓣肖厥鏡形匪銅玻瓈石出歙阬唐有此製師古用成惕殷監以自照詎曰摛文是寳宋紫端􅇽星硯銘石割雲硯之成也池􅇽星硯之形也雲净星現以彰文明也用之絲綸慎乎拱北之情也倣澄泥虎伏硯銘吕老所造兹不可得金閶巧煅如伏虎式球琳其質清緑其色置之舊側幾難别白列於文房友乎子墨幾暇怡情揮毫是北每繹旅獒不無慙徳舊端石四螭硯銘理細以潤色黝而紫棄置内庫百餘年已拂之拭之用供綈几如絲出綸惟是慎止繪句絺章則其小矣舊澄泥四直硯銘席上珎文房佐言其質泥以作論其堅石猶過光内韞徳外播墨池銹靈非涴沃心田資清課宜讀易蓍則那坤六二直方大宋澄泥夔紋硯銘撫如石呵生津黄其色夔其文夔者夔也吾因以緬舜命教胄子之為也舊端石弁星硯銘活眼正中如弁冕形擬月則小號之曰星洪範九疇八惟庶徵休咎異若省嵗省成象厥庶民天聴自聴舊阬端石松皮硯銘蕉葉白松皮青堅且潤亷以貞出水岩龍為晴黍谷春硯背銘辭下有黍谷小印似係收藏人之號遍檢宋以後正史稗乘諸書皆無可據按黍谷在今密雲縣即鄒衍吹律回春處收藏之人或鄒姓或居密雲因以黍谷為號未可知也硯田耕唐寅龍尾石瓦硯銘歙之石龍尾最式肖瓦漢製𣲖董其昌以書名唐寅以畫經二人用淬妃快何來朶殿綈几㑹所樂存乎葢無奈唐螭虎石渠硯銘方盈寸有去聲半圍以渠而周銅乎石乎泥乎合一相閲千秋邊幅雖小其用無窮如寸田贊化工宋端石紫雲硯銘紫雲之割夫其誰耶道以為腴守墨池耶閲世幾百永年宜耶滴露研朱又一時耶綸綍是慎繄吾思耶倣晉璧水暖硯銘璧水暖硯王廞所有銘乎宋而虞允文勒賜於唐則李徳裕受承燧乃温既濟卦偶既嘉其用倣以名手雖今古之難齊亦筆墨之堪友即當冬而滴露那虞凍而代酒倣宋歙石龍尾為澄泥硯因製銘龍尾溪也石具玉精製以為硯仍擬龍形緬昔毅甫玉局泐銘爪膚縠理玉徳金聲二語用蘇句一二二一視此陶泓在天利見霖雨蒼生舊端石洛書硯銘靈龜負書出於洛水洪範九疇實肇乎此如日麗天硯池右額上有眼刻作雲捧日信有斯理何人刻背乃圗蘇子月小山髙硯背刻蘇軾後赤壁賦景即因左方小眼刻為山髙月小後游而已擬以不倫吾思其㫖或者雪堂曽弆書几自寫其真與硯為友疑東坡言如是如是舊蕉葉白雙螭瓦式硯銘瓦為硯硯則賔也硯肖瓦瓦則名叶也賔與名幻則均也供染翰實則存也伴綈几慎絲綸也味芸編以淑身也舊端石倣唐石渠硯銘石渠硯唐之製端溪珎宋之貽萃二代為斯器佐文房誠雅致孰鈔書孰習字陳綈几用乃異勑時幾出綸綍惟日慎戒滿志宋四螭澄泥硯銘絳縣秀質琢為八方具有卦義畫肇羲皇文字之始孰尚乎此硯製澄泥静用久矣穆如其古郁若其文四螭游池蜿蜿蝹蝹外泥斯銅内泥斯石識泥於何餘兹墨汁文房雅友憬然以思數百年前用者伊誰宋端石風字硯銘端之石出阬渚風字式近罕覩磨欲穿閲世古誰鑚研膏晷苦今屬誰亦知否叶倣唐蔆鏡硯銘製倣唐石猶宋出古阬成今礱鵒眼一如月銅異鏡明具鏡用百代鑒六義供舊端石玉繩硯銘質堅色潤出自老阬六星一月帯以玉繩綈几染翰宜賔墨卿慎兹綸綍欲正且平括囊硯銘石出舊阬樸且素也先趙後倪端石括囊硯左側鐫趙孟頫呉興二字印記右側有荆蠻民用四字葢倪瓉號也處上聲得其處也刻為括囊夫其意有所寓也在彼則可在吾則以為懼也讜論願聞達聰即所以明目叶也舊端石海日初升硯銘海天初月未央之甎髙濓硯譜倣以向年硯譜有漢未央甎海天初月硯曽命製澄泥以倣之兹獲舊端初日麗天洪波騰躍昭融朗懸曰升曰恒合璧雙全綈几研朱綸綍是宣恵我烝民如被黄棉宋端溪八柱硯銘八柱承天廣運肖乾六書載道因文以傳石出老阬宣和六年硯右鐫宣和六年秋八月製非銅雀之瓦異未央之甎澤於古以餘潤腴乎内以為堅其動也直其静也専顧將資乎綸几渠寜斐乎翰筵舊端石弦文硯銘硯四十枚或銘或詩豈竭吾才不日成之續得硯四十翰林等擬皆入譜題詩系銘閲五日而成率於幾餘㸃筆為之并不淹晷刻也法天行健敦乎象辭倣唐八稜澄泥硯銘昔也泥今則石葆其光堅以澤外象卦中呈璧利筆毫發墨液陶冶功化物無迹育材作人慙莫釋宋端石洛書硯銘下巖石壁誰刻紫雲墨池黝漬龍香氤氲刻作洛負圖書之祖傅説有云事不師古君子之道闇然日章出諸久弆是硯亦係懋勤殿庫貯年久近經翰林等擇取十四方中之一刮垢磨光著書習字均非我事慎兹絲綸惕乾永志舊端石多福硯銘天然多福久弆乾清乾清宫舊貯多福硯天然如蝙蝠形質堅而製樸兹雖刻畫頗類天成色黝而澤面寛且平物必有偶賁來作朋斂時敷錫萬國咸寜宋天然石子端硯銘水阬石子不須磨治以霤蛀處遂為墨池閲幾滄桑穆穆怡怡天與之然何慮何思予獨恧夫吮毫搆韻未能若斯舊端石倣唐石渠硯銘石渠式肇自唐水崖質選其良舊弆王唐石渠硯久藏内府曾經題詠為乾清宫十硯之一此硯形製相仿亦舊物也今得羊一再詠斐文房慎取好增傍徨舊端石飛黄硯銘質細如綿水岩石子兮面製鼓形喻車記里兮背刻飛黄服周方軌兮用佐同文伊犁尺咫兮舊澄泥伏犀硯銘陶汾泥兮畧異鄼侯造無吕字兮知成宋代趙同為舊兮底較年多少刻伏犀兮噴薄墨池表鑑千古兮奚藉燃以照静為用兮永年光則葆宋端石列宿硯銘阬石樸完誰則理之刻以列宿誰則使之墨銹氤氲誰則以之辭彼稡兹誰則徙之求全有毁誰則止之宋端石奎璧硯銘鑿何代宋之春用者誰元之人宋之人宋王孫刻名姓識賞珍供書畫信絶倫榮兮辱難具論奎璧星照以神舊龍尾合璧硯銘歙之溪疏龍尾舊者稀晨星耳磨為硯合璧示匪誇祥就將是學緝熙資窮理舊澄泥倣長生未央瓦頭硯銘澄泥自唐漢未有也以云瓦頭義或可取也同為陶成漢較唐久也世逺年湮真偽率難剖也阮亭竹垞記觀偶也兹弆西清珍之而以為醜也唐澄泥六螭硯銘石渠唐硯久藏内府兮賁來六螭物必有偶兮呵之發潤筆花墨雨兮竟體剥蝕華紋吞吐兮玉尚有焉况斯甄土兮何物永堅為之意憮兮御製文二集巻四十
