body:
  text: 經筵御論仁者安仁知者利仁安仁利仁朱子解之謂安其仁利於仁盖引而未發也雙峰饒氏謂與仁一故曰其仁其者謂已也與仁猶二故曰於仁於者有間也亦即發之矣然曷不於顔淵子貢觀之乎子以為顔淵安仁子貢利仁簞食瓢飲囘不改其樂是安仁也賜不受命而貨殖焉是利仁也囘之安仁易知而難行兹不贅論若夫賜之不受命非富貴貧賤之命也盖天命之謂性率性之謂道率性即安仁也不受命即未能安仁也貨殖者見有利於仁如貨殖之生財耳若謂子貢為貨殖生財之倫則孟子尚不言利而謂孔子以是論賜且與囘相提並較乎史記直以子貢為好廢舉轉貨貲是誠牟利之為甚矣其不知孔門之道矣程子以為子貢之貨殖非豐財然亦少時事至聞性與天道則不為矣然未明言子貢之貨殖為利於仁葉氏則云或者不喻乃謂子貢真好利而亦未明言子貢之利於仁是二子之論胥為近之而於子貢之利仁尚有未達一間者兹故申而明之正徳利用厚生惟和六府三事皆養民之政而惟修惟和則各有其序有由已有不能由已者焉何言之五行之相克相生皆一定之理洩其過補其不足皆可以由有養民之責者之修之也若夫三事之正民之徳利民之用厚民之生雖由於養民者之和之而和豈易言哉正徳在於利用利用在於厚生厚生何在乎在乎使有菽粟如水火耕九餘三或可由善政以致之而時若雨暘綏豐錫屢不可由人力以致之也故惟修可以由已而惟和不能由已必在隂陽之和雨暘以時則此和豈易致哉亦惟祈年慎徳飢溺在懐而尤重於察民隠不諱災或庻㡬其致和此勸歌勿壊之意乎天與賢則與賢天與子則與子天與賢則與賢天與子則與子斯二語也以為答萬章之前問從而為之辭則可以為示後之繼業為萬世法則則不可盖自唘賢繼業之後但有與子無與賢之事矣其有託與賢而攘竊者皆亂臣賊子之流非唐虞之所謂禪也且天何言㢤與賢與子將命者誰以予論之天視自我民視天聽自我民聽民之所與即天之所與然與子雖為萬世不易之規而其敗徳􅈥行恃天之與已而不知凜難諶靡常之義存如保赤子之懐則民必不與之而天亦厭之而不與斯不大可畏乎紂之言曰我生不有命在天此豈非恃天之與已乎吾是以祗申難諶靡常之義而戒負扆者慄慄畏懼以敬天愛民慎守其器而前此之與子與賢胥不必論後此之與子與賢胥不可恃故曰斯二言不足以示後之繼業為萬世法則也至於較年之多少及地之逺近所為愈去愈逺而更甚之乃曰故仲尼不有天下予又以為斯言也仲尼必不為之仲尼而為斯言亦非仲尼而已矣盖孟子嘆王道之不行萬民之受害未嘗無已欲得天下以施號令行王道之意然而仲尼無此心也人非孟子更不可有此心也嗚呼此孔子所以為至聖而孟子祗可稱其亞者乎剛健篤實輝光日新其徳乾剛健而艮篤實此言各具其用而相資以成其徳也盖剛健而無篤實或失之躁篤實而無剛健或失之固躁與固則不能日新其徳矣然乾元之體無所不貫八卦之徳何一非乾徳㢤故在大畜言大畜則曰剛健而濟之以篤實以日新其徳耳夫日新其徳非所謂自強不息乎解大畜者或謂畜之者大或謂能畜其大至於不家食則率謂人君大烹養賢而其臣不食於家予以為家者私也不食於家去私也君與臣胥無私以勑㡬協民有不日新而輝光者乎若夫九二為剛中之臣六五為柔中之主此正剛柔相濟不失其養亦日新其徳之道也若必訓二以說其尤戒五以防其惡是君臣之間先自猜貳矣獨占其一爻者或可曲解然非大畜全體養賢之義兹故申而論之安而后能慮慮而后能得朱子解此以為静就心說安就身說夫静就心說是矣安就身說子以為就意說非就身說也夫不云欲正其心者先誠其意乎盖静在心而動在意由静而動則心正而意誠意誠則安也由是而慮則知致而物格内外交養本末兼施胥止至善之道也是故正心誠意為聖經之關鍵心静不可見意動有所施施出於誠則脩身齊家治國皆由是而推而明明徳於天下矣其所得不已多乎明作有功惇大成裕周公訓成王此二語不惟為政之方抑亦脩身之要也盖明作乃施為之末惇大則涵養之本施為而不出於明作則涉暗而終怠矣涵養而不出於惇大則近逸而寡為矣為學為政内聖外王胥不外乎此至於有功成裕固其自致之效而非預期於其間也是則周公之意豈徒訓王以用其舊臣乎子在齊聞韶三月不知肉味曰不圖為樂之至於斯也咸池六英有其名而無其樂非無樂也無其言故不傳其樂耳若夫舜之韶則自垂千古何以故舜之言垂千古則樂亦垂千古夫子在齊偶聞之耳必曰在齊始有韶夫子聞之之後而韶遂絶是豈知樂者哉司馬遷増之以學之二字朱子亦随而注之則胥未知樂且未知夫子矣盖言志永言依永和聲舜固自言其韶矣然此數語徒舉其用而未紀其實則又繼之以勑天之命之歌臯陶颺言賡載君臣交儆是非樂乎是非韶乎是非夫子所以感其誠而嘆其極不知肉味者以此乎且夫子天縱之聖何學而不能而必於韶也學之以三月而後能乎盖三月為一季第言其久耳而朱子且申之以九十一日知味之說反覆論辨不已吁其去之益逺矣然予以為夫子不圖為樂之語亦有二義焉至於斯者至其極也樂之感人為最深而亦有善不善之殊非樂之罪也在於用之者之人耳樂之善者至其極則惟時惟㡬君明臣良世有不治民有不被其澤者乎樂之不善者至其極則紂之北里之歌靡靡之舞唐明皇之霓裳羽衣世有不亂民有不遭其荼毒者乎此夫子垂訓後世之深意所以有放鄭聲之言也而注書家總未言及之予故表而出之子謂韶盡美矣又盡善也謂武盡美矣未盡善也不圖為樂之義已具前篇兹更以夫子之論舜武以申夫子之聞韶庻乎其有合於聖人之言樂乎夫樂者何律聲言志而已無志則無言無言則無聲無聲必無律依與永則行乎其間而不具體者也是則樂之本在乎志知在乎志則知舜之盡美善而武之未盡善矣何必費辭盖舜性之者也武反之者也舜之勑命時㡬何如其盡美盡善武之度徳度義亦盡美矣謂盡善可乎若以聲容節奏論舜武之樂則武去夫子之時已逺而舜更逺矣其聲容節奏必有所失且徒究聲律而舍志與言非知樂者故予謂韶樂至今存以舜賡歌之言證之然則武之未盡善将何以證之曰雅之下武頌之耆定是其盡美者也至其未盡善者則夫子反魯定三百之時或者有所刪乎予故申其說如此而要以舍志與言無宫商而泥謂有聲無詩者定乎其非知樂者矣栽者培之傾者覆之解是二語者率以栽傾屬之人物培覆屬之天是猶視天與人物為二也予以為天與人物呼吸相通本為一體夫春生夏長非栽者培之乎秋收冬蔵非傾者覆之乎四時代運貞下起元天何容心於其間乎㢤人與物胥在乾元一氣之中人得其全物得其偏則所謂因材而篤之者也天之栽培傾覆一嵗所必有人之栽培傾覆一生所不能無是則栽傾由自取培覆亦由自取惟當順天之常克已之私或庻㡬乎若必求其栽而避其傾是猶有吉凶禍福之見於其心者吾見其不能如四時之運矣天行健君子以自彊不息此教人以聖希天之法也夫士之去賢聖且逺矣而况天乎然而不可無希之之志若不希之是自畫也昔為二希堂記略見斯義且天之行健日日在人目前予以為較聖賢之去人為尤近耳君子以是為法自彊不息焉不庶㡬可希天乎盖所謂自亦有二義一曰自已二曰自然自已尚覺有私自然則無為也無為而不息此天之所行健而人之所當以為法也設曰何以不息則注之曰克已復禮囘也聞一以知十賜也聞一以知二朱子注此以為一與十數之始終一與二數之相對囘與賜之髙下以是而定夫旣云數矣則自一而數至十囘将何以厯而知至十㢤即二為一之對則所謂始終正相對之二也且善惡髙下是非賔主之類其相對者不可屈指數是賜亦可稱盡知且與囘同矣予以為十者上下八方也其數既合其理亦備是囘之知舉一而無不知也夫子示曽子吾道一以貫之正謂此也謂囘為即始而見終則尚有見者存焉盖一以貫之無所為知而無不知正可為聞一知十之證賜之聞一知二則實自用其知推測存焉此夫子之所以與其弗如囘也若以朱注視之則其所知亦不過賜之流而已其去一貫之道逺矣未必似曽子之能聞諸夫子也大禹謨允執厥中允執厥中乃二帝三王所傳之心法心法即治法也心藴内而治施外舍執中無二道也蔡沈注書以為堯之告舜但曰允執厥中盖取論語之言今堯典内無是語也然舜之詳言人心道心之公私必當精以察一以守亦不見堯典也舜之語非堯所授乎精察一守即所謂執中也其下四海困窮天禄永終後漢苞氏注以為窮極四海天禄所以長終盖以為吉言矣而宋朱子注則以為四海之人困窮則君禄亦永絶似以為凶語而予則以為朱子所注得理且非凶語也易曰其亡其亡繋於苞桑為人君者誠念四海民之困窮法文王之視民如傷則必思所以濟民之困窮雖不能博施濟衆而民之困窮者究不無少救亦可保其君禄之善終即洪範九五福之考終命豈不善乎若為君者不思四海之困窮而自恣其樂思欲保天禄之永終得乎因經筵略釋經義故簡而言之以戒萬世之為君者按洪範九五福之考終命自來講家皆主夀終之說予則以為其說未備盖終者謂終其事非終其夀也若謂終其夀則人生胥有之事且既終矣何有於五福舜典言正月上日受終於文祖即始終其事之謂也堯授舜而堯之事終舜授禹而舜之事終人君受命於天能終其事即所謂考終命之福也且以人臣而論受一職能盡其職復膺遷擢是即能終其所受現在之職也人君能終其事豈非能終其天禄乎至漢儒苞咸注四海困窮天禄永終二語謂為政信執其中則能窮極四海天禄所以長終似有規避之意朱子所解似為凶語然實非凶語也人君自警知懼不自滿假即易所謂其亡其亡繋於苞桑非吉語乎予是以謂之得理為君者長存此四海困窮之念則必敬天愛民孜孜勤政雖以四海之大民物之衆不能家給人足而物力則常存愛惜偏灾則優予賑恤亦何至有民不聊生儳焉如不終日之象而兢兢業業守位聚人天禄可以長終福莫大焉此非遷就苞氏之說正與洪範所言考終命者互相發明爾因作經筵論略而未詳兹復申論之君子思不出其位此雖曽子重述夫子之言以兼舉艮大象之語然其義各殊朱傳所引程范均未道及焉盖不在其位不謀其政不過盡已之職無越思耳若夫思不出其位則有二義焉盖位者職也一為不越職一為盡其職不越職猶易盡其職甚難譬之侍郎不思尚書之職尚書不思大學士之職易也然平心自問果各能盡其職哉冡宰掌邦治統百官均四海皆其位中之事司徒掌邦教敷五典擾兆民皆其位中之事果皆盡職乎為人君者協和萬邦闢門明目實皆予位中之事也不能身體力行兢業惶恐之不暇尚何敢有出其位之思㢤且出其位亦更何之乎然而今實有四年後歸政之期則亦所謂過望之思出其位矣然在耄期倦勤者或宜餘不可也唯㡬也故能成天下之務上章明言極深而研㡬極深即所以研㡬非二事也盖深為藴於中㡬乃發於中本祗一原不過微有動靜之别太極動而生陽静而生隂斯豈有内外先後之殊㢤静所以通志動所以成務此聖人所以闡易理也易之道通天地貫古今自虞翻解此章分屬之蓍與卦而朱子遂以易為占卜之書視易小矣其然豈其然㢤予之遲速論中略見之昔用以成功今復以自勉然而見㡬而作克已立誠其難其慎亦惟自知其苦而已敢為侈談也哉至誠無息不息則久此應與易乾象天行健君子以自強不息並觀之盖不息即無息而行健亦無息之行也夫何有為於其間哉然惟天地能之至誠之聖即天地之不息而行健也其乆徵以至博厚髙明之用雖由至誠以顯天地仍即天地以印至誠所謂一而二二而一者也朱子以無虚假間斷注之予以為視至誠為小矣試觀天地四時之運有虚假乎有間斷乎至誠之無息亦如是而已矣然而至誠豈易言哉必其致曲之功形而著所謂無虚假也變而化所謂無間斷也則朱子之言未嘗無見但以此注無息之至誠則尚未造至誠之域耳天聰明自我民聰明天明畏自我民明威天擇人以為君君奉天以治民治民無他術曰安之而已矣夫以民視天逺矣然而不逺也天聰明自我民聰明天明畏自我民明威所謂至愚而不可欺至弱而不可勝呼吸相通照臨有赫人君畏天當知畏民畏民莫若安民而安民又在愛民其道多矣豈語言所能盡㢤惟日孜孜克已復禮或庶㡬乎悠逺則博厚博厚則髙明載物者莫如地覆物者莫如天然天地未嘗自言能覆載也惟其不言是以終萬古而無不覆無不載至誠之功用亦如是而已矣夫豈有所謂博厚髙明之想乎不息之誠久徴悠逺胥在是矣然而至誠之明性也自明之誠教也非生知之聖必當盡思誠之教教豈多乎㢤亦曰無息而已矣其博厚髙明之效豈可捨無息而以意求之乎顯諸仁蔵諸用顯仁蔵用鼓萬物而不與向曽屢言之兹特以顯蔵仁用朱注有所未概者申而論之其自内自外之言吾以為未臻盖徳之發於外外即内也業必有所本本即内也其顯與蔵内外如一方能合天地萬物為一體豈有所謂蔵於此而顯於彼乎不臻此不足以知隂陽不測之謂神小徳川流大徳敦化此應與易象所云天行健君子以自強不息並觀之盖天地之徳無所為大小也以人觀之以錯行代明者為小以並育並行者為大孰知天之行健以敦化者在不息而錯行代明即在其中且錯代仍一行健之所敦又豈能外行健而別有所謂化者㢤朱子注中庸言聖人與天地合徳以明天道予以為聖人法天行健原無大小之分而君子法之自強不息不息者誠也未能如聖人與天地合徳者皆可以自勉豈可自畫謂不能同錯行代明更謂先識其小後習其大斯則與天地在人心之中以及天地人一體之道去之逺矣亶聰明作元后元后作民父母武王此言即申虞舜明目達聰之意也夫聰明非耳目之所能為必如舜濬哲温恭之徳具於内而執兩用中之公施於外則足以作后矣且亶者信也誠也必如是而後可以作元后作民父母洪範所云作威作福亦如是而已矣且聰明出於誠信然後可謂之聰明若作聰明而不出於誠信必有偏私亂章之事又何以作元后以臨民㢤御製文三集巻一
