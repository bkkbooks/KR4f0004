body:
  text: 臣等竊惟文以載道而道出於學道之顯者謂之文而大學之道其極致在乎治國平天下葢功用不足以立治平之極不可以言學其言之不足以裕治平之理其見諸事不足以措治平之業不可以言文我皇上握治要筦道樞以發之為文自御製文初集告成以来敷天之下是訓是行靡不仰暉日月被潤江河凡識字觧文義者共知聖學之崇深聖心之宥宻聖人立言之法所為理明識卓氣盛詞達者相與口沫手胝二十餘年於兹矣即臣等獲直西清皆在初集成編數年或十數年之後服膺之日亦已乆矣及幸逰門觀海争先快覩每一篇甫成傳宣下逮欲窺文中之義理則求古人之説而未之前聞拓下學之胸而何嘗夢見或偶徵引典實採拾原委臣等披尋累日而始得厓畧并有窮於蒐稽而猶煩指誨者更何能仰贊一詞以冀有當萬一顧就籓籬之見求迹象之麤竊欲抒愚臆以申贊頌者盖御製文二集與辟雍同年而觀成也尚書載自堯以来虞夏商皆史臣所紀而非帝王自作舜有歌而無文帝王之文始於文王之彖辭自有虞氏米廩以下二代皆有學至兼四學以為辟雍亦始於文王故文之極盛而學以成皇上復古制建辟雍親臨講學二論具載集中仁敬孝慈信平天下之道也行健不息平天下之本也凡二集四百一十一首之文按籍鑽仰句窺字測無一不闗於治法無一不闗於心法皆聖人所以平天下也故辟雍成而一四學二集成而六五經也詩之詠辟雍曰自西自東自南自北無思不服説經者以為東西南北四學言化之自近也注孟子所引為天下之東西南北言化之被逺也其説雖殊其理則一今讀睿文而無思不服者臣等與圜橋人士横經鼓篋忭舞講習於教思無窮中而天下之心悦誠服極大章豎亥之所歩咸仰流景騖於觀文成化之盛更曷有涯涘也夫臣梁國治臣劉墉臣曹文埴臣彭元瑞臣王杰臣董誥臣金士松臣沈初拜手稽首恭䟦
