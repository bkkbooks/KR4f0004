  text: 欽定四庫全書御製文二集巻六
  hash: sha256:85e24825d6e98de2d3095fc3c8a300fec3543f7708efe7e8d917da996a05aa0b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_040-1a, image: WYG1301/WYG1301-0319c.png}
body:
  text: 説千里馬説或問千里馬果有之乎曰無也無則漢史何以屢見乎曰以其屢見益知其無也何以知其無曰以今之馬例而知之曰今之馬皆凡馬安可以例千里馬曰物必有類焉非其類而擬之則荒唐謬悠不可窮極故無庸愚不足以知聖賢無碔砆不足以知球琳無蜀雞不足以知魯雞無駑駘不足以知騏驥故耳食者道聴而塗説神解者明理而不惑坐吾語汝夫千里馬者亦四蹄而雙耳食草而飲水耳非必八其蹏兩其翼有異於凡馬也今之飛馳驛遞者晝夜限以六百里即加𦂳焉亦不過七百里而止然其一驛間不過五六十里即於是易人易馬而更馳遞千里馬即健行不罷足以當十數匹馬之力於一晝夜間亦不過馳六七百里而止耳安能馳千里乎且馬即能此而乗馬者必不能此使如今驛之易人而乗焉則文帝光武必不能使人易而乗之則其郤之也乃理勢所必然亦何賢之足稱乎鸞旗屬車之言本於文帝詔而光武則以駕鼔車金樓子乃以文帝之言屬之光武固失精核然即賈捐之范􅈌所稱亦豈免善善而躗言哉或曰然則昌黎雜説所云伯樂千里馬者亦無稽乎曰昌黎感時不遇為寓言耳寓言無所不可紀事當從其實余故曰耳食者道聴而塗説神解者明理而不惑蒐苗獮狩説傳稱春蒐夏苗秋獮冬狩各具時義言固引而未發至所稱皆於農隙以講事吾不能無疑焉夫秋冬或有農隙至於春夏則自播種以至刈穫其間耘耨灌溉較晴量雨炙背胝足苦哉耕夫葢無一時之安心息力而謂之有農隙可乎嘗思蒐苗从草獮狩从犬古人制字葢有深意杜注苖為苗除害是矣而所云蒐索擇取不孕者猶未免以辭害義夫禽獸固族聚而類處使擇牡而驚其牝則孕者不能無傷豈育物之仁哉則所為蒐索者亦以蒐索其害苗為當至於獮狩皆从犬則誠守而取之順殺氣而獮之是則春夏之取獸繋乎田秋冬之取獸繫乎獸其義明矣雖然更有説焉古時地廣人稀故田或遊獸而有蒐苗之事以除其害今自腹裏以及邉壌地無不耕安得有禽獸害苖之事乎若夫圍場之地原自不耕則所為蒐索其不孕而肥者與夫初生如苗者以嘗新繹其義亦未嘗不通而實非古人所解者矣三老五更説三老五更之説不見於詩書其見於禮記者葢出乎漢儒非孔子之言惟左傳三老凍餒之文為冣古然傳謂公聚朽蠧而三老反不見飬遇非與五更相提並論也注三老五更者多矣或謂上中下夀或謂工商農而不及五更出左傳孔疏或謂明天地人與五行之事出白虎通或謂取象三辰五星出後漢書禮儀志或謂知三徳五事者出鄭康成禮記注各以億度不堪僂指矣至蔡邕獨斷乃有父事兄事之説而白虎通之謬直以為老更各一人且曰父一而已不宜有三吁可怪哉天子飬老即所以教孝於天下何至以父事之且即其説父一而已則天子已自有父今復事一人是非二父乎腐儒執虚文而謬大義真不值一噱耳邕復解更為叟謂豕亥之訛夫叟與老同既有老又何藉叟為哉予以為三者天地人之數飬老自以三舉其數耳若夫五更則更事之説為近而五倫五常莫不具於此人數不必其備行之以敬誠愷悌則中和位育將在是矣後儒一切穿鑿之論何足數哉記里鼓車論記里鼓車始見於黄帝内傳而晉輿服志因遂有其名且傳其製耳食者或以為竒智者必知其妄也葢記里與指南並傳指南則可記里則不可何則指南鍼鐡以磁石向南定之其鐵必南向雖移以他向仍必向南置車中以誌南固可今之海舟無不用是物以知南北方向其明證也若夫記里謂車行一里則鳴一槌無是理也地有險夷馬有遅速行險必遅行夷必速何以定其里乎常以西洋表置車中藉以知時耳偶行速一時可三十里行遅一時不過二十里葢表之轉動有凖而車之遅速不定以是證之益知記里之無其事而玉海張綱補緝之説更定其無稽矣古稀説余以今年登七袠因用杜甫句刻古稀天子之寳其次章即繼之曰猶日孜孜葢予宿志有年至八旬有六即歸政而頥志於寧夀宫其未歸政以前不敢弛乾惕猶日孜孜所以荅天庥而勵已躬也正夀之慶羣臣例當進獻辭賦於是彭元瑞有古稀之九頌既以文房䓁件賜之以旌其用意新而遣辭雅顧一再翻閱頗有不得不為之説以申予意者其詞曰古人有言頌不忘規兹元瑞之九頌徒見其頌而未見其規在元瑞為得半而失半然使予觀其頌洋洋自滿遂以為誠若此則不但失半又且失全予何肯如是夫由斯不自滿歉然若有所不足之意充之以是為敬天之本必益凛旦明母敢或渝也以是為法祖之規必思繼前烈而慎聰聴也以是勤民庶無始終之變耳以是典學為實學以是奮武非黷武以是籌邉非鑿空以是制作非虚飾若夫用人行政旰食宵衣孰不以是為慎修思永之樞機乎如是而觀元瑞之九頌方且益深予臨深履薄之戒則其頌也即規也更惓思之三代以上弗論矣三代以下為天子而夀登古稀者纔得六人已見之近作矣自三代以下帝王年逾七十者漢武帝梁髙祖唐明皇宋髙宗元世祖明太祖凡六帝昨七旬慶典詩有七旬屈指數今古六帝因心騐法懲之句至夫得國之正擴土之廣臣服之普民庶之安雖非大當可謂小康且前代所以亡國者曰强藩曰外患曰權臣曰外戚曰女謁曰宦寺曰奸臣曰佞倖今皆無一仿彿者即所謂得古稀之六帝元明二祖為創業之君禮樂政刑有未遑焉其餘四帝予所不足為法而其時其政亦豈有若今日哉是誠古稀而已矣夫值此古稀者非上天所賜乎天賜古稀於予而予設弗以敬承之弗勵慎終如始之志以竭力敬天法祖勤政愛民古云適百里者半九十里慄慄危懼誠恐耄荒而有所隕越將孤天恩予又何敢如是然則元瑞九頌有禆於予者大焉故為之説如右羣臣獻辭賦者甚夥大約不出於元瑞之九頌予將以是説概之則所為有頌而鮮規者亦畢視之為進規而非啻頌矣解雲上於天解嘗讀易需之大象曰雲上於天需音義者於上字發圏讀為上上聲於是程傳遂有雲氣蒸而上升於天之語審如是是雲仍在天下非乾下坎上之義也盖伏羲設卦因隂陽本然之理非强為之辭孔子於釋卦名卦辭之後而加之以大象者亦因陰陽本然之理而非强為之辭也怪力亂神夫子所不語恐人求之奇也是以變其文曰雲上於天雲即水也然而程子雖不求之奇而已失其義矣盖上仍應作去聲讀為上下之上是坎在上而天在下也或曰天無在水下之理則予有説焉且人知水之在地上而不知地之在水上也或知地之載於水而在水上不知天之在水下也何言之天為圓體元氣運之以行周天三百六十五度四分度之一日夜一周而不息其在上者穆穆清清舉頭視之為天其在下者囫囫圇圇右旋而輪轉者獨非天乎知地之在水上則可知天之在水下天無不包其在水下之時非坎上乾下之需乎需者待也待其輪轉而上則為天水訟而違行有所不免矣此至平至易之理耳夫知天之有在水下之時則若地若雷若風若火若山若澤均有在天上之時可推而知此實八卦本然之象不必求諸神奇謬悠之談也夫善言易者不言易若吾斯所言得毋乖言之義乎若夫葛洪渾天之説謂天表裏有水引黄帝水在天外之説以證之黄帝之説不見於經然黄帝自是天裏之人裏之末窮表何能知如是是水外於天而大於天矣且水之外當更有天矣此與釋家之㣼利道家之禹餘又何異乎夫子之所謂雲上於天者或亦有懼於類斯之語乎晉天文志之引葛洪其亦未之思而已御製文二集巻六
