body:
  text: 碑文實勝寺碑記去嵗夏視師金川者久而弗告其功且苦酋之恃其碉也則創為以碉攻碉之說將築碉焉朕謂攻碉已下策今乃命攻碉者而為之築碉是所謂借寇兵而資盜糧者全無䇿矣為之懣然因憶敬觀列朝實録開國之初我旗人躡雲梯肉薄而登城者不可屈指數以此攻碉何碉弗克今之人猶昔之人也則命於西山之麓設為石碉也者而簡佽飛之士以習之未逾月得精其技者二千人更命大學士忠勇公傅恒為經畧統之以行且厚集諸路之師期必濟厥事賴天之祐大功以成此固經畧智勇克兼用揚我武酋長畏威懐徳厥角請命是以敵愾以往者率中道而歸竊恨未施其長技有餘怒焉記不云乎反本修古不忘其初雲梯之習猶是志也而即以成功則是地者豈非綏靖之先聲繼武之昭度哉因命擇向庀材建寺於碉之側名之曰實勝夫已習之藝不可廢已奏之績不可忘於是合成功之旅立為健銳雲梯營並於寺之左右建屋居之間亦依山為碉以肖刮耳勒歪之境昔我太宗皇帝嘗以偏師破明十三萬衆於松山杏山之間歸而建實勝寺於盛京以紀其烈夫金川蕞爾窮番豈明師比然畧昆明而穿池勝僑如而名子其識弗忘一也漢書訓碉作雕碉為石室而雕則若雕鶚之棲云者皆非是蓋西南夷語彼中呼樓居其音為碉云爾重建壽皇殿碑記予小子既敬循壽皇殿之例建安佑宫於圓明園以奉皇祖皇考神御重垣廣墀㦸門九室規模畧備而嵗時朔望來禮壽皇聿瞻殿宇嵗久丹雘弗煥且為室僅三較安佑翻遜巨麗予心歉焉盖壽皇在景山東北本明李遊幸之地皇祖常視射較士於此我皇考因以奉神御初未擇山向之正偏合閟宫之法度也乃命奉宸發内帑鳩工庀材中峯正午磚城㦸門明堂九室一仿太廟而約之蓋安佑視壽皇之義壽皇視安佑之制於是宫中苑中皆有獻新追永之地可以抒忱可以觀徳傳不云乎歌於斯哭於斯則壽皇實近法宫律安佑為尤重若夫敬奉神御之義則見於安佑宫碑記兹不複述惟述重建本意及興工始末嵗月蓋經營於己巳孟春而落成於季冬上澣之吉日云敬作頌曰惟堯巍巍惟舜重華祖考則之不競不絿叶仁漸義摩祖考式之宏仁皇仁明憲帝憲小子職之是繼是繩叶曰明曰旦小子恧之天遊雲殂春露秋霜予心惻之考奉祖御於是壽皇予仍即之製廣向正叶爰經爰營工勿亟之陟降依憑居歆攸寧羮墻得之佑我後嗣緜禩於萬匪萬億之觀徳於茲無然畔援永欽識之碧雲寺碑文西山佛寺累百惟碧雲以閎麗著稱而境亦殊勝巖壑髙下臺殿因依竹樹參差泉流經絡學人瀟灑安禪殆無有踰於此也自元耶律楚材之裔名阿利吉者捨宅開山淨業始構明正徳中稅監于經為窀穸計將以大作功徳而寺遂廓然焕然至魏忠賢踵而行之奢僭轉甚夫奉佛者不廢莊嚴要以清淨為本如梵夾所載人天供養窮極珍異皆本清淨為莊嚴也否則汙法席而玷山靈何福田利益之有雖山體常新如如不動初無纎毫增損而自人事觀之有足慨者當明政不綱椓人專恣鬼神為之怨痛猶欲佞佛以求庇於地下而為其上者方且假以寵靈錫之題額若惟恐其香火之不延宅兆之不固厥後罪惡貫盈刑誅踵接而穢跡之標揭於林莽間者迨易世迺克剷除追惟末造誰實尸之斯足為車鑒也已朕駐蹕靜宜園時過此寺樂觀林壑之美而念古刹之有待於䕶持也爰命重加整葺喜其滌瑕盪穢而復為淨域因筆之於石用垂戒焉金剛寳座塔碑文昔如來成等正覺必坐菩提道塲盖法王人王有世出世間之異而居尊御極其理則同故寳座莊嚴所以正天人師之位也佛威神力能使六種震動而當其初轉無上法輪轉一切天人所不能轉則地為普動以應之惟道塲安立之區常住不動其地乃三千大千世界之中上極金輪下侵地際金剛所成周百餘步如須彌之隠於沙界而露其巔去來諸佛並於此坐而入金剛定以是名金剛座焉摩揭佗國鉢羅笈山聖蹟彰明諸方信嚮佛滅度後座隠不見諸國王乃以銅觀自在像南北標識其處厥後又仿浮屠之制笵金為座以便供養平臺特起周帀嚴淨象道場廣輪之所極也五塔岳峙各具寳相象佛之徧歴四隅而常依止中座也西域流傳中土希有乾隆十有三年西僧奉以入貢爰命所司就碧雲寺如式建造尺寸引伸髙廣具足勢同地涌望擬天游賢劫祖庭實在於是夫塔廟之設類以藏舎利齒髮為過去崇奉地耳此座獨表法王御世之初威徳尊勝若是其靈異顯著將人天瞻仰恍如佛日之方中而神力之所加持固有歴劫不傾者成此善果因備述其縁起云香界寺碑文香界寺在香山迤南故為平坡寺不知其所由始蓋古刹也其後名聖感寺康熙中僧海岫薰修於此經營十載重事鼎建皇祖聖祖仁皇帝嘗再幸其地賜御書榜額且製碑文勒石紀焉閲今數十年丹青剥落庭宇且就荒寂朕駐蹕靜宜園間於幾暇游覽近地偶叩禪扃瞻仰宸翰雲霞暉麗照灼猶新剔蘚捫碑具悉始末因出内帑命將作撤而新之易其名曰香界夫西山巖壑幽邃峯岫環暎林泉烟靄隨處具有佳致精藍梵宇逺近相望皆足為名山増勝槩而朕意所存自以皇祖經臨永昭神蹟香林法界允宜敬謹䕶持又不獨智仁山水之樂云爾爰刻文碑隂以誌嵗月梵香寺碑文朕既於勇健營旁近建實勝寺其南有梵香寺者亦古招提在西山諸刹中未為宏麗而爽塏不下實勝爰命所司以餘材飭而新之為衆生利益在昔佛告精進菩薩摩訶薩受持法華成就八百鼻功徳以是清淨鼻根聞於三千大千世界上下内外種種諸香皆能分别又香積如來以衆香鉢盛滿香飯與化菩薩悉飽衆㑹夫禪那脫離塵垢腥濁眼耳鼻舌身意常滿清淨妙香所住世界安隠快樂舉成華藏世界海中妙華光香水海隨身衣食無非清淨是為梵香法界以是因縁發大慈悲願以清淨妙香普度恒河沙數衆生舉登安樂壽命世界永離刀兵腥穢一切苦惱以所被香祴爲衆生本分衣舉得温適所飽香積為衆生本分食舉得饜飫從上諸佛普證是言散旃檀沈水及千萬種華香於三千大千世界齊須彌山為佛供養與此功徳初無有二用刻堅石傳示未來歴無盡際重修惠濟祠碑經國之務莫重於河與漕而兩者必相資而成曩者東南之民數厪河患矣我皇祖聖祖仁皇帝亶天縱之神明乾苞坤絡瞭列指掌清蹕屢勤比隆神禹開示方畧神契龜從用詒萬世無疆之休河臣禀受聖謨罔失尺寸若隄若遥隄若縷隄若月河若引河若壩若堰若牐措必其要用必其時河奏安瀾民無昏墊成績彰灼五紀於茲天庾陳紅雲帆直達厥包織篚琛賮南金公私百貨之需船輸艦載楫交津渠溯前代南北運道逆河而上者五百餘里明季開泇河避黄河之險者三百里越我朝康熙年間開皂河以通泇復開中河以通皁漕艘出清口絶流北入中河浮于黄者僅七里遂盡避黄河五百里之險漕之利無過此時者黄河自積石龍門徑豫徐東下挾淮泗交流入海勢湍悍不可禦泥濁易閼漕艘渡江達淮黄河亘其衝其入中河也必資於黄治之之道以清淮迅激蕩滌之俾無壅沙河恒强淮恒弱則瀦洪澤之巨浸以助之交㑹於清口是為運道之樞紐河防之關鍵導河乂淮利漕舉繫於此瀕河迄下游郡縣數十城郭田廬皆恃以為命司水土者恒惴惴焉清口治而河與漕胥得其理矣清江浦之涘神祠曰惠濟鼎新於雍正二年靈貺孔時孚應若響過祠下者奠醴薦牢靡敢弗肅乾隆十有六年朕巡省南服瞻謁庭宇敬惟神功庥佑宜崇報享命有司鳩工加焕飾焉夫名山大川精氣磅礴必有神焉主之經國大政芘賴生靈必有神焉相之其顧享者必其有勤民敬事之忱者也苟隳庶事而瘝厥官或穿鑿自用而失其故有弗干譴怒而罹其罰者乎政罔弗修無貽神羞敬舉乃職神錫爾極惟神式憑庶永厎寧勒文貞珉用諗河臣遂為迎神送神之歌辭曰河之來兮天上晧晧旰旰兮無與抗瀰瀰兮清淮滙淪漣兮河流湝湝峩巨艑兮横中流望靈旗兮澹淡游桂檝兮荃橈紛弭節兮蘅臯縆絃兮考鼓俎肥牷兮式歌且舞神格歆兮福女千夫邪許兮搴長茭鞏金隄兮障彼樂郊鄂舟容與兮吳榜交溯長川兮利濟轉玉粒兮時攸賴洪濤伏兮神哉沛簫管競兮應櫂歌神之留兮祥飇和紹平成兮恪蕆事飫苾芬兮䖍報祀靈河翕兮福萬世萬壽山大報恩延壽寺碑記欽惟我聖母崇慶慈宣康惠敦和裕壽皇太后仁善性生惟慈惟懿母儀天下尊極域中粤乾隆辛未之嵗恭遇聖壽六袠誕辰朕躬率天下臣民舉行大慶禮奉萬年觴敬效天保南山之義以甕山居昆明湖之陽加號曰萬壽剏建梵宫命之曰大報恩延壽寺殿宇千楹浮圖九級堂廡翼如金碧輝映㸐香燈函貝葉以為禮懴祝嘏地朕惟人子之於親恩罔極則思報之心與為罔極而報恩之分恒不能稱其思報之願凡所為祝釐頌嘏修香光之業開法喜之筵於申報曷能以毫髪數亦隨時隨地致其愛慕誠悃云爾我聖母至仁廣被如大雲起雨一切卉木藥草隨分受潤慈心善質自足以緝純嘏集遐福盛徳之致福永年固有不求而至焉而茲復以祗陀布金之園為灌佛報恩之舉金盤炫日則光照雲表寳鐸含風則音出天外法鼓洪響偈頌清發於以歡喜讃誦不更有以廣益福利緜逺増髙為聖母上無量之壽哉自今伊始其以茲寺為樂林為香國萬幾之暇親奉大安輦隨喜於此前臨平湖則醍醐之海也後倚翠屏則阿耨之山也招提廣開舎利髙矗則琉璃土而玉甖臺也散華葳蕤流芬飛樾旃檀之香遡風而聞迦陵之鳥送音而至我聖母仁心為質崇信淨業登斯寺也必有欣然合掌喜溢慈顔者亦足為承懽養志之一助且山容清淨貞固恒久寳幢金刹日月常新藉兹山之命名申建寺之宏願春暉寸草之心與俱永焉爰為之記并依般若四聲作祝頌曰佛言慈善根廣受諸利益如繅能藉玉如磁解吸鐵又言布施力指期得果報如尼拘類樹嵗收實數萬洪惟我聖母聖善實性生至仁䕃世界慈氏再出世譬猶黍谷吹葭管纔一動萬物盡和煦藹然遊春温以此無量徳致彼無量福五福壽最先壽量不可説我欲報罔極亦復何以加寳篆鏤精璆瓊冊鐫華玉繄聞香光業供養利人天堪以無礙施廣益無量壽遂効呼嵩祝耆闍崛移來更闢甘露塲祇樹園布就青鴛大蘭若堂殿八九重鐵鏁界百道鈴鐸半空響後有舎利塔直上凌虚空髙懸金露盤去地百餘丈中為無垢地處處白銀堦塗壁百品香窣地七寳飭堂堂蓮華座寳相何莊嚴湧現白毫光圎容規滿月其餘大菩薩羅漢及金剛金縷伽梨衣各各端正在寳刹初告成聖壽聿屆臨綵幢華蓋中䖍修佛頂㑹以何備供養新鮮五莖花摩勒果萬枚伊蒲饌千斛又何備供養五綵氊􅉊毺新羅紫金鐘祗洹青玉鉢環繞禮法懴膜拜復唄誦牟尼一串珠徧繙榆欓函轟轟法鼓震琅琅銅鈸響薝蔔散馥郁慧燈發光明維時十方界無不生歡喜龍天八部中一聲齊讃歎天女散香花衆花紛紛下拈花䖍頂禮敬上無量壽亦有大迦葉如聞緊那弦起作小兒舞敬上無量壽最後如來佛降自忉利天手持千葉蓮敬上無量壽聖壽本無量更有無量加無量復無邊萬萬千千嵗以茲福徳地常作快樂園時駕紫罽車來此一隨喜喜林大蔥鬱樂樹髙婆娑四望種福田三界選佛地朝朝承聖歡嵗嵗奉慈輦延此無量壽敬報罔極恩御製文初集巻十八
