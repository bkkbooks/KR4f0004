front:
  text: 欽定四庫全書御製文餘集巻一
  hash: sha256:c3d586e4141f242d7d2c0607c14787e2efe7e27741dcad92ea7368950e8974f3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_099-1a, image: WYG1301/WYG1301-0686c.png}
body:
  text: 詔丙辰元日傳位子皇帝並却上尊號詔朕纉紹丕基撫綏圅夏勤求治理日有孜孜仰賴上天眷佑列聖貽謀寰㝢乂安蒸黎康阜聲教四訖中外一家御極以来平定伊犂回部大小金川擴土開疆數萬餘里緬甸安南廓爾喀以及外藩屬國咸震懾威棱恪修職貢其自作不靖者悉就殄除功逮十全恩覃六合普免各省漕糧者三地丁錢糧者五展義巡方行慶施恵蠲逋賑貸不下數千萬億振興士類整飭官常嘉與萬邦黎獻海隅蒼生同我太平躋之仁夀朕持盈保泰弗懈益䖍勤念雨暘周諮稼穡於庶言庶獄庶慎靡不躬親宥宻單心時幾交勑用亹上副祖宗付畀之重下撫億兆仰戴之誠日慎一日六十年於兹矣迴憶踐阼初元曽黙籲上蒼若紀年周甲當傳位嗣子不敢仰希皇祖以次増載今敬迓洪釐幸符初願朕康強逢吉九旬望袠五代同堂積慶延祺光於往牒非昊慈篤祜申命用庥曷克臻此天生民而立之君使為司牧授受之際敢不兢兢溯自癸巳南郊即以嗣位皇子之名黙奏上帝並於盛京恭謁祖陵敬告烈祖在天之鑒昨冬頒朔屆期特宣布詔㫖明定儲位以丙辰為嘉慶元年預勑所司敬議歸政典禮皇太子秉性謙沖臚誠固讓率同内外王公大臣等具章請朕至百嵗始行斯典但天聴維聰朕志先定再四申諭勿得懇辭皇太子仁孝端醇克肩重器宗祏有託朕用嘉焉已諏吉祗告天地宗廟社稷皇太子於丙辰正月上日即皇帝位朕親御太和殿躬授寳璽可稱朕為太上皇帝其尊號繁文朕所弗取毋庸奏上凡軍國重務用人行政大端朕未至倦勤不敢自逸部院衙門及各省題奏事件悉遵前㫖行履端首祚禪授上儀宜沛新綸同敷愷澤布告天下咸使聞知諭重舉千叟宴加恩百嵗夀民等諭本日舉行千叟宴京畿及各旗籍兵民踴躍偕来相預盛典龎眉皓首矍鑠盈廷實為吉祥盛事業經分别加恩普加賞賚並各加賞緞疋銀錁外所有老民熊國沛年一百六嵗邱承龍年一百嵗尤屬昇平人瑞俱著加恩賞給六品頂戴其九十以上老民鄧永玘梁廷裕閑散覺羅烏庫里歩甲文保舒昌阿馬甲王廷柱内務府閒散人田起龍王大榮俱著賞給七品頂戴以示引年養老敷錫夀祺至意授受禮成申示撰進頌冊諸臣諭本年舉行傳位大典大小臣工撰進冊頁朕幾餘披閲多有稱頌功徳揄揚盛美其辭未免過諛實甚慚愧朕御極六十年来敬天勤民用人行政一切實心實事天下臣民所共見共聞今将諸臣所進各冊遴其措詞尤雅者以備觀覽自宜酌加奨賚特将内庫蔵貯蟒袍緞疋荷包等件分别頒賞以志一時賡颺之盛惟冊内間有稱乾隆六十一年者雖係臣下頌禱之詞但朕自御宇初年即焚香敬告上蒼若紀年周甲當傳位嗣子不敢仰希皇祖以次増載之數節經眀降諭㫖宣示中外今敬迓洪釐幸符初願新嵗大廷授璽鉅典矞皇實史冊所罕覯朕仰邀昊眷精神純固於巨細政事仍當躬親綜攬弗懈益䖍至於授時頒朔已書嘉慶初元若於乾隆六十年後復以次増紀轉非朕當日籲天不敢同皇祖之初志即嗣皇帝於年前率領王公大臣等恭進乾隆六十一年時憲書百本朕亦祗令於宫廷陳設及頒親近王大臣而各省頒行仍俱係嘉慶年號内外章奏亦一體令書新元可見朕志先定積久弗渝今自元辰授位時序均調現屆中和節已沛春膏優渥視往嵗更為暘雨應時此皆朕誠意久孚於黙禱初心不敢稍有踰越用能懋膺景貺篤祜延釐而諸臣獻冊臚忱既過於頌禱又兼懐觀望未能深喻朕志特此再行明白宣諭用示朕凝承天命永矢敬誠至意再免湖南湖北明嵗應徵錢糧諭湖北教匪滋事肆行劫掠焚燬邨荘業經官兵屢加𠞰殺而該省紳士百姓等能知大義團練鄉勇隨同官兵打仗殺賊實屬可嘉湖南省𠞰捕苗匪現在首逆就獲官兵即抵乾州指日大功告蕆苐念附近苗疆地方多有被苗匪蹂躪占種田土民人不免失業即軼逺各州縣運解糧餉軍需等事亦不無有資民力朕心深為軫念宜加渥澤以示體卹除該二省被賊擾累地方業經加恩分别蠲緩外著再加恩将湖南湖北二省来嵗應徵錢糧俱行豁免俾被擾失業者得以復其生計而急公出力者亦可更資温飽並著該督撫速行謄黄宣示務令鄉邨僻壤咸使聞知用示朕恵鮮勞来有加無已至意蠲承徳府屬眀嵗地丁錢糧諭本年係朕傳位為嗣皇帝元年仰蒙昊蒼眷佑累洽重熙朕同皇帝駐蹕山荘雨暘時若秋成上稔景象恬熙允宜特沛恩施行慶敷錫但承徳府及所屬今嵗本係輪免之年秋收又屬豐稔所有該府及所屬州縣眀年應徵地丁錢糧俱著加恩普行豁免俾駐蹕地方小民益臻饒裕以示施恵邉氓有加無已至意該部即遵諭行知務使窮鄉僻壤咸諭朕意命蠲免湖北被擾州縣及附近之湖南龍山四川酉陽地方本年應徵錢糧諭前因湖北賊匪滋擾業将枝江宜都長樂長陽東湖當陽逺安七縣降㫖緩徵續據畢沅等奏歸州興山南漳榖城宜城光化均州鍾祥竹山竹谿房縣保康来鳯等州縣並湖南之龍山四川之酉陽州均有賊匪搶掠雖指日大兵雲集無難尅日蕩平但念各州縣當賊匪蹂躪之餘未免流離失所且各處鄉勇人等義切同仇守城殺賊奮勉出力甚屬可嘉著加恩将前經緩徵之枝江等七縣並續被賊擾之歸州等十三州縣及湖南之龍山四川之酉陽州本年地丁錢糧均即全行豁免以示優恤而昭激勸命蠲免四川達州陜西漢中興安所屬被賊地方来嵗應徵錢糧諭現因四川達州並所屬之新寧太平東鄉地方教匪滋事並闌入陜西漢中府所屬之西鄉及興安府之安康平利紫陽等縣業經官兵痛加𠞰洗不日自可撲滅淨盡苐念各該處被賊滋擾召募鄉勇堵禦並運送軍糧耕作不無失時殊堪軫念現在已屆嵗底本年應徵錢糧自已全完所有四川達州新寜太平東鄉並陜西漢中府屬之西鄉及興安府所屬之安康平利紫陽等州縣眀年應徵地丁錢糧俱著交該督撫查明普行豁免以示朕恵愛良民格外恩施至意命蠲免貴州南籠安順貴陽所屬地方未完銀榖及本年應徵秋糧諭南籠狆苖滋擾安順貴陽所屬州縣邨寨多被焚掠不特麥收無獲即秋成亦屬失望該處本年地丁錢糧改徵等項均奉恩詔輪應全免惟上屆嘉慶元年錢糧各款例應於次年奏銷以前徵觧現在被難民人尚需接濟撫綏力難完繳所有南籠通府屬地方安順府及所屬普定郎岱鎮寜並貴陽府屬之廣順定畨長寨等處各㕔州縣上年應徵錢糧改徵米石除已經報觧外其未完銀榖等款著加恩與嘉慶二年應徵秋米正耗全行蠲免以紓民困再免貴州興義永豐等處一年錢糧及奨賞兵勇諭據勒保奏官兵攻克普坪後乗勝渡河進擊殱斃賊匪無數拏獲緊要賊目餘俱潰散官兵至南籠城内難民男婦數萬均来迎接當将裹帶糧食及連日所獲賊糧按名散給並即𣲖員賑撫一摺興義府城受困半載城内紳士民人等深眀大義晝夜備禦捐助薪米得以同心協力固守無虞今勒保解圍到郡見城内難民口食不敷情形已極疲憊實堪憐惜所有興義應徵錢糧著該督查眀蠲免一年其餘被賊滋擾地方如永豐冊亨捧鮓黄草壩及粤滇邉界被擾各等處亦均著該督撫查眀各免一年錢糧俾閭閻元氣漸復民力寛裕用副軫懐其守城兵勇均著加恩賞給一月錢糧口糧以示奨勵命蠲免四川夔州府屬眀年應徵錢糧諭前因達州及所屬東鄉太平新寜等處賊匪滋擾上年冬間降㫖将該州縣本年應徵錢糧蠲免今夔州府所屬地方復有教匪䦨入經官兵分投𠞰捕諒可即就撲滅但念各該處運送軍糧及召募鄉勇堵禦耕作不無失時本年業已開徵錢糧自已陸續輸納所有夔州府屬之奉節巫山雲陽萬縣開縣大寜等六縣眀年應徵地丁錢糧著該督查眀概行豁免用示朕軫念閭閻猝被兵燹施恩體恤至意記匣衍記匣衍記有三一以誌交泰殿所蔵御用國寳一以誌端凝殿所蔵御用朝珠乾清宫為正殿東西兩廊為長廡東廡中三楹為端凝殿取端冕凝旒之義是以御用冠袍帶履俱貯於此香及列聖所御冠服朝珠圴恭貯其南三楹盖因貯蔵西洋鐘表等項是以沿稱為自鳴鐘實仍統於端凝殿也詳見國朝宫史其西廡中三楹為懋勤殿取懋文勤武之義故以貯典籍文房其南三楹則每日所進閣本批票之處皆係内閣侍讀中書等官入直者司其收發仍係内閣大學士所轄不似眀季一任秉筆太監髙下其手此我朝制度之善所以迥越前代也一以誌夀皇殿所蔵御用諸璽予即位之初承三朝所貽御物頭緒紛繁中使無晰理明文之人屏當或致顛倒初政無暇及此也乾隆十一年春始因交泰殿舊蔵國寳記載流傳其數失實爰取周易大衍天數二十有五之義定為二十有五之數詳見本殿記又於乾隆十七年春閲乾清宫東廡之端凝殿恭貯列聖禮服所御朝珠更定為二十五層之匣以俟奕葉按代遞用亦詳見本殿記復於乾隆四十六年冬敬将聖祖世宗常用諸璽及朕自青宫至御極以来數十年中所用諸璽製為寳藪匣並豫􅏻空冊亦定為二十五層蔵於夀皇殿以備将来依次存貯簽用世為法守右此尊蔵三大事予皆定以天數二十有五者其義亦有說乎曰有說盖天子所重以治宇宙申經綸莫重於國寳而渉筆記事之璽即其次也我國家禮服飾以朝珠祖宗所御典禮攸存定寳數之時宻用姬周故事黙禱上蒼祈我國家若得仰䝉慈佑厯二十五代以長斯亦韙矣此實侈望然郏鄏定鼎卜世卜年已著其例敬思自古以来未有一家恒享昊命而不變者此意恒存於心而不敢言茲予以難期八十有六嵗之侈望而得符願傳位授政實賴鴻眷或者侈望我大清得享號二十有五之數亦可俯賜符願乎夫卜世卜年固在人而賜世賜年則在天叨天之佑非敬天愛民無别道而此敬愛之心若一時有間欲希昭鑒弗可得此不大應懼乎子所以因昊貺而愈侈望愈憂惕䖍為是記以示奕葉之聰聴者觀瀑亭紀實記按亭仰對石壁俯臨溪水石壁名為湧翠巖亦皇祖御題也其上三間佛宇傍有池瀑水瀉自池擘石壁而出飛流落長溪溪上構亭觀瀑所以得名也但瀑之源乃出佛宇傍之池而池中實無泉源康熙年間於兹寺西厯數谷壑尋得一山泉接木板匣為溝渠沿山邊谷壑引流至寺池乃擘石壁而下則誠飛瀑矣飛瀑誠真飛瀑乎以皇祖聖眀無微弗照不過藉司工者之巧為託綴景之虚名而已其後朕視木板匣為溝渠置山邊不雅且每費修飾因循其上山逕側果有一小泉命建一亭名曰瀑源事在己夘年鳩工疏山邊為溝渠越壑過谷引流曲折以達於湧翠巖之寺池則真有瀑源矣兹又閲數十年往来山徑中覺其泉細而石罅噴乳竇處復低於寺側之石池且越數層谷壑之逺無論木石之渠溝胥不能引細㣲且逺之泉以達寺池為飛瀑則所謂飛瀑者不過人轝置水滿寺池使洩而為飛瀑耳我皇祖不名之曰聴而名之曰觀或亦知其假借而寓有深意乎且予命以石溝易木匣之時未曽深知此事而司工之大臣三和必當知此乃隠而不言以遂朕過則為君者之過人臣不敢言以遂其過者多矣是不大可懼哉兹命皇帝率御前大臣及司工之人攜儀器歩歩測量乃知泉果低於寺池且其流細不能引至為飛瀑而自泉之下至寺池有山池九叠叠皆置閘積雨後山水放流由沿山邊石溝以至山寺則誠真瀑矣山池在泉下雨多水漲亦未甞不流至池則命泉為源庶亦可耳然三和終未明言及此也夫瀑源誠細事積數十年之久而兹乃得其實事之久逺文之委曲心之操藴意之好實惡假皆不可以不記序而書之後之人或有以識吾志也矣序補詠平苗戰圗四章序平苗役蕆於丙辰之冬既於丁巳春聨句以紀其事因命仿舊日西師金川臺灣之例繪為戰圗圗凡十有六内十二圗舊有紀功之作即命書於圗上其四圗無詩因補成之夫苗疆自康熙雍正年間陸續戡定改土歸流食土踐毛百有餘嵗實與民無異乃乙夘之春楚省石三保石栁鄧吳半生等互相煽脅劫掠鳳凰乾州永綏三㕔地方其時福康安在滇南一聞此信即帶兵馳赴貴州松桃正大一帶𠞰辦並有䦨入四川秀山境者適和琳已放四川總督自藏回川得報不待諭㫖即馳往㑹𠞰節次攻克賊寨擒獲渠魁功屆垂成而二臣因勤勞軍務先後病逝良可惜也是役自始事訖蕆功凡閱二年苗疆悉就底定今則田田宅宅各安作息久矣溯自用兵以来籌筆之焦勞決機之次第以及将士之艱辛胥於詩乎見之撫斯圗也惟勤思止戈為武之義益慎撫綏而圗安輯非云侈功績也既補成四詩爰序其梗概以示来兹御製文餘集巻一
