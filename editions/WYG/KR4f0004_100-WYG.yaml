body:
  text: 識語上元前一日家讌親藩及曽元詩識語按大雅行葦之詩所以讌父兄耆老示慈恵而敦親睦也予每嵗元旦及上元前一日家讌近支宗藩自壬戌年始有詩紀事戊辰以来上元前日宴必有詠已成例事今入座者皆予子孫曽元之輩若蒙天祖眷佑再閲四五年即可望得来孫之喜而今嵗元日授璽歸政為千古第一全人明年慶莭曲宴為子皇帝之事予但當随意拈吟似此例成之什可以從簡矣并識二月朔日作詩識語上年二月初四日據湖廣總督福寜提督劉君輔湖南巡撫姜晟貴州巡撫馮光熊馳報貴州銅仁府大塘苗人石栁鄧勾結湖南苗匪石三保等滋事不法迫脅各苗寨聚衆搶掠焚燬民居經督提各臣帶兵進𠞰因即降㫖令福康安往辦而福康安扵未接諭㫖之前即自雲南馳赴銅仁不待所調之兵到齊先将正大營之圍解散節次又将嗅腦松桃一帶賊匪𠞰殺開通道路其時苗匪有竄入四川秀山縣境者勾結滋擾亦被官兵截𠞰適和琳新授四川總督自蔵来京入覲行至邛州地方聞有此事即一靣馳奏一靣帶兵兼程馳赴秀山将賊匪痛𠞰其晏農炮木山川河盖一帶所屯苗匪亦節次殱戮殆盡於閏二月内福康安和琳㑹兵一處自黔入楚軍威大振将黄𤓰寨蘇麻寨大烏草河等處攻克節次擒獲賊首吳半生吳八月漢奸諸人賊勢已極窮蹙又續據奏攻克金嶺沖攻破吉吉等寨而相率歸降之苗寨亦有數千百戸現在将石栁鄧石三保等擒獲後即可直抵平隴收復乾州大功告蕆此事本由逆苗自作不靖曲直之理天鑒昭然惟因地勢險峻雨雪濘滑賊苗得以負嵎抗拒致稽時日今已閲一年事迨垂成盼望益加殷切亦惟仰籲昊佑指日成功捷信即至經理善後事宜俾萬民永久安居樂業耳詠和闐白玉椀詩識語按玉之美者為瑜其疵為瑕禮記聘義云瑕不掩瑜瑜不掩瑕又左傳云瑾瑜匿瑕子以為此有二義所謂不掩者盖其質美處多而考纇少不可以小疵而棄其大醇傳所云不以一𤯝掩大徳即此意也至匿瑕者乃大舜隠惡揚善之義若玉之材質大段果屬精純即㣲有瑕玷亦尚可包容含蓄不至棄捨是以辛巳賦得詩有隠之略一玷揚矣獲連城之句夫全材希有用貴取長因詠此盌復絜矩及之并識題文津閣詩識語乾隆辛酉舉秋獮之典因来此駐蹕壬辰以後每過夏至大祀即来避暑率成恒例如含徳齋在清舒山館内額為皇祖御書予辛巳題什有書齋額含徳每憩緬堯箴之句鑑始齋予年十二時蒙讀賜居於此處書因以名之不忘始也文津閣是閣與紫禁御園盛京之三閣圴仿范氏天一閣之制以貯四庫全書者詳見閣記戒得堂得四皇祖聖夀望七時曽命鐫戒之在字小璽予庚子七旬萬夀前作是堂於清舒山館之左因以戒得名堂詳見前後記中永恬居額亦戌年皇祖御筆予甲續増山荘二字名之三十六景此其末一景也招涼榭在逺近泉聲之旁予題曰招涼榭每年避署来此必有題什懸楣間上年已遍即有題滿罷詠聴其常之句盖以上年已滿六旬今嵗即可不必例詠矣諸處積年之詩張壁已滿今幸紀元符願授璽觀成似此例作之詩原可停吟惟今年子皇帝掖奉安輿駐斯待獮亦千古未有之盛軌即景抒懐又有不能已於言者但八旬望九歸政養閒之老人誠宜一切從簡且五集已盈四萬餘首亦自厭其多矣意将大減拈豪因書題閣之什並識如右詠荷一律識語每嵗駐蹕山荘塞湖菡萏舒英例有題句書懸觀蓮所檐壁至上年乙夘四圍已滿因命董誥将厯年之詩彚書一冊陳之硯左並識眀丙辰歸政後可不必依例題句但予仰蒙昊眷紀元周甲心願符初今嵗元正大廷授璽稱太上皇帝幸為千古全人而子皇帝掖奉安輿莅斯待獮情景與每年無異又不可不摛詞以誌千載一時之盛復成七律一章即鐫冊匣之面眀嵗来此竟當如前約簡詠武列君子亦必知予意也御識安眠口號識語按不怨不尤之語出論語予以為不怨不尤未免仍存二字之意在惟應自思己過知過而改乃益善然言之易而行之難無意書此成語以為口號亦紀近日學詣之境耳上元後一日小宴廷臣詩識語向例上元翌日掄廷臣小宴以示寵眷必有詩二律書懸勤政殿東之飛雲軒壁間以誌嵗月至六十一年丙辰軒中四壁剰一而週再無隙處且上年元正授璽後似此依例成吟之什原可從簡但訓政如常是以上年宴畢復成二律用紀符願順成之盛迨今嵗則已閱二年竟可罷詠聊成此什令懸殿外嗣後當不必依例復題矣嫌偽詩識語聖學在乎存誠非是則為偽是以作聖之功去偽為最要予臨御六十餘年毋論用人行政諸大端必出至誠即尋常言動無不由中而發一秉大公至正之心絶無虚飾所以推己及人甚惡人之作偽以自欺欺人者午夜偶思及之即成是什無非述經書語亦欲人人深維聖人垂教存誠去偽之旨時自警惕始不虚予此願昨數年每失睡鮮寐近漸佳矣卧録是什後仍安寝較之常日更贏數刻是亦心逸日休之一驗乎題四朝選藻冊詩識語右四朝選藻四冊乃乾隆庚戌夏所鑒定者其時勑内廷翰臣纂輯石渠寳笈續編因出内府所蔵唐宋元明集繪冊命擇其尤佳者得唐人一宋人二十九元人三明人七釐為四冊各十幀以時代先後次其甲乙非於畫品有所軒輊也􅋔成後名曰四朝選藻以元亨利貞分標之縁就所有之幀為去留故四朝惟取其人之備而其多寡之數則不能均焉次年辛亥清和各題以詩分書幀中首冊五言律二冊七言二韻三冊五言三韻四冊七言律攦體分殊非以見異騁妍庶每冊各從其類弗致有㕘互淆紊之失耳石渠續編中此冊已著録閲今數年矣而尚未登黄綾詩本盖辛亥以後所成各詩或述政事之大端或寫性情所偶寄與夫問暘雨課耕斂即事摛毫均非無為而作每嵗詩本已盈無資以此補空逮上年丙辰大廷授璽初願幸符仰荷天祖眷詒精神純固予亦何忍遽圗自逸是以籌㡬訓政猶日孜孜於事之重且要者仍如常年見諸篇什雖理宜簡詠而結習未忘浃嵗所吟亦已足百篇二帙於是此詩復存箧中兹遊盤山以籌軍務望捷音之故雖来散悶而悶乃日増故即景拈辭亦少於往嵗既撿斯舊稿録登詩帙用補每年三春百篇之數仍於本畫冊末識其縁起如右乾隆六十二年丁巳季春御識閲授受禮成示撰進頌冊諸臣諭識語前諭既申明朕即位之初焚香告天紀元周甲當傳位嗣子不敢仰希皇祖用舊年號以次増載及授受禮成後遂命内外章奏一體令書嘉慶新元用示凝承天命至意惟乙夘頒朔之時因嗣皇帝率領王公大臣等恭進乾隆六十一年時憲書朕不欲重違所請祗令備進百本陳設宫廷及頒賜親近王大臣等不令徧行中外而勑㫖頒發書太上皇帝者自應仍以乾隆紀年亦體制不得不爾敬思朕自十二齡時受皇祖恩眷即有福澤較厚之諭今果荷蒙昊蒼洪貺於六十年舉行傳位大典朕年躋望九精神純固日勤訓政親見五代元孫来年即可冀得来孫之喜諸福具備此實受天之祜過於皇祖當日眷顧深衷貫至今日朕疊受蕃釐益深敬凛於凡朕之御㫖御筆紀元仍用乾隆叙年亦體所當然於朕初元籲天不敢仰希皇祖以次増載之意仍並行不悖益以徵國家景祚龎鴻延庥襲慶為千古以来未有之盛軌也因披覽前諭復申識語如右乾隆六十二年仲秋月上元日詩識語予自授璽後擬将每嵗依例成吟之什量為酌簡屢見之題詠惟丙辰丁巳上元前一日家讌親藩及曽元輩仍俱有詩章懸之奉三無私殿壁其後一日小宴廷臣二律向懸勤政殿東之飛雲軒至丙辰而四壁已滿再無隙處昨嵗丁巳因成五律一首懸之殿外其上元節日詩章向懸同樂園殿壁今又屆元夕風月清佳余自揣精神純固訓政如常實為髙年盛事但望九之年吟詠原宜從省兼以近日盼捷縈懐吟興稍減是以将年例茶宴聨句停止其上元前一日後一日之讌但依例舉行不紀以詩此後節日例作亦似可簡吟矣問津處口號識語假山上三間樸屋額以問津迺皇考御書也其聨用歸去来辭語則予有意所題下小嶺有彚芳書院在内盖其時即有歸政来居於此之意因循四十餘年其間復建長春園於圎明園之東兹偶過此因思予二十五嵗登極至乾隆二十一年書此聨時已四十六嵗矣而望六十年則夀當八十五嵗在可必不可必之間今蒙上天垂佑竟符初願傳位子皇帝予仍日勤訓政康健如常實千古僅有之事回憶書聨時嵗月堂堂舊題如昨爰笑而識之鑑逺堂詩識語是日憩坐之際適接徳楞泰奏言齊王氏姚之富大股賊匪由陜省山陽石河舖一帶東竄先經𣲖令賽沖阿温春等分帶官兵在髙埧店漫川闗堵截明亮徳楞泰督兵由黄隴舖寛坪等處兜𠞰賊匪分三路竄逸徳楞泰明亮等亦分三路並進賊衆排列左右兩山分投抗拒我兵搶上山梁奮勇擊殺殱斃千餘賊匪力不能支紛紛逃竄徳楞泰明亮等乗勝追擊賊匪復分兩股欲竄往東北俱被官兵截殺折回向西南甘溝一路逃遁該處路通楚北鄖西地界官兵晝夜追擊一百七十餘里殺賊二千有餘賊勢披靡惟首逆尚在逃竄徳楞泰明亮等帶領滿漢屯土官兵由鄖西縣之上津堡一帶兜𠞰随𠞰随進逼至三岔河地方擒獲賊犯詢知齊王氏姚之富俱在左首山梁徳楞泰明亮賽沖阿阿哈保温春達音泰阿穆勒塔徳寜等督率奮勇官兵将山梁四靣圍住逆匪等猶滚石放鎗抵死抗拒官兵一湧直上齊王氏姚之富二犯逃至險峻處所棄馬奔越吉林黒龍江官兵亦皆下馬同歩兵上緊擒拏齊王氏率婦女十餘人投堕陡崖姚之富亦向懸崖跳落官兵飛馳擒捕姚之富已經跌斃齊王氏尚存餘喘均即臠割斬梟傳首示衆並擒斬大小頭目二十四名殱斃夥黨三千餘名又於山梁溝内搜捕𠞰殺四千餘名生擒者一千餘名此三月初六日事也楚匪滋事以来蔓延日久皆由齊王氏姚之富二犯首先集衆焚劫到處逼脅良民抵拒官軍實為祻首罪魁今同日殱除雖未得生擒解京而首逆俱經伏法餘匪實已喪胆亡魂此時陜境之賊惟髙均徳與李全張添文兩股奔竄稽誅經徳楞泰等帶領勝兵及額勒登保秦承恩王文雄等分路兜捕不日即可擒渠蕆事其在川境者如徐添徳王三槐冉文儔羅其清諸首逆自皆聞風震慴尅日亦可成擒𠞰捕教匪大功已不啻過半矣披閲捷章因成是什並詳識如右題和闐玉筆筒詩識語國家威徳覃敷無逺弗屆外藩屬國嵗時進至表章率用其國文字譯書以獻各國之書體不必同而同我聲教斯誠一統無外之規也我朝國書増損蒙古書而成書寫自左方直下成行而右漢書則自右而左朝鮮安南琉球諸國皆用漢書西畨天竺緬甸暹羅南掌西洋俄羅斯廓爾喀苗疆皆各有書横行自左而右惟回部及蘇禄國書横行自右而左夫疆域既殊風土亦異各國常用之書相沿已久各從其便正如五方言語嗜欲之不同所謂修其教不易其俗齊其政不易其宜也偶題和闐玉筆筒因及回疆文字復思今日溥天率土各國之書繁夥而統於一尊視古所稱書同文者不啻過之爰即文房題詠觸類引申益凛持盈保泰之念非曰貴逺物詡珍異也并識題韓幹畫馬詩識語按杜甫丹青引贈曹将軍霸云弟子韓幹早入室亦能畫馬窮殊相幹惟畫肉不畫骨忍使驊騮氣凋喪繹杜甫詩意顯抑韓而譽曹考厯代名畫記稱幹善寫貎人物尤工鞍馬初師曹霸後乃獨擅名唐元宗好馬御廐至四十萬匹時有沛艾大馬西域大宛之種命幹悉圖其駿遂為古今獨歩後世羶薌韓畫者至以為通靈感神趙孟頫云唐人善畫馬者甚衆而韓曹為之最是幹聲譽不在曹霸之下或青過於藍亦未可知少陵丹青引本以贈曹譽其師自不得不排其弟子則畫肉不畫骨之說或未免過苛且代逺年湮曹畫絶少流傳而杜詩則意存軒輊若據此以定其師弟畫品髙下恐未為確評也偶題韓幹畫馬因及杜甫詩附論於後戲題眼鏡詩識語眼鏡古無此物自元明始来自西洋今則其用寖廣有玻璃水晶二種玻璃出於冶錬不若水晶無火氣為良余向以其資人巧而失天真從不用之詳見辛丑辛亥舊作計辛丑作詩時予年逾古希辛亥則已過八旬今且将望九矣雖目力較遜於前然披閲章奏及一切文字未嘗稍懈有以眼鏡獻者究嫌其借物為明仍屏而弗用因戲成此詩示意並以識嵗月直𨽻總督胡季堂奏報二麥約收九分有餘詩以誌慰識語予自御極以来於各省雨暘嵗收刻縈懐抱六十餘年如一日每值收成豐稔惟益増䖍惕或間遇一隅歉收必再四馳詢各該督撫不得稍有諱匿其稔收地方或所收之數浮於所報之數率置之不問誠以豐不可詡而歉不宜諱惟願各省大吏體此意以子恵黎元庶不負牧民之責即如此次直𨽻所報麥收分數盖因宣化承徳二府屬向来不種秋麥所報分數較少通省牽算裒多益寡尚得九分有餘此實上稔之占允堪欣慰即所收已逮十分亦寧存戒滿之念不敢稍渉誇詡也爰識此以眀予志口號識語前戲題眼鏡詩以其借物為明屏而弗用曽有識語示意兹更引而申之余以望九之年披閲内外章奏未嘗稍懈即經書刻本亦仍照常展視且多係誦習之文背讀兼可節省目力若蠅頭細字不見固自無妨又何必借資他物為明耶因口占此作以廣前意并識鑑始齋題句識語余十二時蒙皇祖賜居萬壑松風之側因名之曰鑑始齋自沖齡佔畢至今八旬有八仰沐昊慈祖佑精神康健訓政如常實從古帝王未有之事因憶予少時即喜作詩不屑為風雲月露之詞自御極以来雖不欲以此矜長然於問政勑㡬一切民瘼國是之大者往往見之於詩計丙辰至丁夘編為初集得詩四千一百六十六首戊辰至己夘編為二集得詩八千四百八十四首庚辰至辛夘編為三集得詩一萬一千五百十九首壬辰至癸夘編為四集得詩九千九百二首甲辰至乙夘編為五集得詩七千七百二十九首合計五集共四萬一千八百首亦云富矣古之詩人年髙而詩多者在唐為白居易在宋為陸游居易以太和開成編年分四集為巻僅二百有二為篇僅千有五十六陸游之詩初編祇四十巻再編通前祇八十五巻本朝輯全唐詩一代三百年二千二百餘人之作纔得四萬八千九百餘首今予詩五集釐為四百三十四巻總計四萬一千八百首而樂善堂全集在潛邸時所著者尚不入此數是予以望九之年所積篇什幾與全唐一代詩人篇什相埒可不謂藝林佳話乎然予初非以韻語一事與文人學士絜量多寡也夫詩以言志言為心聲非僅絺章繪句如詞人東塗西抹之為且為人君者若専以吟詠為能亦即溺情之一端自古有戒予曷肯出此實因予臨御六十餘年中間大功屢集鴻儀疊舉兼以予關心民事課雨量晴占年省嵗數十載如一日而閲事既多析理尤審即尋常題詠亦必因文見道非率爾操觚者比乃質言非虚語也今春秋八十有八自丙辰授璽以来猶日訓子皇帝政自維耄耋之年吟什原應從減擬将每年依例之作量為簡省而事之有關大體者仍不能不渉筆成章以昭紀實計丙辰至今又閲三年復得詩數百首此後應於五集外另編餘集若更叨洪貺算衍期頤復得裒然成帙匯為别集鉅觀豈不更為史冊希有之隆軌乎偶題鑑始齋迴溯髫齡以至今日即詩集之多亦皆眷貽之厚爰綜其全數並抒夙志附識於此含徳齋詩識語予於戊申曽命補圗己亥年木蘭射鹿得䨇畫幅黏於含徳齋壁其時予年七十有八披閲展玩覺少壮時挽強命中雄心猶在是年距獲鹿時已及十載正值平定臺灣生擒林爽文荘大田二首逆恰符中必疊雙之兆曽題以詩並命皇子近臣屬和自壬子以後數年或因節候早寒或因雨水較大未舉行圍之典今予春秋八十有八精神康健日勤訓政豈尚復以射藝矜能然結習未忘究未免見獵心喜偶来齋中覩舊日黏壁圗畫輒為神旺且年来籌𠞰川楚教匪雖屢殱賊衆其起事之首逆齊王氏姚之富二犯亦已雙擒殱戮但奔竄餘匪尚有李全髙均徳王三槐徐添徳冉文儔羅其清阮正通等皆屬渠魁稔惡刻下大兵四路攻圍計此數逆首亦當駢連就縛疊符得雙之喜或此時捷音業已在途早晚即馳至山荘尤所欣願也因觀齋壁舊題復成是什並識此以紀嵗月牣魚亭得句識語按大雅靈臺之詩以詠歌文王徳及於民有臺沼之樂而民樂其樂然細繹詩辭曰經之營之庶民攻之不日成之則猶不能不資於民力盖古者力役之征聖王不廢周禮所云公旬三日及二日一日即當時役民之法詩人以文王用民之力而民忘其勞為頌揚歸美之辭顧予思之用民之力以供逰覽何如不資民力之尤愈乎我國家偶有工作皆弗用正帑惟以關稅盈餘及内帑節省者物給價工給值絲毫不以累民而貧者轉受其利即厯年駐蹕山荘亭臺㸃綴間事添葺從未嘗少資民力向年所著知過論已詳言之是予所引為已過者視大雅所云或猶可無愧乎偶題牣魚亭附識數語以示意石城詩識語山荘石城乃康熙年間噶禮罰貲修築者噶禮厯任山西巡撫屢被劾控婪贓等事俱經辯釋嗣任兩江總督經巡撫張伯行劾奏噶禮通同攬賣舉人向主考官索銀五十萬兩噶禮亦列款劾張伯行並奉㫖解任交張鵬翮赫夀查審僅将主考官等抵罪張伯行誣㕘議革職贖徒噶禮免議蒙皇祖嚴飭諭諸部臣及九卿詹事科道等公核以噶禮張伯行互相訐奏玷大臣職均議革任皇祖念張伯行居官清正仍留原任噶禮操守難信依議革職事在康熙五十一年此石城之修當即其時罰彼所為我國家無力役之征一切工程皆發帑給值從不累及閭閻至園亭偶有興作則並不用正帑率以内府餘項為之或貪官汚吏罰令出貲使貪谿壑者知所儆兹偶詠罰築石城一事特撿查噶禮原傳為之仰見皇祖保全清官懲創墨吏實為仁至義盡不特慎重工作愛惜勞費而已誠可奉為萬年家法也謹識雜著書虞書舜典集傳偶閱集傳舜典而知蔡沈之未明道也夫沈既自稱述晦翁其序集傳又屢以明道言之其於而難任人一語何乃求之深而注之舛也夫此四語乃古今一貫為君之道蠻夷率服則其效耳盖為君之道莫難於任人首三語皆任人之端且其下益曰任賢勿貳禹曰惟帝其難之知人則哲能官人其注難於任人不亦切乎其近章乎其眀哉今沈以難訓拒絶任為平聲訓包蔵凶惡之人盖本朱子及時瀾之意按書經傳說彚纂引朱子曰柔逺能邇柔逺却說得輕能邇是使之怗服之意又引時瀾曰難任人難之一宇甚嚴曰難者非特去之而已常有戒謹恐懼之意當時既無任人何難之有盖此心不可以不常存也少不戒謹恐懼則任人或得乗其間矣云云沈之集傳必取義朱時二家之說言之抑亦躗而誣矣當日舜咨收之語本自明顯何嘗有此深意沈本說深意轉失之相盭其所訓殊不足取耳不亦求之深而失之逺乎余向謂以訓疏注書不如以書注書暇觀此篇率成數語用識昔言之未誤也御製文餘集巻二
