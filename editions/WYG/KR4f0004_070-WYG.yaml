body:
  text: 雜著讀左傳晉楚城濮之戰説城濮之戰人皆知子玉之傲而憤以致敗晉臣之巧而和以致勝予則以為其過不在子玉而在楚子也夫戰國之大事也臣不聼君言冒徼幸以間執讒慝之口而君即從之一失也知其不可而少與之師以觀其敗二失也馬且必乗其産乃以陳蔡屬之右師驚虎皮而先奔三失也有此三失即楚子以全軍臨師亦必致敗而况君臣之心先自致貳謬任其敗以實已言而棄西廣東宫及若敖之六卒與敵而弗惜是非以怨一臣而波及自喪其衆軍士之命乎且明知晉侯備嘗險阻天之􅀁置允當應歸矣何不令子玉全師而旋雖將在外君命有􅀁不受亦視其得失之大小何如耳未有明知其失顧以強臣一言而怒姑由其戰置國勢之興衰人命之存亡於不計如越人視秦人之肥瘠豈理也哉予故曰其過不在子玉而在楚子也讀髙啟威愛論髙啟著鳬藻集首章即威愛論讀之卒篇歎其知一而未知其二也夫兵者非常用之事以仲康之賢討羲和之亂承命者猶恐其威之不立而功之不成啟所云好生惡死人之至情有威則怯者勇無威則勇者怯其言皆是也至謂使國君而知此則國可以治天子而知此天下可得而理則失之甚矣夫治國平天下非若用兵偶行之事也御衆以寛寛則得衆猶恐吾仁之不能廣被焉孰謂徒作其威使下無􅀁容而可以治國平天下哉且自古亡國者多矣失之威者其亡速失之寛者其亡緩致亡雖同然緩速之間斯有别矣吾非謂當失之寛蓋闢啟謂宜威克之言示有君人之責者當體天心仁民愛物雖辟以止辟仍存哀矜惻怛得情勿喜之意非不用威而不可徒恃其威威者猛之類愛者寛之施寛以濟猛威愛並行或者其庶幾乎余故謂啟知其一而未知其二讀其論者不可不察也讀宋仁宗本紀贊宋史贊仁宗曰吏治若媮惰而任事蔑殘刻之人刑法似縱弛而決獄多平允之士斯言也人皆以為韙而余獨以為非其亦有説乎夫吏治媮惰則胥役生心而小民隂受其害刑法縱弛則奸猾肆志而良善弗得安居葢不如吏治弗媮惰而任事蔑殘刻之人刑法不縱弛而決獄多平允之士是為寛嚴得中上下均受其福雖然致此豈易得哉此吾􅀁以業業兢兢而不遑寧處者也讀史記儒林傳司馬遷曰周室衰而闗睢作王應麟撰玉海因引揚子周康王時頌聲作乎下闗雎作乎上習治也習治則傷始亂謂齊魯韓三家以為康王政衰之詩又引楊賜傳云康王一朝晏起闗雎見幾而作夫康王晏起不見於經書是誤用宣王之事實之也齊魯韓三家之詩雖先出於史記然總出於夫子之後信三家不如信夫子子曰闗雎樂而不淫哀而不傷是誠王化之始豈有衰世之譏哉司馬遷所云葢􅃌孔子傷周室衰微王道不行故即繼之曰論次詩書修起禮樂云云闗雎作者周南之首章即刪詩之義耳且如稱堯典可以貫全書則稱闗雎亦可以該全詩而於康王始衰乎何有況舉守成之善者必曰周有成康亦不見其有荒政也朱子為詩傳直以為文王后妃時􅀁作葢本毛萇之義可謂具有卓識而未言三家之失於傳訛茲故申而論之讀宋史河渠志予既問之往祭河源之侍衛阿彌達明悉河源在星宿海之西亦既系之詩而按以語矣因取宋史河渠志觀之宋史元托克托等􅀁修也以䝉古人言䝉古地名尚有蹖舛失真者則以䝉古入不深明漢文宜其音韻弗合名不正而言不順以致紀載失實也其􅀁譯哈喇海齊必勒呼蘭伊拉齊之類皆不合今蒙古語非不合也䝉古語猶是其音譯漢文則差也茲姑弗論獨所稱統昆侖之南折而東又云復繞昆侖之北自貴徳西寧之後云云貴徳即元之貴徳州而今之河州之地也西寧則仍西寧此其間焉有所謂昆侖者乎夫昆侖自在回部離此將萬里誰能移於此為河源細究其義葢修河渠志者或曾讀漢書武帝紀因牽強為之辭不知以訛傳訛益增人不信耳既又細閲康熙年間拉錫所具圗於貴徳之西有三支河其名昆都倫乃恍然大悟昆都倫者䝉古語謂横也横即支河之謂此葢元時之舊名謂有三横河入於河而修書者不觧其故遂闌入回部之昆侖山以證漢武之事耳然䝉古謂山横者曰昆都倫或者張騫曾到回部之昆都倫以及蒲昌鹽澤謂為河源則是與予所云不約而同而要之究未明其入地伏流為星宿海上之河源也既觧其疑不可以不詳誌如是則陶淵明所謂不求甚觧者為可行乎為不可行乎讀熊廷弼傳明之曉軍事者當以熊廷弼為巨擘讀其陛辭一疏幾欲落淚而以此盡忠為國之人首被刑典彼其自壊長城棄祖宗基業而不顧者尚得謂之有人心具天良者乎夫廷弼自田間召還日馳二百里待之何殷來之何速及入朝勅印不付亦弗前席引問若無事然是誠何心哉及姚宗文騰謗於朝劉國縉掣肘於外羣小黨伐議論繁滋致志士扼腕無能為而明社因之以亡其誰之過歟夫天啟騃童受制宦䜿固不足論若葉向髙尚為忠厚老臣徒以庇其門生王化貞而亦有憾於熊廷弼吁師生門户之害人家國如此之甚豈不可畏哉且軍事豈迂濶庸流所當横議者横議已不可又加之以曲直不分門户是庇而其君復不辨其是非示之彰癉因循引長顛覆隨之此固天厭有明抑以其季世之君有以自取也夫廷弼豈非與我祖宗開創時作難者然各為其君理應竭力盡心數百年論定之後予且嘉之而憐其屈死然則彼時之為彼君者謂曰無人心而喪天良亦非苛論而已矣讀召誥詩三百一言以蔽之曰思無邪予讀召誥之篇求其一言以蔽之者莫若曰曷其奈何弗敬葢召公因成王始政拳拳致告蔡傳􅀁謂究其歸以諴民為祈天之本而又以敬徳為諴民之本一篇之中三致意焉則所謂奈何弗敬者非挈一篇之領要乎夫奈何者一唱三歎之意言有盡而義無窮奈何者更有不􅃘人之心以不􅃘人之心行不􅃘人之政則敬之施於外者也敬勝怠者吉義勝欲者從然必敬勝而後能義勝則又敬之存乎内者也内外交養誠實無􅄭祈天永命其弗基於此乎茲因謁明陵而思及受命保命之要必當以奈何弗敬為棘且君者天之子也天者君之父也父之於子無不亟其愛子之於父當無不亟其敬然及其失父之愛一再失其敬者猶示以警以訓誨之至於訓誨而弗改則父亦弗愛之而已矣嗚呼可不懼乎可不敬乎歴代遥矣不可屈指數明之事則近可徴也如永樂之簒位大行誅戮應其亡也而天弗亡之正統之北狩應其亡也而天亦弗亡之正徳之荒淫失徳應其亡也而天尚弗亡之此非慈父之逭其罪而仍有􅀁顧惜乎必至萬厯怠政天啓童騃崇禎有猜忌之失無恢復之能而後亡之讀史而有受命保命之責者可不知懼知敬乎人莫不飲食鮮能知味也人莫不讀召誥鮮能知要也茲舉其一言以蔽之者於謁明陵之日後之攬者亦可以絜矩知吾意矣讀易繫辭上傳第五章書義此章與中庸首章相表裏子思或有承乎是章之義乎蓋一隂一陽之謂道繼之者善成之者性即􅀁謂天命之謂性也仁者見之謂之仁知者見之謂之知即􅀁謂率性之謂道也百姓日用而不知故君子之道鮮矣即􅀁謂修道之謂教也至於顯諸仁蔵諸用鼓萬物而不與應作一句而與應作去聲如舜禹有天下而不與之與蓋所謂不居而已耳不居則不知不知則無為無為則無心設以上聲讀而貫下文是視天地與聖人有間然且有心矣夫大易一乾坤乾坤一隂陽隂陽一天地天地一易簡春生夏長天地之顯諸仁也秋收冬蔵天地之藏諸用也而天地實不居其功此即天地之無心也若夫聖人輔相左右是有心也有心則不能無為不能無為則不能不代天地同憂矣咨政之暇與諸皇子及數儒臣示及此並命各抒其見以論之皆以為不出所示故不復繁文闡論而直陳其義如此然予亦未肯遂信以為韙爰簡筆書之以俟後之深於易者讀韓愈對禹問韓愈為對禹問􅀁云堯舜之利民大禹之利民深亦既理暢辭明足為千古定論矣其論孟子所謂與賢與子乃云求其説而不得從而為之辭余以為愈於此亦不免有求其説而不得從而為之辭者矣夫天何言哉與賢與子何以命之是宜觀泰誓所云天視自我民視天聼自我民聼民之􅀁與即天之所與是以人君祈天永命莫先於愛民得民心則為賢而與之失民心則為否而奪之可不慎乎可不懼乎或曰三代以下率與子而不與賢是誠天意乎是皆得民心而應與之者乎曰利民之大與深韓愈固言之詳矣茲不贅論三代以下其嬗代不一氏是非不與子而與賢乎雖其中亦有奸雄攘竊如曹操司馬懿之倫不可謂之賢然必其繼世之子之不可與者也若繼世之子上能繩其祖下能得其民天必不以與他人也是語也人或不敢言而余因讀韓文闡義為辭其意正重乎此有守器之責者可不熟讀是文而知慎知懼乎儲貳金鑑之書已成因命續錄於篇向所著讀公羊傳等六篇皆有繋於天命人心嫡庻賢否之要並著續錄焉御製文二集巻三十六
