  text: 欽定四庫全書御製文二集巻五
  hash: sha256:afff87fdd0e2f6ad6c42ecd59a152072403e8fc0db3f18ead0d7bb5759430e0c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_039-1a, image: WYG1301/WYG1301-0314a.png}
body:
  text: 説烏斯藏即衛藏説藏地處蜀與滇之徼曰藏云者非華言實畨言也畨又或謂之唐古特今班禪額爾徳尼所居實稱藏達賴喇嘛所居實稱衛元明時有烏斯藏朶甘衛指揮諸司之名或以為異於衛藏而不知實同也葢嘗以唐古特文字詳覈互證乃知烏斯藏即衛藏其音其義無不一以貫之也且以音言葢薩之餘音滿字為薩音半字為斯音唐古特收音之斯字即與國書之伊字收音通則烏斯之切為衛如烏伊之切為衛也亦猶阿伊之為愛噶伊之為該喀伊之為開也國書斯字伊字雖各為收音然唐古特收音字無伊字而有斯字由烏斯推之而愛亦烏斯該亦噶斯開亦喀斯何不可通之有若夫衛藏之為義則衛葢彼言中也非華言置衛之謂也以烏合斯為衛音而中義藏則切匝阿為藏音而其義則淨之謂也唐古特若老若㓜無不知之今以不識唐古特文字之人而與一二譯出華言中辨其是非豈非嚼蠟哉或又曰衛既以中為義則今之所謂前藏之説何居曰此更非唐古特之本有而興於今之華言也然以今日疆域言之自打箭鑪取道由東南迤及西南先經喀木次衛次藏是全藏形勢固宜前喀木而後蔵而衛適其中處之地喀木之木為半字音應從上喀字而其義則邉界之謂也今稱前後藏者則因二地有達賴􅀈嘛班禪額爾徳尼居之而達賴喇嘛位居長遂並以蔵屬之更易中為前而今自亰都目之且統以為西蔵云耳然則烏斯蔵之即為衛藏不逾信哉夫藏之内屬肇自元代音譯展轉沿薩為斯原無岐舛惟文士墨守楍簡既不克兼諳西竺之書而彼中服習梵文者又豈能筆授心通取腹地史乗傳譌一一悉為釐訂毋惑乎此攷文之難也予因輯同文志類次西藏所𨽻為系三合切音者特掲是説以發其凡玉璞抵鵲説桓寛鹽鐵論稱中國所鮮外國賤之崑山之旁以玉璞抵烏鵲云云初讀之以為玉璞非抵鵲之物而鵲亦可以不抵此不過舉烏有之事喻貴人之所賤不足以厚中國明盛徳耳今乃知誠有其事而惜寛之未詳言之也葢玉出和闐和闐即崑山之旁支也和闐之人備侍衞者有之問以鵲名則回語亦有之且稱回部諸城皆有鵲而和闐獨無詰其故則云傳自古昔和闐之地不可有鵲有鵲必致刀兵地不寧年不豐是以和闐之人見鵲必抵之葢抵之之方不一玉璞初非彼所貴以之扺鵲誠或有之是則寛之説不無有自來而惜未詳言其故耳夫讀古人之書豈可以粗心浮氣遇之而率以評人之是非也哉如抵鵲之事非和闐人自述将終古無知寛之言為非謬者予故詳著斯説以為鹽鐵論之註麋角解説壬午為鹿角記既辨明鹿與麋皆解角於夏不於冬然月令既有其言而未究其故常耿耿焉昨過冬至􅈝憶南苑有所謂麈者俗名長尾鹿可為蠅拂即塵尾或解角於冬亦未可知遣人視之則正值其候有已落地者有尚在􅑠骨或雙或落其一者持其已解者以歸乃爽然自失曰天下之理不易窮而物不易格有如是乎使不悉麈之解角於冬將謂月令遂誤而不知吾之誤更有甚於月令者矣然則月令遂不誤乎曰月令之誤誤在以麈為麋而不在冬之有解角之獸也葢鹿之於麋北人能辨之而南人則有所弗能麋之與麈亦如是而已耳且説文訓麈有麋屬之言而名苑則又曰鹿大者曰麈羣鹿随之視尾所轉而往也夫鹿也麋也麈也迥然不同亦不相共羣而處實今人所知者而古人乃不悉其孰為鹿孰為麋孰為麈則月令不云夏至麋角解冬至鹿角解為幸矣而又何怪乎其誤麈為麋也耶既釋此疑因為説以識之月令古書不必易靈臺時憲則命正訛以示信四海焉鄂博説昨命直𨽻總督方觀承考灤河濡水之源兹具圖以來稱濡之源出獨石口東北斯已得其梗概待清暇詳為之考證而記之獨其中有濡經察汗峩軷之語引鄭氏及詩大雅之言以證為軷祭行路神之義則失之逺矣夫峩為我平聲非鄂音而軷則音㧞與博韻更吳越不同徒以石之嵯峨及軷祭取義實曲為穿鑿矣夫鄂博乃䝉古語為堆砌之義堆砌石以表祭處䝉古固不知大雅及鄭氏之説也即鄂博字略近亦不過對音書之有何取義於其間哉且䝉古謂山為敖拉謂水為烏蘇如此者奚啻千萬豈能一一為之以漢文而明䝉古之義哉一地名即舛誤如是則所云尺寸度而道里考者亦恐有差以毫釐而謬以千里者多矣故必待一再詳審然後可定其真而先為之説如右雜説或問古人有識禽言獸語者真乎妄乎曰是妄也非真也曰葛盧之事見於左傳秦仲之事見於史記安可謂之妄曰左氏浮夸馬遷好竒二人之外别有踵之者不一而足然吾皆謂之妄曰皆謂之妄以何知之曰以吾哨鹿知之曰哨鹿之賦不云乎因聲以察情體情以斆聲是非知其語之謂乎曰聲與語不同也金石絲竹匏土革木皆聲也使奏清廟明堂而無人歌其什孰知其為清廟明堂乎哨鹿者亦不過因鹿聲之髙下剛柔而随機以應之率能致鹿使鹿聲中有語以傳其意則哨鹿者實不能為鹿語以應其聲鹿聞非其語必且逺跳而去又何能致之哉盧之牛仲之鳥亦不過如鹿聲而已彼安能知其為何語且禽獸豢飬熟或能識人語者有之而畜類則斷無各有其類之語之理吾故槩以為妄而非真小春説十月小春即婦人孺子皆或知其説而通儒博學曾未訓其義雖嵗時初學等記均以為天時和暖似春故曰小春而歐陽脩詞中亦有小春之句其何以謂之小春則未之前閒也嘗考小雅嵗亦陽止朱註云陽十月也時純隂用事嫌於無陽故名之程子亦云疑於無陽故謂陽月然何時無陽如日有光之類程朱此語葢宗孔氏愛陽惡隂之疏而發明之余以為小春之義當昉乎此夫天時和暖雖十一十二月亦豈無之而不得謂之小春者以其非陽月也陽之徳實見於春在乾為元在人為仁在時為春一氣貫通生生不息天地之大徳曰生即天地之大用曰春雖四時流行各司其候而陽春之氣何嘗有一息之間斷哉小春即陽月也世又有以為小陽者更深切而著明不煩重注矣開泰説陽交三而成泰此劉琨栁宗元䓁開泰之説所由昉乎泰者通也又安也小往大來内陽外隂與夫任下事上君子小人之義註易家論之詳矣余以為泰之所以為泰在九來居三泰之九三即乾之九三也乾之九三曰君子終日乾乾夕惕若葢必有此乾乾惕厲然後能安而弗危通而弗塞以常保其泰也故本爻即曰无平不陂无往不復使無乾惕之意則平者陂而往者復矣又繼之曰艱貞无咎益深切而著明葢艱貞即乾惕也必乾乾以知其艱惕若以守其貞然後得无咎兩爻呼吸相通無不於慄慄危懼三致朂焉元聖訓後世之意篤矣凡觀象玩占者皆當以是為棘而有撫世御民之責之人尤不可不凛淵氷而戒盛滿袪安逸而謹思慮庶㡬恒守其泰而不至失其道以流入於否後世賢臣持盈保泰憂盛危明之説胥不外乎是爾五明扇説崔豹古今注稱舜廣開視聴作五明扇揚雄方言以為自闗而東謂之箑自闗而西謂之扇自是賦扇者率以五明為舜事怪哉失之逺矣夫舜作漆噐諌者且十人五明之扇其雕㡬繁飾過漆器逺矣何不聞有一人諫諍者乎葢扇本門扉禮所謂修闔扇者是也豹本闢四門之意而變其説曰作五明雄又辨其方而類之箑陸機梁元帝之流不察所自遂以華囂之事為舜所創其誣古聖帝不淺也且世本載武王始作箑則舜之時安有所謂扇乎此又不待辨而自明者師説或謂人之立於天地間不出乎五倫而師不在其内豈朋友足以該之乎曰非也師所以明五倫者也猶天之運四時四時因天運而成嵗五倫因師明而立常四時不出天運而天實以統四時五倫不出師明而師實以該五倫豈朋友而足以該之乎人之生也自羈貫總角誦詩舞勺以至帝者王者無不以次有師易曰䝉以飬正書曰作之師而韓昌黎所云傳道授業解惑則益深切而著明焉夫道者何五倫而已矣授之業使盡五倫之道以解其惑則正以是飬而教以是成豈五倫之外别有所謂道哉故師之名雖不列於五倫之内而五倫之名實賴師以明無師則亦無五倫矣而曰五倫之内無師其可乎至於朋友所以相取資而已矣而其間有益者焉有損者焉是尚在已之能擇而謂足以該師之道可乎且吾所謂師非巫醫樂師百工之所謂師也葢道之所存即師之所存之師也而道不外乎明五倫然世之以資進身之階者亦遂以為師似又不若巫醫樂師百工之所謂師矣若夫聖之渇於師愚之恥於師昌黎之好為人師及非好為人師皆緒論耳兹故不複言御製文二集巻五
