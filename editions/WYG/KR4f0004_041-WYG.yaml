body:
  text: 諭重刻淳化閣帖諭朕幾餘不自暇逸典學之優時及臨池曩曽輯内府所蔵前人墨蹟刻為三希堂墨妙軒二帖廣示藝林復念古帖流傳可補墨蹟所未備者惟宋淳化閣帖鐫集尤為美富逺出大觀太清樓諸本之上但惜初搨與賜者絶尠或云版尋殘損當時已為難得後来翻刻愈繁真意寖失有志追摹者末由津逮内府舊蔵淳化閣帖極多而此畢士安所得賜本搨最精好爰特勅選工鈎摹上石冀復舊觀第王著昧於辨别其所排類標題舛陋滋甚不當聴其沿譌以誤後學因命于敏中等詳加考正以次呈閱候朕參定分識各巻並命蒐採諸家釋文依字旁注其互異者折衷附記扵後以資省覽是於考文稽古之中兼寓舉墜訂譌之益用嘉惠海内操觚之士焉命通鑑輯覽附紀明唐桂二王事蹟諭甲申嵗我國家既定鼎京師而明福王朱由崧為南京諸臣迎立改元首尾一載其後唐王朱聿鍵桂王朱由榔相繼稱號者又十有餘年當時以其事渉本朝開創之初凡所紀年號例從芟削即朱璘之明紀輯略亦以附三王紀年為浙江撫臣等所奏燬兹以捜訪遺籍外省奏進此書閱其體例非不尊崇本朝且無犯諱字跡徒以附紀明末三王自不宜在概禁之列前命編纂通鑑輯覽館臣請不録福王事實因念厯朝嬗代之際進退予奪繋乎萬世公論若前代偏私袒徇之陋習以曲筆妄為髙下朕實鄙之即如福王承其遺緒江山半壁彊域可憑使能立國自强未嘗不足比扵宋髙宗之建炎南渡乃孱弱荒淫自貽顛覆而偏安之規模未失不可遽以國亡書法絶之特命扵明崇禎末附紀福王年號仍用雙行分注而提綱則書明以為别至蕪湖被執始大書明亡盖所以折衷至是務合乎人情天理之公也至扵唐王桂王遁跡閩滇苟延殘喘不復成其為國正與宋末昰昺二王之流離海島者相類本不得等扵福王之例是以輯覽内未經載入今思二王究為明室宗支與異姓僣竊者不同非偽託也且其始末雖無足道而奔竄事跡亦多有可攷與其聴不知者私相傳述或致失實無稽轉不若為之約舉大凡俾知二王窮蹙情形不過如此更可以正傳聞之譌舛又其下諸臣以旅拒王師者向多以偽官目之然其間如白文選李定國等本獻賊義子反側無常彼在明已合稱賊稱偽自當凖春秋書盗之例又如金堡等之五虎横行把持國是者亦無足齒錄若其他各為其主始終不屈以至隕首捐軀者不一而足較宋末之文天祥陸秀夫實相彷彿雖混一之初兵威迅掃不得不行抗命之誅而諸人瑣尾間闗有死無貳洵無愧人臣忠扵所事之義迄今日乆將遂冺没朕甚憫之亦宜畧為紀錄使之有傳扵後設以為載筆有體則凡事涉二玊者不妨直以彼字稱之用存偏正之别而其臣則竟書為某王之某官某槩不必斥之為偽也明紀輯略已命有司弛其禁而通鑑輯覽校刋將竣其令四庫全書館總裁詮叙唐桂二王本末别為附錄巻尾凡彼時仗節死義之人考訂事迹悉與備書朕將親為裁定宣付刋行俾讀者咸知朕大中至正未嘗有一毫私意偏倚其間而崇奬忠貞亦足以為世道人心之勸書成即以此諭同御製輯覽原序並冠巻端庶將来有所參考喻朕意焉命議予明季殉節諸臣謚典諭崇奬忠貞所以風勵臣節然自昔累朝嬗代於勝國死事之臣罕有錄予易名者惟我世祖章皇帝定鼎之初扵崇禎末殉難之大學士范景文等二十人特恩賜謚仰見聖度如天軫䘏遺忠實為亘古曠典第當時僅徴据傳聞未暇遍為搜訪故得邀表章者止有此數迨久而遺事漸彰復經論定今明史所載可按而知也至若史可法之支撑殘局力矢孤忠終蹈一死以殉又如劉宗周黄道周等之立朝蹇諤抵觸僉壬及遭際時艱臨危授命均足稱一代完人為褒揚所當及其他或死守城池或身隕行陣與夫俘擒駢僇視死如歸者爾時王旅徂征自不得不申法令以明順逆而事後平情而論若而人者皆無媿於疾風勁草即自盡以全名節其心亦並可矜憐雖福王不過倉猝偏安唐桂二王并且流離竄迹已不復成其為國而諸人茹苦相從捨生取義各能忠於所事亦豈可令其湮沒不彰允宜稽考史書一體旌諡其或諸生韋布及不知姓名之流並能慷慨輕生者議謚固難於槩及亦當令俎豆其鄉以昭軫慰嘗恭讀我太祖實錄載薩爾滸之戰明楊鎬等集兵二十萬四路分出侵我興京我太祖太宗及貝勒大臣等統勁旅數千殱戮明兵過半一時良將如劉綎杜松等皆歿扵陣近曽親製書事一篇用揚祖烈而示傳信惟時王業肇基其抗我顔行者原當多為獮薙然迹其冒鏑攖鋒竭忠効命未嘗不為嘉憫又若明社將移孫承宗盧象昇等之抵拒王師身膏原野而周遇吉蔡懋徳孫傳庭等以闖獻蹂躪禦賊亡身凛凛猶有生氣總由明政不綱自萬厯以至崇禎權奸接踵閹豎横行遂致黑白混淆忠良冺滅每為之搤掔不平福王時雖間有追謚之人而去取未公亦無足為重予惟以大公至正為衡凡明季盡節諸臣既能為國抒忠優奬實同一視至錢謙益之自詡清流靦顔降附及金堡屈大均輩之倖生畏死詭託緇流均屬䘮心無恥若輩果能死節則今日亦當在予旌之列乃既不能捨命而猶假言文字以圖自飾其偷生是必當明斥其進退無據之非以隐殛其㝠漠不靈之魄一褒一貶衮鉞昭然使天下萬世共知予凖情理而公好惡以是植綱常即以是示彰癉凡諸臣事蹟之具扵明史及通鑑輯覽者宜各徴考姓名仍其故官予以謚號一凖世祖時例行其令大學士九卿京堂翰詹科道集議以聞命議謚前明靖難殉節諸臣諭前以明季殉節諸臣各為其主義烈可嘉爰命大學士九卿等集議予諡所以褒闡忠貞風勵臣節也今復思建文革除之際其臣之仗節死事者亦具載史傳當時永樂一藩臣耳乃犯順稱兵隂謀簒奪諸臣以大義自矢固當不共戴天雖齊泰黄子澄輕率寡謀方孝儒識見迂濶未足以輔助少主然跡其尊主鋤强之心實堪共諒迨大事已去猶且募旅圖存抗詞抵斥雖隕身湛族百折不囘洵為無慚名教者他若景清鐵鉉輩或慷慨捐軀或從容就義其致命縱各不同而志節凛然如在下至東湖樵夫補鍋匠之流姓名即隐晦不彰其心蹟固可追溯也特以永樂殘刻性成淫刑以逞屠戮之慘極於𤓰蔓牽連殆非人理余讀史至此未嘗不深憤而痛嫉之雖其中葉少弛厲禁而彼時臣子徇私曲諱終不獲顯示褒揚使忠臣義士之氣久弗克伸良可憫惻夫以勝國革命之時其抗我顔行者尚念其忠於所事特命表章矧建文諸臣不幸遘遭内難為國捐生成仁取義顧可令其湮沒扵千百世下耶允宜再集廷議並予易名以發幽光而昭公道其覈實條具以聞命國史館編列明季貳臣傳諭昨閱江蘓所進應燬書籍内有朱東觀選輯明末諸臣奏疏一巻及蔡士順所輯同時尚論錄數巻其中如劉宗周黄道周等指言明季秕政語多可採因命軍機大臣將疏中有犯本朝字句者酌改數字存其原書而當時具疏諸臣内如王永吉龔鼎孳呉偉業張縉彦房可壯葉初春等在明已登仕版又復身仕本朝其人既不足齒則其言不當復存自應槩從刪削盖崇奬忠貞即所以風勵臣節也因思我朝開剏之初明末諸臣望風歸附如洪承疇以經畧䘮師俘擒投順祖大夀以鎮將懼禍帯城来投及定鼎時若馮銓王鐸宋權謝陞金之俊黨崇雅等在明俱曽躋顯秩入本朝仍忝為閣臣至若天戈所指解甲乞降如左夢庚田雄等不可勝數盖開剏大一統之規模自不得不加之錄用以靖人心而明順逆今事後平情而論若而人者皆以勝國臣僚乃遭際時艱不能為其主臨危授命輙復畏死倖生靦顔降附豈得復謂之完人即或稍有片長足錄其瑕疵自不能掩若既降復叛之李建泰金聲桓及降附後潜肆詆毁之錢謙益輩尤反側僉邪更不足比扵人類矣此輩在明史既不容闌入若於我朝國史因其略有事蹟列名叙傳竟與開國時范文程承平時李光地等之純一無疵者毫無辨别亦非所以昭褒貶之公若以其身事兩朝槩為削而不書則其過蹟轉得藉以揜盖又豈所以示傳信乎朕思此等大節有虧之人不能念其建有勲績諒扵生前亦不能因其尚有後人原扵既死今為凖情酌理自應扵國史内另立貳臣傳一門將諸臣仕明及仕本朝各事蹟據實直書使不能纎㣲隐飾即所謂雖孝子慈孫百世不能改者而其子若孫之生長本朝者原在世臣之列受恩無替也此實朕大公至正之心為萬世臣子植綱常即以是示彰癉昨嵗已加謚勝國死事諸臣其幽光既為闡發而斧鉞之誅不宜偏廢此貳臣傳之不可不核定扵此時以補前世史傳所未及也著國史館總裁查考姓名事實逐一類推編列成傳陸續進呈候朕裁定焉命追復睿親王封爵及復開國有功諸王原號並予配享諭睦親彰善王政宜先繼絶昭屈聖經所重朕自臨御以来間日恭閱列祖列宗實錄一冊因得備知祖宗創業艱難及爾時懿親藎臣勤勞佐命底定中原偉伐殊功實為從古所未有而當時策勛錫爵榮號崇封所以酬答者本從優厚迨其後或有及身縁事旋被降削者或有子孫承襲更易封號者迄今平情凖理若不為之溯述闡揚追復舊恩扵心實有所未惬因念睿親王多爾衮當開國時首先統衆入闗掃蕩賊氛肅清宫禁分遣諸王追殱流㓂撫定彊陲一切創制規模皆所經畫尋即奉迎世祖車駕入都定國開基以成一統之業厥功㝡著顧以攝政有年威福不無専擅諸王大臣未免畏而忌之遂致歿後為蘓克薩哈等所搆授欵于其屬人首告誣以謀逆經諸王定罪除封其時我世祖章皇帝實尚在冲齡未嘗親政也夫睿王果萌異志則方兵權在握何事不可為且吴三桂之所迎勝國舊臣之所奉止知有攝政王耳其勢更無難號召即我滿洲大臣心存忠篤者自必不肯順從然彼誠圖為不軌無難潜鋤異已以逞逆謀乃不扵彼時因利乘便直至身後以歛服僣用明黄龍衮指為覬覦之証有是情理乎况英親王阿濟格其同母兄也於追捕流賊囘京時誆報李自成身死且不候㫖班師睿王即遣員斥責其非並免王公等往迎之禮又因阿濟格出征時脅令巡撫李鑑釋免逮問道員及擅至鄂爾多斯土黙特取馬令議其罪降為郡王平日辨理政務秉公持正若此是果有叛志無叛志乎又實録載睿王集諸王貝勒貝子公大臣等遣人傳語曰今觀諸王貝勒大臣但知謟媚扵予未見有尊崇皇上者予豈能容此昔太宗升遐嗣君未立英王豫王跪請予即尊位予曰爾等若如此言予當自刎誓死不從遂奉皇上纉承大統似此危疑之時以予為君予尚不可今乃不敬皇上而媚予予何能容自今以後有盡忠皇上者予用之愛之其不盡忠不敬事皇上者雖媚予予不爾宥也且云太宗恩育予躬所以特異扵諸子弟者盖深信諸子弟之成立惟予能成立之每覽實録至此未嘗不為之堕淚則王之立心行事實能篤忠藎感厚恩深明君臣大義尤為史冊所罕覯使王彼時如宋太宗之處心積慮則豈肯復以死固辭而不為邪説摇惑耶乃令王之身後久抱不白之寃扵泉壤心甚憫焉假令當時王之逆跡稍有左騐削除之罪果出扵我世祖聖裁朕亦寧敢復翻成案乃實由宵小奸謀搆成寃獄而王之政績載在實録者皆有大功而無叛逆之迹又豈可不為之昭雪乎昨扵乾隆三十八年因其塋域久荒特勅量為繕葺並准其近支以時祭掃然以王之生平盡心王室尚不足以慰彼成勞朕以為應加恩復還睿親王封號追謚曰忠補入玉牒並令補繼襲封照親王園寢制度修其塋墓仍令太常寺春秋致祭其原傳尚有未經詳叙者並交國史館恭照實録所載敬謹輯錄添補宗室王公功績傳用昭彰闡宗勛至意又如豫親王多鐸從睿親王入闗肅清京輦即率師西平流㓂南定江浙實為開國諸王戰功之冣乃以睿親王之誣獄株連降其親王之爵其後又改封信郡王雖至今承襲罔替但以王之勲績超邁等倫自應世胙原封以彰殊眷豈可以風影㣲眚輙加貶易乎朕以為應復其原封又諸王中披堅執鋭拓土開彊共成一統之業者如禮親王代善後改封康親王鄭親王濟爾哈朗後改封簡親王肅親王豪格後改封顯親王克勤郡王岳託後改封平郡王當時俱茂著北猷克昭駿烈載在宗盟今其子孫所襲均非始封之名外人不知妄疑宗藩當國家締造時有大勲勞而後裔均不得長延帯礪似為闕典即其本支承家襲慶以去祖漸逺幾忘其先世錫封之由弗克顧名奮效所係扵宗室子孫者甚重况功臣世封内如揚古利之英誠公費英東之信勇公額亦都之果毅公俱以本號相傳其子孫承襲者各能溯勛閥以宣偉績不失故家喬木之遺今以親賢世胄竟改其初封嘉號何以垂詒奕禩示酬庸追本之義乎朕以為應復其原號著交軍機大臣㑹同宗人府悉心妥議具奏其餘宗室諸王貝勒等如有顯著功績其封爵後經降奪者除本人身罹重愆自不當復邀優典若係承襲之子孫獲咎議處者僅當斥其本身而不當追貶其祖宗世爵方為平允亦著一併㑹查議奏再配享太廟諸王僅有通達武功慧哲宣獻四郡王其太祖太宗世祖時戮力行間櫛風沐雨之親藩如向所舉數人皆未之及盖由當時議禮諸王各懐私意遂爾沒其勛伐不得同侑馨香豈足以彰公道所有睿親王禮親王豫親王肅親王克勤郡王俱著補置牌位配享太廟用以妥功宗而昭渥典至通達郡王係顯祖之子武功慧哲宣獻三郡王係景祖之子當時雖身與配享第以三郡王宗支已在覺羅宗室王公表傳内亦未立通達郡王傳國史傳又以屬在宗潢令此四王無所附麗亦覺缺典著交内閣國史館補為立傳通達郡王入於宗室武功等三郡王列扵國史諸大臣傳之前或當時紀載簡少功績無由稽核不拘詳略各立一傳以徴信實御製文二集巻七
