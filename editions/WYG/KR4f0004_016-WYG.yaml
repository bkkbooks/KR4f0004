  text: 欽定四庫全書御製文初集巻十六
  hash: sha256:3164edd68cd4d56662e0c3c830fcf60507fd48f330a3d322a2959e822a00606b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_016-1a, image: WYG1301/WYG1301-0141c.png}
body:
  text: 碑文文廟碑文天生烝民若有恒性人道立焉亶生聰明神聖作之君作之師以厚其生以正其徳綱常之所以不墜倫類之所以相維相保於天地間者斯焉是頼古聖皇繼天立極君師之道兼隆夐乎尚矣繼是以来雖代有君而克盡其為君之道者盖寡若夫同天地亘今古繼往聖開来世特立為師之道於宇宙間者則惟我先師孔子一人敬維孔子集羣聖之大成祖述憲章垂教萬世使後之帝王建極綏猷得有所遵循以求治法道法之大全由之則治悖之則亂大哉孔子功參乎覆載明並乎日月生民以来未有盛焉者也我列祖撫御寰區叙彞倫明禮樂諴民阜俗一惟孔子所傳之大經大法是矩是式微言奥義悉推闡而表章之統緒相承心源符契欽敬追崇之盛典超越往代具在彞章予小子懋學書闈景行志切逮寅承丕緒祗奉先猷夙夜兢兢繹思聖道越乾隆三年季春上日躬釋奠於先師前期飭官庀材崇飾廟貌特命大成殿大成門覆以黄瓦崇聖祠覆以緑瓦稱朕慕道崇師至意記曰禮時為大宜次之稱次之先王之制禮也順於鬼神合於人心惟其稱而已太學者帝王尊師之地盡禮備物以明尊也稱其徳而不為過宜莫大焉抑非以炫耳目之觀也欽崇至道敷政教以淑羣黎法祖隆師罔敢或斁俾薄海内外無一夫不與被聖人之澤斯朕志也夫乾隆四年己未用允廷臣之請勒文紀事以垂示於奕世系以詩曰於昭道統淵源三五至聖挺生立極萬古贊修删定為帝王師天地悠久斯文在茲惟我祖宗惇崇典禮爰謁林廟爰封祖禰予膺鴻緒彞憲是承釋奠視學大昕鼓徴萬仭宫墻圜橋首善笙鏞斯陳俎豆斯薦眈眈翼翼鳥革翬飛制符宸居金碧流輝丕煥宏模神明所宅玉振金聲永揚教澤式眎兆庶式育才賢光宣文治億萬斯年重建泰山神廟碑文國家秩祀之典方望實惟最重而泰山為五嶽宗長功用顯彰為徳尤盛廟貌之在山巔者歴有年所夐乎邈矣鬱攸不戒宜用鼎新粤以乾隆六年特遣專官董建靈宇殿庭廊廡門序觀闕崇閎壯麗鳥斯革翬斯飛眈眈翼翼琉璃丹碧輝映日星黼座璇題像設神御穆然其容笵金惟肖山半為香亭寳鼎中峙覆以重簷載陟斯憩興仰止焉鳩役庀材胥出内帑公旬不勞經費不損凡土木之工若干閱期有六旬而竣朕惟岱為方岳昉於虞書列於禹貢紀於周官詳於春秋傳蓋河泲淮海川瀆環滙扶輿積髙之氣磅礴藴結靈淑鍾萃蔚為神臯奠坤維而翊天縡方位屬震盛徳在木得造化生生之元故觸石出雲不崇朝而遍雨天下功至仁也澤至溥也我列祖撫一海㝢懐保烝黎一體天地大生廣生之心為神人主明徳馨香神庥昭格予一人寅承基緒夙夜兢兢事神保民罔不祗肅彼登封告成刻石紀號金泥玉檢往牒所誇矯誣侈大之事繄寡昧所不敢知而乂寧方夏阜殖羣生俾庶而富俾夀而臧尚其恵邀嘉貺錫羨介祉以篤我國家無疆之慶則所以崇禮展敬揭䖍妥靈其何敢後焉爰勒詞琬琰昭示永永系以銘曰巖巖泰山駿極于天有虞肆覲肇祀用䖍牲幣祝號秩視三公匪僭匪瀆曰以報功伊神之功霖雨萬國載生載殖食我神力春也其時仁也其徳體乾之元以立坤極奕奕新廟穹峙層霄易陶以金以禦剛飈雲生桂棟雨挾松濤俯瞰榑桑日觀岧嶤雕甍珠網鋪金墄玉紫殿靚深黼衮端穆月馭星軿林霏馥郁靈貺孔時錫茲介福降神毓秀賢哲克生時暘時雨百榖以成陋彼陟封七十二代成民致神往訓是佩肸蠁斯通鑒格斯在祗薦明禋於萬千載安佑宫碑文序昭穆以祀其先祖有功而宗有徳建報本之義為萬古之經者宗廟之制三代以上即有之繼人之志述人之事者所當謹也設裳衣以如其生朔有酌而望有獻盡事親之禮抒不匱之思者原廟之制西漢以来始有之繼人之志述人之事者弗敢廢也後世神御殿亦猶漢原廟之義耶然漢之原廟不過月出衣冠一逰耳至宋之時乃有神御之名蓋奉安列朝御容所也上元結燈樓寒食設秋千其視漢為已備矣而崇建徧郡國奉祀或禪院識者多議其非禮焉我皇祖聖祖仁皇帝在位六十餘年恩澤旁覃僻邑窮谷圓頂方趾之衆飲其徳而不知子孫臣庶躬被教育者宜其謳歌慨慕而無已思也是以雍正元年我皇考世宗憲皇帝謹就大内夀皇殿奉安御容朔望瞻禮牲新時薦而於皇祖所幸暢春園亦陳薦如禮非輕為此創舉也我皇祖有非常之澤及天下是以皇考合天下之情亦以非常之禮報之有漢宋備物備禮之誠而無宋代徧及郡國祀繁致䙝之譏也予小子嬛嬛在疚顧諟皇考之陟降勅明旦凛紹庭良法美政布在方冊者謹守而弗敢失既就夀皇殿東室䖍奉皇考御容以配皇祖念茲圓明園我皇考向日逰觀在囿在沼之地也其何忍恝視爰擇爽塏之地具殿廡之規為室九敬奉皇祖御容於中奉皇考配東一室匪惟予小子罔極之思羮墻之慕藉以稍抒亦欲使後世子孫凛覲揚之志勤堂構之基所謂禮以義起有其舉之莫敢廢也鳩工於乾隆庚申而蕆事於癸亥所司以碑文請乃序其事如左而繋之以詩懿茲苑囿皇考所作土階茅茨遵堯之約匪誇丹雘有窅谿壑匪沸管絃有唳雲鶴詎美之求惟聖所樂我龍受之中心惕若宅是廣居九有是度祖武斯繩宏規敢畧爰相其地載斟載酌爰創其模載經載落廟貌巖巖堂皇綽綽有閑旅楹有梴松桷周之以郛其郛嶽嶽環之以池其池㶁㶁其水何有鳶飛魚躍其宇何有網軒珠箔神御孔安心乎莫莫来覲来齋曰望曰朔於萬斯年予誠永託雍和宫碑文我皇考世宗憲皇帝肇封於雍邸在京師艮維與太學左右相望迨紹纉大統正位宸極爰命舊第曰雍和宫設官置守甍宇堊飾無増於昔示弗忘也越嵗乙夘弗弔昊天龍馭上賔攀髯莫逮維時喪儀具展禮當奉移念斯地為皇考藩潛所御攸躋攸寧幾三十年神爽憑依倘眷顧是迺即殿宇而飭新之以奉梓宫易覆黄瓦式廓門屏櫺星綽楔規制畧備洎山陵禮成於此敬安神御嵗時展禮至於今十稔予小子紹庭陟降之忱朝夕罔釋深惟龍池肇迹之區既非我子孫析珪列邸者所當䙝處若曠而置之日久蕭寞更不足以宏衍慶澤垂燾於無疆曩我皇考孝敬昭事我皇祖凡臨御燕處之適且久者多尊為佛地曰福佑寺則沖齡育徳之所也曰恩佑寺則鼎成陟方之次也永懐成憲厥有舊章而稽之往古修真本唐髙龍躍之宫慈慶乃渭水慶善之宅宋則祥符錫慶祠號景靈咸因在潛之居實曰神明之隩後先一揆今昔同符是用寫境祗林荘嚴法相香幢寳網夕唄晨鐘選髙行梵僧居焉以示蠲明至潔也以昭崇奉至嚴也以介福釐至厚也我皇考向究宗乗證涅槃三昧成無上正等正覺施洽萬有澤流塵劫帝釋能仁現真實相羣生托命於是焉在豈特表範睟容為章浄域已哉予小子瞻仰之餘間一留止緬憶過庭怵惕興慕敬勒石以記系以頌曰於皇皇考禔福無疆奕奕朱邸積慶流長乗六以御茲焉發祥時雍協和聖謨孔彰其一鼎成於湖神御攸奠陟降在天聖靈式眷愾乎斯聞僾乎斯見超宋景靈邁唐慶善其二懿彼浄覺廣樹良因澄圓性海般若通津慧燈普照法寳常新敷華玉地轉曜金輪其三矧是丹宫藩封拜賜載寢載興凝禧集瑞人世香臺梵天忉利擁吉祥雲開歡喜地其四標新福界㝠契慈縁鴈堂集侣鹿苑棲禪香華送雨貝葉霏煙雲車風馬歆顧珠筵其五仰惟聖徳昊天罔極以妙明心運大願力孰為權應孰為真實無去無住厯化千億其六慈雲廣䕃甘霔長濡入涅槃海繋如意珠恒沙太千共味醍醐不可思議浹髓淪膚其七灼灼靈儀巍巍瑞相言瞻言依徘徊惻愴十地四天鴻恩融暢盡未来際永資慈貺其八闡福寺碑文太液池之北有亭五翼然臨於水裔玉蝀前横瓊島東抱波光塔影淪漣映帶亭之北綴以閒館爽塏軒豁蓋仍前明之舊康熈中皇祖臨駐西苑常奉太皇太后避暑於此後以其地奉安仙馭几筵遂相沿為内廷遷次之所越乾隆七年肇先蠶壇於液池東北隅相距甚邇聖母皇太后以繭館盛儀宜致蠲潔命改建佛宇朕遵懿㫖爰出内帑勑將作葺其舊址畧為崇飾寳坊傑䜿香刹雙標用如幻金剛三昧造大法像髙丈六者三倍之而贏具慈愍性有大威神構層簷以覆之珠網璇題金碧照耀冠於禁城諸刹上為慈聖祝釐下為海宇蒼生祈祐始事於乾隆乙丑三月越明年八月告成因名之曰闡福思自無始劫来生人生物凡諸福徳各各具有亦各具足而彼衆生芸芸㝠㝠惟以各得所欲為福未得求得已得求益無有饜足為嗔為忮為丐為􅟃窮劫相尋展轉纒縛時維因陀羅秉南面權廓紘恢綱約以皇度馭以禁憲沐以膏澤浸以醇醲敷錫多福於有生衆厥有生衆善根深固一心信嚮正知正見屏諸邪雜咸得福慶安樂老夀滿所願欲如其弗祇弗延迺背而馳式抵大戾備諸苦惱亦其自取大慈氏發洪誓願施無畏力拯諸厄難隨聲赴感一時普度拔去孽根頓生福慧孽縁浄盡福應備臻於其夲来了無欠缺要知法王非以已福施彼衆生亦非别能於彼衆生有所増益凡此諸福衆生自有亦各具足能仁慈悲遂得普度古聖帝明王斂福錫福其亦有同於此也耶乃闡其義而說頌言一切有為法不能造諸福能受諸福者皈依法王力譬坐暗室中迷悶不得出忽遇大力人闢門開四牖因得大光明此大光明相非藉他目見又如沈巨海飄泊無邊底忽遇大慈航脫離惡濁浪及登彼岸已乃適得本来告爾種福因衆生性具足迷惑不自知種種成顛倒願依法王力恒河沙衆生乃至未来劫自性悉清浄各各受諸福恒河沙衆生所受諸福徳同一清浄性是為福徳聚重修大覺寺碑文朕惟聖王御世宏濟羣生其與慈氏能仁普利人天功徳不可思議迹雖殊而心源則一佛經所云過去諸佛往往示現轉輪以世法乂安天下復以宗㫖接引諸方延續慧命者蓋祇期萬善之同歸而已我皇考福慧兩足鏡智圓明自潛邸時深究宗乗證悟無上了義御極撫辰海内清和咸理乃於幾暇選序古徳語録開示津梁仰惟大慈悲父廣種善根凡梵宇琳宫曽施功徳皆不啻如来身坐道塲而厯劫四衆並應荘嚴擁護瞻禮發心者也朕因詣龍潭近望西峯藍若大覺寺者金清水院故址眀以靈泉寺更名運謝禪安蔚為古刹康熈庚子之嵗皇考以僧性音參學有得俾往住持丈室御製碑文以寵之及圓寂歸宗復命其徒建塔於此慈恩眷顧聖蹟攸昭而積嵗滋久丹雘剥落爰加修葺工既告竣勒石以紀嵗月俾爾後住山大衆時念法王顯現化導因縁與國家累葉護持正教振起宗風之至意云御製文初集巻十六
