body:
  text: 記登開化寺六和塔記杭州月輪峰六和塔宋開寳中創建以鎮江潮開化寺其塔院也自宋以來屢燬屢復燬則有驚浪之虞復則有安瀾之慶是以雍正十三年我皇考世宗憲皇帝特發帑金命有司鳩工庀材是輪是奐越二年而告成又十有四年而朕以南巡之便親陟其頂且為之記焉盖浙之潮人所共知為雄鉅浙之塘人所共知為要害然非目擊終為耳食且沿江而來亦不辨其曲折之形也造塔巔而後審其所以稱浙江者溯流東睎又悉其亹龕赭迓溟渤頓挫渟蓄迭蕩掀激斯所以為廣陵之潮者我皇考居九重之穆清運萬㝢於几席留意海塘福彼蒼赤葺新穹塔資茲佑相予小子景仰前烈深惟愛民之心既誠故為民之慮無所不至而必中其綮夫必待身悉而始圖之斯不已遲乎是皇考之聖神而予小子瞠乎其後者也故勒貞珉以識之皇太后駕臨金山記朕惟省方觀民先王所重時巡之典虞夏以來尚己我皇祖聖祖仁皇帝撫御九有匪居匪康以江浙地逺京畿其民文而慧文則知禮義導之善可以為天下倡慧則鮮堅持入於惡亦可以為天下倡而且財賦所出國家藏富之地也是以涉河渡江不憚數勤清蹕問風俗咨疾苦湛恩汪濊江鄉父老至於今謳思弗諼朕臨御以來十有六年於兹蚤作寤思宵衣旰食兢兢懼一夫之不獲㒺敢稍自暇逸謁盛京幸三晉巡齊魯㳺河雒所在周察民隠廣敷解澤而東南士民尚未得邀清問而布愷惠良用殷然嵗辛未恭遇皇太后六袠萬夀朕将合億兆望幸之歡心以祝無疆爰敬循皇祖舊典躬奉慈輿届春南幸上元前二日發自京師渡濟漯汶沂至黄河周覽堤工遂汎舟踰淮以達於江採民謡詢土俗祇承慈訓屢沛殊恩維時逺邇欣愉殊音同聲秀眉黄髮扶杖而觀者耄期之叟也摳衣束帶望清塵而抃舞者官吏迎而搢紳謁也掞華摛藻陳詩而獻頌者士藹吉而民秀良也攜童稚挈壺飱駢肩接踵於輦路之旁者田夫野老村嫗里媪之雜遝而笑語也盖江國之望朕來已久而懽欣鼓舞願為聖母稱萬年之觴者其積忱非一日矣二月之望舟過大江顧瞻金山上凌太虚下瞰洪流為江南諸勝之最遂奉皇太后一登覽焉迨巡浙迴舟以及江寧旋蹕先後凡三登焉侍輦周歴敬仰聖祖宸翰榜署詩篇貞珉相映其豐碑屹立於中泠之右者則康熙三十六年奉寧夀皇太后駐蹕兹山所為御製記也瞻誦之餘穆然見當日忭喜之情慈愛之意與夫士民慶豫之忱髣髴長在江聲山色間以今日觀之雖不敢云後先一轍傳有之曰豐水有芑數世之仁也洪惟我聖祖詒謀至深且逺與斯民休養生息涵育喣嘔於無窮者如膏之沃浹而彌融如水之潤濡而彌廣醖醲釀厚蒸為太和用使奕禩子孫臣民藹然親愛於山川清晏之餘即金山一行宫而繞屬車環宫扇者數十年以前於皇祖見之數十年以後又於朕奉聖母皇太后見之豈非重熙累洽純佑命於日引月長有以得此歟皇太后聖慈覃被福徳並茂母儀天下享尊養之隆與寧夀前後輝耀仰見我朝聖母嗣徽篤祜其為宫庭之盛美寰宇之鴻庥繄皇古以來所未有則是舉也實有足紹美於前徽者焉若夫江天之浩蕩風煙雲樹之鬱蒼與夫鱗昆甲族之神竒而變化雖遇目賞心偶一寄興然朕之所以俯仰而忻愜者固不在此也萬夀山昆眀湖記嵗己巳考通惠河之源而勒碑於麥莊橋元史所載引白浮甕山諸泉云者時皆湮沒不可詳夫河渠國家之大事也浮漕利涉灌田使漲有受而旱無虞其在導洩有方而瀦蓄不匱乎是不宜聴其淤閼汎濫而不治因命就甕山前芟葦茭之叢雜浚沙泥之隘塞滙西湖之水都為一區經始之時司事者咸以為新湖之廓與深兩倍於舊踟蹰慮水之不足及湖成而水通則汪洋漭沆較舊倍盛扵是又慮夏秋汛漲或有踈虞甚哉集事之難可與樂成者以因循為得計而古人良法美意利足及民而中止不究者皆是也今之為閘為􅄵為涵洞非所以待汛漲乎非所以濟溝塍乎非所以唘閉以時使東南順軌以浮漕而利涉乎昔之城河水不盈尺今則三尺矣昔之海甸無水田今則水田日闢矣顧予不以此矜其能而滋以懼盖天下事必待一人積思勞慮親細務有弗辭致衆議有弗恤而為之以僥倖有成焉則其所得者必少而所失者亦多矣此予所重慨夫集事之難也湖既成因賜名萬夀山昆明湖景仰放勲之蹟兼寓習武之意得泉甕山而易之曰萬夀云者則以今年恭逢皇太后六旬大慶建延夀寺於山之陽故爾寺别有記兹特記湖之成並元史所載泉源始末廢興所由云玉泉山天下第一泉記水之徳在養人其味貴甘其質貴輕然三者正相資質輕者味必甘飲之而蠲疴益夀故辨水者恒於其質之輕重分泉之髙下焉嘗製銀斗較之京師玉泉之水斗重一兩塞上伊遜之水亦斗重一兩濟南珍珠泉斗重一兩二釐揚子金山泉斗重一兩三釐則較玉泉重二釐或三釐矣至恵山虎跑則各重玉泉四釐平山重六釐清涼山白沙虎邱及西山之碧雲寺各重玉泉一分是皆巡蹕所至命内侍精量而得者然則無更輕於玉泉之水者乎曰有為何泉曰非泉乃雪水也常収積素而烹之較玉泉斗輕三釐雪水不可恒得則凡出山下而有冽者誠無過京師之玉泉昔陸羽劉伯芻之倫或以廬山谷簾為第一或以揚子為第一惠山為第二雖南人享帚之論也然以輕重較之恵山固應讓揚子具見古人非臆説而惜其不但未至塞上伊遜並且未至燕京若至此則定以玉泉為天下第一矣近嵗疏西海為昆明湖萬夀山一帶率有名泉溯源㑹極則玉泉實靈脈之發皇徳水之樞紐且質輕而味甘廬山雖未到信有過於揚子之金山者故定名為天下第一泉命将作崇煥神祠以資恵濟而為記以勒石夫玉泉固趵突山根蕩漾而成一湖者詩人乃比之飛瀑之垂虹即予向日題燕山八景亦何甞不隨聲云云足見公論在世間誣辭亦在世間藉甚既成雌黄難易泉之於人有徳而無怨猶不能免訛議焉則挾徳怨以應天下者可以知懼抑亦可以不必懼矣虎神鎗記虎神鎗者我皇祖所貽武功良具用以殪猛獸者也國家肇興東土累洽重熙惟是詰戎揚烈之則守而弗失皇祖嵗幸木蘭行圍諸蒙古部落雲集景從予小子雖不敏纉承之志其敢弗蘉故數年以來巡狩塞上一如曩時䝉業藉靈四十九旗及青海喀爾喀之仰流而來者亦較前無異焉若輩皆善射重武使無以示之非所以繼先志也圍中有虎未甞不親往射之弓矢所不及則未嘗不用此鎗用之未嘗不中壬申秋扵岳樂圍場中獵人以有虎告而未之見也一䝉古云虎匿隔谷山洞間彼親見之相去盖三百餘步朕約畧向山洞施鎗意以驚使出耳乃正中虎虎咆哮而出負嵎跳躍者久之復入復施一鎗則復中之遂以斃焉盖向之發無不中乃於谿谷叢薄目所能見之地斯已竒矣而茲岳樂所中則隔谷幽洞並未見眈眈闞如之形於揣度無意間馥焉深入不移時而殪猛獸則竒之􅆟竒其稱為神良有以也夫萬乗之尊詎宜如孟克特庫之流誇一夫之勇哉孟克喀爾沁䝉古人特庫滿洲今為内大臣皆能獨搏猛獸如馮婦者而習武示度必資神器以效竒而愉快則是鎗也與兊戈和弓同為宗社法守不亦宜乎盤山千尺雪記昨嵗巡幸江南觀民問俗之暇流覽江山勝槩尋古蹟之竒文物秀麗區也其悦性靈而發藻思者所在多有而獨愛吳之寒山千尺雪創扵明隠士趙宧光今范氏搆園其地者境野以幽泉鳴而冷題其閣曰聽雪為之流連為之倚吟歸而肖其䖏扵西苑之淑清院盖就液池尾閭有明時所築假山喬木峭蒨噴薄之形似之矣而乏天然及秋駐避暑山荘乃得飛流潄峽盈科不已者作室其側天然之趣足矣而尚未得松石古意今春來盤山遊文皇所為晾甲石者滙萬山之水而歸於一壑潨潨之湍奏石面謖謖之籟響松顛時而隂雨忽晴衆谿怒勃則暴漲砰訇砉焉直下挾石以奔觸石以停鞳然鏗然激揚湱然雖千夫撞洪鐘有不足比其壮者爰相面勢結廬三間茲重遊而其屋適成開虚窓俯流泉覺松濤石籟問荅親人乃歎寒山千尺雪固在是間而勞勞徃返營營規寫者不幾為流水寒潭笑未能免俗哉率筆記之亦以存髙風之慕也玉泉山竹鑪山房記古之人冬日則飲湯夏日則飲水無所謂茗飲也茗飲其權輿於漢而盛於李唐之季乎然物必有其本不揣其本而齊其末未為善鑒也茗飲之本其必資於水乎不於水之甲乙定茗之髙下雖摘焙㸃烹精其製雨前雷後辨其時北苑荆溪龍井天目别其地踵事増華議論滋繁解渴悦性之道逝其逺矣若惠山之竹鑪茶舍可謂知茗飲之本焉其地盖始於明僧性海就恵泉製竹鑪以供煎瀹茶舍之名因以是傳前嵗偶至其地對功徳注冰雪髙僧出塵之槩彷彿於行雲流水間也歸而品玉泉則較惠山為尤佳因搆精舍二間於泉之側屏攅峯之㠎嶫俯迴溪之瀠瀁天風拂林衆樂迭奏瀏莅卉歙若絲者若竹者若宫商角徵羽者與漣漪綺縠相上下觀難為状聴復不窮而仿惠山之竹鑪適陳砥几蟹眼魚眼之間亦泠泠颯颯作聲不止無事習静之人樂此經年不出可也而余豈其人哉時而偶來藉以滌慮澄神亦不可少也夫精舍竹鑪皆可倣而恵泉則不可倣今不必倣而且有非惠泉之所能倣者焉是不既握茗飲之本而我竹鑪山房之作庸可少乎玉盃記玉盃有鼂其采紺其色而璘璘其文者驟視之若土華剥蝕炎劉以上物也撫之留手􅊡􅖸非内出以視玉工姚宗仁曰嘻小人之祖所為也世其業故識之然則今之偽為漢玉者多矣胡不與此同曰安能同哉昔者小人之父授淳煉之法曰鍾氏染羽尚以三月而况玉哉染玉之法取器之紕纇且惌者時以夏取熱潤也熾以夜隂沈而陽浮也無貴無瑕謂其堅完難致入也乃取金剛鑽如鐘乳者密施如蜂蠆而以琥珀滋塗而漬之其於火也勿烈勿熄夜以繼日必經年而後業成今之偽為者知此法已鮮矣其知此法既以欲速而不能待人之亟購者又以欲速而毋容待則與圬者圬牆又何以殊哉故不此若也宗仁雖玉工常以藝事諮之輒有近理之談夫圬者梓人雖賤役其事有足稱其言有足警不妨為立傳而况執藝以諫者古典所不廢茲故櫽括其言而記之永安寺古井記白塔永安寺盖就瓊華島故地而建所謂廣寒殿玉虹金露之亭皆湮没不可考適有所營葺工人於山之西麓掘地得廢井一㼾甃木盤層累鱗裓尋丈以深汋汋有水不瀱以眢巽下坎上合羲經義轆轤綆汲可致山巔乃知輟耕録所稱引金水河於山後轉機運􅆽至山頂者舍近求逺妄也明矣不寧惟是所云島土取自塞外者更妄也當時縱為厭勝或少取塞山之土置此則有之矣豈有鑿掘輦致於數千里外以成是山之理意者疏浚液池不能移土於逺即就近成此島耳夫顯而易見者尚淆訛至此史氏之耳食影談任好惡而顛倒是非吁可詫哉井不可幕而杜牧闢之顧謂廢井之無水者或致傷人今得此於堙埋土封中不浚可汲導流助景事半功倍故樂從司工之請而存之瓊華島始於金至元時改稱萬夀山或訛為萬嵗山茲不具論惟是㼿㼟盤榦半千年物而人視之與今之木若甎無以異若夫宣徳成化之瓷則人寳之其初豈離土哉物之託質失尺寸而貴賤殊别與夫人之好惡逐目役髙下鮮定衡者吾以慨古澄照息其是非焉石舫記自茅茨土階以來為室者必有階為階者率以石所以去湫濕就髙明棟宇以安固其基址陛九級亷逺地則堂髙陛無級廉近地則堂卑古人所以為喻也至乃步壛釦砌左磩右平設切厓隒山堮水磯雖華質殊製髙下異施其所以限柱礎而承屋基則一耳余之石舫盖築之昆明湖中不依汀傍㟁雖無九成之規而有一帆之槩彌近烟雲之賞迥逺風浪之驚鷗鷺新波菰蒲密渚湧金漪而月潔凝玉鏡而冰寒四時之景不同朝暮之觀屢易彼之青雀黄龍雖資濟川亦虞穿綫則何如一肖形而浮坎止艮義兩存焉非徒歐米之興慕也且田盤之浮石竒則竒矣而或需乎雲香山之緑雲似則似矣而或乏乎水若夫凜載舟之戒奠磐石之安虚明洞達職思其居意在斯乎意在斯乎鐵章記鐵章一錯以金方得寸有十分寸之五博得十分寸之二柄以木方如之博得十分寸之五稍豐其上刻若井藻又橢以窮刻若華表柱之首其長二寸通章之博髙二寸有十分寸之七藻上穿好綬約之綬之窮為蕃錦囊覆垂章上不可離藏以髹盝其文曰厄爾徳尼卓里克圖洪台吉之章華語所謂寳權大慶王也盖自䇿妄阿拉布坦時乞自達賴喇嘛用梵書刻印錫予以為準噶爾傳世之器今年夏既平準夷遂獲此章驛致典屬予既訝鐻鍝君長亦有世守法物也而又憫達瓦齊不得辭毁櫝之愆若夫戒盈知懼固不在區區抑埴之物矣作鐵章記御製文初集巻五
