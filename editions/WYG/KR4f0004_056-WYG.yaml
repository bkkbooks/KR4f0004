body:
  text: 考證灤河濡水源考證濡水見史傳者凡五説文出安東入漆涑者涿郡之濡也廣輿記出易州窮獨山一名聖女水者易州之濡也並音儒左傳出高陽者河間之濡也音而三水皆由天津入海此獨石口外之濡讀如難音與灤近其水自由永平府之樂亭縣入海與畿内三濡逈不相涉又水經注蒼梧之濡水出永豊縣濡山字亦音儒名亦適相同耳而惟灤河之濡水源逺流長雄扵其四酈道元水經注所云出禦夷鎮者也昨歳命方觀承考濡源委亦既繪其梗概條分縷析而為之説矣然以漢文訓䝉古語未如同文韻統得字音之正而鄂博之類穿鑿更甚䝉古語謂堆砌石以表祭處為鄂博方觀承乃書作峩軷且引鄭氏及詩大雅之言証為軷祭行路神之義鑿而謬矣曽為鄂博説以証其誤他如們綽克之為們催達巴罕之為大埧類此者不可枚舉難以一一為之辨訂也因命嚮道大臣努三挈方觀承所遣同知黄立隆者重循其源以至其委於是二千餘里之灤河曲折分合盡得其實因詳注其地名及諸水之滙流而酈道元歐陽修等並元史河渠志所載相舛誤者都為四條考証如左夫江淮河濟中國之四瀆也其理大物博較之灤河濡水不啻倍蓰而禹貢以數語盡之兹注濡水數千言猶有未盡焉古今相去不可及者如此盖得其簡則足以提要而欲其詳反不免致繁抑以塞外中土語言不同人跡罕至斯固難易所由殊然則就同文韻統㑹中外而傳濡水之實詎不在此時乎哉灤河源出獨石口外東北一百餘里巴延屯圖古爾山山為興安正榦自張家口向東至獨石口外為大山折而西北過上都城入於圍場之海喇堪與興安大嶺相連属出泉處較興安山梁尤為特出山陽山隂樹木茂宻與他山異信為名山山陽為民人居址山隂皆察哈爾䝉古㳺牧地四泉湧出名都爾本諾爾㳙流曲折伏而復現西北經訥克里和洛有小水自東注之又北經哈丹和碩之西噶爾都思台之水自東注之又曲折西北流至茂罕和碩自都爾本諾爾至此計七十餘里三道河自東來滙之其水一出摩霍爾達巴罕一出伊克達巴罕一出楚庫爾蘇逹巴罕各相距十餘里滙為一河河流始暢又西北流復有二小水一自布爾噶蘇台一自克爾哈達先後來注之八十里經察汗格爾俗名西凉亭烏蘭河屯至上都店入多倫諾爾界又北流十餘里經淖海和碩折而東北二百五十餘里經博洛河屯至庫爾圖巴爾噶遜河屯喀喇烏蘇自東注之又三十餘里至上都河屯上都即元開平府灤水經其城南故名上都河察汗諾爾自北注之又六十餘里經都什巴延珠爾克山至察汗鄂博東克伊綳河自東北来滙之河出興安山梁之陽南流伊克霍爾昆巴罕霍爾昆伊札爾三水自東注之西與海留台河合而為一入於上都河河水倍暢折而東南流十八里至磴口額爾徳尼布拉克自西注之其水經多倫諾爾之北又十二里至大河口圖爾根伊扎爾河自東北來滙之其水亦出興安山梁之陽逶迤西南流鍚喇扎拜自北入之又西南流摩霍爾伊札爾自東南入之滙注於此又南流七里沙岱布拉克自西注之又折而西南流二里霍洛圖布拉克自東注之又九里海拉蘇台河自西注之又一里蒐集布拉克自東注之又南流一里渾齊布拉克亦自東注之又十里察汗郭勒自西注之又十一里什巴爾台河自東北注之其水出伊克空鄂洛鄂博西為木蘭圍場西界又折而西復折而南八里克籌布拉克自西注之又十七里經雁北灘入四旗㕔界布爾噶蘇台哈丹和碩河自西注之又十七里經半壁山又南經大廟灣折而東復折而西南五十八里頭道河自西注之又二里羅宻塔子亦自西注之轉而東南流三十二里至木厰又折而東流二十四里經韮菜梁又九十五里經小遼東至𤓰地摩霍爾阿爾善所出之湯泉自南注之又二十七里經西屯庫爾竒勒河俗名小灤河自北來滙之其水出興安山梁之陽三支分引過托霍隆和洛合為一西南流㑹瑪尼圖卡倫哈朗圭達巴罕珠爾噶台海拉蘇台諸水折而東南㑹霍來郭勒哈爾渾諸水又噶拜卓索阿魯布拉克昂阿諸水復先後㑹之合為一河注於此自此遂名灤河又二十七里至郭家屯折而南流四十六里至大對山又折而東復折而南屈曲行八十餘里至興隆荘入喀喇河屯界南流五十九里經五道河折而西南流四十九里至張博灣興州河自西北來滙之其源出沙爾呼山西經土城子東南流曲注於此折而東流七十餘里經喀喇河屯繞行宫東流伊遜河自北來滙之其水發源圍場内南流經博洛河屯與伊瑪圖河合西南流屈折注此東南流三十四里至石門入熱河㕔界又四十七里經鳯皇嶺固都爾呼河自東北來滙之其源出固都爾呼達巴罕西南流與茅溝河合又與賽音郭勒河合三源既滙沿避暑山荘東北其水㑹茅溝後即與湯泉合至是行宫内亦有温泉流出滙之遂名熱河水至此益大折而南流四十三里白河自西注之此與發源瑪尼圖巴逹罕經宻雲縣㑹潮河之白河異又三十三里老牛河自東北注之又三十三里至滴水崖南二河自東注之又十里桞河自西注之又六里車河自西注之又三十餘里至門子哨入遷安縣界黄花川自西注之又三十二里清河白東注之又九里豹河自東北注之折而西流二十里經灤河灘又南流折而東復折而西經楊枝峪又東南流二十一里入潘家口折而東又折而西十里經走馬哨又二十四里至潵河橋潵河自西注之又曲折東南流七十餘里至白布店恒河自西北注之又折而東流十餘里至煤峪口長河自東北注之又七十三里過平崖子清河自東北注之此與黄花川南之清河異折而南流二十餘里至峡口蛤螺河自東注之又二十九里過遷安縣西經黄䑓山又二十三里折而東三里河自東注之其河與二道泉合又南流二十餘里經孤竹城入盧龍縣界又三十五里至合河口清龍河自東北來滙之其源出特布克入桃林口復有一水自冷口來㑹之經永平府城西過虎頭石入於灤河流至此勢益寛大又十一里繞雪峯寺又二十一里過武山西横河自西注之又三里至偏凉汀入灤州界又東南流五十六里過定流河入樂亭縣界又三十六里至老河口灤河故道今涸又西南流二十里至小河崖清河自西北注之此與黄花川南及平崖子之清河俱異又七里至石家坨灤自此支分名高密河常涸大雨時仍分流達海折而西南流五十餘里至新橋口入於海自河源至此約二千餘里酈道元水經注云濡水出禦夷鎮東南按禦夷鎮為北魏六鎮之一其建鎮之所雖不可考而魏太祖紀云築長城於長川之西自赤城西至五原延袤二千里又魏世祖破蠕蠕列置降人於漠南東至濡源西概五原隂山分六鎮是禦夷居六鎮之東自獨石口外至開平皆其故地以今所考上都河源方向核之道元所言非盡無稽惟云二源雙川夾山西北流則未能實辨都爾本諾爾為濡水正源而以夹山來㑹之三道河誤為濡源雙引其云出山合成一川則即今之茂罕和碩耳至云又西北逕禦夷故城東其遺跡無可据惟以鎮北百四十里計之當在今烏蘭河屯之地其餘諸山水雖與今圖不能悉合然所云又北逕箕安山東屈而東北流似即今之多倫鄂博圖其云逕沙野西又逕沙野北則似指伊克們綽克至喀喇烏蘇一帯沙磧言之其云三泉鴈次合為一水注吕泉水則似今之克伊綳河合伊克霍爾昆等三源也云逆流水則似今之伊札爾也云木林山水則似今之海留台水也云又東盤泉水自西北東南流注濡河則似今額爾徳尼布拉克也又所云東南水流迴曲謂之曲河鎮以今圖屈折形勢觀之盖即今大河口自此以下道元即闌入白檀要陽按其地距所云㑹武列水之熱河境尚七百餘里漢時郡縣安得至此其舛尚何待深辨乎至云濡水又東南逕盧龍塞則為今之潘家口無疑其云塞道自無終東出渡濡水向林蘭陘東至清陘無終為今玉田林蘭陘盖今喜峯口清陘即令冷口即此以證不特塞垣疆界了然即田疇引曹操迴軍盧龍塞之處亦可得其大概矣其自潘家口以内至入海處酈注所記州邑山水雖名稱今昔不同而以志乗訂之皆約畧可數而未至大舛盖道元扵諸水源委詢考綦詳故所言時有相合者惟未嘗親履其地且以漢言誌䝉古山水名目徃徃傳訛傅㑹更不免謬以千里則泥古而不知覈實之過也歐陽修云灤水出炭山東北胡三省通鑑注因之其後陳組綬職方圖考顧祖禹方輿紀要皆從其説今考獨石口外無所謂炭山者惟巴延屯圖古爾山據努三云土人名其山為黒老山按昔人有謂濡水出黒龍山者龍老音轉承訛黒龍山之言似不為妄今巴延屯圖古爾山其陽石色黝黒所謂炭山或即指此而明統志乃以萬全縣南之炭山當之其地距獨石三百餘里則更風馬牛不相及矣元史河渠志灤水出金蓮川中今獨石口外濡源相近處無所謂金蓮川者按金史地理志云桓州曷里滸東川更名曰金蓮川又元史地理志云世祖命劉秉忠相宅於桓州東灤水北之龍岡中統元年為開平府五年加號上都即今之上都河屯正在灤水之北桓州尚在其西考元周伯琦扈從北行記云至失八爾圖地多泥淖驛路至此相合地多異花有名金蓮花者似荷而黄至察罕腦兒猶漢言白海也歴􅂾驛始至桓州又王惲中堂事記云灤野盖金人駐夏金蓮云云考其地皆與上都河屯相近失八爾圖當為什巴爾台䝉古語泥濘處也在上都西少北察罕腦兒當為察汗諾爾䝉古語白湖也在上都南少西金蓮川當在什巴爾台察汗諾爾之間元陳孚金蓮川詩云茫茫金蓮川日暎山色赭昔人建離宫今存但古瓦盖金時於此建景明宫為避暑之所許安仁疏有金蓮千里之外語以距京師道里計之亦相合又今什巴爾台少西北有和洛和山盖即金史所謂曷里滸者川在其東去獨石口㡬五百里其非濡源明甚周伯琦賦得灤河送蘇伯修詩云清灤悠悠北斗北千折縈環䕶邦國直疑銀漢天上來金蓮滿川浄如拭盖灤河先逕金蓮後至上都伯琦詠灤河而兼及金蓮殆指河流所經言之修元史者直以為灤出金蓮川中誤矣吳道子畫天龍八部中四部圖巻考證吳道子天龍八部圖見於張丑清河書畫舫載諸欵跋甚詳今觀此巻用筆古勁勾勒圓渾所作梵釋􅄦神諸相窮形盡變妙處不可思議信為吳生擅場之作而巻後題跋頗與張丑所載相合其為書畫舫中物無疑苐彼云廿七跋此失其六僅存廿一但跋語次序與書畫舫所載参差而所失各跋處紙幅完整並無接縫不得謂其曽經割裂且各跋除樓鑰外餘俱無圖印雖真蹟初不以圖印為據然不宜都無而僅有其一也盖後人即從書畫舫錄入所謂真畫假跋耳但其字體尚不俗疑似舊時贋作留於巻後正足以偹考證因仍存之而叙其梗概如右石渠寶笈舊有李公麟所畫佛像巻憶其與此仿彿取而較之則所畫正同盖龍眠即從此巻臨摹者苐筆力差遜其健夫伯時白描高手也以視道子尚且不能方駕此即風㑹逓降後生不逮前賢之一徴而吳巻之超妙絶倫更可定矣又巻後王澍跋云八部之中已魚爛其三諦察之殊不然巻中坐者前二像神力威整端立者後二像自在荘嚴皆作正面相當為正神是八部實存其四餘皆所部之儀衛經所謂眷属者耳因考書畫舫載有朱子跋謂巻出長安安氏張芸叟題記云其兄弟析産分而為二此特其半云云足為八部存四之據又考芸叟為張舜民字在宋哲宗紹聖間已入黨坐貶距元祐不過十年尚得與李公麟同時是公麟所臨已係安氏既分之巻與舜民題記無礙也今朱跋即在所失六者之中或庸妄市賈病其為不全左騐而不書耳然名蹟幸存雖缺何害且天龍乃佛門䕶法而名手聚精凝神為之傳寫此畫所在當有丁甲呵守繼此或復合璧全巻亦未可知姑識以俟他日因縁按八部之名見於法華經要觧者曰帝釋曰龍王曰𦂳那羅曰乾闥婆曰阿修羅曰迦樓羅凡六種而不列夜义摩㬋羅伽注云八部皆神衆能變形預㑹不列夜义摩㬋羅伽者畧之也因標識所存四部於巻内又心地觀經梵天以下遍列龍王藥义及乾闥婆阿修羅迦樓羅𦂳那羅摩㬋羅伽凡八種與法華觧注相合而維摩經註所載雖大畧亦同苐龍之外又有神八部乃多其一未為精審因并訂而識之書小序考謂劉歆班固誤以孔子纂書為序者出於蔡沈之集傳謂鄭元馬融王肅並云孔子作書序者出於孔頴逹之疏頴達且謂為書作序不作詩序者此自或作或否無義例以余思之詩序既非夫子所作則書序亦定非夫子所作何言之使書序辭義精於詩序則為夫子所作或不可知今書序逺遜詩序朱子亦以為非夫子所作而馬端臨且謂詩序不可廢書序可廢是知書序乃出於漢儒所為徒以不能定其為誰且相傳已乆未可擯棄耳蔡沈作書傳疏其可疑者附於巻末可稱具卓識而王天與尚書纂傳及監本尚書注疏仍列於前雖姑從漢孔氏之例然未免有擇焉不精之疵矣至我皇祖欽定書經傳說彚纂全錄蔡沈攻駁書序之語復採朱子及諸儒紏正之説抉疑示的足為千古定案故兹不復贅論書序之非而特定書序為非夫子之作書於王天與纂傳之巻端御製文二集巻二十二
