  text: 欽定四庫全書御製文初集巻二十
  hash: sha256:470288163ff5c247108f7a9de858518d75dfa6e91fb5fd6d493f8fb32b3169c1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_020-1a, image: WYG1301/WYG1301-0172c.png}
body:
  text: 碑文中州治河碑國以民為本在知民莫達之隠民以食為天在防食致害之源害源不求食則無秋達隠莫知民則何依豫民之向隅也切體恤之悉為灾之因潦也為鬟剔之時則守土之臣曰胡寳瑔襄事之臣曰裘曰修二臣奉朕㫖惜工不愛帑不勞民水用洩土計方上源下㳺以次就治撫臣胡寳瑔因民之請欲泐石紀恩而建亭以覆之朕維此繁文可勿事惟是斯民之利賴有宜垂示久逺者虞書言養民之政舉水火金木土穀為六府禹之明徳逺矣究其所設施則決川距海即系之以濬􅅵澮距川周禮遂人掌邦之野有遂有徑有溝有畛有洫有涂有澮有道有川有路而稻人掌稼下地畜水止水蕩水均水舍水寫水而後作田古先哲王其納天下於在宥兵農禮樂至一名一器之㣲皆纎悉為之制而必先之以水土之政此地平天成之所由基也水土之政不修食曷由出朕於四方水旱之告蠲賑動以千萬計顧圖之於既灾之後不如籌之於未灾之前仰體上天覆育元元之心罔敢暇逸以無負所付用康乂我億兆人良有司為朕分牧民之任者其亦體朕心以期於永永弗隳則朕之至願也至於齊徐淮海莫不分命臣工董司其事以疏以瀹尋源注委而豫居天下之中黄河界其北淮瀆經其南平原髙壤無大陸廣川為之瀉故尤為難治今自滎澤以下導汴渦沙汝諸水以流其惡其支分派别或隄以束之或淵以瀦之或引之使分或滙之使合曲之使有容直之使徑達為水門以蓄洩之為涵洞以吐納之朕後先宣示之㫖及諸臣之疏具在茲不複敘為敘其大指若是嗟乎豫之民其受困亦亟矣及朕知之始為之易撫臣發帑粟興水利然救什一於千百其亦遲矣朕方抱愧之不暇而曰民感恩乎其益増吾愧而已矣平定準噶爾後勒銘伊犁之碑天之所培者人雖傾之不可殛也天之所覆者人雖栽之不可殖也嗟汝準噶爾何狙詐相延以世而為賊也彊食弱衆凌寡血人於牙而蔑知悛易也云興黄教敬佛菩薩其心乃如夜叉羅刹之以人為食也故罪深惡極自作之孽難逭活也先是分封四部衆建宰桑四圖什墨廿一昂吉盖欲繼絶舉廢以休以息也而何煽亂不已焦爛為期終於淪亡胥盡伊犁延袤萬里寂如無人之域也是非我佳兵不戢以殺為徳也有弗得已耳西師之什實紀其詳悉也以其反覆無常遲益久而害益深則其叛亂之速未嘗非因禍而致福也是盖天佑我皇清究非人力也伊犁既歸版章久安善後之圖要焉已定者詎宜復失也然屯種萬里之外又未可謂計之得也其潛移黙運惟上蒼鑒之予惟奉時相機今日之下亦不敢逆以料也是平定準噶爾後勒銘伊犁之碑所由作也重修柏林寺碑文京師名刹不勝紀而柏林寺以傅近雍和宫特著雍和宫者我皇考興慶潛邸也皇考祝釐皇祖故於康熙癸巳施檀重修且請於皇祖特賜萬古柏林之額若禪堂若經閣則皆皇考寳翰後先輝映至自今又四十餘年矣塗之丹者日以剥構之聳者日以落爰以乾隆丁丑仲冬勅所司葺而新之逮戊寅長至訖工寳界荘嚴人天増勝攷寺之始剏也不著於圖志惟明正統間所存故碣稱元至正七年肇建乃其所援据僅出屋梁題字近時孫承澤春明夢餘録闕而不詳朱彞尊日下舊聞亦苐載夏㫤金湜包琪輩故嘗聨詠於此将謂希風蓮社則可若薌林興起之縁不足引以為重也夫史䇿所傳天池躍龍之篇一名一物猶必鄭重愛惜被諸樂府垂示無窮茲也精藍翼然依光聖蹟所以肯構而崇飾之者匪直表章緇素而已夫人之情雖善忘而孩提時事或不忘者以其見聞久而孺慕切也茲寺之葺其不可已者以此将作以礱石請故不徵象教言詮而書之重紀實也平定回部告成太學碑文建非常之功者以舉非常之事舉非常之事者以藉非常之人然亦有不藉非常之人而舉非常之事終建非常之功者則賴昊蒼篤貺神運斡旋事若禍而移福機似逆而轉順順天者昌逆天者亡故犁準夷之庭掃回部之穴五年之間兩勲並集始遲疑猶未敢信終劼劬以底有成荷天之龍在茲畏天之鑒益在茲爰叙其事如左達瓦齊之就俘也伊犁已大定矣無何而阿睦爾撒納叛彼其志本欲藉我力以成已事時也人心未定佐饔者嘗一蜮肆狂萬狙應響蜂屯蟻雜不可􅐡梳畏難者羣謂不出所料準夷終不可取並有欲棄巴里坤為退守謀然予計其衆志不齊将有歸正倒戈者於是督䇿将帥之臣整師亟進既而伊犁諸台吉宰桑果悔過勤王思討逆賊以自贖此天恩助順者一也二酋大小和卓木者以回部望族久為準噶爾所拘於阿巴噶斯鄂拓者也我師既定伊犁乃釋其囚以兵送大和卓木波羅泥都歸葉爾竒木俾統其舊屬而令小和卓木霍集占居於伊犁撫其在伊犁衆回乃小和卓木助阿逆攻勤王之台吉宰桑等阿逆賴以苟延及我師再入阿逆遂逃入哈薩克而霍集占亦即收其餘衆竄歸舊宂此天恩助順者二也準夷之事前紀略見梗槩茲不複紀紀興師討􅉰之由則以我将軍兆恵在伊犁時曽遣副都統阿敏道往􅉰議事小和卓木乃以計誘阿敏道而拘之及我師抵庫車問罪彼攜阿敏道以來援至中途害之及從行者百人彼猶逞其狂勃抗我師顔且敢冒死入庫車城乃雅爾哈善略無紀律致彼出入自由然我滿洲索倫衆兵士無不念國家之恩効疆場之力故能以少勝衆逆渠懼而兔脱此天恩助順者三也知僨轅之無濟掄幹材之可任時将軍兆恵以捜𠞰準夷餘黨至布露特部落已款服其衆因命旋師定回部於是克庫車存沙雅爾定阿克蘇略烏什收和闐師之所至降者望風直至葉爾竒木城下而我軍人馬周行萬有餘里亦猶强弩之末矣二酋以其逸待之力統數萬人與我三千餘人戰我師之過河者纔四百餘猶能斬将搴旗退而築堡黒水固守以待此天恩助順者四也萬里之外抱水救火其曷能濟乃予以去年六月即降㫖派兵撥馬欲以更易久在行間者耳故兵馬率早在途一䟎進而各争前恐後人人有敵愾之憤此天恩助順者五也副将軍富徳及參賛舒赫徳輩率師進援以速行戈壁中馬力復疲值狂􅉰據險坐俟頗有難進之勢夫援軍不能進則固守以待者危矣而參賛阿里衮驅後隊之馬適至夜𢷬賊營我師内外夾攻彼不知我軍凡有㡬萬握炭流湯之徒自相蹂躪顧命不暇於是解黒水之圍鹿駭麞驚遁而保窟我之兩軍合隊全旅以迴阿克蘇此天恩助順者六也既而彼料我必再入泰山之壓難當乃於我師未進之先攜其部落載其重器跳而逺去而葉爾竒木哈什哈爾二城之舊伯克等遂獻城以降參賛明瑞一邀之於霍斯庫魯克副将軍富徳再陷之於阿爾楚爾於是離心者面内前途者反斾二酋惟挈其妻孥及舊僕僅三百人入拔達克山境此天恩助順者七也人跡不通之地語言不同之國既已雀敺寧不狼顧其授我與否固未可定也然一聞将軍之檄莫不援旗請奮整旅前遮遂得􅇯渠函首露布遥傳此天恩助順者八也夷考西師之役非予夙願之圖何則實以國家幅員不為不廣屬國不為不多惟厪守成之志無希開創之名兼以承平日久人習於逸既無非常之人安能舉非常之事而建非常之功哉然而輾轉輻湊每以艱而獲易視若失而反得故自締始以逮定功雖予自問亦将有所不解其故而不敢期其必然者故曰非人力也天也夫天如是顯佑國家者以祖宗之敬天愛民䝉眷顧者深也則我後世子孫其何以心上蒼之心志列祖之志勉繼繩於有永保丕基於無窮乎繫以銘曰二酋偝徳始亂為賊是興王師報怨以直伊犁既平蕞爾奚屑徐議耕闢徐議戍設以噢以咻伊予本懐豈其弗戢圖彼藐􅉰彼􅉰不量怒臂當車戕我王臣助彼狂狙始攻庫車僨轅敗事用人弗當至今為愧悖逆罪重我武宜揚易将整師直壓彼疆阿蘇烏什玉隴和闐傳檄以定肉袒羊牽二酋孽深知不可活狼狽相顧固守其穴桓桓我師周行萬里馬不進焉强弩末矣以四百人戰萬餘虜退猶能守黒水築堡間信達都為之傷悼所幸後軍早行在道督勅速援人同怒心曽不兩月賊境逼臨賊境逼臨彼復徼隙馬繼以進賊營夜斫出其不意賊乃大驚謂自天降孰敢鋒攖大鞣大膊如虎搏兔案角隴種誰敢迴顧黒水圍解合軍暫旋整旅三路期並進焉賊偵軍威信不可支挈其妻孥遁投所依所依亦回豈不自謀豈伊庇猿而受林憂利厥輜重無遺盡掠遣其都丸遂來獻馘詎惟獻馘並以稱臣捧賫表章将詣都門奏凱班師前歌後舞尸逐染鍔温禺釁鼓露布至都正逮初陽慈寧稱慶亞嵗迎祥郊廟告成諸典並舉皇皇太學豐碑再樹豐碑再樹敢予喜功用不得已天眷屢䝉始之以武終之以文戡亂惟義撫衆惟仁布恵施恩寰㝢共喜古不羈縻今為臣子疆闢二萬兵出五年據實書事永矢乾乾平定回部勒銘葉爾竒木之碑粤稽回始肇自天方又名黙克一曰天堂大食見元回鶻見唐是皆仿髴所傳弗詳惟我皇清撫有華夏血氣之倫均歸陶冶準夷昔强㝠頑弗下恃厥險逺實梗化者䝟貐其衆豺狼其羣以回為羊役以耕耘利其善賈三倍市欣拘二酋長處伊犁濱四大回城輸租獻賦騰格是供衛拉是懼繭絲奚堪溝壑已遽有面内心其何能訴準夷既平羣回見天謂自今始飽食晏眠遣厥酋歸撫爾土田生死肉骨詎疑變遷詎疑變遷徳竟怨報助我叛疆戕我使軺叶是用興師聲罪致討叶乃敢抗顔蜩螗讙譟既侮厥外宜安厥内而何狂狙心焉昏憒殺人為戲奪妻為穢大失衆心無不怨背三道並發四甄齊攻酋知弗支自擄一空廿日之前駾走無蹤爾雖無蹤我追應窮滔滔洸洸連戰皆克旦夕苟延遂入異域異域畏懐舉旗助力腐䑕莫逋遂來獻馘二酋既殱諸回永靖叶設官定賦去其苛政昔之諸回曉戰夜偵今恬以嬉各保性命昔之諸回為準夷臣今語鄰封曰天王民曰天王民誰汝苦辛藝爾稷黍孶爾子孫在昔己巳爰平金川茲定回部亦己夘年嵗符理紀瑞疊祥駢持盈保泰惟懋慎旃平定回部勒銘伊西洱庫爾淖兒之碑機有視若失而反得智者之所懃而愚者之所惑也事有初若勞而終逸壯者之所劭而懦者之所怯也若夫定全回殱二酋戰無不克攻無不取皆二将軍及諸參贊以及行間衆将士之力也然予亦有所深慰於其間者則以五年劼劬宵旰運籌狎至實未敢偷安於頃刻也幸我武保定庶因答乾貺慰先志且以免浮議之指斥也伊西洱庫爾淖兒者我副将軍富徳等窮追二酋至拔達克山之界獲其降者萬人二酋僅以身免而遣使索俘遂得獻馘振旅以成茂勣也其地倚山臨水單騎可容而我突将無前四甄並發如入無人之域也賊衆首尾不能相顧豎我回纛以招之降者鋪崖以來霍集占持刃止之或且反戈倒㦸也是以二酋見事不成拔身逺跳駾突而喙息也先是蹙之於霍斯庫魯克襲之於阿爾楚爾無不以少勝衆批亢𢷬堅桓桓之士真如驅虎豹而逐貍兔纒頭碩鼻者流皆惃惃踉踉見即辟易也是以先聲異域駭其跳盪遮逆助順用攫重輜而獻兇級也我兵未深入拔達克山境者則以討逆之師不蹂無罪之地姑遣使焉彼或曉逆順亦将擒獻是以将帥之臣審機度時我武少輯也卒蕆事而告成功則亦未為計之失也回部始末已見於勒銘葉爾竒木之碑辭不複綴也特紀耆定之在茲是以誌嵗月而刻石也御製文初集巻二十
