body:
  text: 巻之一經筵御論仁者安仁知者利仁正徳利用厚生惟和天與賢則與賢天與子則與子剛健篤實輝光日新其徳安而后能慮慮而后能得明作有功惇大成裕子在齊聞韶三月不知肉味曰不圗為樂之至於斯也子謂韶盡美矣又盡善也謂武盡美矣未盡善也栽者培之傾者覆之天行健君子以自彊不息囘也聞一以知十賜也聞一以知二大禹謨允執厥中君子思不出其位唯幾也故能成天下之務至誠無息不息則久天聰明自我民聰明天明畏自我民明威悠逺則博厚博厚則髙明顯諸仁藏諸用小徳川流大徳敦化亶聰明作元后元后作民父母巻之二論論趙簡子齊威王事伊尹周公諸葛亮論蘇軾御書頌論蘇楊論四得論四得續論脩徳脩刑論巻之三論慎建儲貳論說卞和獻璞說風馬牛說圭瑁說搢圭說巻之四說反蘇軾超然臺記說復古說像設說卜筮說喇嘛說十全老人之寳說巻之五諭命諸皇子及樂部大臣定詩經全部樂譜諭乾隆五十五年八十夀辰普免天下錢糧諭通飭各省督撫學政嚴禁坊刻經書刪本諭命普免六十年各省應徴漕糧諭上丁親詣文廟釋奠諭釋奠禮成廣各直省入學額諭普免嘉慶元年各直省地丁錢糧諭再舉千叟宴諭允皇太子率王公大臣等進乾隆六十一年時憲書備内廷頒賜諭巻之六詔紀元周甲建立皇太子以明年元日授寳為嘉慶元年詔訓命歸政後諸皇子孫曽元輩仍在尚書房讀書及應用冠服訓申示皇太子及内外王公大臣等弗允請緩歸政訓巻之七記重葺盧溝橋記顔真卿祭姪文藳記避暑山荘五福五代堂記四知書屋記戡定安南復封黎維祁為國王功成班師之記書安南始末事記再書安南始末事記巻之八記八徵耄念之寳記嘉靖玉印記黒雲室記正陽橋疏渠記十全記巻之九序開國方略序補詠安南戰圖六律序集石鼔所有文成十章製鼓重刻序清文繙譯全蔵經序石刻蒋衡書十三經於辟雍序補詠戰勝廓爾喀之圖序續纂秘殿珠林石渠寳笈序巻之十題辭王禹偁待漏院記題辭再題樂律全書識語大宛馬識語臨吳琚尺牘識語重定元搨石鼓文識語五代胡􅅛番馬圖識語書命館臣入吳三桂擒桂王由榔諭巻識語厯年上元鐙詞識語書後書宋孝宗賜曽覿書冊後書韓昌黎答李翊書後䟦宋髙宗書馬和之畫唐風圖䟦重訂熱河考䟦巻之十一辨絲竹辨夢辨碑文重脩葛山隆福寺碑記平定臺灣告成熱河文廟碑文勑建永福寺碑記巻之十二書事書宋劉清之紀左傳叔向之母事書孟子對萬章焚廩浚井事書光武大破莽兵於昆陽事𠞰滅臺灣逆賊生擒林爽文紀事語巻之十三書事福康安奏報生擒荘大田紀事語書揚雄法言書晏嬰叔向論齊晉事書隋文帝改元事兵部奏凱旋兵丁至京由驛各歸本地營伍紀事巻之十四襍著讀史讀洪範涇清渭濁紀實筆誤識過巻之十五硯銘宋端石三祝硯銘舊澄泥夔文壺硯銘宋端石璧水硯銘宋澄泥倣唐石渠硯銘倣唐澄泥螭虎石渠硯銘錢惟善玉堂硯銘宋硯銘六首宋端石方圓規矩硯銘宋澄泥石函井田硯銘宋端石雲根紫玉硯銘宋澄泥伏虎硯銘宋緑端石龍池硯銘宋王應鳳紫端石井田硯銘舊青緑澄泥石渠硯銘硯銘三首舊澄泥天禄石渠硯銘宋端石長宜子孫鑑硯銘元迺賢五老蜚星硯銘宋甆硯銘舊澄泥石渠硯銘米芾玉堂硯銘趙宧光倣宋澄泥石圅硯銘贊莊豫徳摹貫休補盧楞伽十八應真贊西畨古畫十八應真贊巻之十六贊平定臺灣二十功臣像贊呢瑪寧波噶布拉贊古噶布喇供椀贊西畨古徳噶布拉贊平定廓爾喀十五功臣圖賛右旋白螺贊
