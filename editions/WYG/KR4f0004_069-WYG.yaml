front:
  text: 欽定四庫全書御製文二集巻三十五
  hash: sha256:e593684316b333e3b41021fdfddfca50198a11c804f6fbc809dc5662ba278597
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_069-1a, image: WYG1301/WYG1301-0495c.png}
body:
  text: 雜著讀伯夷列傳夷齊不食周粟蓋謂義不仕周受祿貧餓以終其身而死耳自司馬遷有采薇食之遂餓死首陽山之言而譙周古史考遂舉野婦之語以實之後世率謂夷齊果不食而餓餒以死夫夷齊大節固在不仕周而不在死與不死也而遷乃更舉顔淵盗跖之事謂天之報施善惡有或爽者夷齊之死有或怨者此則大謬而不可以不辨也蓋窮通夀天人事之適然而善惡邪正天道之至公千載之下以夷齊顔淵為何如人以盗跖為何如人則夷齊之死固不怨使其怨當早食周粟而求生矣殺身成仁者豈皆怨乎孔子曰不怨天不尤人遷實未知此耳彼其犯國法身殘處穢動而見尤憤懣不堪怨天尤人謬論天道之是非是以遷之心為夷齊之心而夷齊必不若是也余故以為大謬而不可以不辨也讀金史遼金元三史人地名音譯訛舛鄙陋失實者多因命儒臣按同文韻統例概行更錄蓋正其字弗易其文以史者所以傳信示公不可以意改也茲閲所進金史見其中文法乃多有未當者如稱元兵為大兵大軍以元臣修金史理固宜然而於大兵大軍等句下或接稱上或稱朝廷則又皆叙金朝事畧無界限分别使淺學者觀之幾不能辨其為何代語是乃文義不佳之故然此猶小疵非若人地名之謬誤宜改仍其舊可也至若崔立傳贊云其志方且要求劉豫之事我大朝豈肯效尤金人者乎金俘人之主帝人之臣百年之後遂啟崔立之狂謀以成青城之烈禍云云直是痛加詆斥實為非體夫一代之史期於傳信若逞弄筆鋒輕貶勝國則千秋萬世之史皆不足信是則有闗於世道人心者甚大推之明修元史類此者應亦不少然史書流傳已久難以釐正亦不得不仍其舊若我本朝修明史於當時賢奸善惡皆據事直書即各篇論贊亦皆覈實立言不輕為軒輊誠以作史乃千秋萬世之定論而非一人一時之私言予向命纂通鑑輯覽於明神宗以後仍大書明代紀年而於本朝定鼎燕京之初尚存福王年號此實大公至正可以垂示天下後世豈若元托克托等之承修金史妄毁金朝者之狃於私智小見所可同日語哉書此以揭重刋金史之首抑亦有慨於前而所以深誡於後也讀左傳季文子出莒僕季文子出莒僕是也而左氏有過辭然魯之襄仲獨非僕之類乎其事即接襄公之立不聞文子有討賊之誅何獨嚴於僕而恕於仲乎且僂數元愷四凶謂堯不能舉賢而舜舉之堯不能去惡而舜去之審如是則堯何以為巍巍蕩蕩則天之大聖乎葢其賢其惡或者當堯之時尚未甚彰而其舉其去亦因之而有所待千載之下豈可輕議哉况舜之協帝皆出堯之所授則舜之所舉即堯之所舉舜之所去即堯之所去耳邱明博於紀事但逞其文藻而昧於知理讀其文者斥其浮誇資其強識而於是非去取之間斷之以理可也讀孟子滕文公章句下陳代欲甹小節以見諸侯而舉枉尺直尋之喻孟子闢之是也然所稱王良之事余不能無温公之疑焉獵與戰其不可以車行余既於詠御之詩論之矣北人言舟南人言馬必不能得其欵要章章甚明馳射之事自應属北方射生手今即使北方射生善操弓挾矢立之車中將見顛簸支屈不能命中吾恐其皆為嬖奚之終日而不獲一禽而謂南方之人能之乎且馳之者在御而射之者在人御者即範其馳驅而射者不中御者亦無如之何也御者範馳驅而射者即屢中無是理也且羿與由基世所謂善射者也使王良範馳驅以御皆一朝而獲十焉亦得謂之君子乎或曰古者禽獸多而疆界平故可以車獵何言之甚哉且恨御之道不傳而世無王良也若然今之南苑即所謂禽獸多而疆界平吾將試之其不可行立見矣嗚呼是果無王良乎是果無王良其事乎讀宗澤忠簡集偶閲宗澤忠簡集愛其乞回鑾諸疏不忍釋手既終巻乃知章凡二十四上而髙宗漠然也夫南渡去今六百餘年讀其疏者未嘗不嘉其血誠賞其卓識歎其孤忠欲為堕淚而彼時為之君者聽宵小深入之言懐優游苟安之計屏之而弗顧是尚得為有人心者哉以致捐中原棄赤子謬曰我終能延趙氏一脈於餘杭嗚呼人而至此是誠不知有五倫之事而天良喪盡者矣雖汪黄謬論有以懾之使髙宗無偏安之心有必為之志亦焉能動聽則後之秦檜倡和議而稱一徳亦必有以早窺其心曲也或曰宗澤之心雖誠以彼時南北之勢較之金源之釁其真可乗河北之民之心其真可信乎則興復之舉固未易言也曰然復讐其要也興復其次也不共戴天不反兵髙宗於此葢兩兼之矣徒跣以從不顧一巳之成敗利鈍可也而居臨安翫湖山稱姪於讐以徒得歸葬之骸骨是誠何人哉嘗謂人君者天之子也俗云子雖不肖父不可不慈予則謂天之於天之子子雖不肖父不忍不慈逺固不可枚舉近則於宋元明見之矣元得統甫八十年立國之模無足比數若宋南渡以後有明正嘉以旋其綱紀陵夷政事叢脞早應滅亡而不即亡者豈非天父有不忍不慈之心而尚為之苟延其世以待其悛改乎然此不可恃也大君者父母之宗子而黎元者均之一家内之人也今持家者苟不顧一家之人使之顛連而無告則其父母未有不怒怒而教教而不改其父母亦必有以處之矣為君者之於民亦猶是也嗚呼可不慎哉可不懼哉讀歸有光易圗論有光以為易圗非伏羲之書乃邵子之學似矣然知其一未知其二有光不云乎八卦盡天地萬物之理後之人苟以一説求之無所不通納甲飛伏卜數隻偶之類皆可以易言既如是則伏羲之卦何嘗不具圗之義第不可以圗謂足盡卦之理可耳余謂易以傳天道董仲舒云天不變道亦不變則可知易亦不變或曰交易變易正所謂變安得謂不變曰亦觀之天而已四時行焉百物生焉一日而周三百六十五度其至變之中不變者存焉道如是易亦如是又誰能為圗以概之有光葢有見於圗之局但語焉而未詳耳朱子恐人求易於虚無神竒而反失實理故定為卜筮之書而毎卦毎爻皆注之以占之者云云審如是則江西持筒賣卜者皆可以言易矣其然豈其然乎讀王應麟困學紀聞應麟博學多聞著書頗富而議論皆出於正是編乃隨筆考訂理融辭達其説經具有淵源深合内聖外王之㫖偶披説易巻於凡修辭立誠陽大隂小防於未然恐以致福未嘗不反覆而誦沉潛而思以為有天下國家者不可不熟讀而切巳體察也獨其論五陽之盛一隂生而引陳完之奔齊為亡齊者已至漢宣帝時匈奴來朝而王政君已在太子宫唐太宗即位而武氏已生於前二年宋藝祖二年女眞來貢而宣和之禍乃作於女真以為易者極深研幾當勿用而知有亢履霜而知有戰固亦戒將然凛消息之義耶而未免失之鑿矣夫為君者慮泰否之幾察盛衰之運朝乾夕惕持盈危明如是而已耳必舉數世之前之事以為數世之後之兆或轉疑於謬悠而不信則反懈其儆懼之心非此説有以基之乎且五世八世之説出於左傳本屬浮誇使景公聼晏嬰之諫簡公從御鞅之言平公拒田常之計宣公奪襄子之權則陳氏終不能為齊侯也至於王元后武則天之事皆因漢唐之帝不能自立亦人所共知者而女眞入貢於藝祖更去侵宋一百數十年使徽宗不用奸亂政及遣馬政通使而復背盟金人又安能如之何哉葢禍福互倚伏治亂相循環為人君者不可不憬然悟而䕫然懼若如應麟所云智者必鄙而謂誕愚者將忽而不省等而上之堯舉舜舜舉禹之時謂之為失天下之機可乎雖然當天下極盛之時而為思患預防之想亦為君者所當知也豈可以小疵而棄其大醇讀禮記文王世子篇文王世子記周公抗世子法於伯禽引仲尼曰聞之為人臣者殺其身有益於君則為之况于其身以善其君乎周公優為之鄭康成訓于讀為迂迂猶廣也大也後之説經者多傅㑹之孔疏則以為周公之益君於身優饒於徳廣大而黄敏求陳祥道方慤則或以為周公委曲其身以正其君或以為迂身非直躬或以周公抗世子法為致曲是皆不𠂻於理夫周公攝政時成王巳為君成王不可撻故撻伯禽以警成王其理甚正而其道甚直初非有迂曲遷就之私孔頴達疏申引廣大之釋委曲煩言以致經義反晦偶因檢永樂大典得陳懋賞集説云况止于其身以善其君乎此大人正巳而物正之事語較直截夫于詮為於義固當矣而身字觧尚未能親切因考古篆身作子作二字相似疑或當時傳寫之譌若作于其子以善其君則與周公所行適合而於理於文皆無弗合康成葢未思及子字之誤為身字遂強附訓釋後儒亦從而為之詞使孔子之言周公之事皆不得其正夫強觧以誤後學不可乃因強觧而誤孔子並以誤周公則尤不可是不容以不辨但經文沿誦日久無改正之理姑記余所見如是以俟後之考古者讀王充論衡向偶翻閲諸書見有王充論衡喜其識博而言辯頗具出俗之識其全書則未之覽也茲因校四庫全書始得其全巻而讀之乃知其為背經離道好竒立異之人而欲以言傳者也夫欲以言傳者不𠂻於聖賢未有能傳者也孔孟為千古聖賢孟或可問而不可刺充則刺孟而且問孔矣此與明末李贄之邪説何異夫時命坎坷當悔其所以自致坎坷耳不宜怨天尤人誣及聖賢為激語以自表則巳巳犯非聖無法之誅即有韙其言者亦不過同其亂世惑民之流耳君子必不為也且其死偽萹以杜伯之鬼為無而言毒萹又以杜伯之鬼為有似此矛盾處不可屈指數予故闢而訶之讀論衡者效其博辯取其軼材則可效其非聖滅道以為正人篤論則不可御製文二集巻三十五
