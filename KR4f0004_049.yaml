  text: 欽定四庫全書御製文二集卷十五
  hash: sha256:679797e0652ec82b9f1d48900bc6abebcc6727d2ed0babecf0fc6299330d697c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0004_WYG_049-1a, image: WYG1301/WYG1301-0376c.png}
body:
  text: 記五福五代堂記五福堂者皇祖御筆賜皇考之匾額也我皇考敬謹摹泐奎章於雍和宫圓明園胥用此顔堂以垂永世丙申年豫葺寧夀宫內之景福宫以待歸政後宴息娛老景福者皇祖所定名以侍養孝惠皇太后之所也豫曽為五福頌以書屏而未以五福名堂者蓋引而未發抑亦有待也兹蒙天貺豫得元孫五代同堂為今古希有之吉瑞古之獲此瑞者或名其堂以薌其事則豫之所以名堂正宜用此五福之名且即景福宫之地不必別有搆作而重熙纍慶仍即皇祖皇考垂裕後昆貽萬世無疆之庥也若夫獲福必歸於好德而好德尤在好其善以斂錫厥庶民五章之中三致意焉兹不復贅豫子孫曾元讀是記及堂中五福頌者應敬思皇祖皇考所以承天之福必在於敬天愛民勤政親賢毋忘舊章豫之所以心皇祖皇考之心朝乾夕愓不敢暇逸以幸獲五代同堂之慶於萬斯年恆保此福奕葉雲仍可不勉乎可不慎乎三老記豫既為三老五更之説以闢諸家之謬然以三老之稱數典於左氏其何以稱三老則求其解而終不得其辭兹以三餘之暇書辟雍詩册有三老之語臨池下愰然悟曰三老之言實出孟子所謂老而無妻老而無夫老而無子此非三老而何孟子雖出左氏後而此語自由古以傳故即繼之曰文王發政施仁必先斯四者可知文王時即有三老之稱左氏提其綱孟子晰其目耳且晏子對叔向歎齊之將為陳氏所云棄其民三老凍餒乃指一國鰥寡獨窮之民之無恤者設以上夀中夀下夀論之豈八十以下之老即可以弗恤乎其餘傳會之論愈説愈逺然總於辟雍養老興賢有何涉乎自是而三老之稱遍於鄉閭所謂三老董公壺關三老之類不一而足蓋耆艾而長於鄉者即可稱三老而非定三人也夫豫三老五更之説成於戊戌逮今又六年求其説而不得而筆下偶得之是不可以不記且此六年中何嘗不讀孟子而未有會兹偶會之益見理不可不日窮書不可不日讀寧渠呈已之是顯人之非以為博聞廣識而已哉祭厯代帝王廟禮成恭記豫小子既敬遵皇祖聖訓增祀厯代帝王以今年二月春祭之吉奉神主入廟禮以克成祭不欲數於是退而恭記曰皇祖之聖允符我皇考所尊稱大成有類先師孔子而無以復加也即此增入之旨實出大公至明乃稱厯代之名議而非有意於其間也夫厯代者自開闢以來君王者之通稱非如配享先師孔子有所旌别彰疸於其問也夫有所旌别彰疸於其間則必有所進退而是非好惡紛然起矣入者主之出者奴之將無所底止且以旌别彰疸言之湯武即有慙德則厯代開創之君湯武且不若審如是三皇五帝之外其宜入廟者有幾是非祭厯代帝王之義也故我皇祖謂非無道亡國被弒之君皆宜入廟者義在此但引而未發子小子敢不敬申其義乎蓋自洪武建廟南京以來北京祖之所祀者寥寥明洪武六年始建京崇厯代帝王廟於南祀者三皇五帝夏禹王商湯王周文王武王漢髙祖光武帝隋高祖唐髙祖太宗宋太祖元世祖十九帝已而罷周文王隋髙祖唐髙祖之祀嘉靖九年罷南京廟祀建厯代帝王廟於北京二十四年又罷元世祖之祀及我世祖定鼎燕京幼齡即位百度畢舉爾時議禮之臣於議厯代帝王廟位次亦頗有所出入我因明世祖定鼎燕京代祀典順治二年增祀遼太祖金太祖金世宗元太宗明太祖凡五帝而我皇祖之諭亦因近大事之際在康熙六十一年十一月諸臣未能仰遵聖意其出入亦頗不倫會典載康熙六十一年無道皇祖諭旨凡帝王在位除被弒亡國之主外盡宜入廟崇祀爾時廷臣不能仰體日聖意詳細討論且疏奏在十一月大事前數所議增祀夏商以來帝王一百四十三位并漢之桓靈皆入之實不倫矣豫小子於昨嵗閲大清通禮始悉其事因命大學士九卿更議增祀而以仲春躬祀入所增神主於廟昨嵗因閲大清通禮見崇祀闌入厯代帝王位次有不愜於懷者如漢之桓靈而於前後五代全未議及因敕大學士九卿等更議增祀晉元帝以來二十五帝而於極靈則撤出之以昭公論今嵗仲春入禮成神主於廟躬禮致祭詳見述事詩并序豫嘗論之洪武之去遼金而祀元世祖猶有一統帝繫之公至嘉靖之去元世祖則是狃於中外之見而置一統帝繫於不問矣若順治初之入遼金而去前五代則爾時議禮諸臣亦未免有左袒之意孰若我皇祖之大公至正昭示千古為一定不易之善舉哉夫天下者天下人之天下也非南北中外所得私舜東夷文王西夷豈可以東西別之乎正統必有所繫故豫於通鑑輯覽之書大書特書一遵春秋不敢有所軒輊於其間豫於厯代通鑑輯覽一書自隆古以至本朝四千五百餘年於南北朝及宋元遼金正統偏安天命人心繫屬存亡之際大書特書必公必平如南宋句德祐以前尚有疆域可慿至臨安既破帝顯見俘宋統始絶故自丙子三月以前為宋帝顯德祐二年三月以後為元世祖至元十三年至於元順帝北遷沙漠委棄中原則自至正二十八年八月以後正統乃歸之明為洪武元年至我朝世祖定鼎京師在甲申五月惟時明福王尚監國南京故通鑑輯覽仍書明以別之直至乙酉五月大清兵下江南福王就執始書明亡折衷義例惟嚴惟謹一遵春秋之法無所容心曲徇於其間也以為一時之議雖權萬古之論不可欺也然則厯代帝王之祀果即非如配享先師孔子漠無旌别彰疸於其間乎曰不然也厯代帝王胥祀於景德之殿其有德無德若南若北曰中曰外是一家非一家章章如昭昭如孰可以為法孰可以為戒萬世之後入廟而祀者孰不憬然而思愓然而懼耶是即不明示旌别彰疸而已寓旌别彰疸於無窮矣其有不憬然思愓然懼者則是無道之倫必不能入此廟矣嗚呼可不懼哉可不懼哉雖然豫更有後言焉蓋宜入廟與不宜入誠昭然應知懼而我大清國子子孫孫祈天永命所以綿萬祀無疆之庥者更當以不入斯廟為棘安不忘危治不忘亂用慎苞桑之固思及此有不忍言而又有不忍不言者世世子孫其尚凛難諶之戒乎淮源記今嵗豫旱於春夏荆歙旱於夏秋因循淮水弱而清口淤既而豫得雨於夏末則更黃水盛而清口有倒灌之患其間晝夜卜度往來疇咨蓋不可屈指數矣今嵗春夏以來東南雨澤愆期淮水微弱以致清口淤淺無錫一帶河水乾涸糧船挽運維艱河漕諸臣辦理竭蹶再四馳詢旋命大學士阿桂前往會勘並諭引黃水以送今嵗重運及回空之船蓄清水以俟明春開放濟運北上晝夜懸厪申諭不避辭多矣因思淮之弱必其源之微或有沙石壅塞以致遏其流乎其時撫臣畢沅以辦理賑恤事宜不能分身往則命布政使江蘭往致禱淮瀆祠且相其源之形勢既而江蘭奏淮瀆故有祠更有禹廟並得三大井於禹廟東引歸正河遂成具川因具圖貼説呈覽江蘭奏查勘淮源至桐柏山下據鄉耆稱禹廟前有井乃淮源所出因履勘至廟東里許沙土壅起微露砌石基址試挖至三尺許有三大泉湧出當即淘濬引歸河身下流旋即加長復沿流下勘至信陽正陽等各州縣扺江南境長五百八十餘里寬二三十丈深三四尺不等與一統志稱淮水伏流數里湧起三泉濬為井之語相合云云朕批摺云按其圖上疑更有源汝何未至其處並於圖中點出更馳諭畢沅前往詳悉履勘朕觀其圖溪澗縈繆山林深秀所謂三泉者未必即真源也其時賑恤章程已定乃命撫臣畢沅親往以窮其實兹畢沅親至胎簮山山頂遂得真淮源具圖以來據畢沅奏胎簮山乃桐柏之中峯循山麓南上約十六七里見水一泓土人指為淮水之源稱曰淮池恐初源尚不在此因延緣細徑而上道路益險十餘里始至山頂有大石盤陀廣十餘畝石旁凹處成潭徑文許泉從石間出深尺餘遂飭從人汲乾積水旋涸旋盈其為淮瀆真源似無疑義等語於是導淮自桐柏之言始信蓋胎簮即桐柏之中峯桑欽水經非誣也酈道元注以為淮澧同源西流為澧東流為淮則今之分水嶺實在胎簮峯下按圖可求淮澧分流此又一證也夫天下之理豈易窮哉若據江蘭之奏定三井為淮源則胎簮之真源湮矣然弗湮也桑欽酈道元之語固在也今偶湮之而後世必有執水經注以笑我君臣之不讀書矣兹不惟喜瀆源之得真更以佳古人之用心勤而千載之下必有相知之人也江蘭向在部中為能馳馬耐辛苦之能員是以屢升用之今職而於登峯造極跋涉以求得其源乃讓身軀孱弱占畢之儒臣斯則在立心之堅定與不堅定及讀書與不讀書之分耳既記其顛末並以嘉畢沅也沅其勉之御製文二集卷十五
